name: Validate Genesis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    name: Validate YAML Syntax
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          echo "Validating genesis YAML files..."
          find genesis -name "*.yaml" -o -name "*.yml" | head -20

          # Validate all YAML files
          find genesis -name "*.yaml" -o -name "*.yml" | while read file; do
            echo "Checking $file"
            python -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done

          echo "All YAML files are valid!"

  count-entities:
    runs-on: ubuntu-latest
    name: Count Entities
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count entities and bonds
        run: |
          echo "## Genesis Statistics"
          echo ""
          echo "### Oikoi"
          ls -d genesis/*/ 2>/dev/null | grep -v klimax | grep -v spora | grep -v arche | grep -v mcp | wc -l | xargs echo "Total oikoi:"
          echo ""
          echo "### Files by Type"
          echo "YAML files: $(find genesis -name '*.yaml' | wc -l)"
          echo "Markdown files: $(find genesis -name '*.md' | wc -l)"
          echo ""
          echo "### Content Patterns"
          echo "Eidos definitions: $(grep -r 'eidos: eidos' genesis --include='*.yaml' | wc -l)"
          echo "Desmos definitions: $(grep -r 'eidos: desmos' genesis --include='*.yaml' | wc -l)"
          echo "Praxis definitions: $(grep -r 'eidos: praxis' genesis --include='*.yaml' | wc -l)"
