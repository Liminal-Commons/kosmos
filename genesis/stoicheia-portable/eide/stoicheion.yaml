# Stoicheion Eide
# Schema definitions for interpreter steps — enables constrained praxis generation
#
# These eide define the vocabulary of praxis steps. When manteia generates praxeis,
# it can be constrained to produce only valid step structures by using JSON schemas
# derived from these definitions.
#
# Tiers:
#   0 = Pure data flow (no external effects)
#   1 = Read operations (kosmos reads, collection ops)
#   2 = Write operations (kosmos writes, control flow)
#   3 = External operations (inference, filesystem, network)

entities:
  # =============================================================================
  # Tier 0: Pure Data Flow
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/set
    data:
      name: set
      description: "Bind values to names in the current scope"
      tier: 0
      fields:
        bindings:
          type: object
          required: true
          description: "Object of variable names to values (e.g., {x: 1, y: 2})"

  - eidos: eidos
    id: eidos/stoicheion/return
    data:
      name: return
      description: "Return a value from the praxis"
      tier: 0
      fields:
        value:
          type: any
          required: true
          description: "Value to return"

  - eidos: eidos
    id: eidos/stoicheion/assert
    data:
      name: assert
      description: "Assert a condition, fail praxis if false"
      tier: 0
      fields:
        condition:
          type: string
          required: true
          description: "Expression to evaluate (must be truthy)"
        message:
          type: string
          required: false
          description: "Error message if assertion fails"

  # =============================================================================
  # Tier 1: Read Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/gather
    data:
      name: gather
      description: "Gather entities by eidos type"
      tier: 1
      fields:
        eidos:
          type: string
          required: false
          description: "Eidos to filter by (omit for all)"
        limit:
          type: integer
          required: false
          description: "Maximum entities to return"
        sort:
          type: string
          required: false
          description: "Sort by data field name"
        order:
          type: string
          required: false
          description: "Sort order: asc or desc (default asc)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind results to"

  - eidos: eidos
    id: eidos/stoicheion/trace
    data:
      name: trace
      description: "Trace bonds between entities"
      tier: 1
      fields:
        from_id:
          type: string
          required: false
          description: "Starting entity ID (trace outgoing)"
        to_id:
          type: string
          required: false
          description: "Ending entity ID (trace incoming)"
        desmos:
          type: string
          required: false
          description: "Bond type to filter by"
        resolve:
          type: string
          required: false
          description: "Resolve entities: 'from' or 'to'"
          enum: ["from", "to"]
        bind_to:
          type: string
          required: false
          description: "Variable to bind results to"

  - eidos: eidos
    id: eidos/stoicheion/surface
    data:
      name: surface
      description: "Surface entities by semantic proximity to query"
      tier: 1
      fields:
        query:
          type: string
          required: true
          description: "Semantic query"
        eidos_filter:
          type: string
          required: false
          description: "Eidos to filter results by"
        limit:
          type: integer
          required: false
          description: "Maximum results (default 10)"
        threshold:
          type: number
          required: false
          description: "Minimum similarity threshold (default 0.7)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind results to"

  - eidos: eidos
    id: eidos/stoicheion/sense_actuality
    data:
      name: sense_actuality
      description: "Sense the actual state of an entity"
      tier: 1
      fields:
        entity_id:
          type: string
          required: true
          description: "Entity ID to sense"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/digest
    data:
      name: digest
      description: "Create BLAKE3 hash digest of content"
      tier: 1
      fields:
        input:
          type: string
          required: true
          description: "Content to hash"
        bind_to:
          type: string
          required: false
          description: "Variable to bind hash to"

  # =============================================================================
  # Tier 1: Cursor/Observation Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/get_cursor
    data:
      name: get_cursor
      description: "Get observation cursor for a prosopon's view of an oikos"
      tier: 1
      fields:
        prosopon_id:
          type: string
          required: true
          description: "Prosopon ID"
        oikos_id:
          type: string
          required: true
          description: "Oikos ID"
        bind_to:
          type: string
          required: false
          description: "Variable to bind cursor version to"

  - eidos: eidos
    id: eidos/stoicheion/get_notifications
    data:
      name: get_notifications
      description: "Get notification counts for all oikoi a prosopon can see"
      tier: 1
      fields:
        prosopon_id:
          type: string
          required: true
          description: "Prosopon ID"
        bind_to:
          type: string
          required: false
          description: "Variable to bind notification list to"

  - eidos: eidos
    id: eidos/stoicheion/gather_since
    data:
      name: gather_since
      description: "Gather entities in an oikos that changed since a version"
      tier: 1
      fields:
        oikos_id:
          type: string
          required: true
          description: "Oikos ID"
        since_version:
          type: integer
          required: true
          description: "Version to compare against"
        limit:
          type: integer
          required: false
          description: "Maximum entities to return"
        bind_to:
          type: string
          required: false
          description: "Variable to bind entities to"

  # =============================================================================
  # Tier 1: Collection Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/filter
    data:
      name: filter
      description: "Filter an array by condition"
      tier: 1
      fields:
        items:
          type: any
          required: true
          description: "Array to filter"
          aliases: ["in"]
        condition:
          type: string
          required: true
          description: "Condition expression (evaluated per item)"
          aliases: ["where"]
        item_var:
          type: string
          required: false
          description: "Variable name for each item (default 'item')"
          aliases: ["as"]
          default: "item"
        bind_to:
          type: string
          required: false
          description: "Variable to bind filtered results to"

  - eidos: eidos
    id: eidos/stoicheion/map
    data:
      name: map
      description: "Transform each element of an array"
      tier: 1
      fields:
        items:
          type: any
          required: true
          description: "Array to transform"
          aliases: ["in"]
        item_var:
          type: string
          required: false
          description: "Variable name for each item (default 'item')"
          aliases: ["as"]
          default: "item"
        transform:
          type: any
          required: true
          description: "Expression to produce new value"
          aliases: ["to"]
        bind_to:
          type: string
          required: false
          description: "Variable to bind transformed results to"

  - eidos: eidos
    id: eidos/stoicheion/reduce
    data:
      name: reduce
      description: "Reduce an array to a single value"
      tier: 1
      fields:
        items:
          type: any
          required: true
          description: "Array to reduce"
          aliases: ["in"]
        item_var:
          type: string
          required: false
          description: "Variable name for each item (default 'item')"
          aliases: ["as"]
          default: "item"
        accumulator:
          type: string
          required: false
          description: "Variable name for accumulator (default 'acc')"
          default: "acc"
        initial:
          type: any
          required: true
          description: "Initial accumulator value"
        transform:
          type: any
          required: true
          description: "Expression to compute new accumulator"
          aliases: ["to"]
        bind_to:
          type: string
          required: false
          description: "Variable to bind final result to"

  - eidos: eidos
    id: eidos/stoicheion/sort
    data:
      name: sort
      description: "Sort an array by a field"
      tier: 1
      fields:
        items:
          type: any
          required: true
          description: "Array to sort"
        by:
          type: string
          required: true
          description: "Field path to sort by (e.g., 'data.created_at')"
        order:
          type: string
          required: false
          description: "Sort order: 'asc' or 'desc' (default 'asc')"
          enum: ["asc", "desc"]
          default: "asc"
        bind_to:
          type: string
          required: false
          description: "Variable to bind sorted results to"

  - eidos: eidos
    id: eidos/stoicheion/limit
    data:
      name: limit
      description: "Limit an array to maximum number of items"
      tier: 1
      fields:
        items:
          type: any
          required: true
          description: "Array to limit"
        count:
          type: integer
          required: true
          description: "Maximum number of items"
        bind_to:
          type: string
          required: false
          description: "Variable to bind limited results to"

  # =============================================================================
  # Tier 2: Entity Operations (Write)
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/find
    data:
      name: find
      description: "Find an entity by ID"
      tier: 2
      fields:
        id:
          type: string
          required: true
          description: "Entity ID to find"
        bind_to:
          type: string
          required: false
          description: "Variable to bind entity to"

  - eidos: eidos
    id: eidos/stoicheion/arise
    data:
      name: arise
      description: "Create an entity directly (not via compose). INTERNAL — use compose instead."
      tier: 2
      visibility: internal
      fields:
        eidos:
          type: string
          required: true
          description: "Eidos (type) of the entity"
        id:
          type: string
          required: true
          description: "Entity ID"
        data:
          type: object
          required: false
          description: "Entity data"
        internal:
          type: boolean
          required: false
          description: "Bypass gating when true (for documented exceptions only)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind created entity to"

  - eidos: eidos
    id: eidos/stoicheion/update
    data:
      name: update
      description: "Update an entity's data (merges with existing)"
      tier: 2
      fields:
        id:
          type: string
          required: true
          description: "Entity ID to update"
        data:
          type: object
          required: true
          description: "Data to merge"
        bind_to:
          type: string
          required: false
          description: "Variable to bind updated entity to"

  - eidos: eidos
    id: eidos/stoicheion/update_cursor
    data:
      name: update_cursor
      description: "Update observation cursor to current version"
      tier: 2
      fields:
        prosopon_id:
          type: string
          required: true
          description: "Prosopon ID"
        oikos_id:
          type: string
          required: true
          description: "Oikos ID"
        bind_to:
          type: string
          required: false
          description: "Variable to bind new cursor version to"

  - eidos: eidos
    id: eidos/stoicheion/dissolve
    data:
      name: dissolve
      description: "Delete an entity"
      tier: 2
      fields:
        id:
          type: string
          required: true
          description: "Entity ID to dissolve"

  - eidos: eidos
    id: eidos/stoicheion/bind
    data:
      name: bind
      description: "Create a bond between entities"
      tier: 2
      fields:
        from_id:
          type: string
          required: true
          description: "Source entity ID"
        to_id:
          type: string
          required: true
          description: "Target entity ID"
        desmos:
          type: string
          required: true
          description: "Bond type (desmos)"
        data:
          type: object
          required: false
          description: "Optional bond data"
        bind_to:
          type: string
          required: false
          description: "Variable to bind created bond to"

  - eidos: eidos
    id: eidos/stoicheion/loose
    data:
      name: loose
      description: "Dissolve a bond between entities"
      tier: 2
      fields:
        from_id:
          type: string
          required: true
          description: "Source entity ID"
        to_id:
          type: string
          required: true
          description: "Target entity ID"
        desmos:
          type: string
          required: true
          description: "Bond type (desmos)"

  - eidos: eidos
    id: eidos/stoicheion/compose
    data:
      name: compose
      description: "Compose an entity from a typos (idempotent — handles genesis and change)"
      tier: 2
      fields:
        typos_id:
          type: string
          required: false
          description: "Typos ID to compose from (optional when entity_id provides stored inputs)"
        entity_id:
          type: string
          required: false
          description: "Entity ID to compose again (reads stored _composition_inputs)"
        inputs:
          type: object
          required: false
          description: "Input values for composition"
        id:
          type: string
          required: false
          description: "Override entity ID (auto-generated if not provided)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind composed entity to"

  - eidos: eidos
    id: eidos/stoicheion/index
    data:
      name: index
      description: "Index an entity for semantic search"
      tier: 2
      fields:
        entity_id:
          type: string
          required: true
          description: "Entity ID to index"
        text:
          type: string
          required: true
          description: "Text to generate embedding from"
        embedding:
          type: array
          required: false
          description: "Pre-computed embedding (generated if not provided)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/traverse
    data:
      name: traverse
      description: "Traverse the graph following bond types"
      tier: 2
      fields:
        root_id:
          type: string
          required: true
          description: "Starting entity ID"
        desmoi:
          type: array
          required: true
          description: "Bond types to follow"
          items:
            type: string
        depth:
          type: integer
          required: false
          description: "Maximum traversal depth (default 10)"
          default: 10
        direction:
          type: string
          required: false
          description: "Direction: 'outward', 'inward', or 'both'"
          enum: ["outward", "inward", "both"]
          default: "outward"
        eidos:
          type: string
          required: false
          description: "Filter to entities of this eidos"
        bind_to:
          type: string
          required: false
          description: "Variable to bind results to"

  - eidos: eidos
    id: eidos/stoicheion/unmanifest
    data:
      name: unmanifest
      description: "Remove an entity from actuality"
      tier: 2
      fields:
        entity_id:
          type: string
          required: true
          description: "Entity ID to unmanifest"
        signal:
          type: integer
          required: false
          description: "Signal for process mode (default SIGTERM/15)"
          default: 15
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/keyring
    data:
      name: keyring
      description: "Cryptographic key and credential operations"
      tier: 2
      fields:
        operation:
          type: string
          required: true
          description: >
            Operation: generate_mnemonic, derive_key, sign, verify,
            is_unlocked, encrypt_credential, decrypt_credential,
            store_credential, get_credential, has_attainment,
            remove_credential, list_credentials, list_attainments
          enum:
            - generate_mnemonic
            - derive_key
            - sign
            - verify
            - is_unlocked
            - encrypt_credential
            - decrypt_credential
            - store_credential
            - get_credential
            - has_attainment
            - remove_credential
            - list_credentials
            - list_attainments
        mnemonic:
          type: string
          required: false
          description: "BIP-39 mnemonic (for derive_key, sign)"
        oikos_id:
          type: string
          required: false
          description: "Oikos ID for scoped key derivation"
        data:
          type: string
          required: false
          description: "Data to sign or verify"
        signature:
          type: string
          required: false
          description: "Signature (for verify)"
        public_key:
          type: string
          required: false
          description: "Public key (for verify)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"
        # Credential operation fields
        service:
          type: string
          required: false
          description: "Service identifier (for credential operations)"
        value:
          type: string
          required: false
          description: "Credential value (plaintext for encrypt, ciphertext for decrypt)"
        credential_id:
          type: string
          required: false
          description: "Credential ID (for remove/get operations)"
        attainment:
          type: string
          required: false
          description: "Attainment to check or grant"
        grants_attainment:
          type: string
          required: false
          description: "Attainment granted by this credential"
        label:
          type: string
          required: false
          description: "Label for the credential"
        salt:
          type: string
          required: false
          description: "Salt for encryption (for decrypt operation)"

  # =============================================================================
  # Tier 2: Control Flow
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/switch
    data:
      name: switch
      description: "Conditional branching based on conditions"
      tier: 2
      fields:
        cases:
          type: array
          required: true
          description: "Array of case objects with 'when' condition and 'then' steps"
          items:
            type: switch_case
        default:
          type: array
          required: false
          description: "Steps to execute if no case matches"
          items:
            type: step

  - eidos: eidos
    id: eidos/stoicheion/for_each
    data:
      name: for_each
      description: "Iterate over a collection"
      tier: 2
      fields:
        items:
          type: any
          required: true
          description: "Array to iterate over"
          aliases: ["in"]
        item_var:
          type: string
          required: false
          description: "Variable name for each item (default 'item')"
          aliases: ["as"]
          default: "item"
        steps:
          type: array
          required: true
          description: "Steps to execute for each item"
          aliases: ["do"]
          items:
            type: step
        lift:
          type: array
          required: false
          description: "Variables to lift back to parent scope after each iteration (variable names)"
          items:
            type: string

  - eidos: eidos
    id: eidos/stoicheion/try
    data:
      name: try
      description: |
        Error handling block. Execute steps in 'do', catch errors in 'catch'.
        If an error occurs, $_error is bound in the catch block.
      tier: 2
      fields:
        do:
          type: array
          required: true
          description: "Steps to attempt"
          items:
            type: step
        catch:
          type: array
          required: false
          description: "Steps to execute if an error occurs. $_error contains error message."
          items:
            type: step
        bind_to:
          type: string
          required: false
          description: "Variable to bind result of successful execution to"

  - eidos: eidos
    id: eidos/stoicheion/append
    data:
      name: append
      description: "Append a value to an array variable"
      tier: 2
      fields:
        to:
          type: string
          required: true
          description: "Variable name of the array to append to"
        value:
          type: any
          required: true
          description: "Value to append"

  - eidos: eidos
    id: eidos/stoicheion/log
    data:
      name: log
      description: "Log a message for debugging or audit"
      tier: 2
      fields:
        message:
          type: string
          required: true
          description: "Message to log (can include template expressions)"
        level:
          type: string
          required: false
          description: "Log level: debug, info, warn, error"
          enum: ["debug", "info", "warn", "error"]
          default: "info"

  - eidos: eidos
    id: eidos/stoicheion/call
    data:
      name: call
      description: "Call another praxis"
      tier: 2
      fields:
        praxis:
          type: string
          required: true
          description: "Praxis ID to call"
        params:
          type: object
          required: false
          description: "Parameters to pass"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  # =============================================================================
  # Tier 3: External Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/embed
    data:
      name: embed
      description: "Generate embedding vector for text"
      tier: 3
      fields:
        text:
          type: string
          required: true
          description: "Text to embed"
        provider:
          type: string
          required: false
          description: "Provider name: openai (default openai)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind embedding to"

  - eidos: eidos
    id: eidos/stoicheion/infer
    data:
      name: infer
      description: "Call LLM for inference with optional structured output. INTERNAL — use governed-inference instead."
      tier: 3
      visibility: internal
      fields:
        prompt:
          type: string
          required: true
          description: "Prompt to send"
        system_prompt:
          type: string
          required: false
          description: "System prompt"
        model:
          type: string
          required: false
          description: "Explicit model ID — overrides tier resolution"
        tier:
          type: string
          required: false
          description: "Capability tier: capable, balanced, or fast (default fast)"
        provider:
          type: string
          required: false
          description: "Provider name: anthropic, openai (default anthropic)"
        temperature:
          type: number
          required: false
          description: "Temperature (default 0.7)"
          default: 0.7
        output_schema:
          type: object
          required: false
          description: "JSON Schema for structured output — constrains LLM to valid JSON"
        stoicheion:
          type: string
          required: false
          description: "Stoicheion eidos ID for auto-generated schema (e.g., eidos/stoicheion/filter)"
        target_eidos:
          type: string
          required: false
          description: "Eidos ID for auto-generated schema — constrains output to entity fields (e.g., eidos/theoria)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind response to (JSON if structured, string if plain)"
        internal:
          type: boolean
          required: false
          description: "Bypass gating when true (for documented exceptions only)"

  - eidos: eidos
    id: eidos/stoicheion/manifest
    data:
      name: manifest
      description: "Bring an entity into actuality"
      tier: 3
      fields:
        entity_id:
          type: string
          required: true
          description: "Entity ID to manifest"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/signal
    data:
      name: signal
      description: "Signaling operations for WebRTC and protocols"
      tier: 3
      fields:
        operation:
          type: string
          required: true
          description: "Operation: poll, send_offer, send_answer, accept_answer, etc."
        session_id:
          type: string
          required: false
          description: "Signaling session ID"
        channel_id:
          type: string
          required: false
          description: "Data channel ID"
        sdp:
          type: string
          required: false
          description: "SDP data"
        message:
          type: any
          required: false
          description: "Message data"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/emit
    data:
      name: emit
      description: "Emit content or entity to filesystem"
      tier: 3
      fields:
        path:
          type: string
          required: true
          description: "File path to write to"
        entity_id:
          type: string
          required: false
          description: "Entity ID to emit (serialized based on format)"
        content:
          type: string
          required: false
          description: "Direct content to write"
        format:
          type: string
          required: false
          description: "Output format: yaml, json, markdown, text"
          enum: ["yaml", "json", "markdown", "text"]
          default: "yaml"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/invoke
    data:
      name: invoke
      description: "Invoke a dynamis operation (external provider like LiveKit, DNS, etc.)"
      tier: 3
      fields:
        dynamis:
          type: string
          required: true
          description: "Dynamis provider name (e.g., 'livekit', 'dns', 'r2')"
        operation:
          type: string
          required: true
          description: "Operation to invoke (e.g., 'create-token', 'sense', 'manifest')"
        params:
          type: object
          required: false
          description: "Parameters to pass to the operation"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to"

  - eidos: eidos
    id: eidos/stoicheion/fetch_topos
    data:
      name: fetch_topos
      description: |
        Fetch and install a topos distribution from a remote source.
        Verifies signature against publisher pubkey, then installs content.
        Used by oikos distribution to install topoi on join.
      tier: 3
      fields:
        topos_prod_id:
          type: string
          required: true
          description: "Entity ID of the topos distribution to fetch (e.g., 'topos-prod/nous-1.0.0')"
        verify_signature:
          type: boolean
          required: false
          description: "Whether to verify Ed25519 signature (default: true)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind installation result to"

  # =============================================================================
  # Tier 3: Process Actuality Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/spawn-process
    data:
      name: spawn-process
      tier: 3
      description: |
        Spawn a background process.

        Used by process actuality mode to manifest deployments.
        Returns PID and initial status.
      fields:
        command:
          type: string
          required: true
          description: "Command to execute"
        args:
          type: array
          required: false
          description: "Command arguments"
        env:
          type: object
          required: false
          description: "Environment variables"
        working_dir:
          type: string
          required: false
          description: "Working directory for the process"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (pid, status)"

  - eidos: eidos
    id: eidos/stoicheion/check-process
    data:
      name: check-process
      tier: 3
      description: |
        Check if a process is running.

        Used by process actuality mode to sense deployment state.
      fields:
        pid:
          type: integer
          required: true
          description: "Process ID to check"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (running, exit_code, cpu_usage, memory_usage)"

  - eidos: eidos
    id: eidos/stoicheion/kill-process
    data:
      name: kill-process
      tier: 3
      description: |
        Terminate a process.

        Used by process actuality mode to unmanifest deployments.
      fields:
        pid:
          type: integer
          required: true
          description: "Process ID to kill"
        signal:
          type: integer
          required: false
          default: 15
          description: "Signal to send (default SIGTERM/15)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (success)"

  # =============================================================================
  # Tier 3: MCP Registration Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/register-mcp-tool
    data:
      name: register-mcp-tool
      tier: 3
      description: |
        Dynamically register a praxis as an MCP tool.

        Used by topos development for testing praxeis without emission.
        Enables live development workflow where praxeis appear as
        MCP tools immediately upon composition.
      fields:
        praxis_id:
          type: string
          required: true
          description: "Praxis ID to register as tool"
        prefix:
          type: string
          required: false
          default: "dev"
          description: "Tool name prefix (default 'dev')"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (tool_name, success)"

  # =============================================================================
  # Tier 3: NixOS Actuality Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/nixos-activate
    data:
      name: nixos-activate
      tier: 3
      description: |
        Generate NixOS module and activate via nixos-rebuild.

        Used by process/nixos actuality mode to manifest deployments.
        Writes configuration to module_path and runs nixos-rebuild switch.
      fields:
        module_path:
          type: string
          required: true
          description: "Path to write NixOS module configuration"
        service_name:
          type: string
          required: true
          description: "systemd service name (used in NixOS config)"
        config:
          type: object
          required: true
          description: "Service configuration (host, port, oikos_id, etc.)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (status, generation)"

  - eidos: eidos
    id: eidos/stoicheion/nixos-deactivate
    data:
      name: nixos-deactivate
      tier: 3
      description: |
        Remove service from NixOS configuration and rebuild.

        Used by process/nixos actuality mode to unmanifest deployments.
        Sets enable = false and runs nixos-rebuild switch.
      fields:
        service_name:
          type: string
          required: true
          description: "Service to deactivate"
        module_path:
          type: string
          required: false
          description: "Path to module file (for removal)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (status)"

  # =============================================================================
  # Tier 3: systemd Actuality Operations
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/systemd-enable
    data:
      name: systemd-enable
      tier: 3
      description: |
        Write systemd unit file and enable/start the service.

        Used by process/systemd actuality mode to manifest deployments.
        Writes unit to unit_path, runs daemon-reload, then enable --now.
      fields:
        unit_path:
          type: string
          required: true
          description: "Path to write systemd unit file (e.g., /etc/systemd/system/kosmos@.service)"
        unit_name:
          type: string
          required: true
          description: "Unit name to enable (e.g., kosmos-server@oikos-id)"
        unit_content:
          type: string
          required: true
          description: "Complete systemd unit file content"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (status, pid)"

  - eidos: eidos
    id: eidos/stoicheion/systemd-disable
    data:
      name: systemd-disable
      tier: 3
      description: |
        Stop and disable systemd service.

        Used by process/systemd actuality mode to unmanifest deployments.
        Runs systemctl stop, systemctl disable, optionally removes unit file.
      fields:
        unit_name:
          type: string
          required: true
          description: "Unit name to disable"
        remove_unit:
          type: boolean
          required: false
          default: false
          description: "Whether to remove the unit file after disabling"
        unit_path:
          type: string
          required: false
          description: "Path to unit file (required if remove_unit is true)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (status)"

  - eidos: eidos
    id: eidos/stoicheion/systemctl-status
    data:
      name: systemctl-status
      tier: 3
      description: |
        Query systemd for unit status.

        Used by process/systemd and process/nixos actuality modes for sensing.
        Parses systemctl show output to determine running state.
      fields:
        unit_name:
          type: string
          required: true
          description: "Unit name to query"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (running, active_state, sub_state, main_pid)"

  # =============================================================================
  # Tier 3: Generic Shell/Build Operations (chora-dev)
  # =============================================================================

  - eidos: eidos
    id: eidos/stoicheion/shell-execute
    data:
      name: shell-execute
      tier: 3
      description: |
        Execute any shell command. The foundation for all tool integrations.

        This is the single primitive that bridges kosmos intent to substrate
        actuality for command execution. All tool-specific behavior is defined
        in command templates (graph entities), not here.
      fields:
        command:
          type: string
          required: true
          description: "Executable name (e.g., 'cargo', 'npm', 'go')"
        args:
          type: array
          required: true
          description: "Command arguments as array of strings"
        working_dir:
          type: string
          required: false
          description: "Working directory (defaults to workspace root)"
        env:
          type: object
          required: false
          description: "Environment variables to set"
        timeout_ms:
          type: integer
          required: false
          description: "Timeout in milliseconds (default: 300000 = 5 min)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (stdout, stderr, exit_code, duration_ms, success)"

  - eidos: eidos
    id: eidos/stoicheion/hash-path
    data:
      name: hash-path
      tier: 3
      description: |
        Compute BLAKE3 hash of files matching a glob pattern.
        Used for staleness detection and content verification.
      fields:
        path:
          type: string
          required: true
          description: "Base directory to hash"
        pattern:
          type: string
          required: false
          description: "Glob pattern (default: '**/*')"
        include_names:
          type: boolean
          required: false
          description: "Include filenames in hash (default: true)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (hash, file_count)"

  - eidos: eidos
    id: eidos/stoicheion/parse-output
    data:
      name: parse-output
      tier: 3
      description: |
        Parse command output using format-specific handlers or regex.

        Built-in formats:
        - json: Parse as JSON
        - lines: Split into lines
        - regex: Extract using regex pattern
        - cargo-test: Parse cargo test summary
        - cargo-clippy: Parse clippy JSON output
        - cargo-metadata: Parse cargo metadata JSON
      fields:
        content:
          type: string
          required: true
          description: "Content to parse"
        format:
          type: string
          required: true
          description: "Format: json, lines, regex, cargo-test, cargo-clippy, cargo-metadata"
        schema:
          type: object
          required: false
          description: "Extraction rules for regex format (requires 'pattern' field)"
        bind_to:
          type: string
          required: false
          description: "Variable to bind parsed result to"

  - eidos: eidos
    id: eidos/stoicheion/file-exists
    data:
      name: file-exists
      tier: 3
      description: |
        Check if a file or directory exists.
        Simple but essential for sense operations.
      fields:
        path:
          type: string
          required: true
          description: "Path to check"
        bind_to:
          type: string
          required: false
          description: "Variable to bind result to (exists, is_file, is_dir, size, modified_at)"
