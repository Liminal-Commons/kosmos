# Voice-Authoring Desmoi
# =======================
#
# Bond types for voice-authoring mode.
# Traces to: genesis/voice-authoring/DESIGN.md

entities:

  # authoring — session is authoring an artifact
  - eidos: desmos
    id: desmos/authoring
    data:
      name: authoring
      description: |
        Authoring session is actively authoring an artifact.

        This bond connects the session to its focused artifact.
        When focus shifts, the old bond is removed and new one created.

        Enables:
        - Finding what's being authored in a session
        - Finding who is authoring an artifact
        - Tracking authorship activity
      from_eidos: authoring-session
      to_eidos: artifact
      cardinality: one-to-one
      symmetric: false
