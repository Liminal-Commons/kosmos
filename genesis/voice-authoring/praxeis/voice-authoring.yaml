# Voice-Authoring Praxeis
# ========================
#
# Operations for voice-authoring mode.
# Traces to: genesis/voice-authoring/DESIGN.md

entities:

  # ═══════════════════════════════════════════════════════════════════════════
  # MODE MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════

  - eidos: praxis
    id: praxis/voice-authoring/enter-voice-authoring
    data:
      oikos: voice-authoring
      name: enter-voice-authoring
      visible: true
      description: |
        Enter voice-authoring mode.

        Creates an authoring session, activates the voice-authoring layout,
        and opens a voice stream for capture. Optionally focuses an initial
        artifact.

        This is the entry point to voice-authoring — the "game mode" switch.
      params:
        - name: artifact_id
          type: string
          required: false
          description: "Initial artifact to focus (optional)"
        - name: context_depth
          type: number
          required: false
          default: 1
          description: "How deep to gather context"
      steps:
        # Create authoring session
        - step: compose
          typos_id: typos-def-authoring-session
          inputs:
            animus_id: "$_animus.id"
            circle_id: "$_circle.id"
            focused_artifact_id: "$artifact_id"
            context_depth: "$context_depth"
            started_at: "$_now"
          bind_to: session

        # Activate voice-authoring layout
        - step: call
          praxis: opsis/activate-layout
          params:
            layout_id: layout/voice-authoring

        # Open voice stream
        - step: call
          praxis: thyra/open-stream
          params:
            kind: voice
            direction: inward
          bind_to: stream

        # If artifact provided, create authoring bond
        - step: switch
          value: "$artifact_id"
          cases:
            - when: { exists: true }
              steps:
                - step: bind
                  from: "$session.id"
                  to: "$artifact_id"
                  desmos: authoring

        - step: return
          value:
            session: "$session"
            stream: "$stream"

  - eidos: praxis
    id: praxis/voice-authoring/exit-voice-authoring
    data:
      oikos: voice-authoring
      name: exit-voice-authoring
      visible: true
      description: |
        Exit voice-authoring mode.

        Ends the authoring session, closes voice streams, and restores
        the previous layout.
      params:
        - name: session_id
          type: string
          required: true
          description: "The session to end"
      steps:
        # Update session status
        - step: update
          entity_id: "$session_id"
          data:
            status: ended
            ended_at: "$_now"
          bind_to: session

        # Close voice streams
        - step: gather
          eidos: stream
          filter:
            kind: voice
            direction: inward
            status: { in: [active, paused] }
          bind_to: streams

        - step: for_each
          items: "$streams"
          as: stream
          steps:
            - step: call
              praxis: thyra/close-stream
              params:
                stream_id: "$stream.id"

        # Restore default layout
        - step: call
          praxis: opsis/activate-layout
          params:
            layout_id: layout/default

        - step: return
          value: "$session"

  - eidos: praxis
    id: praxis/voice-authoring/pause-voice-authoring
    data:
      oikos: voice-authoring
      name: pause-voice-authoring
      visible: true
      description: |
        Pause voice capture without exiting mode.

        The session remains active but voice is not being captured.
        Useful for stepping away briefly.
      params:
        - name: session_id
          type: string
          required: true
      steps:
        - step: update
          entity_id: "$session_id"
          data:
            status: paused
            paused_at: "$_now"
          bind_to: session

        - step: call
          praxis: thyra/pause-stream
          params:
            kind: voice
            direction: inward

        - step: return
          value: "$session"

  - eidos: praxis
    id: praxis/voice-authoring/resume-voice-authoring
    data:
      oikos: voice-authoring
      name: resume-voice-authoring
      visible: true
      description: |
        Resume voice capture after pause.
      params:
        - name: session_id
          type: string
          required: true
      steps:
        - step: update
          entity_id: "$session_id"
          data:
            status: active
            paused_at: null
          bind_to: session

        - step: call
          praxis: thyra/resume-stream
          params:
            kind: voice
            direction: inward

        - step: return
          value: "$session"

  # ═══════════════════════════════════════════════════════════════════════════
  # FOCUS MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════

  - eidos: praxis
    id: praxis/voice-authoring/focus-artifact
    data:
      oikos: voice-authoring
      name: focus-artifact
      visible: true
      description: |
        Shift authoring focus to an artifact.

        Updates the session's focused artifact, rebinds the authoring bond,
        and re-renders the artifact panel.
      params:
        - name: session_id
          type: string
          required: true
        - name: artifact_id
          type: string
          required: true
      steps:
        # Get current session
        - step: find
          entity_id: "$session_id"
          bind_to: session

        # Remove old authoring bond if exists
        - step: switch
          value: "$session.data.focused_artifact_id"
          cases:
            - when: { exists: true }
              steps:
                - step: loose
                  from: "$session.id"
                  to: "$session.data.focused_artifact_id"
                  desmos: authoring

        # Update session
        - step: update
          entity_id: "$session_id"
          data:
            focused_artifact_id: "$artifact_id"
            expanded_bonds: []  # Reset expanded bonds on focus change
          bind_to: updated_session

        # Create new authoring bond
        - step: bind
          from: "$session.id"
          to: "$artifact_id"
          desmos: authoring

        - step: return
          value: "$updated_session"

  - eidos: praxis
    id: praxis/voice-authoring/focus-sub-artifact
    data:
      oikos: voice-authoring
      name: focus-sub-artifact
      visible: true
      description: |
        Navigate into a composed artifact's child.

        If the sub-artifact doesn't exist yet (lazy composition), this
        operation may generate it on-demand.
      params:
        - name: session_id
          type: string
          required: true
        - name: parent_artifact_id
          type: string
          required: true
        - name: section_path
          type: string
          required: true
          description: "Path within the artifact (e.g., 'introduction', 'section-2')"
      steps:
        # Check if sub-artifact exists
        - step: gather
          eidos: artifact
          filter:
            parent_artifact_id: "$parent_artifact_id"
            section_path: "$section_path"
          limit: 1
          bind_to: existing

        - step: switch
          value: "$existing"
          cases:
            # Sub-artifact exists, focus it
            - when: { length: { gt: 0 } }
              steps:
                - step: call
                  praxis: voice-authoring/focus-artifact
                  params:
                    session_id: "$session_id"
                    artifact_id: "$existing.0.id"
                  bind_to: result
            # Sub-artifact doesn't exist, generate it
            - when: { length: { eq: 0 } }
              steps:
                - step: find
                  entity_id: "$parent_artifact_id"
                  bind_to: parent
                # Extract section content from parent
                - step: call
                  praxis: manteia/governed-inference
                  params:
                    prompt: |
                      Extract the section "{{ $section_path }}" from this document
                      and return it as standalone content.
                    output_schema:
                      type: object
                      properties:
                        title:
                          type: string
                        content:
                          type: string
                  bind_to: extracted
                # Compose sub-artifact
                - step: compose
                  typos_id: typos-def-artifact
                  inputs:
                    title: "$extracted.content.title"
                    content: "$extracted.content.content"
                    parent_artifact_id: "$parent_artifact_id"
                    section_path: "$section_path"
                  bind_to: sub_artifact
                # Focus it
                - step: call
                  praxis: voice-authoring/focus-artifact
                  params:
                    session_id: "$session_id"
                    artifact_id: "$sub_artifact.id"
                  bind_to: result

        - step: return
          value: "$result"

  - eidos: praxis
    id: praxis/voice-authoring/expand-context
    data:
      oikos: voice-authoring
      name: expand-context
      visible: true
      description: |
        Expand a bond in the artifact view, adding it to context.

        When expanded, entities reachable via this bond become part of
        the inference context for artifact updates.
      params:
        - name: session_id
          type: string
          required: true
        - name: bond_id
          type: string
          required: true
          description: "Bond to expand (e.g., 'depends-on/artifact/requirements')"
      steps:
        - step: find
          entity_id: "$session_id"
          bind_to: session

        - step: set
          value:
            expanded_bonds:
              - append: "$session.data.expanded_bonds"
              - value: "$bond_id"
          bind_to: new_bonds

        - step: update
          entity_id: "$session_id"
          data:
            expanded_bonds: "$new_bonds.expanded_bonds"
          bind_to: updated_session

        - step: return
          value: "$updated_session"

  - eidos: praxis
    id: praxis/voice-authoring/collapse-context
    data:
      oikos: voice-authoring
      name: collapse-context
      visible: true
      description: |
        Collapse a bond in the artifact view, removing it from context.
      params:
        - name: session_id
          type: string
          required: true
        - name: bond_id
          type: string
          required: true
      steps:
        - step: find
          entity_id: "$session_id"
          bind_to: session

        - step: filter
          items: "$session.data.expanded_bonds"
          condition: "$ != $bond_id"
          bind_to: filtered_bonds

        - step: update
          entity_id: "$session_id"
          data:
            expanded_bonds: "$filtered_bonds"
          bind_to: updated_session

        - step: return
          value: "$updated_session"

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTHORING OPERATIONS
  # ═══════════════════════════════════════════════════════════════════════════

  - eidos: praxis
    id: praxis/voice-authoring/process-authoring-expression
    data:
      oikos: voice-authoring
      name: process-authoring-expression
      visible: true
      description: |
        Process a committed expression in voice-authoring mode.

        This is the core operation: human commits an expression, it gets
        processed to update the focused artifact, and kosmos responds.

        The flow:
        1. Get session and focused artifact
        2. Compose inference context (including expanded bonds)
        3. Surface relevant theoria
        4. Generate artifact update
        5. Update artifact
        6. Bond provenance (informed-by)
        7. Create kosmos response
        8. Update session statistics
      params:
        - name: session_id
          type: string
          required: true
        - name: expression_id
          type: string
          required: true
      steps:
        # Get session and expression
        - step: find
          entity_id: "$session_id"
          bind_to: session

        - step: find
          entity_id: "$expression_id"
          bind_to: expression

        # Get focused artifact
        - step: find
          entity_id: "$session.data.focused_artifact_id"
          bind_to: artifact

        # Gather context from expanded bonds
        - step: trace
          entity_id: "$artifact.id"
          desmoi:
            - depends-on
            - informed-by
          depth: "$session.data.context_depth"
          bind_to: context_entities

        # Filter to only expanded bonds
        - step: filter
          items: "$context_entities"
          condition: "$.bond_path in $session.data.expanded_bonds"
          bind_to: expanded_context

        # Surface relevant theoria (if artifact has domain)
        - step: switch
          value: "$artifact.data.domain"
          cases:
            - when: { exists: true }
              steps:
                - step: surface
                  query: "$artifact.data.domain"
                  eidos: theoria
                  limit: 5
                  bind_to: theoria
            - default:
              steps:
                - step: set
                  value: []
                  bind_to: theoria

        # Compose the inference context
        - step: compose
          typos_id: typos-inference-update-artifact
          inputs:
            input_artifacts:
              - "$artifact"
            human_expression: "$expression"
            additional_context: "$expanded_context"
          bind_to: inference_context

        # Build system prompt with theoria
        - step: set
          value: |
            You are an editor updating documents based on human discussion.

            ## Domain Knowledge
            {{ for t in $theoria }}
            - {{ $t.data.insight }}
            {{ end }}

            ## Constraints
            - Preserve existing section structure unless explicitly asked to change
            - Use the same voice and terminology as the existing document
            - Make minimal changes to achieve the intent
            - Do not add content beyond what is requested

            ## Current Artifact
            Title: {{ $artifact.data.title }}
            Content:
            {{ $artifact.data.content }}
          bind_to: system_prompt

        # Generate update
        - step: call
          praxis: manteia/governed-inference
          params:
            prompt: |
              The human said:
              {{ $expression.data.content }}

              Update the artifact to incorporate their intent.
            system_prompt: "$system_prompt"
            output_schema:
              type: object
              properties:
                updated_content:
                  type: string
                  description: "The full updated artifact content"
                changes_summary:
                  type: string
                  description: "Brief summary of what changed (1-2 sentences)"
                clarification_needed:
                  type: string
                  description: "Question for the human if anything is unclear (null if none)"
              required:
                - updated_content
                - changes_summary
          bind_to: generation

        # Update artifact
        - step: update
          entity_id: "$artifact.id"
          data:
            content: "$generation.content.updated_content"
          bind_to: updated_artifact

        # Bond provenance: artifact informed-by expression
        - step: bind
          from: "$updated_artifact.id"
          to: "$expression.id"
          desmos: informed-by

        # Bond provenance: artifact informed-by theoria
        - step: for_each
          items: "$theoria"
          as: t
          steps:
            - step: bind
              from: "$updated_artifact.id"
              to: "$t.id"
              desmos: informed-by

        # Optionally bond discusses-about (for retrieval, not structural)
        - step: bind
          from: "$expression.id"
          to: "$artifact.id"
          desmos: discusses-about

        # Create kosmos response
        - step: compose
          typos_id: typos-def-kosmos-response
          inputs:
            content: "$generation.content.changes_summary"
            circle_id: "$session.data.circle_id"
            in_reply_to: "$expression.id"
          bind_to: response

        # If clarification needed, add to response
        - step: switch
          value: "$generation.content.clarification_needed"
          cases:
            - when: { exists: true, neq: null }
              steps:
                - step: compose
                  typos_id: typos-def-kosmos-response
                  inputs:
                    content: "$generation.content.clarification_needed"
                    circle_id: "$session.data.circle_id"
                    mode: inquiry
                    in_reply_to: "$response.id"
                  bind_to: clarification

        # Update session statistics
        - step: update
          entity_id: "$session.id"
          data:
            expressions_count:
              add:
                - "$session.data.expressions_count"
                - 1
            artifacts_updated_count:
              add:
                - "$session.data.artifacts_updated_count"
                - 1

        - step: return
          value:
            artifact: "$updated_artifact"
            response: "$response"
            clarification: "$clarification"

  - eidos: praxis
    id: praxis/voice-authoring/create-artifact-from-conversation
    data:
      oikos: voice-authoring
      name: create-artifact-from-conversation
      visible: true
      description: |
        Generate a new artifact from a discussion thread.

        When the human says "make this into a document" or similar,
        gather recent expressions and synthesize into an artifact.
      params:
        - name: session_id
          type: string
          required: true
        - name: expression_ids
          type: array
          required: false
          description: "Specific expressions to use (if not provided, uses recent)"
        - name: expression_count
          type: number
          required: false
          default: 20
          description: "How many recent expressions to use"
        - name: title
          type: string
          required: false
        - name: structure_hint
          type: string
          required: false
          description: "Guidance on structure (outline, narrative, etc.)"
      steps:
        - step: find
          entity_id: "$session_id"
          bind_to: session

        # Gather expressions
        - step: switch
          value: "$expression_ids"
          cases:
            - when: { exists: true }
              steps:
                - step: for_each
                  items: "$expression_ids"
                  as: id
                  steps:
                    - step: find
                      entity_id: "$id"
                      bind_to: expr
                  bind_to: expressions
            - default:
              steps:
                - step: gather
                  eidos: expression
                  filter:
                    circle_id: "$session.data.circle_id"
                  limit: "$expression_count"
                  bind_to: expressions

        # Sort by time
        - step: sort
          items: "$expressions"
          by: data.expressed_at
          order: ascending
          bind_to: sorted_expressions

        # Build discussion text
        - step: set
          value: ""
          bind_to: discussion_text

        - step: for_each
          items: "$sorted_expressions"
          as: expr
          steps:
            - step: set
              value: |
                {{ $discussion_text }}

                [{{ $expr.data.expressed_by }}]: {{ $expr.data.content }}
              bind_to: discussion_text

        # Generate artifact
        - step: call
          praxis: manteia/governed-inference
          params:
            prompt: |
              Synthesize this discussion into a well-structured document.

              {{ if $structure_hint }}
              Structure guidance: {{ $structure_hint }}
              {{ end }}

              Discussion:
              {{ $discussion_text }}
            system_prompt: |
              You are a synthesizer. Given a discussion, extract and organize
              the key points into well-structured content. Preserve the essence
              of what was discussed while improving clarity and organization.
            output_schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      heading:
                        type: string
                      content:
                        type: string
              required:
                - title
                - content
          bind_to: generation

        # Use provided title or generated one
        - step: switch
          value: "$title"
          cases:
            - when: { exists: true }
              steps:
                - step: set
                  value: "$title"
                  bind_to: final_title
            - default:
              steps:
                - step: set
                  value: "$generation.content.title"
                  bind_to: final_title

        # Compose artifact
        - step: compose
          typos_id: typos-def-artifact
          inputs:
            title: "$final_title"
            content: "$generation.content.content"
            kind: document
            circle_id: "$session.data.circle_id"
          bind_to: artifact

        # Bond provenance: informed-by each expression
        - step: for_each
          items: "$sorted_expressions"
          as: expr
          steps:
            - step: bind
              from: "$artifact.id"
              to: "$expr.id"
              desmos: informed-by

        # Focus the new artifact
        - step: call
          praxis: voice-authoring/focus-artifact
          params:
            session_id: "$session.id"
            artifact_id: "$artifact.id"

        - step: return
          value: "$artifact"
