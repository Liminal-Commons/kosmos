# Voice-Authoring Layout Entities
# ================================
#
# HUD structure for voice-authoring mode.
# Traces to: genesis/voice-authoring/DESIGN.md

entities:

  # ─────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ─────────────────────────────────────────────────────────────────────────

  - eidos: layout
    id: layout/voice-authoring
    data:
      name: voice-authoring
      description: |
        HUD layout for voice-authoring mode.

        Three regions:
        - artifact (left): The focused artifact, updating live
        - conversation (right): Expression thread with human + kosmos
        - voice-bar (bottom): Accumulation buffer for voice input
      regions:
        - kind: artifact
          position: left
          width: "50%"
          config:
            scrollable: true
            show_structure: true
            clickable_sections: true
        - kind: conversation
          position: right
          width: "50%"
          config:
            scrollable: true
            auto_scroll: true
            show_timestamps: false
        - kind: voice-bar
          position: bottom
          height: auto
          config:
            show_waveform: true
            show_raw_and_clarified: true
      active: false
      created_at: "2025-01-30T00:00:00Z"

  # ─────────────────────────────────────────────────────────────────────────
  # PANELS
  # ─────────────────────────────────────────────────────────────────────────

  - eidos: panel
    id: panel/voice-authoring/artifact
    data:
      name: artifact-preview
      render_type: artifact-preview
      source_query: |
        find($session.data.focused_artifact_id)
      region_id: artifact
      priority: 0
      visible: true
      config:
        editable: false
        highlight_changes: true
        show_informed_by: true
      created_at: "2025-01-30T00:00:00Z"

  - eidos: panel
    id: panel/voice-authoring/conversation
    data:
      name: conversation-thread
      render_type: expression-thread
      source_query: |
        gather(eidos: expression, filter: { circle_id: $_circle.id })
        | sort(by: expressed_at, order: ascending)
        | limit(100)
      region_id: conversation
      priority: 0
      visible: true
      config:
        show_mode_badges: true
        show_kosmos_responses: true
        group_by_session: false
      created_at: "2025-01-30T00:00:00Z"

  - eidos: panel
    id: panel/voice-authoring/voice-bar
    data:
      name: voice-input
      render_type: accumulation-buffer
      source_query: |
        gather(eidos: accumulation, filter: { status: active, animus_id: $_animus.id })
        | limit(1)
      region_id: voice-bar
      priority: 0
      visible: true
      config:
        show_raw: true
        show_clarified: true
        show_capture_state: true
        commit_button: true
        abandon_button: true
      created_at: "2025-01-30T00:00:00Z"
