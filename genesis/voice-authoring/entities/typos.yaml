# Voice-Authoring Typos
# ======================
#
# Composition templates for voice-authoring mode.
# Traces to: genesis/voice-authoring/DESIGN.md

entities:

  # ─────────────────────────────────────────────────────────────────────────
  # SESSION COMPOSITION
  # ─────────────────────────────────────────────────────────────────────────

  - eidos: typos
    id: typos-def-authoring-session
    data:
      name: authoring-session
      description: |
        Compose an authoring-session entity.

        Called when entering voice-authoring mode. Creates the session
        that tracks authoring state: focused artifact, expanded context,
        inference pattern.
      target_eidos: authoring-session
      defaults:
        status: active
        context_depth: 1
        inference_pattern_id: typos-inference-update-artifact
        expanded_bonds: []
        expressions_count: 0
        artifacts_updated_count: 0
      bonds:
        - desmos: belongs-to
          from_self: true
          to_literal: oikos/voice-authoring

  # ─────────────────────────────────────────────────────────────────────────
  # ARTIFACT CREATION FROM DISCUSSION
  # ─────────────────────────────────────────────────────────────────────────

  - eidos: typos
    id: typos-def-artifact-from-discussion
    data:
      name: artifact-from-discussion
      description: |
        Compose a new artifact from a discussion thread.

        Used when the human says "make this into a document" or similar.
        Gathers expressions from the thread and synthesizes into artifact.
      target_eidos: artifact
      slots:
        expression_ids:
          type: array
          required: true
          description: "Expression IDs to synthesize from"
        title:
          type: string
          required: false
          description: "Optional title (will be generated if not provided)"
        artifact_kind:
          type: string
          required: false
          default: document
          description: "Kind of artifact to create"
        structure_hint:
          type: string
          required: false
          description: "Optional guidance on structure (outline, narrative, etc.)"
      bonds:
        - desmos: informed-by
          from_self: true
          to_slot: expression_ids

  # ─────────────────────────────────────────────────────────────────────────
  # KOSMOS RESPONSE
  # ─────────────────────────────────────────────────────────────────────────

  - eidos: typos
    id: typos-def-kosmos-response
    data:
      name: kosmos-response
      description: |
        Compose a kosmos response expression.

        Kosmos responds to human expressions with summaries of changes,
        clarifications, and suggestions. These are expressions too,
        but with expressed_by: kosmos.
      target_eidos: expression
      defaults:
        expressed_by: kosmos
        source_kind: compose
        mode: declaration
      bonds:
        - desmos: expressed-in
          from_self: true
          to_context: _circle
