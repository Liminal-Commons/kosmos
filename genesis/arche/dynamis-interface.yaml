# =============================================================================
# MEMORY MANAGEMENT
# How WASM and Rust share data
# =============================================================================

memory_protocol:
  description: |
    WASM modules export memory. Rust writes results to WASM memory
    and returns (ptr, len) pairs. WASM reads from those locations.

    For inputs: WASM writes strings/JSON to its memory, passes (ptr, len).
    For outputs: Rust allocates in WASM memory via exported alloc function,
    writes result, returns (ptr, len).

  wasm_exports:
    - name: memory
      description: "Linear memory exported by WASM module"
    - name: alloc
      description: "fn(size: i32) -> i32 — allocate bytes, return pointer"
    - name: dealloc
      description: "fn(ptr: i32, size: i32) — free allocated memory"

  string_encoding: utf-8
  json_encoding: utf-8

# =============================================================================
# CAPABILITY SUMMARY
# =============================================================================

summary:
  total_capabilities: 19
  by_tier:
    tier_0: 1   # Pure computation (timestamp)
    tier_1: 1   # In-memory (log)
    tier_2: 9   # Local substrate (db.*, polis.visible_to)
    tier_3: 8   # External world (aisthesis.*, manteia.*, energeia.*, aither.*, fs.*)
  by_category:
    db: 8
    polis: 1
    aisthesis: 3
    manteia: 1
    energeia: 3
    aither: 1
    fs: 1
    util: 2

# =============================================================================
# VALIDATION
# =============================================================================

validation:
  # Every oikos manifest requires_dynamis entry must map to a capability here
  manifest_validation: true

  # Every capability here must have implementation in HostContext
  implementation_validation: true

  # Signature match: WASM import params must match Rust method
  signature_validation: true
