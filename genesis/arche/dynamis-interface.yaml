  db.traverse:
    tier: 2
    category: db
    description: |
      Traverse the graph from a root entity following specified bond types.
      BFS traversal up to specified depth.
    rust_method: "HostContext::traverse"
    rust_file: "crates/kosmos/src/host.rs:413"
    params:
      - name: root_id
        type: string
        description: "Starting entity"
      - name: desmoi
        type: array<string>
        description: "Bond types to follow"
      - name: depth
        type: integer
        description: "Maximum traversal depth"
      - name: direction
        type: string
        enum: [outward, inward, both]
        description: "Direction to follow bonds"
      - name: eidos_filter
        type: string | null
        description: "Only return entities of this eidos"
    returns:
      type: array<json>
      description: "All reachable entities"
    side_effects: []
    wasm_import:
      name: db_traverse
      params:
        - { name: root_ptr, type: i32 }
        - { name: root_len, type: i32 }
        - { name: desmoi_ptr, type: i32, description: "JSON array of strings" }
