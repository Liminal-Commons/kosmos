# Dynamis Interface Specification
# V9.1 Deliverable — The contract between WASM and Rust
#
# This file defines every capability that the chora substrate provides
# to WASM modules. WASM stoicheia call these as host imports.
#
# Traces to: host.rs (HostContext implementation)
# Authorized by: expression/genesis-root

version: "9.0.0"
generated: "2026-01-22"

# Interface module name for WASM imports
# All capabilities are imported as: (import "dynamis" "capability_name" ...)
module: dynamis

# =============================================================================
# PROVENANCE REQUIREMENTS
# Constitutional constraint from KOSMOGONIA: "Authenticity = Provenance"
# =============================================================================

provenance:
  description: |
    Every entity must trace back to signed genesis through composition chains.
    This is a constitutional requirement, not a convention.

    The dynamis bridge enforces this by:
    1. Requiring `composed_from` on all entity creation calls
    2. Verifying the referenced definition exists
    3. Including provenance in created entity metadata

    There is no path to create entities without provenance.

  required_for:
    - db.arise    # Must specify composed_from

  verification:
    - "Definition exists: composed_from reference resolves"
    - "Authorization: Caller module can use that definition"
    - "Chain validity: Definition traces to genesis"

  failure_modes:
    missing_composed_from: "Entity creation rejected"
    definition_not_found: "Entity creation rejected"
    unauthorized_caller: "Entity creation rejected"
    broken_chain: "Flagged in dokimasia validation"

# =============================================================================
# TIER 2: Database Operations (db.*)
# Local substrate access — the graph itself
# =============================================================================

capabilities:

  # ---------------------------------------------------------------------------
  # Entity Operations
  # ---------------------------------------------------------------------------

  db.arise:
    tier: 2
    category: db
    description: |
      Create a new entity in the kosmos.
      If entity with same ID exists, updates it and increments version.

      PROVENANCE: The composed_from parameter is REQUIRED and enforced.
      Every entity must trace to genesis through its composed_from chain.
    rust_method: "HostContext::arise_entity"
    rust_file: "crates/kosmos/src/host.rs:160"
    params:
      - name: eidos
        type: string
        description: "Entity type (e.g., 'persona', 'theoria')"
      - name: id
        type: string
        description: "Unique entity identifier"
      - name: data
        type: json
        description: "Entity data as JSON object"
      - name: composed_from
        type: string
        required: true
        description: |
          Definition ID this entity is composed from.
          REQUIRED — the bridge will reject calls without valid composed_from.
          Must reference an existing definition that traces to genesis.
    returns:
      type: json
      description: "Created entity with id, eidos, data, version, composed_from"
    side_effects:
      - "Writes to entities table"
      - "Increments version if entity exists"
      - "Validates composed_from reference exists and traces to genesis"
    wasm_import:
      name: db_arise
      params:
        - { name: eidos_ptr, type: i32, description: "Pointer to eidos string" }
        - { name: eidos_len, type: i32, description: "Length of eidos string" }
        - { name: id_ptr, type: i32, description: "Pointer to id string" }
        - { name: id_len, type: i32, description: "Length of id string" }
        - { name: data_ptr, type: i32, description: "Pointer to JSON data" }
        - { name: data_len, type: i32, description: "Length of JSON data" }
        - { name: composed_from_ptr, type: i32, description: "Pointer to composed_from string (REQUIRED)" }
        - { name: composed_from_len, type: i32, description: "Length of composed_from string" }
      results:
        - { type: i32, description: "Pointer to result JSON" }
        - { type: i32, description: "Length of result JSON" }

  db.find:
    tier: 2
    category: db
    description: |
      Find an entity by its ID.
      Returns null if entity does not exist.
    rust_method: "HostContext::find_entity"
    rust_file: "crates/kosmos/src/host.rs:179"
    params:
      - name: id
        type: string
        description: "Entity identifier to find"
    returns:
      type: json | null
      description: "Found entity or null"
    side_effects: []
    wasm_import:
      name: db_find
      params:
        - { name: id_ptr, type: i32 }
        - { name: id_len, type: i32 }
      results:
        - { type: i32, description: "Pointer to result JSON (0 if not found)" }
        - { type: i32, description: "Length of result JSON (0 if not found)" }

  db.gather:
    tier: 2
    category: db
    description: |
      Gather entities by eidos type.
      If dwelling context provided, filters by visibility.
    rust_method: "HostContext::gather_entities"
    rust_file: "crates/kosmos/src/host.rs:211"
    params:
      - name: eidos
        type: string | null
        description: "Filter by eidos (use '*' or null for all)"
      - name: limit
        type: integer | null
        description: "Maximum entities to return (default 100)"
    returns:
      type: array<json>
      description: "Array of matching entities"
    side_effects: []
    wasm_import:
      name: db_gather
      params:
        - { name: eidos_ptr, type: i32, description: "Pointer to eidos (0 for wildcard)" }
        - { name: eidos_len, type: i32 }
        - { name: limit, type: i32, description: "Max results (0 for default)" }
      results:
        - { type: i32, description: "Pointer to result JSON array" }
        - { type: i32, description: "Length of result" }

  db.dissolve:
    tier: 2
    category: db
    description: |
      Dissolve (delete) an entity and all its bonds.
    rust_method: "HostContext::dissolve_entity"
    rust_file: "crates/kosmos/src/host.rs:275"
    params:
      - name: id
        type: string
        description: "Entity identifier to dissolve"
    returns:
      type: void
    side_effects:
      - "Deletes from entities table"
      - "Deletes all bonds involving this entity"
    wasm_import:
      name: db_dissolve
      params:
        - { name: id_ptr, type: i32 }
        - { name: id_len, type: i32 }
      results:
        - { type: i32, description: "0 on success, error code otherwise" }

  db.update:
    tier: 2
    category: db
    description: |
      Update an entity's data.
      Increments version number.
    rust_method: "HostContext::update_entity"
    rust_file: "crates/kosmos/src/host.rs:287"
    params:
      - name: id
        type: string
        description: "Entity identifier to update"
      - name: data
        type: json
        description: "New entity data"
    returns:
      type: json
      description: "Updated entity"
    side_effects:
      - "Updates entities table"
      - "Increments version"
    wasm_import:
      name: db_update
      params:
        - { name: id_ptr, type: i32 }
        - { name: id_len, type: i32 }
        - { name: data_ptr, type: i32 }
        - { name: data_len, type: i32 }
      results:
        - { type: i32 }
        - { type: i32 }

  # ---------------------------------------------------------------------------
  # Bond Operations
  # ---------------------------------------------------------------------------

  db.bind:
    tier: 2
    category: db
    description: |
      Create a bond between two entities.
      Replaces existing bond with same from/to/desmos.
    rust_method: "HostContext::create_bond"
    rust_file: "crates/kosmos/src/host.rs:307"
    params:
      - name: from_id
        type: string
        description: "Source entity ID"
      - name: desmos
        type: string
        description: "Bond type"
      - name: to_id
        type: string
        description: "Target entity ID"
      - name: data
        type: json | null
        description: "Optional bond data"
    returns:
      type: json
      description: "Created bond with id, from_id, to_id, desmos, data"
    side_effects:
      - "Writes to bonds table"
    wasm_import:
      name: db_bind
      params:
        - { name: from_ptr, type: i32 }
        - { name: from_len, type: i32 }
        - { name: desmos_ptr, type: i32 }
        - { name: desmos_len, type: i32 }
        - { name: to_ptr, type: i32 }
        - { name: to_len, type: i32 }
        - { name: data_ptr, type: i32, description: "0 if no data" }
        - { name: data_len, type: i32 }
      results:
        - { type: i32 }
        - { type: i32 }

  db.trace:
    tier: 2
    category: db
    description: |
      Trace bonds from/to an entity.
      Can filter by desmos type.
    rust_method: "HostContext::trace_bonds"
    rust_file: "crates/kosmos/src/host.rs:334"
