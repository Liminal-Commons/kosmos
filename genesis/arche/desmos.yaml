# Arche: Desmos Definitions
# The kinds of bonds that can exist between entities.
#
# Every bond has a desmos (type). The desmos determines meaning.
# Bonds carry encrypted traversal keys — reachability is cryptographic.

# =============================================================================
# COMPOSITION DESMOI — How things are made
# =============================================================================

- id: composed-from
  description: |
    Provenance bond. Every composed entity points to its definition.
    This is the primary chain for authenticity verification.
  from_eidos: [any]
  to_eidos: [typos, genesis]
  cardinality: many-to-one
  required: true  # Every entity MUST have this bond

- id: authorized-by
  description: |
    Authorization bond. Points to the phasis that
    authorized this entity's creation.
  from_eidos: [any]
  to_eidos: [phasis]
  cardinality: many-to-one

- id: belongs-to
  description: |
    Containment within a topos.
  from_eidos: [praxis, typos, eidos]
  to_eidos: [topos]
  cardinality: many-to-one

- id: sources-content-from
  description: |
    Content sourcing. A topos or manifest sources content from content-roots.
    This makes "where content comes from" traversable, not implicit.

    Bootstrap queries this bond to discover content paths instead of
    hardcoding directory conventions.
  from_eidos: [topos-manifest, topos]
  to_eidos: [content-root]
  cardinality: many-to-many

- id: sourced-from
  description: |
    Content origin. An entity was loaded from this content-root.
    Inverse of sources-content-from, applied to individual entities.

    Enables answering: "Where did this entity come from?"
  from_eidos: [any]
  to_eidos: [content-root]
  cardinality: many-to-one

# =============================================================================
# TOPOS DESMOI — How capability domains organize
# =============================================================================

- id: manifest-for
  description: |
    Links topos-manifest to its topos. Each topos has exactly one manifest
    that declares what it requires and provides.
  from_eidos: [topos-manifest]
  to_eidos: [topos]
  cardinality: many-to-one

- id: provides-affordance
  description: |
    A topos provides an affordance or attainment. This exposes capabilities
    that other topoi can require.

    Affordances are what a topos CAN DO (praxeis, stoicheia).
    Attainments are what a topos HAS ACHIEVED (tier access, permissions).
  from_eidos: [topos]
  to_eidos: [attainment, affordance]
  cardinality: many-to-many

- id: requires-attainment
  description: |
    Declares that something requires an attainment to be invoked.

    For topos: Required attainments must be available in the dwelling context.
    For stoicheion: The interpreter queries this bond before executing tier 3 steps.
    For praxis: Required attainments must be held by the invoking parousia.

    This enables graph-queryable permission checking rather than hardcoded gating.
  from_eidos: [topos, stoicheion, praxis, affordance]
  to_eidos: [attainment]
  cardinality: many-to-many

- id: grants-praxis
  description: |
    An attainment grants permission to invoke this praxis.
    The inverse perspective of requires-attainment.

    Traversable: attainment → grants-praxis → praxis reveals
    all operations an attainment enables.

    Both grants-praxis and requires-attainment exist because each enables
    a different traversal direction through the authorization graph.
  from_eidos: [attainment]
  to_eidos: [praxis]
  cardinality: many-to-many

# =============================================================================
# SURFACE DESMOI — How capability contracts bind topoi
# =============================================================================

- id: provides-surface
  description: |
    A topos manifest provides this surface contract. Created during bootstrap
    from surfaces_provided declarations in manifest.yaml.

    Traversing from a surface entity via provides-surface (reverse) reveals
    which topoi provide that capability.
  from_eidos: [topos-manifest]
  to_eidos: [surface]
  cardinality: many-to-many

- id: consumes-surface
  description: |
    A topos manifest requires this surface contract. Created during bootstrap
    from surfaces_consumed declarations in manifest.yaml.

    Bootstrap validates that every consumes-surface bond has a corresponding
    provides-surface bond from at least one other topos. Unsatisfied surface
    dependencies are errors, not warnings.
  from_eidos: [topos-manifest]
  to_eidos: [surface]
  cardinality: many-to-many

# =============================================================================
# DWELLING DESMOI — How presence is established
# =============================================================================

- id: exists-in
  description: |
    Existence bond. An entity exists in an oikos.
    This is the primary visibility mechanism — entities are visible
    to members of the oikos where they exist.
  from_eidos: [any]
  to_eidos: [oikos]
  cardinality: many-to-one

- id: dwells-in
  description: |
    Active dwelling. A parousia dwells in an oikos.
    Exclusively for parousia — entities use exists-in, not dwells-in.
  from_eidos: [parousia]
  to_eidos: [oikos]
  cardinality: many-to-one

- id: member-of
  description: |
    Membership. A prosopon belongs to an oikos.
    Membership enables dwelling.
  from_eidos: [prosopon]
  to_eidos: [oikos]
  cardinality: many-to-many

- id: instantiates
  description: |
    A parousia instantiates a prosopon for a session.
  from_eidos: [parousia]
  to_eidos: [prosopon]
  cardinality: many-to-one

# =============================================================================
# STRUCTURAL DESMOI — How oikoi and topoi relate
# =============================================================================

- id: hosts
  description: |
    The primordial bond. An oikos hosts topoi to gain capability.
    Prosopa dwell in oikoi. Praxeis inhabit topoi. The oikos hosts
    topoi to make capability available to its dwellers.
  from_eidos: [oikos]
  to_eidos: [topos]
  cardinality: many-to-many

- id: inhabits
  description: |
    A praxis inhabits a topos. This bond declares which capability
    domain a praxis belongs to.
  from_eidos: [praxis]
  to_eidos: [topos]
  cardinality: many-to-one

# =============================================================================
# UNDERSTANDING DESMOI — How knowledge relates
# =============================================================================

- id: yields
  description: |
    Contribution. A segment or conversation yielded this understanding.
  from_eidos: [segment, session]
  to_eidos: [theoria, insight]
  cardinality: many-to-many

- id: evidences
  description: |
    Supporting evidence. This entity provides evidence for that understanding.
  from_eidos: [segment, note]
  to_eidos: [theoria, insight]
  cardinality: many-to-many

- id: supports
  description: |
    Reinforcement. This theoria supports that theoria.
  from_eidos: [theoria]
  to_eidos: [theoria]
  cardinality: many-to-many

- id: contradicts
  description: |
    Tension. This theoria is in tension with that theoria.
  from_eidos: [theoria]
  to_eidos: [theoria]
  cardinality: many-to-many

- id: supersedes
  description: |
    Replacement. This theoria supersedes that theoria.
    The old theoria is not deleted but marked superseded.
  from_eidos: [theoria]
  to_eidos: [theoria]
  cardinality: many-to-one

# =============================================================================
# GOVERNANCE DESMOI — How oikoi organize
# =============================================================================

- id: adopts
  description: |
    An oikos adopts a principle as binding.
  from_eidos: [oikos]
  to_eidos: [principle]
  cardinality: many-to-many

- id: enacts
  description: |
    A pattern enacts a principle.
  from_eidos: [pattern]
  to_eidos: [principle]
  cardinality: many-to-one

- id: stewards
  description: |
    A prosopon stewards an oikos (governance role).
  from_eidos: [prosopon]
  to_eidos: [oikos]
  cardinality: many-to-many

# =============================================================================
# ATTENTION DESMOI — How focus flows
# =============================================================================

- id: notes
  description: |
    A note marks something as worthy of attention.
  from_eidos: [note]
  to_eidos: [any]
  cardinality: many-to-one

- id: surfaces
  description: |
    Notes combine to surface an insight.
  from_eidos: [note]
  to_eidos: [insight]
  cardinality: many-to-many

- id: crystallizes
  description: |
    An insight crystallizes into theoria.
  from_eidos: [insight]
  to_eidos: [theoria]
  cardinality: many-to-one

# =============================================================================
# OBSERVATION DESMOI — How observation state is tracked
# =============================================================================

- id: last-saw
  description: |
    Prosopon's observation cursor. Tracks the version at which a prosopon
    last observed an oikos. Used to compute "what's new" via delta query:

      entities in oikos WHERE version > cursor

    Changes aren't reified as entities. They're computed from the delta
    between cursor and current state. This implements the cache-driven
    pillar: no explicit change tracking, just version comparison.
  from_eidos: [prosopon]
  to_eidos: [oikos]
  cardinality: one-to-one
  data_schema:
    version:
      type: integer
      required: true
      description: The version number when prosopon last observed this oikos

# =============================================================================
# PROVENANCE DESMOI — How authenticity chains
# =============================================================================

- id: signed-by
  description: |
    Genesis is signed by attestors.
  from_eidos: [genesis]
  to_eidos: [signature]
  cardinality: one-to-many


# =============================================================================
# TRAVERSAL PROPERTIES
# =============================================================================

# All desmoi carry encrypted traversal keys.
# To traverse bond A→B via desmos D:
#   1. You must possess key K(A,D)
#   2. K(A,D) decrypts the traversal payload
#   3. Traversal grants visibility to B
#
# Dissolution of a bond invalidates its traversal key.
# All downstream paths through that bond are severed.
