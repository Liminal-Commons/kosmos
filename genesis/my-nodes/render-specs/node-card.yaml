# Node Card Render-Spec
# Card for a single infrastructure node.

entities:

  - eidos: render-spec
    id: render-spec/my-nodes-node-card
    data:
      name: my-nodes-node-card
      description: Card for a single infrastructure node.
      target_eidos: node
      variant: card
      layout:
        - widget: card
          props:
            variant: bordered
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
              children:
                - widget: status-indicator
                  props:
                    status: "{status}"
                - widget: stack
                  props:
                    gap: xs
                  children:
                    - widget: text
                      props:
                        content: "{name}"
                        variant: emphasis
                    - widget: text
                      props:
                        content: "{platform} · {kind}"
                        variant: caption
                    - widget: text
                      when: "address"
                      props:
                        content: "{address}"
                        variant: caption
