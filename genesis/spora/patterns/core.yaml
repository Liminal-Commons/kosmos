# Core Patterns — Seeds from V7
# Enacted commitments from theoria and principles.
# Patterns are HOW — the forms through which principles live.

patterns:

  # ===========================================================================
  # COMPOSITION PATTERNS
  # ===========================================================================

  - id: arise-through-composition
    principle: composition-is-fundamental
    pattern: |
      To create an entity: find or create its typos,
      then call compose with inputs. The composition IS the arise.
      Never raw-arise. Compose.
    status: enacted

  - id: compose-first-ask-second
    principle: composition-is-fundamental
    pattern: |
      When uncertain, produce an artifact that embodies the uncertainty
      rather than asking 'should I?'. Compose a draft. The draft IS
      the question, rendered into form.
    status: enacted

  - id: prefer-composition
    principle: composition-is-fundamental
    pattern: |
      Before adding a substrate capability, ask if it can be composed
      from existing ones. One capability multiplies through composition —
      one substrate stoicheion enables many praxeis.
    status: enacted

  - id: gather-then-compose
    principle: composition-is-fundamental
    pattern: |
      When invoking praxis, treat output as context for composition,
      not as final result. Praxis gathers, queries, traverses.
      Composition assembles. The artifact is what matters.
    status: enacted

  # ===========================================================================
  # UNDERSTANDING PATTERNS
  # ===========================================================================

  - id: the-ladder
    principle: compose-from-understanding
    pattern: |
      Theoria grounds principle grounds pattern.
      Understanding before commitment before enactment.
      Never enact a pattern without the principle it serves.
      Never adopt a principle without the theoria that grounds it.
    status: enacted

  - id: crystallize-then-emit
    principle: compose-from-understanding
    pattern: |
      Don't write directly; crystallize theoria first, then compose from them.
      Understanding stabilizes before expression flows.
    status: enacted

  - id: segment-before-crystallize
    principle: compose-from-understanding
    pattern: |
      Never crystallize theoria without segments to ground it.
      Theoria emerges FROM conversation, FROM evidence.
      The yields bond traces understanding to its source.
    status: enacted

  - id: check-kosmos-first
    principle: compose-from-understanding
    pattern: |
      Before generating, query what already exists.
      The kosmos has memory. Use it. Ingest before emit.
    status: enacted

  # ===========================================================================
  # SECURITY PATTERNS
  # ===========================================================================

  - id: access-through-bond
    principle: visibility-is-reachability
    pattern: |
      To share, bind; to revoke, loose. No separate permission layer.
      Visibility equals reachability. The bond graph IS access control.
    status: enacted

  - id: self-circle-as-ground
    principle: visibility-is-reachability
    pattern: |
      Every persona has a self-circle that remains sovereign regardless
      of other participations. This is the ground from which all
      participation extends. The sovereign cannot be revoked.
    status: enacted

  - id: shared-circle-for-peership
    principle: visibility-is-reachability
    pattern: |
      To collaborate as equals, create or join a circle with peer
      stewardship. The shared circle IS the collaboration.
      No separate collaboration entity needed.
    status: enacted

  # ===========================================================================
  # IDENTITY PATTERNS
  # ===========================================================================

  - id: specified-id-formation
    principle: deterministic-identity
    pattern: |
      For specified entities: prefix/name or prefix/context-derived.
      The ID is constructible from meaning alone.
      Examples: eidos/persona, praxis/nous/crystallize-theoria.
    status: enacted

  - id: occurred-id-formation
    principle: deterministic-identity
    pattern: |
      For occurred entities: prefix-{{ uuid }} or prefix/{{ timestamp }}-{{ context }}.
      The ID is NOT constructible from meaning — it records when something happened.
      Examples: invocation-{{ uuid }}, session/{{ timestamp }}.
    status: enacted

  # ===========================================================================
  # LIFECYCLE PATTERNS
  # ===========================================================================

  - id: dissolve-dont-delete
    principle: endings-are-witnessed
    pattern: |
      Use dissolve-entity, not silent removal.
      Endings are witnessed. The kosmos remembers what was.
    status: enacted

  - id: intent-sense-reconcile
    principle: actuality-is-sensed
    pattern: |
      For eide with actuality:
      1. Entity data holds intent (desired state)
      2. sense_actuality queries substrate for actual state
      3. reconcile praxis compares and calls manifest/unmanifest to align
      The gap between intent and actuality is where action lives.
    status: enacted

  # ===========================================================================
  # BREATH PATTERNS
  # ===========================================================================

  - id: panarchic-breath
    principle: being-is-placed
    pattern: |
      Pause before acting to sense the layers. Four questions as breath:
      - What scale is this? (psyche / soma / oikos / polis / physis / kosmos)
      - What rhythm? (fast emergence or slow stabilization)
      - What's flowing? (revolt upward, remember downward)
      - What is sensed?
      The pause allows the klimax to be felt rather than thought.
    status: enacted

  - id: emergence-inquiry
    principle: compose-from-understanding
    pattern: |
      Before action, pause and ask: what wants to emerge?
      This is not planning (agent deciding) but inquiry (kosmos sensing
      into itself). The answer comes from the territory — what exists,
      what patterns are present, what is gestating.
    status: enacted

