# Soma Typos Definitions — Embodiment Composition Templates

- eidos: typos
  id: typos-def-notification
  data:
    name: notification
    description: |
      Compose a notification entity for body-schema awareness.

      Notifications are created by reflexes to signal events that
      require persona attention. They appear in the body-schema
      and can be marked as read.

      Required inputs:
      - type: Notification type (pragma_received, pragma_resolved, etc.)

      Optional inputs:
      - circle_id: Target circle for the notification
      - pragma_id: Related pragma ID
      - title: Notification title
      - priority: Priority level
      - resolution: Resolution text (for resolved pragmas)
    target_eidos: notification
    defaults:
      read: false
    computed:
      created_at: "{{ now() }}"
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/soma
