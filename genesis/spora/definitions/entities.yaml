# Deployment infrastructure typos (Phase 6)
- eidos: typos
  id: typos-def-deployment
  data:
    name: deployment
    description: |
      Compose a deployment entity for infrastructure management.
      Deployments track intent (desired state) and actuality (manifested instances).
    target_eidos: deployment
    defaults:
      desired_state: stopped
      actual_state: unknown
      actuality_mode: process

- eidos: typos
  id: typos-def-service-instance
  data:
    name: service-instance
    description: |
      Compose a service-instance entity representing running actuality.
      Created when deployments are manifested to infrastructure.
    target_eidos: service-instance
    defaults:
      status: starting

- eidos: typos
  id: typos-def-node
  data:
    name: node
    description: |
      Compose a node entity representing infrastructure.
      Nodes are physical or virtual machines that can host service instances.
    target_eidos: node
    defaults:
      kind: personal

