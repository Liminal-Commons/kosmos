# -----------------------------------------------------------------------------
# Constitutional Typos — How to compose the archai themselves
# These enable oikos development: composing eide, praxeis, desmoi, and oikoi.
# -----------------------------------------------------------------------------

- eidos: typos
  id: typos-def-eidos
  data:
    name: eidos
    description: |
      Compose an eidos (entity type definition).

      Eide define what kind of things can exist. When developing an oikos,
      compose eide for your domain's entity types.
    target_eidos: eidos
    defaults:
      constitutional: false

- eidos: typos
  id: typos-def-praxis
  data:
    name: praxis
    description: |
      Compose a praxis (action definition).

      Praxeis are executable sequences of stoicheia. When developing an oikos,
      compose praxeis for your domain's operations.
    target_eidos: praxis
    defaults:
      visible: true
      tier: 2

- eidos: typos
  id: typos-def-desmos
  data:
    name: desmos
    description: |
      Compose a desmos (bond type definition).

      Desmoi define relationships between entities. When developing an oikos,
      compose desmoi for your domain's relationships.
    target_eidos: desmos
    defaults:
      cardinality: many-to-many

- eidos: typos
  id: typos-def-oikos
  data:
    name: oikos
    description: |
      Compose an oikos (domain package).

      Oikoi are containers for eide, praxeis, and desmoi. Begin oikos
      development by composing an oikos entity, then add definitions to it.
    target_eidos: oikos
    defaults:
      status: composing
      version: "0.1.0"

