# Entity Composition Artifact Definitions
# ========================================
#
# Minimal artifact definitions for entity composition.
# These enable praxeis to use `compose` instead of `arise` (CE4 migration).
#
# Each definition just specifies target_eidos - the compose_entity function
# automatically passes inputs for eidos-defined fields (CE4.2a enhancement).
#
# Usage:
#   - step: compose
#     typos_id: "typos-def-circle"
#     inputs: { name: "My Circle", ... }
#     bind_to: result

entities:

# =============================================================================
# Politeia (governance)
# =============================================================================

- eidos: typos
  id: typos-def-circle
  data:
    name: circle
    description: "Compose a circle entity"
    target_eidos: circle

