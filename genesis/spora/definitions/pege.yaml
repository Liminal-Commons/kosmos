# Pege Artifact Definitions
#
# Constituative artifacts for document composition.
# Documents are composed from these building blocks using caller patterns.
#
# Levels:
#   0 - Primitives (text, heading, code)
#   1 - Structural (table, list, section)
#   2 - Semantic (field-table, param-table, bond-section)
#   3 - Documents (eidos-reference, stoicheion-reference)

entities:

# =============================================================================
# Level 0: Primitives
# =============================================================================

- eidos: typos
  id: typos-def-file-header
  data:
    name: file-header
    description: |
      Composed header for emitted files instructing agents not to edit directly.
      Inserted at the top of any emitted file (YAML, Rust, TypeScript, WAT, etc.)

      The comment style is computed based on file_type.
      Source path and emitting praxis provide provenance.
    slots:
      - name: comment_style
        pattern: computed
        expression: |
          switch $file_type:
            "yaml" -> "#"
            "rust" -> "//"
            "typescript" -> "//"
            "wat" -> ";;"
            "markdown" -> "<!--"
            _ -> "#"
      - name: comment_end
        pattern: computed
        expression: |
          switch $file_type:
            "markdown" -> " -->"
            _ -> ""
      - name: lines
        pattern: literal
    template: |
      {{ comment_style }} =============================================================================
      {{ comment_style }} GENERATED FILE - DO NOT EDIT DIRECTLY{{ comment_end }}
      {{ comment_style }} =============================================================================
      {{ comment_style }} Emitted by: {{ emitting_praxis }}
      {{ comment_style }} Source: {{ source_path }}
      {{ comment_style }}{{ comment_end }}
      {{ comment_style }} To modify:{{ comment_end }}
      {{ comment_style }}   1. Edit the source in genesis/{{ comment_end }}
      {{ comment_style }}   2. Re-run emit-genesis{{ comment_end }}
      {{ comment_style }}{{ comment_end }}
      {{ comment_style }} See: genesis/EXTENDING.md{{ comment_end }}
      {{ comment_style }} =============================================================================
    defaults:
      file_type: "yaml"
      emitting_praxis: "demiurge/emit-genesis"
      source_path: "genesis/"

- eidos: typos
  id: typos-def-text-block
  data:
    name: text-block
    description: |
      A block of text or markdown content.
      Pattern: literal or queried
    template: "{{ content }}"
    defaults:
      content: ""

- eidos: typos
  id: typos-def-heading
  data:
    name: heading
    description: |
      A markdown heading with configurable level.
      Pattern: literal
    template: "{{ '#' | repeat(level) }} {{ text }}"
    defaults:
      level: 1
      text: "Untitled"

- eidos: typos
  id: typos-def-code-block
  data:
    name: code-block
    description: |
      A fenced code block with language annotation.
      Pattern: literal or queried
    template: |
      ```{{ language }}
      {{ code }}
      ```
    defaults:
      language: ""
      code: ""

# =============================================================================
# Level 1: Structural
# =============================================================================

- eidos: typos
  id: typos-def-table
  data:
    name: table
    description: |
      A markdown table from rows and columns.
      Pattern: queried

      Input: { columns: ["Name", "Type"], rows: [["foo", "string"], ["bar", "number"]] }
      Output: Markdown table
    # Table rendering requires step logic, not just template
    # The compositor will need to handle this via map/reduce
    target_eidos: null
    slots:
      - name: header
        pattern: computed
        source: columns
      - name: rows
        pattern: computed
        source: rows
    template: |
      | {{ columns | join(' | ') }} |
      | {{ columns | map('---') | join(' | ') }} |
      {{ rows | map_row | join('\n') }}
    defaults:
      columns: []
      rows: []

- eidos: typos
  id: typos-def-list
  data:
    name: list
    description: |
      A markdown list (bulleted or numbered).
      Pattern: queried
    template: "{{ items | map_list(style) | join('\n') }}"
    defaults:
      style: "bullet"  # or "number"
      items: []

- eidos: typos
  id: typos-def-section
  data:
    name: section
    description: |
      A section with heading and content blocks.
      Pattern: composed
    slots:
      - name: heading
        pattern: literal
        definition: typos-def-heading
      - name: content
        pattern: composed
        # Content is an array of blocks
    template: |
      {{ heading }}

      {{ content | join('\n\n') }}

- eidos: typos
  id: typos-def-link-list
  data:
    name: link-list
    description: |
      A list of links to entities.
      Pattern: queried
    template: "{{ links | map_link | join('\n') }}"
    defaults:
      links: []  # Array of { text, href } or entity IDs

# =============================================================================
# Level 2: Semantic (Domain-Specific Building Blocks)
# =============================================================================

- eidos: typos
  id: typos-def-field-table
  data:
    name: field-table
    description: |
      Renders an eidos's fields as a markdown table.
      Pattern: queried

      Input: { fields: { name: { type: string, required: true }, ... } }
      Output: | Field | Type | Required | Description |
    slots:
      - name: title
        pattern: literal
        default: "## Fields"
      - name: table
        pattern: queried
        # Transform fields object to table rows
    template: |
      {{ title }}

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      {{ field_rows }}
    defaults:
      fields: {}
      title: "## Fields"

- eidos: typos
  id: typos-def-param-table
  data:
    name: param-table
    description: |
      Renders a praxis's params as a markdown table.
      Pattern: queried
    slots:
      - name: title
        pattern: literal
        default: "## Parameters"
      - name: table
        pattern: queried
    template: |
      {{ title }}

      | Parameter | Type | Required | Description |
      |-----------|------|----------|-------------|
      {{ param_rows }}
    defaults:
      params: []
      title: "## Parameters"

- eidos: typos
  id: typos-def-bond-section
  data:
    name: bond-section
    description: |
      Renders bonds from/to an entity as a section.
      Pattern: queried

      Queries trace stoicheion to find bonds, then renders as lists.
    slots:
      - name: title
        pattern: literal
        default: "## Relationships"
      - name: outgoing
        pattern: queried
        # trace from entity
      - name: incoming
        pattern: queried
        # trace to entity
    template: |
      {{ title }}

      {{ outgoing_content }}

      {{ incoming_content }}

- eidos: typos
  id: typos-def-example-block
  data:
    name: example-block
    description: |
      A usage example with description and code.
      Pattern: literal or generated
    template: |
      ### {{ title }}

      {{ description }}

      ```{{ language }}
      {{ code }}
      ```
    defaults:
      title: "Example"
      description: ""
      language: "yaml"
      code: ""

# =============================================================================
# Level 3: Document Definitions
# =============================================================================

- eidos: typos
  id: typos-def-eidos-reference
  data:
    name: eidos-reference
    description: |
      A complete reference document for an eidos.
      Pattern: composed (from Level 0-2 artifacts)

      Slots:
        - title: literal
        - description: queried from entity
        - fields: composed (field-table)
        - actuality: conditional (if entity has actuality)
        - bonds: composed (bond-section)
        - examples: generated (from related praxeis)
        - footer: literal
    slots:
      - name: title
        pattern: literal
        template: "# {{ entity.id }}"

      - name: description
        pattern: queried
        source: entity.data.description

      - name: fields_section
        pattern: composed
        definition: typos-def-field-table
        inputs:
          fields: entity.data.fields
        when: entity.data.fields

      - name: actuality_section
        pattern: literal
        template: |
          ## Actuality

          This eidos has actuality mode `{{ entity.data.actuality.mode }}`.

          | Operation | Description |
          |-----------|-------------|
          | manifest | {{ entity.data.actuality.manifest }} |
          | sense | {{ entity.data.actuality.sense }} |
          | unmanifest | {{ entity.data.actuality.unmanifest }} |
        when: entity.data.actuality

      - name: bonds_section
        pattern: composed
        definition: typos-def-bond-section
        inputs:
          entity_id: entity.id

      - name: usage_section
        pattern: generated
        prompt: |
          Given this eidos definition, write 2-3 sentences describing when and how to use it:

          ID: {{ entity.id }}
          Description: {{ entity.data.description }}
          Fields: {{ entity.data.fields | yaml }}

          Be concise. Write for developers familiar with the kosmos.
        authorized_by: caller
        auto_approve: true

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ description }}

      {{ fields_section }}

      {{ actuality_section }}

      {{ bonds_section }}

      {{ usage_section }}

      {{ footer }}

- eidos: typos
  id: typos-def-stoicheion-reference
  data:
    name: stoicheion-reference
    description: |
      A complete reference document for a stoicheion.
    slots:
      - name: title
        pattern: literal
        template: "# {{ entity.id }}"

      - name: description
        pattern: queried
        source: entity.data.description

      - name: tier_badge
        pattern: literal
        template: "**Tier {{ entity.data.tier }}** — {{ tier_description }}"

      - name: params_section
        pattern: composed
        definition: typos-def-param-table
        inputs:
          params: entity.data.params
        when: entity.data.params

      - name: effects_section
        pattern: literal
        template: |
          ## Effects

          {{ entity.data.effects | join(', ') }}
        when: entity.data.effects

      - name: example_section
        pattern: generated
        prompt: |
          Write a short YAML example showing how to use this stoicheion in a praxis step:

          ID: {{ entity.id }}
          Description: {{ entity.data.description }}
          Params: {{ entity.data.params | yaml }}

          Return only the YAML, no explanation.
        authorized_by: caller
        auto_approve: true

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ tier_badge }}

      {{ description }}

      {{ params_section }}

      {{ effects_section }}

      ## Example

      ```yaml
      {{ example_section }}
      ```

      {{ footer }}

- eidos: typos
  id: typos-def-desmos-reference
  data:
    name: desmos-reference
    description: |
      A complete reference document for a desmos (bond type).
    slots:
      - name: title
        pattern: literal
        template: "# {{ entity.id }}"

      - name: description
        pattern: queried
        source: entity.data.description

      - name: signature
        pattern: literal
        template: |
          ## Signature

          **From**: {{ entity.data.from }}
          **To**: {{ entity.data.to }}

      - name: usage_section
        pattern: generated
        prompt: |
          Describe when this bond type is used:

          ID: {{ entity.id }}
          Description: {{ entity.data.description }}
          From: {{ entity.data.from }}
          To: {{ entity.data.to }}

          Be concise, 2-3 sentences.
        authorized_by: caller
        auto_approve: true

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ description }}

      {{ signature }}

      {{ usage_section }}

      {{ footer }}

- eidos: typos
  id: typos-def-praxis-reference
  data:
    name: praxis-reference
    description: |
      A complete reference document for a praxis.
    slots:
      - name: title
        pattern: literal
        template: "# {{ entity.data.oikos }}/{{ entity.data.name }}"

      - name: description
        pattern: queried
        source: entity.data.description

      - name: oikos_badge
        pattern: literal
        template: "**Oikos**: {{ entity.data.oikos }}"

      - name: params_section
        pattern: composed
        definition: typos-def-param-table
        inputs:
          params: entity.data.params
        when: entity.data.params

      - name: returns_section
        pattern: literal
        template: |
          ## Returns

          {{ return_description }}
        when: return_description

      - name: example_section
        pattern: generated
        prompt: |
          Write a short example showing how to call this praxis via MCP tool:

          Name: {{ entity.data.oikos }}_{{ entity.data.name }}
          Params: {{ entity.data.params | yaml }}

          Show the tool call with example parameter values.
        authorized_by: caller
        auto_approve: true

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ oikos_badge }}

      {{ description }}

      {{ params_section }}

      {{ returns_section }}

      ## Example

      {{ example_section }}

      {{ footer }}

# =============================================================================
# Index Definitions
# =============================================================================

- eidos: typos
  id: typos-def-eidos-index
  data:
    name: eidos-index
    description: |
      An index of all eide in the kosmos.
    slots:
      - name: title
        pattern: literal
        template: "# Eide Reference"

      - name: intro
        pattern: literal
        template: |
          This document lists all entity types (eide) in the kosmos.

          *{{ count }} eide*

      - name: table
        pattern: queried
        # Gather all eide, render as table

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ intro }}

      | Eidos | Description |
      |-------|-------------|
      {{ table_rows }}

      {{ footer }}

- eidos: typos
  id: typos-def-oikos-index
  data:
    name: oikos-index
    description: |
      An index of praxeis organized by oikos.
    slots:
      - name: title
        pattern: literal
        template: "# Praxeis by Oikos"

      - name: intro
        pattern: literal
        template: |
          This document lists all praxeis organized by their oikos (domain).

          *{{ count }} praxeis across {{ oikos_count }} oikoi*

      - name: sections
        pattern: composed
        # One section per oikos with its praxeis

      - name: footer
        pattern: literal
        template: |
          ---
          *Emitted from kosmos — {{ timestamp }}*

    template: |
      {{ title }}

      {{ intro }}

      {{ sections }}

      {{ footer }}

# =============================================================================
# Single-Stream Genesis Definitions
# =============================================================================
# These definitions enable full-circle genesis: emit → bootstrap → emit = identical.
# The emitted format IS the source format. No translation.

- eidos: typos
  id: typos-def-genesis-manifest
  data:
    name: genesis-manifest
    description: |
      The single-stream genesis manifest — the single source of what to load.

      This definition composes the manifest.yaml that describes:
      - Constitutional root (genesis expression with signature)
      - Entity file locations (one per eidos type)
      - Bond file location
      - Content hash for verification

      Format: single-stream-v1

      Usage:
        compose typos_id=typos-def-genesis-manifest
          inputs:
            version: "0.1.0"
            genesis_root: { ... }
            entity_files: [...]
            bond_files: [...]
    target_eidos: artifact
    slots:
      - name: id
        pattern: literal
        default: "genesis"
      - name: version
        pattern: input
        required: true
        description: "Genesis version (e.g., '0.1.0')"
      - name: format
        pattern: literal
        default: "single-stream-v1"
      - name: genesis_root
        pattern: input
        required: true
        description: |
          The constitutional root expression with signature:
          { id, content, signature, public_key, algorithm }
      - name: entity_files
        pattern: queried
        description: |
          Array of entity file paths, queried from all eidos types in kosmos.
          Each distinct eidos type gets its own file: entities/{eidos}.yaml
      - name: bond_files
        pattern: literal
        default:
          - "bonds/bonds.yaml"
      - name: content_hash
        pattern: input
        required: false
        default: "pending"
        description: "BLAKE3 hash of all content for verification (computed by praxis)"
    template: |
      # Single-Stream Genesis Manifest
      # Format: {{ format }}
      # Generated: {{ timestamp }}

      id: {{ id }}
      version: {{ version }}
      format: {{ format }}

      # Constitutional root — all provenance chains trace here
      genesis_root:
        id: {{ genesis_root.id }}
        content: {{ genesis_root.content | quote }}
        signature: {{ genesis_root.signature }}
        public_key: {{ genesis_root.public_key }}
        algorithm: {{ genesis_root.algorithm }}

      # Entity files (one per eidos type)
      entities:
      {{ entity_files | yaml_list }}

      # Bond files
      bonds:
      {{ bond_files | yaml_list }}

      # Verification hash
      content_hash: blake3:{{ content_hash }}
    defaults:
      version: "0.1.0"

- eidos: typos
  id: typos-def-entity-file
  data:
    name: entity-file
    description: |
      An entity file containing all entities of a single eidos type.

      This definition composes files like entities/praxis.yaml, entities/eidos.yaml.
      Each file contains all entities of that type, gathered from kosmos.

      Format:
        eidos: <type>
        count: <n>
        content_hash: blake3:<hash>
        entities:
          - id: ...
            data: ...

      Usage:
        compose typos_id=typos-def-entity-file
          inputs:
            eidos: "praxis"
    target_eidos: artifact
    slots:
      - name: eidos_type
        pattern: input
        required: true
        description: "The eidos type this file contains (e.g., 'praxis', 'eidos', 'desmos')"
      - name: entities
        pattern: queried
        gather:
          eidos: "$eidos_type"
        description: "All entities of this eidos type"
      - name: count
        pattern: computed
        expression: "len($entities)"
      - name: content_hash
        pattern: computed
        expression: "blake3($entities)"
    template: |
      # Entity file: {{ eidos_type }}
      # Single-stream genesis format
      # Generated: {{ timestamp }}

      eidos: {{ eidos_type }}
      count: {{ count }}
      content_hash: blake3:{{ content_hash }}

      entities:
      {{ entities | yaml_entity_list }}
    defaults: {}

- eidos: typos
  id: typos-def-bond-file
  data:
    name: bond-file
    description: |
      A bond file containing all bonds in the kosmos.

      This definition composes bonds/bonds.yaml containing all relationships.
      Bonds are separate from entities — relationships are their own concern.

      Format:
        count: <n>
        content_hash: blake3:<hash>
        bonds:
          - from: <entity_id>
            to: <entity_id>
            desmos: <bond_type>
            data: <optional>

      Usage:
        compose typos_id=typos-def-bond-file
    target_eidos: artifact
    slots:
      - name: bonds
        pattern: queried
        gather:
          eidos: "bond"
        description: "All bonds in the kosmos"
      - name: count
        pattern: computed
        expression: "len($bonds)"
      - name: content_hash
        pattern: computed
        expression: "blake3($bonds)"
    template: |
      # Bond file: all bonds
      # Single-stream genesis format
      # Generated: {{ timestamp }}

      count: {{ count }}
      content_hash: blake3:{{ content_hash }}

      bonds:
      {{ bonds | yaml_bond_list }}
    defaults: {}
