# core.yaml
# Core artifact definitions for common composition targets
#
# These definitions enable composition of the most common entity types.
# Each definition specifies the target eidos and any automatic bonds.

entities:

# =============================================================================
# UNDERSTANDING OPERATIONS (NOUS)
# =============================================================================

- eidos: typos
  id: typos-def-theoria
  data:
    name: theoria
    description: |
      Crystallize understanding into theoria.

      Theoria is provisional until confirmed. It belongs to a domain
      and crystallizes in a circle.
    target_eidos: theoria
    defaults:
      status: provisional
    bonds:
      # Theoria belongs to nous oikos
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous
      # Theoria crystallizes in dwelling circle (if available)
      - desmos: crystallized-in
        from_self: true
        to_context: _circle
        optional: true

- eidos: typos
  id: typos-def-inquiry
  data:
    name: inquiry
    description: |
      Open a new inquiry.

      Inquiries are open questions that drive understanding forward.
    target_eidos: inquiry
    defaults:
      status: open
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous

- eidos: typos
  id: typos-def-synthesis
  data:
    name: synthesis
    description: |
      Synthesize multiple theoria into higher understanding.
    target_eidos: synthesis
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous

- eidos: typos
  id: typos-def-journey
  data:
    name: journey
    description: |
      Begin a journey toward a desire.

      Journeys are teleological containers - movement toward a telos.
    target_eidos: journey
    defaults:
      status: potential
      current_waypoint: 0
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous

- eidos: typos
  id: typos-def-waypoint
  data:
    name: waypoint
    description: |
      Add a waypoint to a journey.
    target_eidos: waypoint
    defaults:
      status: pending

- eidos: typos
  id: typos-def-invocation-pattern
  data:
    name: invocation-pattern
    description: |
      Create an invocation pattern for composed inference.

      Patterns specify how to gather context, compose prompts,
      and invoke inference. They are templates for activation.
    target_eidos: invocation-pattern
    defaults:
      temperature: 0.7
      max_tokens: 4096
      framing: cosmos
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous

- eidos: typos
  id: typos-def-invocation
  data:
    name: invocation
    description: |
      Record an invocation of chora-nous.

      Invocations are audit records of inference activations,
      capturing context, prompts, yields, and actions.
    target_eidos: invocation
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/nous
      - desmos: crystallized-in
        from_self: true
        to_context: _circle
        optional: true

# =============================================================================
# GOVERNANCE (POLIS)
# =============================================================================

- eidos: typos
  id: typos-def-principle
  data:
    name: principle
    description: |
      Adopt a principle from theoria.

      Principles are commitments that shape action.
    target_eidos: principle
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/polis

- eidos: typos
  id: typos-def-pattern
  data:
    name: pattern
    description: |
      Enact a principle as a pattern.

      Patterns are how principles live in practice.
    target_eidos: pattern
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/polis

- eidos: typos
  id: typos-def-circle
  data:
    name: circle
    description: |
      Create a new circle (trust boundary).
    target_eidos: circle
    defaults:
      kind: intimate

- eidos: typos
  id: typos-def-persona
  data:
    name: persona
    description: |
      Create a new persona (identity).
    target_eidos: persona

# =============================================================================
# INTIMATE DWELLING (OIKOS)
# =============================================================================

- eidos: typos
  id: typos-def-note
  data:
    name: note
    description: |
      Take a note - mark something as worthy of attention.
    target_eidos: note
    defaults:
      kind: observation
    bonds:
      - desmos: belongs-to
        from_self: true
        to_context: _circle
        optional: true
      - desmos: authored-by
        from_self: true
        to_context: _persona
        optional: true

- eidos: typos
  id: typos-def-insight
  data:
    name: insight
    description: |
      Surface an insight - emerging understanding not yet crystallized.
    target_eidos: insight
    bonds:
      - desmos: surfaced-in
        from_self: true
        to_context: _circle
        optional: true

- eidos: typos
  id: typos-def-session
  data:
    name: session
    description: |
      Open a session - a presence container.
    target_eidos: session
    defaults:
      status: active

- eidos: typos
  id: typos-def-conversation
  data:
    name: conversation
    description: |
      Open a conversation within a session.
    target_eidos: conversation
    defaults:
      status: active

# =============================================================================
# TEMPLATE COMPOSITIONS
# =============================================================================

- eidos: typos
  id: typos-def-greeting
  data:
    name: greeting
    description: |
      Simple greeting template for testing.
    template: "Hello, {{ $name }}! Welcome to the kosmos."
    defaults:
      name: friend

- eidos: typos
  id: typos-def-summary
  data:
    name: summary
    description: |
      Generate a summary from content.
    template: |
      # Summary: {{ $title }}

      {{ $content }}

      ---
      *Generated {{ $timestamp }}*
    defaults:
      title: Untitled
      timestamp: now

# =============================================================================
# GRAPH COMPOSITIONS (CODE GENERATION)
# =============================================================================

- eidos: typos
  id: typos-def-rust-struct
  data:
    name: rust-struct
    description: |
      Generate a Rust struct definition.
    slots:
      name:
        type: string
        required: true
        description: The struct name
      fields:
        type: array
        required: true
        description: "Array of {name, type} objects"
      derives:
        type: array
        required: false
        default: ["Debug", "Clone"]
        description: Derive macros
    output_type: text

- eidos: typos
  id: typos-def-yaml-entity
  data:
    name: yaml-entity
    description: |
      Generate a YAML entity definition.
    slots:
      eidos:
        type: string
        required: true
      id:
        type: string
        required: true
      data:
        type: object
        required: true
    output_type: object

# =============================================================================
# VALIDATION (DOKIMASIA)
# =============================================================================

- eidos: typos
  id: typos-def-validation-report
  data:
    name: validation-report
    description: |
      Compose an aggregated validation report across a dependency subgraph.

      Traverses from a root entity following depends-on, authorized-by,
      and composed-from bonds, gathering all validation results.
      This enables "bubbling up" validation status through the graph.

      The report includes:
      - Summary counts (passed, failed, pending)
      - List of failures with context
      - The provenance chain from root to genesis
      - All entities that were traversed
    target_eidos: artifact
    slots:
      root_id:
        type: string
        required: true
        description: Entity to start validation traversal from
      depth:
        type: number
        required: false
        default: 10
        description: Maximum traversal depth
      include_passed:
        type: boolean
        required: false
        default: false
        description: Include passed validations in results
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/dokimasia

# =============================================================================
# HYPOSTASIS (SUBSTRATE REPLICATION)
# =============================================================================

- eidos: typos
  id: typos-def-genesis-record
  data:
    name: genesis-record
    description: |
      Create a multi-signature genesis record.

      Genesis records use threshold cryptography (3-of-5) to establish
      constitutional authenticity. No single party can forge genesis.
    target_eidos: genesis-record
    defaults:
      threshold: 3
      verified: false
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/hypostasis

- eidos: typos
  id: typos-def-snapshot
  data:
    name: snapshot
    description: |
      Create a state snapshot for backup/recovery.

      Snapshots are phoreta bundles capturing the full state of a circle
      at a point in time, signed by the creating persona.
    target_eidos: artifact
    slots:
      circle_id:
        type: string
        required: true
        description: Circle to snapshot
      include_embeddings:
        type: boolean
        required: false
        default: false
        description: Whether to include embedding vectors
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: oikos/hypostasis

# =============================================================================
# DNS MANAGEMENT (THYRA PHASE 17.7)
# =============================================================================

- eidos: typos
  id: typos-def-dns-zone
  data:
    name: dns-zone
    description: |
      Create a managed DNS zone.

      Zones are sovereignty boundaries. A circle that manages a zone
      has authority over all records within it.
    target_eidos: dns-zone
    defaults:
      status: pending
      record_count: 0
    bonds:
      - desmos: manages-zone
        from_context: _circle
        to_self: true
        optional: true

- eidos: typos
  id: typos-def-dns-record
  data:
    name: dns-record
    description: |
      Create a DNS record with dual existence.

      The entity represents intent (what we want).
      Actuality represents provider state (what exists).
      The reconciler aligns them.
    target_eidos: dns-record
    defaults:
      ttl: 1
      proxied: true
      desired_state: present
      actual_state: unknown
    bonds:
      - desmos: in-zone
        from_self: true
        to_slot: zone_id
        required: true

- eidos: typos
  id: typos-def-dns-provider-binding
  data:
    name: dns-provider-binding
    description: |
      Bind a zone to its DNS provider with credentials.

      Credentials are referenced via secret:// or env:// URIs,
      never stored directly in the entity.
    target_eidos: dns-provider-binding
    defaults:
      status: active
    bonds:
      - desmos: provided-by
        from_slot: zone_id
        to_self: true
        required: true

# =============================================================================
# TEST DEFINITIONS (V4.1.5 SCHEMA-CONSTRAINED GENERATION)
# =============================================================================

- eidos: typos
  id: typos-def-test-generated-schema
  data:
    name: test-generated-schema
    description: |
      Test definition for schema-constrained generated slots.

      Used to verify V4.1.4/V4.1.5 implementation:
      - Generated slots call LLM inference
      - Schema sources (output_schema, target_eidos, stoicheion_id) constrain output
    slots:
      # Slot with explicit output_schema
      greeting:
        pattern: generated
        prompt: "Generate a friendly greeting for $name"
        output_schema:
          type: object
          properties:
            message:
              type: string
              description: "The greeting message"
            language:
              type: string
              enum: ["en", "es", "fr"]
          required: ["message", "language"]

      # Slot with target_eidos schema source
      theoria_data:
        pattern: generated
        prompt: "Generate theoria data about $topic"
        target_eidos: eidos/theoria

      # Plain generated slot (no schema, plain text)
      summary:
        pattern: generated
        prompt: "Write a one-sentence summary of: $topic"

      # Literal slot for comparison
      timestamp:
        pattern: literal
        default: "now"
    output_type: object
