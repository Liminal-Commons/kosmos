# Step Types Artifact Definitions
#
# E7 Emission Scope: Rust step_types.rs
#
# Explicit content blocks — every stoicheion is named, no iteration.
# Adding a stoicheion requires adding slots here.
#
# This file demonstrates the compositional law: explicit is better than dynamic.

entities:

# =============================================================================
# Level 1: Step Struct (transforms one stoicheion to Rust struct)
# =============================================================================

- eidos: typos
  id: typos-def-step-struct
  data:
    name: step-struct
    description: |
      Rust struct for a stoicheion step.
      Takes a stoicheion entity, produces Rust struct code.
    target_eidos: artifact
    slots:
      - name: stoicheion
        pattern: input
        required: true
        description: "The stoicheion entity"

      - name: doc_comment
        pattern: generated
        prompt: |
          Write a concise Rust doc comment (one sentence) for this step struct.
          Step name: {{ stoicheion.data.name }}
          Description: {{ stoicheion.data.description }}
          Return only the comment text without ///.

      - name: fields_rust
        pattern: generated
        prompt: |
          Generate Rust struct fields from these field definitions.

          Fields: {{ stoicheion.data.fields | json }}

          Rules:
          - Field name in snake_case
          - Type mapping: string→String, integer→serde_json::Value, number→serde_json::Value,
            boolean→bool, object→serde_json::Value, array→serde_json::Value, any→serde_json::Value,
            step→Step, switch_case→SwitchCase
          - Optional fields (required: false) wrap in Option<T>
          - Add #[serde(default)] for optional fields
          - Add pub visibility
          - One field per line, indented with 4 spaces

          Return only the field declarations.

    template: |
      /// {{ doc_comment }}
      #[derive(Debug, Clone, serde::Serialize, serde::Deserialize)]
      pub struct {{ stoicheion.data.name | pascal_case }}Step {
      {{ fields_rust }}
      }

# =============================================================================
# Level 3: Step Types File (assembles all content blocks)
# =============================================================================

- eidos: typos
  id: typos-def-step-types-rs
  data:
    name: step-types-rs
    description: |
      The complete step_types.rs file.

      EXPLICIT CONTENT BLOCKS — every stoicheion is named.
      To add a new stoicheion:
      1. Create stoicheion entity in stoicheion.yaml
      2. Add queried slot: stoicheion_{name}
      3. Add composed slot: struct_{name}
      4. Add variant to step_enum literal
      5. Add match arm to step_name_fn literal
      6. Add name to step_names_array literal
      7. Add struct to template in correct tier section
    target_eidos: artifact
    slots:
      # =========================================================================
      # Header (literal)
      # =========================================================================
      - name: header
        pattern: literal
        value: |
          // =============================================================================
          // GENERATED FILE — DO NOT EDIT STRUCT DEFINITIONS
          // =============================================================================
          //
          // Generated by demiurge/compose from typos-def-step-types-rs
          // Source: stoicheion entities (genesis/stoicheia-portable/eide/stoicheion.yaml)
          //
          // To add a step: Edit stoicheion.yaml AND typos-def-step-types-rs
          // To regenerate: compose typos_id=typos-def-step-types-rs
          //
          // These are the production types. Execution logic (impl blocks) is
          // hand-written in steps.rs after the include! macro.
          // =============================================================================

      # =========================================================================
      # Helper Types (literal)
      # =========================================================================
      - name: helper_types
        pattern: literal
        value: |
          // =============================================================================
          // Helper Types
          // =============================================================================

          /// A case in a switch step — condition and steps to execute.
          #[derive(Debug, Clone, serde::Serialize, serde::Deserialize)]
          pub struct SwitchCase {
              /// Condition expression to evaluate
              pub when: String,
              /// Steps to execute if condition matches
              pub then: Vec<Step>,
          }

      # =========================================================================
      # Step Enum (literal — all variants explicit)
      # =========================================================================
      - name: step_enum
        pattern: literal
        value: |
          /// A step in a praxis — the atomic unit of execution.
          ///
          /// Generated from stoicheion definitions.
          #[derive(Debug, Clone, serde::Serialize, serde::Deserialize)]
          #[serde(tag = "step", rename_all = "snake_case")]
          pub enum Step {
              // Tier 0: Pure Data Flow
              Set(SetStep),
              Return(ReturnStep),
              Assert(AssertStep),

              // Tier 1: Read Operations
              Gather(GatherStep),
              Trace(TraceStep),
              Surface(SurfaceStep),
              SenseActuality(SenseActualityStep),
              Digest(DigestStep),
              Filter(FilterStep),
              Map(MapStep),
              Reduce(ReduceStep),
              Sort(SortStep),
              Limit(LimitStep),

              // Tier 2: Entity Operations
              Find(FindStep),
              Arise(AriseStep),
              Update(UpdateStep),
              Dissolve(DissolveStep),
              Bind(BindStep),
              Loose(LooseStep),
              Compose(ComposeStep),
              Index(IndexStep),
              Traverse(TraverseStep),
              Unmanifest(UnmanifestStep),
              Keyring(KeyringStep),

              // Tier 2: Control Flow
              Switch(SwitchStep),
              ForEach(ForEachStep),
              Call(CallStep),

              // Tier 3: External Operations
              Embed(EmbedStep),
              Infer(InferStep),
              Manifest(ManifestStep),
              Signal(SignalStep),
              Emit(EmitStep),
              Invoke(InvokeStep),
          }

      # =========================================================================
      # step_name Function (literal)
      # =========================================================================
      - name: step_name_fn
        pattern: literal
        value: |
          /// Get the step name as a string.
          #[allow(dead_code)]
          pub fn step_name(step: &Step) -> &'static str {
              match step {
                  // Tier 0
                  Step::Set(_) => "set",
                  Step::Return(_) => "return",
                  Step::Assert(_) => "assert",
                  // Tier 1
                  Step::Gather(_) => "gather",
                  Step::Trace(_) => "trace",
                  Step::Surface(_) => "surface",
                  Step::SenseActuality(_) => "sense_actuality",
                  Step::Digest(_) => "digest",
                  Step::Filter(_) => "filter",
                  Step::Map(_) => "map",
                  Step::Reduce(_) => "reduce",
                  Step::Sort(_) => "sort",
                  Step::Limit(_) => "limit",
                  // Tier 2
                  Step::Find(_) => "find",
                  Step::Arise(_) => "arise",
                  Step::Update(_) => "update",
                  Step::Dissolve(_) => "dissolve",
                  Step::Bind(_) => "bind",
                  Step::Loose(_) => "loose",
                  Step::Compose(_) => "compose",
                  Step::Index(_) => "index",
                  Step::Traverse(_) => "traverse",
                  Step::Unmanifest(_) => "unmanifest",
                  Step::Keyring(_) => "keyring",
                  Step::Switch(_) => "switch",
                  Step::ForEach(_) => "for_each",
                  Step::Call(_) => "call",
                  // Tier 3
                  Step::Embed(_) => "embed",
                  Step::Infer(_) => "infer",
                  Step::Manifest(_) => "manifest",
                  Step::Signal(_) => "signal",
                  Step::Emit(_) => "emit",
                  Step::Invoke(_) => "invoke",
              }
          }

      # =========================================================================
      # STEP_NAMES Array (literal)
      # =========================================================================
      - name: step_names_array
        pattern: literal
        value: |
          /// All step names in schema order.
          #[allow(dead_code)]
          pub const STEP_NAMES: &[&str] = &[
              // Tier 0
              "set",
              "return",
              "assert",
              // Tier 1
              "gather",
              "trace",
              "surface",
              "sense_actuality",
              "digest",
              "filter",
              "map",
              "reduce",
              "sort",
              "limit",
              // Tier 2
              "find",
              "arise",
              "update",
              "dissolve",
              "bind",
              "loose",
              "compose",
              "index",
              "traverse",
              "unmanifest",
              "keyring",
              "switch",
              "for_each",
              "call",
              // Tier 3
              "embed",
              "infer",
              "manifest",
              "signal",
              "emit",
              "invoke",
          ];

