# Kosmos Commons Circle
# =====================
#
# The primary distribution circle for the kosmos.
# Join to receive all standard oikoi.
#
# This file documents the distributes bonds that will be created at runtime
# when oikos-prod entities are published. The actual circle entity is defined
# in spora.yaml (circle/kosmos with kind: commons).

# Circle Definition (for reference - actual entity in spora.yaml)
# - eidos: circle
#   id: circle/kosmos
#   data:
#     name: Kosmos
#     kind: commons
#     description: The root commons circle — distributes oikoi to all dwellers

# Distributes Bonds
# -----------------
# The kosmos-commons circle distributes the following oikoi to its members.
# These bonds will be created when oikos-prod entities are published:
#
# Non-substrate oikoi (distributed via circle):
#   - oikos-prod/nous-*       # Mind — theoria, journeys, synthesis
#   - oikos-prod/soma-*       # Body — channels, embodiment
#   - oikos-prod/thyra-*      # Portal — streams, expression, UI
#   - oikos-prod/agora-*      # Spatial presence
#   - oikos-prod/demiurge-*   # Composition
#   - oikos-prod/manteia-*    # Inference
#   - oikos-prod/psyche-*     # Attention, intention
#   - oikos-prod/aither-*     # WebRTC
#   - oikos-prod/dynamis-*    # Releases
#   - oikos-prod/dokimasia-*  # Validation
#   - oikos-prod/ergon-*      # Work coordination
#
# Substrate oikoi (built into Thyra, NOT distributed):
#   - arche          # Grammar (eidos, desmos, stoicheion)
#   - propylon       # Entry via links
#   - hypostasis     # Keys, signatures, mnemonic, sync
#   - politeia       # Circles, membership, attainments

# Granted Attainments
# -------------------
# Members of kosmos-commons receive these attainments:
#   - attainment/compose   # Ability to compose entities
#   - attainment/express   # Ability to express in streams
#   - attainment/invoke    # Ability to invoke praxeis
#
# These attainments are already defined in spora.yaml and granted by circle/kosmos.

# Example: Creating a distributes bond (runtime operation)
# - bond:
#     from: circle/kosmos
#     to: oikos-prod/nous-1.0.0
#     desmos: distributes
#
# This is done via the politeia/distribute-oikos praxis when publishing an oikos-prod.
