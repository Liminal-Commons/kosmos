            name: Invite
            description: "Invite someone to this circle"
            praxis_id: praxis/politeia/invite-to-circle
            required_attainments: [invite]
            priority: 80
            created_at: "{{ now() }}"

      # Crystallize theoria affordance
      - compose:
          target_eidos: affordance
          id: affordance/crystallize-theoria
          data:
            name: Crystallize Theoria
            description: "Crystallize understanding into theoria"
            praxis_id: praxis/nous/crystallize-theoria
            required_attainments: [nous]
            priority: 90
            created_at: "{{ now() }}"

      # Surface journeys affordance
      - compose:
          target_eidos: affordance
          id: affordance/surface-journeys
          data:
            name: Surface Journeys
            description: "Find relevant journeys"
            praxis_id: praxis/nous/surface-journeys
            required_attainments: [nous]
            priority: 85
            created_at: "{{ now() }}"

      # ------------------------------------
      # Affordance → HUD Region bonds (renders-in)
      # ------------------------------------

      - bond:
          from: affordance/compose
          to: hud-region/toolbar
          desmos: renders-in

      - bond:
          from: affordance/invite
          to: hud-region/toolbar
          desmos: renders-in

      - bond:
          from: affordance/crystallize-theoria
          to: hud-region/toolbar
          desmos: renders-in

      - bond:
          from: affordance/surface-journeys
          to: hud-region/sidebar
          desmos: renders-in

      # ------------------------------------
      # Affordance → Attainment bonds (enabled-by)
      # ------------------------------------

      - bond:
          from: affordance/compose
          to: attainment/compose
          desmos: enabled-by

      - bond:
          from: affordance/invite
          to: attainment/invite
          desmos: enabled-by

      - bond:
          from: affordance/crystallize-theoria
          to: attainment/nous
          desmos: enabled-by

      - bond:
          from: affordance/surface-journeys
          to: attainment/nous
          desmos: enabled-by

      # ------------------------------------
      # Attainment → Affordance bonds (surfaces-as)
      # ------------------------------------

      - bond:
          from: attainment/compose
          to: affordance/compose
          desmos: surfaces-as

      - bond:
          from: attainment/invite
          to: affordance/invite
          desmos: surfaces-as

      - bond:
          from: attainment/nous
          to: affordance/crystallize-theoria
          desmos: surfaces-as

      - bond:
          from: attainment/nous
          to: affordance/surface-journeys
          desmos: surfaces-as

      # ------------------------------------
      # Render Types — semantic rendering categories
      # ------------------------------------

      - compose:
          target_eidos: render-type
          id: render-type/expression-thread
          data:
            name: expression-thread
            source_eidos: expression
            grouping: in-reply-to-chains
            description: "Conversation view with threading"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/circle-list
          data:
            name: circle-list
            source_eidos: circle
            description: "Circle navigation list"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/presence-list
          data:
            name: presence-list
            source_eidos: animus
            description: "Who's here — animi dwelling in circle"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/theoria-display
          data:
            name: theoria-display
            source_eidos: theoria
            description: "Crystallized understanding display"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/voice-composer
          data:
            name: voice-composer
            description: "Voice input and accumulation buffer"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/artifact-editor
          data:
            name: artifact-editor
            source_eidos: artifact
            description: "Artifact editing view"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/agora-territory
          data:
            name: agora-territory
            source_eidos: territory
            description: "Spatial territory with presence"
            created_at: "{{ now() }}"

      - compose:
          target_eidos: render-type
          id: render-type/connection-status
          data:
            name: connection-status
            description: "Connection state indicator"
            created_at: "{{ now() }}"

      # ------------------------------------
      # Renderers — substrate-specific component bindings
      # All core renderers use render_strategy: core
      # ------------------------------------

      - compose:
          target_eidos: renderer
          id: renderer/ExpressionThread
          data:
            name: ExpressionThread
            render_strategy: core
            component_path: panels/ExpressionThread
            substrate: web
            accepts_render_types: [render-type/expression-thread]
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/CircleList
          data:
            name: CircleList
            render_strategy: core
            component_path: panels/CircleList
            substrate: web
            accepts_render_types: [render-type/circle-list]
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/PresenceList
          data:
            name: PresenceList
            render_strategy: core
            component_path: panels/PresenceList
            substrate: web
            accepts_render_types: [render-type/presence-list]
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/TheoriaPanel
          data:
            name: TheoriaPanel
            render_strategy: core
            component_path: panels/TheoriaPanel
            substrate: web
            # Accepts both theoria-display and theoria-list (previously aliased)
            accepts_render_types:
              - render-type/theoria-display
              - render-type/theoria-list
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/VoiceComposer
          data:
            name: VoiceComposer
            render_strategy: core
            component_path: panels/VoiceComposer
            substrate: web
            # Accepts both voice-composer and accumulation-buffer (previously aliased)
            accepts_render_types:
              - render-type/voice-composer
              - render-type/accumulation-buffer
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/ArtifactEditor
          data:
            name: ArtifactEditor
            render_strategy: core
            component_path: panels/ArtifactEditor
            substrate: web
            # Accepts artifact-editor, artifact-preview, workspace-view (previously aliased)
            accepts_render_types:
              - render-type/artifact-editor
              - render-type/artifact-preview
              - render-type/workspace-view
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/AgoraTerritory
          data:
            name: AgoraTerritory
            render_strategy: core
            component_path: AgoraTerritory
            substrate: web
            accepts_render_types: [render-type/agora-territory]
            created_at: "{{ now() }}"

      - compose:
          target_eidos: renderer
          id: renderer/ConnectionStatus
          data:
            name: ConnectionStatus
            render_strategy: core
            component_path: ConnectionStatus
            substrate: web
            accepts_render_types: [render-type/connection-status]
            created_at: "{{ now() }}"

      # ------------------------------------
      # Renderer → Render-Type bonds (renders-with)
      # Makes dispatch graph-queryable
      # ------------------------------------

      - bond:
          from: renderer/ExpressionThread
          to: render-type/expression-thread
          desmos: renders-with

      - bond:
          from: renderer/CircleList
          to: render-type/circle-list
          desmos: renders-with

      - bond:
          from: renderer/PresenceList
          to: render-type/presence-list
          desmos: renders-with

      - bond:
          from: renderer/TheoriaPanel
          to: render-type/theoria-display
          desmos: renders-with

      - bond:
          from: renderer/VoiceComposer
          to: render-type/voice-composer
          desmos: renders-with

      - bond:
          from: renderer/ArtifactEditor
          to: render-type/artifact-editor
          desmos: renders-with

      - bond:
          from: renderer/AgoraTerritory
          to: render-type/agora-territory
          desmos: renders-with

      - bond:
          from: renderer/ConnectionStatus
          to: render-type/connection-status
          desmos: renders-with

  # ---------------------------------------------------------------------------
  # STAGE 5: MARKER — germination complete
  # ---------------------------------------------------------------------------

  - name: stage-5-marker
    order: 50
    description: "Mark spora germination complete"
    authorized_by: expression/genesis-root
    steps:
      - compose:
          target_eidos: eidos
          id: eidos/genesis-marker
          data:
            name: genesis-marker
            description: "Tracks completion of genesis stages"

      - compose:
          target_eidos: genesis-marker
          id: genesis-marker/spora
          data:
            stage: spora
            description: "Spora germination complete — archai and presence exist"
            completed_at: "{{ now() }}"

