            portable: true
      - bond:
          from: dynamis/time
          to: dynamis/time.format
          desmos: provides-function

      # =========================================================================
      # DYNAMIS FUNCTIONS — webrtc domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/webrtc.manifest
          data:
            name: manifest
            description: "Create WebRTC peer connection"
            tier: 3
            signature: "(config?) -> connection"
            portable: false
      - bond:
          from: dynamis/webrtc
          to: dynamis/webrtc.manifest
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/webrtc.sense
          data:
