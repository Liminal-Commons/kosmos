            scope: circle
            created_at: "{{ now() }}"

      # ------------------------------------
      # Tier 3 Attainments (external operations)
      # ------------------------------------

      # external-emit attainment — ability to emit files to filesystem
      - compose:
          target_eidos: attainment
          id: attainment/external-emit
          data:
            name: external-emit
            description: "Ability to emit files to the filesystem (Tier 3 external operation)"
            scope: circle
            created_at: "{{ now() }}"

      # external-manifest attainment — ability to manifest substrate resources
      - compose:
          target_eidos: attainment
          id: attainment/external-manifest
          data:
