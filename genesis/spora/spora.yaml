            prosopon_id: prosopon/victor
            oikos_id: oikos/kosmos
            substrate_id: substrate/genesis
            status: active
            arrived_at: "{{ now() }}"

      # Sovereign bond: oikos/kosmos ← parousia/genesis
      - bond:
          from: oikos/kosmos
          to: parousia/genesis
          desmos: sovereign-to

      # Instantiates bond: parousia/genesis → prosopon/victor
      - bond:
          from: parousia/genesis
          to: prosopon/victor
          desmos: embodies

      # Dwells-in bond: parousia/genesis → oikos/kosmos
      - bond:
          from: parousia/genesis
