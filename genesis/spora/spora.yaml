            scope: circle
            created_at: "{{ now() }}"

      # oikos-develop attainment — ability to create and modify oikos-dev packages
      - compose:
          target_eidos: attainment
          id: attainment/oikos-develop
          data:
            name: oikos-develop
            description: "Ability to create and modify oikos-dev packages"
            scope: circle
            created_at: "{{ now() }}"

      # oikos-publish attainment — ability to bake and sign oikos-prod packages
      - compose:
          target_eidos: attainment
          id: attainment/oikos-publish
          data:
            name: oikos-publish
            description: "Ability to bake oikos-dev into oikos-prod and sign for distribution"
            scope: circle
            created_at: "{{ now() }}"

      # oikos-bake attainment — ability to bake generative-commons oikos-dev locally
      - compose:
          target_eidos: attainment
          id: attainment/oikos-bake
          data:
            name: oikos-bake
            description: "Ability to bake generative-commons oikos-dev into locally-fitted versions. Enables circles to adapt shared source packages."
            scope: circle
            created_at: "{{ now() }}"

      # oikos-fork attainment — ability to derive new oikos-dev from generative-commons source
      - compose:
