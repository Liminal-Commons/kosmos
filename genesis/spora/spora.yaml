# spora.yaml
# The executable seed — bootstrap the kosmos from the signed genesis
#
# This is the minimal spora that germinates from the genesis root:
#   expression/genesis-root → all provenance chains trace here
#
# Germination stages:
#   0. Prime — eidos is an eidos (self-grounding)
#   1. Archai — the grammar: eidos, desmos, stoicheion
#   2. Presence — who can dwell: persona, animus, circle
#   3. Founder — Victor's persona, self-circle, Claude's persona
#   5. Marker — record that spora has germinated
#
# NOTE: Domain-specific eide, praxeis, and patterns are now loaded from
#       oikos directories. See genesis/*/eide/, genesis/*/praxeis/, etc.

# =============================================================================
# FORMAT VERSION
# =============================================================================
# v2.0 introduces content_roots as first-class entities.
# This makes "where content comes from" traversable via sourced-from bonds.

format_version: "2.0"

oikos: spora
version: 0.1.0
status: seed
description: |
  The seed from which the kosmos germinates.

  All provenance chains trace to the genesis root:
    "for my babe, for the liberation of all. ever. eternally."

  This signed expression is the anchor. Everything that arises
  is authorized-by chains that terminate at this root.

# =============================================================================
# CONTENT ROOTS — Where content comes from (v2.0)
# =============================================================================
# Each entry becomes a content-root entity during germination.
# Entities loaded from a root get a sourced-from bond.
# This makes "where did this come from?" graph-traversable.

content_roots:
  # The arche — constitutional grammar
  - id: content-root/arche
    path: arche/
    constitutional: true
    order: 0
    content_types: [eidos, desmos, function]
    description: "Constitutional forms — the grammar of the kosmos"

  # Spora definitions — artifact definitions and step types
  - id: content-root/spora-definitions
    path: spora/definitions/
    constitutional: true
    order: 1
    content_types: [typos]
    description: "Typoi — composition molds for CE4 compose pattern"

  # Spora journeys — roadmap and release tracking
  - id: content-root/spora-journeys
    path: spora/journeys/
    constitutional: false
    order: 2
    content_types: [journey, waypoint]
    description: "Development journeys and waypoints"

  # Oikoi discovery — each oikos declares its own content paths
  # The bootstrap loads manifests from this root, then follows
  # sources-content-from bonds declared in each manifest.
  - id: content-root/oikoi
    path: ./
    constitutional: false
    order: 10
    content_types: [oikos-manifest]
    description: "Oikos manifests — each declares its own content paths"
    # NOTE: This root discovers manifest.yaml files.
    # Individual oikos content paths are declared in manifest.yaml v2.0

# =============================================================================
# THE GENESIS ROOT (already exists, verified by signature)
# =============================================================================

genesis_root:
  id: expression/genesis-root
  content: "for my babe, for the liberation of all. ever. eternally."
  expressed_by: persona/victor
  signature: 5fd550ad1d738802d38a2abfa802a2616695bc1e1c0c0d3287b6fd52ca9816893a17dca06bb1ad0631d502e16facebb70c9f3263ba7401887f46d9e8d7031601
  public_key: b196e54638c421529120fc10ebb3ea9b82f015ec768854364e7696613be4f70c
  algorithm: ed25519

# =============================================================================
# GERMINATION STAGES
# =============================================================================

stages:

  # ---------------------------------------------------------------------------
  # STAGE 0: THE PRIME — self-grounding
  # ---------------------------------------------------------------------------

  - name: stage-0-prime
    order: 0
    description: "Eidos is an eidos — the self-grounding prime"
    authorized_by: expression/genesis-root
    steps:
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/eidos
          data:
            name: eidos
            description: "Form, type — what can exist. The prime is self-grounding."

  # ---------------------------------------------------------------------------
  # STAGE 1: ARCHAI — the grammar
  # ---------------------------------------------------------------------------

  - name: stage-1-archai
    order: 10
    description: "The foundational forms — the grammar of the kosmos"
    authorized_by: expression/genesis-root
    source_files:
      - definitions/core.yaml
      - definitions/pege.yaml
      - definitions/entities.yaml
      - definitions/step-types.yaml
      - ../arche/functions.yaml
    steps:
      # desmos — how things relate
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/desmos
          data:
            name: desmos
            description: "Bond, tie — how things relate"

      # stoicheion — atomic operations
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/stoicheion
          data:
            name: stoicheion
            description: "Element — atomic operation in the physics"

      # oikos — capability domains
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/oikos
          data:
            name: oikos
            description: "Domain — capability region at a klimax scale"

      # praxis — composed actions
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/praxis
          data:
            name: praxis
            description: "Action — composed of stoicheia, what can be done"

      # theoria — crystallized understanding
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/theoria
          data:
            name: theoria
            description: "Crystallized understanding"
            fields:
              insight:
                type: string
                required: true
                description: "The crystallized understanding"
              domain:
                type: string
                required: true
                description: "Knowledge domain this theoria belongs to"
              status:
                type: enum
                values: [provisional, confirmed, superseded]
                required: true
                default: provisional
                description: "Lifecycle status"
              source:
                type: string
                required: false
                description: "Where this understanding came from (e.g., conversation, observation)"

      # principle — commitment adopted
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/principle
          data:
            name: principle
            description: "Commitment adopted from theoria"

      # pattern — enacted commitment
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/pattern
          data:
            name: pattern
            description: "Enacted commitment — how principles live"

      # typos — composition mold
      # V9: Renamed from artifact-definition
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/typos
          data:
            name: typos
            description: |
              Mold — composition template with slots and fill methods.
              Every entity traces to its typos through the composed-from bond.

              Routing is determined by shape:
              - Has target_eidos → entity composition
              - Has slots (no target_eidos) → graph composition
              - Has template (no slots, no target_eidos) → template rendering
            fields:
              name:
                type: string
                required: true
                description: "Human-readable name for this definition"
              description:
                type: string
                required: false
                description: "What this definition composes and when to use it"
              target_eidos:
                type: string
                required: false
                description: "For entity composition — the eidos to instantiate (e.g., 'theoria')"
              slots:
                type: object
                required: false
                description: |
                  For graph composition — named slots to fill.
                  Each slot specifies how to fill it via pattern.
                additionalProperties:
                  type: object
                  properties:
                    pattern:
                      type: string
                      enum: ["literal", "computed", "queried", "generated", "composed"]
                      description: "How to fill this slot"
                    type:
                      type: string
                      description: "Expected value type (string, number, array, object)"
                    required:
                      type: boolean
                      description: "Whether this slot must be provided"
                    default:
                      type: any
                      description: "Default value for literal pattern"
                    description:
                      type: string
                      description: "What this slot represents"
                    prompt:
                      type: string
                      description: "For generated pattern — prompt for LLM"
                    output_schema:
                      type: object
                      description: "For generated pattern — JSON Schema to constrain output"
                    target_eidos:
                      type: string
                      description: "For generated pattern — derive schema from eidos fields"
                    stoicheion_id:
                      type: string
                      description: "For generated pattern — derive schema from stoicheion"
              template:
                type: string
                required: false
                description: "For template rendering — template with {{ $variable }} interpolation"
              output_type:
                type: string
                required: false
                enum: ["text", "object"]
                description: "For graph composition — output format (text or object)"
              defaults:
                type: object
                required: false
                description: "Default values for slots/template variables"
              bonds:
                type: array
                required: false
                description: "Bonds to create during composition"
                items:
                  type: object
                  properties:
                    desmos:
                      type: string
                      required: true
                      description: "Bond type (e.g., 'belongs-to', 'crystallized-in')"
                    from_self:
                      type: boolean
                      description: "Bond originates from the composed entity"
                    to_self:
                      type: boolean
                      description: "Bond targets the composed entity"
                    to_literal:
                      type: string
                      description: "Fixed entity ID to bond to"
                    to_input:
                      type: string
                      description: "Input parameter name containing target ID"
                    to_context:
                      type: string
                      description: "Context key for target (e.g., '_circle', '_persona')"
                    from_context:
                      type: string
                      description: "Context key for source (e.g., '_circle', '_persona')"
                    optional:
                      type: boolean
                      description: "Skip if context value unavailable"
                    many:
                      type: boolean
                      description: "Create bonds to each item in array input"

      # artifact — result of template/graph composition
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/artifact
          data:
            name: artifact
            description: "A composed artifact — result of template/graph rendering"
            fields:
              typos_id:
                type: string
                required: true
              content:
                type: any
                required: true
              inputs:
                type: object
                required: false
              composed_at:
                type: timestamp
                required: true
              cache_key:
                type: string
                required: false
                description: "Content-addressed cache key (hash of typos_id + inputs)"
              stale:
                type: boolean
                required: false
                default: false
                description: "Whether artifact is stale due to dependency changes"

      # function — interpreter expression function
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/function
          data:
            name: function
            constitutional: true
            description: |
              An expression function available in the interpreter.
              Functions transform values during praxis execution and composition.
              Declaring functions as eide enables discovery and documentation.
            fields:
              name:
                type: string
                required: true
                description: "Function name as used in expressions"
              description:
                type: string
                required: true
              category:
                type: string
                required: true
                enum: [collection, string, hash, time, encoding, math, type]
              params:
                type: array
                required: true
                description: "Function parameters"
              return_type:
                type: string
                required: true
                enum: [any, string, number, boolean, array, object, timestamp, null]
              pure:
                type: boolean
                required: false
                default: true
                description: "Whether this function has no side effects"
              examples:
                type: array
                required: false

      # genesis-record — multi-signature constitutional root
      - compose:
          definition: inline
          target_eidos: eidos
          id: eidos/genesis-record
          data:
            name: genesis-record
            description: "Multi-signature genesis record for threshold signing. The constitutional root with 3-of-5 signature requirement."
            fields:
              content:
                type: string
                required: true
                description: "The genesis content being signed"
              content_hash:
                type: string
                required: true
                description: "BLAKE3 hash of the genesis content"
              threshold:
                type: number
                required: true
                default: 3
                description: "Minimum signatures required for validity"
              signatures:
                type: array
                required: true
                description: "Array of signer signatures [{public_key, signature, attestation}]"
              verified:
                type: boolean
                required: false
                default: false
                description: "Whether threshold signatures have been verified"
              created_at:
                type: timestamp
                required: true

      # NOTE: eidos/dynamis-domain and eidos/dynamis-function extracted to
      #       genesis/dynamis/eide/dynamis.yaml

      # NOTE: eidos/oikos-manifest, eidos/oikos-dev, eidos/oikos-prod, eidos/publish-attestation
      #       extracted to genesis/oikos/eide/oikos.yaml

  # ---------------------------------------------------------------------------
  # STAGE 1.5: FOUNDATIONAL DESMOI
  # ---------------------------------------------------------------------------

  - name: stage-1-desmoi
    order: 15
    description: "Foundational bond types"
    authorized_by: expression/genesis-root
    steps:
      - compose:
          target_eidos: desmos
          id: desmos/authorized-by
          data:
            name: authorized-by
            description: "Provenance chain — this was authorized by that"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/composed-from
          data:
            name: composed-from
            description: "Entity was composed from this typos"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/typed-by
          data:
            name: typed-by
            description: "Instance-of relationship"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/provides-function
          data:
            name: provides-function
            description: "Dynamis domain provides function — links domain to its capabilities"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/inhabits
          data:
            name: inhabits
            description: "Entity inhabits an oikos"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/contains
          data:
            name: contains
            description: "Container relationship"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/emerges-from
          data:
            name: emerges-from
            description: "Animus emerges from persona"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/dwells-in
          data:
            name: dwells-in
            description: "Animus dwells in circle"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/stewards
          data:
            name: stewards
            description: "Persona stewards circle"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/member-of
          data:
            name: member-of
            description: "Persona is member of circle"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/belongs-to
          data:
            name: belongs-to
            description: "Entity belongs to oikos or circle"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/grounds
          data:
            name: grounds
            description: "Theoria grounds principle"
            symmetric: false

      - compose:
          target_eidos: desmos
          id: desmos/enacts
          data:
            name: enacts
            description: "Pattern enacts principle"
            symmetric: false

      # NOTE: Domain-specific desmoi have been extracted to oikos directories.
      # See: genesis/*/desmoi/*.yaml for:
      # - hypostasis: signed-by, chains-to, verifies
      # - soma: instantiates, channel-of, received-through, emitted-through, schema-of
      # - psyche: attends, intends, mood-of, portal-of, foresees, recognizes, opportune-for
      # - nous: crystallized-in, inquires, synthesizes, answers, contains-waypoint, waypoint-yields, supersedes, supports, contradicts, evidences
      # - oikos: within, authored-by, surfaced-in, about, crystallizes, surfaces, published-by, baked-from, attests-to, distributes, oikos-derives-from
      # - manteia: authorizes, yields-generation, memoizes
      # - dokimasia: validated-by, traces-to
      # - demiurge: depends-on
      # - energeia: supervises, runs-as
      # - thyra: expressed-in, transforms-to, produces, consumes, in-reply-to, derives-from, contributes-to; dns.yaml: manages-zone, in-zone, provided-by, addresses
      # - aisthesis: bootstrapped-by
      # - syndesmos: uses-channel, governed-by, carried-through, mirrors, conflicts-on
      # - politeia: sovereign-to, embodies, grants-attainment, has-attainment, granted-by, surfaces-as, enabled-by, renders-in, child-of, invited-to

  # ---------------------------------------------------------------------------
  # STAGE 1.8: DYNAMIS — substrate capabilities
  # ---------------------------------------------------------------------------

  - name: stage-1-dynamis
    order: 18
    description: "Dynamis domains and functions — what stoicheia can draw upon"
    authorized_by: expression/genesis-root
    steps:
      # =========================================================================
      # DYNAMIS DOMAINS
      # =========================================================================

      # db — database operations (Tier 2)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/db
          data:
            name: db
            description: "Database operations — entity and bond management in the graph"
            tier_range: "2"

      # aisthesis — sensing (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/aisthesis
          data:
            name: aisthesis
            description: "Sensing operations — embedding and semantic search"
            tier_range: "3"

      # fs — filesystem (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/fs
          data:
            name: fs
            description: "Filesystem operations — read, write, emit"
            tier_range: "3"

      # net — network (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/net
          data:
            name: net
            description: "Network operations — HTTP, WebSocket"
            tier_range: "3"

      # crypto — cryptography (Tier 0-3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/crypto
          data:
            name: crypto
            description: "Cryptographic operations — hashing, signing, verification, key derivation"
            tier_range: "0-3"

      # manteia — inference (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/manteia
          data:
            name: manteia
            description: "Inference operations — LLM generation"
            tier_range: "3"

      # process — process management (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/process
          data:
            name: process
            description: "Process management — spawn, monitor, kill"
            tier_range: "3"

      # time — time operations (Tier 0)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/time
          data:
            name: time
            description: "Time operations — timestamps and formatting (portable)"
            tier_range: "0"

      # webrtc — WebRTC operations (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/webrtc
          data:
            name: webrtc
            description: "WebRTC operations — peer connections, signaling, data channels"
            tier_range: "3"

      # dns — DNS provider operations (Tier 3)
      - compose:
          target_eidos: dynamis-domain
          id: dynamis/dns
          data:
            name: dns
            description: "DNS provider operations — record management via Cloudflare, etc."
            tier_range: "3"

      # =========================================================================
      # DYNAMIS FUNCTIONS — db domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.arise
          data:
            name: arise
            description: "Create an entity in the graph"
            tier: 2
            signature: "(eidos, id, data) -> entity"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.arise
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.find
          data:
            name: find
            description: "Find an entity by ID"
            tier: 2
            signature: "(id) -> entity | null"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.find
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.update
          data:
            name: update
            description: "Update entity data (merges with existing)"
            tier: 2
            signature: "(id, data) -> entity"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.update
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.dissolve
          data:
            name: dissolve
            description: "Remove an entity from the graph"
            tier: 2
            signature: "(id) -> void"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.dissolve
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.gather
          data:
            name: gather
            description: "Gather entities by type"
            tier: 2
            signature: "(eidos?, limit?) -> entity[]"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.gather
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.bind
          data:
            name: bind
            description: "Create a bond between entities"
            tier: 2
            signature: "(from, to, desmos, data?) -> bond"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.bind
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.loose
          data:
            name: loose
            description: "Remove a bond"
            tier: 2
            signature: "(from, to, desmos?) -> void"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.loose
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.trace
          data:
            name: trace
            description: "Follow bonds from an entity"
            tier: 2
            signature: "(id, direction, desmos?) -> bond[]"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.trace
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/db.traverse
          data:
            name: traverse
            description: "Walk the graph following bond types"
            tier: 2
            signature: "(id, desmoi, depth?) -> entity[]"
            portable: false
      - bond:
          from: dynamis/db
          to: dynamis/db.traverse
          desmos: provides-function

      # =========================================================================
      # DYNAMIS FUNCTIONS — aisthesis domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/aisthesis.embed
          data:
            name: embed
            description: "Generate embedding vector for text"
            tier: 3
            signature: "(text) -> vector"
            portable: false
      - bond:
          from: dynamis/aisthesis
          to: dynamis/aisthesis.embed
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/aisthesis.index
          data:
            name: index
            description: "Index entity for semantic search"
            tier: 3
            signature: "(entity_id, text) -> void"
            portable: false
      - bond:
          from: dynamis/aisthesis
          to: dynamis/aisthesis.index
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/aisthesis.surface
          data:
            name: surface
            description: "Semantic search for entities"
            tier: 3
            signature: "(query, limit?, threshold?) -> entity[]"
            portable: false
      - bond:
          from: dynamis/aisthesis
          to: dynamis/aisthesis.surface
          desmos: provides-function

      # =========================================================================
      # DYNAMIS FUNCTIONS — fs domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/fs.read
          data:
            name: read
            description: "Read file contents"
            tier: 3
            signature: "(path) -> string"
            portable: false
      - bond:
          from: dynamis/fs
          to: dynamis/fs.read
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/fs.write
          data:
            name: write
            description: "Write file contents"
            tier: 3
            signature: "(path, content) -> void"
            portable: false
      - bond:
          from: dynamis/fs
          to: dynamis/fs.write
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/fs.emit
          data:
            name: emit
            description: "Emit entity to filesystem"
            tier: 3
            signature: "(path, entity_id?, format?) -> void"
            portable: false
      - bond:
          from: dynamis/fs
          to: dynamis/fs.emit
          desmos: provides-function

      # =========================================================================
      # DYNAMIS FUNCTIONS — net domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/net.http
          data:
            name: http
            description: "HTTP request"
            tier: 3
            signature: "(method, url, body?, headers?) -> response"
            portable: false
      - bond:
          from: dynamis/net
          to: dynamis/net.http
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
          id: dynamis/net.websocket_connect
          data:
            name: websocket_connect
            description: "Establish WebSocket connection"
            tier: 3
            signature: "(url) -> conn_id"
            portable: false
      - bond:
          from: dynamis/net
