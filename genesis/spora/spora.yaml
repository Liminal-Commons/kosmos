          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/govern
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/nous
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/manteia
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/dns
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/oikos-develop
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/oikos-publish
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/oikos-bake
          desmos: grants-attainment

      - bond:
          from: circle/kosmos
          to: attainment/oikos-fork
          desmos: grants-attainment

      # Tier 3 attainment grants
      - bond:
          from: circle/kosmos
