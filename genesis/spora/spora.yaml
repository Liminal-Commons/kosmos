            name: status
            description: "Check process status"
            tier: 3
            signature: "(pid) -> status"
            portable: false
      - bond:
          from: dynamis/process
          to: dynamis/process.status
          desmos: provides-function

      - compose:
          target_eidos: dynamis-function
