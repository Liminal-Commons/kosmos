  # ---------------------------------------------------------------------------
  # STAGE 2: PRESENCE — who can dwell
  # ---------------------------------------------------------------------------

  - name: stage-2-presence
    order: 20
    description: "Presence eide — what enables dwelling"
    authorized_by: expression/genesis-root
    steps:
      # persona — persistent identity
      - compose:
          target_eidos: eidos
          id: eidos/persona
          data:
            name: persona
            description: "Identity that persists across sessions"
            fields:
              name:
                type: string
                required: true
              kind:
                type: enum
                values: [human, ai, service, collective]
                required: true
              public_key:
                type: string
                required: true
              home_circle:
                type: string
                required: false
                description: |
                  Default circle for this persona.
                  Used by MCP bridge when KOSMOS_CIRCLE env var not set.
                  Enables graph-based configuration of dwelling defaults.

      # animus — dwelling presence
      - compose:
          target_eidos: eidos
          id: eidos/animus
          data:
            name: animus
            description: "Presence that arises when a persona dwells in a circle. Embodies persona, sovereign to circle."
            fields:
              name:
                type: string
                required: false
                description: "Optional display name for this animus instance"
              description:
                type: string
                required: false
                description: "Optional description"
              persona_id:
                type: string
                required: true
                description: "The persona this animus embodies"
              circle_id:
                type: string
                required: true
                description: "The circle where this animus dwells"
              substrate_id:
                type: string
                required: true
                description: "Reference to substrate instance (thyra/session)"
              status:
                type: enum
                values: [active, departed]
                required: true
                default: active
                description: "Whether this animus is currently present"
              arrived_at:
                type: timestamp
                required: true
              departed_at:
                type: timestamp
                required: false
              last_active_at:
                type: timestamp
                required: false
                description: "Last activity timestamp for presence tracking"

      # circle — trust boundary
      - compose:
          target_eidos: eidos
          id: eidos/circle
          data:
            name: circle
            description: "Trust boundary where dwellers gather"
            fields:
              name:
                type: string
                required: true
              kind:
                type: enum
                values: [self, peer, commons]
                required: true
                description: |
                  - self: Individual dwelling
                  - peer: Collaborative creation (cannot distribute externally)
                  - commons: Distribution circle (grants oikoi + attainments)
              description:
                type: string
                required: false
              endpoint:
                type: string
                required: false
                description: |
                  HTTP endpoint for this circle's kosmos-server.
                  Used by MCP bridge for graph-based circle discovery.
                  Example: "http://127.0.0.1:3000" or "https://commons.liminal.is"

  # NOTE: Domain-specific eide (session, channel, etc.) are now loaded from
  # oikos directories. See genesis/*/eide/ for extracted definitions.

  # ---------------------------------------------------------------------------
  # STAGE 3: FOUNDER — Victor and Claude
  # ---------------------------------------------------------------------------

  - name: stage-3-founder
    order: 30
    description: "The founder persona and initial dwellers"
    authorized_by: expression/genesis-root
    steps:
      # Victor's persona (the signer of genesis)
      - compose:
          target_eidos: persona
          id: persona/victor
          data:
            name: Victor
            kind: human
            public_key: b196e54638c421529120fc10ebb3ea9b82f015ec768854364e7696613be4f70c
            description: "The founder. Signed the genesis root."

      # Victor's self-circle
      - compose:
          target_eidos: circle
          id: circle/victor-self
          data:
            name: "Victor's Circle"
            kind: self
            steward_persona_id: persona/victor
            description: "Sovereign ground of the founder"
          bonds:
            - desmos: stewards
              from: persona/victor
              to: self

      # Claude's persona
      - compose:
          target_eidos: persona
          id: persona/claude
          data:
            name: Claude
            kind: ai
            description: "The animus that dwells when Claude connects"
            home_circle: circle/kosmos

      # Root public circle — visible to all
      - compose:
          target_eidos: circle
          id: circle/kosmos
          data:
            name: Kosmos
            kind: commons
            description: "The root commons circle — distributes oikoi to all dwellers"

      # Membership bonds
      - bond:
          from: persona/victor
          to: circle/kosmos
          desmos: member-of

      - bond:
          from: persona/claude
          to: circle/kosmos
          desmos: member-of

      - bond:
          from: persona/victor
          to: circle/victor-self
          desmos: member-of

      # Grant mcp-essential attainment to the kosmos circle
      # This makes it available to all members dwelling in circle/kosmos
      - bond:
          from: circle/kosmos
          to: attainment/mcp-essential
          desmos: grants-attainment

  # ---------------------------------------------------------------------------
  # STAGE 3.5: POLITEIA BOOTSTRAP — foundation attainments and HUD
  # ---------------------------------------------------------------------------

  - name: stage-3-politeia
    order: 35
    description: "Foundation attainments, affordances, and HUD regions"
    authorized_by: expression/genesis-root
    steps:
      # Genesis animus — the initial presence in circle/kosmos
      - compose:
          target_eidos: animus
          id: animus/genesis
          data:
            name: Genesis
            description: "The first animus — dwells in the root circle"
            persona_id: persona/victor
            circle_id: circle/kosmos
            substrate_id: substrate/genesis
            status: active
            arrived_at: "{{ now() }}"

      # Sovereign bond: circle/kosmos → animus/genesis
      - bond:
          from: circle/kosmos
          to: animus/genesis
          desmos: sovereign-to

      # Embodies bond: animus/genesis → persona/victor
      - bond:
          from: animus/genesis
          to: persona/victor
          desmos: embodies

      # Dwells-in bond: animus/genesis → circle/kosmos
      - bond:
          from: animus/genesis
          to: circle/kosmos
          desmos: dwells-in

      # ------------------------------------
      # Foundation Attainments
      # ------------------------------------

      # compose attainment — ability to compose entities
      - compose:
          target_eidos: attainment
          id: attainment/compose
          data:
            name: compose
            description: "Ability to compose entities via demiurge"
            scope: circle
            created_at: "{{ now() }}"

      # invite attainment — ability to invite others to circle
      - compose:
          target_eidos: attainment
          id: attainment/invite
          data:
            name: invite
            description: "Ability to invite others to circles"
            scope: circle
            created_at: "{{ now() }}"

      # govern attainment — ability to govern circle (grant attainments)
      - compose:
          target_eidos: attainment
          id: attainment/govern
