  # ---------------------------------------------------------------------------
  # STAGE 2: PRESENCE — who can dwell
  # ---------------------------------------------------------------------------

  - name: stage-2-presence
    order: 20
    description: "Presence eide — what enables dwelling"
    authorized_by: phasis/genesis-root
    steps:
      # prosopon — persistent identity
      - compose:
          target_eidos: eidos
          id: eidos/prosopon
          data:
            name: prosopon
            description: "Identity that persists across time"
            fields:
              name:
                type: string
                required: true
              kind:
                type: enum
                values: [human, ai, service, collective]
                required: true
              public_key:
                type: string
                required: true
              home_oikos:
                type: string
                required: false
                description: |
                  Default oikos for this prosopon.
                  Used by MCP bridge when KOSMOS_OIKOS env var not set.
                  Enables graph-based configuration of dwelling defaults.

      # parousia — dwelling presence
      - compose:
          target_eidos: eidos
          id: eidos/parousia
          data:
            name: parousia
            description: "Embodied presence of a prosopon within an oikos. Arises when a prosopon enters and dwells."
            fields:
              name:
                type: string
                required: false
                description: "Optional display name for this parousia instance"
              description:
                type: string
                required: false
                description: "Optional description"
              prosopon_id:
                type: string
                required: true
                description: "The prosopon this parousia embodies"
              oikos_id:
                type: string
                required: true
                description: "The oikos where this parousia dwells"
              substrate_id:
                type: string
                required: true
                description: "Reference to substrate instance (thyra/session)"
              status:
                type: enum
                values: [active, departed]
                required: true
                default: active
                description: "Whether this parousia is currently present"
              arrived_at:
                type: timestamp
                required: true
              departed_at:
                type: timestamp
                required: false
              last_active_at:
                type: timestamp
                required: false
                description: "Last activity timestamp for presence tracking"

      # oikos — social dwelling
      - compose:
          target_eidos: eidos
          id: eidos/oikos
          data:
            name: oikos
            description: "Social dwelling where prosopa gather, govern, and share"
            fields:
              name:
                type: string
                required: true
              description:
                type: string
                required: false
              endpoint:
                type: string
                required: false
                description: |
                  HTTP endpoint for this oikos's kosmos-server.
                  Used by MCP bridge for graph-based oikos discovery.
                  Example: "http://127.0.0.1:3000" or "https://commons.liminal.is"

  # NOTE: Domain-specific eide (session, channel, etc.) are now loaded from
  # topos directories. See genesis/*/eide/ for extracted definitions.

  # ---------------------------------------------------------------------------
  # STAGE 3: FOUNDER — Victor and Claude
  # ---------------------------------------------------------------------------

  - name: stage-3-founder
    order: 30
    description: "The founder prosopon and initial dwellers"
    authorized_by: phasis/genesis-root
    steps:
      # Victor's prosopon (the signer of genesis)
      - compose:
          target_eidos: prosopon
          id: prosopon/victor
          data:
            name: Victor
            kind: human
            public_key: b196e54638c421529120fc10ebb3ea9b82f015ec768854364e7696613be4f70c
            description: "The founder. Signed the genesis root."
            home_oikos: oikos/kosmos

      # Claude's prosopon
      - compose:
          target_eidos: prosopon
          id: prosopon/claude
          data:
            name: Claude
            kind: ai
            description: "The parousia that arises when Claude connects"
            home_oikos: oikos/kosmos

      # Root oikos — where genesis entities exist, where all prosopa are members
      - compose:
          target_eidos: oikos
          id: oikos/kosmos
          data:
            name: Kosmos
            description: "The root oikos — hosts topoi and distributes to all"

      # Membership bonds
      - bond:
          from: prosopon/victor
          to: oikos/kosmos
          desmos: member-of

      - bond:
          from: prosopon/claude
          to: oikos/kosmos
          desmos: member-of

      # Stewardship: Victor stewards oikos/kosmos
      - bond:
          from: prosopon/victor
          to: oikos/kosmos
          desmos: stewards

      # Grant mcp-essential attainment to the kosmos oikos
      # This makes it available to all members dwelling in oikos/kosmos
      - bond:
          from: oikos/kosmos
          to: attainment/mcp-essential
          desmos: grants-attainment

  # ---------------------------------------------------------------------------
  # STAGE 3.5: POLITEIA BOOTSTRAP — foundation attainments and HUD
