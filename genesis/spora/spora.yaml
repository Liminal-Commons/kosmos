            tier: 3
            signature: "(length) -> bytes"
            portable: false
      - bond:
          from: dynamis/crypto
          to: dynamis/crypto.random
          desmos: provides-function

      # =========================================================================
      # DYNAMIS FUNCTIONS — manteia domain
      # =========================================================================

      - compose:
          target_eidos: dynamis-function
          id: dynamis/manteia.infer
          data:
            name: infer
