# =============================================================================
# BONDS (dependencies between journeys)
# =============================================================================

bonds:
  # Aisthesis Phase 1 depended on substrate
  - from: journey/v8-aisthesis-phase1
    to: journey/v8-substrate
    desmos: depends-on

  # Polis depends on substrate
  - from: journey/v8-polis
    to: journey/v8-substrate
    desmos: depends-on

  # Dwelling-aware operations blocked by polis
  - from: journey/v8-dwelling-aware
    to: journey/v8-polis
    desmos: depends-on

  # Aisthesis Phase 3 blocked by polis
  - from: journey/v8-aisthesis-phase3
    to: journey/v8-polis
    desmos: depends-on

  # Soma/Psyche depends on dwelling-aware
  - from: journey/v8-soma-psyche
    to: journey/v8-dwelling-aware
    desmos: depends-on

  # Waypoint bonds
  - from: journey/v8-polis
    to: waypoint/v8-polis-0
    desmos: contains-waypoint
  - from: journey/v8-polis
    to: waypoint/v8-polis-1
    desmos: contains-waypoint
  - from: journey/v8-polis
    to: waypoint/v8-polis-2
    desmos: contains-waypoint
  - from: journey/v8-polis
    to: waypoint/v8-polis-3
