# ─────────────────────────────────────────────────────────────────
# update-presence-status — Change presence status
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/update-presence-status
  data:
    oikos: agora
    name: update-presence-status
    description: Update presence status (active, away, do-not-disturb)

    params:
      - name: presence_id
        type: string
        required: true

      - name: status
        type: string
        required: true
        enum: [active, away, do-not-disturb]

    steps:
      # Verify ownership
      - step: trace
        from: "$_dwelling.animus_id"
        desmos: instantiates-presence
        bind_to: my_presences

      - step: assert
        condition: "$presence_id in $my_presences.*.id"
        message: "This presence is not yours"

      - step: update
        id: "$presence_id"
        data:
          status: "$status"

      # Signal state change
      - step: signal
        operation: broadcast
        message:
          kind: presence-status-changed
          presence_id: "$presence_id"
          status: "$status"

      - step: return
        value:
          presence_id: "$presence_id"
          status: "$status"

# ─────────────────────────────────────────────────────────────────
# create-livekit-server — Create infrastructure entity
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/create-livekit-server
  data:
    oikos: agora
    name: create-livekit-server
    description: Create a LiveKit server infrastructure entity for the circle
    tier: 2  # Graph operations only

    params:
      - name: host
        type: string
        required: true
        description: "e.g., livekit.mycircle.com"

      - name: ws_url
        type: string
        description: "WebSocket URL (defaults to wss://{host})"

      - name: api_key_ref
        type: string
        required: true
        description: "Secret reference for API key"

      - name: api_secret_ref
        type: string
        required: true
        description: "Secret reference for API secret"

    steps:
      # Check admin attainment
      - step: assert
        condition: "$_dwelling has attainment agora-admin"
        message: "Not permitted to manage infrastructure"

      # Compute ws_url if not provided
      - step: set
        bindings:
          computed_ws_url: "{{ $ws_url ?? 'wss://' + $host }}"

      # Create server entity (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-agora-livekit-server"
        inputs:
          id: "agora-livekit-server/{{ uuid() }}"
          host: "$host"
          ws_url: "$computed_ws_url"
          api_key_ref: "$api_key_ref"
          api_secret_ref: "$api_secret_ref"
          status: provisioning
        bind_to: server

      # Bind server to circle
      - step: bind
        from_id: "$_dwelling.circle_id"
        to_id: "$server.id"
        desmos: operates-server

      - step: return
        value:
          server_id: "$server.id"
          host: "$host"
          status: provisioning

# ─────────────────────────────────────────────────────────────────
# delete-territory — Archive a territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/delete-territory
  data:
    oikos: agora
    name: delete-territory
    description: Archive a territory (removes active presences)

    params:
      - name: territory_id
        type: string
        required: true

    steps:
      # Check admin attainment
      - step: assert
        condition: "$_dwelling has attainment agora-admin"
        message: "Not permitted to manage territories"

      # Verify territory belongs to circle
      - step: trace
        from: "$territory_id"
        desmos: hosts-territory
        direction: inward
        bind_to: hosting_circle

      - step: assert
        condition: "$_dwelling.circle_id == $hosting_circle.0.id"
        message: "Territory not in your circle"

      # Get all presences in territory
      - step: trace
        from: "$territory_id"
        desmos: present-in
        direction: inward
        bind_to: presences

      # Remove all presences (force leave)
      - step: for_each
        items: "$presences"
        bind_as: presence
        do:
          - step: call
            praxis: agora/leave
            params:
              presence_id: "$presence.id"

      # Update territory status to archived
      - step: update
        id: "$territory_id"
        data:
          status: archived

      - step: return
        value:
          territory_id: "$territory_id"
          status: archived
          evicted_presences: "$presences.length"
