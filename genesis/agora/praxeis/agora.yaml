# Agora Praxeis
# Actions for spatial gathering

entities:

# ─────────────────────────────────────────────────────────────────
# enter — Enter a territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/enter
  data:
    oikos: agora
    name: enter
    description: Enter an agora territory, creating presence

    params:
      - name: territory_id
        type: string
        required: true
        description: Territory to enter

      - name: spawn_at
        type: object
        description: "Optional { x, y } position override"

    steps:
      # Check attainment
      - step: assert
        condition: "$_dwelling.animus_id != null"
        message: "Must be embodied to enter agora"

      # Find territory
      - step: find
        id: "$territory_id"
        bind_to: territory

      # Verify circle membership (visibility = reachability)
      - step: trace
        from: "$territory_id"
        desmos: hosts-territory
        direction: inward
        bind_to: hosting_circle

      - step: assert
        condition: "$_dwelling.circle_id == $hosting_circle.0.id"
        message: "Not a member of this circle"

      # Get LiveKit token
      - step: call
        praxis: agora/get-room-token
        params:
          room_name: "$territory.data.room_name"
        bind_to: token_result

      # Create presence (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-agora-presence"
        inputs:
          id: "agora-presence/{{ uuid() }}"
          position: "$spawn_at ?? $territory.data.spawn_point"
          facing: down
          status: active
          audio_enabled: false
          video_enabled: false
          display_name: "$_dwelling.persona_name ?? 'Anonymous'"
        bind_to: presence

      # Bind presence to territory
      - step: bind
        from_id: "$presence.id"
        to_id: "$territory_id"
        desmos: present-in

      # Bind animus to presence
      - step: bind
        from_id: "$_dwelling.animus_id"
        to_id: "$presence.id"
        desmos: instantiates-presence

      - step: return
        value:
          presence_id: "$presence.id"
          territory: "$territory.data"
          livekit_token: "$token_result.token"
          livekit_url: "$token_result.ws_url"

# ─────────────────────────────────────────────────────────────────
# move — Update position in territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/move
  data:
    oikos: agora
    name: move
    description: Update position in territory

    params:
      - name: presence_id
        type: string
        required: true

      - name: position
        type: object
        required: true
        description: "{ x: number, y: number }"

      - name: facing
        type: string

    steps:
      # Verify ownership of presence
      - step: trace
        from: "$_dwelling.animus_id"
        desmos: instantiates-presence
        bind_to: my_presences

      - step: assert
        condition: "$presence_id in $my_presences.*.id"
        message: "This presence is not yours"

      - step: update
        id: "$presence_id"
        data:
          position: "$position"
          facing: "$facing ?? null"

      # Signal to other presences (real-time sync via data channel)
      - step: signal
        operation: broadcast
        message:
          kind: presence-moved
          presence_id: "$presence_id"
          position: "$position"
          facing: "$facing"

# ─────────────────────────────────────────────────────────────────
# leave — Exit territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/leave
  data:
    oikos: agora
    name: leave
    description: Leave a territory, destroying presence

    params:
      - name: presence_id
        type: string
        required: true

    steps:
      # Verify ownership
      - step: trace
        from: "$_dwelling.animus_id"
        desmos: instantiates-presence
        bind_to: my_presences

      - step: assert
        condition: "$presence_id in $my_presences.*.id"
        message: "This presence is not yours"

      # Note: Bonds are dissolved when entity is dissolved
      # Destroy presence (bonds become orphaned and are cleaned up)
      - step: dissolve
        id: "$presence_id"

      - step: return
        value:
          status: left
          presence_id: "$presence_id"

# ─────────────────────────────────────────────────────────────────
# create-territory — Create a new territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/create-territory
  data:
    oikos: agora
    name: create-territory
    description: Create a new gathering territory for the circle

    params:
      - name: name
        type: string
        required: true

      - name: dimensions
        type: object
        default: { width: 1000, height: 1000 }

      - name: tilemap_url
        type: string

      - name: spawn_point
        type: object
        default: { x: 500, y: 500 }

      - name: capacity
        type: number
        default: 50

    steps:
      # Check attainment
      - step: assert
        condition: "$_dwelling has attainment agora-create"
        message: "Not permitted to create territories"

      # Generate room name
      - step: set
        bindings:
          room_name: "agora-{{ uuid() }}"

      # Create room entity (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-agora-room"
        inputs:
          id: "agora-room/{{ uuid() }}"
          name: "$room_name"
          max_participants: "$capacity"
          recording_enabled: false
          transcription_enabled: false
        bind_to: room

      # Create territory (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-agora-territory"
        inputs:
          id: "agora-territory/{{ uuid() }}"
          name: "$name"
          dimensions: "$dimensions"
          tilemap_url: "$tilemap_url"
          spawn_point: "$spawn_point"
          capacity: "$capacity"
          room_name: "$room_name"
          status: active
        bind_to: territory

      # Bind territory to circle
      - step: bind
        from_id: "$_dwelling.circle_id"
        to_id: "$territory.id"
        desmos: hosts-territory

      # Bind territory to room
      - step: bind
        from_id: "$territory.id"
        to_id: "$room.id"
        desmos: uses-room

      # Find circle's LiveKit server
      - step: trace
        from_id: "$_dwelling.circle_id"
        desmos: operates-server
        bind_to: servers

      # Bind room to server (if exists)
      - step: switch
        cases:
          - when: "$servers.length > 0"
            then:
              - step: bind
                from_id: "$room.id"
                to_id: "$servers.0.id"
                desmos: served-by

      - step: return
        value:
          territory_id: "$territory.id"
          room_id: "$room.id"
          status: created

# ─────────────────────────────────────────────────────────────────
# get-room-token — Get LiveKit room token
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/get-room-token
  data:
    oikos: agora
    name: get-room-token
    description: Generate a LiveKit room token for participant
    tier: 3  # Requires external call to LiveKit

    params:
      - name: room_name
        type: string
        required: true

    steps:
      # Find room
      - step: surface
        query: "$room_name"
        eidos: eidos/agora/room
        bind_to: rooms

      - step: assert
        condition: "$rooms.length > 0"
        message: "Room not found"

      # Get server
      - step: trace
        from: "$rooms.0.id"
        desmos: served-by
        bind_to: servers

      - step: assert
        condition: "$servers.length > 0"
        message: "No LiveKit server configured"

      # Generate token (invoke dynamis for external call)
      - step: invoke
        dynamis: livekit
        operation: create-token
        params:
          server: "$servers.0.data"
          room: "$room_name"
          identity: "$_dwelling.animus_id"
          name: "$_dwelling.persona_name ?? 'Participant'"
        bind_to: token_result

      - step: return
        value:
          token: "$token_result.token"
          ws_url: "$servers.0.data.ws_url"

# ─────────────────────────────────────────────────────────────────
# actualize-server — Reconcile infrastructure
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/actualize-server
  data:
    oikos: agora
    name: actualize-server
    description: Reconcile livekit-server entity with actual infrastructure
    tier: 3  # Requires chora dynamis

    params:
      - name: server_id
        type: string
        required: true

    steps:
      - step: find
        id: "$server_id"
        bind_to: server

      # Sense current actuality
      - step: sense_actuality
        entity_id: "$server_id"
        bind_to: actual

      # Compare and reconcile
      - step: switch
        cases:
          - when: "$actual.status == 'missing'"
            then:
              - step: manifest
                entity_id: "$server_id"
                bind_to: manifest_result

          - when: "$actual.status == 'running'"
            then:
              - step: return
                value:
                  status: aligned
                  message: "Server already running"

          - when: "$actual.status == 'drifted'"
            then:
              - step: manifest
                entity_id: "$server_id"
                bind_to: manifest_result

      - step: return
        value:
          status: "$manifest_result.status ?? 'unchanged'"
          server: "$server.data"

# ─────────────────────────────────────────────────────────────────
# list-territories — List territories in a circle
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/list-territories
  data:
    oikos: agora
    name: list-territories
    description: List all territories hosted by the current circle

    steps:
      # Trace territories from dwelling circle
      - step: trace
        from: "$_dwelling.circle_id"
        desmos: hosts-territory
        bind_to: territories

      - step: return
        value:
          territories: "$territories"
          count: "$territories.length"

# ─────────────────────────────────────────────────────────────────
# get-presences — List presences in a territory
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/get-presences
  data:
    oikos: agora
    name: get-presences
    description: Get all current presences in a territory

    params:
      - name: territory_id
        type: string
        required: true

    steps:
      # Verify territory exists and is accessible
      - step: find
        id: "$territory_id"
        bind_to: territory

      # Trace hosting circle to verify access
      - step: trace
        from: "$territory_id"
        desmos: hosts-territory
        direction: inward
        bind_to: hosting_circle

      - step: assert
        condition: "$_dwelling.circle_id == $hosting_circle.0.id"
        message: "Not a member of this circle"

      # Trace all presences in territory
      - step: trace
        from: "$territory_id"
        desmos: present-in
        direction: inward
        bind_to: presences

      - step: return
        value:
          presences: "$presences"
          count: "$presences.length"
          territory_id: "$territory_id"

# ─────────────────────────────────────────────────────────────────
# toggle-audio — Enable/disable audio for presence
# ─────────────────────────────────────────────────────────────────

- eidos: praxis
  id: praxis/agora/toggle-audio
  data:
    oikos: agora
    name: toggle-audio
    description: Toggle audio streaming for a presence

    params:
      - name: presence_id
        type: string
        required: true

      - name: enabled
        type: boolean
        required: true

    steps:
      # Verify ownership of presence
      - step: trace
        from: "$_dwelling.animus_id"
        desmos: instantiates-presence
        bind_to: my_presences

      - step: assert
        condition: "$presence_id in $my_presences.*.id"
        message: "This presence is not yours"

      # Check attainment for speaking
      - step: switch
        cases:
          - when: "$enabled == true"
            then:
              - step: assert
                condition: "$_dwelling has attainment agora-speak"
                message: "Not permitted to speak in agora"

      - step: update
        id: "$presence_id"
        data:
          audio_enabled: "$enabled"

      # Signal state change
      - step: signal
        operation: broadcast
        message:
          kind: presence-audio-changed
          presence_id: "$presence_id"
          audio_enabled: "$enabled"

      - step: return
        value:
          presence_id: "$presence_id"
          audio_enabled: "$enabled"

