# Agora Render Specifications
#
# Rendering definitions for agora eide: territory, presence, livekit-server, room
# Oikos-centric: agora owns presentation for spatial gathering entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# TERRITORY RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/territory-card
  data:
    name: territory-card
    description: "Card view for territory — 2D gathering space"
    target_eidos: territory
    fields_to_display:
      - field: name
      - field: status
      - field: capacity
      - field: dimensions
    layout_template: |
      <article class="render-card territory-card territory-{status}">
        <header class="card-header">
          <span class="territory-icon">🏛️</span>
          <span class="territory-name">{name}</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="dimensions-row">
            <span class="dimensions">{dimensions}</span>
          </div>
          <div class="capacity-row">
            <span class="label">Capacity:</span>
            <span class="capacity">{capacity}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="enter-hint">Click to enter</span>
        </footer>
      </article>
    style_bindings:
      territory-active: "border-left: 3px solid var(--status-success, #10b981)"
      territory-locked: "border-left: 3px solid var(--status-warning, #f59e0b)"
      territory-archived: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/territory-item
  data:
    name: territory-item
    description: "Compact list item for territory"
    target_eidos: territory
    fields_to_display:
      - field: name
      - field: status
    layout_template: |
      <div class="list-item territory-item territory-{status}">
        <span class="territory-icon">🏛️</span>
        <span class="territory-name">{name}</span>
        <span class="status-dot status-{status}"></span>
      </div>
    style_bindings:
      territory-active: "font-weight: 600"
      territory-archived: "opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# PRESENCE RENDER SPECS (Agora spatial presence)
# =============================================================================

- eidos: render-spec
  id: render-spec/agora-presence-card
  data:
    name: agora-presence-card
    description: "Card view for agora presence — spatial position in territory"
    target_eidos: presence
    fields_to_display:
      - field: display_name
      - field: status
      - field: position
      - field: audio_enabled
      - field: video_enabled
    layout_template: |
      <article class="render-card agora-presence-card presence-{status}">
        <header class="card-header">
          <span class="avatar-placeholder status-{status}">👤</span>
          <span class="display-name">{display_name}</span>
        </header>
        <div class="card-body">
          <div class="status-row">
            <span class="status-badge status-{status}">{status}</span>
          </div>
          <div class="media-row">
            <span class="audio-indicator audio-{audio_enabled}">🎤</span>
            <span class="video-indicator video-{video_enabled}">📷</span>
          </div>
          <div class="position-row">
            <span class="position">{position}</span>
          </div>
        </div>
      </article>
    style_bindings:
      presence-active: "border-left: 3px solid var(--status-success, #10b981)"
      presence-away: "border-left: 3px solid var(--status-warning, #f59e0b)"
      presence-do-not-disturb: "border-left: 3px solid var(--status-error, #ef4444)"
      audio-true: "color: var(--status-success, #10b981)"
      audio-false: "color: var(--status-muted, #6b7280)"
      video-true: "color: var(--status-success, #10b981)"
      video-false: "color: var(--status-muted, #6b7280)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/agora-presence-item
  data:
    name: agora-presence-item
    description: "Compact avatar item for presence list"
    target_eidos: presence
    fields_to_display:
      - field: display_name
      - field: status
    layout_template: |
      <div class="list-item agora-presence-item presence-{status}">
        <span class="status-dot status-{status}"></span>
        <span class="display-name">{display_name}</span>
      </div>
    style_bindings:
      presence-active: "color: var(--status-success, #10b981)"
      presence-away: "color: var(--status-warning, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# LIVEKIT-SERVER RENDER SPECS (Infrastructure)
# =============================================================================

- eidos: render-spec
  id: render-spec/livekit-server-card
  data:
    name: livekit-server-card
    description: "Card view for livekit-server — real-time infrastructure"
    target_eidos: livekit-server
    fields_to_display:
      - field: host
      - field: status
      - field: ws_url
    layout_template: |
      <article class="render-card livekit-server-card server-{status}">
        <header class="card-header">
          <span class="server-icon">📡</span>
          <span class="server-label">LiveKit Server</span>
          <span class="status-indicator status-{status}"></span>
        </header>
        <div class="card-body">
          <div class="host-row">
            <span class="label">Host:</span>
            <code class="host">{host}</code>
          </div>
          <div class="url-row">
            <code class="ws-url">{ws_url}</code>
          </div>
        </div>
        <footer class="card-footer">
          <span class="status-label">{status}</span>
        </footer>
      </article>
    style_bindings:
      server-provisioning: "border-left: 3px solid var(--status-warning, #f59e0b)"
      server-running: "border-left: 3px solid var(--status-success, #10b981)"
      server-stopped: "border-left: 3px solid var(--status-muted, #6b7280)"
      server-error: "border-left: 3px solid var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# ROOM RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/room-card
  data:
    name: room-card
    description: "Card view for room — LiveKit communication room"
    target_eidos: room
    fields_to_display:
      - field: name
      - field: max_participants
      - field: recording_enabled
      - field: transcription_enabled
    layout_template: |
      <article class="render-card room-card">
        <header class="card-header">
          <span class="room-icon">🎙️</span>
          <span class="room-name">{name}</span>
        </header>
        <div class="card-body">
          <div class="capacity-row">
            <span class="label">Max:</span>
            <span class="max-participants">{max_participants}</span>
          </div>
          <div class="features-row">
            <span class="feature recording-{recording_enabled}">📹 Recording</span>
            <span class="feature transcription-{transcription_enabled}">📝 Transcription</span>
          </div>
        </div>
      </article>
    style_bindings:
      room-card: "border-left: 3px solid var(--room-color, #8b5cf6)"
      recording-true: "color: var(--status-success, #10b981)"
      recording-false: "color: var(--status-muted, #6b7280)"
      transcription-true: "color: var(--status-success, #10b981)"
      transcription-false: "color: var(--status-muted, #6b7280)"
    created_at: "2025-01-29T00:00:00Z"
