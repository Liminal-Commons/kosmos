# Topos Manifest: Release
# Artifact lifecycle — the journey from build to user
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: release
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Release
topos_description: |
  Artifact lifecycle — the journey from build to user. Release addresses
  the gap between built artifact and available download. Versioned artifacts,
  their distribution channels, and the pipeline from git commit to user download.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided: []   # Release lifecycle is an operation, not a surface
surfaces_consumed:
  - computation         # Uses dynamis for substrate capabilities
  - emission            # Uses thyra/emit for artifact distribution
  - reconciliation      # Uses dynamis/reconcile for release-artifact drift
  - reactivity          # Reflexes for release lifecycle mutation response
  - sensing             # Daemon: sense-releases (300s interval)

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: seeds/
    content_types: [distribution-channel]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]
  - path: reflexes/
    content_types: [reflex]
  - path: daemons/
    content_types: [daemon]
  - path: reconcilers/
    content_types: [reconciler]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather
  - db.update

provides:
  eide:
    - release
    - release-artifact
    - distribution-channel

  # Topos-centric rendering: release owns presentation for release entities
  renderable:
    - eidos: release
      description: "Release cards with version and status"
    - eidos: release-artifact
      description: "Artifact file cards with upload status"
    - eidos: distribution-channel
      description: "Distribution channel cards"

  attainments:
    - release           # Create and manage releases
    - publish-release   # Upload to channels

  seeds:
    - distribution-channel/thyra-r2
    - distribution-channel/github-releases

  desmoi:
    - contains-artifact  # release → release-artifact
    - distributed-via    # release → distribution-channel

  praxeis:
    - release/create-release
    - release/register-artifact
    - release/mark-built
    - release/distribute
    - release/sense-release
    - release/reconcile-release
    - release/list-releases
    - release/get-release

stoicheia_form:
  # All stoicheia currently arche-level

depends_on:
  - dynamis     # For substrate capabilities
  - hypostasis  # For signing releases
