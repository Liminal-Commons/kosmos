format_version: "2.1"
topos_id: ergon
version: "0.1.0"

topos_name: Work Coordination
topos_description: |
  Ergon — work coordination across discipline boundaries.

  Pragma entities signal gaps discovered in one oikos to another
  oikos with the capability to resolve them. This enables the
  two-repo workflow (kosmos/chora) where gaps discovered during
  dwelling flow as trackable entities rather than disappearing
  into conversation.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided:
  - coordination        # Cross-oikos work coordination via pragma
surfaces_consumed:
  - reactivity          # Reflexes for pragma/task mutation response

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: pragma/
    content_types: [pragma]
  - path: typos/
    content_types: [typos]
  - path: entities/
    content_types: [trigger, entity-mutation, bond-mutation]
  - path: reflexes/
    content_types: [reflex]
  - path: surfaces/
    content_types: [surface]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

depends_on:
  - politeia

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather
  - db.update

provides:
  eide:
    - pragma
    - reflex
    - trigger
    - mutation-event
    - entity-mutation
    - bond-mutation
    - daemon

  reflexes:
    - reflex/ergon/pragma-signaled
    - reflex/ergon/pragma-resolved

  # Topos-centric rendering: ergon owns presentation for pragma and reflex
  renderable:
    - eidos: pragma
      description: "Work item cards and detail views"
    - eidos: reflex
      description: "Autonomic response configuration cards"

  attainments:
    - signal             # Create pragma for other oikoi
    - work               # Manage pragma lifecycle

  desmoi:
    - signals-to
    - evidenced-by
    - blocks
    - resolves
    # Homoiconic reactive system
    - matches-event
    - filters-eidos
    - filters-desmos
    - triggered-by
    - responds-with

  praxeis:
    # Pragma lifecycle
    - ergon/create-pragma
    - ergon/list-pragma
    - ergon/accept-pragma
    - ergon/resolve-pragma
    - ergon/sense-pragma

stoicheia_form: {}
