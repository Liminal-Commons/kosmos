format_version: "2.1"
oikos_id: ergon
version: "0.1.0"

oikos_name: Work Coordination
oikos_description: |
  Ergon — work coordination across discipline boundaries.

  Pragma entities signal gaps discovered in one circle to another
  circle with the capability to resolve them. This enables the
  two-repo workflow (kosmos/chora) where gaps discovered during
  dwelling flow as trackable entities rather than disappearing
  into conversation.
oikos_scale: cross-scale

# Development experience metadata
oikos_category: infrastructure
surfaces_provided:
  - coordination        # Cross-circle work coordination via pragma
surfaces_consumed: []   # Foundational coordination layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: pragma/
    content_types: [pragma]
  - path: entities/
    content_types: [render-spec, reflex]

depends_on:
  - politeia

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather
  - db.update

provides:
  eide:
    - pragma
    - reflex

  reflexes:
    - reflex/ergon/pragma-signaled
    - reflex/ergon/pragma-resolved

  # Oikos-centric rendering: ergon owns presentation for pragma
  renderable:
    - eidos: pragma
      description: "Work item cards and detail views"

  attainments:
    - signal             # Create pragma for other circles
    - work               # Manage pragma lifecycle
    - configure-reflex   # Create and manage reflexes

  desmoi:
    - signals-to
    - evidenced-by
    - blocks
    - resolves

  praxeis:
    # Pragma lifecycle
    - ergon/create-pragma
    - ergon/list-pragma
    - ergon/accept-pragma
    - ergon/resolve-pragma
    # Reflex management
    - ergon/create-reflex
    - ergon/disable-reflex
    - ergon/list-reflexes

stoicheia_form: {}
