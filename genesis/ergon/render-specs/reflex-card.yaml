# Reflex Card Render-Spec
# Autonomic response configuration
#
# Reflex fields:
#   - name (string): Short identifier
#   - description (string): What this reflex does
#   - enabled (boolean): Whether active
#   - scope (enum): oikos | topos | global
#   - oikos_id (string): Oikos ID when scope is 'oikos'
#   - topos_id (string): Topos ID when scope is 'topos'
#
# Trigger and response expressed via bonds:
#   reflex --[triggered-by]--> trigger
#   reflex --[responds-with]--> praxis
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/reflex-card
    data:
      name: reflex-card
      description: |
        Autonomic response configuration card. Shows reflex trigger
        and response with enabled/disabled state.
      target_eidos: reflex
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
            # on_click: ergon/view-reflex — praxis not yet implemented
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header with enabled state
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          when: "enabled"
                          props:
                            name: zap
                            size: md
                            color: success
                        - widget: icon
                          when: "!enabled"
                          props:
                            name: zap
                            size: md

                        - widget: text
                          props:
                            content: "{name}"
                            variant: emphasis

                    # Enabled/disabled badge
                    - widget: badge
                      when: "enabled"
                      props:
                        content: "Active"
                        variant: success
                    - widget: badge
                      when: "!enabled"
                      props:
                        content: "Disabled"
                        variant: default

                # Description
                - widget: text
                  props:
                    content: "{description}"
                    variant: body

                # Scope indicator
                - widget: row
                  props:
                    gap: sm
                  children:
                    - widget: badge
                      props:
                        content: "{scope}"
                        variant: info

      created_at: "2026-02-03T00:00:00Z"
