# Ergon Eide — Work Coordination Entity Types
#
# Traces to: genesis/ergon/DESIGN.md
# Authorized by: expression/genesis-root

entities:

  # =========================================================================
  # pragma — a thing to be done
  # =========================================================================

  - eidos: eidos
    id: eidos/pragma
    data:
      name: pragma
      description: |
        πρᾶγμα — a thing to be done.

        A gap, issue, or work item that signals between circles. Created
        where the gap is discovered, resolved where the capability exists.

        Pragma flow across the discipline boundary:
        - Kosmos circle creates pragma (discovery)
        - Chora circle accepts and resolves (capability)
        - Resolution propagates back via shared graph

        This is the coordination primitive for the two-repo workflow where
        dwelling in one context (kosmos) discovers gaps requiring work in
        another context (chora).
      constitutional: false
      fields:
        title:
          type: string
          required: true
          description: Short description of the gap

        description:
          type: string
          required: true
          description: Full context — what you were trying to do, what failed

        context:
          type: string
          required: false
          description: The situation when gap was encountered

        status:
          type: enum
          values: [open, accepted, in_progress, resolved, declined, blocked]
          required: true
          default: open
          description: |
            Lifecycle state:
            - open: Newly created, awaiting attention
            - accepted: Someone has taken ownership
            - in_progress: Actively being worked on
            - resolved: Gap has been addressed
            - declined: Will not be addressed (with reason in resolution)
            - blocked: Cannot proceed until blocker is resolved

        priority:
          type: enum
          values: [critical, high, normal, low]
          required: false
          default: normal
          description: |
            How urgent:
            - critical: Blocks current work, needs immediate attention
            - high: Important, should be addressed soon
            - normal: Standard priority
            - low: Nice-to-have, address when convenient

        resolution:
          type: string
          required: false
          description: How the pragma was resolved (filled when status=resolved or declined)

        created_at:
          type: timestamp
          required: true

        resolved_at:
          type: timestamp
          required: false

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/signal
    data:
      name: signal
      description: |
        Signal capability — creating gaps for other circles' attention.
        Enables creating pragma that signal to target circles where the
        capability to resolve them exists. Requires membership in the
        discovering circle.
      oikos: ergon
      scope: circle
      grants:
        - praxis/ergon/create-pragma

  - eidos: attainment
    id: attainment/work
    data:
      name: work
      description: |
        Work capability — managing pragma lifecycle.
        Enables listing, accepting, and resolving pragma signaled to
        a circle. Requires membership in the target circle to manage
        work items.
      oikos: ergon
      scope: circle
      grants:
        - praxis/ergon/list-pragma
        - praxis/ergon/accept-pragma
        - praxis/ergon/resolve-pragma

  # =========================================================================
  # reflex — autonomic response to graph mutations
  # =========================================================================

  - eidos: eidos
    id: eidos/reflex
    data:
      name: reflex
      description: |
        Autonomic response to graph mutations.

        A reflex fires automatically when a graph mutation matches its
        trigger pattern. This implements the somatic architecture principle:
        the system feels its state and responds without explicit invocation.

        Reflexes close the loop between change detection and response:
          Graph mutation → Trigger match → Response praxis fires

        Use cases:
        - Update oikos manifest when artifacts are added
        - Validate praxis when it changes
        - Notify when pragma arrives
        - Auto-register MCP tools during oikos development

        Reflexes complement the cursor model:
        - Cursor: What's new for Claude to observe?
        - Reflex: What should the system do automatically?
      constitutional: false
      fields:
        name:
          type: string
          required: true
          description: Short identifier for the reflex

        description:
          type: string
          required: true
          description: What this reflex does and why

        trigger:
          type: object
          required: true
          description: |
            Pattern that activates this reflex. Structure:
              event: entity_created | entity_updated | entity_deleted |
                     bond_created | bond_updated | bond_deleted
              eidos: Entity type filter (for entity events)
              desmos: Bond type filter (for bond events)
              from_eidos: Source entity type (for bond events)
              to_eidos: Target entity type(s) (for bond events)
              condition: Expression evaluated against mutation context

        response:
          type: object
          required: true
          description: |
            Action to take when trigger matches. Structure:
              praxis: Praxis ID to invoke
              params: Parameters (can reference $from, $to, $entity, $bond)

        enabled:
          type: boolean
          required: false
          default: true
          description: Whether this reflex is active

        scope:
          type: enum
          values: [circle, oikos, global]
          required: false
          default: global
          description: |
            Where this reflex applies:
            - circle: Only mutations within a specific circle
            - oikos: Only mutations involving entities of an oikos
            - global: All matching mutations

        circle_id:
          type: string
          required: false
          description: Circle ID when scope is 'circle'

        oikos_id:
          type: string
          required: false
          description: Oikos ID when scope is 'oikos'

  # =========================================================================
  # REFLEX ATTAINMENT
  # =========================================================================

  - eidos: attainment
    id: attainment/configure-reflex
    data:
      name: configure-reflex
      description: |
        Reflex configuration capability — creating and managing reflexes.
        This is a privileged operation as reflexes can invoke arbitrary
        praxeis in response to graph mutations.
      oikos: ergon
      scope: circle
      grants:
        - praxis/ergon/create-reflex
        - praxis/ergon/disable-reflex
        - praxis/ergon/list-reflexes
