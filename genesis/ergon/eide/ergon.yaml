# Ergon Eide — Work Coordination Entity Types
#
# Traces to: genesis/ergon/DESIGN.md
# Authorized by: phasis/genesis-root

entities:

  # =========================================================================
  # pragma — a thing to be done
  # =========================================================================

  - eidos: eidos
    id: eidos/pragma
    data:
      name: pragma
      description: |
        πρᾶγμα — a thing to be done.

        A gap, issue, or work item that signals between oikoi. Created
        where the gap is discovered, resolved where the capability exists.

        Pragma flow across the discipline boundary:
        - Kosmos oikos creates pragma (discovery)
        - Chora oikos accepts and resolves (capability)
        - Resolution propagates back via shared graph

        This is the coordination primitive for the two-repo workflow where
        dwelling in one context (kosmos) discovers gaps requiring work in
        another context (chora).
      constitutional: false
      fields:
        title:
          type: string
          required: true
          description: Short description of the gap

        description:
          type: string
          required: true
          description: Full context — what you were trying to do, what failed

        context:
          type: string
          required: false
          description: The situation when gap was encountered

        status:
          type: enum
          values: [open, accepted, in_progress, resolved, declined, blocked]
          required: true
          default: open
          description: |
            Lifecycle state:
            - open: Newly created, awaiting attention
            - accepted: Someone has taken ownership
            - in_progress: Actively being worked on
            - resolved: Gap has been addressed
            - declined: Will not be addressed (with reason in resolution)
            - blocked: Cannot proceed until blocker is resolved

        priority:
          type: enum
          values: [critical, high, normal, low]
          required: false
          default: normal
          description: |
            How urgent:
            - critical: Blocks current work, needs immediate attention
            - high: Important, should be addressed soon
            - normal: Standard priority
            - low: Nice-to-have, address when convenient

        resolution:
          type: string
          required: false
          description: How the pragma was resolved (filled when status=resolved or declined)

        created_at:
          type: timestamp
          required: true

        resolved_at:
          type: timestamp
          required: false

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/signal
    data:
      name: signal
      description: |
        Signal capability — creating gaps for other oikoi's attention.
        Enables creating pragma that signal to target oikoi where the
        capability to resolve them exists. Requires membership in the
        discovering oikos.
      topos: ergon
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/ergon/create-pragma }

  - eidos: attainment
    id: attainment/work
    data:
      name: work
      description: |
        Work capability — managing pragma lifecycle.
        Enables listing, accepting, and resolving pragma signaled to
        an oikos. Requires membership in the target oikos to manage
        work items.
      topos: ergon
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/ergon/list-pragma }
      - { desmos: grants-praxis, to: praxis/ergon/accept-pragma }
      - { desmos: grants-praxis, to: praxis/ergon/resolve-pragma }

  # =========================================================================
  # reflex — autonomic response to graph mutations
  # =========================================================================

  - eidos: eidos
    id: eidos/reflex
    data:
      name: reflex
      description: |
        Autonomic response to graph mutations.

        A reflex fires automatically when a graph mutation matches its
        trigger pattern. This implements the somatic architecture principle:
        the system feels its state and responds without explicit invocation.

        Reflexes close the loop between change detection and response:
          Graph mutation → Trigger match → Response praxis fires

        Use cases:
        - Update topos manifest when artifacts are added
        - Validate praxis when it changes
        - Notify when pragma arrives
        - Auto-register MCP tools during topos development

        Reflexes complement the cursor model:
        - Cursor: What's new for Claude to observe?
        - Reflex: What should the system do automatically?
      constitutional: false
      fields:
        name:
          type: string
          required: true
          description: Short identifier for the reflex

        description:
          type: string
          required: true
          description: What this reflex does and why

        enabled:
          type: boolean
          required: false
          default: true
          description: Whether this reflex is active

        scope:
          type: enum
          values: [oikos, topos, global]
          required: false
          default: global
          description: |
            Where this reflex applies:
            - oikos: Only mutations within a specific oikos
            - topos: Only mutations involving entities of a topos
            - global: All matching mutations

        oikos_id:
          type: string
          required: false
          description: Oikos ID when scope is 'oikos'

        topos_id:
          type: string
          required: false
          description: Topos ID when scope is 'topos'

  # =========================================================================
  # daemon — periodic background task
  # =========================================================================

  - eidos: eidos
    id: eidos/daemon
    data:
      name: daemon
      description: |
        Background task that periodically invokes a praxis.

        Daemons are discovered at bootstrap and spawned as periodic tasks.
        Each daemon declares a praxis to invoke and an interval in seconds.
        On failure, backoff doubles (capped at backoff_max). On success,
        interval resets.

        The daemon runner is generic substrate infrastructure. Sensing
        daemons combined with drift-detection reflexes replace the need
        for custom reconciliation engines.
      constitutional: false
      fields:
        name:
          type: string
          required: true
          description: Short identifier for this daemon

        description:
          type: string
          required: false
          description: What this daemon does and why

        praxis:
          type: string
          required: true
          description: |
            Praxis ID to invoke periodically.
            Must exist at bootstrap time (validated on load).

        interval:
          type: number
          required: true
          description: Seconds between invocations

        enabled:
          type: boolean
          required: false
          default: true
          description: Whether this daemon is active

        scope:
          type: enum
          values: [global, dwelling, topos]
          required: false
          default: global
          description: Where this daemon applies

        backoff_max:
          type: number
          required: false
          description: Maximum backoff interval in seconds (caps exponential backoff on failure)

        status:
          type: enum
          values: [running, stopped, errored]
          required: false
          default: stopped
          description: Current daemon status (set by runner, not by author)

