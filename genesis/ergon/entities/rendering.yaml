# Ergon Render Specifications
#
# Rendering definitions for ergon eide: pragma
# Oikos-centric: ergon owns presentation for work coordination entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# PRAGMA RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/pragma-card
  data:
    name: pragma-card
    description: "Card view for pragma — work items"
    target_eidos: pragma
    fields_to_display:
      - field: title
        label: Title
      - field: status
        label: Status
      - field: priority
        label: Priority
      - field: description
        label: Description
    layout_template: |
      <article class="render-card pragma-card pragma-{status} priority-{priority}">
        <header class="card-header">
          <h3 class="pragma-title">{title}</h3>
          <div class="badge-row">
            <span class="status-badge status-{status}">{status}</span>
            <span class="priority-badge priority-{priority}">{priority}</span>
          </div>
        </header>
        <div class="card-body">
          <p class="description">{description}</p>
        </div>
        <footer class="card-footer">
          <span class="entity-id">{id}</span>
        </footer>
      </article>
    style_bindings:
      pragma-open: "border-left: 4px solid var(--status-info, #3b82f6)"
      pragma-accepted: "border-left: 4px solid var(--status-warning, #f59e0b)"
      pragma-in_progress: "border-left: 4px solid var(--status-active, #8b5cf6)"
      pragma-resolved: "border-left: 4px solid var(--status-success, #10b981)"
      pragma-declined: "border-left: 4px solid var(--status-error, #ef4444)"
      pragma-blocked: "border-left: 4px solid var(--status-blocked, #dc2626)"
      status-open: "background: var(--bg-info, #dbeafe); color: var(--text-info, #1e40af)"
      status-accepted: "background: var(--bg-warning, #fef3c7); color: var(--text-warning, #92400e)"
      status-in_progress: "background: var(--bg-active, #ede9fe); color: var(--text-active, #5b21b6)"
      status-resolved: "background: var(--bg-success, #d1fae5); color: var(--text-success, #065f46)"
      status-declined: "background: var(--bg-error, #fee2e2); color: var(--text-error, #991b1b)"
      status-blocked: "background: var(--bg-blocked, #fecaca); color: var(--text-blocked, #991b1b)"
      priority-critical: "font-weight: bold"
      priority-high: "font-weight: 600"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/pragma
  data:
    name: pragma-detail
    description: "Detail view for pragma — full work item"
    target_eidos: pragma
    fields_to_display:
      - field: title
      - field: description
      - field: context
      - field: status
      - field: priority
      - field: resolution
    layout_template: |
      <article class="render-detail pragma-detail pragma-{status}">
        <header class="detail-header">
          <h2 class="pragma-title">{title}</h2>
          <div class="badge-row">
            <span class="status-badge status-{status}">{status}</span>
            <span class="priority-badge priority-{priority}">{priority}</span>
          </div>
        </header>
        <section class="detail-body">
          <div class="section">
            <label>Description</label>
            <p>{description}</p>
          </div>
          <div class="section">
            <label>Context</label>
            <p>{context}</p>
          </div>
          <div class="section resolution-section">
            <label>Resolution</label>
            <p>{resolution}</p>
          </div>
          <div class="meta-row">
            <code class="entity-id">{id}</code>
          </div>
        </section>
      </article>
    style_bindings:
      pragma-resolved: "background: var(--bg-success-subtle, #f0fdf4)"
      pragma-blocked: "background: var(--bg-error-subtle, #fef2f2)"
    created_at: "2025-01-29T00:00:00Z"
