# Aither Eide
# αἰθήρ — the upper air, the pure element. Network transport.
#
# WebRTC connectivity eide — signaling, channels, syndesmos, presence

entities:
  # signaling-session — WebSocket connection for SDP exchange
  - eidos: eidos
    id: eidos/signaling-session
    data:
      name: signaling-session
      description: "WebSocket connection to propylon-relay for WebRTC signaling."
      fields:
        room_id:
          type: string
          required: true
          description: "The room to join on the relay"
        relay_url:
          type: string
          required: true
          description: "WebSocket URL of propylon-relay"
        role:
          type: string
          required: true
          description: "Role in the room: offerer, answerer"
        intent:
          type: string
          required: true
          description: "Desired state: connected, disconnected"
        status:
          type: string
          required: true
          description: "Actual state: connecting, connected, disconnected, failed"
        session_handle:
          type: string
          required: false
          description: "Internal session ID when connected"
        connected_at:
          type: timestamp
          required: false
        disconnected_at:
          type: timestamp
          required: false
      actuality:
        mode: signaling

  # data-channel — WebRTC P2P data channel
  - eidos: eidos
    id: eidos/data-channel
    data:
      name: data-channel
      description: "WebRTC peer-to-peer data channel for entity synchronization."
      fields:
        channel_id:
          type: string
          required: true
          description: "Unique channel identifier"
        remote_chora:
          type: string
          required: false
          description: "ID of the remote chora"
        intent:
          type: string
          required: true
          description: "Desired state: connected, disconnected"
        status:
          type: string
          required: true
          description: "Actual state: new, connecting, connected, disconnected, failed"
        sdp_offer:
          type: string
          required: false
          description: "SDP offer (if we're offerer)"
        sdp_answer:
          type: string
          required: false
          description: "SDP answer (if we're answerer)"
        signaling_session_id:
          type: string
          required: false
          description: "The signaling session used to establish this channel"
        created_at:
          type: timestamp
          required: true
        connected_at:
          type: timestamp
          required: false
        disconnected_at:
          type: timestamp
          required: false
        last_message_at:
          type: timestamp
          required: false
      actuality:
        mode: network

  # syndesmos — desired connection to peer/room with reconciliation
  - eidos: eidos
    id: eidos/syndesmos
    data:
      name: syndesmos
      description: |
        A desired connection to another peer or room.
        Reconciles intent with actual network state via the dynamis pattern.
        Handles reconnection with exponential backoff.
      fields:
        peer_id:
          type: string
          required: false
          description: "Remote peer identifier (if known)"
        room_id:
          type: string
          required: true
          description: "Signaling room ID for the connection"
        oikos_id:
          type: string
          required: false
          description: "Oikos context for this connection"
        intent:
          type: string
          required: true
          enum: [connected, disconnected, suspended]
          default: connected
          description: "Desired connection state"
        status:
          type: string
          required: true
          enum: [disconnected, connecting, connected, reconnecting, failed, suspended]
          default: disconnected
          description: "Actual connection state"
        retry_count:
          type: integer
          default: 0
          description: "Number of reconnection attempts"
        next_retry_at:
          type: timestamp
          required: false
          description: "Next scheduled reconnection attempt"
        max_retries:
          type: integer
          default: 10
          description: "Maximum reconnection attempts"
        backoff_ms:
          type: integer
          default: 1000
          description: "Current backoff interval in milliseconds"
        last_connected_at:
          type: timestamp
          required: false
        last_error:
          type: string
          required: false
          description: "Last error message if failed"
        created_at:
          type: timestamp
          required: true
      actuality:
        mode: network

  # outbound-message — queued message for offline delivery
  - eidos: eidos
    id: eidos/outbound-message
    data:
      name: outbound-message
      description: |
        Message queued for delivery when offline or channel unavailable.
        Created when send fails, delivered when connection restores.
      fields:
        target_peer:
          type: string
          required: true
          description: "Peer ID or room ID to deliver to"
        message_type:
          type: string
          required: true
          enum: [phoreta, content-sync, presence-update, phasis]
          description: "Type of message for routing"
        content:
          type: string
          required: true
          description: "JSON-encoded message payload"
        status:
          type: string
          required: true
          enum: [pending, sending, delivered, failed, expired]
          default: pending
        attempts:
          type: integer
          default: 0
        max_attempts:
          type: integer
          default: 3
        created_at:
          type: timestamp
          required: true
        expires_at:
          type: timestamp
          required: false
          description: "Message TTL (default 24h)"
        delivered_at:
          type: timestamp
          required: false
        last_attempt_at:
          type: timestamp
          required: false
        last_error:
          type: string
          required: false

  # presence-record — ephemeral presence in room/oikos
  - eidos: eidos
    id: eidos/presence-record
    data:
      name: presence-record
      description: |
        Ephemeral presence in a room or oikos.
        Updated via heartbeat, expires after timeout.
      fields:
        prosopon_id:
          type: string
          required: true
          description: "Prosopon whose presence this represents"
        oikos_id:
          type: string
          required: false
          description: "Oikos where present"
        room_id:
          type: string
          required: false
          description: "Signaling room where present"
        status:
          type: string
          required: true
          enum: [online, away, busy, offline]
          default: online
        last_heartbeat:
          type: timestamp
          required: true
        connected_at:
          type: timestamp
          required: false
        heartbeat_interval_ms:
          type: integer
          default: 30000
          description: "Heartbeat interval in milliseconds"
        expire_after_ms:
          type: integer
          default: 90000
          description: "Expire presence after this many ms without heartbeat"

  # sync-message — P2P sync envelope for real-time updates
  - eidos: eidos
    id: eidos/sync-message
    data:
      name: sync-message
      description: |
        Envelope for P2P synchronization messages.
        Used for real-time entity updates between peers
        and catch-up sync after reconnection.
      fields:
        type:
          type: string
          required: true
          enum: [phasis, entity, presence, catch-up-request, catch-up-response]
          description: "Type of sync message"
        action:
          type: string
          required: true
          enum: [create, update, delete, request, response]
          description: "Action being synced"
        entity:
          type: object
          required: false
          description: "The entity being synced (for create/update)"
        entities:
          type: array
          required: false
          description: "Multiple entities (for catch-up-response)"
        oikos_id:
          type: string
          required: true
          description: "Oikos context for this sync"
        timestamp:
          type: timestamp
          required: true
          description: "When the sync message was created"
        sender_id:
          type: string
          required: true
          description: "Prosopon ID of the sender"
        since:
          type: timestamp
          required: false
          description: "For catch-up-request: fetch entities since this time"
        processed:
          type: boolean
          required: false
          default: false
          description: "Whether this message has been processed by a reflex"

  # ============================================================================
  # ATTAINMENTS
  # ============================================================================

  # connect — establishing and managing network connections
  - eidos: attainment
    id: attainment/connect
    data:
      name: connect
      topos: aither
      scope: soma
      description: |
        Connection capability — establishing and managing network connections.
        Substrate-local because network interfaces belong to the soma.
    bonds:
      - { desmos: grants-praxis, to: praxis/aither/connect-signaling }
      - { desmos: grants-praxis, to: praxis/aither/disconnect-signaling }
      - { desmos: grants-praxis, to: praxis/aither/send-offer }
      - { desmos: grants-praxis, to: praxis/aither/send-answer }
      - { desmos: grants-praxis, to: praxis/aither/create-channel }
      - { desmos: grants-praxis, to: praxis/aither/accept-answer }
      - { desmos: grants-praxis, to: praxis/aither/answer-channel }
      - { desmos: grants-praxis, to: praxis/aither/close-channel }
      - { desmos: grants-praxis, to: praxis/aither/reconcile-channel }
      - { desmos: grants-praxis, to: praxis/aither/ensure-connection }
      - { desmos: grants-praxis, to: praxis/aither/attempt-reconnect }
      - { desmos: grants-praxis, to: praxis/aither/disconnect-syndesmos }

  # message — sending and receiving through channels
  - eidos: attainment
    id: attainment/message
    data:
      name: message
      topos: aither
      scope: soma
      description: |
        Messaging capability — sending and receiving through channels.
        Requires an established connection on this substrate.
    bonds:
      - { desmos: grants-praxis, to: praxis/aither/send-message }
      - { desmos: grants-praxis, to: praxis/aither/receive-messages }
      - { desmos: grants-praxis, to: praxis/aither/queue-message }
      - { desmos: grants-praxis, to: praxis/aither/flush-queue }

  # presence — tracking who is here
  - eidos: attainment
    id: attainment/presence
    data:
      name: presence
      topos: aither
      scope: oikos
      description: |
        Presence capability — tracking who is here.
        Oikos-scoped because presence visibility follows membership.
    bonds:
      - { desmos: grants-praxis, to: praxis/aither/update-presence }
      - { desmos: grants-praxis, to: praxis/aither/heartbeat }
      - { desmos: grants-praxis, to: praxis/aither/expire-stale-presence }
      - { desmos: grants-praxis, to: praxis/aither/list-presence }

  # sync — P2P entity replication
  - eidos: attainment
    id: attainment/sync
    data:
      name: sync
      description: |
        Synchronization capability — P2P entity replication.
        Oikos-scoped because sync operates on oikos data.
      topos: aither
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/aither/broadcast-sync }
      - { desmos: grants-praxis, to: praxis/aither/receive-sync }
      - { desmos: grants-praxis, to: praxis/aither/request-catch-up }

  # sense — reading connection and signaling state
  - eidos: attainment
    id: attainment/sense
    data:
      name: sense
      topos: aither
      scope: soma
      description: |
        Sense capability — reading connection and signaling state.
        Read-only access for debugging and monitoring.
    bonds:
      - { desmos: grants-praxis, to: praxis/aither/sense-signaling }
      - { desmos: grants-praxis, to: praxis/aither/poll-signaling }
      - { desmos: grants-praxis, to: praxis/aither/sense-channel }
      - { desmos: grants-praxis, to: praxis/aither/list-channels }
      - { desmos: grants-praxis, to: praxis/aither/list-connections }
