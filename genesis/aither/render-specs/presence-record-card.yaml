# Aither Render Specifications — presence-record card
# Who is here — ephemeral presence display
#
# Presence-record fields:
#   - prosopon_id (string): Prosopon whose presence this represents
#   - oikos_id (string): Oikos where present
#   - status (enum): online | away | busy | offline
#   - last_heartbeat (timestamp): Last heartbeat time
#
# Traces to: genesis/aither/eide/aither.yaml § presence-record

entities:

  - eidos: render-spec
    id: render-spec/presence-record-card
    data:
      name: presence-record-card
      description: "Card view for presence-record — who is here with heartbeat info."
      target_eidos: presence-record
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header with presence indicator and prosopon
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: status-indicator
                          props:
                            status: "{status}"
                        - widget: text
                          props:
                            content: "{prosopon_id}"
                            variant: emphasis

                    # Status badge
                    - widget: badge
                      when: "status == 'online'"
                      props:
                        content: "Online"
                        variant: success
                    - widget: badge
                      when: "status == 'away'"
                      props:
                        content: "Away"
                        variant: warning
                    - widget: badge
                      when: "status == 'busy'"
                      props:
                        content: "Busy"
                        variant: error
                    - widget: badge
                      when: "status == 'offline'"
                      props:
                        content: "Offline"
                        variant: default

                # Oikos context
                - widget: row
                  when: "oikos_id"
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: text
                      props:
                        content: "In:"
                        variant: label
                    - widget: text
                      props:
                        content: "{oikos_id}"
                        variant: body

                # Heartbeat
                - widget: text
                  props:
                    content: "Heartbeat {last_heartbeat}"
                    variant: caption

      created_at: "2026-02-09T00:00:00Z"
