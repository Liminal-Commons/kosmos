# Aither Render Specifications
#
# Rendering definitions for aither eide: syndesmos, data-channel, presence-record
# Oikos-centric: aither owns presentation for network transport entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# SYNDESMOS RENDER SPECS (Primary connection state)
# =============================================================================

- eidos: render-spec
  id: render-spec/syndesmos-card
  data:
    name: syndesmos-card
    description: "Card view for syndesmos — desired connection state"
    target_eidos: syndesmos
    fields_to_display:
      - field: peer_id
      - field: room_id
      - field: intent
      - field: status
      - field: retry_count
      - field: last_connected_at
    layout_template: |
      <article class="render-card syndesmos-card syndesmos-{status}">
        <header class="card-header">
          <span class="syndesmos-icon status-{status}">⚡</span>
          <span class="intent-badge intent-{intent}">{intent}</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="peer-row">
            <span class="label">Peer:</span>
            <span class="peer-id">{peer_id}</span>
          </div>
          <div class="room-row">
            <span class="label">Room:</span>
            <span class="room-id">{room_id}</span>
          </div>
          <div class="retry-row">
            <span class="retry-count">{retry_count} retries</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="last-connected">Last connected {last_connected_at}</span>
        </footer>
      </article>
    style_bindings:
      syndesmos-disconnected: "border-left: 3px solid var(--status-muted, #6b7280)"
      syndesmos-connecting: "border-left: 3px solid var(--status-warning, #f59e0b)"
      syndesmos-connected: "border-left: 3px solid var(--status-success, #10b981)"
      syndesmos-reconnecting: "border-left: 3px solid var(--status-warning, #f59e0b); animation: pulse 1s infinite"
      syndesmos-failed: "border-left: 3px solid var(--status-error, #ef4444)"
      syndesmos-suspended: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/syndesmos-item
  data:
    name: syndesmos-item
    description: "Compact status indicator for syndesmos"
    target_eidos: syndesmos
    fields_to_display:
      - field: peer_id
      - field: status
    layout_template: |
      <div class="list-item syndesmos-item syndesmos-{status}">
        <span class="status-dot status-{status}"></span>
        <span class="peer-id">{peer_id}</span>
        <span class="status-label">{status}</span>
      </div>
    style_bindings:
      syndesmos-connected: "color: var(--status-success, #10b981)"
      syndesmos-connecting: "color: var(--status-warning, #f59e0b)"
      syndesmos-failed: "color: var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# DATA-CHANNEL RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/data-channel-card
  data:
    name: data-channel-card
    description: "Card view for data-channel — P2P data channel"
    target_eidos: data-channel
    fields_to_display:
      - field: channel_id
      - field: remote_chora
      - field: intent
      - field: status
      - field: last_message_at
    layout_template: |
      <article class="render-card data-channel-card channel-{status}">
        <header class="card-header">
          <span class="channel-icon status-{status}">📡</span>
          <span class="channel-label">Data Channel</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="channel-row">
            <span class="label">Channel:</span>
            <code class="channel-id">{channel_id}</code>
          </div>
          <div class="remote-row">
            <span class="label">Remote:</span>
            <span class="remote-chora">{remote_chora}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="last-message">Last message {last_message_at}</span>
        </footer>
      </article>
    style_bindings:
      channel-new: "border-left: 3px solid var(--status-muted, #6b7280)"
      channel-connecting: "border-left: 3px solid var(--status-warning, #f59e0b)"
      channel-connected: "border-left: 3px solid var(--status-success, #10b981)"
      channel-disconnected: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.7"
      channel-failed: "border-left: 3px solid var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# PRESENCE-RECORD RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/presence-record-card
  data:
    name: presence-record-card
    description: "Card view for presence-record — who is here"
    target_eidos: presence-record
    fields_to_display:
      - field: persona_id
      - field: circle_id
      - field: status
      - field: last_heartbeat
    layout_template: |
      <article class="render-card presence-record-card presence-{status}">
        <header class="card-header">
          <span class="presence-icon status-{status}">●</span>
          <span class="persona-id">{persona_id}</span>
        </header>
        <div class="card-body">
          <div class="circle-row">
            <span class="label">In:</span>
            <span class="circle-id">{circle_id}</span>
          </div>
          <div class="status-row">
            <span class="status-badge status-{status}">{status}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="heartbeat">Heartbeat {last_heartbeat}</span>
        </footer>
      </article>
    style_bindings:
      presence-online: "border-left: 3px solid var(--status-success, #10b981)"
      presence-away: "border-left: 3px solid var(--status-warning, #f59e0b)"
      presence-busy: "border-left: 3px solid var(--status-error, #ef4444)"
      presence-offline: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/presence-record-item
  data:
    name: presence-record-item
    description: "Compact presence indicator"
    target_eidos: presence-record
    fields_to_display:
      - field: persona_id
      - field: status
    layout_template: |
      <div class="list-item presence-record-item presence-{status}">
        <span class="presence-dot status-{status}"></span>
        <span class="persona-id">{persona_id}</span>
      </div>
    style_bindings:
      presence-online: "color: var(--status-success, #10b981)"
      presence-away: "color: var(--status-warning, #f59e0b)"
      presence-busy: "color: var(--status-error, #ef4444)"
      presence-offline: "opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# OUTBOUND-MESSAGE RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/outbound-message-card
  data:
    name: outbound-message-card
    description: "Card view for outbound-message — queued for delivery"
    target_eidos: outbound-message
    fields_to_display:
      - field: target_peer
      - field: message_type
      - field: status
      - field: attempts
      - field: expires_at
    layout_template: |
      <article class="render-card outbound-message-card message-{status}">
        <header class="card-header">
          <span class="message-icon type-{message_type}">📤</span>
          <span class="message-type">{message_type}</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="target-row">
            <span class="label">To:</span>
            <span class="target-peer">{target_peer}</span>
          </div>
          <div class="attempts-row">
            <span class="attempts">{attempts} attempts</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="expires-at">Expires {expires_at}</span>
        </footer>
      </article>
    style_bindings:
      message-pending: "border-left: 3px solid var(--status-warning, #f59e0b)"
      message-sending: "border-left: 3px solid var(--status-active, #3b82f6)"
      message-delivered: "border-left: 3px solid var(--status-success, #10b981)"
      message-failed: "border-left: 3px solid var(--status-error, #ef4444)"
      message-expired: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/outbound-message-item
  data:
    name: outbound-message-item
    description: "Compact queue item for outbound-message"
    target_eidos: outbound-message
    fields_to_display:
      - field: message_type
      - field: status
    layout_template: |
      <div class="list-item outbound-message-item message-{status}">
        <span class="message-icon">📤</span>
        <span class="message-type">{message_type}</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      message-pending: "font-weight: 600"
      message-failed: "color: var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"
