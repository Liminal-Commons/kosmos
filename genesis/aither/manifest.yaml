# Topos Manifest: Aither
# αἰθήρ — the upper air, the pure element. Network transport.
#
# P2P connections via WebRTC. The transport layer that doesn't
# know about oikoi or governance (that's syndesmos).
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: aither
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Aither
topos_description: |
  The upper air, the pure element. Network transport via P2P WebRTC
  connections. The transport layer that doesn't know about oikoi
  or governance (that's syndesmos).
topos_scale: physis

# Development experience metadata
topos_category: interface
surfaces_provided:
  - transport           # P2P WebRTC connectivity
surfaces_consumed:
  - reconciliation      # Uses dynamis/reconcile for connection drift
  - reactivity          # Reflexes for connection state mutation response
  - sensing             # Daemon: sense-syndesmos (30s interval)

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: reflexes/
    content_types: [reflex]
  - path: surfaces/
    content_types: [surface]
  - path: daemons/
    content_types: [daemon]
  - path: reconcilers/
    content_types: [reconciler]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.update
  - db.gather
  - webrtc.manifest       # Create peer connections
  - webrtc.sense          # Query connection state
  - webrtc.unmanifest     # Close connections
  - webrtc.signal         # Send/receive SDP, ICE

provides:
  eide:
    - data-channel
    - signaling-session
    - syndesmos
    - outbound-message
    - presence-record
    - sync-message

  reflexes:
    - reflex/aither/sync-message-received

  # Topos-centric rendering: aither owns presentation for network entities
  renderable:
    - eidos: syndesmos
      description: "Connection state cards and indicators"
    - eidos: data-channel
      description: "P2P channel status display"
    - eidos: presence-record
      description: "Presence indicators"
    - eidos: outbound-message
      description: "Message queue display"

  attainments:
    - connect          # Establish and manage network connections
    - message          # Send/receive through channels
    - presence         # Track who is here (oikos-scoped)
    - sync             # P2P entity replication (oikos-scoped)
    - sense            # Read connection state

  desmoi:
    - bootstrapped-by
    - queued-for
    - present-in-oikos
    - connected-via
    - presence-of
    - targets-peer

  praxeis:
    # Signaling operations
    - aither/connect-signaling
    - aither/disconnect-signaling
    - aither/sense-signaling
    - aither/poll-signaling
    - aither/send-offer
    - aither/send-answer
    # Data channel operations
    - aither/create-channel
    - aither/accept-answer
    - aither/answer-channel
    - aither/close-channel
    - aither/sense-channel
    - aither/reconcile-channel
    - aither/send-message
    - aither/receive-messages
    - aither/list-channels
    # Syndesmos (connection state) operations
    - aither/ensure-connection
    - aither/attempt-reconnect
    - aither/disconnect-syndesmos
    - aither/list-connections
    # Offline queue operations
    - aither/queue-message
    - aither/flush-queue
    # Presence operations
    - aither/update-presence
    - aither/heartbeat
    - aither/expire-stale-presence
    - aither/list-presence
    # Sync operations (C8.4/C8.5)
    - aither/broadcast-sync
    - aither/receive-sync
    - aither/apply-phasis-sync
    - aither/request-catch-up
    - aither/respond-catch-up
    - aither/apply-catch-up
    # Reflex response praxeis (internal)
    - aither/process-sync-message
    - aither/apply-entity-sync

depends_on:
  - syndesmos            # Connection state and sync (extracted from aither)
