# Ekdosis Render Specifications — oikos-release item
# Compact list item for oikos-release navigation
#
# Uses widget vocabulary from thyra/eide/widget.yaml
# Replaces the HTML template format in ekdosis/entities/rendering.yaml
#
# Oikos-release fields (from ekdosis/eide/ekdosis.yaml):
#   - version (string, required): Semantic version
#   - channel (enum: stable, beta, alpha, canary): Release channel
#   - published_at (timestamp, required): Publication time
#
# Traces to: genesis/ekdosis/DESIGN.md

entities:

  - eidos: render-spec
    id: render-spec/oikos-release-item
    data:
      name: oikos-release-item
      description: |
        Compact list item for oikos-release.
        Shows version, channel badge, and publication time.
      target_eidos: oikos-release
      variant: item

      layout:
        - widget: row
          props:
            gap: sm
            align: center
            justify: between
          children:
            # Left group: icon + version + channel
            - widget: row
              props:
                gap: sm
                align: center
              children:
                - widget: icon
                  props:
                    name: package

                - widget: text
                  props:
                    content: "v{version}"
                    variant: emphasis

                # Channel badges
                - widget: badge
                  when: "channel == 'stable'"
                  props:
                    content: "stable"
                    variant: success
                - widget: badge
                  when: "channel == 'beta'"
                  props:
                    content: "beta"
                    variant: info
                - widget: badge
                  when: "channel == 'alpha'"
                  props:
                    content: "alpha"
                    variant: warning
                - widget: badge
                  when: "channel == 'canary'"
                  props:
                    content: "canary"
                    variant: error

            # Right: timestamp
            - widget: text
              props:
                content: "{published_at}"
                variant: caption

      created_at: "2025-02-09T00:00:00Z"
