# Topos Manifest: Psyche
# ψυχή — the experiencing self — attention, intention, mood, perceptual-field, prospect, kairos
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: psyche
version: "0.2.0"

# Topos metadata (v2.1)
topos_name: Psyche
topos_description: |
  The experiencing self. Provides attention (where focus rests),
  intention (what is being pursued), mood (how the world shows up),
  perceptual-field (awareness of the portal through which experience flows),
  and temporal texture (prospect and kairos).
topos_scale: psyche

# Development experience metadata
topos_category: domain
surfaces_provided: []   # Models experiential state
surfaces_consumed: []   # Foundational experiential layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.loose
  - db.gather

provides:
  eide:
    - attention
    - intention
    - mood
    - perceptual-field
    - prospect
    - kairos

  # Topos-centric rendering: psyche owns presentation for experiential state
  renderable:
    - eidos: attention
      description: "Focus indicators and attention beam display"
    - eidos: intention
      description: "Goal cards and intention lists"
    - eidos: mood
      description: "Attunement indicators"
    - eidos: perceptual-field
      description: "Portal awareness status cards"
    - eidos: prospect
      description: "Anticipated possibility cards"
    - eidos: kairos
      description: "Opportune moment alerts"

  desmoi:
    - attends
    - intends
    - mood-of
    - portal-of
    - foresees
    - recognizes
    - opportune-for

  praxeis:
    # Attention
    - psyche/attend
    - psyche/release-attention
    - psyche/list-attending
    # Intention
    - psyche/form-intention
    - psyche/activate-intention
    - psyche/fulfill-intention
    - psyche/abandon-intention
    - psyche/list-intentions
    # Mood
    - psyche/disclose-mood
    - psyche/sense-mood
    # Perceptual Field (portal awareness)
    - psyche/open-perceptual-field
    - psyche/close-perceptual-field
    - psyche/list-perceptual-fields
    # Prospect and Kairos
    - psyche/foresee
    - psyche/recognize-kairos
    # Continuity
    - psyche/compose-constitution

stoicheia_form:
  # All stoicheia currently arche-level
