# Psyche Render Specifications
#
# Rendering definitions for psyche eide: attention, intention, mood, thyra, prospect, kairos
# Oikos-centric: psyche owns presentation for experiential state entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# ATTENTION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/attention-card
  data:
    name: attention-card
    description: "Card view for attention — where focus rests"
    target_eidos: attention
    fields_to_display:
      - field: target_id
      - field: weight
      - field: reason
      - field: since
    layout_template: |
      <article class="render-card attention-card">
        <header class="card-header">
          <span class="attention-icon">◉</span>
          <span class="attention-label">Attending</span>
        </header>
        <div class="card-body">
          <div class="target-display">{target_id}</div>
          <div class="weight-indicator" style="--weight: {weight}">
            <div class="weight-bar"></div>
            <span class="weight-value">{weight}</span>
          </div>
          <p class="reason">{reason}</p>
        </div>
        <footer class="card-footer">
          <span class="since">Since {since}</span>
        </footer>
      </article>
    style_bindings:
      attention-card: "border-left: 3px solid var(--attention-color, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/attention-item
  data:
    name: attention-item
    description: "Compact list item for attention"
    target_eidos: attention
    fields_to_display:
      - field: target_id
      - field: weight
    layout_template: |
      <div class="list-item attention-item">
        <span class="attention-icon">◉</span>
        <span class="target">{target_id}</span>
        <span class="weight-badge">{weight}</span>
      </div>
    style_bindings:
      attention-item: "border-left: 2px solid var(--attention-color, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# INTENTION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/intention-card
  data:
    name: intention-card
    description: "Card view for intention — what is being pursued"
    target_eidos: intention
    fields_to_display:
      - field: description
      - field: status
      - field: priority
      - field: formed_at
    layout_template: |
      <article class="render-card intention-card intention-{status}">
        <header class="card-header">
          <span class="intention-icon status-{status}">→</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <p class="description">{description}</p>
          <div class="priority-indicator">Priority: {priority}</div>
        </div>
        <footer class="card-footer">
          <span class="formed-at">Formed {formed_at}</span>
        </footer>
      </article>
    style_bindings:
      intention-forming: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.7"
      intention-active: "border-left: 3px solid var(--status-active, #3b82f6)"
      intention-suspended: "border-left: 3px solid var(--status-warning, #f59e0b)"
      intention-fulfilled: "border-left: 3px solid var(--status-success, #10b981)"
      intention-abandoned: "border-left: 3px solid var(--status-error, #ef4444); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/intention-item
  data:
    name: intention-item
    description: "Compact list item for intention"
    target_eidos: intention
    fields_to_display:
      - field: description
      - field: status
    layout_template: |
      <div class="list-item intention-item intention-{status}">
        <span class="intention-icon status-{status}">→</span>
        <span class="description">{description}</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      intention-active: "font-weight: 600"
      intention-fulfilled: "text-decoration: line-through; opacity: 0.6"
      intention-abandoned: "opacity: 0.4"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# MOOD RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/mood-card
  data:
    name: mood-card
    description: "Card view for mood — how the world shows up"
    target_eidos: mood
    fields_to_display:
      - field: quality
      - field: intensity
      - field: disclosed_at
      - field: notes
    layout_template: |
      <article class="render-card mood-card mood-{quality}">
        <header class="card-header">
          <span class="mood-quality">{quality}</span>
          <span class="mood-intensity" style="--intensity: {intensity}">
            <span class="intensity-indicator"></span>
          </span>
        </header>
        <div class="card-body">
          <p class="notes">{notes}</p>
        </div>
        <footer class="card-footer">
          <span class="disclosed-at">Disclosed {disclosed_at}</span>
        </footer>
      </article>
    style_bindings:
      mood-focused: "border-left: 3px solid var(--mood-focused, #3b82f6)"
      mood-scattered: "border-left: 3px solid var(--mood-scattered, #f59e0b)"
      mood-anxious: "border-left: 3px solid var(--mood-anxious, #ef4444)"
      mood-calm: "border-left: 3px solid var(--mood-calm, #10b981)"
      mood-curious: "border-left: 3px solid var(--mood-curious, #8b5cf6)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/mood-item
  data:
    name: mood-item
    description: "Compact indicator for current mood"
    target_eidos: mood
    fields_to_display:
      - field: quality
      - field: intensity
    layout_template: |
      <div class="list-item mood-item mood-{quality}">
        <span class="mood-indicator quality-{quality}"></span>
        <span class="quality-label">{quality}</span>
      </div>
    style_bindings:
      mood-focused: "background: var(--mood-focused-bg, #dbeafe)"
      mood-calm: "background: var(--mood-calm-bg, #d1fae5)"
      mood-anxious: "background: var(--mood-anxious-bg, #fee2e2)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# THYRA (PORTAL) RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/thyra-card
  data:
    name: thyra-card
    description: "Card view for thyra — the portal interface"
    target_eidos: thyra
    fields_to_display:
      - field: name
      - field: kind
      - field: status
      - field: capabilities
      - field: opened_at
    layout_template: |
      <article class="render-card thyra-card thyra-{status}">
        <header class="card-header">
          <span class="thyra-name">{name}</span>
          <span class="thyra-kind kind-{kind}">{kind}</span>
        </header>
        <div class="card-body">
          <div class="status-row">
            <span class="status-indicator status-{status}"></span>
            <span class="status-label">{status}</span>
          </div>
          <div class="capabilities-list">{capabilities}</div>
        </div>
        <footer class="card-footer">
          <span class="opened-at">Opened {opened_at}</span>
        </footer>
      </article>
    style_bindings:
      thyra-open: "border-left: 3px solid var(--status-success, #10b981)"
      thyra-closed: "border-left: 3px solid var(--status-muted, #6b7280)"
      thyra-suspended: "border-left: 3px solid var(--status-warning, #f59e0b)"
      kind-cli: "background: var(--kind-cli, #1e293b); color: var(--kind-cli-text, #e2e8f0)"
      kind-web: "background: var(--kind-web, #dbeafe)"
      kind-api: "background: var(--kind-api, #fef3c7)"
      kind-ambient: "background: var(--kind-ambient, #ede9fe)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# PROSPECT RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/prospect-card
  data:
    name: prospect-card
    description: "Card view for prospect — anticipated possibility"
    target_eidos: prospect
    fields_to_display:
      - field: description
      - field: likelihood
      - field: valence
      - field: horizon
      - field: noted_at
    layout_template: |
      <article class="render-card prospect-card valence-{valence}">
        <header class="card-header">
          <span class="prospect-icon valence-{valence}">◇</span>
          <span class="horizon-badge">{horizon}</span>
        </header>
        <div class="card-body">
          <p class="description">{description}</p>
          <div class="likelihood-row">
            <span class="likelihood-label">Likelihood:</span>
            <span class="likelihood-value">{likelihood}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="valence-badge valence-{valence}">{valence}</span>
          <span class="noted-at">Noted {noted_at}</span>
        </footer>
      </article>
    style_bindings:
      valence-positive: "border-left: 3px solid var(--valence-positive, #10b981)"
      valence-negative: "border-left: 3px solid var(--valence-negative, #ef4444)"
      valence-neutral: "border-left: 3px solid var(--valence-neutral, #6b7280)"
      valence-mixed: "border-left: 3px solid var(--valence-mixed, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# KAIROS RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/kairos-card
  data:
    name: kairos-card
    description: "Card view for kairos — the opportune moment"
    target_eidos: kairos
    fields_to_display:
      - field: description
      - field: for_intention
      - field: conditions
      - field: recognized_at
      - field: expires_at
    layout_template: |
      <article class="render-card kairos-card">
        <header class="card-header">
          <span class="kairos-icon">⚡</span>
          <span class="kairos-label">Opportune Moment</span>
        </header>
        <div class="card-body">
          <p class="description">{description}</p>
          <div class="for-intention">
            <span class="label">For:</span>
            <span class="intention-ref">{for_intention}</span>
          </div>
          <div class="conditions-list">{conditions}</div>
        </div>
        <footer class="card-footer">
          <span class="recognized-at">Recognized {recognized_at}</span>
          <span class="expires-at">Expires {expires_at}</span>
        </footer>
      </article>
    style_bindings:
      kairos-card: "border-left: 3px solid var(--kairos-color, #f59e0b); background: var(--kairos-bg, #fffbeb)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/kairos-item
  data:
    name: kairos-item
    description: "Compact alert item for kairos"
    target_eidos: kairos
    fields_to_display:
      - field: description
      - field: expires_at
    layout_template: |
      <div class="list-item kairos-item">
        <span class="kairos-icon">⚡</span>
        <span class="description">{description}</span>
        <span class="expires-badge">Until {expires_at}</span>
      </div>
    style_bindings:
      kairos-item: "background: var(--kairos-bg, #fffbeb); border-left: 2px solid var(--kairos-color, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"
