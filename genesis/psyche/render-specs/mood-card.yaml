# Mood Card Render-Spec
# Attunement indicator showing how the world shows up
#
# Mood fields:
#   - quality (string): The character of the mood (e.g., "curious", "anxious")
#   - intensity (number): How strong the mood is (0-1)
#   - disclosed_at (datetime): When the mood was noticed
#   - notes (string): Additional context
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/mood-card
    data:
      name: mood-card
      description: |
        Attunement card showing how the experiencing self
        is currently attuned to the world.
      target_eidos: mood
      variant: card

      layout:
        - widget: card
          props:
            variant: elevated
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: heart
                            size: md
                        - widget: text
                          props:
                            content: "Mood"
                            variant: caption

                    - widget: badge
                      props:
                        content: "{quality}"
                        variant: info

                # Intensity indicator
                - widget: progress
                  props:
                    value: "{intensity}"
                    variant: bar

                # Notes
                - widget: text
                  when: "notes"
                  props:
                    content: "{notes}"
                    variant: caption

      created_at: "2026-02-03T00:00:00Z"
