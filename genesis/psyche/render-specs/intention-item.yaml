# Intention Item Render-Spec
# Compact list item for intention
#
# Intention fields:
#   - description (string): What is being pursued
#   - status (enum): forming | active | suspended | fulfilled | abandoned
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/intention-item
    data:
      name: intention-item
      description: |
        Compact list item for intention — icon, description, and status badge.
      target_eidos: intention
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
              children:
                # Intention icon
                - widget: icon
                  props:
                    name: arrow-right
                    size: sm

                # Description
                - widget: text
                  props:
                    content: "{description}"
                    variant: body

                # Status badges
                - widget: badge
                  when: "status == 'forming'"
                  props:
                    content: "Forming"
                    variant: default
                - widget: badge
                  when: "status == 'active'"
                  props:
                    content: "Active"
                    variant: info
                - widget: badge
                  when: "status == 'suspended'"
                  props:
                    content: "Suspended"
                    variant: warning
                - widget: badge
                  when: "status == 'fulfilled'"
                  props:
                    content: "Fulfilled"
                    variant: success
                - widget: badge
                  when: "status == 'abandoned'"
                  props:
                    content: "Abandoned"
                    variant: error

      created_at: "2026-02-09T00:00:00Z"
