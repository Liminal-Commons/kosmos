# Attention Item Render-Spec
# Compact list item for attention focus
#
# Attention fields:
#   - target_id (string): What is being attended to
#   - weight (number): Intensity of focus (0-1)
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/attention-item
    data:
      name: attention-item
      description: |
        Compact list item for attention — icon, target, and weight badge.
      target_eidos: attention
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
              children:
                # Attention icon
                - widget: icon
                  props:
                    name: target
                    size: sm

                # Target
                - widget: text
                  props:
                    content: "{target_id}"
                    variant: body

                # Weight badge
                - widget: badge
                  props:
                    content: "{weight}"
                    variant: info

      created_at: "2026-02-09T00:00:00Z"
