# Psyche Eide
# Inner life eide — attention, intention, mood, perceptual-field, prospect, kairos
#
# The experiencing self has these dimensions:
# - Attention: where focus rests
# - Intention: what is being pursued
# - Mood: how the world shows up (attunement)
# - Perceptual-field: the portal awareness through which experience flows
# - Prospect: anticipated possibilities
# - Kairos: opportune moments

entities:
  # attention — where focus rests
  - eidos: eidos
    id: eidos/attention
    data:
      name: attention
      description: "Where focus currently rests. The beam of awareness."
      fields:
        target_id:
          type: string
          required: true
          description: What is being attended to
        weight:
          type: number
          required: true
          description: Focus intensity 0.0 to 1.0
        reason:
          type: string
          required: false
          description: Why attending to this
        since:
          type: timestamp
          required: true
          description: When attention began

  # intention — what is being pursued
  - eidos: eidos
    id: eidos/intention
    data:
      name: intention
      description: "What is being pursued. The directedness of will."
      fields:
        description:
          type: string
          required: true
          description: What the intention is about
        status:
          type: enum
          values: [forming, active, suspended, fulfilled, abandoned]
          required: true
          description: Current state of the intention
        priority:
          type: number
          required: false
          description: Higher means more important
        formed_at:
          type: timestamp
          required: true
          description: When the intention was formed
        fulfilled_at:
          type: timestamp
          required: false
          description: When fulfilled (if applicable)

  # mood — attunement
  - eidos: eidos
    id: eidos/mood
    data:
      name: mood
      description: "The coloring of experience. Not emotion but attunement — how the world shows up."
      fields:
        quality:
          type: string
          required: true
          description: The mood quality (focused, scattered, anxious, calm, curious, etc.)
        intensity:
          type: number
          required: false
          description: Intensity 0.0 to 1.0
        disclosed_at:
          type: timestamp
          required: true
          description: When this mood was disclosed
        notes:
          type: string
          required: false
          description: Additional context about the mood

  # perceptual-field — the parousia's awareness of its portal interface
  - eidos: eidos
    id: eidos/perceptual-field
    data:
      name: perceptual-field
      description: |
        The parousia's subjective awareness of its portal interface.
        What kind of interface is available, what can be perceived through it,
        and what actions are possible. This is the experiencing self's view
        of its portal — not the portal infrastructure itself (which is thyra topos).
      fields:
        name:
          type: string
          required: true
          description: Name of the perceptual field
        kind:
          type: enum
          values: [cli, web, api, ambient]
          required: true
          description: Type of interface
        visibility_scope:
          type: array
          required: false
          description: Oikos IDs perceivable through this field
        capabilities:
          type: array
          required: true
          description: What can be done through this perceptual field
        status:
          type: enum
          values: [open, closed, suspended]
          required: true
          description: Current state
        opened_at:
          type: timestamp
          required: true
          description: When this perceptual field was opened

  # prospect — anticipated possibility
  - eidos: eidos
    id: eidos/prospect
    data:
      name: prospect
      description: "What lies ahead. Anticipated possibility. Not prediction but sense of what might unfold."
      fields:
        description:
          type: string
          required: true
          description: What is anticipated
        likelihood:
          type: number
          required: false
          description: Subjective sense 0.0 to 1.0
        valence:
          type: enum
          values: [positive, negative, neutral, mixed]
          required: false
          description: Feeling tone of the prospect
        horizon:
          type: string
          required: false
          description: Temporal horizon (immediate, near, far)
        noted_at:
          type: timestamp
          required: true
          description: When the prospect was noted

  # kairos — opportune moment
  - eidos: eidos
    id: eidos/kairos
    data:
      name: kairos
      description: "The opportune moment. When conditions align for action. Not clock time but right time."
      fields:
        description:
          type: string
          required: true
          description: What makes this moment opportune
        for_intention:
          type: string
          required: false
          description: Intention ID this is opportune for
        conditions:
          type: array
          required: false
          description: What conditions have aligned
        recognized_at:
          type: timestamp
          required: true
          description: When the kairos was recognized
        expires_at:
          type: timestamp
          required: false
          description: When the opportunity closes (if known)
