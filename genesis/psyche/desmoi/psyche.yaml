# Psyche Desmoi
# Inner life bonds — connecting parousia to attention, intention, mood, perceptual-field, prospect, kairos
#
# These bonds trace the inner life of the experiencing self:
# - attends: where awareness is directed
# - intends: what will is pursuing
# - mood-of: how the world is showing up
# - portal-of: through what interface experience flows
# - foresees: what possibilities are anticipated
# - recognizes: what opportune moments are perceived
# - opportune-for: which intentions a kairos serves

entities:
  # attends — parousia attends to something
  - eidos: desmos
    id: desmos/attends
    data:
      name: attends
      description: "Parousia attends to something. The direction of awareness."
      from_eidos: parousia
      to_eidos: any
      cardinality: many-to-many
      symmetric: false

  # intends — parousia holds an intention
  - eidos: desmos
    id: desmos/intends
    data:
      name: intends
      description: "Parousia holds an intention. The directedness of will."
      from_eidos: parousia
      to_eidos: intention
      cardinality: one-to-many
      symmetric: false

  # mood-of — mood of parousia
  - eidos: desmos
    id: desmos/mood-of
    data:
      name: mood-of
      description: "Mood of parousia. How the world shows up for this being."
      from_eidos: mood
      to_eidos: parousia
      cardinality: many-to-one
      symmetric: false

  # portal-of — perceptual-field is portal awareness of parousia
  - eidos: desmos
    id: desmos/portal-of
    data:
      name: portal-of
      description: "Perceptual field is portal awareness of parousia. Interface through which experience flows."
      from_eidos: perceptual-field
      to_eidos: parousia
      cardinality: many-to-one
      symmetric: false

  # foresees — parousia foresees a prospect
  - eidos: desmos
    id: desmos/foresees
    data:
      name: foresees
      description: "Parousia foresees a prospect. Anticipation of possibility."
      from_eidos: parousia
      to_eidos: prospect
      cardinality: one-to-many
      symmetric: false

  # recognizes — parousia recognizes a kairos
  - eidos: desmos
    id: desmos/recognizes
    data:
      name: recognizes
      description: "Parousia recognizes a kairos. Perception of opportune moment."
      from_eidos: parousia
      to_eidos: kairos
      cardinality: one-to-many
      symmetric: false

  # opportune-for — kairos is opportune for an intention
  - eidos: desmos
    id: desmos/opportune-for
    data:
      name: opportune-for
      description: "Kairos is opportune for an intention. The alignment of moment and purpose."
      from_eidos: kairos
      to_eidos: intention
      cardinality: many-to-one
      symmetric: false
