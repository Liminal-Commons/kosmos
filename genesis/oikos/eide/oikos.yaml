# Oikos Eide
# Intimate dwelling eide — sessions, conversations, notes, insights
# Plus topos packaging eide (topos-manifest, topos-dev, topos-prod)

entities:

  # =============================================================================
  # INTIMATE DWELLING EIDE
  # =============================================================================

  # session — current presence instance
  - eidos: eidos
    id: eidos/session
    data:
      name: session
      description: "Current presence instance — a period of dwelling activity."
      constitutional: false
      fields:
        parousia_id:
          type: string
          required: true
          description: "The parousia (embodied prosopon) in this session"
        started_at:
          type: timestamp
          required: true
        closed_at:
          type: timestamp
          required: false
        status:
          type: enum
          values: [active, closed]
          required: true
          default: active

  # conversation — dialogue within session
  - eidos: eidos
    id: eidos/conversation
    data:
      name: conversation
      description: "A dialogue within a session. Conversations have participants and unfold through segments."
      constitutional: false
      fields:
        title:
          type: string
          required: false
        opened_at:
          type: timestamp
          required: true
        closed_at:
          type: timestamp
          required: false
        status:
          type: enum
          values: [active, closed]
          required: true

  # segment — unit within conversation
  - eidos: eidos
    id: eidos/segment
    data:
      name: segment
      description: "A unit within a conversation. A turn of dialogue, a moment of work."
      constitutional: false
      fields:
        kind:
          type: enum
          values: [message, action, observation, reflection]
          required: true
        content:
          type: string
          required: true
        author_kind:
          type: enum
          values: [human, ai, system]
          required: true
        created_at:
          type: timestamp
          required: true
        metadata:
          type: object
          required: false

  # note — attention marker
  - eidos: eidos
    id: eidos/note
    data:
      name: note
      description: "An attention marker. Notes mark something as worthy of attention."
      constitutional: false
      fields:
        content:
          type: string
          required: true
        reason:
          type: string
          required: false
        kind:
          type: enum
          values: [observation, question, concern, insight, todo]
          required: true
        created_at:
          type: timestamp
          required: true

  # insight — emerging understanding
  - eidos: eidos
    id: eidos/insight
    data:
      name: insight
      description: "Emerging understanding. Not yet crystallized into theoria, but surfaced from notes."
      constitutional: false
      fields:
        content:
          type: string
          required: true
        domain:
          type: string
          required: true
        confidence:
          type: number
          required: false
        surfaced_at:
          type: timestamp
          required: true

  # =============================================================================
  # TOPOS PACKAGING EIDE (for demiurge/politeia consumption)
  # =============================================================================

  # topos-manifest — topos package declaration
  - eidos: eidos
    id: eidos/topos-manifest
    data:
      name: topos-manifest
      description: "Declaration of what a topos requires and provides. The contract between topos and substrate."
      constitutional: false
      fields:
        topos_id:
          type: string
          required: true
          description: "Topos identifier (e.g., soma, nous, demiurge)"
        version:
          type: string
          required: true
        description:
          type: string
          required: false
        requires_dynamis:
          type: array
          required: false
          description: "Array of dynamis functions required (e.g., ['db.arise', 'db.find'])"
        provides:
          type: object
          required: false
          description: "Object with eide, desmoi, praxeis arrays"
        stoicheia_form:
          type: object
          required: false
          description: "Map of stoicheion to form (arche or wasm)"
        actuality_modes:
          type: object
          required: false
          description: "Actuality mode configurations for dual-mode entities"

  # topos-dev — Development topos package
  - eidos: eidos
    id: eidos/topos-dev
    data:
      name: topos-dev
      description: "Development topos package. Can contain generation specs. Mutable during development."
      constitutional: false
      fields:
        topos_id:
          type: string
          required: true
          description: "Topos identifier"
        version:
          type: string
          required: true
        description:
          type: string
          required: false
        manifest:
          type: object
          required: true
          description: "The topos-manifest (requires_dynamis, provides)"
        content:
          type: object
          required: true
          description: "Object with eide, desmoi, praxeis, stoicheia content"
        generation_specs:
          type: array
          required: false
          description: "Array of generation specifications to be baked into literals"
        status:
          type: string
          enum: [draft, reviewed, ready_to_publish]
          default: draft
        distribution:
          type: string
          enum: [generative-commons, binary-only, private]
          default: binary-only
          description: |
            How this topos-dev may be shared:
            - generative-commons: Share source (generation specs). Others can bake locally.
            - binary-only: Share only baked topos-prod. Generation specs stay private.
            - private: Not shared at all. Internal use only.
        author_prosopon:
          type: string
          required: false
          description: "Prosopon ID of the author"
        created_at:
          type: integer
          required: false

  # topos-prod — Production topos package
  - eidos: eidos
    id: eidos/topos-prod
    data:
      name: topos-prod
      description: "Production topos package. Frozen, signed, no generation specs. Ready for distribution."
      constitutional: false
      fields:
        topos_id:
          type: string
          required: true
          description: "Topos identifier"
        version:
          type: string
          required: true
        fetch_url:
          type: string
          required: true
          description: "URL where the topos content can be fetched"
        locale:
          type: string
          required: false
          description: "BCP 47 locale code. 'und' if locale-agnostic."
        description:
          type: string
          required: false
        manifest:
          type: object
          required: true
          description: "The topos-manifest (requires_dynamis, provides)"
        content:
          type: object
          required: true
          description: "Object with eide, desmoi, praxeis, stoicheia content (all literals)"
        content_hash:
          type: string
          required: true
          description: "BLAKE3 hash of the content"
        signature:
          type: string
          required: true
          description: "Ed25519 signature of content_hash by publisher"
        publisher_pubkey:
          type: string
          required: true
          description: "Public key of the publisher"
        baked_from:
          type: string
          required: false
          description: "ID of the topos-dev this was baked from"
        published_at:
          type: integer
          required: true

  # publish-attestation — Record of who published what
  - eidos: eidos
    id: eidos/publish-attestation
    data:
      name: publish-attestation
      description: "Attestation record for topos publication. Provides audit trail for provenance."
      constitutional: false
      fields:
        dev_topos_id:
          type: string
          required: true
          description: "ID of the source topos-dev"
        prod_topos_id:
          type: string
          required: true
          description: "ID of the resulting topos-prod"
        publisher_prosopon:
          type: string
          required: true
          description: "Prosopon ID of the publisher"
        publisher_pubkey:
          type: string
          required: true
          description: "Public key used to sign"
        attestation:
          type: string
          required: false
          description: "Optional attestation statement"
        published_at:
          type: integer
          required: true
        dev_version:
          type: string
          required: true
          description: "Version of the topos-dev at time of publish"
        locale:
          type: string
          required: false
          description: "BCP 47 locale code of the baked topos-prod"
        generation_hashes:
          type: array
          required: false
          description: "Hashes of generated content that was baked"

  # =============================================================================
  # ATTAINMENTS
  # =============================================================================

  - eidos: attainment
    id: attainment/dwell
    data:
      name: dwell
      description: |
        Dwelling capability — session and conversation management.
        Enables opening sessions, managing conversations, and adding segments.
        The fundamental activity of being present in the household.
      topos: oikos
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/oikos/open-session }
      - { desmos: grants-praxis, to: praxis/oikos/close-session }
      - { desmos: grants-praxis, to: praxis/oikos/open-conversation }
      - { desmos: grants-praxis, to: praxis/oikos/add-segment }

  - eidos: attainment
    id: attainment/reflect
    data:
      name: reflect
      description: |
        Reflection capability — notes and insight surfacing.
        Enables taking notes, listing them, surfacing insights,
        and crystallizing insights into theoria.
      topos: oikos
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/oikos/take-note }
      - { desmos: grants-praxis, to: praxis/oikos/list-notes }
      - { desmos: grants-praxis, to: praxis/oikos/surface-insight }
      - { desmos: grants-praxis, to: praxis/oikos/crystallize-insight }
