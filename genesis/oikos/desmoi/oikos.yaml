# Oikos Desmoi
# Intimate dwelling bonds — sessions, conversations, notes, insights
#
# Extracted from spora.yaml stage-1-desmoi

entities:
  # within — containment within session/conversation
  - eidos: desmos
    id: desmos/within
    data:
      name: within
      description: "Containment within session/conversation"
      from_eidos: any
      to_eidos: any
      cardinality: many-to-one
      symmetric: false

  # authored-by — prosopon authored this segment/note
  - eidos: desmos
    id: desmos/authored-by
    data:
      name: authored-by
      description: "Prosopon authored this segment/note"
      from_eidos: any
      to_eidos: prosopon
      cardinality: many-to-one
      symmetric: false

  # surfaced-in — insight surfaced in oikos
  - eidos: desmos
    id: desmos/surfaced-in
    data:
      name: surfaced-in
      description: "Insight surfaced in oikos"
      from_eidos: insight
      to_eidos: oikos
      cardinality: many-to-one
      symmetric: false

  # about — note is about an entity
  - eidos: desmos
    id: desmos/about
    data:
      name: about
      description: "Note is about an entity"
      from_eidos: note
      to_eidos: any
      cardinality: many-to-one
      symmetric: false

  # crystallizes — insight crystallizes into theoria
  - eidos: desmos
    id: desmos/crystallizes
    data:
      name: crystallizes
      description: "Insight crystallizes into theoria"
      from_eidos: insight
      to_eidos: theoria
      cardinality: one-to-one
      symmetric: false

  # surfaces — note surfaces into insight
  - eidos: desmos
    id: desmos/surfaces
    data:
      name: surfaces
      description: "Note surfaces into insight"
      from_eidos: note
      to_eidos: insight
      cardinality: many-to-one
      symmetric: false

  # --- Topos Ecosystem Desmoi ---
  # NOTE: published-by, baked-from, attests-to canonical in demiurge/desmoi
  # NOTE: distributes canonical in politeia/desmoi

  # topos-derives-from — topos-dev derives from another topos-dev
  - eidos: desmos
    id: desmos/topos-derives-from
    data:
      name: topos-derives-from
      description: "Topos-dev derives from another topos-dev (fork/adaptation). Tracks generative-commons lineage."
      from_eidos: topos-dev
      to_eidos: topos-dev
      cardinality: many-to-one
      symmetric: false

  # uses-topos — oikos has installed/activated a topos
  - eidos: desmos
    id: desmos/uses-topos
    data:
      name: uses-topos
      description: "Oikos has installed/activated a topos-prod. Tracks which topoi are active for a dwelling."
      from_eidos: oikos
      to_eidos: topos-prod
      cardinality: many-to-many
      symmetric: false
