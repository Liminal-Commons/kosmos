# Insight Card Render-Spec
# Card view for insight — emerging understanding
#
# Insight fields (from oikos/eide/oikos.yaml):
#   - content (string, required): The insight content
#   - domain (string, required): Knowledge domain
#   - confidence (number, optional): Confidence value
#   - surfaced_at (timestamp, required): When insight was surfaced
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/insight-card
    data:
      name: insight-card
      description: |
        Card rendering for insight entities.
        Shows domain badge, content, confidence, and surfacing time.
      target_eidos: insight
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header: icon and domain badge
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: lightbulb
                            size: md
                        - widget: badge
                          props:
                            content: "{domain}"
                            variant: info

                    # Confidence indicator (conditional)
                    - widget: row
                      when: "confidence"
                      props:
                        gap: xs
                        align: center
                      children:
                        - widget: text
                          props:
                            content: "Confidence:"
                            variant: caption
                        - widget: progress
                          props:
                            value: "{confidence}"
                            variant: bar
                            color: info

                # Content
                - widget: text
                  props:
                    content: "{content}"
                    variant: body

                # Surfaced at
                - widget: row
                  props:
                    gap: xs
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: calendar
                        size: sm
                    - widget: text
                      props:
                        content: "Surfaced {surfaced_at}"
                        variant: caption

      created_at: "2026-02-09T00:00:00Z"
