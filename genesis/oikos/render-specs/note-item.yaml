# Note Item Render-Spec
# Compact list item for note — an attention marker
#
# Note fields (from oikos/eide/oikos.yaml):
#   - content (string, required): Note content
#   - kind (enum: observation, question, concern, insight, todo): Note type
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/note-item
    data:
      name: note-item
      description: |
        Compact list item for note entities.
        Shows kind icon, content, and kind badge.
      target_eidos: note
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
                justify: between
              children:
                # Left: kind icon and content
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: icon
                      when: "kind == 'observation'"
                      props:
                        name: eye
                        size: sm
                    - widget: icon
                      when: "kind == 'question'"
                      props:
                        name: help-circle
                        size: sm
                    - widget: icon
                      when: "kind == 'concern'"
                      props:
                        name: alert-triangle
                        size: sm
                    - widget: icon
                      when: "kind == 'insight'"
                      props:
                        name: lightbulb
                        size: sm
                    - widget: icon
                      when: "kind == 'todo'"
                      props:
                        name: check-square
                        size: sm

                    - widget: text
                      props:
                        content: "{content}"
                        variant: body

                # Right: kind badge
                - widget: badge
                  props:
                    content: "{kind}"
                    variant: default

      created_at: "2026-02-09T00:00:00Z"
