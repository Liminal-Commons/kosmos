# Segment Card Render-Spec
# Card view for segment — a unit within conversation
#
# Segment fields (from oikos/eide/oikos.yaml):
#   - kind (enum: message, action, observation, reflection): Segment type
#   - content (string, required): Segment content
#   - author_kind (enum: human, ai, system): Who authored this segment
#   - created_at (timestamp, required): When segment was created
#   - metadata (object, optional): Additional metadata
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/segment-card
    data:
      name: segment-card
      description: |
        Card rendering for segment entities.
        Shows author kind badge, segment kind badge, content, and timestamp.
      target_eidos: segment
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header: author and kind badges
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    # Author kind badges
                    - widget: badge
                      when: "author_kind == 'human'"
                      props:
                        content: "Human"
                        variant: info
                    - widget: badge
                      when: "author_kind == 'ai'"
                      props:
                        content: "AI"
                        variant: default
                    - widget: badge
                      when: "author_kind == 'system'"
                      props:
                        content: "System"
                        variant: warning

                    # Kind badges
                    - widget: badge
                      when: "kind == 'message'"
                      props:
                        content: "Message"
                        variant: default
                    - widget: badge
                      when: "kind == 'action'"
                      props:
                        content: "Action"
                        variant: warning
                    - widget: badge
                      when: "kind == 'observation'"
                      props:
                        content: "Observation"
                        variant: info
                    - widget: badge
                      when: "kind == 'reflection'"
                      props:
                        content: "Reflection"
                        variant: success

                # Content
                - widget: text
                  props:
                    content: "{content}"
                    variant: body

                # Timestamp
                - widget: row
                  props:
                    gap: xs
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: clock
                        size: sm
                    - widget: text
                      props:
                        content: "{created_at}"
                        variant: caption

      created_at: "2026-02-09T00:00:00Z"
