# Session Item Render-Spec
# Compact list item for session
#
# Session fields (from oikos/eide/oikos.yaml):
#   - started_at (timestamp, required): When session began
#   - status (enum: active, closed): Session lifecycle status
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/session-item
    data:
      name: session-item
      description: |
        Compact list item for session entities.
        Shows status indicator, start time, and status badge.
      target_eidos: session
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
                justify: between
              children:
                # Left: status indicator and time
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: status-indicator
                      props:
                        status: "{status}"
                    - widget: text
                      props:
                        content: "{started_at}"
                        variant: body

                # Right: status badge
                - widget: badge
                  when: "status == 'active'"
                  props:
                    content: "Active"
                    variant: success
                - widget: badge
                  when: "status == 'closed'"
                  props:
                    content: "Closed"
                    variant: default

      created_at: "2026-02-09T00:00:00Z"
