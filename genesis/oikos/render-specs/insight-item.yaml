# Insight Item Render-Spec
# Compact list item for insight — emerging understanding
#
# Insight fields (from oikos/eide/oikos.yaml):
#   - content (string, required): The insight content
#   - domain (string, required): Knowledge domain
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/insight-item
    data:
      name: insight-item
      description: |
        Compact list item for insight entities.
        Shows insight icon, content, and domain badge.
      target_eidos: insight
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
                justify: between
              children:
                # Left: icon and content
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: lightbulb
                        size: sm
                    - widget: text
                      props:
                        content: "{content}"
                        variant: body

                # Right: domain badge
                - widget: badge
                  props:
                    content: "{domain}"
                    variant: info

      created_at: "2026-02-09T00:00:00Z"
