# Note Card Render-Spec
# Card view for note — an attention marker
#
# Note fields (from oikos/eide/oikos.yaml):
#   - content (string, required): Note content
#   - reason (string, optional): Why this was noted
#   - kind (enum: observation, question, concern, insight, todo): Note type
#   - created_at (timestamp, required): When note was created
#
# Replaces HTML template in oikos/entities/rendering.yaml

entities:

  - eidos: render-spec
    id: render-spec/note-card
    data:
      name: note-card
      description: |
        Card rendering for note entities.
        Shows kind badge, content, optional reason, and timestamp.
      target_eidos: note
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header: kind badges
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: badge
                      when: "kind == 'observation'"
                      props:
                        content: "Observation"
                        variant: default
                    - widget: badge
                      when: "kind == 'question'"
                      props:
                        content: "Question"
                        variant: info
                    - widget: badge
                      when: "kind == 'concern'"
                      props:
                        content: "Concern"
                        variant: error
                    - widget: badge
                      when: "kind == 'insight'"
                      props:
                        content: "Insight"
                        variant: success
                    - widget: badge
                      when: "kind == 'todo'"
                      props:
                        content: "Todo"
                        variant: warning

                # Content
                - widget: text
                  props:
                    content: "{content}"
                    variant: body

                # Reason (conditional)
                - widget: text
                  when: "reason"
                  props:
                    content: "{reason}"
                    variant: caption

                # Timestamp
                - widget: row
                  props:
                    gap: xs
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: clock
                        size: sm
                    - widget: text
                      props:
                        content: "{created_at}"
                        variant: caption

      created_at: "2026-02-09T00:00:00Z"
