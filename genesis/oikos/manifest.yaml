# Topos Manifest: Oikos
# οἶκος — the intimate — sessions, conversations, notes, insights.
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: oikos
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Oikos
topos_description: |
  The intimate scale — sessions, conversations, notes, insights.
  Where personal knowledge work happens within a dwelling.
topos_scale: oikos

# Development experience metadata
topos_category: domain
surfaces_provided: []   # Personal knowledge work domain
surfaces_consumed:
  - understanding       # Uses nous for insight crystallization
  - reactivity          # Reflexes for oikos mutation response

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: reflexes/
    content_types: [reflex]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.loose
  - db.gather

provides:
  eide:
    - session
    - conversation
    - segment
    - note
    - insight
    - topos-manifest
    - topos-dev
    - topos-prod
    - publish-attestation

  reflexes:
    - reflex/oikos/announce-insight
    - reflex/oikos/note-to-insight

  # Topos-centric rendering: oikos topos owns presentation for intimate dwelling entities
  renderable:
    - eidos: session
      description: "Dwelling activity period cards"
    - eidos: conversation
      description: "Dialogue cards and lists"
    - eidos: segment
      description: "Message and turn cards"
    - eidos: note
      description: "Attention marker cards"
    - eidos: insight
      description: "Emerging understanding cards"

  attainments:
    - dwell          # Session and conversation management
    - reflect        # Notes and insight surfacing

  desmoi:
    # Session/conversation bonds
    - within
    - authored-by
    - surfaced-in
    - about
    - crystallizes
    - surfaces
    # Topos ecosystem bonds (K3-K4)
    # NOTE: published-by, baked-from, attests-to canonical in demiurge/desmoi
    # NOTE: distributes canonical in politeia/desmoi
    - topos-derives-from
    - uses-topos

  praxeis:
    - oikos/open-session
    - oikos/close-session
    - oikos/open-conversation
    - oikos/add-segment
    - oikos/take-note
    - oikos/list-notes
    - oikos/surface-insight
    - oikos/crystallize-insight

stoicheia_form:
  # All stoicheia currently arche-level
