# Oikos Render Specifications
#
# Rendering definitions for oikos eide: session, conversation, segment, note, insight
# Oikos-centric: oikos owns presentation for intimate dwelling entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# SESSION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/session-card
  data:
    name: session-card
    description: "Card view for session — a period of dwelling activity"
    target_eidos: session
    fields_to_display:
      - field: animus_id
      - field: status
      - field: started_at
      - field: closed_at
    layout_template: |
      <article class="render-card session-card session-{status}">
        <header class="card-header">
          <span class="session-icon status-{status}">●</span>
          <span class="session-label">Session</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="animus-row">
            <span class="label">Animus:</span>
            <span class="animus-id">{animus_id}</span>
          </div>
          <div class="time-row">
            <span class="started-at">Started {started_at}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="closed-at">{closed_at}</span>
        </footer>
      </article>
    style_bindings:
      session-active: "border-left: 3px solid var(--status-success, #10b981)"
      session-closed: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.7"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/session-item
  data:
    name: session-item
    description: "Compact list item for session"
    target_eidos: session
    fields_to_display:
      - field: status
      - field: started_at
    layout_template: |
      <div class="list-item session-item session-{status}">
        <span class="session-icon status-{status}">●</span>
        <span class="started-at">{started_at}</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      session-active: "font-weight: 600"
      session-closed: "opacity: 0.6"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# CONVERSATION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/conversation-card
  data:
    name: conversation-card
    description: "Card view for conversation — a dialogue within session"
    target_eidos: conversation
    fields_to_display:
      - field: title
      - field: status
      - field: opened_at
      - field: closed_at
    layout_template: |
      <article class="render-card conversation-card conversation-{status}">
        <header class="card-header">
          <span class="conversation-icon">💬</span>
          <span class="conversation-title">{title}</span>
        </header>
        <div class="card-body">
          <div class="status-row">
            <span class="status-indicator status-{status}"></span>
            <span class="status-label">{status}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="opened-at">Opened {opened_at}</span>
          <span class="closed-at">{closed_at}</span>
        </footer>
      </article>
    style_bindings:
      conversation-active: "border-left: 3px solid var(--status-active, #3b82f6)"
      conversation-closed: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.7"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/conversation-item
  data:
    name: conversation-item
    description: "Compact list item for conversation"
    target_eidos: conversation
    fields_to_display:
      - field: title
      - field: status
    layout_template: |
      <div class="list-item conversation-item conversation-{status}">
        <span class="conversation-icon">💬</span>
        <span class="title">{title}</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      conversation-active: "font-weight: 600"
      conversation-closed: "opacity: 0.6"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# SEGMENT RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/segment-card
  data:
    name: segment-card
    description: "Card view for segment — a unit within conversation"
    target_eidos: segment
    fields_to_display:
      - field: kind
      - field: content
      - field: author_kind
      - field: created_at
    layout_template: |
      <article class="render-card segment-card segment-{kind} author-{author_kind}">
        <header class="card-header">
          <span class="author-badge author-{author_kind}">{author_kind}</span>
          <span class="kind-badge kind-{kind}">{kind}</span>
        </header>
        <div class="card-body">
          <div class="content-block">
            <p class="content">{content}</p>
          </div>
        </div>
        <footer class="card-footer">
          <span class="created-at">{created_at}</span>
        </footer>
      </article>
    style_bindings:
      author-human: "border-left: 3px solid var(--author-human, #3b82f6)"
      author-ai: "border-left: 3px solid var(--author-ai, #8b5cf6)"
      author-system: "border-left: 3px solid var(--author-system, #6b7280)"
      kind-message: "background: var(--kind-message-bg, white)"
      kind-action: "background: var(--kind-action-bg, #fef3c7)"
      kind-observation: "background: var(--kind-observation-bg, #f3f4f6)"
      kind-reflection: "background: var(--kind-reflection-bg, #ede9fe)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/segment-item
  data:
    name: segment-item
    description: "Compact message item for segment"
    target_eidos: segment
    fields_to_display:
      - field: content
      - field: author_kind
    layout_template: |
      <div class="list-item segment-item author-{author_kind}">
        <span class="author-indicator author-{author_kind}"></span>
        <span class="content">{content}</span>
      </div>
    style_bindings:
      author-human: "margin-left: auto; text-align: right"
      author-ai: "margin-right: auto"
      author-system: "text-align: center; opacity: 0.7"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# NOTE RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/note-card
  data:
    name: note-card
    description: "Card view for note — an attention marker"
    target_eidos: note
    fields_to_display:
      - field: content
      - field: kind
      - field: reason
      - field: created_at
    layout_template: |
      <article class="render-card note-card note-{kind}">
        <header class="card-header">
          <span class="note-icon kind-{kind}"></span>
          <span class="kind-badge kind-{kind}">{kind}</span>
        </header>
        <div class="card-body">
          <p class="content">{content}</p>
          <p class="reason">{reason}</p>
        </div>
        <footer class="card-footer">
          <span class="created-at">{created_at}</span>
        </footer>
      </article>
    style_bindings:
      note-observation: "border-left: 3px solid var(--note-observation, #6b7280)"
      note-question: "border-left: 3px solid var(--note-question, #3b82f6)"
      note-concern: "border-left: 3px solid var(--note-concern, #ef4444)"
      note-insight: "border-left: 3px solid var(--note-insight, #8b5cf6)"
      note-todo: "border-left: 3px solid var(--note-todo, #f59e0b)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/note-item
  data:
    name: note-item
    description: "Compact list item for note"
    target_eidos: note
    fields_to_display:
      - field: content
      - field: kind
    layout_template: |
      <div class="list-item note-item note-{kind}">
        <span class="note-icon kind-{kind}"></span>
        <span class="content">{content}</span>
        <span class="kind-badge">{kind}</span>
      </div>
    style_bindings:
      note-todo: "font-weight: 600"
      note-concern: "color: var(--note-concern, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# INSIGHT RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/insight-card
  data:
    name: insight-card
    description: "Card view for insight — emerging understanding"
    target_eidos: insight
    fields_to_display:
      - field: content
      - field: domain
      - field: confidence
      - field: surfaced_at
    layout_template: |
      <article class="render-card insight-card">
        <header class="card-header">
          <span class="insight-icon">💡</span>
          <span class="domain-badge">{domain}</span>
        </header>
        <div class="card-body">
          <p class="content">{content}</p>
          <div class="confidence-row">
            <span class="label">Confidence:</span>
            <span class="confidence-value">{confidence}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="surfaced-at">Surfaced {surfaced_at}</span>
          <span class="crystallize-hint">→ May crystallize to theoria</span>
        </footer>
      </article>
    style_bindings:
      insight-card: "border-left: 3px solid var(--insight-color, #8b5cf6); background: var(--insight-bg, #faf5ff)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/insight-item
  data:
    name: insight-item
    description: "Compact list item for insight"
    target_eidos: insight
    fields_to_display:
      - field: content
