# Essential Praxeis for MCP Tool Exposure
#
# Schema-driven: Adding a praxis ID here automatically exposes it as an MCP tool.
# This is the curated subset for context efficiency (~90% reduction from full praxis set).
# All other praxeis remain discoverable via find/surface/traverse.
#
# Design principle: Core navigation + meta-invoker + key capabilities.
# - Discover any praxis via find/surface
# - Invoke any praxis via nous/call-praxis
#
# Generated into: crates/kosmos-mcp/src/essential_praxeis.rs
#
# Traces to: E9 MCP dispatch (future-releases.yaml)

essential:
  # === Navigation (the dweller triad) ===
  - praxis/nous/find           # Lookup by exact ID
  - praxis/nous/surface        # Semantic search
  - praxis/nous/traverse       # Follow bonds

  # === Meta-invocation ===
  - praxis/nous/call-praxis    # Invoke any praxis by ID (discover + invoke pattern)

  # === Knowledge ===
  - praxis/nous/crystallize-theoria  # Document insights
  - praxis/nous/list-theoria         # Review knowledge

  # === Output ===
  - praxis/thyra/emit          # Write to filesystem

  # === Composition ===
  - praxis/demiurge/compose    # Compose artifacts

  # === Inference ===
  - praxis/manteia/governed-inference  # LLM-constrained generation
