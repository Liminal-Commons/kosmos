# Propylon Render Specifications — propylon-link item
#
# Compact list item for invitation links.
# Shows link icon, oikos, use count, and status badge.

entities:

  - eidos: render-spec
    id: render-spec/propylon-link-item
    data:
      name: propylon-link-item
      description: "Compact list item for propylon-link"
      target_eidos: propylon-link
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
                justify: between
              children:
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: link
                    - widget: text
                      props:
                        content: "{oikos_id}"
                        variant: body
                    - widget: text
                      props:
                        content: "{use_count} uses"
                        variant: caption
                - widget: badge
                  props:
                    content: "{status}"
                    variant: "{status}"

      created_at: "2026-02-09T00:00:00Z"
