# Propylon Render Specifications — propylon-relay card
#
# Card view for signaling relay infrastructure.
# Shows relay name, bootstrap URL, substrate badge, and status indicator.

entities:

  - eidos: render-spec
    id: render-spec/propylon-relay-card
    data:
      name: propylon-relay-card
      description: "Card view for propylon-relay — signaling infrastructure"
      target_eidos: propylon-relay
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header: relay name + status indicator
                - widget: row
                  props:
                    gap: sm
                    align: center
                    justify: between
                  children:
                    - widget: text
                      props:
                        content: "{name}"
                        variant: emphasis
                    - widget: status-indicator
                      props:
                        status: "{status}"

                # Bootstrap URL
                - widget: code
                  props:
                    content: "{bootstrap_url}"

                # Substrate badge
                - widget: badge
                  props:
                    content: "{substrate}"
                    variant: info

      created_at: "2026-02-09T00:00:00Z"
