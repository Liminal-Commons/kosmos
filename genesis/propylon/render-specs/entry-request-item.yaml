# Propylon Render Specifications — entry-request item
#
# Compact list item for entry requests.
# Shows person icon, entrant name, and status badge.

entities:

  - eidos: render-spec
    id: render-spec/entry-request-item
    data:
      name: entry-request-item
      description: "Compact list item for entry-request"
      target_eidos: entry-request
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
                justify: between
              children:
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: person
                    - widget: text
                      props:
                        content: "{entrant_name}"
                        variant: body
                - widget: badge
                  props:
                    content: "{status}"
                    variant: "{status}"

      created_at: "2026-02-09T00:00:00Z"
