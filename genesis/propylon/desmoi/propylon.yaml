# Propylon Desmoi
# Gateway entry bonds
#
# Extracted from spora.yaml stage-2-propylon

desmoi:
  # grants-entry-to — link grants entry to oikos
  - id: desmos/grants-entry-to
    data:
      name: grants-entry-to
      description: "A propylon-link grants entry to an oikos"
      from_eidos: propylon-link
      to_eidos: oikos
      cardinality: many-to-one

  # authenticated-via — how parousia entered
  - id: desmos/authenticated-via
    data:
      name: authenticated-via
      description: "Parousia authenticated through a propylon-session"
      from_eidos: parousia
      to_eidos: propylon-session
      cardinality: one-to-one

  # used-link — session used a link
  - id: desmos/used-link
    data:
      name: used-link
      description: "A propylon-session used a propylon-link for entry"
      from_eidos: propylon-session
      to_eidos: propylon-link
      cardinality: many-to-one

  # operates-relay — oikos operates relay infrastructure
  - id: desmos/operates-relay
    data:
      name: operates-relay
      description: |
        An oikos operates a propylon-relay. The relay is commons infrastructure
        owned and maintained by the operating oikos. Entry links from this
        oikos's invitations use this relay's bootstrap URL.
      from_eidos: oikos
      to_eidos: propylon-relay
      cardinality: one-to-many

  # connects-via — session connected through relay
  - id: desmos/connects-via
    data:
      name: connects-via
      description: "A propylon-session connected through a propylon-relay"
      from_eidos: propylon-session
      to_eidos: propylon-relay
      cardinality: many-to-one

  # authorized-by — parousia authorized by another prosopon's session
  - id: desmos/authorized-by
    data:
      name: authorized-by
      description: |
        A parousia operating under the authorization of another prosopon's session.
        Used when Claude's parousia arises within Victor's authenticated scope —
        Claude acts with its own identity but scoped to Victor's oikos access.
      from_eidos: parousia
      to_eidos: prosopon
      cardinality: many-to-one

  # issued-token — prosopon issued a session token
  - id: desmos/issued-token
    data:
      name: issued-token
      description: "A prosopon issued a session-token for cross-process auth"
      from_eidos: prosopon
      to_eidos: session-token
      cardinality: one-to-many