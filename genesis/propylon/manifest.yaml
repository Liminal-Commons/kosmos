# Oikos Manifest: Propylon
# πρόπυλον — the gateway, the entrance before the entrance.
#
# The narrow passage through which beings enter the kosmos.
# Authenticate, exchange, hand off, forget.
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: propylon
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Propylon
oikos_description: |
  The gateway, the entrance before the entrance. The narrow passage
  through which beings enter the kosmos. Authenticate, exchange, hand off, forget.
oikos_scale: cross-scale

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: seeds/
    content_types: [seed]

dependencies:
  - soma         # For dwelling context (create-self-link)
  - hypostasis   # For key derivation and signing (create-self-link)

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.update
  - db.gather
  - crypto.random     # Cryptographic random for nonces
  - crypto.sign       # Ed25519 signing
  - crypto.verify     # Ed25519 verification

provides:
  eide:
    - propylon-link
    - entry-request
    - propylon-session
    - propylon-relay
    - session-token

  attainments:
    - invite          # Create/manage invitation links
    - enter           # Use links to attempt entry (global)
    - approve         # Resolve pending entry requests
    - audit           # View entry history
    - session         # Cross-process session management

  seeds:
    - propylon-relay/liminal-primary

  desmoi:
    - grants-entry-to
    - authenticated-via
    - used-link
    - operates-relay
    - connects-via

  praxeis:
    # Link management
    - propylon/create-link
    - propylon/create-self-link
    - propylon/decode-link
    - propylon/validate-link
    - propylon/revoke-link

    # Entry flow
    - propylon/challenge-entry
    - propylon/verify-entry
    - propylon/approve-entry
    - propylon/reject-entry

    # Audit
    - propylon/list-entry-audit

    # Session management
    - propylon/create-session-token
    - propylon/validate-session-token

stoicheia_form:
  # All stoicheia use arche (interpreter) form
  create-link: arche
  create-self-link: arche
  decode-link: arche
  validate-link: arche
  revoke-link: arche
  challenge-entry: arche
  verify-entry: arche
  approve-entry: arche
  reject-entry: arche
  list-entry-audit: arche
  create-session-token: arche
  validate-session-token: arche

