# Propylon Render Specifications
#
# Rendering definitions for propylon eide: propylon-link, entry-request, propylon-session
# Oikos-centric: propylon owns presentation for gateway/entry entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# PROPYLON-LINK RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/propylon-link-card
  data:
    name: propylon-link-card
    description: "Card view for propylon-link — shareable invitation"
    target_eidos: propylon-link
    fields_to_display:
      - field: circle_id
      - field: status
      - field: expires_at
      - field: use_count
      - field: max_uses
      - field: require_approval
    layout_template: |
      <article class="render-card propylon-link-card link-{status}">
        <header class="card-header">
          <span class="link-icon">🔗</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="circle-row">
            <span class="label">Circle:</span>
            <span class="circle-id">{circle_id}</span>
          </div>
          <div class="uses-row">
            <span class="use-count">{use_count}</span>
            <span class="separator">/</span>
            <span class="max-uses">{max_uses}</span>
            <span class="label">uses</span>
          </div>
          <div class="approval-row">
            <span class="approval-badge require-{require_approval}">
              {require_approval}
            </span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="expires-at">Expires {expires_at}</span>
        </footer>
      </article>
    style_bindings:
      link-active: "border-left: 3px solid var(--status-success, #10b981)"
      link-used: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.7"
      link-expired: "border-left: 3px solid var(--status-warning, #f59e0b); opacity: 0.5"
      link-revoked: "border-left: 3px solid var(--status-error, #ef4444); opacity: 0.5"
      require-true: "background: var(--approval-required, #fef3c7)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/propylon-link-item
  data:
    name: propylon-link-item
    description: "Compact list item for propylon-link"
    target_eidos: propylon-link
    fields_to_display:
      - field: circle_id
      - field: status
      - field: use_count
    layout_template: |
      <div class="list-item propylon-link-item link-{status}">
        <span class="link-icon">🔗</span>
        <span class="circle-id">{circle_id}</span>
        <span class="uses-badge">{use_count} uses</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      link-active: "font-weight: 600"
      link-revoked: "text-decoration: line-through; opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# ENTRY-REQUEST RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/entry-request-card
  data:
    name: entry-request-card
    description: "Card view for entry-request — incoming authentication request"
    target_eidos: entry-request
    fields_to_display:
      - field: entrant_name
      - field: circle_name
      - field: status
      - field: timestamp
    layout_template: |
      <article class="render-card entry-request-card request-{status}">
        <header class="card-header">
          <span class="request-icon status-{status}">👤</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="entrant-row">
            <span class="entrant-name">{entrant_name}</span>
            <span class="label">wants to enter</span>
          </div>
          <div class="circle-row">
            <span class="circle-name">{circle_name}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="timestamp">Requested {timestamp}</span>
        </footer>
      </article>
    style_bindings:
      request-pending: "border-left: 3px solid var(--status-warning, #f59e0b); background: var(--pending-bg, #fffbeb)"
      request-verifying: "border-left: 3px solid var(--status-active, #3b82f6)"
      request-approved: "border-left: 3px solid var(--status-success, #10b981)"
      request-rejected: "border-left: 3px solid var(--status-error, #ef4444); opacity: 0.7"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/entry-request-item
  data:
    name: entry-request-item
    description: "Compact notification item for entry-request"
    target_eidos: entry-request
    fields_to_display:
      - field: entrant_name
      - field: status
    layout_template: |
      <div class="list-item entry-request-item request-{status}">
        <span class="request-icon">👤</span>
        <span class="entrant-name">{entrant_name}</span>
        <span class="status-badge">{status}</span>
      </div>
    style_bindings:
      request-pending: "background: var(--pending-bg, #fffbeb); font-weight: 600"
      request-approved: "opacity: 0.7"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# PROPYLON-SESSION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/propylon-session-card
  data:
    name: propylon-session-card
    description: "Card view for propylon-session — authentication state"
    target_eidos: propylon-session
    fields_to_display:
      - field: circle_id
      - field: status
      - field: require_approval
      - field: challenge_expires
    layout_template: |
      <article class="render-card propylon-session-card session-{status}">
        <header class="card-header">
          <span class="session-icon">🔐</span>
          <span class="session-label">Authentication</span>
          <span class="status-badge status-{status}">{status}</span>
        </header>
        <div class="card-body">
          <div class="circle-row">
            <span class="label">Target:</span>
            <span class="circle-id">{circle_id}</span>
          </div>
          <div class="progress-indicator status-{status}">
            <span class="step challenged">Challenge</span>
            <span class="arrow">→</span>
            <span class="step pending_approval">Approval</span>
            <span class="arrow">→</span>
            <span class="step authenticated">Authenticated</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="expires-at">Expires {challenge_expires}</span>
        </footer>
      </article>
    style_bindings:
      session-challenged: "border-left: 3px solid var(--status-warning, #f59e0b)"
      session-pending_approval: "border-left: 3px solid var(--status-active, #3b82f6)"
      session-authenticated: "border-left: 3px solid var(--status-success, #10b981)"
      session-rejected: "border-left: 3px solid var(--status-error, #ef4444)"
      session-failed: "border-left: 3px solid var(--status-error, #ef4444); opacity: 0.5"
      session-expired: "border-left: 3px solid var(--status-muted, #6b7280); opacity: 0.5"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# PROPYLON-RELAY RENDER SPECS (Infrastructure)
# =============================================================================

- eidos: render-spec
  id: render-spec/propylon-relay-card
  data:
    name: propylon-relay-card
    description: "Card view for propylon-relay — signaling infrastructure"
    target_eidos: propylon-relay
    fields_to_display:
      - field: name
      - field: bootstrap_url
      - field: substrate
      - field: status
    layout_template: |
      <article class="render-card propylon-relay-card relay-{status}">
        <header class="card-header">
          <span class="relay-icon">📡</span>
          <span class="relay-name">{name}</span>
          <span class="status-indicator status-{status}"></span>
        </header>
        <div class="card-body">
          <div class="url-row">
            <code class="bootstrap-url">{bootstrap_url}</code>
          </div>
          <div class="substrate-row">
            <span class="substrate-badge substrate-{substrate}">{substrate}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="status-label">{status}</span>
        </footer>
      </article>
    style_bindings:
      relay-active: "border-left: 3px solid var(--status-success, #10b981)"
      relay-degraded: "border-left: 3px solid var(--status-warning, #f59e0b)"
      relay-offline: "border-left: 3px solid var(--status-error, #ef4444)"
      relay-deploying: "border-left: 3px solid var(--status-active, #3b82f6)"
    created_at: "2025-01-29T00:00:00Z"
