# Propylon Screen Mode — Entry requests
# Browse gateway entry requests through thyra.

entities:

  - eidos: mode
    id: mode/entry-requests
    data:
      name: entry-requests
      topos: propylon
      substrate: screen
      description: |
        Gateway entry requests — pending, verifying, and resolved
        entry attempts. Center panel.
      item_spec_id: render-spec/entry-request-card
      arrangement: scroll
      empty_message: "No entry requests"
      spatial:
        position: center
        height: fill
      source_query: "gather(eidos: entry-request, sort: created_at, order: desc, limit: 50)"
      config:
        watch_eidos: entry-request
      created_at: "2026-02-22T00:00:00Z"

bonds:
  - from_id: mode/entry-requests
    to_id: render-spec/entry-request-card
    desmos: uses-render-spec
