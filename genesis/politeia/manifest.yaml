# Topos Manifest: Politeia
# πολιτεία — the constitution, governance and capability.
#
# How oikoi govern and grant capabilities. The layer where
# "being in an oikos" translates to "being able to do things."
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: politeia
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Politeia
topos_description: |
  The constitution, governance and capability. How oikoi govern
  and grant capabilities. The layer where "being in an oikos"
  translates to "being able to do things."
topos_scale: polis

# Development experience metadata
topos_category: domain
surfaces_provided: []   # Politeia is foundational governance, not an interaction surface
surfaces_consumed:
  - reactivity          # Reflexes for governance mutation response

# =============================================================================
# CONTENT PATHS — Where this topos sources content from
# =============================================================================
# Each path becomes a sources-content-from bond from this topos
# to the corresponding content-root entity.

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: circles/
    content_types: [oikos]
  - path: entities/
    content_types: [attainment]
  - path: reflexes/
    content_types: [reflex]
  - path: render-specs/
    content_types: [render-spec]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.loose
  - db.gather

provides:
  eide:
    # NOTE: parousia, prosopon, oikos are foundational (defined in spora.yaml)
    # Politeia operates on them but doesn't define them
    - attainment
    - affordance
    - invitation
    - membership-event
    - sync-cursor
    - sync-conflict

  reflexes:
    - reflex/politeia/derive-attainments-on-join
    - reflex/politeia/log-membership-change
    - reflex/politeia/announce-join

  # Topos-centric rendering: politeia owns presentation for governance entities
  renderable:
    - eidos: oikos
      description: "Trust boundary cards and list items"
    - eidos: attainment
      description: "Capability marker cards"
    - eidos: affordance
      description: "Clickable action cards"
    - eidos: invitation
      description: "Pending membership with accept/decline"
    - eidos: membership-event
      description: "Audit log entries"

  attainments:
    - govern              # Create oikoi, manage attainments
    - invite              # Invite others to oikoi
    - distribute          # Distribute topoi through oikoi
    - hud                 # Create and manage affordances
    - admin               # Administrative operations (bypass governance)
    - federate            # Federation between oikoi

  desmoi:
    # Governance bonds
    - sovereign-to
    - member-of
    - dwells-in
    - embodies
    # Capability bonds
    - grants-attainment
    - has-attainment
    - granted-by
    # Surface bonds
    - surfaces-as
    - enabled-by
    # Structure bonds
    - child-of
    - invited-to
    # Distribution bonds
    - distributes
    # Federation bonds
    - federates-with
    - tracks-sync
    - conflicts-on

  praxeis:
    # Oikos operations
    - politeia/create-oikos
    - politeia/invite-to-oikos
    - politeia/accept-invitation
    - politeia/decline-invitation
    - politeia/dwell-in-oikos
    - politeia/leave-oikos
    - politeia/list-oikoi
    # Attainment operations
    - politeia/create-attainment
    - politeia/grant-attainment
    - politeia/revoke-attainment
    - politeia/derive-attainments
    - politeia/list-attainments
    # Affordance operations
    - politeia/create-affordance
    - politeia/gather-affordances
    - politeia/render-hud
    - politeia/invoke-affordance
    # Membership history
    - politeia/create-membership-event
    - politeia/list-membership-events
    # Topos distribution (K4)
    - politeia/create-distribution-oikos
    - politeia/distribute-topos
    - politeia/list-distributed-topoi
    - politeia/list-topos-distributors
    - politeia/install-topos
    - politeia/uninstall-topos
    - politeia/list-installed-topoi
    # Topos sync (internal)
    - politeia/sync-oikos-topoi
    - politeia/install-topos-if-needed
    - politeia/update-topos-if-newer
    - politeia/reconcile-oikos-topoi
    # Admin operations
    - politeia/admin-bind
    - politeia/admin-loose
    # Federation
    - politeia/federate-oikoi
    - politeia/unfederate-oikoi
    - politeia/list-federations
    - politeia/resolve-conflict
    - politeia/list-conflicts

stoicheia_form:
  # All operations via praxeis
  # No special stoicheia

