# Politeia Desmoi
# Governance bonds — sovereignty, attainments, affordances, and invitations
#
# Extracted from spora.yaml stage-1-desmoi

entities:
  # sovereign-to — oikos is sovereign to parousia
  - eidos: desmos
    id: desmos/sovereign-to
    data:
      name: sovereign-to
      description: "Oikos is sovereign to parousia — governs what it can do."
      from_eidos: oikos
      to_eidos: parousia
      cardinality: one-to-many
      symmetric: false

  # embodies — parousia embodies prosopon
  - eidos: desmos
    id: desmos/embodies
    data:
      name: embodies
      description: "Parousia embodies prosopon — the dwelling presence of an identity."
      from_eidos: parousia
      to_eidos: prosopon
      cardinality: many-to-one
      symmetric: false

  # grants-attainment — oikos grants attainment
  - eidos: desmos
    id: desmos/grants-attainment
    data:
      name: grants-attainment
      description: "Oikos grants attainment to its members."
      from_eidos: oikos
      to_eidos: attainment
      cardinality: one-to-many
      symmetric: false

  # has-attainment — parousia has attainment
  - eidos: desmos
    id: desmos/has-attainment
    data:
      name: has-attainment
      description: "Parousia has attainment — capability derived from membership."
      from_eidos: parousia
      to_eidos: attainment
      cardinality: many-to-many
      symmetric: false

  # granted-by — attainment granted by oikos
  - eidos: desmos
    id: desmos/granted-by
    data:
      name: granted-by
      description: "Attainment granted by oikos — inverse tracking for provenance."
      from_eidos: attainment
      to_eidos: oikos
      cardinality: many-to-many
      symmetric: false

  # surfaces-as — attainment surfaces as affordance
  - eidos: desmos
    id: desmos/surfaces-as
    data:
      name: surfaces-as
      description: "Attainment surfaces as affordance — how capabilities become actionable."
      from_eidos: attainment
      to_eidos: affordance
      cardinality: one-to-many
      symmetric: false

  # enabled-by — affordance enabled by attainment
  - eidos: desmos
    id: desmos/enabled-by
    data:
      name: enabled-by
      description: "Affordance enabled by attainment — what capability makes it available."
      from_eidos: affordance
      to_eidos: attainment
      cardinality: many-to-one
      symmetric: false

  # child-of — invitation is child of oikos
  - eidos: desmos
    id: desmos/child-of
    data:
      name: child-of
      description: "Invitation is child of oikos — where the invite originates."
      from_eidos: invitation
      to_eidos: oikos
      cardinality: many-to-one
      symmetric: false

  # invited-to — invitation invites prosopon to oikos
  - eidos: desmos
    id: desmos/invited-to
    data:
      name: invited-to
      description: "Invitation invites prosopon to oikos."
      from_eidos: invitation
      to_eidos: oikos
      cardinality: many-to-one
      symmetric: false

  # distributes — oikos distributes a topos-prod to its members
  - eidos: desmos
    id: desmos/distributes
    data:
      name: distributes
      description: |
        Oikos distributes a topos-prod to its members.
        When a user joins an oikos, they receive all topoi the oikos distributes.
        Only commons oikoi can have this bond.

        Version semantics:
        - The topos-prod entity contains a semver-compatible version field
        - When an oikos updates its distributes bond to a newer topos-prod, members
          receive the update on their next dwell (lazy update)
        - Version comparison uses string equality; semver ordering is the publisher's
          responsibility when naming topos-prod entities
        - topos-prod IDs should include version: e.g., topos-prod/nous-1.2.0
      from_eidos: oikos
      to_eidos: topos-prod
      cardinality: many-to-many
      symmetric: false

  # =============================================================================
  # FEDERATION BONDS
  # =============================================================================

  # federates-with — oikos-to-oikos federation bond
  - eidos: desmos
    id: desmos/federates-with
    data:
      name: federates-with
      description: |
        Establishes federation between oikoi across kosmoi.
        Content in bonded oikoi syncs continuously.
        Both oikoi must bond (mutual consent required for sync).

        The bond IS the federation. No separate link entity needed.
        Content flows through the bond graph — visibility = reachability.

        Properties on the bond instance control sync behavior:
        - sync_direction: push, pull, or bidirectional
        - eidos_filter: which eide to sync (empty = all)
        - channel_id: underlying data-channel for transport
      from_eidos: oikos
      to_eidos: oikos
      cardinality: many-to-many
      symmetric: false
      properties:
        sync_direction:
          type: enum
          values: [push, pull, bidirectional]
          default: bidirectional
          description: "Direction of sync through this bond"
        eidos_filter:
          type: array
          required: false
          description: "Which eide to sync (empty = all reachable)"
        channel_id:
          type: string
          required: false
          description: "Underlying data-channel ID for transport"
        last_sync_at:
          type: timestamp
          required: false
          description: "Last successful sync through this bond"

  # tracks-sync — sync-cursor tracks federation bond
  - eidos: desmos
    id: desmos/tracks-sync
    data:
      name: tracks-sync
      description: "Sync cursor tracks position for a federation bond."
      from_eidos: sync-cursor
      to_eidos: oikos
      cardinality: many-to-one
      symmetric: false

  # conflicts-on — sync-conflict relates to entity
  - eidos: desmos
    id: desmos/conflicts-on
    data:
      name: conflicts-on
      description: "Sync conflict relates to a specific entity with divergent versions."
      from_eidos: sync-conflict
      to_eidos: entity
      cardinality: many-to-one
      symmetric: false
