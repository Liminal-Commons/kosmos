# politeia.yaml
# Politeia praxeis for governance and capability operations
#
# Politeia is how oikoi govern and grant capabilities.
# These praxeis enable oikos management, attainment derivation,
# and affordance surfacing.
#
# Relationships are desmoi, not array fields (Visibility = Reachability).

entities:

# =============================================================================
# OIKOS OPERATIONS (Phase 19.2)
# =============================================================================

- eidos: praxis
  id: praxis/politeia/create-oikos
  data:
    topos: politeia
    name: create-oikos
    visible: true
    tier: 2
    description: |
      Create a new oikos with the caller's parousia as sovereign.

      Creates the oikos entity and bonds sovereign-to from oikos to caller's parousia.
      Also creates member-of bond from parousia to oikos.
    params:
      - name: oikos_id
        type: string
        required: true
        description: ID for the new oikos (e.g., oikos/my-oikos)
      - name: name
        type: string
        required: true
        description: Human-readable oikos name
      - name: description
        type: string
        required: false
        description: Oikos description
      - name: kind
        type: string
        required: false
        description: "Oikos kind: sole, peer, commons (default: peer)"
    steps:
      # Default kind to peer
      - step: set
        bindings:
          oikos_kind: "$kind"

      - step: switch
        cases:
          - when: "$oikos_kind"
            then: []
        default:
          - step: set
            bindings:
              oikos_kind: "peer"

      # Assert we have parousia context
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context — cannot create oikos without parousia"

      # Create the oikos (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-oikos"
        inputs:
          id: "$oikos_id"
          name: "$name"
          description: "$description"
          kind: "$oikos_kind"
        bind_to: oikos_entity

      # Bond: oikos sovereign-to parousia
      - step: bind
        from_id: "$oikos_id"
        to_id: "$_parousia"
        desmos: "sovereign-to"

      # Bond: parousia member-of oikos
      - step: bind
        from_id: "$_parousia"
        to_id: "$oikos_id"
        desmos: "member-of"

      - step: return
        value:
          oikos_id: "$oikos_id"
          oikos: "$oikos_entity"
          sovereign_parousia: "$_parousia"
  bonds:
    - { desmos: requires-attainment, to: attainment/govern }

- eidos: praxis
  id: praxis/politeia/invite-to-oikos
  data:
    topos: politeia
    name: invite-to-oikos
    visible: true
    tier: 2
    description: |
      Invite someone to join an oikos.

      Creates an invitation entity. Can target a specific prosopon or be an open invite.
      Caller must have sovereignty attainment (checked by authorization gate).
    params:
      - name: invitation_id
        type: string
        required: true
        description: ID for the invitation
      - name: oikos_id
        type: string
        required: true
        description: Oikos to invite to
      - name: invitee_id
        type: string
        required: false
        description: Specific prosopon ID to invite (omit for open invite)
      - name: message
        type: string
        required: false
        description: Message to include with invitation
      - name: expires_in_days
        type: number
        required: false
        description: Days until expiration (default 7)
      - name: max_uses
        type: number
        required: false
        description: Max uses for open invites
    steps:
      # Assert dwelling context
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Find oikos
      - step: find
        id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Generate token for open invites
      - step: set
        bindings:
          invite_token: "{{ uuid() }}"
          expires_days: "$expires_in_days"

      - step: switch
        cases:
          - when: "$expires_days"
            then: []
        default:
          - step: set
            bindings:
              expires_days: 7

      # Create invitation (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-invitation"
        inputs:
          id: "$invitation_id"
          oikos_id: "$oikos_id"
          invitee_id: "$invitee_id"
          inviter_id: "$_prosopon"
          message: "$message"
          status: "pending"
          token: "$invite_token"
          max_uses: "$max_uses"
          uses: 0
          created_at: "{{ now() }}"
        bind_to: invitation_entity

      # Bond: invitation child-of oikos
      - step: bind
        from_id: "$invitation_id"
        to_id: "$oikos_id"
        desmos: "child-of"

      # Bond: invitation invited-to prosopon (if specific invite)
      - step: switch
        cases:
          - when: "$invitee_id"
            then:
              - step: bind
                from_id: "$invitation_id"
                to_id: "$invitee_id"
                desmos: "invited-to"

      - step: return
        value:
          invitation_id: "$invitation_id"
          invitation: "$invitation_entity"
          token: "$invite_token"
          oikos_id: "$oikos_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/invite }
    - { desmos: requires-attainment, to: attainment/sovereign }

- eidos: praxis
  id: praxis/politeia/accept-invitation
  data:
    topos: politeia
    name: accept-invitation
    visible: true
    tier: 2
    description: |
      Accept an invitation to join an oikos.

      Creates member-of bond and derives attainments from the oikos.
    params:
      - name: invitation_id
        type: string
        required: true
        description: Invitation to accept
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Find invitation
      - step: find
        id: "$invitation_id"
        bind_to: invitation

      - step: assert
        condition: "$invitation"
        message: "Invitation not found: $invitation_id"

      - step: assert
        condition: '$invitation.data.status == "pending"'
        message: "Invitation is not pending"

      # Check if specific invite for this prosopon
      - step: switch
        cases:
          - when: "$invitation.data.invitee_id"
            then:
              - step: assert
                condition: "$invitation.data.invitee_id == $_prosopon"
                message: "Invitation not for you"

      # Check max uses for open invites
      - step: switch
        cases:
          - when: "$invitation.data.max_uses"
            then:
              - step: assert
                condition: "$invitation.data.uses < $invitation.data.max_uses"
                message: "Invitation has reached max uses"

      # Get oikos ID
      - step: set
        bindings:
          target_oikos: "$invitation.data.oikos_id"

      # Create member-of bond
      - step: bind
        from_id: "$_parousia"
        to_id: "$target_oikos"
        desmos: "member-of"
        bind_to: membership_bond

      # Update invitation
      - step: update
        id: "$invitation_id"
        data:
          status: "accepted"
          uses: "$invitation.data.uses + 1"
          accepted_at: "{{ now() }}"

      # Get prosopon for event name (use $_prosopon which is the prosopon ID)
      - step: find
        id: "$_prosopon"
        bind_to: prosopon_entity

      - step: set
        bindings:
          joining_prosopon_name: "$prosopon_entity.data.name"

      # Get inviter prosopon for actor name
      - step: find
        id: "$invitation.data.inviter_id"
        bind_to: inviter_entity

      - step: set
        bindings:
          inviter_name: "$inviter_entity.data.name"

      # Create membership event for audit trail
      - step: call
        praxis: "politeia/create-membership-event"
        params:
          event_type: "joined"
          oikos_id: "$target_oikos"
          prosopon_id: "$_prosopon"
          prosopon_name: "$joining_prosopon_name"
          actor_id: "$invitation.data.inviter_id"
          actor_name: "$inviter_name"
          invitation_id: "$invitation_id"
        bind_to: join_event

      # Derive attainments from the oikos
      - step: call
        praxis: "politeia/derive-attainments"
        params:
          parousia_id: "$_parousia"
          oikos_id: "$target_oikos"
        bind_to: derived

      # Sync topoi distributed by this oikos (non-blocking)
      # If sync fails, join still succeeds - user can sync manually later
      - step: call
        praxis: "politeia/sync-oikos-topoi"
        params:
          oikos_id: "$target_oikos"
        bind_to: sync_result

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Joined oikos: $target_oikos"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: invitation
            source_id: "$invitation_id"

      - step: return
        value:
          accepted: true
          oikos_id: "$target_oikos"
          attainments_derived: "$derived.attainments"
          topoi_synced: "$sync_result.topoi_synced"

- eidos: praxis
  id: praxis/politeia/decline-invitation
  data:
    topos: politeia
    name: decline-invitation
    visible: true
    tier: 1
    description: |
      Decline an invitation.
    params:
      - name: invitation_id
        type: string
        required: true
        description: Invitation to decline
    steps:
      - step: find
        id: "$invitation_id"
        bind_to: invitation

      - step: assert
        condition: "$invitation"
        message: "Invitation not found"

      - step: assert
        condition: '$invitation.data.status == "pending"'
        message: "Invitation is not pending"

      - step: update
        id: "$invitation_id"
        data:
          status: "declined"

      - step: return
        value:
          declined: true
          invitation_id: "$invitation_id"

- eidos: praxis
  id: praxis/politeia/dwell-in-oikos
  data:
    topos: politeia
    name: dwell-in-oikos
    visible: true
    tier: 2
    description: |
      Move dwelling position to an oikos.

      Parousia can only dwell in one oikos at a time (exclusive).
      Removes previous dwells-in bond, creates new one.
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to dwell in
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Find oikos
      - step: find
        id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Check membership
      - step: trace
        from_id: "$_parousia"
        desmos: "member-of"
        direction: "outbound"
        bind_to: memberships

      - step: filter
        items: "$memberships"
        condition: "$item.id == $oikos_id"
        bind_to: is_member

      - step: assert
        condition: "$is_member | length > 0"
        message: "Not a member of this oikos"

      # Remove existing dwells-in bond
      - step: trace
        from_id: "$_parousia"
        desmos: "dwells-in"
        direction: "outbound"
        bind_to: current_dwelling

      - step: switch
        cases:
          - when: "$current_dwelling | length > 0"
            then:
              - step: set
                bindings:
                  previous_oikos: "$current_dwelling.0.id"
              - step: loose
                from_id: "$_parousia"
                to_id: "$current_dwelling.0.id"
                desmos: "dwells-in"

      # Create new dwells-in bond
      - step: bind
        from_id: "$_parousia"
        to_id: "$oikos_id"
        desmos: "dwells-in"

      # Update parousia
      - step: update
        id: "$_parousia"
        data:
          oikos_id: "$oikos_id"
          last_active_at: "{{ now() }}"

      - step: return
        value:
          dwelling_in: "$oikos_id"
          previous_oikos: "$previous_oikos"

- eidos: praxis
  id: praxis/politeia/leave-oikos
  data:
    topos: politeia
    name: leave-oikos
    visible: true
    tier: 2
    description: |
      Leave an oikos (remove membership).

      Removes member-of bond and any has-attainment bonds for attainments
      granted by this oikos.
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to leave
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Check membership exists
      - step: trace
        from_id: "$_parousia"
        desmos: "member-of"
        direction: "outbound"
        bind_to: memberships

      - step: filter
        items: "$memberships"
        condition: "$item.id == $oikos_id"
        bind_to: is_member

      - step: assert
        condition: "$is_member | length > 0"
        message: "Not a member of this oikos"

      # Get prosopon for event name
      - step: find
        id: "$_prosopon"
        bind_to: leaving_prosopon

      - step: set
        bindings:
          leaving_prosopon_name: "$leaving_prosopon.data.name"

      # Create membership event for audit trail (before removing bond)
      - step: call
        praxis: "politeia/create-membership-event"
        params:
          event_type: "left"
          oikos_id: "$oikos_id"
          prosopon_id: "$_prosopon"
          prosopon_name: "$leaving_prosopon_name"
          actor_id: "$_prosopon"
          actor_name: "$leaving_prosopon_name"
        bind_to: leave_event

      # Remove member-of bond
      - step: loose
        from_id: "$_parousia"
        to_id: "$oikos_id"
        desmos: "member-of"

      # If currently dwelling there, remove dwells-in
      - step: trace
        from_id: "$_parousia"
        desmos: "dwells-in"
        direction: "outbound"
        bind_to: dwelling

      - step: switch
        cases:
          - when: "$dwelling | length > 0"
            then:
              - step: switch
                cases:
                  - when: "$dwelling.0.id == $oikos_id"
                    then:
                      - step: loose
                        from_id: "$_parousia"
                        to_id: "$oikos_id"
                        desmos: "dwells-in"

      # Get attainments granted by this oikos
      - step: trace
        from_id: "$oikos_id"
        desmos: "grants-attainment"
        direction: "outbound"
        bind_to: oikos_attainments

      # Remove has-attainment bonds for these attainments
      - step: for_each
        items: "$oikos_attainments"
        item_var: attainment
        steps:
          - step: loose
            from_id: "$_parousia"
            to_id: "$attainment.id"
            desmos: "has-attainment"

      - step: return
        value:
          left: true
          oikos_id: "$oikos_id"
          attainments_removed: "$oikos_attainments | length"

# =============================================================================
# MEMBERSHIP EVENT OPERATIONS (Audit Trail)
# =============================================================================

- eidos: praxis
  id: praxis/politeia/create-membership-event
  data:
    topos: politeia
    name: create-membership-event
    visible: true
    tier: 2
    description: |
      Record a membership change event for audit trail.

      Creates a membership-event entity capturing who joined/left/was removed,
      when, and by whom.
    params:
      - name: event_type
        type: string
        required: true
        description: "Event type: joined, left, removed, invited"
      - name: oikos_id
        type: string
        required: true
        description: Oikos where the event occurred
      - name: prosopon_id
        type: string
        required: true
        description: Prosopon affected by the event
      - name: prosopon_name
        type: string
        required: false
        description: Display name at time of event
      - name: actor_id
        type: string
        required: false
        description: Who initiated the action
      - name: actor_name
        type: string
        required: false
        description: Actor display name at time of event
      - name: invitation_id
        type: string
        required: false
        description: Related invitation ID (for join events)
      - name: reason
        type: string
        required: false
        description: Optional reason (for leave/remove events)
    steps:
      # Generate event ID
      - step: set
        bindings:
          event_id: "membership-event/{{ uuid() }}"

      # Create the membership event (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-membership-event"
        inputs:
          id: "$event_id"
          event_type: "$event_type"
          oikos_id: "$oikos_id"
          prosopon_id: "$prosopon_id"
          prosopon_name: "$prosopon_name"
          actor_id: "$actor_id"
          actor_name: "$actor_name"
          invitation_id: "$invitation_id"
          reason: "$reason"
          occurred_at: "{{ now() }}"
        bind_to: event_entity

      # Bond: event child-of oikos (for traversal and visibility)
      - step: bind
        from_id: "$event_id"
        to_id: "$oikos_id"
        desmos: "child-of"

      - step: return
        value:
          event_id: "$event_id"
          event: "$event_entity"

- eidos: praxis
  id: praxis/politeia/list-membership-events
  data:
    topos: politeia
    name: list-membership-events
    visible: true
    tier: 1
    description: |
      List membership events for an oikos.

      Returns audit trail of join/leave/remove events.
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to query events for
      - name: event_type
        type: string
        required: false
        description: Filter by event type
      - name: max_results
        type: number
        required: false
        description: Maximum results (default 50)
    steps:
      - step: find
        id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Gather membership events bonded to this oikos
      - step: trace
        to_id: "$oikos_id"
        desmos: "child-of"
        direction: "inbound"
        bind_to: children

      # Filter to membership-event eidos
      - step: filter
        items: "$children"
        condition: "$item.eidos == 'membership-event'"
        bind_to: events

      # Filter by event type if specified
      - step: switch
        cases:
          - when: "$event_type"
            then:
              - step: filter
                items: "$events"
                condition: "$item.data.event_type == $event_type"
                bind_to: events

      - step: set
        bindings:
          limit: "$max_results"

      - step: switch
        cases:
          - when: "$limit"
            then: []
        default:
          - step: set
            bindings:
              limit: 50

      - step: limit
        items: "$events"
        count: "$limit"
        bind_to: events

      - step: return
        value:
          oikos_id: "$oikos_id"
          events: "$events"
          count: "$events | length"

- eidos: praxis
  id: praxis/politeia/list-oikoi
  data:
    topos: politeia
    name: list-oikoi
    visible: true
    tier: 1
    description: |
      List oikoi the parousia is member of or can see.
    params:
      - name: membership_only
        type: boolean
        required: false
        description: Only show oikoi with membership (default false)
      - name: max_results
        type: number
        required: false
        description: Maximum results (default 50)
    steps:
      - step: set
        bindings:
          limit: "$max_results"

      - step: switch
        cases:
          - when: "$limit"
            then: []
        default:
          - step: set
            bindings:
              limit: 50

      - step: switch
        cases:
          # Membership only - trace bonds
          - when: "$membership_only"
            then:
              - step: trace
                from_id: "$_parousia"
                desmos: "member-of"
                direction: "outbound"
                bind_to: oikoi
        default:
          # All visible oikoi
          - step: gather
            eidos: "oikos"
            bind_to: oikoi

      - step: limit
        items: "$oikoi"
        count: "$limit"
        bind_to: oikoi

      - step: return
        value:
          oikoi: "$oikoi"
          count: "$oikoi | length"

# =============================================================================
# ATTAINMENT OPERATIONS (Phase 19.3)
# =============================================================================

- eidos: praxis
  id: praxis/politeia/create-attainment
  data:
    topos: politeia
    name: create-attainment
    visible: true
    tier: 2
    description: |
      Create a new attainment that oikoi can grant.
    params:
      - name: attainment_id
        type: string
        required: true
        description: ID for the attainment
      - name: name
        type: string
        required: true
        description: Attainment name (e.g., "compose", "invite", "govern")
      - name: description
        type: string
        required: false
        description: Description of what this attainment enables
      - name: scope
        type: string
        required: false
        description: "Scope: oikos, topos, global (default: oikos)"
      - name: constraints
        type: object
        required: false
        description: Optional constraints (rate limits, quotas, etc.)
    steps:
      - step: set
        bindings:
          attainment_scope: "$scope"

      - step: switch
        cases:
          - when: "$attainment_scope"
            then: []
        default:
          - step: set
            bindings:
              attainment_scope: "oikos"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-attainment"
        inputs:
          id: "$attainment_id"
          name: "$name"
          description: "$description"
          scope: "$attainment_scope"
          constraints: "$constraints"
          created_at: "{{ now() }}"
        bind_to: attainment_entity

      - step: return
        value:
          attainment_id: "$attainment_id"
          attainment: "$attainment_entity"
  bonds:
    - { desmos: requires-attainment, to: attainment/govern }

- eidos: praxis
  id: praxis/politeia/grant-attainment
  data:
    topos: politeia
    name: grant-attainment
    visible: true
    tier: 2
    description: |
      Grant an attainment from an oikos.

      Caller must have sovereignty attainment (checked by authorization gate).
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos granting the attainment
      - name: attainment_id
        type: string
        required: true
        description: Attainment to grant
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Verify attainment exists
      - step: find
        id: "$attainment_id"
        bind_to: attainment

      - step: assert
        condition: "$attainment"
        message: "Attainment not found"

      # Create grants-attainment bond
      - step: bind
        from_id: "$oikos_id"
        to_id: "$attainment_id"
        desmos: "grants-attainment"
        bind_to: grant_bond

      # Create granted-by bond (inverse)
      - step: bind
        from_id: "$attainment_id"
        to_id: "$oikos_id"
        desmos: "granted-by"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Attainment granted: $attainment.data.name from $oikos_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: attainment
            source_id: "$attainment_id"

      - step: return
        value:
          granted: true
          oikos_id: "$oikos_id"
          attainment_id: "$attainment_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/govern }
    - { desmos: requires-attainment, to: attainment/sovereign }

- eidos: praxis
  id: praxis/politeia/revoke-attainment
  data:
    topos: politeia
    name: revoke-attainment
    visible: true
    tier: 2
    description: |
      Revoke an attainment grant from an oikos.

      Caller must have sovereignty attainment (checked by authorization gate).
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos revoking the attainment
      - name: attainment_id
        type: string
        required: true
        description: Attainment to revoke
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Remove grants-attainment bond
      - step: loose
        from_id: "$oikos_id"
        to_id: "$attainment_id"
        desmos: "grants-attainment"

      # Remove granted-by bond (inverse)
      - step: loose
        from_id: "$attainment_id"
        to_id: "$oikos_id"
        desmos: "granted-by"

      - step: return
        value:
          revoked: true
          oikos_id: "$oikos_id"
          attainment_id: "$attainment_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/govern }
    - { desmos: requires-attainment, to: attainment/sovereign }

- eidos: praxis
  id: praxis/politeia/derive-attainments
  data:
    topos: politeia
    name: derive-attainments
    visible: true
    tier: 2
    description: |
      Derive attainments for a parousia based on oikos memberships.

      Traverses: parousia -> member-of -> oikos -> grants-attainment -> attainment
      Creates has-attainment bonds for each derived attainment.
    params:
      - name: parousia_id
        type: string
        required: false
        description: Parousia to derive for (defaults to caller)
      - name: oikos_id
        type: string
        required: false
        description: Specific oikos to derive from (optional)
    steps:
      - step: set
        bindings:
          target_parousia: "$parousia_id"

      - step: switch
        cases:
          - when: "$target_parousia"
            then: []
        default:
          - step: set
            bindings:
              target_parousia: "$_parousia"

      - step: assert
        condition: "$target_parousia"
        message: "No parousia specified"

      # Get memberships
      - step: trace
        from_id: "$target_parousia"
        desmos: "member-of"
        direction: "outbound"
        bind_to: memberships

      # Filter to specific oikos if provided
      - step: switch
        cases:
          - when: "$oikos_id"
            then:
              - step: filter
                items: "$memberships"
                condition: "$item.id == $oikos_id"
                bind_to: memberships

      # Collect attainments from all oikoi
      - step: set
        bindings:
          all_attainments: []
          bonds_created: 0

      - step: for_each
        items: "$memberships"
        item_var: oikos
        steps:
          # Get attainments granted by this oikos
          - step: trace
            from_id: "$oikos.id"
            desmos: "grants-attainment"
            direction: "outbound"
            bind_to: oikos_attainments

          # Create has-attainment bonds
          - step: for_each
            items: "$oikos_attainments"
            item_var: attainment
            steps:
              - step: bind
                from_id: "$target_parousia"
                to_id: "$attainment.id"
                desmos: "has-attainment"

      # Gather all attainments the parousia now has
      - step: trace
        from_id: "$target_parousia"
        desmos: "has-attainment"
        direction: "outbound"
        bind_to: final_attainments

      - step: return
        value:
          parousia_id: "$target_parousia"
          attainments: "$final_attainments"
          count: "$final_attainments | length"

- eidos: praxis
  id: praxis/politeia/list-attainments
  data:
    topos: politeia
    name: list-attainments
    visible: true
    tier: 1
    description: |
      List attainments for a parousia or oikos.
    params:
      - name: parousia_id
        type: string
        required: false
        description: List attainments for this parousia
      - name: oikos_id
        type: string
        required: false
        description: List attainments granted by this oikos
      - name: max_results
        type: number
        required: false
        description: Maximum results
    steps:
      - step: set
        bindings:
          limit: "$max_results"

      - step: switch
        cases:
          - when: "$limit"
            then: []
        default:
          - step: set
            bindings:
              limit: 100

      - step: switch
        cases:
          # List for parousia
          - when: "$parousia_id"
            then:
              - step: trace
                from_id: "$parousia_id"
                desmos: "has-attainment"
                direction: "outbound"
                bind_to: attainments

          # List for oikos
          - when: "$oikos_id"
            then:
              - step: trace
                from_id: "$oikos_id"
                desmos: "grants-attainment"
                direction: "outbound"
                bind_to: attainments

        # Default: caller's attainments
        default:
          - step: trace
            from_id: "$_parousia"
            desmos: "has-attainment"
            direction: "outbound"
            bind_to: attainments

      - step: limit
        items: "$attainments"
        count: "$limit"
        bind_to: attainments

      - step: return
        value:
          attainments: "$attainments"
          count: "$attainments | length"

# =============================================================================
# AFFORDANCE OPERATIONS (Phase 19.4)
# =============================================================================

- eidos: praxis
  id: praxis/politeia/create-affordance
  data:
    topos: politeia
    name: create-affordance
    visible: true
    tier: 2
    description: |
      Create an affordance that surfaces an attainment.
    params:
      - name: affordance_id
        type: string
        required: true
        description: ID for the affordance
      - name: name
        type: string
        required: true
        description: Affordance name
      - name: description
        type: string
        required: false
        description: Description
      - name: praxis_id
        type: string
        required: true
        description: Praxis to invoke when activated
      - name: attainment_id
        type: string
        required: true
        description: Attainment that enables this
      - name: context_filter
        type: object
        required: false
        description: When this affordance is relevant
      - name: priority
        type: number
        required: false
        description: Display priority (higher = more prominent)
    steps:
      # Verify attainment exists
      - step: find
        id: "$attainment_id"
        bind_to: attainment

      - step: assert
        condition: "$attainment"
        message: "Attainment not found"

      - step: set
        bindings:
          affordance_priority: "$priority"

      - step: switch
        cases:
          - when: "$affordance_priority"
            then: []
        default:
          - step: set
            bindings:
              affordance_priority: 0

      # Create affordance (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-affordance"
        inputs:
          id: "$affordance_id"
          name: "$name"
          description: "$description"
          praxis_id: "$praxis_id"
          context_filter: "$context_filter"
          priority: "$affordance_priority"
          created_at: "{{ now() }}"
        bind_to: affordance_entity

      # Bond: attainment surfaces-as affordance
      - step: bind
        from_id: "$attainment_id"
        to_id: "$affordance_id"
        desmos: "surfaces-as"

      # Bond: affordance enabled-by attainment
      - step: bind
        from_id: "$affordance_id"
        to_id: "$attainment_id"
        desmos: "enabled-by"

      - step: return
        value:
          affordance_id: "$affordance_id"
          affordance: "$affordance_entity"
  bonds:
    - { desmos: requires-attainment, to: attainment/hud }

- eidos: praxis
  id: praxis/politeia/gather-affordances
  data:
    topos: politeia
    name: gather-affordances
    visible: true
    tier: 1
    description: |
      Gather all affordances available to the caller.

      Traverses: parousia -> has-attainment -> attainment -> surfaces-as -> affordance
    params:
      - name: context_entity_id
        type: string
        required: false
        description: Filter affordances relevant to this entity
      - name: max_results
        type: number
        required: false
        description: Maximum results
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      - step: set
        bindings:
          limit: "$max_results"

      - step: switch
        cases:
          - when: "$limit"
            then: []
        default:
          - step: set
            bindings:
              limit: 100

      # Get attainments
      - step: trace
        from_id: "$_parousia"
        desmos: "has-attainment"
        direction: "outbound"
        bind_to: attainments

      # Collect affordances from attainments
      - step: set
        bindings:
          all_affordances: []

      - step: for_each
        items: "$attainments"
        item_var: attainment
        steps:
          - step: trace
            from_id: "$attainment.id"
            desmos: "surfaces-as"
            direction: "outbound"
            bind_to: affordances

          # Add to collection (note: this will include duplicates)
          # In a real impl we'd dedupe, but for now this works

      # Gather affordances directly since for_each doesn't accumulate well
      - step: gather
        eidos: "affordance"
        bind_to: all_affordances

      # Filter to ones enabled by attainments we have
      # For now, return all visible affordances (dwelling filters)

      - step: limit
        items: "$all_affordances"
        count: "$limit"
        bind_to: all_affordances

      - step: return
        value:
          affordances: "$all_affordances"
          count: "$all_affordances | length"

- eidos: praxis
  id: praxis/politeia/render-hud
  data:
    topos: politeia
    name: render-hud
    visible: true
    tier: 1
    description: |
      Build the affordance set for the caller.

      Returns all affordances available to the current parousia.
      Spatial placement is handled by modes, not by this praxis.
    params: []
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Get all affordances for this parousia
      - step: call
        praxis: "politeia/gather-affordances"
        params: {}
        bind_to: affordance_result

      - step: return
        value:
          affordances: "$affordance_result.affordances"
          parousia_id: "$_parousia"

- eidos: praxis
  id: praxis/politeia/invoke-affordance
  data:
    topos: politeia
    name: invoke-affordance
    visible: true
    tier: 3
    description: |
      Invoke an affordance (execute its action praxis).

      Verifies caller has required attainment before invoking.
    params:
      - name: affordance_id
        type: string
        required: true
        description: Affordance to invoke
      - name: params
        type: object
        required: false
        description: Parameters for the action praxis
    steps:
      - step: assert
        condition: "$_parousia"
        message: "No dwelling context"

      # Find affordance
      - step: find
        id: "$affordance_id"
        bind_to: affordance

      - step: assert
        condition: "$affordance"
        message: "Affordance not found"

      # Get enabling attainment
      - step: trace
        from_id: "$affordance_id"
        desmos: "enabled-by"
        direction: "outbound"
        bind_to: enabling_attainments

      - step: assert
        condition: "$enabling_attainments | length > 0"
        message: "Affordance has no enabling attainment"

      # Verify caller has the attainment
      - step: trace
        from_id: "$_parousia"
        desmos: "has-attainment"
        direction: "outbound"
        bind_to: my_attainments

      - step: set
        bindings:
          required_attainment_id: "$enabling_attainments.0.id"

      - step: filter
        items: "$my_attainments"
        condition: "$item.id == $required_attainment_id"
        bind_to: has_required

      - step: assert
        condition: "$has_required | length > 0"
        message: "Missing required attainment"

      # Get praxis to invoke
      - step: set
        bindings:
          action_praxis: "$affordance.data.praxis_id"

      # Invoke the praxis
      - step: call
        praxis: "$action_praxis"
        params: "$params"
        bind_to: result

      - step: return
        value:
          affordance_id: "$affordance_id"
          praxis_invoked: "$action_praxis"
          result: "$result"

# =============================================================================
# TOPOS DISTRIBUTION (Phase 30.5)
# =============================================================================

- eidos: praxis
  id: praxis/politeia/create-distribution-oikos
  data:
    topos: politeia
    name: create-distribution-oikos
    visible: true
    tier: 2
    description: |
      Create a distribution oikos for a topos-prod.

      Distribution oikoi are how topoi reach users:
      - commons: Public oikos, anyone can join
      - premium: Intimate oikos, invitation required

      Creates oikos and grants topos-use attainment.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to distribute
      - name: oikos_id
        type: string
        required: true
        description: ID for the distribution oikos
      - name: name
        type: string
        required: true
        description: Human-readable oikos name
      - name: distribution_kind
        type: string
        required: true
        description: "Distribution kind: commons (open) or premium (peer-only)"
      - name: description
        type: string
        required: false
        description: Oikos description
    steps:
      # Verify topos-prod exists
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "topos-prod not found: $topos_prod_id"

      - step: assert
        condition: "$topos_prod.eidos == 'topos-prod'"
        message: "Entity is not a topos-prod: $topos_prod_id"

      # Map distribution kind to oikos kind
      # commons distribution -> commons oikos (open)
      # premium distribution -> peer oikos (invitation only)
      - step: set
        bindings:
          oikos_kind: "peer"

      - step: switch
        cases:
          - when: "$distribution_kind == 'commons'"
            then:
              - step: set
                bindings:
                  oikos_kind: "commons"

      # Create the distribution oikos
      - step: call
        praxis: "politeia/create-oikos"
        params:
          oikos_id: "$oikos_id"
          name: "$name"
          description: "$description"
          kind: "$oikos_kind"
        bind_to: oikos_result

      # Create use attainment for this topos
      - step: set
        bindings:
          attainment_id: "attainment/use-$topos_prod.data.topos_id"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-attainment"
        inputs:
          id: "$attainment_id"
          name: "use-$topos_prod.data.topos_id"
          description: "Ability to use $topos_prod.data.topos_id topos capabilities"
          scope: "oikos"
          created_at: "{{ now() }}"
        bind_to: attainment_entity

      # Grant attainment from oikos
      - step: bind
        from_id: "$oikos_id"
        to_id: "$attainment_id"
        desmos: "grants-attainment"

      # Bond oikos distributes topos
      - step: bind
        from_id: "$oikos_id"
        to_id: "$topos_prod_id"
        desmos: "distributes"

      - step: return
        value:
          oikos_id: "$oikos_id"
          distribution_kind: "$distribution_kind"
          attainment_id: "$attainment_id"
          topos_prod_id: "$topos_prod_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/distribute }

- eidos: praxis
  id: praxis/politeia/distribute-topos
  data:
    topos: politeia
    name: distribute-topos
    visible: true
    tier: 2
    description: |
      Distribute a topos-prod through an existing oikos.

      Adds distribution bond and grants topos-use attainment.
      Use this when adding a topos to an existing oikos.
      Use create-distribution-oikos for dedicated distribution oikoi.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to distribute
      - name: oikos_id
        type: string
        required: true
        description: The oikos to distribute through
    steps:
      # Verify topos-prod exists
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "topos-prod not found: $topos_prod_id"

      - step: assert
        condition: "$topos_prod.eidos == 'topos-prod'"
        message: "Entity is not a topos-prod: $topos_prod_id"

      # Verify oikos exists
      - step: find
        id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Create use attainment for this topos (if not exists)
      - step: set
        bindings:
          attainment_id: "attainment/use-$topos_prod.data.topos_id"

      - step: find
        id: "$attainment_id"
        bind_to: existing_attainment

      - step: switch
        cases:
          - when: "not $existing_attainment"
            then:
              # CE4: compose instead of arise
              - step: compose
                typos_id: "typos-def-attainment"
                inputs:
                  id: "$attainment_id"
                  name: "use-$topos_prod.data.topos_id"
                  description: "Ability to use $topos_prod.data.topos_id topos capabilities"
                  scope: "oikos"
                  created_at: "{{ now() }}"

      # Grant attainment from oikos
      - step: bind
        from_id: "$oikos_id"
        to_id: "$attainment_id"
        desmos: "grants-attainment"

      # Bond oikos distributes topos
      - step: bind
        from_id: "$oikos_id"
        to_id: "$topos_prod_id"
        desmos: "distributes"

      - step: return
        value:
          distributed: true
          oikos_id: "$oikos_id"
          topos_prod_id: "$topos_prod_id"
          attainment_id: "$attainment_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/distribute }

- eidos: praxis
  id: praxis/politeia/list-distributed-topoi
  data:
    topos: politeia
    name: list-distributed-topoi
    visible: true
    tier: 1
    description: |
      List topoi distributed by an oikos.

      Follows distributes bonds from oikos to topos-prod entities.
    params:
      - name: oikos_id
        type: string
        required: true
        description: The oikos to query
    steps:
      - step: find
        id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Trace distributes bonds from oikos
      - step: trace
        from_id: "$oikos_id"
        desmos: "distributes"
        resolve: to
        bind_to: distributed

      - step: return
        value:
          oikos_id: "$oikos_id"
          topoi: "$distributed"
          count: "$distributed | length"

- eidos: praxis
  id: praxis/politeia/list-topos-distributors
  data:
    topos: politeia
    name: list-topos-distributors
    visible: true
    tier: 1
    description: |
      List oikoi that distribute a topos.

      Follows distributes bonds to find all distribution oikoi.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to query
    steps:
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "topos-prod not found: $topos_prod_id"

      # Trace distributes bonds to topos
      - step: trace
        to_id: "$topos_prod_id"
        desmos: "distributes"
        resolve: from
        bind_to: distributors

      - step: return
        value:
          topos_prod_id: "$topos_prod_id"
          distributors: "$distributors"
          count: "$distributors | length"

- eidos: praxis
  id: praxis/politeia/install-topos
  data:
    topos: politeia
    name: install-topos
    visible: true
    tier: 2
    description: |
      Install a topos from a distribution oikos.

      Verifies the dwelling oikos has access to the topos through
      a distribution oikos (has use-{topos_id} attainment), then
      creates a uses-topos bond to track the installation.

      NOTE: Currently tracks installation intent. Dynamic content
      loading (loading new eide/praxeis at runtime) is a future
      capability. Genesis topoi are loaded at bootstrap.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to install
      - name: oikos_id
        type: string
        required: false
        description: The oikos to install for (defaults to dwelling oikos)
    steps:
      # Determine target oikos
      - step: set
        bindings:
          target_oikos_id: "$oikos_id"

      - step: switch
        cases:
          - when: "not $target_oikos_id"
            then:
              - step: assert
                condition: "$_oikos"
                message: "No oikos specified and no dwelling oikos context"
              - step: set
                bindings:
                  target_oikos_id: "$_oikos.id"

      # Verify target oikos exists
      - step: find
        id: "$target_oikos_id"
        bind_to: target_oikos

      - step: assert
        condition: "$target_oikos"
        message: "Oikos not found: $target_oikos_id"

      # Verify topos-prod exists
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "topos-prod not found: $topos_prod_id"

      - step: assert
        condition: "$topos_prod.eidos == 'topos-prod'"
        message: "Entity is not a topos-prod: $topos_prod_id"

      # Verify oikos has access (use-{topos_id} attainment)
      - step: set
        bindings:
          required_attainment_id: "attainment/use-$topos_prod.data.topos_id"

      # Trace attainments granted by any oikos the target is member of
      # For now, check if the attainment exists and is granted by an oikos
      # that distributes this topos
      - step: trace
        to_id: "$topos_prod_id"
        desmos: "distributes"
        resolve: from
        bind_to: distribution_oikoi

      - step: assert
        condition: "$distribution_oikoi | length > 0"
        message: "No distribution oikos found for topos: $topos_prod_id"

      # Check if already installed
      - step: trace
        from_id: "$target_oikos_id"
        desmos: "uses-topos"
        resolve: to
        bind_to: installed_topoi

      - step: set
        bindings:
          already_installed: false

      - step: for_each
        items: "$installed_topoi"
        item_var: installed
        steps:
          - step: switch
            cases:
              - when: "$installed.id == '$topos_prod_id'"
                then:
                  - step: set
                    bindings:
                      already_installed: true

      - step: switch
        cases:
          - when: "$already_installed"
            then:
              - step: return
                value:
                  installed: false
                  already_installed: true
                  message: "Topos already installed"
                  topos_prod_id: "$topos_prod_id"
                  oikos_id: "$target_oikos_id"

      # Create uses-topos bond
      - step: bind
        from_id: "$target_oikos_id"
        to_id: "$topos_prod_id"
        desmos: "uses-topos"

      - step: return
        value:
          installed: true
          topos_prod_id: "$topos_prod_id"
          oikos_id: "$target_oikos_id"
          topos_name: "$topos_prod.data.topos_id"

- eidos: praxis
  id: praxis/politeia/uninstall-topos
  data:
    topos: politeia
    name: uninstall-topos
    visible: true
    tier: 2
    description: |
      Uninstall a topos from an oikos.

      Removes the uses-topos bond. Does not remove the topos content
      from the kosmos (content persists for other oikoi that may use it).
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to uninstall
      - name: oikos_id
        type: string
        required: false
        description: The oikos to uninstall from (defaults to dwelling oikos)
    steps:
      # Determine target oikos
      - step: set
        bindings:
          target_oikos_id: "$oikos_id"

      - step: switch
        cases:
          - when: "not $target_oikos_id"
            then:
              - step: assert
                condition: "$_oikos"
                message: "No oikos specified and no dwelling oikos context"
              - step: set
                bindings:
                  target_oikos_id: "$_oikos.id"

      # Verify entities exist
      - step: find
        id: "$target_oikos_id"
        bind_to: target_oikos

      - step: assert
        condition: "$target_oikos"
        message: "Oikos not found: $target_oikos_id"

      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "topos-prod not found: $topos_prod_id"

      # Remove uses-topos bond
      - step: loose
        from_id: "$target_oikos_id"
        to_id: "$topos_prod_id"
        desmos: "uses-topos"

      - step: return
        value:
          uninstalled: true
          topos_prod_id: "$topos_prod_id"
          oikos_id: "$target_oikos_id"

- eidos: praxis
  id: praxis/politeia/list-installed-topoi
  data:
    topos: politeia
    name: list-installed-topoi
    visible: true
    tier: 1
    description: |
      List topoi installed for an oikos.

      Follows uses-topos bonds from the oikos.
    params:
      - name: oikos_id
        type: string
        required: false
        description: The oikos to query (defaults to dwelling oikos)
    steps:
      # Determine target oikos
      - step: set
        bindings:
          target_oikos_id: "$oikos_id"

      - step: switch
        cases:
          - when: "not $target_oikos_id"
            then:
              - step: assert
                condition: "$_oikos"
                message: "No oikos specified and no dwelling oikos context"
              - step: set
                bindings:
                  target_oikos_id: "$_oikos.id"

      - step: find
        id: "$target_oikos_id"
        bind_to: target_oikos

      - step: assert
        condition: "$target_oikos"
        message: "Oikos not found: $target_oikos_id"

      # Trace uses-topos bonds
      - step: trace
        from_id: "$target_oikos_id"
        desmos: "uses-topos"
        resolve: to
        bind_to: installed

      - step: return
        value:
          oikos_id: "$target_oikos_id"
          topoi: "$installed"
          count: "$installed | length"

# =============================================================================
# ADMIN/UTILITY OPERATIONS
# =============================================================================

- eidos: praxis
  id: praxis/politeia/admin-bind
  data:
    topos: politeia
    name: admin-bind
    visible: true
    tier: 3
    description: |
      Create a bond directly (administrative utility).

      This bypasses normal governance checks. Use for bootstrap
      and repair operations when normal praxeis cannot establish
      the required bonds due to missing dwelling context.

      WARNING: Use with care — this does not verify permissions.
    params:
      - name: from_id
        type: string
        required: true
        description: Source entity ID
      - name: to_id
        type: string
        required: true
        description: Target entity ID
      - name: desmos
        type: string
        required: true
        description: Bond type (desmos name)
    steps:
      # Verify entities exist
      - step: find
        id: "$from_id"
        bind_to: from_entity

      - step: assert
        condition: "$from_entity"
        message: "From entity not found: $from_id"

      - step: find
        id: "$to_id"
        bind_to: to_entity

      - step: assert
        condition: "$to_entity"
        message: "To entity not found: $to_id"

      # Create the bond
      - step: bind
        from_id: "$from_id"
        to_id: "$to_id"
        desmos: "$desmos"
        bind_to: bond

      - step: return
        value:
          created: true
          from_id: "$from_id"
          to_id: "$to_id"
          desmos: "$desmos"
          bond: "$bond"
  bonds:
    - { desmos: requires-attainment, to: attainment/admin }

- eidos: praxis
  id: praxis/politeia/admin-loose
  data:
    topos: politeia
    name: admin-loose
    visible: true
    tier: 3
    description: |
      Remove a bond directly (administrative utility).

      This bypasses normal governance checks. Use for repair operations.
    params:
      - name: from_id
        type: string
        required: true
        description: Source entity ID
      - name: to_id
        type: string
        required: true
        description: Target entity ID
      - name: desmos
        type: string
        required: true
        description: Bond type (desmos name)
    steps:
      - step: loose
        from_id: "$from_id"
        to_id: "$to_id"
        desmos: "$desmos"

      - step: return
        value:
          removed: true
          from_id: "$from_id"
          to_id: "$to_id"
          desmos: "$desmos"
  bonds:
    - { desmos: requires-attainment, to: attainment/admin }

# =============================================================================
# TOPOS DISTRIBUTION
# =============================================================================

- eidos: praxis
  id: praxis/politeia/sync-oikos-topoi
  data:
    topos: politeia
    name: sync-oikos-topoi
    visible: false
    tier: 2
    description: |
      Sync topoi distributed by an oikos to the local installation.
      Called when joining an oikos or when dwelling and oikos has updates.
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to sync topoi from
    steps:
      # Trace topoi distributed by this oikos
      - step: trace
        from_id: "$oikos_id"
        desmos: "distributes"
        direction: "outbound"
        bind_to: distributed_topoi

      # For each topos-prod, check if installed and install if not
      - step: for_each
        items: "$distributed_topoi"
        item_var: topos_prod
        steps:
          - step: call
            praxis: politeia/install-topos-if-needed
            params:
              topos_prod_id: "$topos_prod.id"

      - step: return
        value:
          oikos_id: "$oikos_id"
          topoi_synced: "{{ $distributed_topoi | length }}"

- eidos: praxis
  id: praxis/politeia/install-topos-if-needed
  data:
    topos: politeia
    name: install-topos-if-needed
    visible: false
    tier: 2
    description: |
      Install a topos-prod if not already installed locally.
      Checks local installations, fetches if missing.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to install
    steps:
      # Find the topos-prod
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "Topos-prod not found: $topos_prod_id"

      # Check if already installed (trace uses-topos from dwelling oikos)
      - step: trace
        from_id: "$_oikos"
        desmos: "uses-topos"
        direction: "outbound"
        bind_to: installed_topoi

      - step: filter
        items: "$installed_topoi"
        condition: "$item.id == $topos_prod_id"
        bind_to: already_installed

      # If not installed, install it
      - step: switch
        cases:
          - when: "{{ $already_installed | length }} == 0"
            then:
              - step: call
                praxis: politeia/install-topos
                params:
                  topos_prod_id: "$topos_prod_id"
                bind_to: install_result
              - step: return
                value:
                  installed: true
                  topos_prod_id: "$topos_prod_id"

      - step: return
        value:
          installed: false
          topos_prod_id: "$topos_prod_id"
          reason: "already installed"

- eidos: praxis
  id: praxis/politeia/update-topos-if-newer
  data:
    topos: politeia
    name: update-topos-if-newer
    visible: false
    tier: 2
    description: |
      Update an installed topos if a newer version is available.
      Compares versions and updates if the distributed version is newer.
    params:
      - name: topos_prod_id
        type: string
        required: true
        description: The topos-prod to potentially update
      - name: installed_topoi
        type: array
        required: true
        description: Array of currently installed topos entities
    steps:
      # Find the distributed topos-prod
      - step: find
        id: "$topos_prod_id"
        bind_to: topos_prod

      - step: assert
        condition: "$topos_prod"
        message: "Topos-prod not found: $topos_prod_id"

      # Find matching installed topos by topos_id (not by exact id since version differs)
      - step: filter
        items: "$installed_topoi"
        condition: "$item.data.topos_id == $topos_prod.data.topos_id"
        bind_to: matching_installed

      # If not installed at all, install it
      - step: switch
        cases:
          - when: "{{ $matching_installed | length }} == 0"
            then:
              - step: call
                praxis: politeia/install-topos
                params:
                  topos_prod_id: "$topos_prod_id"
                bind_to: install_result
              - step: return
                value:
                  updated: true
                  topos_prod_id: "$topos_prod_id"
                  reason: "not previously installed"

      # Get the installed version
      - step: set
        bindings:
          installed_version: "$matching_installed.0.data.version"
          distributed_version: "$topos_prod.data.version"

      # Compare versions (simple string compare for now - semver compare would be better)
      # A proper implementation would use semver comparison
      - step: switch
        cases:
          - when: "$distributed_version != $installed_version"
            then:
              # Re-install with newer version
              - step: call
                praxis: politeia/install-topos
                params:
                  topos_prod_id: "$topos_prod_id"
                bind_to: update_result
              - step: return
                value:
                  updated: true
                  topos_prod_id: "$topos_prod_id"
                  from_version: "$installed_version"
                  to_version: "$distributed_version"

      - step: return
        value:
          updated: false
          topos_prod_id: "$topos_prod_id"
          reason: "already at distributed version"

- eidos: praxis
  id: praxis/politeia/reconcile-oikos-topoi
  data:
    topos: politeia
    name: reconcile-oikos-topoi
    visible: false
    tier: 2
    description: |
      Reconcile topos versions when dwelling in an oikos.
      Called on dwell-in to check for updates.

      Lazy update strategy: updates are applied when dwelling,
      not immediately when the oikos changes its distribution.
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to reconcile topoi for
    steps:
      # Get oikos's current distributed topoi
      - step: trace
        from_id: "$oikos_id"
        desmos: "distributes"
        direction: "outbound"
        bind_to: distributed_topoi

      # Get locally installed topoi (from dwelling oikos)
      - step: trace
        from_id: "$_oikos"
        desmos: "uses-topos"
        direction: "outbound"
        bind_to: installed_topoi

      # Track updates
      - step: set
        bindings:
          updates_applied: []

      # Compare and update each distributed topos
      - step: for_each
        items: "$distributed_topoi"
        item_var: topos_prod
        steps:
          - step: call
            praxis: politeia/update-topos-if-newer
            params:
              topos_prod_id: "$topos_prod.id"
              installed_topoi: "$installed_topoi"
            bind_to: update_result
          # Note: Ideally we'd append to updates_applied here, but
          # aggregate operations in for_each loops may need interpreter support

      - step: return
        value:
          reconciled: true
          oikos_id: "$oikos_id"
          distributed_count: "{{ $distributed_topoi | length }}"

# =============================================================================
# FEDERATION OPERATIONS
# =============================================================================
# Federation enables continuous sync between oikoi across kosmoi.
# The federates-with bond IS the federation — no separate link entity.
# Content flows through the bond graph (Visibility = Reachability).

- eidos: praxis
  id: praxis/politeia/federate-oikoi
  data:
    topos: politeia
    name: federate-oikoi
    visible: true
    tier: 3
    description: |
      Establish federation between local and remote oikoi.
      Creates mutual federates-with bonds and initializes sync infrastructure.

      Both oikoi must bond for sync to flow (mutual consent).
      Content in bonded oikoi syncs continuously.

      Requires: federate attainment and sovereignty attainment (checked by authorization gate).
    params:
      - name: local_oikos_id
        type: string
        required: true
        description: Local oikos to federate
      - name: remote_oikos_id
        type: string
        required: true
        description: Remote oikos to federate with
      - name: remote_pubkey
        type: string
        required: true
        description: Public key of remote oikos's kosmos
      - name: sync_direction
        type: string
        required: false
        description: "push, pull, or bidirectional (default: bidirectional)"
      - name: eidos_filter
        type: array
        required: false
        description: "Which eide to sync (empty = all reachable)"
    steps:
      # Set default sync direction
      - step: set
        bindings:
          direction: "$sync_direction"
      - step: switch
        cases:
          - when: "$direction == null"
            then:
              - step: set
                bindings:
                  direction: "bidirectional"

      # Create data-channel for transport (via aither)
      - step: call
        praxis: aither/create-data-channel
        params:
          name: "federation-$local_oikos_id-$remote_oikos_id"
          remote_pubkey: "$remote_pubkey"
        bind_to: channel_result

      # Create federates-with bond from local to remote
      - step: bind
        from_id: "$local_oikos_id"
        to_id: "$remote_oikos_id"
        desmos: "federates-with"
        properties:
          sync_direction: "$direction"
          eidos_filter: "$eidos_filter"
          channel_id: "$channel_result.channel_id"
        bind_to: bond_result

      # Create sync-cursor to track sync position
      - step: set
        bindings:
          cursor_id: "sync-cursor/$local_oikos_id-$remote_oikos_id"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-sync-cursor"
        inputs:
          id: "$cursor_id"
          federation_bond_id: "$bond_result.bond_id"
          local_oikos_id: "$local_oikos_id"
          remote_oikos_id: "$remote_oikos_id"
          local_version: 0
          remote_version: 0
          status: "active"
          created_at: "{{ now() }}"
        bind_to: cursor

      # Bond cursor to local oikos
      - step: bind
        from_id: "$cursor_id"
        to_id: "$local_oikos_id"
        desmos: "tracks-sync"

      - step: return
        value:
          federated: true
          local_oikos_id: "$local_oikos_id"
          remote_oikos_id: "$remote_oikos_id"
          bond_id: "$bond_result.bond_id"
          channel_id: "$channel_result.channel_id"
          cursor_id: "$cursor_id"
          sync_direction: "$direction"
  bonds:
    - { desmos: requires-attainment, to: attainment/federate }
    - { desmos: requires-attainment, to: attainment/sovereign }

- eidos: praxis
  id: praxis/politeia/unfederate-oikoi
  data:
    topos: politeia
    name: unfederate-oikoi
    visible: true
    tier: 3
    description: |
      Dissolve federation between oikoi.
      Removes federates-with bond and closes data-channel.
      Sync-cursor is marked inactive but preserved for audit.
    params:
      - name: local_oikos_id
        type: string
        required: true
        description: Local oikos
      - name: remote_oikos_id
        type: string
        required: true
        description: Remote oikos to unfederate from
    steps:
      # Find the federates-with bond
      - step: trace
        from_id: "$local_oikos_id"
        desmos: "federates-with"
        direction: "outbound"
        bind_to: federations

      - step: filter
        items: "$federations"
        condition: "$item.id == $remote_oikos_id"
        bind_to: matching

      - step: assert
        condition: "$matching | length > 0"
        message: "Federation not found between these oikoi"

      # Get the bond to find channel_id
      # (Simplified - may need bond query by endpoints)

      # Remove federates-with bond
      - step: loose
        from_id: "$local_oikos_id"
        to_id: "$remote_oikos_id"
        desmos: "federates-with"

      # Mark sync-cursor as paused
      - step: set
        bindings:
          cursor_id: "sync-cursor/$local_oikos_id-$remote_oikos_id"

      - step: find
        id: "$cursor_id"
        bind_to: cursor

      - step: switch
        cases:
          - when: "$cursor != null"
            then:
              - step: update
                id: "$cursor_id"
                data:
                  status: "paused"

      - step: return
        value:
          unfederated: true
          local_oikos_id: "$local_oikos_id"
          remote_oikos_id: "$remote_oikos_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/federate }

- eidos: praxis
  id: praxis/politeia/list-federations
  data:
    topos: politeia
    name: list-federations
    visible: true
    tier: 2
    description: |
      List all federation bonds for an oikos.
      Returns both outbound (we federate with) and inbound (they federate with us).
    params:
      - name: oikos_id
        type: string
        required: true
        description: Oikos to list federations for
    steps:
      # Get outbound federations
      - step: trace
        from_id: "$oikos_id"
        desmos: "federates-with"
        direction: "outbound"
        bind_to: outbound

      # Get inbound federations
      - step: trace
        from_id: "$oikos_id"
        desmos: "federates-with"
        direction: "inbound"
        bind_to: inbound

      - step: return
        value:
          oikos_id: "$oikos_id"
          outbound: "$outbound"
          inbound: "$inbound"
          total: "{{ ($outbound | length) + ($inbound | length) }}"
  bonds:
    - { desmos: requires-attainment, to: attainment/federate }

- eidos: praxis
  id: praxis/politeia/resolve-conflict
  data:
    topos: politeia
    name: resolve-conflict
    visible: true
    tier: 2
    description: |
      Resolve a sync conflict manually.
      Choose local version, remote version, or provide merged data.
    params:
      - name: conflict_id
        type: string
        required: true
        description: ID of the sync-conflict to resolve
      - name: resolution
        type: string
        required: true
        description: "Resolution choice: local, remote, or merged"
      - name: merged_data
        type: object
        required: false
        description: "Custom merged data (required if resolution is merged)"
    steps:
      # Find the conflict
      - step: find
        id: "$conflict_id"
        bind_to: conflict

      - step: assert
        condition: "$conflict != null"
        message: "Conflict not found"

      - step: assert
        condition: "$conflict.data.status == 'open'"
        message: "Conflict already resolved"

      # Validate resolution
      - step: assert
        condition: "$resolution in ['local', 'remote', 'merged']"
        message: "Resolution must be local, remote, or merged"

      - step: switch
        cases:
          - when: "$resolution == 'merged'"
            then:
              - step: assert
                condition: "$merged_data != null"
                message: "merged_data required when resolution is merged"

      # Determine final data based on resolution
      - step: switch
        cases:
          - when: "$resolution == 'local'"
            then:
              - step: set
                bindings:
                  final_data: "$conflict.data.local_data"
          - when: "$resolution == 'remote'"
            then:
              - step: set
                bindings:
                  final_data: "$conflict.data.remote_data"
          - when: "$resolution == 'merged'"
            then:
              - step: set
                bindings:
                  final_data: "$merged_data"

      # Apply resolution to the entity
      - step: update
        id: "$conflict.data.entity_id"
        data: "$final_data"

      # Mark conflict as resolved
      - step: update
        id: "$conflict_id"
        data:
          status: "resolved"
          resolution: "$resolution"
          merged_data: "$merged_data"
          resolved_by: "$_prosopon"
          resolved_at: "{{ now() }}"

      - step: return
        value:
          resolved: true
          conflict_id: "$conflict_id"
          entity_id: "$conflict.data.entity_id"
          resolution: "$resolution"
  bonds:
    - { desmos: requires-attainment, to: attainment/federate }

- eidos: praxis
  id: praxis/politeia/list-conflicts
  data:
    topos: politeia
    name: list-conflicts
    visible: true
    tier: 2
    description: |
      List sync conflicts, optionally filtered by status or oikos.
    params:
      - name: oikos_id
        type: string
        required: false
        description: Filter by oikos (optional)
      - name: status
        type: string
        required: false
        description: "Filter by status: open or resolved (default: open)"
    steps:
      # Set default status filter
      - step: set
        bindings:
          filter_status: "$status"
      - step: switch
        cases:
          - when: "$filter_status == null"
            then:
              - step: set
                bindings:
                  filter_status: "open"

      # Gather all sync-conflicts
      - step: gather
        eidos: sync-conflict
        bind_to: all_conflicts

      # Filter by status
      - step: filter
        items: "$all_conflicts"
        condition: "$item.data.status == $filter_status"
        bind_to: status_filtered

      # Filter by oikos if specified
      - step: switch
        cases:
          - when: "$oikos_id != null"
            then:
              # Would need to trace through federation_bond_id to get oikos
              # For now, return all matching status
              - step: set
                bindings:
                  conflicts: "$status_filtered"
          - when: "$oikos_id == null"
            then:
              - step: set
                bindings:
                  conflicts: "$status_filtered"

      - step: return
        value:
          conflicts: "$conflicts"
          count: "{{ $conflicts | length }}"
          status_filter: "$filter_status"
