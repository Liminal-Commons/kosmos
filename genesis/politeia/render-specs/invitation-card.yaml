# Invitation Card Render-Spec
# Pending membership invitation with accept/decline actions
#
# Uses widget vocabulary from thyra/eide/widget.yaml
# Interactive: buttons to accept or decline the invitation
#
# Invitation fields:
#   - oikos_id (string): Oikos being invited to
#   - inviter_id (string): Who sent the invite
#   - message (string): Optional message
#   - status (enum: pending, accepted, declined, expired, revoked)
#   - role (string): Role granted upon acceptance
#   - created_at (timestamp): When invited
#   - expires_at (timestamp): When it expires
#
# Traces to: genesis/demiurge/THYRA-AWARENESS.md

entities:

  - eidos: render-spec
    id: render-spec/invitation-card
    data:
      name: invitation-card
      description: |
        Card for pending oikos invitations.
        Shows inviter, message, and accept/decline buttons.
      target_eidos: invitation
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header with status
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: mail
                            size: sm
                        - widget: text
                          props:
                            content: "Oikos Invitation"
                            variant: emphasis

                    # Status badges
                    - widget: badge
                      when: "status == 'pending'"
                      props:
                        content: "Pending"
                        variant: warning
                    - widget: badge
                      when: "status == 'accepted'"
                      props:
                        content: "Accepted"
                        variant: success
                    - widget: badge
                      when: "status == 'declined'"
                      props:
                        content: "Declined"
                        variant: error
                    - widget: badge
                      when: "status == 'expired'"
                      props:
                        content: "Expired"
                        variant: default

                # Inviter info
                - widget: text
                  props:
                    content: "From: {inviter_id}"
                    variant: caption

                # Message (if present)
                - widget: text
                  when: "message"
                  props:
                    content: "{message}"
                    variant: body

                # Role info (if present)
                - widget: row
                  when: "role"
                  props:
                    gap: xs
                  children:
                    - widget: text
                      props:
                        content: "Role:"
                        variant: caption
                    - widget: badge
                      props:
                        content: "{role}"
                        variant: info

                # Action buttons (only for pending)
                - widget: row
                  when: "status == 'pending'"
                  props:
                    gap: sm
                    justify: end
                  children:
                    - widget: button
                      props:
                        label: "Decline"
                        variant: ghost
                        on_click: politeia/decline-invitation
                        on_click_params:
                          invitation_id: "{id}"
                    - widget: button
                      props:
                        label: "Accept"
                        variant: primary
                        on_click: politeia/accept-invitation
                        on_click_params:
                          invitation_id: "{id}"

      created_at: "2026-02-03T00:00:00Z"
