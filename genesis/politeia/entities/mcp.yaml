# MCP-related attainments
# Enables runtime-configurable tool visibility via session tokens
#
# This replaces the compile-time essential-praxeis.yaml with
# a runtime-queryable attainment. Adding/removing praxeis from
# the grants list changes MCP tool exposure without rebuild.

entities:

- eidos: attainment
  id: attainment/mcp-essential
  data:
    name: mcp-essential
    description: |
      Access to essential MCP tools. Enables core navigation
      and meta-invocation praxeis for AI agents.

      This replaces the compile-time essential-praxeis.yaml with
      a runtime-queryable attainment. Adding/removing praxeis from
      the grants list changes MCP tool exposure without rebuild.
    topos: politeia
    scope: global
  bonds:
    - { desmos: grants-praxis, to: praxis/nous/find }
    - { desmos: grants-praxis, to: praxis/nous/surface }
    - { desmos: grants-praxis, to: praxis/nous/traverse }
    - { desmos: grants-praxis, to: praxis/nous/call-praxis }
    - { desmos: grants-praxis, to: praxis/nous/update-entity }
    - { desmos: grants-praxis, to: praxis/nous/crystallize-theoria }
    - { desmos: grants-praxis, to: praxis/thyra/emit }
    - { desmos: grants-praxis, to: praxis/demiurge/compose }
    - { desmos: grants-praxis, to: praxis/manteia/governed-inference }
