# Politeia Eide
# Governance and capability eide — what dwellers can do
#
# Extracted from spora.yaml stage-2-politeia

entities:

# =============================================================================
# ENTITY DEFINITIONS
# =============================================================================

# attainment — capability marker
- eidos: eidos
  id: eidos/attainment
  data:
    name: attainment
    description: "Capability marker — what a parousia can do. Derived from membership via bond graph traversal."
    fields:
      name:
        type: string
        required: true
        description: "Human-readable attainment name (e.g., 'compose', 'invite', 'govern')"
      description:
        type: string
        required: false
      scope:
        type: enum
        values: [oikos, topos, global]
        required: true
        default: oikos
        description: "Where this attainment applies"
      constraints:
        type: object
        required: false
        description: "Optional constraints (e.g., rate limits, resource quotas)"
      created_at:
        type: timestamp
        required: true

# affordance — sensed possibility
- eidos: eidos
  id: eidos/affordance
  data:
    name: affordance
    description: "Sensed possibility — what can be done from here. Emerges from attainments in context."
    fields:
      name:
        type: string
        required: true
        description: "What this affordance represents"
      description:
        type: string
        required: false
      praxis_id:
        type: string
        required: true
        description: "The praxis this affordance invokes"
      context_filter:
        type: object
        required: false
        description: "When this affordance is relevant (entity type, state, etc.)"
      priority:
        type: number
        required: false
        default: 0
        description: "Display priority (higher = more prominent)"
      created_at:
        type: timestamp
        required: true

# invitation — pending membership
- eidos: eidos
  id: eidos/invitation
  data:
    name: invitation
    description: "Invitation to join an oikos. Creates potential for membership bond."
    fields:
      oikos_id:
        type: string
        required: true
        description: "Oikos being invited to"
      invitee_id:
        type: string
        required: false
        description: "Specific prosopon invited (optional for open invites)"
      inviter_id:
        type: string
        required: true
        description: "Prosopon who created the invite"
      role:
        type: string
        required: false
        description: "Role/attainments granted upon acceptance"
      message:
        type: string
        required: false
        description: "Optional message from inviter"
      status:
        type: enum
        values: [pending, accepted, declined, expired, revoked]
        required: true
        default: pending
      token:
        type: string
        required: false
        description: "One-time token for link-based invites"
      max_uses:
        type: number
        required: false
        description: "Maximum times this invite can be used (for open invites)"
      uses:
        type: number
        required: false
        default: 0
      created_at:
        type: timestamp
        required: true
      expires_at:
        type: timestamp
        required: false
      accepted_at:
        type: timestamp
        required: false

# membership-event — audit trail for membership changes
- eidos: eidos
  id: eidos/membership-event
  data:
    name: membership-event
    description: "Record of membership change — when someone joins, leaves, or is removed from an oikos. Provides audit trail."
    fields:
      event_type:
        type: enum
        values: [joined, left, removed, invited]
        required: true
        description: "Type of membership event"
      oikos_id:
        type: string
        required: true
        description: "Oikos where the event occurred"
      prosopon_id:
        type: string
        required: true
        description: "Prosopon affected by the event"
      prosopon_name:
        type: string
        required: false
        description: "Display name at time of event (for historical display)"
      actor_id:
        type: string
        required: false
        description: "Who initiated the action (inviter for join, self for leave)"
      actor_name:
        type: string
        required: false
        description: "Actor display name at time of event"
      invitation_id:
        type: string
        required: false
        description: "Related invitation ID (for join events)"
      reason:
        type: string
        required: false
        description: "Optional reason (for leave/remove events)"
      occurred_at:
        type: timestamp
        required: true
        description: "When the event occurred"

# =============================================================================
# FEDERATION EIDE
# =============================================================================

# sync-cursor — tracks sync position per federation bond
- eidos: eidos
  id: eidos/sync-cursor
  data:
    name: sync-cursor
    description: |
      Tracks sync position for a federation bond.
      Enables delta sync — only send what changed since last sync.
      One cursor per federates-with bond direction.
    fields:
      federation_bond_id:
        type: string
        required: true
        description: "ID of the federates-with bond this cursor tracks"
      local_oikos_id:
        type: string
        required: true
        description: "Local oikos in the federation"
      remote_oikos_id:
        type: string
        required: true
        description: "Remote oikos in the federation"
      local_version:
        type: integer
        required: true
        default: 0
        description: "Last local version synced to remote"
      remote_version:
        type: integer
        required: true
        default: 0
        description: "Last remote version received"
      status:
        type: enum
        values: [active, paused, failed]
        required: true
        default: active
      last_sync_at:
        type: timestamp
        required: false
        description: "Last successful sync"
      error_message:
        type: string
        required: false
        description: "Last error if status is failed"
      created_at:
        type: timestamp
        required: true

# sync-conflict — divergent versions across kosmoi
- eidos: eidos
  id: eidos/sync-conflict
  data:
    name: sync-conflict
    description: |
      Created when the same entity diverges across kosmoi.
      Both sides modified independently — human resolution needed.
      Surfaces in UI for manual resolution.
    fields:
      entity_id:
        type: string
        required: true
        description: "The entity that has conflicting versions"
      entity_eidos:
        type: string
        required: true
        description: "Type of the conflicting entity"
      federation_bond_id:
        type: string
        required: true
        description: "Federation bond where conflict was detected"
      local_version:
        type: integer
        required: true
        description: "Local version number"
      local_data:
        type: object
        required: true
        description: "Local entity data at conflict time"
      remote_version:
        type: integer
        required: true
        description: "Remote version number"
      remote_data:
        type: object
        required: true
        description: "Remote entity data at conflict time"
      status:
        type: enum
        values: [open, resolved]
        required: true
        default: open
      resolution:
        type: enum
        values: [local, remote, merged]
        required: false
        description: "How the conflict was resolved"
      merged_data:
        type: object
        required: false
        description: "Custom merged data if resolution is merged"
      resolved_by:
        type: string
        required: false
        description: "Prosopon ID who resolved the conflict"
      detected_at:
        type: timestamp
        required: true
      resolved_at:
        type: timestamp
        required: false

# =============================================================================
# ATTAINMENTS
# =============================================================================

- eidos: attainment
  id: attainment/govern
  data:
    name: govern
    description: |
      Capability to create oikoi and manage attainments.
      Required for establishing governance structures and defining
      what capabilities oikoi grant to their members.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/create-oikos }
    - { desmos: grants-praxis, to: praxis/politeia/create-attainment }
    - { desmos: grants-praxis, to: praxis/politeia/grant-attainment }
    - { desmos: grants-praxis, to: praxis/politeia/revoke-attainment }

- eidos: attainment
  id: attainment/invite
  data:
    name: invite
    description: |
      Capability to invite others to join oikoi.
      Required for growing oikos membership. Caller must
      also be sovereign to the target oikos.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/invite-to-oikos }

- eidos: attainment
  id: attainment/sovereign
  data:
    name: sovereign
    description: |
      Sovereign authority over an oikos. Required for governance
      operations like inviting members, granting/revoking attainments,
      and establishing federation bonds. Derived from sovereign-to bond.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/invite-to-oikos }
    - { desmos: grants-praxis, to: praxis/politeia/grant-attainment }
    - { desmos: grants-praxis, to: praxis/politeia/revoke-attainment }
    - { desmos: grants-praxis, to: praxis/politeia/federate-oikoi }

- eidos: attainment
  id: attainment/distribute
  data:
    name: distribute
    description: |
      Capability to distribute topoi through oikoi.
      Required for publishing topoi to members via
      distribution oikoi.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/create-distribution-oikos }
    - { desmos: grants-praxis, to: praxis/politeia/distribute-topos }

- eidos: attainment
  id: attainment/hud
  data:
    name: hud
    description: |
      Capability to create and manage affordances.
      Required for defining how capabilities surface in the interface.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/create-affordance }

- eidos: attainment
  id: attainment/admin
  data:
    name: admin
    description: |
      Administrative capability to bypass normal governance checks.
      Use for bootstrap and repair operations. Global scope.
      WARNING: Use with care — does not verify permissions.
    topos: politeia
    scope: global
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/admin-bind }
    - { desmos: grants-praxis, to: praxis/politeia/admin-loose }

- eidos: attainment
  id: attainment/federate
  data:
    name: federate
    description: |
      Capability to establish federation with other oikoi.
      Required for creating federates-with bonds and managing
      sync across kosmoi. Caller must be sovereign to the local oikos.
    topos: politeia
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/politeia/federate-oikoi }
    - { desmos: grants-praxis, to: praxis/politeia/unfederate-oikoi }
    - { desmos: grants-praxis, to: praxis/politeia/list-federations }
    - { desmos: grants-praxis, to: praxis/politeia/resolve-conflict }
