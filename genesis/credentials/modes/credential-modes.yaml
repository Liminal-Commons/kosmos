# Credential Modes — Keyring-based credential lifecycle
#
# Credential substrate: identity, keys, and secrets.
# Stoicheion-dispatched — build.rs generates the dispatch table.
#
# Traces to: genesis/credentials/DESIGN.md

entities:

  - eidos: mode
    id: mode/credential-keyring
    data:
      name: credential
      topos: credentials
      substrate: credential
      provider: keyring
      description: |
        Credential lifecycle through the system keyring.
        Manifest stores encrypted credential. Sense checks validity.
        Unmanifest revokes and removes.
      operations:
        manifest:
          stoicheion: keyring-store
          params:
            - service
            - value
            - credential_id
            - grants_attainment
          returns:
            status: string
            service: string
          description: Store credential in keyring
        sense:
          stoicheion: keyring-check
          params:
            - service
          returns:
            exists: boolean
            actual_state: string
          description: Check credential validity without leaking secret
        unmanifest:
          stoicheion: keyring-revoke
          params:
            - service
            - credential_id
          description: Revoke and remove credential from keyring
