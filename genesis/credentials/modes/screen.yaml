# Credentials Screen Mode — Credential overlay
# Browse stored credentials through thyra.

entities:

  - eidos: mode
    id: mode/credential-overlay
    data:
      name: credential-overlay
      topos: credentials
      substrate: screen
      description: |
        Credential management — stored API keys and tokens
        with status and service details. Overlay panel.
      item_spec_id: render-spec/credential-card
      arrangement: scroll
      empty_message: "No credentials stored"
      spatial:
        position: overlay
        height: auto
      source_query: "gather(eidos: credential, sort: name, order: asc)"
      config:
        watch_eidos: credential
      created_at: "2026-02-22T00:00:00Z"

bonds:
  - from_id: mode/credential-overlay
    to_id: render-spec/credential-card
    desmos: uses-render-spec
