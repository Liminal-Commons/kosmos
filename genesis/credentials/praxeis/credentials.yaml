# Credentials Praxeis — External Service Credential Operations
#
# Encrypted storage, session unlock, and attainment integration.
# External access becomes kosmos capability.
#
# Traces to: genesis/credentials/DESIGN.md

entities:

# =============================================================================
# CREDENTIAL STORAGE
# =============================================================================

- eidos: praxis
  id: praxis/credentials/store-credential
  data:
    oikos: credentials
    name: store-credential
    visible: true
    tier: 3
    description: |
      Store a new encrypted credential.

      The credential value is encrypted using AES-256-GCM with a key
      derived from the session password and a random salt. The encrypted
      value and salt are stored; the plaintext is never persisted.
    params:
      - name: credential_id
        type: string
        required: true
        description: ID for the credential (e.g., credential/openai-primary)
      - name: service
        type: string
        required: true
        description: Service provider (e.g., 'openai', 'anthropic', 'cloudflare')
      - name: credential_type
        type: string
        required: false
        description: "Type: api-key, oauth-token, bearer-token, access-key (default: api-key)"
      - name: value
        type: string
        required: true
        description: The plaintext credential value to encrypt
      - name: grants_attainment
        type: string
        required: true
        description: Attainment ID to grant when unlocked (e.g., 'use-embedding-api')
      - name: label
        type: string
        required: false
        description: Human-readable label
    steps:
      # Set default credential type
      - step: set
        bindings:
          cred_type: "$credential_type"

      - step: switch
        cases:
          - when: "$cred_type"
            then: []
        default:
          - step: set
            bindings:
              cred_type: "api-key"

      # In a real implementation, encryption would happen here via a tier-3 stoicheion
      # For now, we compose with a placeholder encrypted value
      - step: compose
        typos_id: typos-def-credential
        inputs:
          id: "$credential_id"
          service: "$service"
          credential_type: "$cred_type"
          encrypted_value: "$value"  # Would be encrypted in chora
          salt: "{{ uuid() }}"       # Would be crypto salt in chora
          grants_attainment: "$grants_attainment"
          label: "$label"
          created_at: "{{ now() }}"
        bind_to: credential

      - step: return
        value:
          credential_id: "$credential_id"
          service: "$service"
          grants_attainment: "$grants_attainment"
          stored: true

# =============================================================================
# CREDENTIAL UNLOCK/LOCK
# =============================================================================

- eidos: praxis
  id: praxis/credentials/unlock-credential
  data:
    oikos: credentials
    name: unlock-credential
    visible: true
    tier: 3
    description: |
      Unlock a credential into session memory.

      Decrypts the credential using the session password and creates
      a credential-attainment entity that grants the attainment for
      the duration of the session.
    params:
      - name: credential_id
        type: string
        required: true
        description: ID of the credential to unlock
    steps:
      - step: find
        id: "$credential_id"
        bind_to: credential

      - step: assert
        condition: "$credential"
        message: "Credential not found: $credential_id"

      # Create session-scoped attainment
      - step: compose
        typos_id: typos-def-credential-attainment
        inputs:
          id: "credential-attainment/$credential_id/$_animus"
          attainment_id: "$credential.data.grants_attainment"
          credential_id: "$credential_id"
          session_id: "$_animus"
          granted_at: "{{ now() }}"
        bind_to: attainment

      - step: return
        value:
          credential_id: "$credential_id"
          attainment_granted: "$credential.data.grants_attainment"
          unlocked: true

- eidos: praxis
  id: praxis/credentials/lock-credential
  data:
    oikos: credentials
    name: lock-credential
    visible: false
    tier: 2
    description: |
      Lock a credential, revoking its session attainment.

      Removes the credential-attainment entity and clears decrypted
      value from session memory.
    params:
      - name: credential_id
        type: string
        required: true
        description: ID of the credential to lock
    steps:
      # Find and remove the credential-attainment
      - step: find
        id: "credential-attainment/$credential_id/$_animus"
        bind_to: attainment

      - step: switch
        cases:
          - when: "$attainment"
            then:
              # Would delete the attainment entity
              - step: return
                value:
                  credential_id: "$credential_id"
                  locked: true
        default:
          - step: return
            value:
              credential_id: "$credential_id"
              locked: false
              message: "Credential was not unlocked"

# =============================================================================
# CREDENTIAL USE
# =============================================================================

- eidos: praxis
  id: praxis/credentials/use-credential
  data:
    oikos: credentials
    name: use-credential
    visible: true
    tier: 3
    description: |
      Access a credential's decrypted value for use.

      Only works if the credential has been unlocked in this session.
      The decrypted value is returned for use in API calls.

      SECURITY: This value should only be used ephemerally and never
      stored in kosmos entities.
    params:
      - name: credential_id
        type: string
        required: true
        description: ID of the credential to use
    steps:
      # Verify credential is unlocked
      - step: find
        id: "credential-attainment/$credential_id/$_animus"
        bind_to: attainment

      - step: assert
        condition: "$attainment"
        message: "Credential not unlocked. Call unlock-credential first."

      # Find the credential
      - step: find
        id: "$credential_id"
        bind_to: credential

      - step: assert
        condition: "$credential"
        message: "Credential not found: $credential_id"

      # Update last used timestamp
      - step: update
        id: "$credential_id"
        data:
          last_used_at: "{{ now() }}"

      - step: return
        value:
          credential_id: "$credential_id"
          service: "$credential.data.service"
          # In real implementation, would return decrypted value here
          # value: "<decrypted from chora session memory>"

# =============================================================================
# QUERIES
# =============================================================================

- eidos: praxis
  id: praxis/credentials/list-credentials
  data:
    oikos: credentials
    name: list-credentials
    visible: true
    tier: 1
    description: |
      List all credentials (without decrypted values).

      Returns credential metadata for management purposes.
    params:
      - name: service
        type: string
        required: false
        description: Filter by service provider
    steps:
      - step: gather
        eidos: credential
        bind_to: all_credentials

      - step: switch
        cases:
          - when: "$service"
            then:
              - step: filter
                items: "$all_credentials"
                condition: "$item.data.service == $service"
                bind_to: all_credentials

      # Map to safe output (no encrypted values in detail)
      - step: return
        value:
          credentials: "$all_credentials"
          count: "{{ $all_credentials | length }}"

- eidos: praxis
  id: praxis/credentials/delete-credential
  data:
    oikos: credentials
    name: delete-credential
    visible: true
    tier: 2
    description: |
      Delete a stored credential.

      Permanently removes the credential. This cannot be undone.
      If the credential is currently unlocked, it will be locked first.
    params:
      - name: credential_id
        type: string
        required: true
        description: ID of the credential to delete
    steps:
      - step: find
        id: "$credential_id"
        bind_to: credential

      - step: assert
        condition: "$credential"
        message: "Credential not found: $credential_id"

      # Lock if unlocked
      - step: find
        id: "credential-attainment/$credential_id/$_animus"
        bind_to: attainment

      # Would delete both entities here
      - step: return
        value:
          credential_id: "$credential_id"
          deleted: true

# =============================================================================
# ATTAINMENT CHECK
# =============================================================================

- eidos: praxis
  id: praxis/credentials/check-attainment
  data:
    oikos: credentials
    name: check-attainment
    visible: true
    tier: 1
    description: |
      Check if an attainment is granted by an unlocked credential.

      Used by praxeis to verify capability before calling external services.
    params:
      - name: attainment_id
        type: string
        required: true
        description: The attainment ID to check (e.g., 'use-embedding-api')
    steps:
      # Look for any credential-attainment with this attainment_id in current session
      - step: gather
        eidos: credential-attainment
        bind_to: all_attainments

      - step: filter
        items: "$all_attainments"
        condition: "$item.data.attainment_id == $attainment_id && $item.data.session_id == $_animus"
        bind_to: matching

      - step: set
        bindings:
          has_attainment: "{{ $matching | length > 0 }}"

      - step: return
        value:
          attainment_id: "$attainment_id"
          granted: "$has_attainment"
          credential_count: "{{ $matching | length }}"

# =============================================================================
# BODY-SCHEMA CONTRIBUTION
# =============================================================================

- eidos: praxis
  id: praxis/credentials/sense-credentials
  data:
    oikos: credentials
    name: sense-credentials
    visible: true
    tier: 1
    description: |
      Sense credential state for body-schema contribution.

      Returns a summary of credential availability for proprioceptive awareness:
      - Total stored credentials
      - Currently unlocked credentials (session attainments)
      - Services with active credentials
    params: []
    steps:
      # Gather all credentials
      - step: gather
        eidos: credential
        bind_to: all_credentials

      # Gather session attainments (unlocked credentials)
      - step: gather
        eidos: credential-attainment
        bind_to: all_attainments

      - step: filter
        items: "$all_attainments"
        condition: "$item.data.session_id == $_animus"
        bind_to: session_attainments

      # Extract unique services from credentials
      - step: map
        items: "$all_credentials"
        transform: "$item.data.service"
        bind_to: services

      # Extract granted attainment IDs
      - step: map
        items: "$session_attainments"
        transform: "$item.data.attainment_id"
        bind_to: granted_attainments

      - step: return
        value:
          stored_count: "{{ $all_credentials | length }}"
          unlocked_count: "{{ $session_attainments | length }}"
          services: "$services"
          granted_attainments: "$granted_attainments"
