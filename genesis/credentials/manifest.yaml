# Topos Manifest: Credentials
# External service credential management
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: credentials
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Credentials
topos_description: |
  External service credentials — API keys, tokens, and their integration.
  Credentials addresses the gap between external service access and kosmos
  capability. Encrypted storage of external service secrets and their
  connection to the attainment system.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided: []   # Credential management is infrastructure
surfaces_consumed: []   # Foundational credential layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather
  - db.update

provides:
  eide:
    - credential
    - credential-attainment

  # Topos-centric rendering: credentials owns presentation for credential entities
  renderable:
    - eidos: credential
      description: "Credential cards and list items"

  attainments:
    - manage-credentials  # Add/remove credentials
    - unlock-credential   # Unlock with keyring
    - use-credential      # Access credential value

  desmoi:
    - credential-of       # credential → prosopon
    - grants-capability   # credential → attainment

  praxeis:
    - credentials/store-credential
    - credentials/unlock-credential
    - credentials/use-credential
    - credentials/list-credentials
    - credentials/delete-credential
    - credentials/check-attainment

stoicheia_form:
  # All stoicheia currently arche-level

depends_on:
  - hypostasis  # For kleidoura encryption
  - politeia    # For attainment integration
