# Credentials Eide
# External service credentials — API keys and their attainment integration
#
# Traces to: genesis/credentials/DESIGN.md

entities:
  # =========================================================================
  # Credential — encrypted external service credential
  # =========================================================================

  - eidos: eidos
    id: eidos/credential
    data:
      name: credential
      description: |
        An encrypted external service credential. Follows the kleidoura pattern:
        stored encrypted at rest, unlocked into session memory when needed.

        When unlocked, the credential grants an attainment (e.g., "use-embedding-api").
        Praxeis requiring the service check for the attainment before executing.
      fields:
        service:
          type: string
          required: true
          description: "Service provider (e.g., 'openai', 'anthropic', 'cloudflare')"
        credential_type:
          type: enum
          values: [api-key, oauth-token, bearer-token, access-key]
          required: true
          default: api-key
          description: "Type of credential"
        encrypted_value:
          type: string
          required: true
          description: "AES-256-GCM encrypted credential value (base64)"
        salt:
          type: string
          required: true
          description: "Per-credential salt for encryption key derivation (base64)"
        grants_attainment:
          type: string
          required: true
          description: "Attainment ID granted when this credential is unlocked"
        label:
          type: string
          required: false
          description: "Human-readable label for the credential"
        created_at:
          type: timestamp
          required: true
        last_used_at:
          type: timestamp
          required: false
        mode:
          type: string
          required: false
          default: "credential"
          description: "Substrate mode for actuality dispatch"
        provider:
          type: string
          required: false
          default: "keyring"
          description: "Provider for mode dispatch (keyring, env)"
        desired_state:
          type: string
          required: false
          default: "active"
          description: "Intent: active, locked, or revoked"
        actual_state:
          type: string
          required: false
          description: "Sensed state: absent, stored, unlocked, active, expired, locked"
        last_verified_at:
          type: timestamp
          required: false
          description: "Last time credential validity was checked"
        expires_at:
          type: timestamp
          required: false
          description: "When credential expires (if time-limited)"

  # =========================================================================
  # Credential Attainment — dynamic attainment from unlocked credential
  # =========================================================================

  - eidos: eidos
    id: eidos/credential-attainment
    data:
      name: credential-attainment
      description: |
        A dynamic attainment granted by an unlocked credential.
        These are session-scoped and disappear when the session locks.
      fields:
        attainment_id:
          type: string
          required: true
          description: "The attainment ID (e.g., 'use-embedding-api')"
        credential_id:
          type: string
          required: true
          description: "The credential that granted this"
        session_id:
          type: string
          required: true
          description: "The session this attainment belongs to"
        granted_at:
          type: timestamp
          required: true
        expires_at:
          type: timestamp
          required: false

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/manage-credentials
    data:
      name: manage-credentials
      description: |
        Credential management capability — adding and removing credentials.
        Requires keyring access to encrypt new credentials.
      topos: credentials
      scope: soma
    bonds:
      - { desmos: grants-praxis, to: praxis/credentials/store-credential }
      - { desmos: grants-praxis, to: praxis/credentials/list-credentials }
      - { desmos: grants-praxis, to: praxis/credentials/delete-credential }

  - eidos: attainment
    id: attainment/unlock-credential
    data:
      name: unlock-credential
      description: |
        Credential unlock capability — decrypting credentials into session.
        Requires keyring to be unlocked.
      topos: credentials
      scope: soma
    bonds:
      - { desmos: grants-praxis, to: praxis/credentials/unlock-credential }
      - { desmos: grants-praxis, to: praxis/credentials/lock-credential }

  - eidos: attainment
    id: attainment/use-credential
    data:
      name: use-credential
      description: |
        Credential use capability — accessing credential values.
        This is a meta-attainment; actual grants are per-credential.
      topos: credentials
      scope: soma
    bonds:
      - { desmos: grants-praxis, to: praxis/credentials/use-credential }
      - { desmos: grants-praxis, to: praxis/credentials/check-attainment }
