# Credential Reconciler — Transition-Table Reconciliation
#
# Maps (desired_state, actual_state) pairs to actions.
# The generic reconciler engine interprets this table.
#
# Traces to: genesis/credentials/DESIGN.md

entities:

  - eidos: reconciler
    id: reconciler/credential
    data:
      name: credential
      target_eidos: credential
      intent_field: desired_state
      actuality_field: actual_state
      transitions:
        # Want active, but absent/locked/stored -> manifest (store into keyring)
        - intent: active
          actual: [absent, locked, stored]
          action: manifest

        # Want active, already active -> sense (verify still valid)
        - intent: active
          actual: active
          action: sense

        # Want locked, currently active/stored -> unmanifest (lock/revoke)
        - intent: locked
          actual: [active, stored]
          action: unmanifest

        # Want locked, already locked/absent -> nothing to do
        - intent: locked
          actual: [locked, absent]
          action: none

        # Want revoked, still exists -> unmanifest
        - intent: revoked
          actual: [active, stored, locked]
          action: unmanifest

        # Want revoked, already gone -> nothing to do
        - intent: revoked
          actual: [absent, revoked]
          action: none
