# Credentials Render Specifications — credential card
# Full card view for API keys and tokens
#
# Credential fields:
#   - label (string, optional): Human-readable label
#   - service (string): Service provider (e.g., 'openai', 'anthropic')
#   - credential_type (enum): api-key | oauth-token | bearer-token | access-key
#   - grants_attainment (string): Attainment ID granted when unlocked
#
# Traces to: genesis/credentials/DESIGN.md

entities:

  - eidos: render-spec
    id: render-spec/credential-card
    data:
      name: credential-card
      description: |
        Card view for credential entities.
        Shows label, service provider, credential type, and granted attainment.
      target_eidos: credential
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header with label and service badge
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: heading
                      props:
                        content: "{label}"
                        level: 3
                    - widget: badge
                      props:
                        content: "{service}"
                        variant: info

                # Credential type and grants
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: badge
                      props:
                        content: "{credential_type}"
                        variant: default

                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: text
                      props:
                        content: "Grants:"
                        variant: label
                    - widget: text
                      props:
                        content: "{grants_attainment}"
                        variant: body

                # Footer with entity ID
                - widget: divider

                - widget: text
                  props:
                    content: "{id}"
                    variant: caption

      created_at: "2026-02-09T00:00:00Z"
