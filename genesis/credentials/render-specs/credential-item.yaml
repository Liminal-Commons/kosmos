# Credentials Render Specifications — credential item
# Compact list item for credential panel
#
# Credential fields:
#   - label (string, optional): Human-readable label
#   - service (string): Service provider
#
# Traces to: genesis/credentials/DESIGN.md

entities:

  - eidos: render-spec
    id: render-spec/credential-item
    data:
      name: credential-item
      description: |
        Compact list item for credential entities.
        Shows key icon, label, and service name.
      target_eidos: credential
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
              children:
                - widget: icon
                  props:
                    name: key
                    size: sm
                - widget: text
                  props:
                    content: "{label}"
                    variant: body
                - widget: text
                  props:
                    content: "{service}"
                    variant: caption

      created_at: "2026-02-09T00:00:00Z"
