# Credential Reflexes — Homoiconic Form
# Autonomic responses for credential lifecycle
#
# Two reflex pairs:
# 1. State change: when desired_state changes, reconcile
# 2. Drift: when actual_state diverges from desired_state, reconcile

entities:

  # =============================================================================
  # TRIGGERS
  # =============================================================================

  - eidos: trigger
    id: trigger/credentials/credential-intent-changed
    data:
      name: credential-intent-changed
      condition: '$entity.data.desired_state != $previous.data.desired_state'
      enabled: true
    bonds:
      - { desmos: matches-event, to: entity-mutation/updated }
      - { desmos: filters-eidos, to: eidos/credential }

  - eidos: trigger
    id: trigger/credentials/credential-drift
    data:
      name: credential-drift
      condition: '$entity.data.desired_state != $entity.data.actual_state'
      enabled: true
    bonds:
      - { desmos: matches-event, to: entity-mutation/updated }
      - { desmos: filters-eidos, to: eidos/credential }

  # =============================================================================
  # REFLEXES
  # =============================================================================

  - eidos: reflex
    id: reflex/credentials/credential-intent-changed
    data:
      name: credential-intent-changed
      description: |
        Trigger reconciliation when credential intent changes.
        When desired_state changes (e.g., active -> revoked),
        the reconciler senses actuality and converges.
      enabled: true
      scope: global
      response_params:
        reconciler_id: "reconciler/credential"
        entity_id: "$entity.id"
    bonds:
      - { desmos: triggered-by, to: trigger/credentials/credential-intent-changed }
      - { desmos: responds-with, to: praxis/dynamis/reconcile }

  - eidos: reflex
    id: reflex/credentials/credential-drift
    data:
      name: credential-drift
      description: |
        When a credential's sensed actuality diverges from intent,
        invoke reconciliation to correct. Fires on actual_state
        changes from external drift (e.g., credential expired externally).
      enabled: true
      scope: global
      response_params:
        reconciler_id: "reconciler/credential"
        entity_id: "$entity.id"
    bonds:
      - { desmos: triggered-by, to: trigger/credentials/credential-drift }
      - { desmos: responds-with, to: praxis/dynamis/reconcile }
