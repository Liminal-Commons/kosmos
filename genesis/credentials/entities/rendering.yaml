# Credentials Render Specifications
#
# Rendering definitions for credential eide
# Oikos-centric: credentials owns presentation for credential entities

entities:

# =============================================================================
# CREDENTIAL RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/credential-card
  data:
    name: credential-card
    description: "Card view for credential — API keys and tokens"
    target_eidos: credential
    fields_to_display:
      - field: label
      - field: service
      - field: credential_type
      - field: grants_attainment
    layout_template: |
      <article class="render-card credential-card credential-{credential_type}">
        <header class="card-header">
          <h3 class="credential-label">{label}</h3>
          <span class="service-badge">{service}</span>
        </header>
        <div class="card-body">
          <div class="credential-meta">
            <span class="type-badge type-{credential_type}">{credential_type}</span>
            <span class="grants">Grants: {grants_attainment}</span>
          </div>
        </div>
        <footer class="card-footer">
          <span class="entity-id">{id}</span>
        </footer>
      </article>
    style_bindings:
      credential-api-key: "border-left: 3px solid var(--cred-api-key, #f59e0b)"
      credential-oauth-token: "border-left: 3px solid var(--cred-oauth, #3b82f6)"
      credential-bearer-token: "border-left: 3px solid var(--cred-bearer, #8b5cf6)"
      credential-access-key: "border-left: 3px solid var(--cred-access, #10b981)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/credential-item
  data:
    name: credential-item
    description: "Compact list item for credential panel"
    target_eidos: credential
    fields_to_display:
      - field: label
      - field: service
    layout_template: |
      <div class="list-item credential-item">
        <span class="credential-icon service-{service}"></span>
        <span class="credential-label">{label}</span>
        <span class="service-name">{service}</span>
      </div>
    style_bindings:
      service-openai: "color: var(--service-openai, #10a37f)"
      service-anthropic: "color: var(--service-anthropic, #d97706)"
      service-cloudflare: "color: var(--service-cloudflare, #f38020)"
    created_at: "2025-01-29T00:00:00Z"
