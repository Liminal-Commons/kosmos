# Hypostasis Eide
# Cryptographic identity and key management entities
#
# Kleidoura (κλειδωρός = key-keeper): Encrypted keyring for session-based key access

entities:

# =============================================================================
# ENTITY DEFINITIONS
# =============================================================================

- eidos: eidos
  id: eidos/kleidoura
  data:
    name: kleidoura
    description: |
      Encrypted keyring storing master seed material.
      Password-derived key encrypts the seed using AES-256-GCM.
      Never stores raw mnemonic or password — security through encryption.

      Session unlock flow:
      1. Password → Argon2id → encryption key
      2. Decrypt master seed
      3. Seed lives in process memory (chora), not kosmos
      4. All oikos keys derived on-demand from unlocked seed

      This enables signing operations without re-entering mnemonic.
    fields:
      encrypted_seed:
        type: string
        required: true
        description: "AES-256-GCM encrypted master seed (base64)"
      encryption_salt:
        type: string
        required: true
        description: "Salt for password → key derivation (base64, 32 bytes)"
      kdf_algorithm:
        type: enum
        values: [pbkdf2-sha256, argon2id]
        required: true
        default: argon2id
        description: "Key derivation function algorithm"
      kdf_params:
        type: object
        required: true
        description: |
          KDF parameters object:
          - argon2id: {memory_cost: 65536, time_cost: 3, parallelism: 4}
          - pbkdf2: {iterations: 600000}
      public_key:
        type: string
        required: true
        description: "Master Ed25519 public key (base64) for verification"
      version:
        type: number
        required: true
        default: 1
        description: "Keyring format version for future migration"
      created_at:
        type: timestamp
        required: true
      locked_at:
        type: timestamp
        required: false
        description: "When last locked (null if never unlocked)"
      password_hint:
        type: string
        required: false
        description: "Optional user-provided hint for password recovery"

- eidos: eidos
  id: eidos/genesis-record
  data:
    name: genesis-record
    description: |
      Multi-signature genesis record for threshold signing.
      Tracks the genesis ceremony where multiple signers attest to constitutional content.
    fields:
      content:
        type: string
        required: true
        description: "The constitutional content being signed"
      content_hash:
        type: string
        required: true
        description: "BLAKE3 hash of the content"
      threshold:
        type: number
        required: true
        default: 3
        description: "Number of signatures required (e.g., 3-of-5)"
      signatures:
        type: array
        required: true
        description: |
          Array of signature records:
          - signer_pubkey: Ed25519 public key
          - signature: Ed25519 signature
          - attestation: Optional attestation statement
          - signed_at: Timestamp
      verified:
        type: boolean
        required: true
        default: false
        description: "Whether threshold has been reached"
      created_at:
        type: timestamp
        required: true
      finalized_at:
        type: timestamp
        required: false
        description: "When threshold was reached"

# NOTE: credential eidos moved to genesis/credentials/eide/credentials.yaml

# =============================================================================
# SSH CREDENTIALS (for remote deployment)
# =============================================================================

- eidos: eidos
  id: eidos/ssh-credential
  data:
    name: ssh-credential
    description: |
      SSH authentication credential for remote node access.
      Used by manifest-deployment when actuality_mode is nixos-rebuild.

      Bonded to nodes via authenticates-to desmos.
      The credential doesn't store secrets — it references how to authenticate:
      - agent: Use SSH agent (keys already loaded)
      - key: Use specific key file path

      Secrets live in the environment or keyring, not the graph.
    fields:
      name:
        type: string
        required: true
        description: "Human-readable credential name"
      host:
        type: string
        required: true
        description: "SSH host (IP address or hostname)"
      user:
        type: string
        required: true
        default: root
        description: "SSH username"
      port:
        type: integer
        required: true
        default: 22
        description: "SSH port"
      auth_method:
        type: enum
        values: [agent, key]
        required: true
        default: agent
        description: |
          Authentication method:
          - agent: Use running SSH agent (recommended)
          - key: Use key file at key_path
      key_path:
        type: string
        required: false
        description: "Path to private key (only for auth_method: key)"
      jump_host:
        type: string
        required: false
        description: "Optional jump host for bastion access"

# =============================================================================
# PHORETA (φορητά = carrier)
# =============================================================================

- eidos: eidos
  id: eidos/phoreta
  data:
    name: phoreta
    description: |
      Signed, encrypted, content-addressed entity bundle.

      Phoreta are the universal carrier format — a portable envelope of
      entities and bonds with cryptographic provenance. One format serves
      four purposes: emission, backup, recovery, federation.

      Recovery IS federation with your past self (T24). The mechanism that
      restores state after a DB wipe is the same mechanism that federates
      state between devices.

      Encryption is mandatory. Entity data is always encrypted with
      AES-256-GCM using an HKDF-derived backup key from the mnemonic seed.
      Emission only occurs when the keyring is unlocked (backup key derivable).
      If the keyring is locked, emission is deferred — entities persist in
      the database and emit when the keyring next unlocks.

      SOPS pattern: metadata (entity IDs, eidos, bonds) is always cleartext.
      Entity data is individually encrypted. This enables bootstrap to read
      metadata BEFORE keyring unlock — necessary to know which kleidoura to
      present to the user.

      Content hash covers ciphertext, not plaintext — integrity is verifiable
      without decryption. Files are content-addressed and immutable: new state
      produces a new file, old files are never overwritten.
    fields:
      format_version:
        type: number
        required: true
        default: 2
        description: "Phoreta format version. v2 = unified format with optional encryption."
      type:
        type: enum
        values: [emission, full-snapshot, delta, prosopon-export, topos-bundle]
        required: true
        description: |
          What kind of phoreta this is:
          - emission: Auto-emitted single entity + its outbound bonds (reflex-driven)
          - full-snapshot: Complete oikos state
          - delta: Incremental changes since a version
          - prosopon-export: Prosopon identity + memberships + theoria
          - topos-bundle: Distributable topos package
      entities:
        type: array
        required: true
        description: |
          Array of entity records. Each record:
          { id, eidos, version, data, encrypted }
          When encrypted=true, data is base64(nonce || AES-256-GCM ciphertext).
          When encrypted=false, data is the raw JSON value.
      bonds:
        type: array
        required: true
        description: |
          Array of bond records: { from_id, to_id, desmos, data? }
          Bonds are never encrypted — they are structural metadata.
      entity_count:
        type: number
        required: true
        description: "Number of entities in the bundle"
      bond_count:
        type: number
        required: true
        description: "Number of bonds in the bundle"
      content_hash:
        type: string
        required: true
        description: |
          BLAKE3 of canonical_json({ entities, bonds }).
          Computed AFTER encryption — covers ciphertext, not plaintext.
          Integrity verifiable without decryption.
      signature:
        type: string
        required: false
        description: "Ed25519 signature over content_hash (base64)"
      public_key:
        type: string
        required: false
        description: "Signer's Ed25519 public key (base64)"
      encryption:
        type: object
        required: true
        description: |
          Encryption metadata. Entity data is always encrypted.
          {
            algorithm: "AES-256-GCM",
            key_derivation: "HKDF-SHA256",
            key_hint: "phoreta-backup"
          }
          The hint identifies which HKDF derivation path produces the decryption key,
          without revealing the key itself.
      origin_oikos_id:
        type: string
        required: false
        description: "Oikos that produced this phoreta"
      origin_prosopon_id:
        type: string
        required: false
        description: "Prosopon that produced this phoreta"
      created_at:
        type: timestamp
        required: true
        description: "When this phoreta was created"
      since_version:
        type: number
        required: false
        description: "For delta type: version number this delta starts from"

# =============================================================================
# ATTAINMENTS
# =============================================================================

- eidos: attainment
  id: attainment/sign
  data:
    name: sign
    description: |
      Capability to sign content with oikos-scoped keys.
      Required for cryptographic attestation of content.
    topos: hypostasis
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/hypostasis/sign-content }
    - { desmos: grants-praxis, to: praxis/hypostasis/sign-with-session }

- eidos: attainment
  id: attainment/export
  data:
    name: export
    description: |
      Capability to export phoreta bundles and snapshots.
      Required for backup, federation, and prosopon export.
    topos: hypostasis
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/hypostasis/export-phoreta }
    - { desmos: grants-praxis, to: praxis/hypostasis/create-snapshot }
    - { desmos: grants-praxis, to: praxis/hypostasis/export-prosopon }

- eidos: attainment
  id: attainment/manage-keyring
  data:
    name: manage-keyring
    description: |
      Capability to create and manage encrypted keyring.
      Prosopon-scoped: only the prosopon owner can manage their keyring.
    topos: hypostasis
    scope: prosopon
  bonds:
    - { desmos: grants-praxis, to: praxis/hypostasis/create-keyring }
    - { desmos: grants-praxis, to: praxis/hypostasis/change-keyring-password }

# NOTE: attainment/manage-credentials moved to genesis/credentials/eide/credentials.yaml

- eidos: attainment
  id: attainment/genesis-signer
  data:
    name: genesis-signer
    description: |
      Capability to participate in genesis signing ceremony.
      Granted to trusted individuals who can attest to constitutional content.
    topos: hypostasis
    scope: oikos
  bonds:
    - { desmos: grants-praxis, to: praxis/hypostasis/begin-genesis-ceremony }
    - { desmos: grants-praxis, to: praxis/hypostasis/add-genesis-signature }
