# Hypostasis Render Specifications
#
# Rendering definitions for identity/presence eide: persona, animus
# Oikos-centric: hypostasis owns presentation for identity entities

entities:

# =============================================================================
# PERSONA RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/persona-card
  data:
    name: persona-card
    description: "Card view for persona — persistent identity"
    target_eidos: persona
    fields_to_display:
      - field: name
        label: Name
      - field: kind
        label: Kind
    layout_template: |
      <article class="render-card persona-card persona-{kind}">
        <header class="card-header">
          <h3 class="persona-name">{name}</h3>
          <span class="kind-badge kind-{kind}">{kind}</span>
        </header>
        <footer class="card-footer">
          <span class="entity-id">{id}</span>
        </footer>
      </article>
    style_bindings:
      persona-human: "border-left: 3px solid var(--persona-human, #3b82f6)"
      persona-ai: "border-left: 3px solid var(--persona-ai, #8b5cf6)"
      persona-service: "border-left: 3px solid var(--persona-service, #f59e0b)"
      persona-collective: "border-left: 3px solid var(--persona-collective, #10b981)"
      kind-human: "background: var(--bg-human, #dbeafe)"
      kind-ai: "background: var(--bg-ai, #ede9fe)"
      kind-service: "background: var(--bg-service, #fef3c7)"
      kind-collective: "background: var(--bg-collective, #d1fae5)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/persona-item
  data:
    name: persona-item
    description: "Compact list item for presence list"
    target_eidos: persona
    fields_to_display:
      - field: name
      - field: kind
    layout_template: |
      <div class="list-item persona-item persona-{kind}">
        <span class="persona-avatar kind-{kind}"></span>
        <span class="persona-name">{name}</span>
        <span class="kind-indicator">{kind}</span>
      </div>
    style_bindings:
      persona-human: "border-left: 2px solid var(--persona-human, #3b82f6)"
      persona-ai: "border-left: 2px solid var(--persona-ai, #8b5cf6)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# ANIMUS RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/animus-card
  data:
    name: animus-card
    description: "Card view for animus — dwelling presence"
    target_eidos: animus
    fields_to_display:
      - field: name
      - field: status
    layout_template: |
      <article class="render-card animus-card animus-{status}">
        <header class="card-header">
          <span class="animus-name">{name}</span>
          <span class="status-indicator status-{status}">{status}</span>
        </header>
        <footer class="card-footer">
          <span class="entity-id">{id}</span>
        </footer>
      </article>
    style_bindings:
      animus-active: "border-left: 3px solid var(--status-active, #10b981)"
      animus-departed: "border-left: 3px solid var(--status-departed, #6b7280)"
      status-active: "color: var(--status-active, #10b981)"
      status-departed: "color: var(--status-departed, #6b7280)"
    created_at: "2025-01-29T00:00:00Z"
