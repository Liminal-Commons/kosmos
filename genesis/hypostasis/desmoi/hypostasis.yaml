# Hypostasis Desmoi
# Cryptographic bonds — signing, chaining, verification, and key custody
#
# Extracted from spora.yaml stage-1-desmoi

entities:
  # secures-key-for — keyring secures keys for persona
  - eidos: desmos
    id: desmos/secures-key-for
    data:
      name: secures-key-for
      description: |
        This kleidoura secures cryptographic keys for this persona.
        One-to-one: each persona has at most one keyring.
        The keyring contains the encrypted master seed from which all circle keys are derived.
      from_eidos: kleidoura
      to_eidos: persona
      cardinality: one-to-one
      symmetric: false

  # signed-by — entity signed by persona keypair
  - eidos: desmos
    id: desmos/signed-by
    data:
      name: signed-by
      description: "Entity signed by persona keypair — cryptographic attribution"
      from_eidos: any
      to_eidos: persona
      cardinality: many-to-one
      symmetric: false

  # chains-to — composition chain link
  - eidos: desmos
    id: desmos/chains-to
    data:
      name: chains-to
      description: "Composition chain link — content-addressed provenance verification"
      from_eidos: any
      to_eidos: any
      cardinality: many-to-one
      symmetric: false

  # verifies — genesis-record verifies entity
  - eidos: desmos
    id: desmos/verifies
    data:
      name: verifies
      description: "Genesis-record verifies entity via threshold signatures"
      from_eidos: genesis-record
      to_eidos: any
      cardinality: one-to-many
      symmetric: false

  # =========================================================================
  # Credential Desmoi — ownership, sharing, and capability grants
  # =========================================================================

  # credential-of — credential belongs to persona
  - eidos: desmos
    id: desmos/credential-of
    data:
      name: credential-of
      description: |
        Credential belongs to persona — ownership relationship.
        Only the owning persona can unlock and use this credential.
      from_eidos: credential
      to_eidos: persona
      cardinality: many-to-one
      symmetric: false

  # shared-with — credential shared with circle
  - eidos: desmos
    id: desmos/shared-with
    data:
      name: shared-with
      description: |
        Credential shared with circle — collective access.
        Circle members can use this credential when unlocked.
        Scope must be 'circle' for this bond to apply.
      from_eidos: credential
      to_eidos: circle
      cardinality: many-to-one
      symmetric: false

  # unlocks-attainment — credential unlocks attainment when active
  - eidos: desmos
    id: desmos/unlocks-attainment
    data:
      name: unlocks-attainment
      description: |
        Credential unlocks attainment when session is active.
        This integrates credentials with the governance layer:
        - Credential → grants_attainment field names the attainment
        - Bond connects to the attainment entity
        - Praxeis check has-attainment before using service
      from_eidos: credential
      to_eidos: attainment
      cardinality: many-to-one
      symmetric: false

  # enables-function — credential enables dynamis function
  - eidos: desmos
    id: desmos/enables-function
    data:
      name: enables-function
      description: |
        Credential enables specific dynamis function.
        Traces which credentials are required for which operations.
        E.g., OpenAI credential enables aisthesis.embed function.
      from_eidos: credential
      to_eidos: function
      cardinality: many-to-many
      symmetric: false

  # =========================================================================
  # SSH Credential Desmoi — remote node access
  # =========================================================================

  # authenticates-to — ssh-credential authenticates to node
  - eidos: desmos
    id: desmos/authenticates-to
    data:
      name: authenticates-to
      description: |
        SSH credential authenticates to this infrastructure node.
        Used by manifest-deployment to find credentials for remote actuation.

        Query pattern:
          trace to_id: node/x, desmos: authenticates-to, resolve: from
          → returns ssh-credentials that can access that node

        Many-to-one: multiple credentials can authenticate to same node
        (different users, different key types).
      from_eidos: ssh-credential
      to_eidos: node
      cardinality: many-to-one
      symmetric: false
