# Prosopon Item Render-Spec
# Compact list item for prosopon identity
#
# Prosopon fields:
#   - name (string): Display name of the identity
#   - kind (enum): human | ai | service | collective
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/prosopon-item
    data:
      name: prosopon-item
      description: |
        Compact list item for prosopon — avatar, name, and kind indicator.
      target_eidos: prosopon
      variant: item

      layout:
        - widget: card
          props:
            variant: compact
            padding: sm
          children:
            - widget: row
              props:
                gap: sm
                align: center
              children:
                # Avatar
                - widget: avatar
                  props:
                    name: "{name}"

                # Name
                - widget: text
                  props:
                    content: "{name}"
                    variant: body

                # Kind indicator
                - widget: badge
                  when: "kind == 'human'"
                  props:
                    content: "Human"
                    variant: info
                - widget: badge
                  when: "kind == 'ai'"
                  props:
                    content: "AI"
                    variant: default
                - widget: badge
                  when: "kind == 'service'"
                  props:
                    content: "Service"
                    variant: warning
                - widget: badge
                  when: "kind == 'collective'"
                  props:
                    content: "Collective"
                    variant: success

      created_at: "2026-02-09T00:00:00Z"
