# Prosopon Card Render-Spec
# Identity card showing persistent prosopon
#
# Prosopon fields:
#   - name (string): Display name of the identity
#   - kind (enum): human | ai | service | collective
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/prosopon-card
    data:
      name: prosopon-card
      description: |
        Card view for prosopon — persistent identity.
        Shows name heading and kind badge.
      target_eidos: prosopon
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Name heading
                - widget: heading
                  props:
                    content: "{name}"
                    level: 3

                # Kind badge
                - widget: row
                  props:
                    gap: sm
                    align: center
                  children:
                    - widget: badge
                      when: "kind == 'human'"
                      props:
                        content: "Human"
                        variant: info
                    - widget: badge
                      when: "kind == 'ai'"
                      props:
                        content: "AI"
                        variant: default
                    - widget: badge
                      when: "kind == 'service'"
                      props:
                        content: "Service"
                        variant: warning
                    - widget: badge
                      when: "kind == 'collective'"
                      props:
                        content: "Collective"
                        variant: success

                # Entity ID
                - widget: text
                  props:
                    content: "{id}"
                    variant: caption

      created_at: "2026-02-09T00:00:00Z"
