# Oikos Manifest: Opsis
# ὄψις (ópsis) — sight, appearance, visual form
#
# Visual rendering — how entities become visible
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: opsis
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Opsis
oikos_description: |
  Visual rendering — the appearance layer. Opsis addresses the gap
  between kosmos state and visual form. Entities exist (in kosmos),
  but opsis determines how they appear. Layouts, themes, panels,
  render intents — all the machinery of visibility.
oikos_scale: soma

# Development experience metadata
oikos_category: interface
surfaces_provided:
  - rendering           # Provides visual appearance layer
surfaces_consumed: []   # Foundational rendering layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [renderer]  # Generic renderers; render-specs are in owning oikoi

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.gather

provides:
  eide:
    - layout
    - panel
    - style-theme
    - render-intent
    - workspace
    - render-type
    - renderer
    - render-spec
    - widget

  attainments:
    - render          # Visual emission and workspace management

  desmoi:
    - renders-with    # panel → renderer
    - displays-as     # field → widget

  praxeis:
    # Render reconciliation
    - opsis/gather-render-intent
    - opsis/reconcile-region
    - opsis/emit-render
    - opsis/render-all
    # Layout management
    - opsis/activate-layout
    - opsis/get-active-layout
    # Theme management
    - opsis/activate-theme
    - opsis/get-active-theme
    # Workspace management
    - opsis/open-artifact
    - opsis/close-artifact
    - opsis/focus-artifact
    - opsis/get-workspace
    # Panel management
    - opsis/create-panel
    - opsis/list-panels
    # Body-schema contribution
    - opsis/sense-opsis
    # Oikos-centric rendering discovery (Phase 4)
    - opsis/discover-render-specs
    - opsis/get-render-spec
    - opsis/select-renderer
    - opsis/list-renderable-eide
    - opsis/render-entity

stoicheia_form:
  # All stoicheia currently arche-level

depends_on:
  - thyra     # For stream/expression context
  - soma      # For embodiment context
