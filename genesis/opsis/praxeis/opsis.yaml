# Opsis Praxeis — Visual Rendering Operations
#
# Layouts, themes, panels, workspaces — the machinery of visibility.
# Follows the reconciler pattern: intent → sense → compare → act.
#
# Traces to: genesis/opsis/DESIGN.md

entities:

# =============================================================================
# RENDER RECONCILIATION
# =============================================================================

- eidos: praxis
  id: praxis/opsis/gather-render-intent
  data:
    oikos: opsis
    name: gather-render-intent
    visible: true
    tier: 1
    description: |
      Assemble a render intent for a region.

      Gathers what should be visible in the specified region based on
      active layout, panels assigned to the region, and their visibility states.
    params:
      - name: region_id
        type: string
        required: true
        description: ID of the region to gather intent for
    steps:
      # Get the active layout
      - step: gather
        eidos: layout
        bind_to: all_layouts

      - step: filter
        items: "$all_layouts"
        condition: "$item.data.active == true"
        bind_to: active_layouts

      - step: set
        bindings:
          active_layout: "{{ $active_layouts | first }}"

      # Get panels for this region
      - step: gather
        eidos: panel
        bind_to: all_panels

      - step: filter
        items: "$all_panels"
        condition: "$item.data.region_id == $region_id && $item.data.visible == true"
        bind_to: visible_panels

      # Get active theme
      - step: gather
        eidos: style-theme
        bind_to: all_themes

      - step: filter
        items: "$all_themes"
        condition: "$item.data.active == true"
        bind_to: active_themes

      - step: set
        bindings:
          active_theme: "{{ $active_themes | first }}"

      - step: return
        value:
          region_id: "$region_id"
          layout_id: "$active_layout.id"
          theme_id: "$active_theme.id"
          panels: "$visible_panels"
          panel_count: "{{ $visible_panels | length }}"

- eidos: praxis
  id: praxis/opsis/reconcile-region
  data:
    oikos: opsis
    name: reconcile-region
    visible: true
    tier: 2
    description: |
      Compare render intent to actual visibility for a region.

      Identifies what needs to change to make the actual rendering
      match the desired intent.
    params:
      - name: region_id
        type: string
        required: true
        description: ID of the region to reconcile
    steps:
      # Gather current intent
      - step: call
        praxis: opsis/gather-render-intent
        params:
          region_id: "$region_id"
        bind_to: intent

      # Create or update render-intent entity
      - step: compose
        typos_id: typos-def-render-intent
        inputs:
          id: "render-intent/$region_id"
          target_region_id: "$region_id"
          layout_id: "$intent.layout_id"
          theme_id: "$intent.theme_id"
          intent_status: "reconciling"
          created_at: "{{ now() }}"
        bind_to: render_intent

      - step: return
        value:
          region_id: "$region_id"
          intent: "$intent"
          status: "reconciling"

- eidos: praxis
  id: praxis/opsis/emit-render
  data:
    oikos: opsis
    name: emit-render
    visible: true
    tier: 3
    description: |
      Push rendering changes to substrate.

      Signals the substrate to update its visual state based on
      the reconciled render intent.
    params:
      - name: region_id
        type: string
        required: true
        description: ID of the region to emit render for
    steps:
      - step: find
        id: "render-intent/$region_id"
        bind_to: intent

      - step: switch
        cases:
          - when: "$intent"
            then:
              - step: update
                id: "$intent.id"
                data:
                  intent_status: "rendered"
                  reconciled_at: "{{ now() }}"

      - step: return
        value:
          region_id: "$region_id"
          status: "rendered"
          emitted_at: "{{ now() }}"

- eidos: praxis
  id: praxis/opsis/render-all
  data:
    oikos: opsis
    name: render-all
    visible: true
    tier: 3
    description: |
      Reconcile and emit render for all regions in the active layout.
    params: []
    steps:
      # Get active layout
      - step: gather
        eidos: layout
        bind_to: all_layouts

      - step: filter
        items: "$all_layouts"
        condition: "$item.data.active == true"
        bind_to: active_layouts

      - step: set
        bindings:
          active_layout: "{{ $active_layouts | first }}"

      - step: return
        value:
          layout_id: "$active_layout.id"
          rendered_at: "{{ now() }}"

# =============================================================================
# LAYOUT MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/opsis/activate-layout
  data:
    oikos: opsis
    name: activate-layout
    visible: true
    tier: 2
    description: |
      Set the active layout.

      Deactivates any currently active layout and activates the specified one.
    params:
      - name: layout_id
        type: string
        required: true
        description: ID of the layout to activate
    steps:
      - step: find
        id: "$layout_id"
        bind_to: layout

      - step: assert
        condition: "$layout"
        message: "Layout not found: $layout_id"

      # Deactivate all layouts
      - step: gather
        eidos: layout
        bind_to: all_layouts

      - step: for_each
        items: "$all_layouts"
        as: l
        do:
          - step: switch
            cases:
              - when: "$l.data.active == true"
                then:
                  - step: update
                    id: "$l.id"
                    data:
                      active: false

      # Activate the requested layout
      - step: update
        id: "$layout_id"
        data:
          active: true

      - step: return
        value:
          layout_id: "$layout_id"
          activated: true

- eidos: praxis
  id: praxis/opsis/get-active-layout
  data:
    oikos: opsis
    name: get-active-layout
    visible: true
    tier: 1
    description: |
      Get the currently active layout.
    params: []
    steps:
      - step: gather
        eidos: layout
        bind_to: all_layouts

      - step: filter
        items: "$all_layouts"
        condition: "$item.data.active == true"
        bind_to: active_layouts

      - step: set
        bindings:
          active_layout: "{{ $active_layouts | first }}"

      - step: return
        value:
          layout: "$active_layout"

# =============================================================================
# THEME MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/opsis/activate-theme
  data:
    oikos: opsis
    name: activate-theme
    visible: true
    tier: 2
    description: |
      Set the active theme.

      Deactivates any currently active theme and activates the specified one.
    params:
      - name: theme_id
        type: string
        required: true
        description: ID of the theme to activate
    steps:
      - step: find
        id: "$theme_id"
        bind_to: theme

      - step: assert
        condition: "$theme"
        message: "Theme not found: $theme_id"

      # Deactivate all themes
      - step: gather
        eidos: style-theme
        bind_to: all_themes

      - step: for_each
        items: "$all_themes"
        as: t
        do:
          - step: switch
            cases:
              - when: "$t.data.active == true"
                then:
                  - step: update
                    id: "$t.id"
                    data:
                      active: false

      # Activate the requested theme
      - step: update
        id: "$theme_id"
        data:
          active: true

      - step: return
        value:
          theme_id: "$theme_id"
          activated: true

- eidos: praxis
  id: praxis/opsis/get-active-theme
  data:
    oikos: opsis
    name: get-active-theme
    visible: true
    tier: 1
    description: |
      Get the currently active theme.
    params: []
    steps:
      - step: gather
        eidos: style-theme
        bind_to: all_themes

      - step: filter
        items: "$all_themes"
        condition: "$item.data.active == true"
        bind_to: active_themes

      - step: set
        bindings:
          active_theme: "{{ $active_themes | first }}"

      - step: return
        value:
          theme: "$active_theme"

# =============================================================================
# WORKSPACE MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/opsis/open-artifact
  data:
    oikos: opsis
    name: open-artifact
    visible: true
    tier: 2
    description: |
      Open an artifact in the workspace (add to tabs).

      If the artifact is already open, focuses it instead.
    params:
      - name: artifact_id
        type: string
        required: true
        description: ID of the artifact to open
    steps:
      # Get or create workspace for current animus
      - step: gather
        eidos: workspace
        bind_to: all_workspaces

      - step: filter
        items: "$all_workspaces"
        condition: "$item.data.animus_id == $_animus"
        bind_to: my_workspaces

      - step: set
        bindings:
          workspace: "{{ $my_workspaces | first }}"

      # If no workspace exists, create one
      - step: switch
        cases:
          - when: "$workspace"
            then:
              # Add artifact to open list if not already there
              - step: set
                bindings:
                  current_artifacts: "$workspace.data.open_artifact_ids"
              - step: return
                value:
                  workspace_id: "$workspace.id"
                  artifact_id: "$artifact_id"
                  opened: true
        default:
          - step: compose
            typos_id: typos-def-workspace
            inputs:
              id: "workspace/$_animus"
              name: "default"
              animus_id: "$_animus"
              open_artifact_ids: ["$artifact_id"]
              focused_artifact_id: "$artifact_id"
              created_at: "{{ now() }}"
            bind_to: new_workspace
          - step: return
            value:
              workspace_id: "$new_workspace.id"
              artifact_id: "$artifact_id"
              opened: true
              created_workspace: true

- eidos: praxis
  id: praxis/opsis/close-artifact
  data:
    oikos: opsis
    name: close-artifact
    visible: true
    tier: 2
    description: |
      Close an artifact in the workspace (remove from tabs).
    params:
      - name: artifact_id
        type: string
        required: true
        description: ID of the artifact to close
    steps:
      # Get workspace for current animus
      - step: gather
        eidos: workspace
        bind_to: all_workspaces

      - step: filter
        items: "$all_workspaces"
        condition: "$item.data.animus_id == $_animus"
        bind_to: my_workspaces

      - step: set
        bindings:
          workspace: "{{ $my_workspaces | first }}"

      - step: assert
        condition: "$workspace"
        message: "No workspace found for current animus"

      - step: return
        value:
          workspace_id: "$workspace.id"
          artifact_id: "$artifact_id"
          closed: true

- eidos: praxis
  id: praxis/opsis/focus-artifact
  data:
    oikos: opsis
    name: focus-artifact
    visible: true
    tier: 2
    description: |
      Focus an artifact in the workspace (set as active tab).
    params:
      - name: artifact_id
        type: string
        required: true
        description: ID of the artifact to focus
    steps:
      # Get workspace for current animus
      - step: gather
        eidos: workspace
        bind_to: all_workspaces

      - step: filter
        items: "$all_workspaces"
        condition: "$item.data.animus_id == $_animus"
        bind_to: my_workspaces

      - step: set
        bindings:
          workspace: "{{ $my_workspaces | first }}"

      - step: assert
        condition: "$workspace"
        message: "No workspace found for current animus"

      - step: update
        id: "$workspace.id"
        data:
          focused_artifact_id: "$artifact_id"
          updated_at: "{{ now() }}"

      - step: return
        value:
          workspace_id: "$workspace.id"
          focused_artifact_id: "$artifact_id"

- eidos: praxis
  id: praxis/opsis/get-workspace
  data:
    oikos: opsis
    name: get-workspace
    visible: true
    tier: 1
    description: |
      Get the workspace for the current animus.
    params: []
    steps:
      - step: gather
        eidos: workspace
        bind_to: all_workspaces

      - step: filter
        items: "$all_workspaces"
        condition: "$item.data.animus_id == $_animus"
        bind_to: my_workspaces

      - step: set
        bindings:
          workspace: "{{ $my_workspaces | first }}"

      - step: return
        value:
          workspace: "$workspace"

# =============================================================================
# PANEL MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/opsis/create-panel
  data:
    oikos: opsis
    name: create-panel
    visible: true
    tier: 2
    description: |
      Create a new panel in a region.
    params:
      - name: panel_id
        type: string
        required: true
        description: ID for the panel
      - name: name
        type: string
        required: true
        description: Panel name
      - name: render_type
        type: string
        required: true
        description: How to render (entity-list, expression-thread, etc.)
      - name: region_id
        type: string
        required: true
        description: Region to place the panel in
      - name: source_query
        type: string
        required: false
        description: Query to gather entities
      - name: source_entity_id
        type: string
        required: false
        description: Specific entity ID if single
      - name: priority
        type: integer
        required: false
        description: Rendering priority (default 0)
    steps:
      - step: set
        bindings:
          panel_priority: "$priority"

      - step: switch
        cases:
          - when: "$panel_priority"
            then: []
        default:
          - step: set
            bindings:
              panel_priority: 0

      - step: compose
        typos_id: typos-def-panel
        inputs:
          id: "$panel_id"
          name: "$name"
          render_type: "$render_type"
          region_id: "$region_id"
          source_query: "$source_query"
          source_entity_id: "$source_entity_id"
          priority: "$panel_priority"
          visible: true
          created_at: "{{ now() }}"
        bind_to: panel

      - step: return
        value:
          panel_id: "$panel_id"
          name: "$name"
          region_id: "$region_id"

- eidos: praxis
  id: praxis/opsis/list-panels
  data:
    oikos: opsis
    name: list-panels
    visible: true
    tier: 1
    description: |
      List all panels, optionally filtered by region.
    params:
      - name: region_id
        type: string
        required: false
        description: Filter by region ID
    steps:
      - step: gather
        eidos: panel
        bind_to: all_panels

      - step: switch
        cases:
          - when: "$region_id"
            then:
              - step: filter
                items: "$all_panels"
                condition: "$item.data.region_id == $region_id"
                bind_to: all_panels

      - step: return
        value:
          panels: "$all_panels"
          count: "{{ $all_panels | length }}"

# =============================================================================
# BODY-SCHEMA CONTRIBUTION
# =============================================================================

- eidos: praxis
  id: praxis/opsis/sense-opsis
  data:
    oikos: opsis
    name: sense-opsis
    visible: true
    tier: 1
    description: |
      Sense visual state for body-schema contribution.

      Returns the current visual configuration for proprioceptive awareness:
      - Active layout
      - Active theme
      - Workspace state (open artifacts, focused artifact)
      - Visible panels
    params: []
    steps:
      # Get active layout
      - step: gather
        eidos: layout
        bind_to: all_layouts

      - step: filter
        items: "$all_layouts"
        condition: "$item.data.active == true"
        bind_to: active_layouts

      - step: set
        bindings:
          active_layout: "{{ $active_layouts | first }}"

      # Get active theme
      - step: gather
        eidos: style-theme
        bind_to: all_themes

      - step: filter
        items: "$all_themes"
        condition: "$item.data.active == true"
        bind_to: active_themes

      - step: set
        bindings:
          active_theme: "{{ $active_themes | first }}"

      # Get workspace for current animus
      - step: gather
        eidos: workspace
        bind_to: all_workspaces

      - step: filter
        items: "$all_workspaces"
        condition: "$item.data.animus_id == $_animus"
        bind_to: my_workspaces

      - step: set
        bindings:
          workspace: "{{ $my_workspaces | first }}"

      # Get visible panels
      - step: gather
        eidos: panel
        bind_to: all_panels

      - step: filter
        items: "$all_panels"
        condition: "$item.data.visible == true"
        bind_to: visible_panels

      - step: return
        value:
          layout_id: "$active_layout.id"
          layout_name: "$active_layout.data.name"
          theme_id: "$active_theme.id"
          theme_name: "$active_theme.data.name"
          workspace_id: "$workspace.id"
          has_workspace: "{{ $workspace != null }}"
          visible_panel_count: "{{ $visible_panels | length }}"

# =============================================================================
# OIKOS-CENTRIC RENDERING DISCOVERY (Phase 4)
# =============================================================================

- eidos: praxis
  id: praxis/opsis/discover-render-specs
  data:
    oikos: opsis
    name: discover-render-specs
    visible: true
    tier: 1
    description: |
      Discover render-specs for an eidos using convention-based lookup.

      Follows the naming convention:
      - Card view: render-spec/{eidos}-card
      - Detail view: render-spec/{eidos}
      - List view: render-spec/{eidos}-list

      Returns whichever specs exist for the eidos.
    params:
      - name: eidos_name
        type: string
        required: true
        description: Name of the eidos to find render-specs for (e.g., "theoria")
    steps:
      # Try to find each view type by convention
      - step: find
        id: "render-spec/{{ $eidos_name }}-card"
        bind_to: card_spec

      - step: find
        id: "render-spec/{{ $eidos_name }}"
        bind_to: detail_spec

      - step: find
        id: "render-spec/{{ $eidos_name }}-list"
        bind_to: list_spec

      # Count how many we found
      - step: set
        bindings:
          found_count: 0

      - step: switch
        cases:
          - when: "$card_spec"
            then:
              - step: set
                bindings:
                  found_count: "{{ $found_count + 1 }}"

      - step: switch
        cases:
          - when: "$detail_spec"
            then:
              - step: set
                bindings:
                  found_count: "{{ $found_count + 1 }}"

      - step: switch
        cases:
          - when: "$list_spec"
            then:
              - step: set
                bindings:
                  found_count: "{{ $found_count + 1 }}"

      - step: return
        value:
          eidos: "$eidos_name"
          card: "$card_spec"
          detail: "$detail_spec"
          list: "$list_spec"
          spec_count: "$found_count"

- eidos: praxis
  id: praxis/opsis/get-render-spec
  data:
    oikos: opsis
    name: get-render-spec
    visible: true
    tier: 1
    description: |
      Get a specific render-spec by eidos and view type.

      Follows convention:
      - card: render-spec/{eidos}-card
      - detail: render-spec/{eidos}
      - list: render-spec/{eidos}-list

      Falls back through the chain if preferred view not found.
    params:
      - name: eidos_name
        type: string
        required: true
        description: Name of the eidos
      - name: view_type
        type: string
        required: false
        description: "Preferred view type: card, detail, list (default: card)"
    steps:
      # Set default view type
      - step: set
        bindings:
          preferred_view: "$view_type"

      - step: switch
        cases:
          - when: "$preferred_view"
            then: []
        default:
          - step: set
            bindings:
              preferred_view: "card"

      # Build the expected ID based on view type
      - step: switch
        cases:
          - when: "$preferred_view == 'card'"
            then:
              - step: set
                bindings:
                  primary_id: "render-spec/{{ $eidos_name }}-card"
                  fallback_id: "render-spec/{{ $eidos_name }}"
          - when: "$preferred_view == 'list'"
            then:
              - step: set
                bindings:
                  primary_id: "render-spec/{{ $eidos_name }}-list"
                  fallback_id: "render-spec/{{ $eidos_name }}-card"
        default:
          - step: set
            bindings:
              primary_id: "render-spec/{{ $eidos_name }}"
              fallback_id: "render-spec/{{ $eidos_name }}-card"

      # Try primary
      - step: find
        id: "$primary_id"
        bind_to: spec

      # Fallback if not found
      - step: switch
        cases:
          - when: "$spec"
            then: []
        default:
          - step: find
            id: "$fallback_id"
            bind_to: spec

      - step: return
        value:
          spec: "$spec"
          spec_id: "$spec.id"
          view_type: "$preferred_view"
          found: "{{ $spec != null }}"

- eidos: praxis
  id: praxis/opsis/select-renderer
  data:
    oikos: opsis
    name: select-renderer
    visible: true
    tier: 1
    description: |
      Select the appropriate renderer for a render-spec.

      Finds renderers that accept the render-spec's render-type,
      preferring the specified substrate.

      Falls back to generic declarative renderer if no specific
      renderer is found.
    params:
      - name: render_spec_id
        type: string
        required: true
        description: ID of the render-spec
      - name: substrate
        type: string
        required: false
        description: "Preferred substrate: web, native, terminal, universal (default: web)"
    steps:
      # Set default substrate
      - step: set
        bindings:
          preferred_substrate: "$substrate"

      - step: switch
        cases:
          - when: "$preferred_substrate"
            then: []
        default:
          - step: set
            bindings:
              preferred_substrate: "web"

      # Get the render-spec
      - step: find
        id: "$render_spec_id"
        bind_to: spec

      - step: assert
        condition: "$spec"
        message: "Render-spec not found: $render_spec_id"

      # Gather all renderers
      - step: gather
        eidos: renderer
        bind_to: all_renderers

      # Filter by substrate (prefer specific, allow universal)
      - step: filter
        items: "$all_renderers"
        condition: "$item.data.substrate == $preferred_substrate || $item.data.substrate == 'universal'"
        bind_to: substrate_renderers

      # Filter by render_strategy = declarative (these work with render-specs)
      - step: filter
        items: "$substrate_renderers"
        condition: "$item.data.render_strategy == 'declarative'"
        bind_to: declarative_renderers

      # Prefer specific substrate over universal
      - step: filter
        items: "$declarative_renderers"
        condition: "$item.data.substrate == $preferred_substrate"
        bind_to: preferred_renderers

      - step: switch
        cases:
          - when: "{{ $preferred_renderers | length }} > 0"
            then:
              - step: set
                bindings:
                  selected_renderer: "{{ $preferred_renderers | first }}"
        default:
          - step: set
            bindings:
              selected_renderer: "{{ $declarative_renderers | first }}"

      - step: return
        value:
          renderer: "$selected_renderer"
          renderer_id: "$selected_renderer.id"
          render_strategy: "$selected_renderer.data.render_strategy"
          substrate: "$selected_renderer.data.substrate"
          spec_id: "$render_spec_id"

- eidos: praxis
  id: praxis/opsis/list-renderable-eide
  data:
    oikos: opsis
    name: list-renderable-eide
    visible: true
    tier: 1
    description: |
      List all eide that have render-specs defined.

      Discovers which eide can be rendered declaratively by
      finding all distinct target_eidos values from render-specs.
    params: []
    steps:
      # Gather all render-specs
      - step: gather
        eidos: render-spec
        bind_to: all_specs

      # Extract target_eidos values using map with correct 'transform' field
      - step: map
        items: "$all_specs"
        transform: "$item.data.target_eidos"
        bind_to: all_eide

      - step: return
        value:
          renderable_eide: "$all_eide"
          spec_count: "{{ $all_specs | length }}"

- eidos: praxis
  id: praxis/opsis/render-entity
  data:
    oikos: opsis
    name: render-entity
    visible: true
    tier: 1
    description: |
      Get rendering info for a specific entity.

      Discovers the render-spec for the entity's eidos and returns
      all information needed to render it declaratively.

      This is the main entry point for the DeclarativeEngine.
    params:
      - name: entity_id
        type: string
        required: true
        description: ID of the entity to render
      - name: view_type
        type: string
        required: false
        description: "Preferred view type: card, detail, list (default: card)"
    steps:
      # Get the entity
      - step: find
        id: "$entity_id"
        bind_to: entity

      - step: assert
        condition: "$entity"
        message: "Entity not found: $entity_id"

      # Get render-spec for its eidos
      - step: call
        praxis: opsis/get-render-spec
        params:
          eidos_name: "$entity.eidos"
          view_type: "$view_type"
        bind_to: spec_result

      - step: return
        value:
          entity: "$entity"
          entity_id: "$entity_id"
          eidos: "$entity.eidos"
          spec: "$spec_result.spec"
          spec_id: "$spec_result.spec_id"
          view_type: "$spec_result.view_type"
          has_spec: "$spec_result.found"
