# Opsis Eide
# ὄψις (ópsis) — sight, appearance, visual form
#
# Visual rendering — how entities become visible
#
# Traces to: genesis/opsis/DESIGN.md

entities:
  # ─────────────────────────────────────────────────────────────
  # CORE RENDERING EIDE
  # ─────────────────────────────────────────────────────────────

  # layout — top-level HUD structure
  - eidos: eidos
    id: eidos/layout
    data:
      name: layout
      description: "Top-level HUD structure — defines the arrangement of regions. Composed, not raw."
      fields:
        name:
          type: string
          required: true
          description: "Layout identifier (e.g., 'default', 'minimal', 'focused')"
        description:
          type: string
          required: false
        regions:
          type: array
          required: true
          description: "Region specifications [{kind, position, config}]"
        active:
          type: boolean
          required: true
          default: false
          description: "Whether this layout is currently active"
        composed_from:
          type: string
          required: false
          description: "Definition ID this layout was composed from"
        created_at:
          type: timestamp
          required: true

  # panel — renderable content area
  - eidos: eidos
    id: eidos/panel
    data:
      name: panel
      description: "Renderable content area — surfaces entities within a region. The bridge between kosmos state and visual form."
      fields:
        name:
          type: string
          required: true
          description: "Panel identifier"
        render_type:
          type: enum
          values:
            - entity-list
            - expression-thread
            - presence-list
            - journey-view
            - theoria-card
            - affordance-bar
            - accumulation-buffer
            - artifact-preview
            - artifact-tabs
            - workspace-view
            - onboarding-step
            - custom
          required: true
          description: "How this panel renders its content"
        source_query:
          type: string
          required: false
          description: "Query to gather entities"
        source_entity_id:
          type: string
          required: false
          description: "Specific entity ID if rendering single entity"
        region_id:
          type: string
          required: true
          description: "The hud-region this panel renders in"
        priority:
          type: number
          required: false
          default: 0
          description: "Rendering priority within region"
        visible:
          type: boolean
          required: true
          default: true
        config:
          type: object
          required: false
          description: "Panel-specific rendering configuration"
        created_at:
          type: timestamp
          required: true

  # style-theme — visual styling
  - eidos: eidos
    id: eidos/style-theme
    data:
      name: style-theme
      description: "Visual styling — palette, density, and contextual appearance."
      fields:
        name:
          type: string
          required: true
          description: "Theme identifier (e.g., 'light', 'dark', 'focused')"
        palette:
          type: object
          required: true
          description: "Color definitions {background, foreground, accent, muted, ...}"
        density:
          type: enum
          values: [compact, comfortable, spacious]
          required: true
          default: comfortable
          description: "Visual density"
        typography:
          type: object
          required: false
          description: "Font family, sizes, weights"
        world_context:
          type: enum
          values: [self, intimate, community, public]
          required: false
          description: "Intended circle kind — themes may vary by context"
        active:
          type: boolean
          required: true
          default: false
          description: "Whether this theme is currently active"
        created_at:
          type: timestamp
          required: true

  # render-intent — reconciler intent for rendering
  - eidos: eidos
    id: eidos/render-intent
    data:
      name: render-intent
      description: "Reconciler intent for rendering — declares what should be visible."
      fields:
        target_region_id:
          type: string
          required: true
          description: "The region this intent targets"
        visible_entities:
          type: array
          required: true
          description: "Entity IDs that should be visible"
        panel_states:
          type: object
          required: false
          description: "Desired state of panels in the region"
        layout_id:
          type: string
          required: false
          description: "Active layout ID"
        theme_id:
          type: string
          required: false
          description: "Active theme ID"
        intent_status:
          type: enum
          values: [pending, reconciling, rendered, stale]
          required: true
          default: pending
        created_at:
          type: timestamp
          required: true
        reconciled_at:
          type: timestamp
          required: false

  # workspace — open artifacts and focus state
  - eidos: eidos
    id: eidos/workspace
    data:
      name: workspace
      description: "Open artifacts and focus state — what the animus is working on."
      fields:
        name:
          type: string
          required: true
          description: "Workspace identifier"
        open_artifact_ids:
          type: array
          required: true
          description: "Artifact IDs currently open (tab order)"
        focused_artifact_id:
          type: string
          required: false
          description: "Currently focused artifact (active tab)"
        animus_id:
          type: string
          required: true
          description: "Animus this workspace belongs to"
        created_at:
          type: timestamp
          required: true
        updated_at:
          type: timestamp
          required: false

  # ─────────────────────────────────────────────────────────────
  # HOMOICONIC RENDERING EIDE — Configuration as entities
  # ─────────────────────────────────────────────────────────────

  # render-type — how an eidos should render
  - eidos: eidos
    id: eidos/render-type
    data:
      name: render-type
      description: "How an eidos should render — makes display configuration traversable."
      fields:
        name:
          type: string
          required: true
          description: "Render type identifier"
        description:
          type: string
          required: false
        source_eidos:
          type: string
          required: false
          description: "The eidos this render type applies to"
        grouping:
          type: string
          required: false
          description: "How to group instances"
        sort_by:
          type: string
          required: false
          description: "Default sort field"
        sort_order:
          type: enum
          values: [ascending, descending]
          required: false
          default: descending
        filters:
          type: array
          required: false
          description: "Available filter options"
        created_at:
          type: timestamp
          required: true

  # renderer — component that implements a render-type
  - eidos: eidos
    id: eidos/renderer
    data:
      name: renderer
      description: |
        Component that implements a render-type — maps graph structure to visual form.
        Homoiconic: the mapping is an entity.

        Strategies: core, declarative, web-component, wasm
      fields:
        name:
          type: string
          required: true
          description: "Renderer identifier"
        render_strategy:
          type: enum
          values: [core, declarative, web-component, wasm]
          required: true
          default: core
        substrate:
          type: enum
          values: [web, native, terminal, universal]
          required: true
        accepts_render_types:
          type: array
          required: true
          description: "Render type IDs this renderer can handle"
        component_path:
          type: string
          required: false
          description: "Path to core component (render_strategy=core)"
        render_spec_id:
          type: string
          required: false
          description: "Entity ID of render-spec (render_strategy=declarative)"
        component_url:
          type: string
          required: false
          description: "URL to Web Component bundle (render_strategy=web-component)"
        wasm_module:
          type: string
          required: false
          description: "Path to WASM module (render_strategy=wasm)"
        props_schema:
          type: object
          required: false
          description: "JSON schema for component props"
        fallback_renderer_id:
          type: string
          required: false
          description: "Renderer to use if this one fails"
        created_at:
          type: timestamp
          required: true

  # render-spec — declarative rendering specification
  - eidos: eidos
    id: eidos/render-spec
    data:
      name: render-spec
      description: |
        Declarative rendering specification — defines how to render entities
        without custom code. Used by renderers with render_strategy=declarative.
      fields:
        name:
          type: string
          required: true
          description: "Render spec identifier"
        description:
          type: string
          required: false
        target_eidos:
          type: string
          required: true
          description: "The eidos this spec renders"
        fields_to_display:
          type: array
          required: true
          description: "Entity fields to render [{field, label?, widget_id?}]"
        layout_template:
          type: string
          required: true
          description: "Structural template with {field} interpolation"
        style_bindings:
          type: object
          required: false
          description: "CSS class or style mappings"
        children:
          type: array
          required: false
          description: "Child render-spec IDs for nested structures"
        created_at:
          type: timestamp
          required: true

  # widget — field-level display component
  - eidos: eidos
    id: eidos/widget
    data:
      name: widget
      description: "Field-level display component — how individual fields render."
      fields:
        name:
          type: string
          required: true
          description: "Widget identifier"
        description:
          type: string
          required: false
        field_types:
          type: array
          required: true
          description: "Field types this widget can render"
        component_path:
          type: string
          required: true
          description: "Path to widget component"
        editable:
          type: boolean
          required: false
          default: false
          description: "Whether this widget supports editing"
        config_schema:
          type: object
          required: false
          description: "Configuration options for the widget"
        created_at:
          type: timestamp
          required: true

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/render
    data:
      name: render
      description: |
        Rendering capability — visual emission and workspace management.
        Enables layout/theme activation, workspace tab management, and
        render cycle operations. Substrate-local (soma scope).
      oikos: opsis
      scope: soma
      grants:
        - praxis/opsis/gather-render-intent
        - praxis/opsis/reconcile-region
        - praxis/opsis/emit-render
        - praxis/opsis/render-all
        - praxis/opsis/activate-layout
        - praxis/opsis/get-active-layout
        - praxis/opsis/activate-theme
        - praxis/opsis/get-active-theme
        - praxis/opsis/open-artifact
        - praxis/opsis/close-artifact
        - praxis/opsis/focus-artifact
        - praxis/opsis/get-workspace
        - praxis/opsis/create-panel
        - praxis/opsis/list-panels
