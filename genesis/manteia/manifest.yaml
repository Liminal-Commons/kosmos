# Topos Manifest: Manteia
# μαντεία — divination, prophecy. Governed inference.
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: manteia
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Manteia
topos_description: |
  Divination, prophecy. Governed inference through the kosmos.
  Provides constrained LLM generation using JSON schemas derived
  from stoicheion eide.
topos_scale: cross-scale

# Development experience metadata
topos_category: interface
surfaces_provided:
  - reasoning    # Provides governed-inference for other topoi
surfaces_consumed: []  # Manteia is the interface, doesn't consume other surfaces

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: entities/
    content_types: [criterion]
  - path: surfaces/
    content_types: [surface]

description: |
  Μαντεία (manteia) — divination, prophecy.

  Governed inference through the kosmos. Manteia provides constrained
  LLM generation using JSON schemas derived from stoicheion eide.

  Key capabilities:
  - Structured output inference (JSON Schema constrained)
  - Quality evaluation with verdicts (TRUE/FALSE/UNDECIDABLE)
  - Praxis generation (LLM writes valid praxeis)
  - Step generation (individual step creation)
  - Schema introspection (query stoicheion schemas)
klimax_level: 3
depends_on:
  - stoicheia-portable  # Uses stoicheion schemas for constrained generation
  # Note: nous removed (manteia doesn't call nous praxeis)

requires_dynamis:
  - db.find
  - db.gather
  - intelligence.infer

provides:
  eide:
    - governed-envelope
    - evaluation-criterion
    - criterion-result

  desmoi:
    - generated-by
    - evaluated-against
    - constrained-to

  attainments:
    - manteia           # Core governed inference (schema-constrained generation)
    - generate-meta     # Meta-level generation (praxis, step, typos)

  praxeis:
    - manteia/governed-inference
    - manteia/generate-entity
    - manteia/generate-step
    - manteia/generate-praxis
    - manteia/generate-typos
    - manteia/get-stoicheion-schema
    - manteia/list-stoicheia
    # Internal evaluation praxis
    - manteia/_evaluate-generation
