# Oikos Manifest: Nous
# νοῦς — understanding operations, theoria, inquiry, synthesis, journeys.
#
# Nous is a cross-scale oikos for understanding operations that run through
# all scales. Not a klimax scale but the operational layer for surfacing,
# gathering, finding, traversal, and crystallization.
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: nous
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Nous
oikos_description: |
  Understanding operations — theoria, inquiry, synthesis, journeys.
  The cross-scale operational layer for surfacing, gathering, finding,
  traversal, and crystallization of knowledge.
oikos_scale: cross-scale

# Development experience metadata
oikos_category: domain
surfaces_provided:
  - understanding    # Provides crystallize-theoria, surface, traverse for other oikoi
surfaces_consumed:
  - reasoning        # Uses manteia/governed-inference in invoke praxis

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [render-spec, reflex]
  - path: theoria/
    content_types: [theoria]

requires_dynamis:
  # Tier 2 stoicheia: find, bind, update, compose, index
  - db.find
  - db.bind
  - db.update
  - db.gather
  - db.trace
  # Semantic operations
  - aisthesis.surface
  - aisthesis.index
  # Note: db.arise removed (using compose instead)
  # Note: db.loose removed (not used in praxeis)

provides:
  eide:
    # NOTE: theoria is foundational (defined in spora.yaml stage-1-archai)
    # Nous provides praxeis that operate on theoria, but doesn't define it
    - journey
    - waypoint
    - inquiry
    - synthesis

  reflexes:
    - reflex/nous/theoria-created
    - reflex/nous/expression-created

  # Oikos-centric rendering: nous owns presentation for its eide
  renderable:
    - eidos: theoria
      description: "Crystallized understanding cards and details"
    - eidos: journey
      description: "Teleological navigation cards"
    - eidos: inquiry
      description: "Open question cards"

  attainments:
    - crystallize           # Create and manage theoria (understanding lifecycle)
    - inquire               # Open inquiries and create syntheses
    - journey               # Create and manage journeys (teleological navigation)
    - invoke                # Activate nous via invocation (LLM integration)

  desmoi:
    - crystallized-in
    - inquires
    - synthesizes
    - answers
    - contains-waypoint
    - contains-journey
    - benefits-from
    - enables
    - provides-leverage-for
    - waypoint-yields
    - supersedes
    - supports
    - contradicts
    - evidences
    - journeys-toward

  praxeis:
    - nous/surface-journeys
    - nous/surface
    - nous/gather
    - nous/find
    - nous/index
    - nous/index-functions
    - nous/traverse
    - nous/crystallize-theoria
    - nous/confirm-theoria
    - nous/supersede-theoria
    - nous/list-theoria
    - nous/open-inquiry
    - nous/answer-inquiry
    - nous/synthesize
    - nous/find-related
    - nous/begin-journey
    - nous/embark-journey
    - nous/add-waypoint
    - nous/reach-waypoint
    - nous/complete-journey
    - nous/abandon-journey
    - nous/list-journeys
    - nous/get-journey-waypoints
    # Reflex response praxeis (internal)
    - nous/index-entity

stoicheia_form:
  # All stoicheia currently arche-level (Tier 2-3 operations)

depends_on:
  - manteia              # Uses governed-inference in invoke praxis
  - politeia             # crystallized-in bond targets circle (politeia eidos)
  # Note: synthesis is a nous eidos, not an oikos dependency
