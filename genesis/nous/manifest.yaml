# Topos Manifest: Nous
# νοῦς — understanding operations, theoria, inquiry, synthesis, journeys.
#
# Nous is a cross-scale oikos for understanding operations that run through
# all scales. Not a klimax scale but the operational layer for surfacing,
# gathering, finding, traversal, and crystallization.
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: nous
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Nous
topos_description: |
  Understanding operations — theoria, inquiry, synthesis, journeys.
  The cross-scale operational layer for surfacing, gathering, finding,
  traversal, and crystallization of knowledge.
topos_scale: cross-scale

# Development experience metadata
topos_category: domain
surfaces_provided:
  - understanding    # Provides crystallize-theoria, surface, traverse for other oikoi
surfaces_consumed:
  - reasoning           # Uses manteia/governed-inference in invoke praxis
  - reactivity          # Reflexes for knowledge mutation response

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: reflexes/
    content_types: [reflex]
  - path: surfaces/
    content_types: [surface]
  - path: typos/
    content_types: [typos]
  - path: principles/
    content_types: [principle]
  - path: patterns/
    content_types: [pattern]
  - path: journeys/
    content_types: [journey]
  - path: theoria/
    content_types: [theoria]
  # THYRA-OIKOS Phase 2: Domain render-specs for nous eide
  - path: render-specs/
    content_types: [render-spec]

requires_dynamis:
  # Tier 2 stoicheia: find, bind, update, compose, index
  - db.find
  - db.bind
  - db.update
  - db.gather
  - db.trace
  # Semantic operations
  - aisthesis.surface
  - aisthesis.index
  # Note: db.arise removed (using compose instead)
  # Note: db.loose removed (not used in praxeis)

provides:
  eide:
    # NOTE: theoria is foundational (defined in spora.yaml stage-1-archai)
    # Nous provides praxeis that operate on theoria, but doesn't define it
    - journey
    - waypoint
    - inquiry
    - synthesis
    # Knowledge Ladder eide
    - axiom         # Foundational truth
    - principle     # Normative guidance
    - pattern       # Recurring structure

  reflexes:
    - reflex/nous/theoria-created
    - reflex/nous/phasis-created
    # Pattern emergence reflexes
    - reflex/nous/suggest-pattern
    - reflex/nous/announce-pattern

  # Oikos-centric rendering: nous owns presentation for its eide
  renderable:
    - eidos: theoria
      description: "Crystallized understanding cards and details"
    - eidos: journey
      description: "Teleological navigation cards"
    - eidos: inquiry
      description: "Open question cards"
    - eidos: axiom
      description: "Foundational truth cards (constitutional)"
    - eidos: principle
      description: "Normative guidance cards"
    - eidos: pattern
      description: "Recurring structure cards with recognition triggers"

  attainments:
    - crystallize           # Create and manage theoria, patterns, principles (understanding lifecycle)
    - constitute            # Create and manage axioms (rare, constitutional oikoi)
    - inquire               # Open inquiries and create syntheses
    - journey               # Create and manage journeys (teleological navigation)
    - invoke                # Activate nous via invocation (LLM integration)

  desmoi:
    - crystallized-in
    - inquires
    - synthesizes
    - answers
    - contains-waypoint
    - contains-journey
    - benefits-from
    - enables
    - provides-leverage-for
    - waypoint-yields
    - supersedes
    - supports
    - contradicts
    - evidences
    - journeys-toward
    # Knowledge Ladder bonds
    - grounds            # Axiom/principle grounds principle/pattern
    - grounded-in        # Pattern/principle grounded in higher-level knowledge
    - rises-to           # Knowledge rises up the ladder
    - exemplifies        # Theoria exemplifies pattern

  praxeis:
    - nous/surface-journeys
    - nous/surface
    - nous/surface-for-context   # Ambient intelligence contextual surfacing
    - nous/gather
    - nous/find
    - nous/index
    - nous/index-functions
    - nous/traverse
    - nous/crystallize-theoria
    - nous/crystallize-from-phasis  # Voice session → theoria flow
    - nous/confirm-theoria
    - nous/supersede-theoria
    - nous/list-theoria
    # Pattern emergence (knowledge ladder)
    - nous/detect-patterns
    - nous/crystallize-pattern
    - nous/crystallize-principle
    - nous/crystallize-axiom
    - nous/establish-axiom
    - nous/elevate-to-pattern
    - nous/elevate-to-principle
    - nous/elevate-to-axiom
    - nous/open-inquiry
    - nous/answer-inquiry
    - nous/synthesize
    - nous/find-related
    - nous/begin-journey
    - nous/embark-journey
    - nous/add-waypoint
    - nous/reach-waypoint
    - nous/complete-journey
    - nous/abandon-journey
    - nous/list-journeys
    - nous/get-journey-waypoints
    # Reflex response praxeis (internal)
    - nous/index-entity

stoicheia_form:
  # All stoicheia currently arche-level (Tier 2-3 operations)

depends_on:
  - manteia              # Uses governed-inference in invoke praxis
  - politeia             # crystallized-in bond targets oikos (politeia eidos)
  # Note: synthesis is a nous eidos, not an oikos dependency
