        - praxis/nous/find
        - praxis/nous/gather
        - praxis/nous/traverse
        - praxis/nous/index
        - praxis/nous/index-entity
        - praxis/nous/crystallize-theoria
        - praxis/nous/find-related
      version: "1.0"
