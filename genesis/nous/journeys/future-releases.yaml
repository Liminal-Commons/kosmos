# =============================================================================
# R4: PRODUCTION HARDENING
# Relay resilience
# =============================================================================

  - eidos: journey
    id: journey/r4-hardening
    data:
      desire: "Production Hardening — relay resilience and observability"
      status: arrived
      arrived_at: "2026-01-26"
      priority: medium
      rationale: |
        Core flow works. Now make it reliable under load.
      notes: |
        Implemented in propylon-relay repository (../propylon-relay).
        - RateLimiter DO for per-IP rate limiting
        - SignalingRoom alarm-based GC for stale connections
        - Structured logging + /metrics endpoint
        - Custom domain config template in wrangler.jsonc
      success_criteria:
        - "Rate limiting prevents signaling abuse"
        - "Stale rooms cleaned up automatically"
        - "Relay metrics visible in dashboard"
        - "Relay deployed to multiple regions"

  - eidos: waypoint
    id: waypoint/r4-hardening-0
    data:
      journey_id: journey/r4-hardening
      ordinal: 0
      description: "Rate limiting for signaling relay"
      status: arrived
      notes: "RateLimiter Durable Object with per-IP sliding window. Configurable limits per endpoint type (validate: 30/min, join: 10/min, landing: 20/min)."

  - eidos: waypoint
    id: waypoint/r4-hardening-1
    data:
      journey_id: journey/r4-hardening
      ordinal: 1
      description: "Garbage collect stale connections"
      status: arrived
      notes: "SignalingRoom alarm-based cleanup. Idle connections closed after 2min, idle rooms GC'd after 5min, max room lifetime 1hr."

  - eidos: waypoint
    id: waypoint/r4-hardening-2
    data:
      journey_id: journey/r4-hardening
      ordinal: 2
      description: "Monitoring and logging"
      status: arrived
      notes: "Structured JSON logging via log() helper. /metrics endpoint with Prometheus-style output. /health returns live metrics. Observability enabled in wrangler.jsonc."

  - eidos: waypoint
    id: waypoint/r4-hardening-3
    data:
      journey_id: journey/r4-hardening
      ordinal: 3
      description: "Custom domain SSL"
      status: arrived
      notes: "Custom domain configuration template in wrangler.jsonc. Supports routes or custom_domains patterns. SSL automatic via Cloudflare edge."

  - eidos: waypoint
    id: waypoint/r4-hardening-4
    data:
      journey_id: journey/r4-hardening
      ordinal: 4
      description: "Geographic distribution (multi-region)"
      status: deferred
      notes: "Durable Objects automatically run in the region closest to the first request. Multi-region requires either DO placement hints or multiple workers with routing. Deferred until traffic patterns justify complexity."

