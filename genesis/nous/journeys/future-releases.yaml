# Future Releases as Journeys
# Post-MVP scope embodied as traversable entities.
#
# Structure:
#   Release journey (R1-R6) contains sub-journeys
#   Sub-journeys contain waypoints (individual tasks)
#   Dependencies are bonds between journeys
#
# The markdown document (FUTURE-RELEASES.md) renders this graph.
# These journeys ARE the roadmap.

# =============================================================================
# R1: EMISSION COMPLETION
# Full-circle code generation — schema drives all generated code
# =============================================================================

entities:
  - eidos: journey
    id: journey/r1-emission
    data:
      desire: "Emission Completion — full-circle code generation with provenance"
      status: arrived
      arrived_at: "2026-01-26"
      priority: high
      leverage_type: meta
      feedback_loop: true
      rationale: |
        Foundation for everything else. Type-safe frontend, auto-generated dispatchers,
        and schema-synced docs reduce maintenance burden for all subsequent work.
      success_criteria:
        - "TypeScript entity types generated from eidos, included in hash"
        - "MCP tools auto-registered from visible praxeis"
        - "Dynamis dispatch generated with tier gates"
        - "Full-circle hash includes all generated code (H1 == H2)"

