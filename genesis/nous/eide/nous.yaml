# Nous Eide
# Understanding eide — journeys, inquiries, and synthesis
#
# Extracted from spora.yaml stage-2-presence
# Note: theoria stays in spora.yaml stage-1-archai as foundational

entities:
  # journey — teleological container
  - eidos: eidos
    id: eidos/journey
    data:
      name: journey
      description: "A teleological container — movement toward a desire (hodos)."
      fields:
        desire:
          type: string
          required: true
          description: "What we're moving toward (the telos)"
        description:
          type: string
          required: false
          description: "Extended description of the journey"
        status:
          type: string
          required: true
          enum: [potential, active, paused, arrived, abandoned]
          default: potential
        current_waypoint:
          type: number
          required: false
          default: 0
        embarked_at:
          type: timestamp
          required: false
        arrived_at:
          type: timestamp
          required: false
        abandoned_at:
          type: timestamp
          required: false
        abandon_reason:
          type: string
          required: false
        # Leverage modeling — how work compounds
        leverage_type:
          type: string
          required: false
          enum: [meta, compound, additive, terminal]
          description: |
            How this journey's completion affects future work:
            - meta: Validates/enables all other work (e.g., full-circle verification)
            - compound: Creates feedback loops, value multiplies (e.g., MCP dispatch)
            - additive: One-time benefit per consumer (e.g., TypeScript types)
            - terminal: No downstream effect (e.g., UI polish)
        leverage_multiplier:
          type: string
          required: false
          description: "What entity type multiplies value when this completes (e.g., 'praxis' for MCP dispatch)"
        feedback_loop:
          type: boolean
          required: false
          default: false
          description: "Does completing this journey make it easier to create more of what it enables?"

  # waypoint — consolidation point
  - eidos: eidos
    id: eidos/waypoint
    data:
      name: waypoint
      description: "A consolidation point on a journey. Supports navigation via hodos praxeis."
      fields:
        journey_id:
          type: string
          required: false
          description: "Parent journey ID (optional if using contains-waypoint bond)"
        ordinal:
          type: number
          required: true
          description: "Position in journey (0-indexed)"
        description:
          type: string
          required: true
        status:
          type: string
          required: true
          enum: [pending, reached]
          default: pending
        reached_at:
          type: timestamp
          required: false
        artifact_id:
          type: string
          required: false
          description: "Optional artifact this waypoint yields"
        # Hodos navigation fields
        form_typos_id:
          type: string
          required: false
          description: "Typos for form validation"
        next:
          type: string
          required: false
          description: "Explicit next waypoint (overrides ordinal+1)"
        branches:
          type: array
          required: false
          description: "Conditional branches [{condition, target}]"
        yields:
          type: array
          required: false
          description: "Entity types this waypoint yields on completion"

  # =========================================================================
  # Knowledge Ladder — axiom → principle → pattern → theoria
  # =========================================================================

  # axiom — foundational truth
  - eidos: eidos
    id: eidos/axiom
    data:
      name: axiom
      description: |
        Foundational truth — the bedrock upon which other knowledge stands.
        Axioms are what agents surface when facing decisions. When an axiom
        applies, there is one right way.
      fields:
        name:
          type: string
          required: true
          description: "Short name (e.g., 'Actuation = Emission')"
        statement:
          type: string
          required: true
          description: "The foundational truth as a clear, complete statement"
        rationale:
          type: string
          required: true
          description: "Why this is foundational (not derived, but ground)"
        domain:
          type: string
          required: true
          description: "What domain this axiom grounds (constitution, development, methodology)"
        status:
          type: enum
          values: [provisional, established]
          required: true
          default: provisional
          description: "Lifecycle status — changes require ceremony"

  # principle — normative guidance
  - eidos: eidos
    id: eidos/principle
    data:
      name: principle
      description: |
        Normative guidance — what should be done. Principles are prescriptive;
        they say what SHOULD be done, not just what IS.
      fields:
        name:
          type: string
          required: true
          description: "Short name for the principle"
        guidance:
          type: string
          required: true
          description: "The normative statement — what should be done"
        rationale:
          type: string
          required: true
          description: "Why this is the right approach"
        domain:
          type: string
          required: true
          description: "Area of application"
        status:
          type: enum
          values: [provisional, established]
          required: true
          default: provisional
          description: "Lifecycle status"
        grounded_in:
          type: array
          required: false
          description: "Axiom IDs this principle realizes"

  # pattern — recurring structure
  - eidos: eidos
    id: eidos/pattern
    data:
      name: pattern
      description: |
        Recurring structure — "when you see X, do Y". Patterns are enacted;
        they describe structure that works. Theoria instantiate patterns.
      fields:
        name:
          type: string
          required: true
          description: "Short name (e.g., 'Phylax Pattern')"
        description:
          type: string
          required: true
          description: "What this pattern is"
        structure:
          type: string
          required: true
          description: "The essential form (often a sequence of steps)"
        when:
          type: string
          required: true
          description: "Recognition trigger — when to apply this pattern"
        example:
          type: string
          required: false
          description: "Concrete instance of the pattern in use"
        domain:
          type: string
          required: true
          description: "Area of application"
        status:
          type: enum
          values: [provisional, established]
          required: true
          default: provisional
          description: "Lifecycle status"
        grounded_in:
          type: array
          required: false
          description: "Principle or axiom IDs this pattern realizes"

  # =========================================================================
  # Inquiry — open question driving understanding
  # =========================================================================

  - eidos: eidos
    id: eidos/inquiry
    data:
      name: inquiry
      description: |
        An open question that drives understanding forward.
        Inquiries are first-class entities — not just strings but
        trackable, bondable, resolvable.
      fields:
        question:
          type: string
          required: true
          description: "The open question"
        domain:
          type: string
          required: true
          description: "Knowledge domain"
        status:
          type: enum
          values: [open, exploring, answered, dissolved]
          required: true
          default: open
          description: |
            - open: Question posed, no progress
            - exploring: Actively being investigated
            - answered: Direct answer found
            - dissolved: Question became irrelevant through synthesis
        context:
          type: string
          required: false
          description: "Additional context for the question"
        opened_at:
          type: timestamp
          required: true
        answered_at:
          type: timestamp
          required: false
        opened_by:
          type: string
          required: false
          description: "Prosopon ID who posed the question"

  # =========================================================================
  # Synthesis — bringing-together of multiple theoria
  # =========================================================================

  - eidos: eidos
    id: eidos/synthesis
    data:
      name: synthesis
      description: |
        A bringing-together of multiple theoria into higher understanding.
        Synthesis is ontologically distinct from summary — it creates
        something that didn't exist in any single source.
      fields:
        insight:
          type: string
          required: true
          description: "The synthesized understanding"
        sources:
          type: array
          required: true
          description: "Theoria IDs that were synthesized"
        domain:
          type: string
          required: true
          description: "Knowledge domain"
        status:
          type: enum
          values: [provisional, confirmed, superseded]
          required: true
          default: provisional
        synthesized_at:
          type: timestamp
          required: true
        synthesized_by:
          type: string
          required: false
          description: "Prosopon ID who created this synthesis"

# =============================================================================
# ATTAINMENTS
# =============================================================================

  - eidos: attainment
    id: attainment/crystallize
    data:
      name: crystallize
      description: |
        Capability to create and manage theoria, patterns, and principles —
        the lifecycle of understanding. Required to capture, confirm, and
        supersede crystallized insights and to elevate knowledge up the ladder.
      topos: nous
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/nous/crystallize-theoria }
      - { desmos: grants-praxis, to: praxis/nous/confirm-theoria }
      - { desmos: grants-praxis, to: praxis/nous/supersede-theoria }
      - { desmos: grants-praxis, to: praxis/nous/crystallize-pattern }
      - { desmos: grants-praxis, to: praxis/nous/crystallize-principle }
      - { desmos: grants-praxis, to: praxis/nous/elevate-to-pattern }
      - { desmos: grants-praxis, to: praxis/nous/elevate-to-principle }

  - eidos: attainment
    id: attainment/constitute
    data:
      name: constitute
      description: |
        Capability to create and manage axioms — foundational truths.
        Rare capability, typically only granted in constitutional oikoi.
        Axiom changes require ceremony.
      topos: nous
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/nous/crystallize-axiom }
      - { desmos: grants-praxis, to: praxis/nous/elevate-to-axiom }
      - { desmos: grants-praxis, to: praxis/nous/establish-axiom }

  - eidos: attainment
    id: attainment/inquire
    data:
      name: inquire
      description: |
        Inquiry and synthesis capability — posing questions and combining insights.
        Oikos-scoped because questions and syntheses are shared knowledge.
      topos: nous
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/nous/open-inquiry }
      - { desmos: grants-praxis, to: praxis/nous/answer-inquiry }
      - { desmos: grants-praxis, to: praxis/nous/dissolve-inquiry }
      - { desmos: grants-praxis, to: praxis/nous/synthesize }
      - { desmos: grants-praxis, to: praxis/nous/list-open-inquiries }
      - { desmos: grants-praxis, to: praxis/nous/get-sources }
      - { desmos: grants-praxis, to: praxis/nous/trace-synthesis }

  - eidos: attainment
    id: attainment/journey
    data:
      name: journey
      description: |
        Capability to create and manage journeys — teleological navigation.
        Required to begin journeys, add waypoints, and track progress toward goals.
      topos: nous
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/nous/begin-journey }
      - { desmos: grants-praxis, to: praxis/nous/embark-journey }
      - { desmos: grants-praxis, to: praxis/nous/add-waypoint }
      - { desmos: grants-praxis, to: praxis/nous/reach-waypoint }
      - { desmos: grants-praxis, to: praxis/nous/complete-journey }
      - { desmos: grants-praxis, to: praxis/nous/abandon-journey }

  - eidos: attainment
    id: attainment/invoke
    data:
      name: invoke
      description: |
        Capability to activate nous via invocation — LLM integration with kosmos.
        Required to use composed invocation patterns and multi-step reasoning.
      topos: nous
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/nous/invoke }
      - { desmos: grants-praxis, to: praxis/nous/navigate }
      - { desmos: grants-praxis, to: praxis/nous/call-praxis }
