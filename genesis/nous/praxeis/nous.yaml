# nous.yaml
# Nous praxeis exposed as MCP tools
#
# Nous is understanding operations — surfacing, gathering, finding, indexing,
# traversal, theoria, inquiry, synthesis, journeys.
# These praxeis enable discovery and crystallization of understanding.
#
# NOTE: Timestamps are handled by the DB layer automatically.

entities:

# =============================================================================
# SURFACING (Semantic Search)
# =============================================================================

- eidos: praxis
  id: praxis/nous/surface-journeys
  data:
    topos: nous
    name: surface-journeys
    visible: true
    description: |
      Surface journeys relevant to a query.

      Uses semantic search to find journeys by meaning.
    params:
      - name: query
        type: string
        required: true
        description: What we're looking for
      - name: limit
        type: number
        required: false
        description: How many journeys to surface
      - name: status
        type: string
        required: false
        description: Optional filter by status
    steps:
      - step: surface
        query: "$query"
        eidos_filter: "journey"
        limit: "$limit"
        threshold: 0.7
        bind_to: results
      - step: return
        value: "$results"

- eidos: praxis
  id: praxis/nous/surface
  data:
    topos: nous
    name: surface
    visible: true
    description: |
      Surface entities by semantic proximity to a query.

      Uses embeddings to find entities whose meaning is close to the query.
    params:
      - name: query
        type: string
        required: true
        description: The semantic query
      - name: eidos
        type: string
        required: false
        description: Optional filter by eidos type
      - name: limit
        type: number
        required: false
        description: Maximum results (default 10)
      - name: threshold
        type: number
        required: false
        description: Minimum similarity threshold (default 0.7)
    steps:
      - step: surface
        query: "$query"
        eidos_filter: "$eidos"
        limit: "$limit"
        threshold: "$threshold"
        bind_to: results
      - step: return
        value: "$results"

# =============================================================================
# CONTEXTUAL SURFACING (Ambient Intelligence)
# =============================================================================

- eidos: praxis
  id: praxis/nous/surface-for-context
  data:
    topos: nous
    name: surface-for-context
    visible: true
    description: |
      Surface knowledge relevant to a working context.

      Given a context query (artifact name, domain, description), surfaces
      relevant theoria, patterns, and principles from the knowledge ladder.
      This is the foundation of ambient intelligence — proactive surfacing
      of relevant understanding.

      Returns structured results suitable for HUD rendering.
    params:
      - name: context_query
        type: string
        required: true
        description: What context we're working in (artifact, domain, etc.)
      - name: limit
        type: number
        required: false
        description: Max results per category (default 3)
    steps:
      # Surface relevant theoria
      - step: surface
        query: "$context_query"
        eidos_filter: "theoria"
        limit: "$limit"
        threshold: 0.65
        bind_to: theoria_results

      # Surface applicable patterns
      - step: surface
        query: "$context_query"
        eidos_filter: "pattern"
        limit: "$limit"
        threshold: 0.65
        bind_to: pattern_results

      # Surface guiding principles
      - step: surface
        query: "$context_query"
        eidos_filter: "principle"
        limit: "$limit"
        threshold: 0.65
        bind_to: principle_results

      # Return structured guidance
      - step: return
        value:
          theoria: "$theoria_results"
          patterns: "$pattern_results"
          principles: "$principle_results"

# =============================================================================
# GATHERING AND FINDING
# =============================================================================

- eidos: praxis
  id: praxis/nous/gather
  data:
    topos: nous
    name: gather
    visible: true
    description: |
      Gather entities by eidos.

      Returns all entities of a given type, optionally limited.
    params:
      - name: eidos
        type: string
        required: false
        description: Filter by eidos type
      - name: limit
        type: number
        required: false
        description: Maximum results (default 100)
    steps:
      - step: gather
        eidos: "$eidos"
        limit: "$limit"
        bind_to: entities
      - step: return
        value: "$entities"

- eidos: praxis
  id: praxis/nous/find
  data:
    topos: nous
    name: find
    visible: true
    description: |
      Find an entity by its ID.

      Returns the entity if found, null otherwise.
    params:
      - name: id
        type: string
        required: true
        description: The entity ID to find
    steps:
      - step: find
        id: "$id"
        bind_to: entity
      - step: return
        value: "$entity"

# =============================================================================
# INDEXING
# =============================================================================

- eidos: praxis
  id: praxis/nous/index
  data:
    topos: nous
    name: index
    visible: true
    description: |
      Index an entity for semantic search.

      Generates an embedding for the given text and stores it with the entity.
    params:
      - name: entity_id
        type: string
        required: true
        description: The entity to index
      - name: text
        type: string
        required: true
        description: Text to generate embedding from
    steps:
      - step: index
        entity_id: "$entity_id"
        text: "$text"
        bind_to: result
      - step: return
        value: "$result"

- eidos: praxis
  id: praxis/nous/index-functions
  data:
    topos: nous
    name: index-functions
    visible: true
    description: |
      Index all function entities for semantic search.

      Gathers all eidos/function entities and indexes each one with
      text combining category, name, and description.
      Makes functions discoverable via surface("hash functions").
    params: []
    steps:
      - step: gather
        eidos: function
        bind_to: functions
      - step: set
        bindings:
          indexed_count: 0
      - step: for_each
        items: "$functions"
        as: func
        do:
          - step: set
            bindings:
              index_text: "{{ $func.data.category }} function: {{ $func.data.name }} - {{ $func.data.description }}"
          - step: index
            entity_id: "$func.id"
            text: "$index_text"
          - step: set
            bindings:
              indexed_count: "{{ $indexed_count + 1 }}"
      - step: return
        value:
          indexed: "$indexed_count"
          message: "Indexed all function entities for semantic search"

# =============================================================================
# TRAVERSAL
# =============================================================================

- eidos: praxis
  id: praxis/nous/traverse
  data:
    topos: nous
    name: traverse
    visible: true
    description: |
      Traverse the graph from a root entity, following specified bond types.

      Performs breadth-first search up to a specified depth.
      Returns all entities reachable through the specified desmoi.

      Use this for:
      - Dependency trees for validation reports
      - Provenance chains (composed-from, authorized-by)
      - Oikos membership graphs
      - Knowledge network navigation
    params:
      - name: root_id
        type: string
        required: true
        description: Starting entity ID
      - name: desmoi
        type: array
        required: true
        description: Bond types to follow (e.g., ["depends-on", "composed-from"])
      - name: depth
        type: number
        required: false
        description: Maximum traversal depth (default 10)
      - name: direction
        type: string
        required: false
        description: Direction to traverse bonds (outward, inward, both). Default outward.
      - name: eidos
        type: string
        required: false
        description: Only return entities of this eidos
    steps:
      - step: traverse
        root_id: "$root_id"
        desmoi: "$desmoi"
        depth: "$depth"
        direction: "$direction"
        eidos: "$eidos"
        bind_to: entities
      - step: return
        value: "$entities"

# =============================================================================
# THEORIA OPERATIONS
# =============================================================================

- eidos: praxis
  id: praxis/nous/crystallize-theoria
  data:
    topos: nous
    name: crystallize-theoria
    visible: true
    description: |
      Crystallize an understanding into theoria.

      Creates a theoria entity with the insight, domain, and status.
      Bonds theoria to dwelling oikos via crystallized-in.
      Indexes theoria for semantic surfacing (makes it discoverable).
    params:
      - name: theoria_id
        type: string
        required: true
        description: ID for the new theoria (e.g., theoria/uuid)
      - name: insight
        type: string
        required: true
        description: The understanding being crystallized
      - name: domain
        type: string
        required: true
        description: Domain this understanding belongs to
      - name: source
        type: string
        required: false
        description: Where this understanding came from (default conversation)
      - name: evidence
        type: array
        required: false
        description: Entity IDs that evidence this theoria
    steps:
      # Default source to conversation
      - step: set
        bindings:
          theoria_source: "$source"

      - step: switch
        cases:
          - when: "$theoria_source"
            then: []
        default:
          - step: set
            bindings:
              theoria_source: "conversation"

      # Create the theoria (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-theoria"
        inputs:
          id: "$theoria_id"
          insight: "$insight"
          domain: "$domain"
          source: "$theoria_source"
          status: "provisional"
        bind_to: theoria_entity

      # Bond to dwelling oikos if available
      - step: switch
        cases:
          - when: "$_oikos"
            then:
              - step: bind
                from_id: "$theoria_id"
                to_id: "$_oikos"
                desmos: "crystallized-in"

      # Create evidence bonds if provided
      - step: switch
        cases:
          - when: "$evidence"
            then:
              - step: for_each
                items: "$evidence"
                item_var: evidence_id
                steps:
                  - step: bind
                    from_id: "$evidence_id"
                    to_id: "$theoria_id"
                    desmos: "evidences"

      # Index for semantic surfacing (V4.4)
      # Makes theoria discoverable via surface queries
      - step: index
        entity_id: "$theoria_id"
        text: "$domain: $insight"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Crystallized theoria: $insight"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: theoria
            source_id: "$theoria_id"

      - step: return
        value:
          theoria_id: "$theoria_id"
          insight: "$insight"
          domain: "$domain"
          status: "provisional"
          indexed: true
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

- eidos: praxis
  id: praxis/nous/crystallize-from-phasis
  data:
    topos: nous
    name: crystallize-from-phasis
    visible: true
    description: |
      Crystallize theoria from a voice session phasis.

      Takes a phasis created during a voice session and extracts
      its insight, creating a theoria with provenance back to the
      phasis. This is how voice sessions contribute to the
      knowledge ladder — insights spoken become crystallized understanding.

      Uses manteia to refine the insight if the phasis is raw speech.
    params:
      - name: phasis_id
        type: string
        required: true
        description: The phasis containing the insight
      - name: domain
        type: string
        required: true
        description: Knowledge domain for the theoria
      - name: refine
        type: boolean
        required: false
        description: Use manteia to refine the insight (default true)
    steps:
      # Find the phasis
      - step: find
        id: "$phasis_id"
        bind_to: phasis

      - step: assert
        condition: "$phasis"
        message: "Phasis not found: $phasis_id"

      # Extract the content
      - step: set
        bindings:
          raw_content: "$phasis.data.content"
          refine_insight: "$refine"

      # Default refine to true
      - step: switch
        cases:
          - when: "$refine_insight"
            then: []
        default:
          - step: set
            bindings:
              refine_insight: true

      # Optionally refine the insight using manteia
      - step: switch
        cases:
          - when: "$refine_insight"
            then:
              - step: call
                praxis: manteia/governed-inference
                params:
                  prompt: |
                    Extract the core insight from this spoken phasis.
                    Express it as a clear, concise statement of understanding.
                    Keep the essence but make it crystalline.

                    Phasis: $raw_content
                  output_schema:
                    type: object
                    properties:
                      insight:
                        type: string
                        description: "The crystallized insight"
                    required: ["insight"]
                bind_to: refined
              - step: set
                bindings:
                  final_insight: "$refined.insight"
        default:
          - step: set
            bindings:
              final_insight: "$raw_content"

      # Generate theoria ID
      - step: set
        bindings:
          theoria_id: "theoria/$_uuid"

      # Crystallize the theoria with phasis as evidence
      - step: call
        praxis: nous/crystallize-theoria
        params:
          theoria_id: "$theoria_id"
          insight: "$final_insight"
          domain: "$domain"
          source: "voice-session"
          evidence:
            - "$phasis_id"
        bind_to: theoria_result

      - step: return
        value:
          theoria_id: "$theoria_id"
          insight: "$final_insight"
          source_phasis: "$phasis_id"
          refined: "$refine_insight"

- eidos: praxis
  id: praxis/nous/confirm-theoria
  data:
    topos: nous
    name: confirm-theoria
    visible: true
    description: |
      Confirm a provisional theoria as crystallized.
    params:
      - name: theoria_id
        type: string
        required: true
        description: The theoria to confirm
    steps:
      - step: find
        id: "$theoria_id"
        bind_to: theoria

      - step: assert
        condition: "$theoria"
        message: "Theoria not found: $theoria_id"

      - step: assert
        condition: '$theoria.data.status == "provisional"'
        message: "Theoria is not provisional"

      - step: update
        id: "$theoria_id"
        data:
          status: "crystallized"

      - step: return
        value:
          confirmed: true
          theoria_id: "$theoria_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

- eidos: praxis
  id: praxis/nous/supersede-theoria
  data:
    topos: nous
    name: supersede-theoria
    visible: true
    description: |
      Supersede a theoria with a new understanding.

      Creates new theoria, bonds it as superseding the old,
      and marks the old as superseded.
    params:
      - name: old_theoria_id
        type: string
        required: true
        description: The theoria to supersede
      - name: new_theoria_id
        type: string
        required: true
        description: ID for the new theoria
      - name: new_insight
        type: string
        required: true
        description: The new understanding
      - name: domain
        type: string
        required: false
        description: Domain (defaults to old theoria's domain)
    steps:
      - step: find
        id: "$old_theoria_id"
        bind_to: old_theoria

      - step: assert
        condition: "$old_theoria"
        message: "Theoria not found: $old_theoria_id"

      # Use old domain if not specified
      - step: set
        bindings:
          use_domain: "$domain"

      - step: switch
        cases:
          - when: "$use_domain"
            then: []
        default:
          - step: set
            bindings:
              use_domain: "$old_theoria.data.domain"

      # Create new theoria (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-theoria"
        inputs:
          id: "$new_theoria_id"
          insight: "$new_insight"
          domain: "$use_domain"
          source: "reasoning"
          status: "provisional"
        bind_to: new_theoria_entity

      # Create supersedes bond
      - step: bind
        from_id: "$new_theoria_id"
        to_id: "$old_theoria_id"
        desmos: "supersedes"

      # Mark old as superseded
      - step: update
        id: "$old_theoria_id"
        data:
          status: "superseded"

      - step: return
        value:
          new_theoria_id: "$new_theoria_id"
          superseded_id: "$old_theoria_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

- eidos: praxis
  id: praxis/nous/list-theoria
  data:
    topos: nous
    name: list-theoria
    visible: true
    description: |
      List theoria, optionally filtered by domain or status.
    params:
      - name: domain
        type: string
        required: false
        description: Filter by domain
      - name: status
        type: string
        required: false
        description: Filter by status (provisional, crystallized, superseded)
    steps:
      - step: gather
        eidos: theoria
        bind_to: all_theoria

      # Filter by domain if specified
      - step: switch
        cases:
          - when: "$domain"
            then:
              - step: filter
                items: "$all_theoria"
                condition: "$item.data.domain == '$domain'"
                bind_to: all_theoria

      # Filter by status if specified
      - step: switch
        cases:
          - when: "$status"
            then:
              - step: filter
                items: "$all_theoria"
                condition: "$item.data.status == '$status'"
                bind_to: all_theoria

      - step: return
        value:
          theoria: "$all_theoria"

# =============================================================================
# PATTERN EMERGENCE (Knowledge Ladder)
# =============================================================================

- eidos: praxis
  id: praxis/nous/detect-patterns
  data:
    topos: nous
    name: detect-patterns
    visible: true
    description: |
      Detect emergent patterns from accumulated theoria.

      Analyzes theoria in a domain to find recurring structures.
      Uses manteia to identify commonalities and proposes patterns
      for crystallization. This is how the knowledge ladder grows
      organically — patterns emerge from accumulated understanding.

      Returns proposed patterns with their source theoria for human
      review before crystallization.
    params:
      - name: domain
        type: string
        required: true
        description: Domain to analyze for patterns
      - name: min_theoria
        type: number
        required: false
        description: Minimum theoria to analyze (default 3)
    steps:
      # Gather theoria in domain
      - step: gather
        eidos: theoria
        bind_to: all_theoria

      - step: filter
        items: "$all_theoria"
        condition: "$item.data.domain == '$domain'"
        bind_to: domain_theoria

      # Default min_theoria to 3
      - step: set
        bindings:
          min_count: "$min_theoria"

      - step: switch
        cases:
          - when: "$min_count"
            then: []
        default:
          - step: set
            bindings:
              min_count: 3

      # Check we have enough theoria
      - step: set
        bindings:
          theoria_count: "{{ $domain_theoria | length }}"

      - step: switch
        cases:
          - when: "$theoria_count < $min_count"
            then:
              - step: return
                value:
                  status: "insufficient_theoria"
                  count: "$theoria_count"
                  required: "$min_count"
                  message: "Need more theoria before patterns can emerge"

      # Extract insights for analysis
      - step: set
        bindings:
          insights_text: ""

      - step: for_each
        items: "$domain_theoria"
        as: t
        do:
          - step: set
            bindings:
              insights_text: "{{ $insights_text }}\n- {{ $t.data.insight }}"

      # Use manteia to detect patterns
      - step: call
        praxis: manteia/governed-inference
        params:
          prompt: |
            Analyze these insights from the domain "$domain" and identify
            recurring patterns — structural similarities that appear across
            multiple insights.

            Insights:
            $insights_text

            For each pattern found, provide:
            1. A short name
            2. Description of the pattern
            3. The structure (sequence of steps or shape)
            4. When to apply it (recognition trigger)
            5. Which insights instantiate this pattern (by number)

            Only propose patterns that appear in at least 2 insights.
            Quality over quantity — propose only clear, actionable patterns.
          output_schema:
            type: object
            properties:
              patterns:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    structure:
                      type: string
                    when:
                      type: string
                    instantiated_by:
                      type: array
                      items:
                        type: number
                  required: ["name", "description", "structure", "when"]
              analysis:
                type: string
            required: ["patterns"]
        bind_to: analysis_result

      # Return proposed patterns with source theoria
      - step: return
        value:
          domain: "$domain"
          theoria_analyzed: "$theoria_count"
          proposed_patterns: "$analysis_result.patterns"
          analysis: "$analysis_result.analysis"
          source_theoria: "$domain_theoria"

- eidos: praxis
  id: praxis/nous/crystallize-pattern
  data:
    topos: nous
    name: crystallize-pattern
    visible: true
    description: |
      Crystallize an emergent pattern from theoria.

      Creates a pattern entity and bonds it to the theoria that
      instantiate it. The pattern rises from accumulated understanding
      to become reusable structure.
    params:
      - name: pattern_id
        type: string
        required: true
        description: ID for the new pattern
      - name: name
        type: string
        required: true
        description: Short name for the pattern
      - name: description
        type: string
        required: true
        description: What this pattern is
      - name: structure
        type: string
        required: true
        description: The essential form (often steps)
      - name: when
        type: string
        required: true
        description: Recognition trigger
      - name: domain
        type: string
        required: true
        description: Domain this pattern belongs to
      - name: theoria_ids
        type: array
        required: false
        description: Theoria IDs that instantiate this pattern
    steps:
      # Create the pattern
      - step: compose
        typos_id: "typos-def-pattern"
        inputs:
          id: "$pattern_id"
          name: "$name"
          description: "$description"
          structure: "$structure"
          when: "$when"
          domain: "$domain"
          status: "provisional"
        bind_to: pattern_entity

      # Bond theoria to pattern via exemplifies
      - step: switch
        cases:
          - when: "$theoria_ids"
            then:
              - step: for_each
                items: "$theoria_ids"
                as: theoria_id
                do:
                  - step: bind
                    from_id: "$theoria_id"
                    to_id: "$pattern_id"
                    desmos: "exemplifies"

      # Index for semantic surfacing
      - step: index
        entity_id: "$pattern_id"
        text: "$domain pattern: $name - $description. When: $when"

      - step: return
        value:
          pattern_id: "$pattern_id"
          name: "$name"
          domain: "$domain"
          instantiated_by: "$theoria_ids"
          status: "provisional"
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

# =============================================================================
# KNOWLEDGE LADDER — Principle, Axiom, Elevation
# =============================================================================

- eidos: praxis
  id: praxis/nous/crystallize-principle
  data:
    topos: nous
    name: crystallize-principle
    visible: true
    description: |
      Crystallize a principle from observed patterns.

      Creates a principle entity — normative guidance that says what
      SHOULD be done. Bonds it to the patterns that ground it.
      Principles rise from patterns to become reusable guidance.
    params:
      - name: principle_id
        type: string
        required: true
        description: ID for the new principle
      - name: name
        type: string
        required: true
        description: Short name for the principle
      - name: guidance
        type: string
        required: true
        description: The normative statement — what should be done
      - name: rationale
        type: string
        required: true
        description: Why this is the right approach
      - name: domain
        type: string
        required: true
        description: Area of application
      - name: grounded_in_pattern_ids
        type: array
        required: false
        description: Pattern IDs this principle emerges from
    steps:
      - step: assert
        condition: "$_prosopon"
        message: "Prosopon required to crystallize a principle"

      # Create the principle
      - step: compose
        typos_id: "typos-def-principle"
        inputs:
          id: "$principle_id"
          name: "$name"
          guidance: "$guidance"
          rationale: "$rationale"
          domain: "$domain"
          status: "provisional"
        bind_to: principle_entity

      # Bond patterns to principle via grounded-in
      - step: switch
        cases:
          - when: "$grounded_in_pattern_ids"
            then:
              - step: for_each
                items: "$grounded_in_pattern_ids"
                as: pattern_id
                do:
                  - step: bind
                    from_id: "$pattern_id"
                    to_id: "$principle_id"
                    desmos: "grounded-in"

      # Bond to dwelling oikos if available
      - step: switch
        cases:
          - when: "$_oikos"
            then:
              - step: bind
                from_id: "$principle_id"
                to_id: "$_oikos"
                desmos: "crystallized-in"

      # Index for semantic surfacing
      - step: index
        entity_id: "$principle_id"
        text: "$domain principle: $name - $guidance"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Crystallized principle: $name — $guidance"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: principle
            source_id: "$principle_id"

      - step: return
        value:
          principle_id: "$principle_id"
          name: "$name"
          domain: "$domain"
          grounded_in: "$grounded_in_pattern_ids"
          status: "provisional"
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

- eidos: praxis
  id: praxis/nous/crystallize-axiom
  data:
    topos: nous
    name: crystallize-axiom
    visible: true
    description: |
      Crystallize an axiom — a foundational truth.

      Creates an axiom entity with provisional status. Axioms are the
      bedrock upon which other knowledge stands. Bonds it to the
      principles that ground it.
    params:
      - name: axiom_id
        type: string
        required: true
        description: ID for the new axiom
      - name: name
        type: string
        required: true
        description: Short name for the axiom
      - name: statement
        type: string
        required: true
        description: The foundational truth as a clear statement
      - name: rationale
        type: string
        required: true
        description: Why this is foundational (not derived, but ground)
      - name: domain
        type: string
        required: true
        description: What domain this axiom grounds
      - name: grounded_in_principle_ids
        type: array
        required: false
        description: Principle IDs this axiom emerges from
    steps:
      - step: assert
        condition: "$_prosopon"
        message: "Prosopon required to crystallize an axiom"

      # Create the axiom
      - step: compose
        typos_id: "typos-def-axiom"
        inputs:
          id: "$axiom_id"
          name: "$name"
          statement: "$statement"
          rationale: "$rationale"
          domain: "$domain"
          status: "provisional"
        bind_to: axiom_entity

      # Bond principles to axiom via grounded-in
      - step: switch
        cases:
          - when: "$grounded_in_principle_ids"
            then:
              - step: for_each
                items: "$grounded_in_principle_ids"
                as: principle_id
                do:
                  - step: bind
                    from_id: "$principle_id"
                    to_id: "$axiom_id"
                    desmos: "grounded-in"

      # Bond to dwelling oikos if available
      - step: switch
        cases:
          - when: "$_oikos"
            then:
              - step: bind
                from_id: "$axiom_id"
                to_id: "$_oikos"
                desmos: "crystallized-in"

      # Index for semantic surfacing
      - step: index
        entity_id: "$axiom_id"
        text: "$domain axiom: $name - $statement"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Crystallized axiom: $name — $statement"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: axiom
            source_id: "$axiom_id"

      - step: return
        value:
          axiom_id: "$axiom_id"
          name: "$name"
          domain: "$domain"
          grounded_in: "$grounded_in_principle_ids"
          status: "provisional"
  bonds:
    - { desmos: requires-attainment, to: attainment/constitute }

- eidos: praxis
  id: praxis/nous/establish-axiom
  data:
    topos: nous
    name: establish-axiom
    visible: true
    description: |
      Establish a provisional axiom as foundational truth.

      Transitions an axiom from provisional to established status.
      This is a ceremonial act — established axioms become bedrock.
    params:
      - name: axiom_id
        type: string
        required: true
        description: The axiom to establish
    steps:
      - step: find
        id: "$axiom_id"
        bind_to: axiom

      - step: assert
        condition: "$axiom"
        message: "Axiom not found: $axiom_id"

      - step: assert
        condition: '$axiom.data.status == "provisional"'
        message: "Axiom is not provisional — cannot establish"

      - step: update
        id: "$axiom_id"
        data:
          status: "established"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Axiom established: $axiom.data.name — $axiom.data.statement"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: axiom
            source_id: "$axiom_id"
            event: established

      - step: return
        value:
          established: true
          axiom_id: "$axiom_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/constitute }

- eidos: praxis
  id: praxis/nous/elevate-to-pattern
  data:
    topos: nous
    name: elevate-to-pattern
    visible: true
    description: |
      Elevate a theoria to a pattern.

      Promotes a theoria up one rung of the knowledge ladder by
      creating a new pattern entity grounded in the source theoria.
    params:
      - name: source_id
        type: string
        required: true
