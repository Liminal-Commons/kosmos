          status: "provisional"
        bind_to: pattern_entity

      # Bond source theoria to new pattern
      - step: bind
        from_id: "$source_id"
        to_id: "$pattern_id"
        desmos: "exemplifies"

      # Index for semantic surfacing
      - step: index
        entity_id: "$pattern_id"
        text: "$domain pattern: $name - $description. When: $when"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Elevated theoria to pattern: $name"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: pattern
            source_id: "$pattern_id"
            elevated_from: "$source_id"

      - step: return
        value:
          pattern_id: "$pattern_id"
          name: "$name"
          domain: "$domain"
          elevated_from: "$source_id"
          status: "provisional"
  bonds:
    - { desmos: requires-attainment, to: attainment/crystallize }

- eidos: praxis
  id: praxis/nous/elevate-to-principle
