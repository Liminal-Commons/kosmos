# Principle Card Render-Spec
# Normative guidance derived from axioms
#
# Principle fields:
#   - name (string): Principle name
#   - statement (string): The normative guidance
#   - domain (string): What area this principle applies to
#   - grounds_in (array): Axioms this principle derives from
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/principle-card
    data:
      name: principle-card
      description: |
        Normative guidance card. Principles are derived from axioms
        and guide patterns and practices.
      target_eidos: principle
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: compass
                            size: md
                        - widget: text
                          props:
                            content: "{name}"
                            variant: emphasis

                    - widget: badge
                      props:
                        content: "Principle"
                        variant: info

                # Statement
                - widget: text
                  props:
                    content: "{statement}"
                    variant: body

                # Domain
                - widget: badge
                  when: "domain"
                  props:
                    content: "{domain}"
                    variant: default

      created_at: "2026-02-03T00:00:00Z"
