# Pattern Card Render-Spec
# Recurring structure with recognition triggers
#
# Pattern fields:
#   - name (string): Pattern name
#   - description (string): What this pattern represents
#   - recognition_triggers (array): How to identify this pattern
#   - domain (string): What area this pattern applies to
#   - frequency (number): How often this pattern has been observed
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/pattern-card
    data:
      name: pattern-card
      description: |
        Recurring structure card. Shows the pattern name, description,
        and recognition triggers. Patterns emerge from theoria clustering.
      target_eidos: pattern
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
            # on_click: nous/view-pattern — praxis not yet implemented
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: layers
                            size: md
                        - widget: text
                          props:
                            content: "{name}"
                            variant: emphasis

                    - widget: row
                      props:
                        gap: xs
                      children:
                        - widget: badge
                          props:
                            content: "Pattern"
                            variant: info
                        - widget: badge
                          when: "frequency"
                          props:
                            content: "{frequency}x"
                            variant: default

                # Description
                - widget: text
                  props:
                    content: "{description}"
                    variant: body

                # Domain
                - widget: badge
                  when: "domain"
                  props:
                    content: "{domain}"
                    variant: default

      created_at: "2026-02-03T00:00:00Z"
