# Inquiry Card Render-Spec
# Open question awaiting answer
#
# Inquiry fields:
#   - question (string): The open question
#   - context (string): Background for the inquiry
#   - status (enum): open | answered | closed
#   - urgency (enum): low | medium | high
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/inquiry-card
    data:
      name: inquiry-card
      description: |
        Open question card showing the inquiry and its status.
        Click to view details or provide an answer.
      target_eidos: inquiry
      variant: card

      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
            # on_click: nous/view-inquiry — praxis not yet implemented
          children:
            - widget: stack
              props:
                gap: sm
              children:
                # Header with status
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: row
                      props:
                        gap: sm
                        align: center
                      children:
                        - widget: icon
                          props:
                            name: help-circle
                            size: md
                        - widget: text
                          props:
                            content: "{question}"
                            variant: emphasis

                    # Status badge
                    - widget: badge
                      when: "status == 'open'"
                      props:
                        content: "Open"
                        variant: warning
                    - widget: badge
                      when: "status == 'answered'"
                      props:
                        content: "Answered"
                        variant: success
                    - widget: badge
                      when: "status == 'closed'"
                      props:
                        content: "Closed"
                        variant: default

                # Context
                - widget: text
                  when: "context"
                  props:
                    content: "{context}"
                    variant: caption

                # Urgency indicator
                - widget: badge
                  when: "urgency == 'high'"
                  props:
                    content: "Urgent"
                    variant: error

      created_at: "2026-02-03T00:00:00Z"
