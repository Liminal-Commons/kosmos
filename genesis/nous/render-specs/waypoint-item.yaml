# Waypoint Item Render-Spec
# Consolidation point on a journey
#
# Waypoint fields:
#   - ordinal (number): Position in journey
#   - description (string): What this waypoint represents
#   - status (enum): pending | reached
#   - reached_at (timestamp): When waypoint was reached
#   - artifact_id (string): Optional artifact this waypoint yields
#
# Traces to: genesis/demiurge/THYRA-EVOLUTION.md

entities:

  - eidos: render-spec
    id: render-spec/waypoint-item
    data:
      name: waypoint-item
      description: |
        Waypoint list item showing position, status, and description.
        Used in journey detail views and step indicators.
      target_eidos: waypoint
      variant: list-item

      layout:
        - widget: row
          props:
            gap: md
            align: center
          children:
            # Step indicator
            - widget: row
              props:
                gap: xs
                align: center
              children:
                - widget: icon
                  when: "status == 'pending'"
                  props:
                    name: circle
                    size: sm
                - widget: icon
                  when: "status == 'reached'"
                  props:
                    name: circle-check
                    size: sm
                    color: success

            # Content
            - widget: stack
              props:
                gap: xs
              children:
                - widget: text
                  props:
                    content: "{description}"
                    variant: body

                # Reached timestamp
                - widget: text
                  when: "reached_at"
                  props:
                    content: "Reached: {reached_at}"
                    variant: caption

                # Artifact indicator
                - widget: row
                  when: "artifact_id"
                  props:
                    gap: xs
                    align: center
                  children:
                    - widget: icon
                      props:
                        name: file-text
                        size: sm
                    - widget: text
                      props:
                        content: "Yields artifact"
                        variant: caption

      created_at: "2026-02-03T00:00:00Z"
