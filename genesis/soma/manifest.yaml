# Oikos Manifest: Soma
# The embodied — presence, sensing, and the interface with world.
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: soma
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Soma
oikos_description: |
  The embodied. Presence, sensing, and the interface with world.
  Manages channels, percepts, signals, and the body schema.
oikos_scale: soma

# Development experience metadata
oikos_category: infrastructure
surfaces_provided: []   # Foundational presence layer
surfaces_consumed: []   # Provides channels/body-schema infrastructure

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [mcp-bridge-config]

requires_dynamis:
  # Database operations for entity/bond management
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.loose

provides:
  eide:
    # NOTE: animus is foundational (defined in spora.yaml stage-2-presence)
    # Soma provides praxeis that operate on animus, but doesn't define it
    - channel
    - percept
    - body-signal
    - body-schema
    - notification
    # Infrastructure eide
    - node
    - service-instance
    - kosmos-instance
    # Configuration eide
    - mcp-bridge-config

  attainments:
    - embody              # Arise and depart as animus (presence management)
    - channel             # Open and close channels (I/O pathway management)
    - infrastructure      # Manage nodes, services, kosmos instances

  desmoi:
    - channel-of
    - received-through
    - emitted-through
    - schema-of
    # Infrastructure desmoi
    - hosts-service
    - provides-to
    - runs-on

  praxeis:
    - soma/arise-animus
    - soma/depart-animus
    - soma/open-channel
    - soma/close-channel
    - soma/perceive
    - soma/emit
    - soma/sense-body
    # Reflex response praxeis (internal)
    - soma/add-notification
    # Infrastructure praxeis
    - soma/register-node
    - soma/sense-node
    - soma/register-service
    - soma/sense-service
    - soma/sense-kosmos-instance
    # Circle membership praxeis
    - soma/join-circle
    - soma/leave-circle
    - soma/list-memberships

stoicheia_form:
  # All stoicheia used by soma are currently arche-level (interpreted by host)
  # No WASM modules yet — Tier 2 operations require host dynamis
