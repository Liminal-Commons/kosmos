# Node Card Render-Spec
# Infrastructure node display — physical/virtual machines
#
# Traces to: genesis/soma/DESIGN.md § Infrastructure Eide

entities:

  - eidos: render-spec
    id: render-spec/node-card
    data:
      name: node-card
      target_eidos: node
      variant: card
      layout:
        - widget: card
          props:
            variant: bordered
            padding: md
          children:
            - widget: stack
              props:
                gap: sm
              children:
                - widget: row
                  props:
                    justify: between
                    align: center
                  children:
                    - widget: text
                      props:
                        content: "{name}"
                        variant: emphasis
                    - widget: status-indicator
                      props:
                        status: "{status}"
                - widget: row
                  props:
                    gap: sm
                  children:
                    - widget: badge
                      props:
                        content: "{platform}"
                        variant: info
                    - widget: badge
                      when: "kind == 'commons'"
                      props:
                        content: "Commons"
                        variant: success
                    - widget: badge
                      when: "kind == 'personal'"
                      props:
                        content: "Personal"
                        variant: info
                - widget: text
                  when: "address"
                  props:
                    content: "{address}"
                    variant: caption
