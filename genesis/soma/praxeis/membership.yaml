# Oikos Membership Praxeis
# Enables homoiconic oikos discovery via member-of bonds
#
# These praxeis allow prosopa to manage their oikos memberships,
# enabling the MCP bridge to discover oikoi from within the graph
# rather than external configuration.

entities:

# =============================================================================
# JOIN OIKOS
# =============================================================================

- eidos: praxis
  id: praxis/soma/join-oikos
  data:
    topos: soma
    name: join-oikos
    visible: true
    description: |
      Join an oikos by creating a member-of bond.
      The oikos must have an endpoint field for MCP discovery.

      Creates:
      - member-of bond from current prosopon to oikos
      - Optionally sets endpoint on oikos if not already set

      Returns the oikos ID and endpoint for connection.
    params:
      - name: oikos_id
        type: string
        required: true
        description: "Oikos entity ID (e.g., 'oikos/work')"
      - name: endpoint
        type: string
        required: false
        description: "Optional endpoint URL to set on the oikos if not already set"
    steps:
      # Verify oikos exists
      - step: find
        id: "$oikos_id"
        bind_to: target_oikos

      - step: assert
        condition: "$target_oikos"
        message: "Oikos not found: $oikos_id"

      # Optionally update endpoint if provided and not set
      - step: switch
        cases:
          - when: "$endpoint && !$target_oikos.data.endpoint"
            then:
              - step: update
                id: "$oikos_id"
                data:
                  endpoint: "$endpoint"
              - step: find
                id: "$oikos_id"
                bind_to: target_oikos

      # Check if already a member
      - step: trace
        from_id: "$_prosopon"
        desmos: member-of
        bind_to: existing_memberships

      # Filter to see if we're already in this oikos
      - step: filter
        items: "$existing_memberships"
        condition: "$item.to_id === $oikos_id"
        bind_to: already_member

      # Create member-of bond if not already a member
      - step: switch
        cases:
          - when: "$already_member.length === 0"
            then:
              - step: bind
                from_id: "$_prosopon"
                to_id: "$oikos_id"
                desmos: member-of
                data:
                  joined_at: "$_now"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Joined oikos $oikos_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: oikos
            source_id: "$oikos_id"

      - step: return
        value:
          joined: "$oikos_id"
          endpoint: "$target_oikos.data.endpoint"
          already_member: "$already_member.length > 0"

# =============================================================================
# LEAVE OIKOS
# =============================================================================

- eidos: praxis
  id: praxis/soma/leave-oikos
  data:
    topos: soma
    name: leave-oikos
    visible: true
    description: |
      Leave an oikos by removing the member-of bond.
    params:
      - name: oikos_id
        type: string
        required: true
        description: "Oikos entity ID to leave"
    steps:
      # Verify oikos exists
      - step: find
        id: "$oikos_id"
        bind_to: target_oikos

      - step: assert
        condition: "$target_oikos"
        message: "Oikos not found: $oikos_id"

      # Remove member-of bond
      - step: loose
        from_id: "$_prosopon"
        to_id: "$oikos_id"
        desmos: member-of

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Left oikos $oikos_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: oikos
            source_id: "$oikos_id"

      - step: return
        value:
          left: "$oikos_id"

# =============================================================================
# LIST MEMBERSHIPS
# =============================================================================

- eidos: praxis
  id: praxis/soma/list-memberships
  data:
    topos: soma
    name: list-memberships
    visible: true
    description: |
      List all oikoi the current prosopon is a member of.
      Returns oikoi with their endpoints for MCP bridge discovery.
    params: []
    steps:
      # Trace member-of bonds from current prosopon
      - step: trace
        from_id: "$_prosopon"
        desmos: member-of
        bind_to: memberships

      # Gather all oikoi
      - step: gather
        eidos: oikos
        bind_to: all_oikoi

      # Build membership info with oikos details
      - step: set
        bindings:
          result: []

      - step: for_each
        items: "$memberships"
        item_var: membership
        steps:
          # Find the oikos entity
          - step: filter
            items: "$all_oikoi"
            condition: "$item.id === $membership.to_id"
            bind_to: matching_oikoi

          - step: switch
            cases:
              - when: "$matching_oikoi.length > 0"
                then:
                  - step: set
                    bindings:
                      oikos: "$matching_oikoi.0"
                  - step: append
                    to: result
                    value:
                      id: "$membership.to_id"
                      name: "$oikos.data.name"
                      kind: "$oikos.data.kind"
                      endpoint: "$oikos.data.endpoint"
                      joined_at: "$membership.data.joined_at"
        lift:
          - result

      # Filter to oikoi with endpoints (for MCP discovery)
      - step: filter
        items: "$result"
        condition: "$item.endpoint"
        bind_to: discoverable

      - step: return
        value:
          oikoi: "$result"
          discoverable: "$discoverable"
