# soma.yaml
# Soma praxeis exposed as MCP tools
#
# Soma is the embodied interface — parousia lifecycle, channels, perception/action.
# These praxeis enable Claude to manage dwelling presence and interface with the world.
#
# NOTE: Timestamps (created_at, updated_at) are handled by the DB layer automatically.
# The entity.data may not include explicit timestamps, but the row-level timestamps exist.

entities:

# =============================================================================
# PAROUSIA LIFECYCLE
# =============================================================================

- eidos: praxis
  id: praxis/soma/arise-parousia
  data:
    topos: soma
    name: arise-parousia
    visible: true
    description: |
      Bring a parousia into being. The parousia instantiates a prosopon.

      Creates:
      - parousia entity (status: dwelling)
      - body-schema entity (default capabilities)
      - instantiates bond to prosopon
      - schema-of bond to parousia

      Returns the parousia_id. Use this ID for channel operations.
    params:
      - name: prosopon_id
        type: string
        required: true
        description: The prosopon this parousia instantiates
      - name: parousia_id
        type: string
        required: true
        description: ID for the new parousia (e.g., parousia/uuid)
    steps:
      # Verify prosopon exists
      - step: find
        id: "$prosopon_id"
        bind_to: prosopon

      - step: assert
        condition: "$prosopon"
        message: "Prosopon not found: $prosopon_id"

      # Create the parousia (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-parousia"
        inputs:
          id: "$parousia_id"
          status: "active"
          prosopon_id: "$prosopon_id"
          oikos_id: "$_oikos.id"
          substrate_id: "$_session.id"
          arrived_at: "now_iso()"
        bind_to: parousia_entity

      # Create instantiates bond
      - step: bind
        from_id: "$parousia_id"
        to_id: "$prosopon_id"
        desmos: "instantiates"

      # Create default body schema
      - step: set
        bindings:
          schema_id: "body-schema/$parousia_id"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-body-schema"
        inputs:
          id: "$schema_id"
          channels: []
          capabilities: ["perceive", "emit", "dwell"]
          updated_at: "now_iso()"
        bind_to: schema_entity

      # Create schema-of bond
      - step: bind
        from_id: "$schema_id"
        to_id: "$parousia_id"
        desmos: "schema-of"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Parousia $parousia_id has arisen"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: parousia
            source_id: "$parousia_id"

      - step: return
        value:
          parousia_id: "$parousia_id"
          body_schema_id: "$schema_id"
          status: "dwelling"
  bonds:
    - { desmos: requires-attainment, to: attainment/embody }

- eidos: praxis
  id: praxis/soma/depart-parousia
  data:
    topos: soma
    name: depart-parousia
    visible: true
    description: |
      Have a parousia depart (end dwelling).

      Marks the parousia as departed and closes all open channels.
    params:
      - name: parousia_id
        type: string
        required: true
        description: The parousia to depart
    steps:
      # Find the parousia
      - step: find
        id: "$parousia_id"
        bind_to: parousia

      - step: assert
        condition: "$parousia"
        message: "Parousia not found: $parousia_id"

      # Mark as departed
      - step: update
        id: "$parousia_id"
        data:
          status: "departed"

      # Find and close all channels
      - step: trace
        to_id: "$parousia_id"
        desmos: "channel-of"
        resolve: "from"
        bind_to: channels

      - step: for_each
        items: "$channels"
        item_var: channel
        steps:
          - step: switch
            cases:
              - when: "$channel.data.status == 'open'"
                then:
                  - step: update
                    id: "$channel.id"
                    data:
                      status: "closed"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Parousia $parousia_id has departed"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: parousia
            source_id: "$parousia_id"

      - step: return
        value:
          departed: true
          parousia_id: "$parousia_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/embody }

# =============================================================================
# CHANNEL MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/soma/open-channel
  data:
    topos: soma
    name: open-channel
    visible: true
    description: |
      Open a channel for a parousia.

      Channels are interfaces for perception or action:
      - perception: receives input (text, voice, vision)
      - action: emits output (text, file, signal)
      - bidirectional: both
    params:
      - name: parousia_id
        type: string
        required: true
        description: The parousia to open a channel for
      - name: channel_id
        type: string
        required: true
        description: ID for the new channel (e.g., channel/uuid)
      - name: name
        type: string
        required: true
        description: Channel name
      - name: modality
        type: string
        required: true
        description: What type of data (text, voice, vision, file, etc.)
      - name: kind
        type: string
        required: false
        description: Channel kind (perception, action, bidirectional)
    steps:
      # Find the parousia
      - step: find
        id: "$parousia_id"
        bind_to: parousia

      - step: assert
        condition: "$parousia"
        message: "Parousia not found: $parousia_id"

      # Default kind to bidirectional
      - step: set
        bindings:
          channel_kind: "$kind"

      - step: switch
        cases:
          - when: "$channel_kind"
            then: []
        default:
          - step: set
            bindings:
              channel_kind: "bidirectional"

      # Create the channel (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-channel"
        inputs:
          id: "$channel_id"
          name: "$name"
          modality: "$modality"
          kind: "$channel_kind"
          status: "open"
          opened_at: "now_iso()"
        bind_to: channel_entity

      # Create channel-of bond to parousia
      - step: bind
        from_id: "$channel_id"
        to_id: "$parousia_id"
        desmos: "channel-of"

      - step: return
        value:
          channel_id: "$channel_id"
          name: "$name"
          modality: "$modality"
          kind: "$channel_kind"
          status: "open"
  bonds:
    - { desmos: requires-attainment, to: attainment/channel }

- eidos: praxis
  id: praxis/soma/close-channel
  data:
    topos: soma
    name: close-channel
    visible: true
    description: |
      Close a channel.
    params:
      - name: channel_id
        type: string
        required: true
        description: The channel to close
    steps:
      - step: find
        id: "$channel_id"
        bind_to: channel

      - step: assert
        condition: "$channel"
        message: "Channel not found: $channel_id"

      - step: update
        id: "$channel_id"
        data:
          status: "closed"

      - step: return
        value:
          closed: true
          channel_id: "$channel_id"
  bonds:
    - { desmos: requires-attainment, to: attainment/channel }

# =============================================================================
# PERCEPTION AND ACTION
# =============================================================================

- eidos: praxis
  id: praxis/soma/perceive
  data:
    topos: soma
    name: perceive
    visible: true
    description: |
      Record a perception through a channel.

      Creates a percept entity bonded to the channel.
    params:
      - name: channel_id
        type: string
        required: true
        description: The channel to perceive through
      - name: percept_id
        type: string
        required: true
        description: ID for the new percept (e.g., percept/uuid)
      - name: content
        type: any
        required: true
        description: The perceived content
      - name: metadata
        type: object
        required: false
        description: Optional metadata about the perception
    steps:
      - step: find
        id: "$channel_id"
        bind_to: channel

      - step: assert
        condition: "$channel"
        message: "Channel not found: $channel_id"

      - step: assert
        condition: "$channel.data.status == 'open'"
        message: "Channel is not open"

      - step: assert
        condition: "$channel.data.kind != 'action'"
        message: "Cannot perceive through action-only channel"

      # Create the percept (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-percept"
        inputs:
          id: "$percept_id"
          modality: "$channel.data.modality"
          content: "$content"
          metadata: "$metadata"
        bind_to: percept_entity

      # Create received-through bond
      - step: bind
        from_id: "$percept_id"
        to_id: "$channel_id"
        desmos: "received-through"

      - step: return
        value:
          percept_id: "$percept_id"
          modality: "$channel.data.modality"

- eidos: praxis
  id: praxis/soma/emit
  data:
    topos: soma
    name: emit
    visible: true
    description: |
      Emit a signal through a channel.

      Creates a signal entity bonded to the channel.
    params:
      - name: channel_id
        type: string
        required: true
        description: The channel to emit through
      - name: signal_id
        type: string
        required: true
        description: ID for the new signal (e.g., signal/uuid)
      - name: content
        type: any
        required: true
        description: The content to emit
      - name: metadata
        type: object
        required: false
        description: Optional metadata about the signal
    steps:
      - step: find
        id: "$channel_id"
        bind_to: channel

      - step: assert
        condition: "$channel"
        message: "Channel not found: $channel_id"

      - step: assert
        condition: "$channel.data.status == 'open'"
        message: "Channel is not open"

      - step: assert
        condition: "$channel.data.kind != 'perception'"
        message: "Cannot emit through perception-only channel"

      # Create the body-signal (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-body-signal"
        inputs:
          id: "$signal_id"
          modality: "$channel.data.modality"
          content: "$content"
          metadata: "$metadata"
        bind_to: signal_entity

      # Create emitted-through bond
      - step: bind
        from_id: "$signal_id"
        to_id: "$channel_id"
        desmos: "emitted-through"

      - step: return
        value:
          signal_id: "$signal_id"
          modality: "$channel.data.modality"

# =============================================================================
# BODY AWARENESS
# =============================================================================

- eidos: praxis
  id: praxis/soma/sense-body
  data:
    topos: soma
    name: sense-body
    visible: true
    tier: 1
    description: |
      Sense the current body schema (idioaisthesis).

      Aggregates proprioceptive state from across topoi:
      - Core soma: channels, capabilities, limits
      - Credentials: stored/unlocked credentials, granted attainments
      - Thyra: visual state (layout, theme, workspace)
      - Ergon: work items (pragma signaled to oikos)
      - Release: release lifecycle activity

      This is the answer to "what can I do right now?"
    params:
      - name: parousia_id
        type: string
        required: true
        description: The parousia to sense
    steps:
      # Find the body schema
      - step: trace
        to_id: "$parousia_id"
        desmos: "schema-of"
        resolve: "from"
        bind_to: schemas

      - step: switch
        cases:
          - when: "$schemas"
            then:
              - step: set
                bindings:
                  schema: "$schemas.0"
        default:
          - step: set
            bindings:
              schema: null

      # Get channel states
      - step: trace
        to_id: "$parousia_id"
        desmos: "channel-of"
        resolve: "from"
        bind_to: channels

      # Aggregate from credentials topos
      - step: call
        praxis: praxis/credentials/sense-credentials
        params: {}
        bind_to: credentials_state

      # Aggregate from ergon topos
      - step: call
        praxis: praxis/ergon/sense-pragma
        params: {}
        bind_to: ergon_state

      # Aggregate from release topos
      - step: call
        praxis: praxis/release/sense-releases
        params: {}
        bind_to: release_state

      # Aggregate from demiurge topos (development state)
      - step: call
        praxis: praxis/demiurge/sense-development
        params: {}
        bind_to: development_state

      # Aggregate from nous topos (knowledge state)
      - step: call
        praxis: praxis/nous/sense-nous
        params: {}
        bind_to: nous_state

      # Aggregate from oikos topos (session state)
      - step: call
        praxis: praxis/oikos/sense-oikos
        params: {}
        bind_to: oikos_state

      # Aggregate from propylon topos (gateway state)
      - step: call
        praxis: praxis/propylon/sense-propylon
        params: {}
        bind_to: propylon_state

      # Aggregate from dynamis topos (deployment state)
      - step: call
        praxis: praxis/dynamis/sense-deployment
        params: {}
        bind_to: dynamis_state

      # Aggregate from dokimasia topos (validation state)
      - step: call
        praxis: praxis/dokimasia/topos-health-report
        params: {}
        bind_to: dokimasia_state

      - step: return
        value:
          found: true
          parousia_id: "$parousia_id"
          sensed_at: "{{ now() }}"
          # Core soma state
          soma:
            schema: "$schema"
            channels: "$channels"
            capabilities: "$schema.data.capabilities"
            limits: "$schema.data.limits"
          # Cross-topos contributions
          credentials: "$credentials_state"
          ergon: "$ergon_state"
          release: "$release_state"
          development: "$development_state"
          nous: "$nous_state"
          oikos: "$oikos_state"
          propylon: "$propylon_state"
          dynamis: "$dynamis_state"
          dokimasia: "$dokimasia_state"

# =============================================================================
# CURSOR / NOTIFICATION OPERATIONS
# =============================================================================
# These praxeis expose the cursor model for change awareness.
# Changes are computed as delta between cursor (last-saw version) and current state.
# No change-record entities — just cursor position and delta queries.

- eidos: praxis
  id: praxis/soma/get-notifications
  data:
    topos: soma
    name: get-notifications
    visible: true
    tier: 1
    description: |
      Get notification counts for all oikoi visible to a prosopon.

      Returns an array of {oikos_id, count} objects where count > 0.
      The count represents entities changed since the prosopon's cursor position.

      This powers notification badges in the UI — showing which oikoi
      have new content to review.
    params:
      - name: prosopon_id
        type: string
        required: true
        description: The prosopon to get notifications for
    steps:
      - step: get_notifications
        prosopon_id: "$prosopon_id"
        bind_to: notifications

      # Filter to only oikoi with changes
      - step: filter
        items: "$notifications"
        condition: "$item.count > 0"
        bind_to: filtered

      - step: return
        value:
          prosopon_id: "$prosopon_id"
          notifications: "$filtered"

- eidos: praxis
  id: praxis/soma/mark-oikos-seen
  data:
    topos: soma
    name: mark-oikos-seen
    visible: true
    tier: 2
    description: |
      Mark an oikos as seen by updating the prosopon's cursor.

      Sets the prosopon's cursor for this oikos to the current max version,
      effectively acknowledging all current changes.

      Call this when the user views an oikos's content to clear notifications.
    params:
      - name: prosopon_id
        type: string
        required: true
        description: The prosopon marking the oikos as seen
      - name: oikos_id
        type: string
        required: true
        description: The oikos being marked as seen
    steps:
      - step: update_cursor
        prosopon_id: "$prosopon_id"
        oikos_id: "$oikos_id"
        bind_to: new_version

      - step: return
        value:
          marked_seen: true
          prosopon_id: "$prosopon_id"
          oikos_id: "$oikos_id"
          cursor_version: "$new_version"

- eidos: praxis
  id: praxis/soma/get-oikos-changes
  data:
    topos: soma
    name: get-oikos-changes
    visible: true
    tier: 1
    description: |
      Get entities that changed in an oikos since a specific version.

      If no since_version is provided, uses the prosopon's current cursor.
      Returns the changed entities along with the current max version.

      Use this to explore what's new in an oikos before marking it as seen.
    params:
      - name: oikos_id
        type: string
        required: true
        description: The oikos to get changes for
      - name: prosopon_id
        type: string
        required: false
        description: Optional prosopon to use cursor from (if since_version not provided)
      - name: since_version
        type: integer
        required: false
        description: Version to query from (defaults to prosopon cursor or 0)
      - name: limit
        type: integer
        required: false
        description: Maximum entities to return (default 50)
    steps:
      # Determine the version to query from
      - step: switch
        cases:
          - when: "$since_version"
            then:
              - step: set
                bindings:
                  query_version: "$since_version"
          - when: "$prosopon_id"
            then:
              - step: get_cursor
                prosopon_id: "$prosopon_id"
                oikos_id: "$oikos_id"
                bind_to: cursor_version
              - step: set
                bindings:
                  query_version: "$cursor_version"
        default:
          - step: set
            bindings:
              query_version: 0

      - step: gather_since
        oikos_id: "$oikos_id"
        since_version: "$query_version"
        limit: "$limit"
        bind_to: entities

      - step: return
        value:
          oikos_id: "$oikos_id"
          since_version: "$query_version"
          count: "{{ len($entities) }}"
          entities: "$entities"

# =============================================================================
# REFLEX RESPONSE PRAXEIS
# =============================================================================

- eidos: praxis
  id: praxis/soma/add-notification
  data:
    topos: soma
    name: add-notification
    visible: false  # Internal, invoked by reflexes
    tier: 2
    description: |
      Add notification to body-schema.

      Called by pragma and other notification reflexes to create
      notification entities that appear in the body-schema.
    params:
      - name: type
        type: string
        required: true
        description: Notification type (pragma_received, pragma_resolved, etc.)
      - name: oikos_id
        type: string
        required: false
        description: Target oikos for the notification
      - name: pragma_id
        type: string
        required: false
        description: Related pragma ID
      - name: title
        type: string
        required: false
        description: Notification title
      - name: priority
        type: string
        required: false
        description: Priority level
      - name: resolution
        type: string
        required: false
        description: Resolution text (for resolved pragmas)
    steps:
      # Create notification entity
      - step: compose
        typos_id: typos-def-notification
        inputs:
          type: "$type"
          oikos_id: "$oikos_id"
          pragma_id: "$pragma_id"
          title: "$title"
          priority: "$priority"
          resolution: "$resolution"
        bind_to: notification

      - step: log
        message: "Notification created: type=$type, title=$title"
        level: info

      - step: return
        value:
          notification_id: "$notification.id"
          type: "$type"
          title: "$title"

# =============================================================================
# INFRASTRUCTURE MANAGEMENT
# =============================================================================

- eidos: praxis
  id: praxis/soma/register-node
  data:
    topos: soma
    name: register-node
    visible: true
    tier: 2
    description: |
      Register a node in the infrastructure.

      Creates a node entity representing a physical or virtual machine.
      For commons nodes, also binds to the steward oikos.
    params:
      - name: node_id
        type: string
        required: true
        description: ID for the node (e.g., node/hostname)
      - name: name
        type: string
        required: true
        description: Node hostname or identifier
      - name: kind
        type: string
        required: true
        description: Node kind (personal or commons)
      - name: platform
        type: string
        required: true
        description: Operating system (nixos, linux, darwin, other)
      - name: address
        type: string
        required: false
        description: Network address
      - name: public_endpoint
        type: string
        required: false
        description: Public URL if accessible
      - name: steward_oikos_id
        type: string
        required: false
        description: For commons nodes — governing oikos
    steps:
      - step: compose
        typos_id: typos-def-node
        inputs:
          id: "$node_id"
          name: "$name"
          kind: "$kind"
          platform: "$platform"
          address: "$address"
          public_endpoint: "$public_endpoint"
          steward_oikos_id: "$steward_oikos_id"
          status: unknown
        bind_to: node

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Registered node $name ($kind)"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: node
            source_id: "$node_id"

      - step: return
        value:
          node_id: "$node_id"
          name: "$name"
          kind: "$kind"
          status: unknown
  bonds:
    - { desmos: requires-attainment, to: attainment/infrastructure }

- eidos: praxis
  id: praxis/soma/sense-node
  data:
    topos: soma
    name: sense-node
    visible: true
    tier: 1
    description: |
      Sense the current state of a node.

      Returns node info including hosted services and running kosmos instances.
    params:
      - name: node_id
        type: string
        required: true
        description: The node to sense
    steps:
      - step: find
        id: "$node_id"
        bind_to: node

      - step: assert
        condition: "$node"
        message: "Node not found: $node_id"

      # Find hosted services
      - step: trace
        from_id: "$node_id"
        desmos: hosts-service
        resolve: to
        bind_to: services

      # Find kosmos instances
      - step: trace
        to_id: "$node_id"
        desmos: runs-on
        resolve: from
        bind_to: instances

      - step: return
        value:
          node: "$node"
          services: "$services"
          kosmos_instances: "$instances"
  bonds:
    - { desmos: requires-attainment, to: attainment/infrastructure }

- eidos: praxis
  id: praxis/soma/register-service
  data:
    topos: soma
    name: register-service
    visible: true
    tier: 2
    description: |
      Register a service instance on a node.

      Creates a service-instance entity and bonds it to the hosting node.
    params:
      - name: service_id
        type: string
        required: true
        description: ID for the service (e.g., service-instance/livekit-main)
      - name: name
        type: string
        required: true
        description: Human-readable service name
      - name: service_kind
        type: string
        required: true
        description: Type of service (livekit, kosmos-server, transcription, etc.)
      - name: endpoint
        type: string
        required: true
        description: Connection URL
      - name: node_id
        type: string
        required: true
        description: Node hosting this service
      - name: config
        type: object
        required: false
        description: Service-specific configuration
    steps:
      # Verify node exists
      - step: find
        id: "$node_id"
        bind_to: node

      - step: assert
        condition: "$node"
        message: "Node not found: $node_id"

      # Create service instance
      - step: compose
        typos_id: typos-def-service-instance
        inputs:
          id: "$service_id"
          name: "$name"
          service_kind: "$service_kind"
          endpoint: "$endpoint"
          config: "$config"
          status: provisioning
        bind_to: service

      # Bond to node
      - step: bind
        from_id: "$node_id"
        to_id: "$service_id"
        desmos: hosts-service

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Registered service $name on node $node_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: service-instance
            source_id: "$service_id"

      - step: return
        value:
          service_id: "$service_id"
          name: "$name"
          node_id: "$node_id"
          status: provisioning
  bonds:
    - { desmos: requires-attainment, to: attainment/infrastructure }

- eidos: praxis
  id: praxis/soma/sense-service
  data:
    topos: soma
    name: sense-service
    visible: true
    tier: 1
    description: |
      Sense the current state of a service instance.

      Returns service info including which oikoi it provides to.
    params:
      - name: service_id
        type: string
        required: true
        description: The service to sense
    steps:
      - step: find
        id: "$service_id"
        bind_to: service

      - step: assert
        condition: "$service"
        message: "Service not found: $service_id"

      # Find hosting node
      - step: trace
        to_id: "$service_id"
        desmos: hosts-service
        resolve: from
        bind_to: nodes

      - step: set
        bindings:
          host_node: "$nodes.0"

      # Find oikoi this service provides to
      - step: trace
        from_id: "$service_id"
        desmos: provides-to
        resolve: to
        bind_to: oikoi

      - step: return
        value:
          service: "$service"
          host_node: "$host_node"
          provides_to_oikoi: "$oikoi"
  bonds:
    - { desmos: requires-attainment, to: attainment/infrastructure }

- eidos: praxis
  id: praxis/soma/sense-kosmos-instance
  data:
    topos: soma
    name: sense-kosmos-instance
    visible: true
    tier: 1
    description: |
      Sense the current state of a kosmos instance.

      Returns instance info including which node it runs on.
    params:
      - name: instance_id
        type: string
        required: true
        description: The kosmos instance to sense
    steps:
      - step: find
        id: "$instance_id"
        bind_to: instance

      - step: assert
        condition: "$instance"
        message: "Kosmos instance not found: $instance_id"

      # Find hosting node
      - step: trace
        from_id: "$instance_id"
        desmos: runs-on
        resolve: to
        bind_to: nodes

      - step: set
        bindings:
          host_node: "$nodes.0"

      - step: return
        value:
          instance: "$instance"
          host_node: "$host_node"
  bonds:
    - { desmos: requires-attainment, to: attainment/infrastructure }
