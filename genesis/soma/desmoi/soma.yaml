# Soma Desmoi
# Embodiment bonds — connecting parousia to channels and perceptions
#
# Extracted from spora.yaml stage-1-desmoi

entities:
  # instantiates — parousia instantiates prosopon
  - eidos: desmos
    id: desmos/instantiates
    data:
      name: instantiates
      description: "Parousia instantiates prosopon"
      from_eidos: parousia
      to_eidos: prosopon
      cardinality: many-to-one
      symmetric: false

  # channel-of — channel belongs to parousia
  - eidos: desmos
    id: desmos/channel-of
    data:
      name: channel-of
      description: "Channel belongs to parousia"
      from_eidos: channel
      to_eidos: parousia
      cardinality: many-to-one
      symmetric: false

  # received-through — percept received through channel
  - eidos: desmos
    id: desmos/received-through
    data:
      name: received-through
      description: "Percept received through channel"
      from_eidos: percept
      to_eidos: channel
      cardinality: many-to-one
      symmetric: false

  # emitted-through — body-signal emitted through channel
  - eidos: desmos
    id: desmos/emitted-through
    data:
      name: emitted-through
      description: "Body-signal emitted through channel"
      from_eidos: body-signal
      to_eidos: channel
      cardinality: many-to-one
      symmetric: false

  # schema-of — body schema belongs to parousia
  - eidos: desmos
    id: desmos/schema-of
    data:
      name: schema-of
      description: "Body schema belongs to parousia"
      from_eidos: body-schema
      to_eidos: parousia
      cardinality: one-to-one
      symmetric: false

  # =============================================================================
  # INFRASTRUCTURE DESMOI
  # =============================================================================

  # hosts-service — node hosts a service instance
  - eidos: desmos
    id: desmos/hosts-service
    data:
      name: hosts-service
      description: "A node hosts a service instance"
      from_eidos:
        - node
      to_eidos:
        - service-instance
      cardinality: one-to-many
      symmetric: false

  # provides-to — service instance provides capability to an oikos
  - eidos: desmos
    id: desmos/provides-to
    data:
      name: provides-to
      description: "A service instance provides capability to an oikos"
      from_eidos:
        - service-instance
      to_eidos:
        - oikos
      cardinality: many-to-many
      symmetric: false
      data_fields:
        quota:
          type: object
          required: false
          description: "Resource limits for this oikos"
        config:
          type: object
          required: false
          description: "Oikos-specific service configuration"

  # runs-on — kosmos instance runs on a node
  - eidos: desmos
    id: desmos/runs-on
    data:
      name: runs-on
      description: "A kosmos instance runs on a node"
      from_eidos:
        - kosmos-instance
      to_eidos:
        - node
      cardinality: many-to-one
      symmetric: false
