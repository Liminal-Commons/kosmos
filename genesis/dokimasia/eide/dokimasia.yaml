# Dokimasia Eide
# δοκιμασία — examination, testing, scrutiny
#
# Validation eide — proving fitness before realization

entities:
  # validation-result — dokimasia validation outcome
  - eidos: eidos
    id: eidos/validation-result
    data:
      name: validation-result
      description: "Result of validating a generation before realization."
      fields:
        generation_id:
          type: string
          required: true
          description: "The generation that was validated"
        passed:
          type: boolean
          required: true
          description: "Whether all validation passed"
        provenance_valid:
          type: boolean
          required: true
          description: "Does authorization chain trace to genesis?"
        schema_valid:
          type: boolean
          required: true
          description: "Does content match target eidos schema?"
        semantic_valid:
          type: boolean
          required: true
          description: "Do all references resolve?"
        behavioral_valid:
          type: boolean
          required: false
          description: "Does dry-run pass? (only if requested)"
        errors:
          type: array
          required: false
          description: "List of validation errors (if any)"
        provenance_chain:
          type: array
          required: false
          description: "The traced authorization chain (for audit)"
        validated_at:
          type: timestamp
          required: true

  # validation-error — specific validation failure
  - eidos: eidos
    id: eidos/validation-error
    data:
      name: validation-error
      description: "A specific validation failure."
      fields:
        layer:
          type: string
          required: true
          enum: [provenance, schema, semantic, behavioral]
          description: "Which validation layer failed"
        code:
          type: string
          required: true
          description: "Error code (e.g., CHAIN_BROKEN, MISSING_FIELD)"
        message:
          type: string
          required: true
          description: "Human-readable error message"
        path:
          type: string
          required: false
          description: "JSON path to the problem (e.g., $.data.target_eidos)"
        context:
          type: object
          required: false
          description: "Additional context about the failure"

  # ============================================================================
  # ATTAINMENTS
  # ============================================================================

  # examine — validation capability
  - eidos: attainment
    id: attainment/examine
    data:
      name: examine
      topos: dokimasia
      scope: oikos
      description: |
        Validation capability — can run validation operations and verify authenticity.
        Anyone with oikos membership should be able to verify authenticity of
        entities visible within that oikos.
    bonds:
      - { desmos: grants-praxis, to: praxis/dokimasia/validate-provenance }
      - { desmos: grants-praxis, to: praxis/dokimasia/validate-schema }
      - { desmos: grants-praxis, to: praxis/dokimasia/validate-semantic }
      - { desmos: grants-praxis, to: praxis/dokimasia/validate-generation }
      - { desmos: grants-praxis, to: praxis/dokimasia/compose-validation-report }
