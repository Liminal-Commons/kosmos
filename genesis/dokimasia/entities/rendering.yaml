# Dokimasia Render Specifications
#
# Rendering definitions for dokimasia eide: validation-result, validation-error
# Oikos-centric: dokimasia owns presentation for validation entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# VALIDATION-RESULT RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/validation-result-card
  data:
    name: validation-result-card
    description: "Card view for validation-result — validation outcome"
    target_eidos: validation-result
    fields_to_display:
      - field: generation_id
      - field: passed
      - field: provenance_valid
      - field: schema_valid
      - field: semantic_valid
      - field: validated_at
    layout_template: |
      <article class="render-card validation-result-card result-{passed}">
        <header class="card-header">
          <span class="result-icon passed-{passed}">✓</span>
          <span class="result-label">Validation Result</span>
          <span class="passed-badge passed-{passed}">{passed}</span>
        </header>
        <div class="card-body">
          <div class="generation-row">
            <span class="label">Generation:</span>
            <code class="generation-id">{generation_id}</code>
          </div>
          <div class="checks-grid">
            <div class="check provenance-{provenance_valid}">
              <span class="check-icon"></span>
              <span class="check-label">Provenance</span>
            </div>
            <div class="check schema-{schema_valid}">
              <span class="check-icon"></span>
              <span class="check-label">Schema</span>
            </div>
            <div class="check semantic-{semantic_valid}">
              <span class="check-icon"></span>
              <span class="check-label">Semantic</span>
            </div>
          </div>
        </div>
        <footer class="card-footer">
          <span class="validated-at">Validated {validated_at}</span>
        </footer>
      </article>
    style_bindings:
      result-true: "border-left: 3px solid var(--status-success, #10b981)"
      result-false: "border-left: 3px solid var(--status-error, #ef4444)"
      passed-true: "background: var(--success-bg, #d1fae5)"
      passed-false: "background: var(--error-bg, #fee2e2)"
      provenance-true: "color: var(--status-success, #10b981)"
      provenance-false: "color: var(--status-error, #ef4444)"
      schema-true: "color: var(--status-success, #10b981)"
      schema-false: "color: var(--status-error, #ef4444)"
      semantic-true: "color: var(--status-success, #10b981)"
      semantic-false: "color: var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/validation-result-item
  data:
    name: validation-result-item
    description: "Compact list item for validation-result"
    target_eidos: validation-result
    fields_to_display:
      - field: generation_id
      - field: passed
    layout_template: |
      <div class="list-item validation-result-item result-{passed}">
        <span class="result-icon passed-{passed}"></span>
        <span class="generation-id">{generation_id}</span>
        <span class="passed-badge">{passed}</span>
      </div>
    style_bindings:
      result-true: "color: var(--status-success, #10b981)"
      result-false: "color: var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# VALIDATION-ERROR RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/validation-error-card
  data:
    name: validation-error-card
    description: "Card view for validation-error — specific validation failure"
    target_eidos: validation-error
    fields_to_display:
      - field: layer
      - field: code
      - field: message
      - field: path
    layout_template: |
      <article class="render-card validation-error-card layer-{layer}">
        <header class="card-header">
          <span class="error-icon">❌</span>
          <span class="layer-badge layer-{layer}">{layer}</span>
          <code class="error-code">{code}</code>
        </header>
        <div class="card-body">
          <p class="error-message">{message}</p>
          <div class="path-row">
            <span class="label">Path:</span>
            <code class="error-path">{path}</code>
          </div>
        </div>
      </article>
    style_bindings:
      validation-error-card: "border-left: 3px solid var(--status-error, #ef4444)"
      layer-provenance: "background: var(--layer-provenance, #fee2e2)"
      layer-schema: "background: var(--layer-schema, #fef3c7)"
      layer-semantic: "background: var(--layer-semantic, #dbeafe)"
      layer-behavioral: "background: var(--layer-behavioral, #ede9fe)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/validation-error-item
  data:
    name: validation-error-item
    description: "Compact error item for validation-error"
    target_eidos: validation-error
    fields_to_display:
      - field: layer
      - field: code
      - field: message
    layout_template: |
      <div class="list-item validation-error-item layer-{layer}">
        <span class="error-icon">❌</span>
        <span class="layer-badge">{layer}</span>
        <code class="error-code">{code}</code>
        <span class="error-message">{message}</span>
      </div>
    style_bindings:
      validation-error-item: "color: var(--status-error, #ef4444)"
    created_at: "2025-01-29T00:00:00Z"
