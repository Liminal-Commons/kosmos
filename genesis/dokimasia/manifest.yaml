# Topos Manifest: Dokimasia (τόπος)
# δοκιμασία — examination, testing, scrutiny.
#
# Validation before realization. Nothing invalid enters the entity store.
# Provenance, schema, semantic validation.
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: dokimasia
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Dokimasia
topos_description: |
  Examination, testing, scrutiny. Validation before realization.
  Nothing invalid enters the entity store. Provides provenance,
  schema, and semantic validation.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided: []   # Validation is an operation, not a surface
surfaces_consumed:
  - reconciliation      # Uses dynamis/reconcile for graph integrity drift
  - reactivity          # Reflexes for validation mutation response
  - sensing             # Daemon: sense-graph-integrity (60s interval)

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: entities/
    content_types: [validation-error]
  - path: reflexes/
    content_types: [reflex]
  - path: daemons/
    content_types: [daemon]
  - path: reconcilers/
    content_types: [reconciler]
  - path: render-specs/
    content_types: [render-spec]
  - path: modes/
    content_types: [mode]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather

provides:
  eide:
    - validation-result
    - validation-error

  # Topos-centric rendering: dokimasia owns presentation for validation entities
  renderable:
    - eidos: validation-result
      description: "Validation outcome cards"
    - eidos: validation-error
      description: "Validation error items"

  attainments:
    - examine            # Validation capability — verify authenticity

  desmoi:
    - validated-by
    - traces-to

  praxeis:
    - dokimasia/validate-provenance
    - dokimasia/validate-schema
    - dokimasia/validate-semantic
    - dokimasia/validate-generation
    - dokimasia/compose-validation-report
    - dokimasia/lint-praxis
    - dokimasia/lint-all-praxeis
    - dokimasia/validate-topos
    - dokimasia/validate-all-topoi
    - dokimasia/topos-health-report

stoicheia_form:
  # All validation logic in praxeis
  # No special stoicheia
