# Oikos Manifest: Dokimasia
# δοκιμασία — examination, testing, scrutiny.
#
# Validation before realization. Nothing invalid enters the entity store.
# Provenance, schema, semantic validation.
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: dokimasia
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Dokimasia
oikos_description: |
  Examination, testing, scrutiny. Validation before realization.
  Nothing invalid enters the entity store. Provides provenance,
  schema, and semantic validation.
oikos_scale: cross-scale

# Development experience metadata
oikos_category: infrastructure
surfaces_provided: []   # Validation is an operation, not a surface
surfaces_consumed: []   # Foundational validation layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [render-spec]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.gather

provides:
  eide:
    - validation-result
    - validation-error

  # Oikos-centric rendering: dokimasia owns presentation for validation entities
  renderable:
    - eidos: validation-result
      description: "Validation outcome cards"
    - eidos: validation-error
      description: "Validation error items"

  attainments:
    - examine            # Validation capability — verify authenticity

  desmoi:
    - validated-by
    - traces-to

  praxeis:
    - dokimasia/validate-provenance
    - dokimasia/validate-schema
    - dokimasia/validate-semantic
    - dokimasia/validate-generation
    - dokimasia/compose-validation-report
    - dokimasia/lint-praxis
    - dokimasia/lint-all-praxeis
    - dokimasia/validate-oikos
    - dokimasia/validate-all-oikoi
    - dokimasia/oikos-health-report

stoicheia_form:
  # All validation logic in praxeis
  # No special stoicheia
