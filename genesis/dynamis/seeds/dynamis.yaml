# dynamis.yaml
# Seed entities for dynamis topos
#
# These entities exist from the moment dynamis is loaded.
# They establish the substrate infrastructure for deployments.
#
# Distribution channel seeds live in genesis/release/seeds/release.yaml
#
# Traces to: genesis/dynamis/manifest.yaml
# Authorized by: phasis/genesis-root

entities:

# =============================================================================
# SUBSTRATES — Target platforms
# =============================================================================

# macOS Universal (arm64 + x64)
- eidos: substrate
  id: substrate/mac-universal
  data:
    name: mac-universal
    kind: platform
    os: macos
    arch: arm64
    description: |
      macOS Universal binary — runs natively on both Apple Silicon and Intel Macs.
      Built with Rust's universal-apple-darwin target.
    active: true

# Windows x64
- eidos: substrate
  id: substrate/windows-x64
  data:
    name: windows-x64
    kind: platform
    os: windows
    arch: x64
    description: |
      Windows 64-bit binary — runs on Windows 10/11 x64 systems.
      Built with Rust's x86_64-pc-windows-msvc target.
    active: true

# Linux x64
- eidos: substrate
  id: substrate/linux-x64
  data:
    name: linux-x64
    kind: platform
    os: linux
    arch: x64
    description: |
      Linux 64-bit AppImage — runs on most Linux distributions.
      Built with Rust's x86_64-unknown-linux-gnu target.
    active: true
