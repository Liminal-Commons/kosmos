# Topos Manifest: Dynamis
# δύναμις — existence-actuality bridging — deployments, substrates, reconciliation
#
# Dynamis is where kosmos intention becomes chora actuality.
# The bridge between what should be and what is.
#
# Manifest v2.1 — topos metadata for entity composition
# Traces to: phasis/genesis-root

format_version: "2.1"
topos_id: dynamis
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Dynamis
topos_description: |
  Existence-actuality bridging. Where kosmos intention becomes chora
  actuality. The bridge between what should be and what is. Manages
  deployments, substrates, and reconciliation. Release lifecycle
  is owned by the release topos.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided:
  - computation        # Tier 3 actuality bridging (manifest/sense/unmanifest)
  - reconciliation     # Generic intent/actuality reconciliation engine
  - reactivity         # Event-driven autonomic mutation response via reflexes
  - sensing            # Periodic actuality sensing via daemons
surfaces_consumed: []   # Foundational actuality layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [deployment]
  - path: modes/
    content_types: [mode]
  - path: reflexes/
    content_types: [reflex]
  - path: surfaces/
    content_types: [surface]
  - path: daemons/
    content_types: [daemon]
  - path: reconcilers/
    content_types: [reconciler]
  - path: render-specs/
    content_types: [render-spec]
  - path: typos/
    content_types: [typos]
  - path: seeds/
    content_types: [substrate]

description: |
  Existence-actuality bridging layer. Manages deployments, substrates,
  and reconciliation. Implements the phylax pattern (sense → compare → act)
  for reconciling intent with actuality. Release lifecycle is delegated
  to the release topos; dynamis consumes release entities via deploys-release.

requires_dynamis:
  - db.arise
  - db.find
  - db.gather
  - db.bind
  - db.trace
  - db.update
  - energeia.manifest
  - energeia.sense
  - energeia.unmanifest

provides:
  eide:
    - reconciler
    - substrate
    - deployment
    - actuality-record

  typos:
    - typos-def-deployment
    - typos-def-service-instance
    - typos-def-node

  reflexes:
    - reflex/dynamis/deployment-intent-changed
    - reflex/dynamis/release-artifact-intent-changed
    - reflex/dynamis/announce-drift

  # Oikos-centric rendering: dynamis owns presentation for infrastructure entities
  renderable:
    - eidos: substrate
      description: "Platform and environment cards"
    - eidos: deployment
      description: "Deployment state and drift display"
    - eidos: actuality-record
      description: "Sensing audit log"

  attainments:
    - substrate          # Define target platforms
    - deploy             # Manage running deployments (tier 3)
    - reconcile          # Generic phylax reconciliation (tier 3)

  seeds:
    - substrate/mac-universal
    - substrate/windows-x64
    - substrate/linux-x64

  desmoi:
    - targets-substrate
    - substrate-of
    - deploys-release
    - targets
    - through-channel
    - has-actuality
    - triggered-journey
    - succeeds-release
    - supersedes-release
    # Infrastructure deployment desmoi (connect to soma/node, soma/service-instance)
    - targets-node
    - manifests-as
    - steward-of

  praxeis:
    # Substrate management
    - create-substrate
    - list-substrates

    # Deployment management
    - create-deployment
    - manifest-deployment
    - sense-deployment
    - reconcile-deployment
    - restart-deployment

    # Generic reconciliation
    - reconcile

    # Sensing (daemon-invoked)
    - sense-deployment-states

depends_on:
  - release              # Artifact lifecycle (extracted from dynamis)
