# Oikos Manifest: Dynamis
# δύναμις — existence-actuality bridging — releases, deployments, substrates
#
# Dynamis is where kosmos intention becomes chora actuality.
# The bridge between what should be and what is.
#
# Manifest v2.1 — oikos metadata for entity composition
# Traces to: expression/genesis-root

format_version: "2.1"
oikos_id: dynamis
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Dynamis
oikos_description: |
  Existence-actuality bridging. Where kosmos intention becomes chora
  actuality. The bridge between what should be and what is. Manages
  releases, deployments, substrates, and distribution channels.
oikos_scale: cross-scale

# Development experience metadata
oikos_category: infrastructure
surfaces_provided:
  - computation        # Tier 3 actuality bridging (manifest/sense/unmanifest)
surfaces_consumed: []   # Foundational actuality layer

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [render-spec, reflex, deployment]
  - path: reconcilers/
    content_types: [reconciler]
  - path: typos/
    content_types: [typos]

description: |
  Existence-actuality bridging layer. Manages releases, deployments,
  substrates, and distribution channels. Implements the phylax pattern
  (sense → compare → act) for reconciling intent with actuality.

requires_dynamis:
  - db.arise
  - db.find
  - db.gather
  - db.bind
  - db.trace
  - db.update
  - energeia.manifest
  - energeia.sense
  - energeia.unmanifest

provides:
  eide:
    # NOTE: release, release-artifact, distribution-channel moved to release oikos
    - substrate
    - deployment
    - actuality-record

  typos:
    - typos-def-deployment
    - typos-def-service-instance
    - typos-def-node

  reflexes:
    - reflex/dynamis/deployment-intent-changed
    - reflex/dynamis/release-artifact-intent-changed

  # Oikos-centric rendering: dynamis owns presentation for infrastructure entities
  renderable:
    - eidos: substrate
      description: "Platform and environment cards"
    - eidos: deployment
      description: "Deployment state and drift display"
    - eidos: actuality-record
      description: "Sensing audit log"

  attainments:
    # NOTE: release, distribute attainments moved to release oikos
    - substrate          # Define target platforms
    - channel            # Configure distribution channels
    - deploy             # Manage running deployments (tier 3)
    - reconcile          # Generic phylax reconciliation (tier 3)

  seeds:
    - substrate/mac-universal
    - substrate/windows-x64
    - substrate/linux-x64
    - distribution-channel/thyra-r2
    - distribution-channel/github-releases

  desmoi:
    - contains-artifact
    - targets-substrate
    - distributed-via
    - substrate-of
    - deploys-release
    - targets
    - through-channel
    - has-actuality
    - triggered-journey
    - succeeds-release
    - supersedes-release
    # Infrastructure deployment desmoi (connect to soma/node, soma/service-instance)
    - targets-node
    - manifests-as
    - steward-of

  praxeis:
    # Release lifecycle
    - create-release
    - register-artifact
    - mark-release-built
    - distribute-release
    - sense-release
    - reconcile-release

    # Substrate management
    - create-substrate

    # Distribution channels
    - create-distribution-channel

    # Deployment management
    - create-deployment
    - manifest-deployment
    - sense-deployment
    - reconcile-deployment

    # Query operations
    - list-releases
    - list-substrates
    - list-distribution-channels

actuality_modes:
  release-artifact:
    mode: object-storage
    provider: r2
    description: "Artifacts actualize as objects in R2 bucket"

  deployment:
    mode: process
    description: "Deployments actualize as running processes or services"

stoicheia_form:
  # All stoicheia use arche (interpreter) form
  create-release: arche
  register-artifact: arche
  mark-release-built: arche
  distribute-release: arche
  sense-release: arche
  reconcile-release: arche
  create-substrate: arche
  create-distribution-channel: arche
  create-deployment: arche
  manifest-deployment: arche
  sense-deployment: arche
  reconcile-deployment: arche
  list-releases: arche
  list-substrates: arche
  list-distribution-channels: arche

depends_on:
  - release              # Artifact lifecycle (extracted from dynamis)
