# Dynamis Eide
# Existence-actuality bridging eide — releases, substrates, deployments
#
# Traces to: genesis/dynamis/DESIGN.md
# Authorized by: phasis/genesis-root

entities:

  # =========================================================================
  # Reconciler — declarative reconciliation rules
  # =========================================================================

  - eidos: eidos
    id: eidos/reconciler
    data:
      name: reconciler
      description: |
        Declarative reconciliation rules for entities with intent/actuality state.
        Reconcilers define transition rules that map (intent, actual) pairs to
        actions (manifest, unmanifest, none). The reconciler loop discovers these
        and applies them to matching entities.
      fields:
        target_eidos:
          type: string
          required: true
          description: "The eidos of entities this reconciler manages"
        intent_field:
          type: string
          required: true
          default: desired_state
          description: "Field containing intent (e.g., desired_state)"
        actuality_field:
          type: string
          required: true
          default: actual_state
          description: "Field containing actuality (e.g., actual_state)"
        transitions:
          type: array
          required: true
          description: |
            Transition rules mapping (intent, actual) to action.
            Each transition has: intent, actual (value or array), action.

  # NOTE: Release eide (release, release-artifact, distribution-channel) moved to
  # genesis/release/eide/release.yaml

  # =========================================================================
  # Substrate — target platform/environment
  # =========================================================================

  - eidos: eidos
    id: eidos/substrate
    data:
      name: substrate
      description: |
        A target platform or environment where software runs. Substrates
        form a taxonomy: platform, runtime, environment. No direct actuality —
        substrates are conceptual categories that releases target.
      fields:
        name:
          type: string
          required: true
          description: "Substrate identifier (e.g., 'mac-arm64', 'production')"
        kind:
          type: enum
          values: [platform, runtime, environment]
          required: true
          description: "Substrate category"
        description:
          type: string
          required: false

        # Platform-specific
        os:
          type: enum
          values: [macos, windows, linux, web, ios, android]
          required: false
          description: "Operating system (for platform substrates)"
        arch:
          type: enum
          values: [arm64, x64, x86, wasm]
          required: false
          description: "Architecture (for platform substrates)"

        # Runtime-specific
        runtime_type:
          type: enum
          values: [native, electron, tauri, wasm]
          required: false
          description: "Runtime type (for runtime substrates)"

        # Environment-specific
        environment_type:
          type: enum
          values: [production, staging, development, testing]
          required: false
          description: "Environment type (for environment substrates)"

        # Hierarchy
        parent_substrate:
          type: string
          required: false
          description: "Parent substrate ID for hierarchy"

        active:
          type: boolean
          required: true
          default: true
          description: "Whether this substrate is actively targeted"

  # =========================================================================
  # Deployment — manifestation of release to target
  # =========================================================================

  - eidos: eidos
    id: eidos/deployment
    data:
      name: deployment
      description: |
        A manifestation of a release to a specific target. Deployments
        track the relationship between a release and where it's running.
        Used for services, not just static files.

        Relationships via bonds only (graph-driven):
        - deploys-release → release being deployed
        - targets → substrate being deployed to
        - uses-channel → distribution channel (optional)
      fields:
        name:
          type: string
          required: true
          description: "Deployment identifier"

        # Relationships are bonds, not embedded fields.
        # Query via trace: deployment → deploys-release → release
        #                  deployment → targets → substrate
        #                  deployment → uses-channel → channel

        # Actuality mode selection (per-entity)
        actuality_mode:
          type: enum
          values: [process, nixos-rebuild, docker, kubernetes]
          required: true
          default: process
          description: |
            How this deployment becomes actual.
            - process: Local subprocess spawn
            - nixos-rebuild: Remote NixOS via SSH + nixos-rebuild switch
            - docker: Container deployment
            - kubernetes: Cluster deployment
        provider:
          type: string
          required: false
          default: local
          description: |
            Provider within the mode.
            For process: local
            For docker: local, remote
            For kubernetes: cluster name

        # State (intent vs actual)
        desired_state:
          type: enum
          values: [running, stopped, removed]
          required: true
          default: stopped
          description: "Desired deployment state"
        actual_state:
          type: enum
          values: [unknown, running, stopped, degraded, failed, removed]
          required: true
          default: unknown
          description: "Sensed actual state"

        # Actuality tracking
        manifest_handle:
          type: string
          required: false
          description: "Handle for manifested deployment (process ID, deployment ID, etc.)"
        last_sensed_at:
          type: timestamp
          required: false
        last_reconciled_at:
          type: timestamp
          required: false

        # Metadata
        deployed_at:
          type: timestamp
          required: false
        deployed_by:
          type: string
          required: false
          description: "Prosopon ID who deployed"

        # Configuration
        config:
          type: object
          required: false
          description: "Deployment-specific configuration"

      actuality:
        mode: process
        note: "Actuality mode depends on target — process for services, object-storage for static"

  # =========================================================================
  # Actuality Record — snapshot of sensed state
  # =========================================================================

  - eidos: eidos
    id: eidos/actuality-record
    data:
      name: actuality-record
      description: |
        A snapshot of sensed actuality. When sense() is called, the result
        is recorded as an actuality-record. Provides audit trail and
        enables drift detection over time.
      fields:
        entity_id:
          type: string
          required: true
          description: "Entity this actuality was sensed for"

        sensed_at:
          type: timestamp
          required: true

        # What was sensed
        actual_state:
          type: string
          required: true
          description: "The sensed state"
        details:
          type: object
          required: false
          description: "Provider-specific sensing details"

        # Comparison
        expected_state:
          type: string
          required: false
          description: "What we expected to find"
        aligned:
          type: boolean
          required: true
          description: "Whether actual matched expected"
        drift_type:
          type: enum
          values: [none, missing, extra, different]
          required: false
          description: "Type of drift if not aligned"

        # Response
        reconciliation_action:
          type: enum
          values: [none, manifest, update, unmanifest, alert, journey]
          required: false
          description: "Action taken (or to be taken) in response"

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  # NOTE: attainment/release moved to genesis/release/eide/release.yaml

  - eidos: attainment
    id: attainment/substrate
    data:
      name: substrate
      description: |
        Substrate management capability — defining target platforms.
        Enables creating and querying substrates for release targeting.
        Infrastructure configuration for the build matrix.
      topos: dynamis
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/dynamis/create-substrate }
      - { desmos: grants-praxis, to: praxis/dynamis/list-substrates }

  # NOTE: attainment/channel and attainment/distribute moved to genesis/release/eide/release.yaml

  - eidos: attainment
    id: attainment/deploy
    data:
      name: deploy
      description: |
        Deployment management capability — running services.
        Enables creating, manifesting, sensing, and reconciling deployments.
        Affects external systems; requires explicit authorization.
      topos: dynamis
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/dynamis/create-deployment }
      - { desmos: grants-praxis, to: praxis/dynamis/manifest-deployment }
      - { desmos: grants-praxis, to: praxis/dynamis/sense-deployment }
      - { desmos: grants-praxis, to: praxis/dynamis/reconcile-deployment }

  - eidos: attainment
    id: attainment/reconcile
    data:
      name: reconcile
      description: |
        Generic reconciliation capability — the phylax pattern.
        Enables declarative sense → compare → act reconciliation.
        Used by other attainments for entity-specific reconciliation.
      topos: dynamis
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/dynamis/reconcile }
