# Hodos Eide
# The way, the path — navigation through journeys
#
# Hodos defines no entity types (uses nous journey/waypoint).
# It provides the navigate attainment for journey navigation.

entities:
  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/navigate
    data:
      name: navigate
      description: |
        Journey navigation capability — moving through waypoints.
        Enables getting current position, advancing, branching, and
        validating forms along the way. Per-parousia scope for personal
        journey progress.
      topos: hodos
      scope: parousia
    bonds:
      - { desmos: grants-praxis, to: praxis/hodos/get-current-waypoint }
      - { desmos: grants-praxis, to: praxis/hodos/advance-waypoint }
      - { desmos: grants-praxis, to: praxis/hodos/branch-waypoint }
      - { desmos: grants-praxis, to: praxis/hodos/validate-form }
      - { desmos: grants-praxis, to: praxis/hodos/start-onboarding }
