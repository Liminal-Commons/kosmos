# Topos Generation Definitions
# =============================
#
# Inference-context-aware typos for generating topos components.
# Generate whole artifacts (eidos, praxis, desmos) as coherent units.
#
# The pattern: inference-context → governed-inference → entity composition
#
# Each typos here extends typos-def-inference-context with domain-specific
# defaults for generating kosmos definitions.

entities:

# =============================================================================
# EIDOS GENERATION
# =============================================================================

- eidos: typos
  id: typos-inference-eidos
  data:
    name: inference-eidos
    description: |
      Generate an eidos definition using inference-context.

      The whole eidos (name, description, fields) is generated as a coherent
      unit. Domain theoria informs the generation for consistency with
      existing ontological patterns.

      Usage:
        compose(typos-inference-eidos, {
          name: "recipe",
          purpose: "Represents a cooking recipe with ingredients and steps",
          domain: "cooking",
          field_hints: ["title", "ingredients list", "preparation steps", "cooking time"]
        })
    extends: typos-def-inference-context
    slots:
      # ─────────────────────────────────────────────────────────────────────
      # INPUTS
      # ─────────────────────────────────────────────────────────────────────

      name:
        type: string
        required: true
        description: "The eidos name (lowercase, no spaces)"

      purpose:
        type: string
        required: true
        description: "What ontological gap does this eidos address?"

      domain:
        type: string
        required: false
        description: "Domain to surface theoria from (e.g., 'cooking', 'governance')"

      field_hints:
        type: array
        required: false
        description: "Optional hints about what fields should exist"

      existing_eide:
        type: array
        required: false
        description: "Entity IDs of related eide to consider for consistency"

      # ─────────────────────────────────────────────────────────────────────
      # INFERENCE CONTEXT (inherited, with defaults)
      # ─────────────────────────────────────────────────────────────────────

      role:
        type: string
        default: |
          You are an ontology designer for the kosmos system.

          Eide (singular: eidos) define what can exist — they are the forms,
          the types, the categories of being. Each eidos has:
          - A name (lowercase, singular)
          - A description explaining its ontological purpose
          - Fields that define its structure

          Design principles:
          - Use existing patterns from the codebase
          - Field types: string, number, boolean, enum, array, object, timestamp
          - Include 'required' and 'description' for each field
          - Enums should list their values
          - Defaults are optional but helpful

      domain_theoria:
        type: object
        pattern: computed
        description: "Auto-computed from domain input"

      constraints:
        type: array
        default:
          - "Field names should be snake_case"
          - "Description should explain the ontological purpose, not just what it stores"
          - "Include status/lifecycle fields where appropriate"
          - "Consider what bonds (desmoi) this eidos will participate in"

      # Pre-computed optional sections — populated by the calling praxis
      # when the corresponding inputs are provided. Empty string when absent.
      field_hints_section:
        type: string
        default: ""
        description: |
          Pre-formatted field hints text. The calling praxis sets this to
          "Consider including fields for: x, y, z" when field_hints is provided.

      existing_eide_section:
        type: string
        default: ""
        description: |
          Pre-formatted existing eide text. The calling praxis sets this to
          "Related eide for consistency: x, y, z" when existing_eide is provided.

      request:
        type: string
        default: |
          Generate a complete eidos definition for "{{ $name }}".

          Purpose: {{ $purpose }}

          {{ $field_hints_section }}

          {{ $existing_eide_section }}

      output_schema:
        type: object
        default:
          type: object
          properties:
            name:
              type: string
              description: "The eidos name"
            description:
              type: string
              description: "Multi-line description of ontological purpose"
            constitutional:
              type: boolean
              description: "Whether this is a constitutional (system) eidos"
            fields:
              type: object
              description: "Field definitions"
              additionalProperties:
                type: object
                properties:
                  type:
                    type: string
                    enum: [string, number, boolean, enum, array, object, timestamp, any]
                  values:
                    type: array
                    description: "For enum type, the allowed values"
                  required:
                    type: boolean
                  default:
                    description: "Default value if not provided"
                  description:
                    type: string
                required: [type, description]
          required: [name, description, fields]

    # The generation target is an artifact containing the eidos definition
    # This artifact can then be used with typos-def-eidos to create the entity
    target_eidos: artifact
    defaults:
      kind: definition
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: topos/demiurge

# =============================================================================
# PRAXIS GENERATION
# =============================================================================

- eidos: typos
  id: typos-inference-praxis
  data:
    name: inference-praxis
    description: |
      Generate a praxis definition using inference-context.

      The whole praxis (name, params, steps) is generated as a coherent unit.
      Stoicheion schemas inform the generation for valid step construction.

      Usage:
        compose(typos-inference-praxis, {
          name: "create-recipe",
          topos: "recipes",
          purpose: "Create a new recipe with ingredients and steps",
          available_stoicheia: ["compose", "find", "bind", "return"]
        })
    extends: typos-def-inference-context
    slots:
      # ─────────────────────────────────────────────────────────────────────
      # INPUTS
      # ─────────────────────────────────────────────────────────────────────

      name:
        type: string
        required: true
        description: "The praxis name (kebab-case)"

      topos:
        type: string
        required: true
        description: "Which topos this praxis belongs to"

      purpose:
        type: string
        required: true
        description: "What does this praxis accomplish?"

      params_spec:
        type: array
        required: false
        description: "Optional hints about expected parameters"

      available_stoicheia:
        type: array
        required: false
        default: ["compose", "find", "update", "bind", "loose", "gather", "trace", "filter", "map", "set", "return", "assert", "switch", "for_each", "call", "surface"]
        description: "Stoicheia available for use in steps"

      related_eide:
        type: array
        required: false
        description: "Entity IDs of eide this praxis will work with"

      domain:
        type: string
        required: false
        description: "Domain to surface theoria from"

      # ─────────────────────────────────────────────────────────────────────
      # INFERENCE CONTEXT (inherited, with defaults)
      # ─────────────────────────────────────────────────────────────────────

      role:
        type: string
        default: |
          You are a praxis designer for the kosmos system.

          Praxeis (singular: praxis) are composed actions made of stoicheia (steps).
          Each praxis has:
          - A name (kebab-case)
          - A topos it belongs to
          - Parameters it accepts
          - Steps that execute in order
          - Visibility (whether exposed as MCP tool)

          Step patterns:
          - Use 'step: <stoicheion_name>' format
          - Bind results with 'bind_to: variable_name'
          - Reference bindings with '$variable_name'
          - Context variables: $_parousia, $_oikos, $_now

          Common stoicheia:
          - compose: Create entity from typos
          - find: Find entity by ID
          - update: Update entity data
          - bind/loose: Create/remove bonds
          - gather: Query entities by eidos
          - trace: Follow bonds from entity
          - filter/map: Transform arrays
          - call: Call another praxis
          - return: Return result

      constraints:
        type: array
        default:
          - "Use only the available stoicheia listed"
          - "Each step should have a clear purpose"
          - "Bind results that will be used later"
          - "End with a return step"
          - "Validate inputs with assert where appropriate"

      # Pre-computed optional sections — populated by the calling praxis
      params_spec_section:
        type: string
        default: ""
        description: |
          Pre-formatted params spec text. The calling praxis sets this to
          "Expected parameters: x, y, z" when params_spec is provided.

      related_eide_section:
        type: string
        default: ""
        description: |
          Pre-formatted related eide text. The calling praxis sets this to
          "Works with eide: x, y, z" when related_eide is provided.

      request:
        type: string
        default: |
          Generate a complete praxis definition for "{{ $name }}" in topos "{{ $topos }}".

          Purpose: {{ $purpose }}

          Available stoicheia: {{ $available_stoicheia | join(", ") }}

          {{ $params_spec_section }}

          {{ $related_eide_section }}

      output_schema:
        type: object
        default:
          type: object
          properties:
            topos:
              type: string
            name:
              type: string
            visible:
              type: boolean
              description: "Whether to expose as MCP tool"
            description:
              type: string
            params:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  type:
                    type: string
                    enum: [string, number, boolean, array, object]
                  required:
                    type: boolean
                  default:
                    description: "Default value"
                  description:
                    type: string
                required: [name, type]
            steps:
              type: array
              items:
                type: object
                description: "Step definition"
          required: [topos, name, description, steps]

    target_eidos: artifact
    defaults:
      kind: definition
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: topos/demiurge

# =============================================================================
# DESMOS GENERATION
# =============================================================================

- eidos: typos
  id: typos-inference-desmos
  data:
    name: inference-desmos
    description: |
      Generate a desmos (bond type) definition using inference-context.

      The whole desmos is generated as a coherent unit, considering the
      eide it connects and its semantic meaning.

      Usage:
        compose(typos-inference-desmos, {
          name: "has-ingredient",
          purpose: "Recipe contains an ingredient with quantity",
          from_eidos: "recipe",
          to_eidos: "ingredient"
        })
    extends: typos-def-inference-context
    slots:
      # ─────────────────────────────────────────────────────────────────────
      # INPUTS
      # ─────────────────────────────────────────────────────────────────────

      name:
        type: string
        required: true
        description: "The desmos name (kebab-case, verb phrase)"

      purpose:
        type: string
        required: true
        description: "What relationship does this bond represent?"

      from_eidos:
        type: string
        required: true
        description: "The eidos this bond originates from"

      to_eidos:
        type: string
        required: true
        description: "The eidos this bond targets"

      domain:
        type: string
        required: false
        description: "Domain to surface theoria from"

      # ─────────────────────────────────────────────────────────────────────
      # INFERENCE CONTEXT (inherited, with defaults)
      # ─────────────────────────────────────────────────────────────────────

      role:
        type: string
        default: |
          You are an ontology designer for the kosmos system.

          Desmoi (singular: desmos) define how entities relate — they are bonds,
          connections, relationships. Each desmos has:
          - A name (kebab-case, typically a verb phrase)
          - A description of its semantic meaning
          - from_eidos: what types can originate the bond
          - to_eidos: what types can be targeted
          - cardinality: one-to-one, one-to-many, many-to-one, many-to-many
          - symmetric: whether A→B implies B→A

          Common patterns:
          - "contains": one-to-many, not symmetric
          - "belongs-to": many-to-one, not symmetric
          - "relates-to": many-to-many, could be symmetric
          - "authored-by": many-to-one, not symmetric

      constraints:
        type: array
        default:
          - "Name should be a verb phrase describing the relationship"
          - "Consider traversal in both directions for the description"
          - "Choose cardinality based on real-world constraints"
          - "Only mark symmetric if the relationship is truly bidirectional"

      request:
        type: string
        default: |
          Generate a complete desmos definition for "{{ $name }}".

          Purpose: {{ $purpose }}
          From: {{ $from_eidos }}
          To: {{ $to_eidos }}

      output_schema:
        type: object
        default:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            from_eidos:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
            to_eidos:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
            cardinality:
              type: string
              enum: [one-to-one, one-to-many, many-to-one, many-to-many]
            symmetric:
              type: boolean
          required: [name, description, from_eidos, to_eidos, cardinality]

    target_eidos: artifact
    defaults:
      kind: definition
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: topos/demiurge

# =============================================================================
# TOPOS GENERATION (meta-level)
# =============================================================================

- eidos: typos
  id: typos-inference-topos
  data:
    name: inference-topos
    description: |
      Generate a topos design using inference-context.

      This is the meta-level: generate the structure of an entire topos,
      including what eide, praxeis, and desmoi it should contain.

      The output is a design artifact that can guide subsequent generation
      of the individual components.

      Usage:
        compose(typos-inference-topos, {
          name: "recipes",
          purpose: "Manage cooking recipes, ingredients, and meal planning",
          scale: "oikos",
          capabilities: ["create recipes", "search by ingredient", "plan meals"]
        })
    extends: typos-def-inference-context
    slots:
      # ─────────────────────────────────────────────────────────────────────
      # INPUTS
      # ─────────────────────────────────────────────────────────────────────

      name:
        type: string
        required: true
        description: "The topos name (lowercase)"

      purpose:
        type: string
        required: true
        description: "What ontological gap does this topos address?"

      scale:
        type: string
        required: false
        default: oikos
        description: "Klimax scale: kosmos, polis, oikos, soma, psyche"

      capabilities:
        type: array
        required: false
        description: "High-level capabilities this topos should provide"

      interaction_surfaces:
        type: array
        required: false
        description: "Which surfaces to leverage: rendering, reasoning, understanding, computation, transport, coordination, emission"

      existing_topoi:
        type: array
        required: false
        description: "Related topoi to consider for dependencies"

      # ─────────────────────────────────────────────────────────────────────
      # INFERENCE CONTEXT (inherited, with defaults)
      # ─────────────────────────────────────────────────────────────────────

      role:
        type: string
        default: |
          You are a topos architect for the kosmos system.

          A topos (capability domain) is a coherent package of eide (entity types),
          praxeis (operations), and desmoi (relationships) that address a specific
          ontological gap. Oikoi host topoi to gain capability.

          Design principles:
          - Start from the gap: what can't be done without this topos?
          - Identify the core entities that will exist
          - Define the operations that transform/create entities
          - Specify the relationships that connect entities
          - Consider which interaction surfaces to leverage
          - Declare dependencies on other topoi

          Klimax scales:
          - kosmos: Universal, affects all
          - polis: Governance level
          - oikos: Social dwelling level (most common)
          - soma: Embodiment level
          - psyche: Experience level

          Common patterns:
          - **Kinetics topos** (like hodos): No own eide, operates on entities from
            dependencies. Set source field to indicate external eide.
          - **Interface topos** (like opsis): Many eide for rendering/display.
            May use attainments from parent topos (set source).
          - **Foundational topos** (like nous): Core eide that others depend on.
            Some eide may be in spora (genesis level).
          - **Mode topos** (like voice-authoring): Experiential mode with session
            tracking, layouts, and specialized workflows.

      constraints:
        type: array
        default:
          - "Each eidos should have a clear ontological purpose"
          - "Each praxis should map to a user-meaningful action"
          - "Desmoi should capture real semantic relationships"
          - "Avoid duplicating functionality from existing topoi"
          - "Mark external components with source field"
          - "Empty eide array is valid for kinetics topoi"
          - "Attainments may come from parent topos (set source)"

      # Pre-computed optional sections — populated by the calling praxis
      capabilities_section:
        type: string
        default: ""
        description: |
          Pre-formatted capabilities text. The calling praxis sets this to
          "Required capabilities: x, y, z" when capabilities is provided.

      surfaces_section:
        type: string
        default: ""
        description: |
          Pre-formatted interaction surfaces text. The calling praxis sets this to
          "Interaction surfaces: x, y, z" when interaction_surfaces is provided.

      dependencies_section:
        type: string
        default: ""
        description: |
          Pre-formatted dependencies text. The calling praxis sets this to
          "Consider dependencies on: x, y, z" when existing_topoi is provided.

      request:
        type: string
        default: |
          Design a topos called "{{ $name }}".

          Purpose: {{ $purpose }}
          Scale: {{ $scale }}

          {{ $capabilities_section }}

          {{ $surfaces_section }}

          {{ $dependencies_section }}

          Generate a complete topos design including:
          1. The eide this topos will define
          2. The praxeis that operate on those eide
          3. The desmoi that relate the eide
          4. Dependencies on other topoi
          5. Attainments that gate capabilities

      output_schema:
        type: object
        default:
          type: object
          properties:
            name:
              type: string
            purpose:
              type: string
            scale:
              type: string
            depends_on:
              type: array
              items:
                type: string
              description: "Other topoi this depends on"
            eide:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  purpose:
                    type: string
                  key_fields:
                    type: array
                    items:
                      type: string
                  source:
                    type: string
                    description: "If external, the topos that defines this eidos (e.g., 'nous', 'spora')"
                  extends:
                    type: string
                    description: "If extending an existing eidos, which one"
                required: [name, purpose]
              description: "Eide defined by or used by this topos. Set source for external eide."
            praxeis:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  purpose:
                    type: string
                  params:
                    type: array
                    items:
                      type: string
                  namespace:
                    type: string
                    description: "Override praxis namespace if different from topos name"
                required: [name, purpose]
            desmoi:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  from:
                    type: string
                  to:
                    type: string
                  purpose:
                    type: string
                  source:
                    type: string
                    description: "If external, the topos that defines this desmos"
                required: [name, from, to]
            attainments:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  bonds:
                    type: array
                    items:
                      type: object
                      properties:
                        desmos:
                          type: string
                          description: "Bond type (e.g., 'grants-praxis')"
                        to:
                          type: string
                          description: "Target entity ID (e.g., 'praxis/topos/operation')"
                  purpose:
                    type: string
                  source:
                    type: string
                    description: "If external, the topos that defines this attainment (e.g., 'thyra')"
                required: [name, purpose]
          required: [name, purpose]
          description: |
            Note: eide/praxeis arrays may be empty if topos only operates on
            entities from dependencies. Set 'source' field for external components.

    target_eidos: artifact
    defaults:
      kind: design
    bonds:
      - desmos: belongs-to
        from_self: true
        to_literal: topos/demiurge

# =============================================================================
# GENERATION WORKFLOW PRAXIS
# =============================================================================

# Note: These would be full praxeis that orchestrate the generation flow.
# Sketched here as typos to show the pattern; actual praxeis would go in
# genesis/demiurge/praxeis/

- eidos: typos
  id: typos-def-generation-workflow
  data:
    name: generation-workflow
    description: |
      Template for a generation workflow that:
      1. Composes an inference-context
      2. Calls governed-inference
      3. Creates the entity from the generated content
      4. Bonds provenance (informed-by)

      This is the canonical pattern for inference-context-aware composition.
    template: |
      # Generation Workflow: {{ $entity_type }}

      ## Step 1: Compose Inference Context
      ```yaml
      - step: compose
        typos_id: typos-inference-{{ $entity_type }}
        inputs:
          name: "{{ $name }}"
          purpose: "{{ $purpose }}"
          domain: "{{ $domain }}"
        bind_to: context
      ```

      ## Step 2: Surface Domain Theoria
      ```yaml
      - step: surface
        query: "{{ $domain }}"
        eidos: theoria
        limit: 5
        bind_to: theoria
      ```

      ## Step 3: Call Governed Inference
      ```yaml
      - step: call
        praxis: manteia/governed-inference
        params:
          prompt: "$context.data.request"
          system_prompt: "$context.data.role"
          output_schema: "$context.data.output_schema"
        bind_to: generated
      ```

      ## Step 4: Compose Entity
      ```yaml
      - step: compose
        typos_id: typos-def-{{ $entity_type }}
        inputs: "$generated.content"
        bind_to: entity
      ```

      ## Step 5: Bond Provenance
      ```yaml
      - step: for_each
        items: "$theoria"
        as: t
        steps:
          - step: bind
            from: "$entity.id"
            to: "$t.id"
            desmos: informed-by
      ```

      ## Step 6: Return
      ```yaml
      - step: return
        value: "$entity"
      ```
    defaults:
      entity_type: eidos
