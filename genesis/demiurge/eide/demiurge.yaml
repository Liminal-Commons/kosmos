# Demiurge Eide
# The craftsman's forms — composition templates and artifacts
#
# Eide defined here + attainments that gate demiurge praxeis

entities:

  # =============================================================================
  # CORE EIDE
  # =============================================================================

  - eidos: eidos
    id: eidos/typos
    data:
      name: typos
      description: |
        τύπος — the mold, the composition template.

        Shape determines routing:
        - target_eidos present → entity composition
        - slots present, no target_eidos → graph composition
        - template present, no slots, no target_eidos → template rendering
      constitutional: false
      fields:
        name:
          type: string
          required: true
        description:
          type: string
          required: false
        target_eidos:
          type: string
          required: false
          description: The eidos to instantiate (entity composition mode)
        slots:
          type: object
          required: false
          description: Named slots to fill with inputs (graph composition mode)
        template:
          type: string
          required: false
          description: Template with {{ variable }} placeholders (template mode)
        defaults:
          type: object
          required: false
          description: Default values for slots/template variables
        bonds:
          type: array
          required: false
          description: Bonds to create during composition
        output_type:
          type: string
          required: false
          description: Format of output (for template mode)

  - eidos: eidos
    id: eidos/artifact
    data:
      name: artifact
      description: |
        A composed artifact — the result of template or graph composition.
        Entity composition produces the entity directly, not an artifact wrapper.

        Artifacts can be:
        - Documents authored through voice-authoring
        - Generated content from inference
        - Composed templates
        - Sub-artifacts of larger documents
      constitutional: false
      fields:
        # Core composition fields
        typos_id:
          type: string
          required: true
          description: The definition used to compose this artifact
        content:
          type: string
          required: true
          description: The composed content
        inputs:
          type: object
          required: false
          description: The inputs used during composition
        composed_at:
          type: timestamp
          required: true
          description: When this artifact was composed
        cache_key:
          type: string
          required: false
          description: Content-addressed key for caching
        stale:
          type: boolean
          required: false
          description: Whether the artifact needs recomposition

        # Document/authoring fields
        title:
          type: string
          required: false
          description: Human-readable title for the artifact
        kind:
          type: enum
          values: [document, note, design, code, template, other]
          required: false
          default: document
          description: What kind of artifact this is
        domain:
          type: string
          required: false
          description: Domain for surfacing relevant theoria during updates
        circle_id:
          type: string
          required: false
          description: Circle this artifact belongs to

        # Composition hierarchy fields
        parent_artifact_id:
          type: string
          required: false
          description: Parent artifact if this is a sub-artifact
        section_path:
          type: string
          required: false
          description: Path within parent (e.g., 'introduction', 'section-2')

        # Update tracking
        updated_at:
          type: timestamp
          required: false
          description: Last update time (may differ from composed_at)
        update_count:
          type: number
          required: false
          default: 0
          description: Number of times this artifact has been updated

  # =============================================================================
  # ATTAINMENTS
  # =============================================================================

  - eidos: attainment
    id: attainment/compose
    data:
      name: compose
      description: |
        Core composition capability — the fundamental demiurge act.

        Compose is the single interface for all creation. Every composition:
        - Creates entity with provenance (composed-from, authorized-by bonds)
        - Indexes for semantic search (circle-scoped)
        - Tracks dependencies for cache invalidation
      oikos: demiurge
      scope: circle
      grants:
        - praxis/demiurge/compose
        - praxis/demiurge/compose-cached
        - praxis/demiurge/check-cache
        - praxis/demiurge/bind-dependencies
        - praxis/demiurge/mark-dependents-stale
        - praxis/demiurge/list-stale-artifacts
        - praxis/demiurge/refresh-stale

  - eidos: attainment
    id: attainment/develop
    data:
      name: develop
      description: |
        Oikos development capability — the Generative Development Spiral.

        The canonical path for developing oikoi:
        1. Write DESIGN.md (human intent)
        2. develop-oikos-from-design (parses, generates artifacts)
        3. Review generated artifacts
        4. actualize-* (creates real entities)
        5. validate-oikos (checks definitions)
        6. emit-oikos (writes to genesis)

        Each generation step uses inference context composition to surface
        relevant theoria and produce schema-constrained output.
      oikos: demiurge
      scope: circle
      grants:
        - praxis/demiurge/develop-oikos-from-design
        - praxis/demiurge/generate-eidos
        - praxis/demiurge/generate-praxis
        - praxis/demiurge/generate-desmos
        - praxis/demiurge/generate-oikos
        - praxis/demiurge/actualize-eidos
        - praxis/demiurge/actualize-praxis
        - praxis/demiurge/actualize-desmos
        - praxis/demiurge/validate-oikos
        - praxis/demiurge/validate-praxis
        - praxis/demiurge/discover-stoicheia
        - praxis/demiurge/discover-typos
        - praxis/demiurge/discover-desmoi

  - eidos: attainment
    id: attainment/package
    data:
      name: package
      description: |
        Oikos packaging and publishing capability.

        Prepares oikoi for distribution:
        - compose-oikos-dev: Package from genesis source
        - bake-oikos: Resolve generation specs to literals
        - publish-oikos: Sign and release
        - verify-oikos: Verify package integrity
      oikos: demiurge
      scope: circle
      grants:
        - praxis/demiurge/compose-oikos-dev
        - praxis/demiurge/bake-oikos
        - praxis/demiurge/publish-oikos
        - praxis/demiurge/verify-oikos

