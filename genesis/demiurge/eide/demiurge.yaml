# Demiurge Eide
# The craftsman's forms — composition templates and artifacts
#
# Eide defined here + attainments that gate demiurge praxeis

entities:

  # =============================================================================
  # CORE EIDE
  # =============================================================================

  - eidos: eidos
    id: eidos/typos
    data:
      name: typos
      description: |
        τύπος — the mold, the composition template.

        Shape determines routing:
        - target_eidos present → entity composition
        - slots present, no target_eidos → graph composition
        - template present, no slots, no target_eidos → template rendering
      constitutional: false
      fields:
        name:
          type: string
          required: true
        description:
          type: string
          required: false
        target_eidos:
          type: string
          required: false
          description: The eidos to instantiate (entity composition mode)
        slots:
          type: object
          required: false
          description: Named slots to fill with inputs (graph composition mode)
        template:
          type: string
          required: false
          description: Template with {{ variable }} placeholders (template mode)
        defaults:
          type: object
          required: false
          description: Default values for slots/template variables
        bonds:
          type: array
          required: false
          description: Bonds to create during composition
        output_type:
          type: string
          required: false
          description: Format of output (for template mode)

  - eidos: eidos
    id: eidos/artifact
    data:
      name: artifact
      description: |
        A composed artifact — the result of template or graph composition.
        Entity composition produces the entity directly, not an artifact wrapper.

        Artifacts can be:
        - Documents authored through voice-authoring
        - Generated content from inference
        - Composed templates
        - Sub-artifacts of larger documents
      constitutional: false
      fields:
        # Core composition fields
        typos_id:
          type: string
          required: true
          description: The definition used to compose this artifact
        content:
          type: string
          required: true
          description: The composed content
        inputs:
          type: object
          required: false
          description: The inputs used during composition
        composed_at:
          type: timestamp
          required: true
          description: When this artifact was composed
        cache_key:
          type: string
          required: false
          description: Content-addressed key for caching
        stale:
          type: boolean
          required: false
          description: Whether the artifact needs recomposition
        styles:
          type: string
          required: false
          description: Scoped CSS styles from the typos template

        # Document/authoring fields
        title:
          type: string
          required: false
          description: Human-readable title for the artifact
        kind:
          type: enum
          values: [document, note, design, code, template, other]
          required: false
          default: document
          description: What kind of artifact this is
        domain:
          type: string
          required: false
          description: Domain for surfacing relevant theoria during updates
        oikos_id:
          type: string
          required: false
          description: Oikos this artifact belongs to

        # Composition hierarchy fields
        parent_artifact_id:
          type: string
          required: false
          description: Parent artifact if this is a sub-artifact
        section_path:
          type: string
          required: false
          description: Path within parent (e.g., 'introduction', 'section-2')

        # Update tracking
        updated_at:
          type: timestamp
          required: false
          description: Last update time (may differ from composed_at)
        update_count:
          type: number
          required: false
          default: 0
          description: Number of times this artifact has been updated

  # =============================================================================
  # ATTAINMENTS
  # =============================================================================

  - eidos: attainment
    id: attainment/compose
    data:
      name: compose
      description: |
        Core composition capability — the fundamental demiurge act.

        Compose is the single interface for all creation. Every composition:
        - Creates entity with provenance (composed-from, authorized-by bonds)
        - Indexes for semantic search (oikos-scoped)
        - Tracks dependencies for cache invalidation
      topos: demiurge
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/demiurge/compose }
      - { desmos: grants-praxis, to: praxis/demiurge/compose-cached }
      - { desmos: grants-praxis, to: praxis/demiurge/check-cache }
      - { desmos: grants-praxis, to: praxis/demiurge/bind-dependencies }
      - { desmos: grants-praxis, to: praxis/demiurge/mark-dependents-stale }
      - { desmos: grants-praxis, to: praxis/demiurge/list-stale-artifacts }
      - { desmos: grants-praxis, to: praxis/demiurge/refresh-stale }

  - eidos: attainment
    id: attainment/develop
    data:
      name: develop
      description: |
        Topos development capability — the Generative Development Spiral.

        The canonical path for developing topoi:
        1. Write DESIGN.md (human intent)
        2. develop-topos-from-design (parses, generates artifacts)
        3. Review generated artifacts
        4. actualize-* (creates real entities)
        5. validate-topos (checks definitions)
        6. emit-topos (writes to genesis)

        Each generation step uses inference context composition to surface
        relevant theoria and produce schema-constrained output.
      topos: demiurge
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/demiurge/develop-topos-from-design }
      - { desmos: grants-praxis, to: praxis/demiurge/generate-eidos }
      - { desmos: grants-praxis, to: praxis/demiurge/generate-praxis }
      - { desmos: grants-praxis, to: praxis/demiurge/generate-desmos }
      - { desmos: grants-praxis, to: praxis/demiurge/generate-topos }
      - { desmos: grants-praxis, to: praxis/demiurge/actualize-eidos }
      - { desmos: grants-praxis, to: praxis/demiurge/actualize-praxis }
      - { desmos: grants-praxis, to: praxis/demiurge/actualize-desmos }
      - { desmos: grants-praxis, to: praxis/demiurge/validate-topos }
      - { desmos: grants-praxis, to: praxis/demiurge/validate-praxis }
      - { desmos: grants-praxis, to: praxis/demiurge/discover-stoicheia }
      - { desmos: grants-praxis, to: praxis/demiurge/discover-typos }
      - { desmos: grants-praxis, to: praxis/demiurge/discover-desmoi }

  - eidos: attainment
    id: attainment/package
    data:
      name: package
      description: |
        Topos packaging and publishing capability.

        Prepares topoi for distribution:
        - compose-topos-dev: Package from genesis source
        - bake-topos: Resolve generation specs to literals
        - publish-topos: Sign and release
        - verify-topos: Verify package integrity
      topos: demiurge
      scope: oikos
    bonds:
      - { desmos: grants-praxis, to: praxis/demiurge/compose-topos-dev }
      - { desmos: grants-praxis, to: praxis/demiurge/bake-topos }
      - { desmos: grants-praxis, to: praxis/demiurge/publish-topos }
      - { desmos: grants-praxis, to: praxis/demiurge/verify-topos }

