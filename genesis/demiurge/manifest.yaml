# Topos Manifest: Demiurge
# δημιουργός — the craftsman, the compositor.
#
# One verb. One tool. The compositor is simple.
# Complexity lives in the definition.
#
# Manifest v2.1 — topos metadata for entity composition

format_version: "2.1"
topos_id: demiurge
version: "0.1.0"

# Topos metadata (v2.1)
topos_name: Demiurge
topos_description: |
  The craftsman, the compositor. One verb — compose. One tool.
  The compositor is simple; complexity lives in the definition.
topos_scale: cross-scale

# Development experience metadata
topos_category: infrastructure
surfaces_provided: []   # Composition is the mechanism, not a surface
surfaces_consumed:
  - reasoning           # Uses manteia/governed-inference for definition generation
  - reactivity          # Reflexes for composition mutation response

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: typos/
    content_types: [typos]
  - path: reflexes/
    content_types: [reflex]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.gather
  - db.update

provides:
  eide:
    - typos
    - artifact

  reflexes:
    - reflex/demiurge/artifact-composed
    - reflex/demiurge/definition-actualized

  attainments:
    - compose              # Core composition (always indexes, tracks dependencies)
    - develop              # Topos development via Generative Development Spiral
    - package              # Topos packaging and publishing

  desmoi:
    - composed-from        # Entity was composed from typos (constitutional, in arche)
    - authorized-by        # Composition was authorized by phasis (constitutional, in arche)
    - depends-on           # Artifact depends on entity for invalidation
    - informed-by          # Generation was informed by theoria
    - contains             # Topos contains definition
    - packages             # topos-dev packages topos
    - baked-from           # topos-prod was baked from topos-dev
    - published-by         # topos-prod was published by parousia
    - forked-from          # topos-dev was forked from another topos-dev

  praxeis:
    # ─────────────────────────────────────────────────────────────────────────
    # CORE COMPOSITION — The single interface for all creation
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/compose                # Always indexes, tracks provenance

    # ─────────────────────────────────────────────────────────────────────────
    # CACHING — Content-addressed artifact caching
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/compose-cached         # Compose with cache lookup
    - demiurge/check-cache            # Query cache without composing

    # ─────────────────────────────────────────────────────────────────────────
    # DEPENDENCIES — Staleness propagation through artifact graph
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/bind-dependencies      # Track what artifact depends on
    - demiurge/mark-dependents-stale  # Propagate staleness
    - demiurge/list-stale-artifacts   # Query stale artifacts
    - demiurge/refresh-stale          # Recompose stale artifacts

    # ─────────────────────────────────────────────────────────────────────────
    # GENERATIVE DEVELOPMENT SPIRAL — The canonical path for topos development
    # Intent → Generate → Review → Actualize → Emit → Crystallize
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/develop-topos-from-design  # Entry point: DESIGN.md → artifacts
    - demiurge/generate-eidos             # Compose inference context → generate
    - demiurge/generate-praxis            # Compose inference context → generate
    - demiurge/generate-desmos            # Compose inference context → generate
    - demiurge/generate-topos             # Compose inference context → generate design
    - demiurge/actualize-eidos            # Artifact → entity in kosmos
    - demiurge/actualize-praxis           # Artifact → entity in kosmos
    - demiurge/actualize-desmos           # Artifact → entity in kosmos
    - demiurge/generate-render-spec       # Compose inference context → generate render-spec
    - demiurge/actualize-render-spec      # Artifact → render-spec entity in kosmos

    # ─────────────────────────────────────────────────────────────────────────
    # VALIDATION — Check definitions before emission
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/validate-topos             # Validate all definitions in topos
    - demiurge/validate-praxis            # Validate single praxis
    - demiurge/validate-render-spec       # Validate render-spec structure

    # ─────────────────────────────────────────────────────────────────────────
    # PACKAGING — Prepare topos for distribution
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/compose-topos-dev          # Package topos from genesis
    - demiurge/bake-topos                 # Resolve generation specs
    - demiurge/publish-topos              # Sign and release
    - demiurge/verify-topos               # Verify package integrity

    # ─────────────────────────────────────────────────────────────────────────
    # DISCOVERY — Explore the compositional palette
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/discover-stoicheia         # Available step types
    - demiurge/discover-typos             # Available composition templates
    - demiurge/discover-desmoi            # Available bond types

    # ─────────────────────────────────────────────────────────────────────────
    # INTERNAL — Body-schema and reflex responses
    # ─────────────────────────────────────────────────────────────────────────
    - demiurge/sense-development          # Body-schema contribution

stoicheia_form:
  # Demiurge stoicheia interpreted by host
  # render, fill_slots, render_graph — all arche-level

depends_on:
  - manteia              # Uses governed-inference for definition generation
  - nous                 # Theoria surfaces into generation context
  - genesis              # Emission praxeis moved to genesis topos
