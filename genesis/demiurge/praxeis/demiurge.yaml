- eidos: praxis
  id: praxis/demiurge/generate-oikos
  data:
    oikos: demiurge
    name: generate-oikos
    visible: true
    tier: 3  # Requires inference (actuality)
    description: |
      Generate an oikos design using inference-context.

      This is the meta-level: generate the structure of an entire oikos,
      including what eide, praxeis, and desmoi it should contain.

      Returns a design artifact that can guide subsequent generation
      of the individual components via generate-eidos, generate-praxis,
      and generate-desmos.
    params:
      - name: name
        type: string
        required: true
        description: The oikos name (lowercase)
      - name: purpose
        type: string
        required: true
        description: What ontological gap does this oikos address?
      - name: scale
        type: string
        required: false
        default: oikos
        description: "Klimax scale: kosmos, polis, oikos, soma, psyche"
      - name: capabilities
        type: array
        required: false
        description: High-level capabilities this oikos should provide
      - name: interaction_surfaces
        type: array
        required: false
        description: "Which surfaces to leverage: rendering, reasoning, etc."
      - name: existing_oikoi
        type: array
        required: false
        description: Related oikoi to consider for dependencies
      - name: evaluate
        type: boolean
        required: false
        default: true
        description: Whether to evaluate output against criteria
    steps:
      # Step 1: Compose inference context
      - step: compose
        typos_id: typos-inference-oikos
        inputs:
          name: "$name"
          purpose: "$purpose"
          scale: "$scale"
          capabilities: "$capabilities"
          interaction_surfaces: "$interaction_surfaces"
          existing_oikoi: "$existing_oikoi"
        bind_to: context

      # Step 2: Surface domain theoria
      - step: surface
        query: "oikos design architecture capability"
        eidos: theoria
        limit: 5
        bind_to: theoria

      # Step 3: Build prompt with theoria
      - step: set
        bindings:
          theoria_context: ""

      - step: switch
        cases:
          - when: "$theoria | length > 0"
            then:
              - step: map
                items: "$theoria"
                as: t
                transform: "{{ $t.data.insight }}"
                bind_to: insights

              - step: set
                bindings:
                  theoria_context: |
                    Relevant understanding from the kosmos:
                    {{ $insights | join("\n- ") }}

      - step: set
        bindings:
          full_prompt: |
            {{ $context.data.request }}

            {{ $theoria_context }}

      # Step 4: Call governed inference
      - step: call
        praxis: manteia/governed-inference
        params:
          prompt: "$full_prompt"
          system_prompt: "$context.data.role"
          output_schema: "$context.data.output_schema"
          evaluate: "$evaluate"
          criteria:
            - name: ontological_coherence
              description: "Does this oikos address a clear ontological gap?"
              weight: 1.0
            - name: component_completeness
              description: "Are eide, praxeis, and desmoi sufficiently defined?"
              weight: 0.9
            - name: dependency_clarity
              description: "Are dependencies on other oikoi clear and justified?"
              weight: 0.7
            - name: attainment_design
              description: "Are capabilities properly gated by attainments?"
              weight: 0.6
        bind_to: generated

      # Step 5: Create design artifact
      - step: compose
        typos_id: typos-def-artifact
        inputs:
          id: "artifact/oikos-$name-design"
          title: "Oikos Design: $name"
          kind: design
          domain: "oikos"
          content: "$generated.content"
        bind_to: artifact

      # Step 6: Bond provenance
      - step: for_each
        items: "$theoria"
        as: t
        steps:
          - step: bind
            from: "$artifact.id"
            to: "$t.id"
            desmos: informed-by

      # Step 7: Return
      - step: return
        value:
          artifact: "$artifact"
          design: "$generated.content"
          verdict: "$generated.verdict"
          informed_by: "$theoria | map(.id)"
          next_steps:
            - "Use generate-eidos for each eidos in design.eide"
            - "Use generate-praxis for each praxis in design.praxeis"
            - "Use generate-desmos for each desmos in design.desmoi"

- eidos: praxis
  id: praxis/demiurge/actualize-eidos
  data:
    oikos: demiurge
    name: actualize-eidos
    visible: true
    tier: 2
    description: |
      Actualize a generated eidos artifact into the kosmos.

      Takes an artifact containing an eidos definition (from generate-eidos)
      and creates the actual eidos entity in the kosmos.

      This is the bridge from generated content to actual being.
    params:
      - name: artifact_id
        type: string
        required: true
        description: ID of the artifact containing the eidos definition
      - name: oikos_id
        type: string
        required: false
        description: Oikos to bind the eidos to
    steps:
      # Step 1: Get the artifact
      - step: find
        id: "$artifact_id"
        bind_to: artifact

      - step: assert
        condition: "$artifact"
        message: "Artifact not found: $artifact_id"

      - step: assert
        condition: "$artifact.data.kind == 'definition'"
        message: "Artifact is not a definition"

      # Step 2: Extract the eidos definition
      - step: set
        bindings:
          definition: "$artifact.data.content"

      # Step 3: Compose the eidos entity
      - step: compose
        typos_id: typos-def-eidos
        inputs:
          id: "eidos/$definition.name"
          name: "$definition.name"
          description: "$definition.description"
          constitutional: "$definition.constitutional"
          fields: "$definition.fields"
        bind_to: eidos

      # Step 4: Bind to oikos if provided
      - step: switch
        cases:
          - when: "$oikos_id"
            then:
              - step: bind
                from: "$eidos.id"
                to: "$oikos_id"
                desmos: belongs-to

      # Step 5: Bond provenance from artifact
      - step: bind
        from: "$eidos.id"
        to: "$artifact_id"
        desmos: composed-from

      # Step 6: Return
      - step: return
        value:
          eidos: "$eidos"
          artifact_id: "$artifact_id"
          actualized: true

- eidos: praxis
  id: praxis/demiurge/actualize-praxis
