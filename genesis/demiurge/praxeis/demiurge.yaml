# demiurge.yaml
# Demiurge praxeis — the craftsman's operations
#
# δημιουργός — One verb. One tool. The compositor is simple.
# Complexity lives in the definition.
#
# Praxeis organized by attainment:
# - compose: Core composition, caching, dependencies
# - develop: Generative Development Spiral (generate-*, actualize-*, validate-*)
# - package: Oikos packaging (compose-oikos-dev, bake-oikos, publish-oikos, verify-oikos)
# - emit: Genesis emission (emit-genesis, emit-oikos, verify-full-circle)

entities:

# =============================================================================
# CORE COMPOSITION
# =============================================================================

- eidos: praxis
  id: praxis/demiurge/compose
  data:
    oikos: demiurge
    name: compose
    visible: true
    description: |
      Compose from a definition — the single interface.

      One tool. The compositor is simple. Complexity lives in the definition.

      Routes based on definition shape:
      - Has target_eidos → entity composition
      - Has slots, no target_eidos → graph composition (text or object)
      - Has template, no target_eidos, no slots → template rendering

      Returns the composed thing — entity, content, or object.
    params:
      - name: typos_id
        type: string
        required: true
        description: The artifact definition to compose from
      - name: inputs
        type: object
        required: false
        description: Values to fill (overrides defaults)
      - name: id
        type: string
        required: false
        description: Entity ID (only for entity composition, generated if not provided)
      - name: authorized_by
        type: string
        required: false
        description: Expression ID that authorizes this composition (provenance root)
    steps:
      # The compose step does the heavy lifting
      # Sets _schema_dependencies in scope when generated slots use schema sources
      - step: compose
        typos_id: "$typos_id"
        inputs: "$inputs"
        id: "$id"
        bind_to: result
      # Return the composed entity with schema dependency info
      - step: return
        value:
          result: "$result"
          schema_dependencies: "$_schema_dependencies"

# =============================================================================
# ARTIFACT CACHING (Phase 14)
# =============================================================================

- eidos: praxis
  id: praxis/demiurge/compose-cached
  data:
    oikos: demiurge
    name: compose-cached
    visible: true
    tier: 2
    description: |
      Compose with content-addressed caching.

      Hashes typos_id + inputs to create a cache key.
      Returns cached artifact if exists and not stale.
      Otherwise composes and stores with cache key.
    params:
      - name: typos_id
        type: string
        required: true
        description: The artifact definition to compose from
      - name: inputs
        type: object
        required: false
        description: Values to fill (overrides defaults)
      - name: authorized_by
        type: string
        required: false
        description: Expression ID that authorizes this composition
      - name: force_refresh
        type: boolean
        required: false
        description: Force re-composition even if cached
    steps:
      # Build cache key from definition + inputs
      - step: set
        bindings:
          inputs_json: "$inputs | to_json"

      - step: digest
        input: "$typos_id-$inputs_json"
        bind_to: cache_key

      # Check for existing artifact with this cache key
      - step: set
        bindings:
          artifact_id: "artifact/$cache_key"

      - step: find
        id: "$artifact_id"
        bind_to: cached

      # Return cached if found, not stale, and not forcing refresh
      - step: switch
        cases:
          - when: "$cached and not $cached.data.stale and not $force_refresh"
            then:
              - step: return
                value:
                  artifact: "$cached"
                  from_cache: true
                  cache_key: "$cache_key"

      # Cache miss or stale — compose fresh
      - step: compose
        typos_id: "$typos_id"
        inputs: "$inputs"
        id: "$artifact_id"
        bind_to: composed

      # Update the artifact with cache metadata
      - step: update
        id: "$artifact_id"
        data:
          cache_key: "$cache_key"
          stale: false

      # Automatically bind schema dependencies if present
      # The compose step sets _schema_dependencies when generated slots use schema sources
      - step: switch
        cases:
          - when: "$_schema_dependencies and ($_schema_dependencies | length) > 0"
            then:
              - step: call
                praxis: "demiurge/bind-dependencies"
                params:
                  artifact_id: "$artifact_id"
                  dependency_ids: "$_schema_dependencies"
                bind_to: deps_result

      - step: return
        value:
          artifact: "$composed"
          from_cache: false
          cache_key: "$cache_key"
          schema_dependencies: "$_schema_dependencies"

- eidos: praxis
  id: praxis/demiurge/check-cache
  data:
    oikos: demiurge
    name: check-cache
    visible: true
    tier: 1
    description: |
      Check if an artifact exists in cache for given definition + inputs.

      Returns cache status without composing.
    params:
      - name: typos_id
        type: string
        required: true
        description: The artifact definition
      - name: inputs
        type: object
        required: false
        description: The inputs to check
    steps:
      - step: set
        bindings:
          inputs_json: "$inputs | to_json"

      - step: digest
        input: "$typos_id-$inputs_json"
        bind_to: cache_key

      - step: set
        bindings:
          artifact_id: "artifact/$cache_key"

      - step: find
        id: "$artifact_id"
        bind_to: cached

      - step: switch
        cases:
          - when: "$cached"
            then:
              - step: return
                value:
                  cached: true
                  stale: "$cached.data.stale"
                  cache_key: "$cache_key"
                  artifact_id: "$artifact_id"

      - step: return
        value:
          cached: false
          cache_key: "$cache_key"

# =============================================================================
# DEPENDENCY MANAGEMENT (Phase 15)
# =============================================================================

- eidos: praxis
  id: praxis/demiurge/bind-dependencies
  data:
    oikos: demiurge
    name: bind-dependencies
    visible: true
    tier: 2
    description: |
      Bind multiple dependencies to an artifact.

      Creates depends-on bonds from artifact to each dependency.
      Used after composition to declare what the artifact depends on.
    params:
      - name: artifact_id
        type: string
        required: true
        description: The artifact that has dependencies
      - name: dependency_ids
        type: array
        required: true
        description: Entity IDs the artifact depends on
    steps:
      - step: find
        id: "$artifact_id"
        bind_to: artifact

      - step: assert
        condition: "$artifact"
        message: "Artifact not found: $artifact_id"

      - step: for_each
        in: "$dependency_ids"
        as: dep_id
        do:
          - step: bind
            from_id: "$artifact_id"
            to_id: "$dep_id"
            desmos: "depends-on"

      - step: return
        value:
          artifact_id: "$artifact_id"
          dependencies_bound: "$dependency_ids | length"

- eidos: praxis
  id: praxis/demiurge/mark-dependents-stale
  data:
    oikos: demiurge
    name: mark-dependents-stale
    visible: true
    tier: 2
    description: |
      Mark all artifacts that depend on an entity as stale.

      When an entity changes, this propagates staleness to
      all artifacts that have depends-on bonds to it.
    params:
      - name: entity_id
        type: string
        required: true
        description: The entity that changed
    steps:
      # Find all artifacts that depend on this entity
      - step: trace
        to_id: "$entity_id"
        desmos: "depends-on"
        resolve: from
        bind_to: dependents

      - step: set
        bindings:
          marked_count: 0

      - step: for_each
        in: "$dependents"
        as: dependent
        do:
          - step: update
            id: "$dependent.id"
            data:
              stale: true
          - step: set
            bindings:
              marked_count: "$marked_count + 1"

      - step: return
        value:
          entity_id: "$entity_id"
          dependents_marked_stale: "$marked_count"

- eidos: praxis
  id: praxis/demiurge/list-stale-artifacts
  data:
    oikos: demiurge
    name: list-stale-artifacts
    visible: true
    tier: 1
    description: |
      List all artifacts marked as stale.

      Useful for finding what needs to be recomposed.
    params:
      - name: limit
        type: number
        required: false
        description: Maximum results (default 50)
    steps:
      - step: gather
        eidos: artifact
        where: "json_extract(data, '$.stale') = true"
        limit: "$limit"
        bind_to: stale_artifacts

      - step: return
        value:
          artifacts: "$stale_artifacts"
          count: "$stale_artifacts | length"

- eidos: praxis
  id: praxis/demiurge/refresh-stale
  data:
    oikos: demiurge
    name: refresh-stale
    visible: true
    tier: 2
    description: |
      Recompose a stale artifact using its stored definition and inputs.

      Reads the original typos_id and inputs from the artifact,
      then recomposes to refresh the content.
    params:
      - name: artifact_id
        type: string
        required: true
        description: The stale artifact to refresh
    steps:
      - step: find
        id: "$artifact_id"
        bind_to: artifact

      - step: assert
        condition: "$artifact"
        message: "Artifact not found: $artifact_id"

      - step: assert
        condition: "$artifact.data.stale"
        message: "Artifact is not stale: $artifact_id"

      # Recompose using stored definition and inputs
      - step: compose
        typos_id: "$artifact.data.typos_id"
        inputs: "$artifact.data.inputs"
        id: "$artifact_id"
        bind_to: refreshed

      # Mark as no longer stale
      - step: update
        id: "$artifact_id"
        data:
          stale: false
          composed_at: "{{ now() }}"

      - step: return
        value:
          refreshed: true
          artifact_id: "$artifact_id"

# =============================================================================
# OIKOS PACKAGING
# =============================================================================

- eidos: praxis
  id: praxis/demiurge/compose-oikos-dev
  data:
    oikos: demiurge
    name: compose-oikos-dev
    visible: true
    tier: 2
    description: |
      Compose an oikos-dev package from a genesis oikos.

      Takes an oikos_id (e.g., "nous", "demiurge") and:
      1. Finds the oikos entity and oikos-manifest
      2. Gathers all content (eide, desmoi, praxeis, stoicheia)
      3. Creates an oikos-dev entity with the complete package

      This is K3.1 — the first step in the oikos packaging pipeline:
        genesis/oikos/ → compose-oikos-dev → oikos-dev/{id}-{version}
                                                    ↓
                                              bake-oikos
                                                    ↓
                                              publish-oikos
                                                    ↓
                                              oikos-prod/{id}-{version}

      The resulting oikos-dev can be:
      - Baked (resolve generation specs to literals)
      - Published (sign and freeze as oikos-prod)
      - Shared as generative-commons (others can bake locally)
      - Forked (create derivative oikos-dev)
    params:
      - name: oikos_id
        type: string
        required: true
        description: The oikos to package (e.g., "nous", "demiurge", "politeia")
      - name: version
        type: string
        required: false
        description: Version override (defaults to manifest version)
      - name: description
        type: string
        required: false
        description: Description override (defaults to oikos description)
      - name: distribution
        type: string
        required: false
        description: "Distribution mode: generative-commons, binary-only, or private (default: binary-only)"
    steps:
      # Find the oikos entity
      - step: set
        bindings:
          oikos_entity_id: "oikos/$oikos_id"
          manifest_entity_id: "oikos-manifest/$oikos_id"

      - step: find
        id: "$oikos_entity_id"
        bind_to: oikos_entity

      - step: assert
        condition: "$oikos_entity"
        message: "Oikos not found: $oikos_id"

      # Find the oikos-manifest
      - step: find
        id: "$manifest_entity_id"
        bind_to: manifest_entity

      - step: assert
        condition: "$manifest_entity"
        message: "Oikos manifest not found: $oikos_id"

      # Gather all eide that belong to this oikos
      - step: gather
        eidos: eidos
        bind_to: all_eide

      - step: filter
        in: "$all_eide"
        as: e
        condition: "$e.data._genesis.oikos == '$oikos_id'"
        bind_to: oikos_eide

      # Gather all desmoi that belong to this oikos
      - step: gather
        eidos: desmos
        bind_to: all_desmoi

      - step: filter
        in: "$all_desmoi"
        as: d
        condition: "$d.data._genesis.oikos == '$oikos_id'"
        bind_to: oikos_desmoi

      # Gather all praxeis that belong to this oikos
      - step: gather
        eidos: praxis
        bind_to: all_praxeis

      - step: filter
        in: "$all_praxeis"
        as: p
        condition: "$p.data.oikos == '$oikos_id'"
        bind_to: oikos_praxeis

      # Gather all stoicheia that belong to this oikos
      - step: gather
        eidos: stoicheion
        bind_to: all_stoicheia

      - step: filter
        in: "$all_stoicheia"
        as: s
        condition: "$s.data._genesis.oikos == '$oikos_id'"
        bind_to: oikos_stoicheia

      # Resolve version (from param or manifest)
      - step: set
        bindings:
          effective_version: "$version ? $version : $manifest_entity.data.version"
          effective_description: "$description ? $description : $oikos_entity.data.description"
          effective_distribution: "$distribution ? $distribution : 'binary-only'"
          dev_id: "oikos-dev/$oikos_id-$effective_version"

      # Build content structure
      - step: set
        bindings:
          content:
            eide: "$oikos_eide"
            desmoi: "$oikos_desmoi"
            praxeis: "$oikos_praxeis"
            stoicheia: "$oikos_stoicheia"

      # Build manifest from manifest entity
      - step: set
        bindings:
          manifest:
            oikos_id: "$oikos_id"
            version: "$effective_version"
            requires_dynamis: "$manifest_entity.data.requires_dynamis"
            provides: "$manifest_entity.data.provides"
            stoicheia_form: "$manifest_entity.data.stoicheia_form"
            actuality_modes: "$manifest_entity.data.actuality_modes"

      # Compose the oikos-dev entity
      - step: compose
        typos_id: "typos-def-oikos-dev"
        inputs:
          id: "$dev_id"
          oikos_id: "$oikos_id"
          version: "$effective_version"
          description: "$effective_description"
          manifest: "$manifest"
          content: "$content"
          generation_specs: []
          status: "draft"
          distribution: "$effective_distribution"
          author_persona: "$dwelling.animus_id"
          created_at: "{{ now() }}"
        bind_to: dev_oikos

      # Bond to source oikos
      - step: bind
        from_id: "$dev_id"
        to_id: "$oikos_entity_id"
        desmos: "packages"

      - step: return
        value:
          oikos_dev_id: "$dev_id"
          oikos_id: "$oikos_id"
          version: "$effective_version"
          content_counts:
            eide: "$oikos_eide | length"
            desmoi: "$oikos_desmoi | length"
            praxeis: "$oikos_praxeis | length"
            stoicheia: "$oikos_stoicheia | length"
          status: "draft"
          distribution: "$effective_distribution"

- eidos: praxis
  id: praxis/demiurge/bake-oikos
  data:
    oikos: demiurge
    name: bake-oikos
    visible: true
    tier: 3
    description: |
      Bake an oikos-dev into frozen content ready for signing.

      Transforms generation specs into literals:
      1. Find oikos-dev entity
      2. Walk content looking for generation specs (caller: generated)
      3. For each spec, invoke manteia/governed-inference with locale context
      4. Replace spec with literal (caller: literal, value: generated_content)
      5. Compute content hash (BLAKE3)
      6. Return baked content with locale tag

      Does NOT create oikos-prod — use publish-oikos for that.
      This allows review of baked content before signing.

      **Bake-time Internationalization:**
      The same oikos-dev can be baked multiple times with different target_locale
      values, producing locale-specific oikos-prod versions:

        oikos-dev/mypackage-1.0.0
          ├── bake(locale: "en-US") → oikos-prod/mypackage-1.0.0-en-US
          ├── bake(locale: "zh-CN") → oikos-prod/mypackage-1.0.0-zh-CN
          └── bake(locale: "ar-SA") → oikos-prod/mypackage-1.0.0-ar-SA

      The locale is passed to manteia as context, influencing how generation
      specs are resolved. The baked output includes the locale tag.
    params:
      - name: oikos_dev_id
        type: string
        required: true
        description: The oikos-dev entity to bake
      - name: authorized_by
        type: string
        required: true
        description: Expression ID that authorizes this bake (for manteia calls)
      - name: target_locale
        type: string
        required: false
        description: |
          BCP 47 locale code (e.g., "en-US", "zh-CN", "ar-SA").
          If provided, generation specs receive locale context for i18n.
          Omit for locale-agnostic baking (default behavior).
    steps:
      # Find the dev oikos
      - step: find
        id: "$oikos_dev_id"
        bind_to: dev_oikos

      - step: assert
        condition: "$dev_oikos"
        message: "oikos-dev not found: $oikos_dev_id"

      - step: assert
        condition: "$dev_oikos.eidos == 'oikos-dev'"
        message: "Entity is not an oikos-dev: $oikos_dev_id"

      # Extract content and generation specs
      - step: set
        bindings:
          manifest: "$dev_oikos.data.manifest"
          content: "$dev_oikos.data.content"
          generation_specs: "$dev_oikos.data.generation_specs"
          baked_generations: []
          generation_hashes: []

      # Build locale context for generation (if target_locale provided)
      - step: set
        bindings:
          locale_context: |
            $target_locale ?
              "TARGET LOCALE: " + $target_locale + "\n\nGenerate all content in this locale. Use appropriate language, cultural conventions, and formatting for this region."
              : ""
          effective_locale: "$target_locale ? $target_locale : 'und'"  # 'und' = undetermined per BCP 47

      # Process each generation spec
      - step: for_each
        in: "$generation_specs"
        as: spec
        do:
          # Build locale-aware system prompt
          - step: set
            bindings:
              effective_system_prompt: |
                $locale_context ?
                  ($spec.system_prompt ? $spec.system_prompt + "\n\n" + $locale_context : $locale_context)
                  : $spec.system_prompt

          # Generate content via manteia with locale context
          - step: call
            praxis: "manteia/governed-inference"
            params:
              prompt: "$spec.prompt"
              system_prompt: "$effective_system_prompt"
              authorized_by: "$authorized_by"
              auto_approve: false
            bind_to: generation_result

          # Track the generation for audit
          - step: set
            bindings:
              baked_generations: "$baked_generations + [{ spec_id: $spec.id, generation_id: $generation_result.generation_id, content: $generation_result.response }]"

          # Hash the generated content for integrity tracking
          - step: digest
            input: "$generation_result.response"
            bind_to: gen_hash

          - step: set
            bindings:
              generation_hashes: "$generation_hashes + [$gen_hash]"

      # Build the baked content (all generation specs replaced with literals)
      - step: set
        bindings:
          baked_content:
            manifest: "$manifest"
            content: "$content"
            baked_specs: "$baked_generations"

      # Compute content hash of the entire baked package
      - step: set
        bindings:
          content_json: "$baked_content | to_json"

      - step: digest
        input: "$content_json"
        bind_to: content_hash

      - step: return
        value:
          oikos_dev_id: "$oikos_dev_id"
          baked_content: "$baked_content"
          content_hash: "$content_hash"
          generation_hashes: "$generation_hashes"
          generations_count: "$baked_generations | length"
          locale: "$effective_locale"
          ready_for_signing: true

- eidos: praxis
  id: praxis/demiurge/publish-oikos
  data:
    oikos: demiurge
    name: publish-oikos
    visible: true
    tier: 3
    description: |
      Publish an oikos-dev as oikos-prod.

      Complete publish flow:
      1. Bake the oikos-dev (resolve all generation specs)
      2. Sign the content hash with circle-scoped key
      3. Create oikos-prod entity with signature
      4. Create publish-attestation for audit trail
      5. Bond oikos-prod to dev and publisher

      Requires oikos-publish attainment.
    params:
      - name: oikos_dev_id
        type: string
        required: true
        description: The oikos-dev to publish
      - name: mnemonic
        type: string
        required: true
        description: BIP-39 mnemonic for signing
      - name: circle_id
        type: string
        required: true
        description: Circle context for key derivation
      - name: authorized_by
        type: string
        required: true
        description: Expression that authorizes this publication
      - name: attestation
        type: string
        required: false
        description: Optional attestation message from publisher
      - name: target_locale
        type: string
        required: false
        description: |
          BCP 47 locale code for bake-time i18n (e.g., "en-US", "zh-CN").
          If provided, produces a locale-specific oikos-prod.
          Omit for locale-agnostic publishing.
    steps:
      # Verify oikos-publish attainment (caller must have permission)
      # TODO: Add attainment check when attainment verification is implemented

      # Find the dev oikos
      - step: find
        id: "$oikos_dev_id"
        bind_to: dev_oikos

      - step: assert
        condition: "$dev_oikos"
        message: "oikos-dev not found: $oikos_dev_id"

      - step: assert
        condition: "$dev_oikos.data.status == 'ready_to_publish'"
        message: "oikos-dev is not ready to publish (status must be 'ready_to_publish')"

      # Bake the oikos (with optional locale for i18n)
      - step: call
        praxis: "demiurge/bake-oikos"
        params:
          oikos_dev_id: "$oikos_dev_id"
          authorized_by: "$authorized_by"
          target_locale: "$target_locale"
        bind_to: bake_result

      # Derive circle key
      - step: call
        praxis: "hypostasis/derive-circle-key"
        params:
          mnemonic: "$mnemonic"
          circle_id: "$circle_id"
        bind_to: key_result

      # Sign the content hash
      - step: call
        praxis: "hypostasis/sign-content"
        params:
          mnemonic: "$mnemonic"
          circle_id: "$circle_id"
          content: "$bake_result.content_hash"
        bind_to: sign_result

      # Create oikos-prod entity
      # ID includes locale suffix when present (e.g., mypackage-1.0.0-zh-CN)
      - step: set
        bindings:
          locale_suffix: "$bake_result.locale != 'und' ? '-' + $bake_result.locale : ''"
          prod_id: "oikos-prod/$dev_oikos.data.oikos_id-$dev_oikos.data.version$locale_suffix"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-oikos-prod"
        inputs:
          id: "$prod_id"
          oikos_id: "$dev_oikos.data.oikos_id"
          version: "$dev_oikos.data.version"
          locale: "$bake_result.locale"
          manifest: "$bake_result.baked_content.manifest"
          content: "$bake_result.baked_content.content"
          content_hash: "$bake_result.content_hash"
          signature: "$sign_result.signature"
          publisher_pubkey: "$key_result.public_key"
          baked_from: "$oikos_dev_id"
          published_at: "{{ now() }}"
        bind_to: prod_oikos

      # Create publish-attestation (includes locale suffix when present)
      - step: set
        bindings:
          attestation_id: "publish-attestation/$dev_oikos.data.oikos_id-$dev_oikos.data.version$locale_suffix"

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-publish-attestation"
        inputs:
          id: "$attestation_id"
          dev_oikos_id: "$oikos_dev_id"
          prod_oikos_id: "$prod_id"
          publisher_persona: "$dwelling.animus_id"
          publisher_pubkey: "$key_result.public_key"
          attestation: "$attestation"
          published_at: "{{ now() }}"
          dev_version: "$dev_oikos.data.version"
          locale: "$bake_result.locale"
          generation_hashes: "$bake_result.generation_hashes"
        bind_to: attestation_entity

      # Bond relationships
      - step: bind
        from_id: "$prod_id"
        to_id: "$oikos_dev_id"
        desmos: "baked-from"

      - step: bind
        from_id: "$prod_id"
        to_id: "$dwelling.animus_id"
        desmos: "published-by"

      - step: bind
        from_id: "$attestation_id"
        to_id: "$prod_id"
        desmos: "attests-to"

      - step: return
        value:
          published: true
          prod_oikos_id: "$prod_id"
          attestation_id: "$attestation_id"
          content_hash: "$bake_result.content_hash"
          signature: "$sign_result.signature"
          publisher_pubkey: "$key_result.public_key"
          locale: "$bake_result.locale"

- eidos: praxis
  id: praxis/demiurge/verify-oikos
  data:
    oikos: demiurge
    name: verify-oikos
    visible: true
    tier: 2
    description: |
      Verify an oikos-prod package.

      Checks:
      1. Content hash matches declared hash
      2. Signature is valid for the content hash
      3. Publisher pubkey matches signature

      Does NOT verify full provenance chain (use dokimasia for that).
    params:
      - name: oikos_prod_id
        type: string
        required: true
        description: The oikos-prod to verify
    steps:
      - step: find
        id: "$oikos_prod_id"
        bind_to: prod_oikos

      - step: assert
        condition: "$prod_oikos"
        message: "oikos-prod not found: $oikos_prod_id"

      - step: assert
        condition: "$prod_oikos.eidos == 'oikos-prod'"
        message: "Entity is not an oikos-prod: $oikos_prod_id"

      # Recompute content hash
      - step: set
        bindings:
          content_to_hash:
            manifest: "$prod_oikos.data.manifest"
            content: "$prod_oikos.data.content"
          content_json: "$content_to_hash | to_json"

      - step: digest
        input: "$content_json"
        bind_to: computed_hash

      # Verify hash matches
      - step: set
        bindings:
          hash_valid: "$computed_hash == $prod_oikos.data.content_hash"

      - step: switch
        cases:
          - when: "not $hash_valid"
            then:
              - step: return
                value:
                  valid: false
                  error: "Content hash mismatch"
                  declared_hash: "$prod_oikos.data.content_hash"
                  computed_hash: "$computed_hash"

      # Verify signature
      - step: call
        praxis: "hypostasis/verify-signature"
        params:
          content: "$prod_oikos.data.content_hash"
          signature: "$prod_oikos.data.signature"
          public_key: "$prod_oikos.data.publisher_pubkey"
        bind_to: sig_result

      - step: switch
        cases:
          - when: "not $sig_result.valid"
            then:
              - step: return
                value:
                  valid: false
                  error: "Invalid signature"
                  content_hash: "$prod_oikos.data.content_hash"

      - step: return
        value:
          valid: true
          oikos_prod_id: "$oikos_prod_id"
          content_hash: "$prod_oikos.data.content_hash"
          publisher_pubkey: "$prod_oikos.data.publisher_pubkey"

- eidos: praxis
  id: praxis/demiurge/validate-oikos
  data:
    oikos: demiurge
    name: validate-oikos
    visible: true
    tier: 2
    description: |
      Validate an oikos and all its contained definitions.

      Checks:
      - All eide have valid field definitions
      - All praxeis reference valid stoicheia
      - All desmoi reference valid eide (in this oikos or existing)
      - Cross-references resolve

      Updates oikos status to 'valid' or leaves as 'composing' with errors.
    params:
      - name: oikos_id
        type: string
        required: true
        description: The oikos to validate
    steps:
      - step: find
        entity_id: "$oikos_id"
        bind_to: oikos

      - step: assert
        condition: "$oikos"
        message: "Oikos not found: $oikos_id"

      # Update status to validating
      - step: update
        id: "$oikos.id"
        data:
          status: validating

      # Gather all contained definitions
      - step: trace
        from_id: "$oikos.id"
        desmos: contains
        resolve: to
        bind_to: all_definitions

      - step: set
        bindings:
          errors: []
          eide: []
          praxeis: []
          desmoi: []

      # Categorize by type
      - step: for_each
        items: "$all_definitions"
        as: def
        do:
          - step: switch
            cases:
              - when: '$def.eidos == "eidos"'
                then:
                  - step: append
                    to: "$eide"
                    value: "$def"
                    bind_to: eide
              - when: '$def.eidos == "praxis"'
                then:
                  - step: append
                    to: "$praxeis"
                    value: "$def"
                    bind_to: praxeis
              - when: '$def.eidos == "desmos"'
                then:
                  - step: append
                    to: "$desmoi"
                    value: "$def"
                    bind_to: desmoi

      # =============================================================================
      # PRAXIS VALIDATION — Steps, Anti-Patterns, Dynamis Inference
      # =============================================================================

      - step: set
        bindings:
          warnings: []
          max_tier: 0
          inferred_dynamis: []
          detected_surfaces: []

      - step: for_each
        items: "$praxeis"
        as: praxis
        do:
          - step: for_each
            items: "$praxis.data.steps"
            as: step_def
            do:
              # Look up the stoicheion definition
              - step: find
                entity_id: "stoicheion/$step_def.step"
                bind_to: stoicheion

              # Check if stoicheion exists
              - step: switch
                cases:
                  - when: "!$stoicheion"
                    then:
                      - step: append
                        to: "$errors"
                        value:
                          type: unknown-stoicheion
                          praxis: "$praxis.id"
                          step: "$step_def.step"
                          message: "Unknown stoicheion: $step_def.step"
                        bind_to: errors

              # Anti-pattern: raw arise
              - step: switch
                cases:
                  - when: '$step_def.step == "arise"'
                    then:
                      - step: append
                        to: "$warnings"
                        value:
                          type: anti-pattern
                          praxis: "$praxis.id"
                          step: "arise"
                          message: "Use 'compose' with a typos instead of raw 'arise'"
                          guidance: "compose provides provenance tracking via composed-from bonds"
                        bind_to: warnings

              # Anti-pattern: raw infer
              - step: switch
                cases:
                  - when: '$step_def.step == "infer"'
                    then:
                      - step: append
                        to: "$warnings"
                        value:
                          type: anti-pattern
                          praxis: "$praxis.id"
                          step: "infer"
                          message: "Use 'call manteia/governed-inference' instead of raw 'infer'"
                          guidance: "governed-inference provides schema validation and evaluation"
                        bind_to: warnings

              # Track max tier for dynamis inference
              - step: switch
                cases:
                  - when: "$stoicheion and $stoicheion.data.tier > $max_tier"
                    then:
                      - step: set
                        bindings:
                          max_tier: "$stoicheion.data.tier"

              # Detect surfaces based on stoicheia
              - step: switch
                cases:
                  - when: '$step_def.step == "emit"'
                    then:
                      - step: switch
                        cases:
                          - when: '"emission" not in $detected_surfaces'
                            then:
                              - step: append
                                to: "$detected_surfaces"
                                value: "emission"
                                bind_to: detected_surfaces
                  - when: '$step_def.step == "signal"'
                    then:
                      - step: switch
                        cases:
                          - when: '"transport" not in $detected_surfaces'
                            then:
                              - step: append
                                to: "$detected_surfaces"
                                value: "transport"
                                bind_to: detected_surfaces

              # Detect reasoning surface from praxis calls
              - step: switch
                cases:
                  - when: '$step_def.step == "call" and $step_def.praxis and "manteia" in $step_def.praxis'
                    then:
                      - step: switch
                        cases:
                          - when: '"reasoning" not in $detected_surfaces'
                            then:
                              - step: append
                                to: "$detected_surfaces"
                                value: "reasoning"
                                bind_to: detected_surfaces
                  - when: '$step_def.step == "call" and $step_def.praxis and "nous" in $step_def.praxis'
                    then:
                      - step: switch
                        cases:
                          - when: '"understanding" not in $detected_surfaces'
                            then:
                              - step: append
                                to: "$detected_surfaces"
                                value: "understanding"
                                bind_to: detected_surfaces

      # Infer dynamis requirements from max tier
      - step: switch
        cases:
          - when: "$max_tier >= 3"
            then:
              - step: set
                bindings:
                  inferred_dynamis: ["chora"]
          - when: "$max_tier >= 2"
            then:
              - step: set
                bindings:
                  inferred_dynamis: ["kosmos"]

      # Compare inferred vs declared dynamis
      - step: switch
        cases:
          - when: '$inferred_dynamis | length > 0 and (!$oikos.data.requires_dynamis or $oikos.data.requires_dynamis | length == 0)'
            then:
              - step: append
                to: "$warnings"
                value:
                  type: missing-dynamis
                  message: "Oikos uses tier $max_tier stoicheia but declares no requires_dynamis"
                  inferred: "$inferred_dynamis"
                  guidance: "Add requires_dynamis to oikos manifest for substrate compatibility"
                bind_to: warnings

      # =============================================================================
      # DESMOS VALIDATION — from_eidos and to_eidos references
      # =============================================================================

      # Gather all known eide for reference checking
      - step: gather
        eidos: "eidos"
        bind_to: all_known_eide

      - step: set
        bindings:
          known_eidos_names: []

      - step: for_each
        items: "$all_known_eide"
        as: e
        do:
          - step: append
            to: "$known_eidos_names"
            value: "$e.id"
            bind_to: known_eidos_names

      # Also add eide being defined in this oikos
      - step: for_each
        items: "$eide"
        as: e
        do:
          - step: append
            to: "$known_eidos_names"
            value: "$e.id"
            bind_to: known_eidos_names

      # Validate desmoi references
      - step: for_each
        items: "$desmoi"
        as: desmos
        do:
          # Check from_eidos references (if array)
          - step: switch
            cases:
              - when: "$desmos.data.from_eidos"
                then:
                  - step: for_each
                    items: "$desmos.data.from_eidos"
                    as: from_e
                    do:
                      - step: switch
                        cases:
                          - when: '$from_e != "any" and "eidos/$from_e" not in $known_eidos_names and $from_e not in $known_eidos_names'
                            then:
                              - step: append
                                to: "$warnings"
                                value:
                                  type: unknown-eidos-reference
                                  desmos: "$desmos.id"
                                  field: "from_eidos"
                                  reference: "$from_e"
                                  message: "Desmos references unknown eidos: $from_e"
                                bind_to: warnings

      # =============================================================================
      # DETERMINE FINAL STATUS
      # =============================================================================

      - step: set
        bindings:
          is_valid: "$errors | length == 0"

      - step: switch
        cases:
          - when: "$is_valid"
            then:
              - step: update
                id: "$oikos.id"
                data:
                  status: valid
                  validation_errors: []
                  surfaces: "$detected_surfaces"
          - when: "!$is_valid"
            then:
              - step: update
                id: "$oikos.id"
                data:
                  status: composing
                  validation_errors: "$errors"
                  surfaces: "$detected_surfaces"

      - step: return
        value:
          valid: "$is_valid"
          errors: "$errors"
          warnings: "$warnings"
          inferred_dynamis: "$inferred_dynamis"
          detected_surfaces: "$detected_surfaces"
          summary:
            eide: "$eide | length"
            praxeis: "$praxeis | length"
            desmoi: "$desmoi | length"
            max_stoicheion_tier: "$max_tier"

- eidos: praxis
  id: praxis/demiurge/discover-stoicheia
  data:
    oikos: demiurge
    name: discover-stoicheia
    visible: true
    tier: 1
    description: |
      Discover available stoicheia for composing praxeis.

      Returns stoicheia grouped by tier. Each stoicheion has:
      - tier: dynamis requirement (0-3)
      - fields: parameter schema
      - description: usage guidance

      Use this to understand what steps are available when composing praxeis.
    params:
      - name: tier
        type: integer
        required: false
        description: Filter by tier (0, 1, 2, or 3)
    steps:
      - step: gather
        eidos: "stoicheion"
        bind_to: all_stoicheia

      - step: switch
        cases:
          - when: "$tier != null"
            then:
              - step: filter
                items: "$all_stoicheia"
                condition: "$item.data.tier == $tier"
                bind_to: all_stoicheia

      # Group by tier for display
      - step: set
        bindings:
          tier_0: []
          tier_1: []
          tier_2: []
          tier_3: []

      - step: for_each
        items: "$all_stoicheia"
        as: s
        do:
          - step: switch
            cases:
              - when: "$s.data.tier == 0"
                then:
                  - step: append
                    to: "$tier_0"
                    value: "$s"
                    bind_to: tier_0
              - when: "$s.data.tier == 1"
                then:
                  - step: append
                    to: "$tier_1"
                    value: "$s"
                    bind_to: tier_1
              - when: "$s.data.tier == 2"
                then:
                  - step: append
                    to: "$tier_2"
                    value: "$s"
                    bind_to: tier_2
              - when: "$s.data.tier == 3"
                then:
                  - step: append
                    to: "$tier_3"
                    value: "$s"
                    bind_to: tier_3

      - step: return
        value:
          total: "$all_stoicheia | length"
          by_tier:
            tier_0_elemental: "$tier_0"
            tier_1_aggregate: "$tier_1"
            tier_2_compositional: "$tier_2"
            tier_3_generative: "$tier_3"
          tier_summary:
            tier_0: "$tier_0 | length"
            tier_1: "$tier_1 | length"
            tier_2: "$tier_2 | length"
            tier_3: "$tier_3 | length"

- eidos: praxis
  id: praxis/demiurge/discover-typos
  data:
    oikos: demiurge
    name: discover-typos
    visible: true
    tier: 1
    description: |
      Discover available typos (composition templates).

      Returns typos grouped by category. Each typos has:
      - target_eidos: what entity type it creates
      - defaults: default field values
      - description: usage guidance

      Use this to understand what composition templates are available.
    params:
      - name: target_eidos
        type: string
        required: false
        description: Filter by target eidos (e.g., "theoria", "circle")
    steps:
      - step: gather
        eidos: "typos"
        bind_to: all_typos

      - step: switch
        cases:
          - when: "$target_eidos"
            then:
              - step: filter
                items: "$all_typos"
                condition: "$item.data.target_eidos == $target_eidos"
                bind_to: all_typos

      # Categorize: constitutional vs domain
      - step: set
        bindings:
          constitutional: []
          domain: []

      - step: for_each
        items: "$all_typos"
        as: t
        do:
          - step: switch
            cases:
              - when: '$t.id == "typos-def-eidos" or $t.id == "typos-def-praxis" or $t.id == "typos-def-desmos" or $t.id == "typos-def-oikos" or $t.id == "typos-def-typos"'
                then:
                  - step: append
                    to: "$constitutional"
                    value: "$t"
                    bind_to: constitutional
            default:
              - step: append
                to: "$domain"
                value: "$t"
                bind_to: domain

      - step: return
        value:
          total: "$all_typos | length"
          constitutional: "$constitutional"
          domain: "$domain"
          summary:
            constitutional_count: "$constitutional | length"
            domain_count: "$domain | length"

- eidos: praxis
  id: praxis/demiurge/discover-desmoi
  data:
    oikos: demiurge
    name: discover-desmoi
    visible: true
    tier: 1
    description: |
      Discover available desmoi (bond types).

      Returns desmoi with their constraints. Each desmos has:
      - from_eidos, to_eidos: what can be connected
      - cardinality: relationship constraints
      - description: semantic meaning

      Use this to understand what relationships are available.
    params:
      - name: from_eidos
        type: string
        required: false
        description: Filter by source eidos
      - name: to_eidos
        type: string
        required: false
        description: Filter by target eidos
    steps:
      - step: gather
        eidos: "desmos"
        bind_to: all_desmoi

      # Filter by from_eidos if provided
      - step: switch
        cases:
          - when: "$from_eidos"
            then:
              - step: filter
                items: "$all_desmoi"
                condition: '$from_eidos in $item.data.from_eidos or $item.data.from_eidos == "any"'
                bind_to: all_desmoi

      # Filter by to_eidos if provided
      - step: switch
        cases:
          - when: "$to_eidos"
            then:
              - step: filter
                items: "$all_desmoi"
                condition: '$to_eidos in $item.data.to_eidos or $item.data.to_eidos == "any"'
                bind_to: all_desmoi

      - step: return
        value:
          total: "$all_desmoi | length"
          desmoi: "$all_desmoi"

- eidos: praxis
  id: praxis/demiurge/sense-development
  data:
    oikos: demiurge
    name: sense-development
    visible: false  # Internal, called by sense-body
    tier: 1
    description: |
      Sense development state for body-schema contribution.

      Aggregates:
      - Active oikoi the animus is developing
      - Definition counts (eide, praxeis, desmoi) for each
      - Palette awareness (stoicheia tiers, typos, desmoi counts)
      - Pending actions (validation, emission opportunities)

      This is called by soma/sense-body to include development state.
    params: []
    steps:
      # Trace developing bonds from animus to find active oikoi
      - step: trace
        from_id: "$_animus.id"
        desmos: developing
        resolve: to
        bind_to: developing_oikoi

      # Build active oikoi list with definition counts
      - step: set
        bindings:
          active_oikoi: []
          needs_validation: 0
          ready_to_emit: 0

      - step: for_each
        items: "$developing_oikoi"
        as: oikos
        do:
          # Get all contained definitions
          - step: trace
            from_id: "$oikos.id"
            desmos: contains
            resolve: to
            bind_to: definitions

          # Count by type
          - step: filter
            items: "$definitions"
            condition: '$item.eidos == "eidos"'
            bind_to: eide

          - step: filter
            items: "$definitions"
            condition: '$item.eidos == "praxis"'
            bind_to: praxeis

          - step: filter
            items: "$definitions"
            condition: '$item.eidos == "desmos"'
            bind_to: desmoi

          # Track validation/emission status
          - step: switch
            cases:
              - when: '$oikos.data.status == "composing"'
                then:
                  - step: set
                    bindings:
                      needs_validation: "$needs_validation + 1"
              - when: '$oikos.data.status == "valid"'
                then:
                  - step: set
                    bindings:
                      ready_to_emit: "$ready_to_emit + 1"

          # Add to active oikoi list
          - step: append
            to: "$active_oikoi"
            value:
              id: "$oikos.id"
              name: "$oikos.data.name"
              status: "$oikos.data.status"
              scale: "$oikos.data.scale"
              eide_count: "$eide | length"
              praxeis_count: "$praxeis | length"
              desmoi_count: "$desmoi | length"
            bind_to: active_oikoi

      # Gather palette awareness
      - step: gather
        eidos: "stoicheion"
        bind_to: all_stoicheia

      - step: gather
        eidos: "typos"
        bind_to: all_typos

      - step: gather
        eidos: "desmos"
        bind_to: all_desmoi

      # Count stoicheia by tier
      - step: filter
        items: "$all_stoicheia"
        condition: "$item.data.tier == 0"
        bind_to: tier_0

      - step: filter
        items: "$all_stoicheia"
        condition: "$item.data.tier == 1"
        bind_to: tier_1

      - step: filter
        items: "$all_stoicheia"
        condition: "$item.data.tier == 2"
        bind_to: tier_2

      - step: filter
        items: "$all_stoicheia"
        condition: "$item.data.tier == 3"
        bind_to: tier_3

      # Build pending actions list
      - step: set
        bindings:
          pending_actions: []

      - step: switch
        cases:
          - when: "$needs_validation > 0"
            then:
              - step: append
                to: "$pending_actions"
                value:
                  action: "validate-oikos"
                  reason: "$needs_validation oikos in 'composing' status need validation"
                bind_to: pending_actions

      - step: switch
        cases:
          - when: "$ready_to_emit > 0"
            then:
              - step: append
                to: "$pending_actions"
                value:
                  action: "emit-oikos"
                  reason: "$ready_to_emit oikos are validated and ready to emit"
                bind_to: pending_actions

      - step: return
        value:
          active_oikoi: "$active_oikoi"
          oikoi_count: "$active_oikoi | length"
          palette_awareness:
            stoicheia:
              total: "$all_stoicheia | length"
              tier_0_elemental: "$tier_0 | length"
              tier_1_aggregate: "$tier_1 | length"
              tier_2_compositional: "$tier_2 | length"
              tier_3_generative: "$tier_3 | length"
            typos_count: "$all_typos | length"
            desmoi_count: "$all_desmoi | length"
          pending_actions: "$pending_actions"
          status_summary:
            needs_validation: "$needs_validation"
            ready_to_emit: "$ready_to_emit"

# =============================================================================
# VALIDATION
# =============================================================================

- eidos: praxis
  id: praxis/demiurge/validate-praxis
  data:
    oikos: demiurge
    name: validate-praxis
    visible: false  # Internal, invoked by reflex
    tier: 2
    description: |
      Validate praxis steps against stoicheion schemas.

      Called by reflex/demiurge/praxis-changed.
      Catches authoring errors early.
    params:
      - name: praxis_id
        type: string
        required: true
        description: Praxis ID to validate
    steps:
      - step: find
        id: "$praxis_id"
        bind_to: praxis

      # Validate each step against stoicheion schema
      - step: set
        bindings:
          errors: []

      - step: for_each
        items: "$praxis.data.steps"
        item_var: step_def
        steps:
          - step: try
            do:
              - step: find
                id: "eidos/stoicheion/$step_def.step"
                bind_to: stoicheion
            catch:
              - step: append
                to: errors
                value:
                  step: "$step_def.step"
                  error: "Unknown stoicheion: $step_def.step"

      - step: switch
        cases:
          - when: "$errors | length > 0"
            then:
              - step: log
                message: "Praxis $praxis_id has validation errors"
                level: warn

      - step: return
        value:
          praxis_id: "$praxis_id"
          valid: "$errors | length == 0"
          errors: "$errors"

# =============================================================================
# GENERATIVE DEVELOPMENT SPIRAL — Generation
# =============================================================================
#
# These praxeis implement the canonical generation workflow:
# 1. Compose inference context (from typos-inference-*)
# 2. Surface domain theoria
# 3. Call governed-inference
# 4. Create entity from generated content
# 5. Bond provenance (informed-by)
#
# Uses typos from genesis/spora/definitions/oikos-generation.yaml

- eidos: praxis
  id: praxis/demiurge/generate-eidos
  data:
    oikos: demiurge
    name: generate-eidos
    visible: true
    tier: 3  # Requires inference (actuality)
    description: |
      Generate an eidos definition using inference-context.

      The whole eidos (name, description, fields) is generated as a coherent
      unit. Domain theoria informs the generation for consistency with
      existing ontological patterns.

      Returns an artifact containing the generated eidos definition,
      which can then be actualized into the kosmos.
    params:
      - name: name
        type: string
        required: true
        description: The eidos name (lowercase, no spaces)
      - name: purpose
        type: string
        required: true
        description: What ontological gap does this eidos address?
      - name: domain
        type: string
        required: false
        description: Domain to surface theoria from (e.g., 'cooking', 'governance')
      - name: field_hints
        type: array
        required: false
        description: Optional hints about what fields should exist
      - name: existing_eide
        type: array
        required: false
        description: Entity IDs of related eide to consider for consistency
      - name: evaluate
        type: boolean
        required: false
        default: true
        description: Whether to evaluate output against criteria
    steps:
      # Step 1: Compose inference context
      - step: compose
        typos_id: typos-inference-eidos
        inputs:
          name: "$name"
          purpose: "$purpose"
          domain: "$domain"
          field_hints: "$field_hints"
          existing_eide: "$existing_eide"
        bind_to: context

      # Step 2: Surface domain theoria
      - step: switch
        cases:
          - when: "$domain"
            then:
              - step: surface
                query: "$domain ontology eidos"
                eidos: theoria
                limit: 5
                bind_to: theoria
        default:
          - step: set
            bindings:
              theoria: []

      # Step 3: Build prompt with theoria
      - step: set
        bindings:
          theoria_context: ""

      - step: switch
        cases:
          - when: "$theoria | length > 0"
            then:
              - step: map
                items: "$theoria"
                as: t
                transform: "{{ $t.data.insight }}"
                bind_to: insights

              - step: set
                bindings:
                  theoria_context: |
                    Relevant understanding from the kosmos:
                    {{ $insights | join("\n- ") }}

      - step: set
        bindings:
          full_prompt: |
            {{ $context.data.request }}

            {{ $theoria_context }}

      # Step 4: Call governed inference
      - step: call
        praxis: manteia/governed-inference
        params:
          prompt: "$full_prompt"
          system_prompt: "$context.data.role"
          output_schema: "$context.data.output_schema"
          evaluate: "$evaluate"
          criteria:
            - name: ontological_coherence
              description: "Does this eidos have a clear ontological purpose?"
              weight: 1.0
            - name: field_completeness
              description: "Are the fields sufficient to represent the concept?"
              weight: 0.8
            - name: naming_consistency
              description: "Does naming follow kosmos conventions?"
              weight: 0.6
        bind_to: generated

      # Step 5: Create artifact with generated content
      - step: compose
        typos_id: typos-def-artifact
        inputs:
          id: "artifact/eidos-$name"
          title: "Eidos: $name"
          kind: definition
          domain: "$domain"
          content: "$generated.content"
        bind_to: artifact

      # Step 6: Bond provenance
      - step: for_each
        items: "$theoria"
        as: t
        steps:
          - step: bind
            from: "$artifact.id"
            to: "$t.id"
            desmos: informed-by

      # Step 7: Return
      - step: return
        value:
          artifact: "$artifact"
          generated: "$generated.content"
          verdict: "$generated.verdict"
          informed_by: "$theoria | map(.id)"

- eidos: praxis
