# =============================================================================
# GENERATIVE DEVELOPMENT SPIRAL — Actualization & Workflow
# =============================================================================
#
# The master workflow for developing an oikos from specification to actuality.
# This is the compound leverage pattern — each step informs the next,
# and provenance accumulates for future learning.

- eidos: praxis
  id: praxis/demiurge/develop-oikos-from-design
  data:
    oikos: demiurge
    name: develop-oikos-from-design
    visible: true
    tier: 3
    description: |
      Develop an oikos from an existing DESIGN.md document.

      Takes a design document and generates all components.
      Use this when you have a detailed design spec ready.

      The design document is parsed to extract structured specs,
      then each component is generated through the inference-context
      pipeline with provenance tracking.
    params:
      - name: design_content
        type: string
        required: true
        description: The design document content (markdown)
      - name: oikos_name
        type: string
        required: true
        description: The oikos name
      - name: actualize
        type: boolean
        required: false
        default: false
        description: Whether to actualize entities
    steps:
      # Parse the design document to extract structured info
      - step: call
        praxis: manteia/governed-inference
        params:
          prompt: |
            Parse this oikos design document and extract a structured specification.

            Design document:
            {{ $design_content }}

            Extract:
            - purpose: The main purpose/gap this oikos addresses
            - scale: The klimax scale (kosmos, polis, oikos, soma, psyche)
            - eide: List of {name, purpose, key_fields, source?} — set source if defined elsewhere
            - praxeis: List of {name, purpose, params, namespace?} — set namespace if different from oikos
            - desmoi: List of {name, from, to, purpose, source?} — set source if defined elsewhere
            - attainments: List of {name, purpose, grants, source?} — set source if defined elsewhere
            - dependencies: List of other oikoi this depends on

            Important patterns:
            - If eidos says "(from X)" or "(defined in X)", set source: X
            - If attainment says "(defined in X)", set source: X
            - If praxeis are in another namespace, set namespace field
          output_schema:
            type: object
            properties:
              purpose:
                type: string
              scale:
                type: string
              eide:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    purpose:
                      type: string
                    key_fields:
                      type: array
                      items:
                        type: string
                    source:
                      type: string
                      description: "Oikos that defines this eidos, if external"
              praxeis:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    purpose:
                      type: string
                    params:
                      type: array
                      items:
                        type: string
                    namespace:
                      type: string
                      description: "Override namespace if different from oikos name"
              desmoi:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    from:
                      type: string
                    to:
                      type: string
                    purpose:
                      type: string
                    source:
                      type: string
                      description: "Oikos that defines this desmos, if external"
              attainments:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    purpose:
                      type: string
                    grants:
                      type: array
                      items:
                        type: string
                    source:
                      type: string
                      description: "Oikos that defines this attainment, if external"
              dependencies:
                type: array
                items:
                  type: string
            required: [purpose]
        bind_to: parsed

      # Store the parsed design as an artifact
      - step: compose
        typos_id: typos-def-artifact
        inputs:
          id: "artifact/oikos-$oikos_name-design"
          title: "Oikos Design: $oikos_name"
          kind: design
          domain: "oikos"
          content: "$parsed.content"
        bind_to: design_artifact

      # Now generate each component using the parsed design
      - step: set
        bindings:
          design: "$parsed.content"
          eidos_artifacts: []
          praxis_artifacts: []
          desmos_artifacts: []
          external_eide: []
          external_desmoi: []

      # Filter eide: local vs external
      - step: switch
        cases:
          - when: "$design.eide"
            then:
              - step: filter
                items: "$design.eide"
                condition: "not $item.source"
                bind_to: local_eide
              - step: filter
                items: "$design.eide"
                condition: "$item.source"
                bind_to: external_eide
        default:
          - step: set
            bindings:
              local_eide: []

      # Generate local eide only
      - step: for_each
        items: "$local_eide"
        as: eidos_spec
        steps:
          - step: call
            praxis: demiurge/generate-eidos
            params:
              name: "$eidos_spec.name"
              purpose: "$eidos_spec.purpose"
              domain: "$oikos_name"
              field_hints: "$eidos_spec.key_fields"
            bind_to: result

          - step: append
            to: eidos_artifacts
            value: "$result.artifact"

          - step: bind
            from: "$result.artifact.id"
            to: "$design_artifact.id"
            desmos: composed-from

      # Generate praxeis (handle namespace override)
      - step: switch
        cases:
          - when: "$design.praxeis"
            then:
              - step: for_each
                items: "$design.praxeis"
                as: praxis_spec
                steps:
                  - step: set
                    bindings:
                      praxis_oikos: "$praxis_spec.namespace or $oikos_name"

                  - step: call
                    praxis: demiurge/generate-praxis
                    params:
                      name: "$praxis_spec.name"
                      oikos: "$praxis_oikos"
                      purpose: "$praxis_spec.purpose"
                      params_spec: "$praxis_spec.params"
                      domain: "$oikos_name"
                    bind_to: result

                  - step: append
                    to: praxis_artifacts
                    value: "$result.artifact"

                  - step: bind
                    from: "$result.artifact.id"
                    to: "$design_artifact.id"
                    desmos: composed-from

      # Generate desmoi (filter out external)
      - step: switch
        cases:
          - when: "$design.desmoi"
            then:
              - step: filter
                items: "$design.desmoi"
                condition: "not $item.source"
                bind_to: local_desmoi
              - step: filter
                items: "$design.desmoi"
                condition: "$item.source"
                bind_to: external_desmoi

              - step: for_each
                items: "$local_desmoi"
                as: desmos_spec
                steps:
                  - step: call
                    praxis: demiurge/generate-desmos
                    params:
                      name: "$desmos_spec.name"
                      purpose: "$desmos_spec.purpose"
                      from_eidos: "$desmos_spec.from"
                      to_eidos: "$desmos_spec.to"
                      domain: "$oikos_name"
                    bind_to: result

                  - step: append
                    to: desmos_artifacts
                    value: "$result.artifact"

                  - step: bind
                    from: "$result.artifact.id"
                    to: "$design_artifact.id"
                    desmos: composed-from

      # Actualize if requested
      - step: set
        bindings:
          actualized: []

      - step: switch
        cases:
          - when: "$actualize"
            then:
              - step: for_each
                items: "$eidos_artifacts"
                as: artifact
                steps:
                  - step: call
                    praxis: demiurge/actualize-eidos
                    params:
                      artifact_id: "$artifact.id"
                      oikos_id: "oikos/$oikos_name"
                    bind_to: result
                  - step: append
                    to: actualized
                    value: "$result"

              - step: for_each
                items: "$praxis_artifacts"
                as: artifact
                steps:
                  - step: call
                    praxis: demiurge/actualize-praxis
                    params:
                      artifact_id: "$artifact.id"
                    bind_to: result
                  - step: append
                    to: actualized
                    value: "$result"

              - step: for_each
                items: "$desmos_artifacts"
                as: artifact
                steps:
                  - step: call
                    praxis: demiurge/actualize-desmos
                    params:
                      artifact_id: "$artifact.id"
                    bind_to: result
                  - step: append
                    to: actualized
                    value: "$result"

      - step: return
        value:
          oikos_name: "$oikos_name"
          design_artifact: "$design_artifact"
          design: "$design"
          artifacts:
            eide: "$eidos_artifacts"
            praxeis: "$praxis_artifacts"
            desmoi: "$desmos_artifacts"
          external:
            eide: "$external_eide"
            desmoi: "$external_desmoi"
          actualized: "$actualized"
