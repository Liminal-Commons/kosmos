# Demiurge Desmoi
# Artifact dependency tracking bonds
#
# Extracted from spora.yaml stage-1-desmoi
# NOTE: depends-on is shared with nous (journey dependencies)

entities:
  # depends-on — artifact depends on entity (cache invalidation)
  - eidos: desmos
    id: desmos/depends-on
    data:
      name: depends-on
      description: "Artifact depends on entity. Used for cache invalidation. Also used for journey dependencies."
      from_eidos: any
      to_eidos: any
      cardinality: many-to-many
      symmetric: false

  # packages — topos-dev packages a topos
  - eidos: desmos
    id: desmos/packages
    data:
      name: packages
      description: |
        A topos-dev packages a source topos. This bond tracks which
        development package was composed from which genesis topos.
      from_eidos: topos-dev
      to_eidos: topos
      cardinality: many-to-one
      symmetric: false

  # baked-from — topos-prod was baked from topos-dev
  - eidos: desmos
    id: desmos/baked-from
    data:
      name: baked-from
      description: |
        A topos-prod was baked (generation specs resolved) from a topos-dev.
        Provides provenance from published package to development source.
      from_eidos: topos-prod
      to_eidos: topos-dev
      cardinality: many-to-one
      symmetric: false

  # published-by — topos-prod was published by a parousia
  - eidos: desmos
    id: desmos/published-by
    data:
      name: published-by
      description: |
        A topos-prod was published by a parousia (prosopon in oikos).
        Tracks who signed and released the package.
      from_eidos: topos-prod
      to_eidos: parousia
      cardinality: many-to-one
      symmetric: false

  # attests-to — publish-attestation attests to topos-prod
  - eidos: desmos
    id: desmos/attests-to
    data:
      name: attests-to
      description: |
        A publish-attestation attests to the publication of a topos-prod.
        Provides audit trail for package provenance.
      from_eidos: publish-attestation
      to_eidos: topos-prod
      cardinality: many-to-one
      symmetric: false

  # forked-from — topos-dev was forked from another topos-dev
  - eidos: desmos
    id: desmos/forked-from
    data:
      name: forked-from
      description: |
        A topos-dev was forked/derived from another topos-dev.
        Used for tracking generative-commons fork lineage.
        (Renamed from derives-from to disambiguate from logos/derives-from: phasis→any)
      from_eidos: topos-dev
      to_eidos: topos-dev
      cardinality: many-to-one
      symmetric: false

  # =============================================================================
  # TOPOS DEVELOPMENT BONDS
  # =============================================================================

  # contains — topos contains a definition
  - eidos: desmos
    id: desmos/contains
    data:
      name: contains
      description: |
        Topos contains a definition (eidos, praxis, or desmos).
        The topos is the package; contained entities belong to it.

        Used during topos development to track which definitions
        are part of a topos being composed.
      from_eidos:
        - topos
      to_eidos:
        - eidos
        - praxis
        - desmos
      cardinality: one-to-many
      symmetric: false

  # developing — parousia is actively developing a topos
  - eidos: desmos
    id: desmos/developing
    data:
      name: developing
      description: |
        Parousia is actively developing a topos.

        This bond surfaces in body-schema as the current development
        context. A parousia may develop multiple topoi simultaneously.
      from_eidos:
        - parousia
      to_eidos:
        - topos
      cardinality: one-to-many
      symmetric: false

