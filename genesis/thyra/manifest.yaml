# Oikos Manifest: Thyra
# θύρα — the door, the boundary membrane.
#
# Where ephemeral becomes durable. Where human enters kosmos.
# The commitment boundary: streams → expressions.
#
# Manifest v2.1 — oikos metadata for entity composition

format_version: "2.1"
oikos_id: thyra
version: "0.1.0"

# Oikos metadata (v2.1)
oikos_name: Thyra
oikos_description: |
  The door, the boundary membrane. Where ephemeral becomes durable.
  Where human enters kosmos. The commitment boundary: streams → expressions.
  Also provides emission to chora (filesystem) and journey navigation (hodos).
oikos_scale: soma

# Development experience metadata
oikos_category: interface
surfaces_provided:
  - emission            # Provides filesystem emission (thyra/emit)
surfaces_consumed:
  - rendering           # Depends on opsis for visual rendering

content_paths:
  - path: eide/
    content_types: [eidos]
  - path: desmoi/
    content_types: [desmos]
  - path: praxeis/
    content_types: [praxis]
  - path: entities/
    content_types: [render-type, renderer, panel, waypoint, journey, render-spec]

requires_dynamis:
  - db.arise
  - db.find
  - db.bind
  - db.trace
  - db.update
  - db.loose
  - db.gather
  - fs.write         # For emit to filesystem

provides:
  eide:
    - stream
    - expression
    - accumulation
    - utterance
    # NOTE: layout, panel, style-theme, render-intent, workspace,
    # render-type, renderer, render-spec, widget moved to opsis oikos
    - content-root
    - voice-pipeline-config
    # NOTE: release, release-artifact moved to release oikos
    - app-config

  # Oikos-centric rendering: thyra owns presentation for portal entities
  renderable:
    - eidos: expression
      description: "Conversation contribution cards and threads"
    - eidos: stream
      description: "Media flow status cards"

  attainments:
    - perceive        # Stream capture and accumulation (soma)
    - express         # Create durable expressions (circle)
    # NOTE: render attainment moved to opsis oikos
    - emit            # Filesystem emission (soma)

  desmoi:
    - expressed-in
    - transforms-to
    - produces
    - consumes
    - in-reply-to
    - derives-from
    - contributes-to
    - artifact-of       # release-artifact → release

  praxeis:
    # Expression operations
    - thyra/express
    - thyra/list-expressions
    - thyra/reply-to
    - thyra/get-thread
    # Stream operations
    - thyra/open-stream
    - thyra/close-stream
    - thyra/sense-stream
    - thyra/reconcile-stream
    - thyra/list-streams
    - thyra/pause-stream
    - thyra/resume-stream
    # Accumulation operations
    - thyra/begin-accumulation
    - thyra/append-fragment
    - thyra/commit-accumulation
    - thyra/abandon-accumulation
    - thyra/clear-accumulation
    - thyra/get-accumulation
    - thyra/list-accumulations
    # Emission
    - thyra/emit
    # Release operations
    - thyra/get-current-release
    - thyra/list-releases

stoicheia_form:
  # Stream actuality via process mode
  # emit via fs dynamis

depends_on:
  - opsis            # Visual rendering (extracted from thyra)
  - hodos            # Journey navigation (extracted from thyra)
