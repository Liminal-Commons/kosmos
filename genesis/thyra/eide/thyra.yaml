# Thyra Eide
# Portal/interface eide — streams, expressions, accumulation, signaling
#
# Traces to: genesis/thyra/DESIGN.md
# Authorized by: expression/genesis-root

entities:
  # stream — bounded media flow
  - eidos: eidos
    id: eidos/stream
    data:
      name: stream
      description: "Bounded media flow — voice, video, text, or document. Streams follow the reconciler pattern."
      fields:
        kind:
          type: enum
          values: [voice, video, text, document]
          required: true
          description: "The modality of the stream"
        direction:
          type: enum
          values: [inward, outward]
          required: true
          description: "Flow direction — inward is perception, outward is emission"
        intent:
          type: enum
          values: [active, paused, closed]
          required: true
          default: active
          description: "Desired state"
        status:
          type: enum
          values: [pending, manifesting, active, paused, closing, closed, failed]
          required: false
          default: pending
          description: "Current lifecycle state"
        source:
          type: string
          required: false
          description: "Source identifier (device ID, file path, channel ID)"
        sink:
          type: string
          required: false
          description: "Destination identifier for outward streams"
        config:
          type: object
          required: false
          description: "Stream-specific configuration"
        manifest_handle:
          type: string
          required: false
          description: "Substrate handle for manifested stream (e.g., PID)"
        created_at:
          type: timestamp
          required: false
        manifested_at:
          type: timestamp
          required: false
        closed_at:
          type: timestamp
          required: false
        last_error:
          type: string
          required: false
      actuality:
        mode: process  # Will be media when implemented

  # expression — intentional contribution (commitment boundary)
  - eidos: eidos
    id: eidos/expression
    data:
      name: expression
      description: "Intentional contribution — the commitment boundary. When ephemeral becomes durable."
      fields:
        content:
          type: string
          required: true
          description: "The content being expressed"
        content_type:
          type: string
          required: false
          default: text/plain
          description: "MIME type of the content"
        expressed_by:
          type: string
          required: true
          description: "Persona ID of who expressed this"
        circle_id:
          type: string
          required: true
          description: "Circle ID where this was expressed"
        expressed_at:
          type: timestamp
          required: true
        source_kind:
          type: enum
          values: [stream, compose, direct]
          required: false
          description: "How this expression originated"
        source_stream_id:
          type: string
          required: false
          description: "Terminal stream ID if source_kind is stream"
        source_artifact_id:
          type: string
          required: false
          description: "Artifact ID if originated from composition"
        mode:
          type: enum
          values: [declaration, inquiry, suggestion, invitation, request, proposal]
          required: false
          description: "Expression mode — how the expression should be received"
        in_reply_to:
          type: string
          required: false
          description: "Expression ID this replies to, if any"
        metadata:
          type: object
          required: false

  # accumulation — buffer state for stream content
  - eidos: eidos
    id: eidos/accumulation
    data:
      name: accumulation
      description: "Buffer state for stream content awaiting commitment. Tracks raw transcripts, clarified content, and visual state."
      fields:
        stream_id:
          type: string
          required: true
          description: "The terminal stream this accumulation belongs to"

        # Raw transcript chain (from STT)
        raw_content:
          type: string
          required: false
          description: "Concatenated raw transcripts — verbatim STT output"
        raw_fragments:
          type: array
          required: false
          description: "Individual raw transcript fragments [{text, utterance_id, timestamp}]"

        # Clarified content (after LLM)
        content:
          type: string
          required: true
          description: "Clarified content — after disfluency removal, ready for edit/commit"

        # Clarification pipeline state
        clarification_status:
          type: enum
          values: [pending, clarifying, clarified, manual, failed]
          required: true
          default: pending
          description: "State of clarification: pending (raw only), clarifying (LLM in flight), clarified (LLM done), manual (user edited), failed"
        clarification_generation_id:
          type: string
          required: false
          description: "Manteia generation ID for audit trail and redo"

        # Visual state for voice bar rendering
        capture_state:
          type: enum
          values: [inactive, listening, processing]
          required: true
          default: inactive
          description: "Voice capture state for UI feedback"

        # Lifecycle
        status:
          type: enum
          values: [active, committed, abandoned, cleared]
          required: true
          default: active
        started_at:
          type: timestamp
          required: true
        last_fragment_at:
          type: timestamp
          required: false
        clarified_at:
          type: timestamp
          required: false
        committed_at:
          type: timestamp
          required: false
        expression_id:
          type: string
          required: false
          description: "Expression ID if committed"

  # utterance — VAD-bounded speech segment
  - eidos: eidos
    id: eidos/utterance
    data:
      name: utterance
      description: "VAD-bounded speech segment — atomic unit of voice perception."
      fields:
        stream_id:
          type: string
          required: true
          description: "The audio stream this utterance came from"
        started_at:
          type: timestamp
          required: true
          description: "VAD speech start"
        ended_at:
          type: timestamp
          required: false
          description: "VAD speech end"
        duration_ms:
          type: number
          required: false
        audio_hash:
          type: string
          required: false
          description: "Hash of audio segment if captured"
        transcription:
          type: string
          required: false
        transcribed_at:
          type: timestamp
          required: false
        contributed_to:
          type: string
          required: false
          description: "Expression ID this utterance contributed to"

  # ─────────────────────────────────────────────────────────────
  # NOTE: Rendering eide moved to genesis/opsis/eide/opsis.yaml
  # (layout, panel, style-theme, render-intent, workspace,
  #  render-type, renderer, render-spec, widget)
  # ─────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────
  # VOICE PIPELINE EIDE — Configuration and state
  # ─────────────────────────────────────────────────────────────

  # voice-pipeline-config — homoiconic configuration for voice capture
  - eidos: eidos
    id: eidos/voice-pipeline-config
    data:
      name: voice-pipeline-config
      description: "Configuration for the voice capture and clarification pipeline. Homoiconic — the config is an entity."
      fields:
        name:
          type: string
          required: true
          description: "Config identifier (e.g., 'default', 'high-quality')"

        # Audio capture settings
        audio_input_device:
          type: string
          required: false
          default: "default"
          description: "Audio input device ID or 'default'"
        vad_enabled:
          type: boolean
          required: true
          default: true
          description: "Enable Voice Activity Detection"
        vad_silence_duration_ms:
          type: number
          required: true
          default: 2000
          description: "Silence duration (ms) that ends an utterance"
        input_mode:
          type: enum
          values: [push-to-talk, toggle, always-on]
          required: true
          default: toggle
          description: "How voice capture is activated"

        # Transcription settings
        transcription_provider:
          type: enum
          values: [deepgram, whisper-local, whisper-cloud, assembly-ai]
          required: true
          default: deepgram
          description: "Speech-to-text provider"
        transcription_language:
          type: string
          required: true
          default: "en"
        transcription_model:
          type: string
          required: false
          description: "Provider-specific model (e.g., 'nova-2')"
        transcription_streaming:
          type: boolean
          required: true
          default: true
          description: "Stream transcripts as they arrive"

        # Clarification settings
        clarification_enabled:
          type: boolean
          required: true
          default: true
          description: "Enable LLM clarification of transcripts"
        clarification_model:
          type: string
          required: false
          default: "claude-3-haiku"
          description: "Fast model for clarification"
        clarification_system_prompt:
          type: string
          required: false
          description: "System prompt for clarifier (overrides default)"

        # Activation
        active:
          type: boolean
          required: true
          default: false
          description: "Whether this config is currently active"
        created_at:
          type: timestamp
          required: true

  # NOTE: Distribution eide (release, release-artifact) are in genesis/release/eide/release.yaml
  # (These duplicates were in thyra but release oikos extracted from dynamis)

  # =============================================================================
  # APPLICATION CONFIGURATION — Homoiconic app settings
  # =============================================================================

  # app-config — Application configuration entity
  - eidos: eidos
    id: eidos/app-config
    data:
      name: app-config
      description: |
        Application configuration for Thyra. Makes tauri.conf.json settings
        homoiconic — queryable, bondable, with provenance. The active config
        is composed from this eidos and emitted to chora as tauri.conf.json.
      fields:
        product_name:
          type: string
          required: true
          description: "Application display name"
        version:
          type: string
          required: true
          description: "Semantic version (e.g., '0.9.0-beta.1')"
        identifier:
          type: string
          required: true
          description: "Reverse domain identifier (e.g., 'io.chora.app')"
        window_title:
          type: string
          required: true
          description: "Default window title"
        window_width:
          type: number
          required: true
          description: "Default window width in pixels"
        window_height:
          type: number
          required: true
          description: "Default window height in pixels"
        window_resizable:
          type: boolean
          required: true
          description: "Whether the window can be resized"
        window_fullscreen:
          type: boolean
          required: false
          description: "Start in fullscreen mode"
        deep_link_schemes:
          type: list
          item_type: string
          required: false
          description: "Custom URL schemes for deep linking (e.g., ['thyra'])"
        frontend_dist:
          type: string
          required: true
          description: "Path to built frontend assets"
        dev_url:
          type: string
          required: false
          description: "Development server URL"

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/perceive
    data:
      name: perceive
      description: |
        Perception capability — capturing streams and managing accumulation.
        Enables opening media streams, sensing their state, and managing
        the accumulation buffer before commitment. Requires substrate access
        for media capture.
      oikos: thyra
      scope: soma
      grants:
        - praxis/thyra/open-stream
        - praxis/thyra/close-stream
        - praxis/thyra/sense-stream
        - praxis/thyra/reconcile-stream
        - praxis/thyra/list-streams
        - praxis/thyra/pause-stream
        - praxis/thyra/resume-stream
        - praxis/thyra/begin-accumulation
        - praxis/thyra/append-fragment
        - praxis/thyra/commit-accumulation
        - praxis/thyra/abandon-accumulation
        - praxis/thyra/clear-accumulation
        - praxis/thyra/get-accumulation
        - praxis/thyra/list-accumulations

  - eidos: attainment
    id: attainment/express
    data:
      name: express
      description: |
        Expression capability — creating durable contributions.
        The commitment boundary — ephemeral becomes durable.
        Expressions belong to circles and require membership.
      oikos: thyra
      scope: circle
      grants:
        - praxis/thyra/express
        - praxis/thyra/reply-to
        - praxis/thyra/list-expressions
        - praxis/thyra/get-thread

  # NOTE: attainment/render moved to genesis/opsis/eide/opsis.yaml

  - eidos: attainment
    id: attainment/emit
    data:
      name: emit
      description: |
        Filesystem emission capability — writing to chora.
        Brings existence into actuality via filesystem write.
        Substrate-local (soma scope) for filesystem access.
      oikos: thyra
      scope: soma
      grants:
        - praxis/thyra/emit

