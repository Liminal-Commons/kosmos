# Thyra Eide
# Portal/interface eide — accumulation, signaling
#
# NOTE: phasis eidos moved to logos topos (THYRA-OIKOS Phase 3)
#
# Traces to: genesis/thyra/DESIGN.md
# Authorized by: phasis/genesis-root

entities:

  # NOTE: phasis eidos moved to logos topos (THYRA-OIKOS Phase 3)
  # See genesis/logos/eide/logos.yaml

  # accumulation — composition buffer for content preparation
  - eidos: eidos
    id: eidos/accumulation
    data:
      name: accumulation
      description: "Composition buffer — text being prepared for commitment. Modality-agnostic: receives text from voice, keyboard, paste, or any source."
      fields:
        content:
          type: string
          required: true
          description: "Current composed text — ready for edit/commit"
        status:
          type: enum
          values: [active, committed, abandoned, cleared]
          required: true
          default: active
        stance:
          type: enum
          values: [declaration, inquiry, suggestion, invitation, request, proposal]
          required: false
          description: "Phasis stance — blank until clarification proposes or user selects"
        started_at:
          type: timestamp
          required: true
        last_modified_at:
          type: timestamp
          required: false
        committed_at:
          type: timestamp
          required: false
        phasis_id:
          type: string
          required: false
          description: "Phasis ID if committed"

  # utterance — VAD-bounded speech segment
  - eidos: eidos
    id: eidos/utterance
    data:
      name: utterance
      description: "VAD-bounded speech segment — atomic unit of voice perception."
      fields:
        started_at:
          type: timestamp
          required: true
          description: "VAD speech start"
        ended_at:
          type: timestamp
          required: false
          description: "VAD speech end"
        duration_ms:
          type: number
          required: false
        audio_hash:
          type: string
          required: false
          description: "Hash of audio segment if captured"
        transcription:
          type: string
          required: false
        transcribed_at:
          type: timestamp
          required: false
        contributed_to:
          type: string
          required: false
          description: "Phasis ID this utterance contributed to"

  # ─────────────────────────────────────────────────────────────
  # NOTE: Rendering typos are in genesis/thyra/typos/thyra.yaml
  # (render-intent, widget, render-spec, authoring-session, etc.)
  # Opsis topos dissolved — rendering is now thyra responsibility.
  # ─────────────────────────────────────────────────────────────

  # NOTE: Distribution eide (release, release-artifact) are in genesis/release/eide/release.yaml
  # (These duplicates were in thyra but release oikos extracted from dynamis)

  # =============================================================================
  # APPLICATION CONFIGURATION — Homoiconic app settings
  # =============================================================================

  # app-config — Application configuration entity
  - eidos: eidos
    id: eidos/app-config
    data:
      name: app-config
      description: |
        Application configuration for Thyra. Makes tauri.conf.json settings
        homoiconic — queryable, bondable, with provenance. The active config
        is composed from this eidos and emitted to chora as tauri.conf.json.
      fields:
        product_name:
          type: string
          required: true
          description: "Application display name"
        version:
          type: string
          required: true
          description: "Semantic version (e.g., '0.9.0-beta.1')"
        identifier:
          type: string
          required: true
          description: "Reverse domain identifier (e.g., 'io.chora.app')"
        window_title:
          type: string
          required: true
          description: "Default window title"
        window_width:
          type: number
          required: true
          description: "Default window width in pixels"
        window_height:
          type: number
          required: true
          description: "Default window height in pixels"
        window_resizable:
          type: boolean
          required: true
          description: "Whether the window can be resized"
        window_fullscreen:
          type: boolean
          required: false
          description: "Start in fullscreen mode"
        deep_link_schemes:
          type: list
          item_type: string
          required: false
          description: "Custom URL schemes for deep linking (e.g., ['thyra'])"
        frontend_dist:
          type: string
          required: true
          description: "Path to built frontend assets"
        dev_url:
          type: string
          required: false
          description: "Development server URL"

  # =========================================================================
  # ATTAINMENTS
  # =========================================================================

  - eidos: attainment
    id: attainment/perceive
    data:
      name: perceive
      description: |
        Perception capability — managing accumulation buffer.
        Enables managing the accumulation buffer before commitment.
      topos: thyra
      scope: soma
    bonds:
      - { desmos: grants-praxis, to: praxis/thyra/begin-accumulation }
      - { desmos: grants-praxis, to: praxis/thyra/commit-phasis }
      - { desmos: grants-praxis, to: praxis/thyra/abandon-accumulation }
      - { desmos: grants-praxis, to: praxis/thyra/clear-accumulation }
      - { desmos: grants-praxis, to: praxis/thyra/update-accumulation-content }
      - { desmos: grants-praxis, to: praxis/thyra/get-accumulation }
      - { desmos: grants-praxis, to: praxis/thyra/list-accumulations }
      - { desmos: grants-praxis, to: praxis/thyra/clarify-accumulation }

  # NOTE: attainment/express moved to logos topos (THYRA-OIKOS Phase 3)
  # See genesis/logos/eide/logos.yaml

  # NOTE: attainment/render typos are in genesis/thyra/typos/thyra.yaml

  - eidos: attainment
    id: attainment/actuate
    data:
      name: actuate
      description: |
        Filesystem actuation capability — writing to chora.
        Brings existence into actuality via filesystem write.
        Substrate-local (soma scope) for filesystem access.
        (Renamed from emit to disambiguate from genesis/attainment/emit: full-circle emission)
      topos: thyra
      scope: soma
    bonds:
      - { desmos: grants-praxis, to: praxis/thyra/emit }

