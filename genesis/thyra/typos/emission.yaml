# Emission Typos — templates for emitting entities to substrate formats
#
# Per KOSMOGONIA's Actuation = Emission pillar:
# Kosmos expresses intent. Thyra emits configuration. Substrate actualizes.
#
# These typos produce substrate-specific configuration from kosmos entities.

entities:

# =============================================================================
# NIXOS EMISSION
# =============================================================================

- eidos: typos
  id: typos/emit-deployment-nixos
  data:
    name: emit-deployment-nixos
    description: |
      Emit a deployment entity as a NixOS module.

      Produces a .nix file that declares a kosmos-server service.
      The NixOS substrate watches this file and runs nixos-rebuild.

      Per Actuation = Emission: kosmos emits, substrate actualizes.

    # Template-only typos: no target_eidos, just produces content
    template: |
      # Kosmos Deployment: {{ deployment.name }}
      # Generated by kosmos — do not edit manually
      # Entity: {{ deployment.id }}
      # Emitted: {{ _now }}

      { config, lib, pkgs, ... }:

      let
        cfg = config.services.kosmos-{{ deployment.name }};
      in {
        options.services.kosmos-{{ deployment.name }} = {
          enable = lib.mkEnableOption "Kosmos server for {{ deployment.name }}";
        };

        config = lib.mkIf cfg.enable {
          systemd.services."kosmos-{{ deployment.name }}" = {
            description = "Kosmos Server - {{ deployment.name }}";
            wantedBy = [ "multi-user.target" ];
            after = [ "network.target" ];

            environment = {
              KOSMOS_OIKOS = "{{ deployment.config.oikos_id | default: 'oikos/default' }}";
              KOSMOS_DB = "/var/lib/kosmos/{{ deployment.name }}/kosmos.db";
            };

            serviceConfig = {
              Type = "simple";
              User = "kosmos";
              Group = "kosmos";
              ExecStart = "${pkgs.kosmos-mcp}/bin/kosmos-mcp --transport http --port {{ deployment.config.port | default: 3000 }} --db /var/lib/kosmos/{{ deployment.name }}/kosmos.db --genesis /var/lib/kosmos/genesis";
              Restart = "always";
              RestartSec = 5;
            };
          };

          users.users.kosmos = {
            isSystemUser = true;
            group = "kosmos";
            home = "/var/lib/kosmos";
            createHome = true;
          };
          users.groups.kosmos = {};

          networking.firewall.allowedTCPPorts = [ {{ deployment.config.port | default: 3000 }} ];
        };
      }

    slots:
      deployment:
        type: entity
        description: The deployment entity to emit
        required: true

- eidos: typos
  id: typos/emit-deployment-systemd
  data:
    name: emit-deployment-systemd
    description: |
      Emit a deployment entity as a systemd unit file.

      Produces a .service file for direct systemd management.
      The substrate runs systemctl daemon-reload && systemctl enable --now.

    template: |
      # Kosmos Deployment: {{ deployment.name }}
      # Generated by kosmos — do not edit manually
      # Entity: {{ deployment.id }}
      # Emitted: {{ _now }}

      [Unit]
      Description=Kosmos Server - {{ deployment.name }}
      After=network.target

      [Service]
      Type=simple
      User=kosmos
      Group=kosmos
      Environment=KOSMOS_OIKOS={{ deployment.config.oikos_id | default: 'oikos/default' }}
      Environment=KOSMOS_DB=/var/lib/kosmos/{{ deployment.name }}/kosmos.db
      ExecStart=/usr/bin/kosmos-mcp --transport http --port {{ deployment.config.port | default: 3000 }} --db /var/lib/kosmos/{{ deployment.name }}/kosmos.db --genesis /var/lib/kosmos/genesis
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

    slots:
      deployment:
        type: entity
        description: The deployment entity to emit
        required: true

- eidos: typos
  id: typos/emit-deployment-docker-compose
  data:
    name: emit-deployment-docker-compose
    description: |
      Emit a deployment entity as a Docker Compose service entry.

      Produces YAML for inclusion in docker-compose.yml.
      The substrate runs docker compose up -d.

    template: |
      # Kosmos Deployment: {{ deployment.name }}
      # Generated by kosmos — do not edit manually
      # Entity: {{ deployment.id }}
      # Emitted: {{ _now }}

      services:
        kosmos-{{ deployment.name }}:
          image: ghcr.io/liminalcommons/kosmos-mcp:latest
          container_name: kosmos-{{ deployment.name }}
          restart: always
          environment:
            - KOSMOS_OIKOS={{ deployment.config.oikos_id | default: 'oikos/default' }}
            - KOSMOS_DB=/data/kosmos.db
          volumes:
            - kosmos-{{ deployment.name }}-data:/data
            - kosmos-genesis:/genesis:ro
          ports:
            - "{{ deployment.config.port | default: 3000 }}:3000"
          command: ["--transport", "http", "--port", "3000", "--db", "/data/kosmos.db", "--genesis", "/genesis"]

      volumes:
        kosmos-{{ deployment.name }}-data:
        kosmos-genesis:

    slots:
      deployment:
        type: entity
        description: The deployment entity to emit
        required: true
