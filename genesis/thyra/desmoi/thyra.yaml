# Thyra Desmoi
# Boundary membrane bonds — rendering, navigation
#
# Phasis desmoi (phasis-in, in-reply-to, derives-from, contributes-to)
# moved to logos — the topos that introduces phasis owns its bonds.

entities:

  # ─────────────────────────────────────────────────────────────
  # RENDERING DESMOI — Mode-based display bonds
  # ─────────────────────────────────────────────────────────────

  # styled-by — entity styled by theme
  - eidos: desmos
    id: desmos/styled-by
    data:
      name: styled-by
      description: "Entity styled by a theme. Visual appearance binding."
      from_eidos: any
      to_eidos: style-theme
      cardinality: many-to-one
      symmetric: false

  # active-theme — oikos uses theme
  - eidos: desmos
    id: desmos/active-theme
    data:
      name: active-theme
      description: "Oikos uses this theme as its active visual styling."
      from_eidos: oikos
      to_eidos: style-theme
      cardinality: one-to-one
      symmetric: false

  # ─────────────────────────────────────────────────────────────
  # HOMOICONIC RENDERING DESMOI — Graph-traversable display config
  # ─────────────────────────────────────────────────────────────

  # displays-as — field displays as widget
  - eidos: desmos
    id: desmos/displays-as
    data:
      name: displays-as
      description: "Field definition displays as this widget. Field-level display customization."
      from_eidos: field-def
      to_eidos: widget
      cardinality: many-to-one
      symmetric: false

  # NOTE: sources-content-from canonical in genesis/desmoi/genesis.yaml

  # ─────────────────────────────────────────────────────────────
  # WORKSPACE DESMOI — Artifact focus and tabs
  # ─────────────────────────────────────────────────────────────

  # workspace-of — workspace belongs to parousia
  - eidos: desmos
    id: desmos/workspace-of
    data:
      name: workspace-of
      description: "Workspace belongs to parousia. Each parousia has one active workspace."
      from_eidos: workspace
      to_eidos: parousia
      cardinality: one-to-one
      symmetric: false

  # has-open — workspace has open artifact
  - eidos: desmos
    id: desmos/has-open
    data:
      name: has-open
      description: "Workspace has artifact open (in tabs)."
      from_eidos: workspace
      to_eidos: artifact
      cardinality: one-to-many
      symmetric: false

  # focused-on — workspace focused on artifact
  - eidos: desmos
    id: desmos/focused-on
    data:
      name: focused-on
      description: "Workspace focused on specific artifact (active tab)."
      from_eidos: workspace
      to_eidos: artifact
      cardinality: one-to-one
      symmetric: false

  # clarified-by — accumulation clarified by generation
  - eidos: desmos
    id: desmos/clarified-by
    data:
      name: clarified-by
      description: "Accumulation clarified by manteia generation. Audit trail."
      from_eidos: accumulation
      to_eidos: generation
      cardinality: many-to-one
      symmetric: false

  # ─────────────────────────────────────────────────────────────
  # NAVIGATION DESMOI — Flow between panels/waypoints
  # ─────────────────────────────────────────────────────────────

  # leads-to — linear navigation between waypoints
  - eidos: desmos
    id: desmos/leads-to
    data:
      name: leads-to
      description: "Waypoint leads to next waypoint. Linear navigation flow."
      from_eidos: waypoint
      to_eidos: waypoint
      cardinality: one-to-one
      symmetric: false

  # branches-to — conditional navigation fork
  - eidos: desmos
    id: desmos/branches-to
    data:
      name: branches-to
      description: "Waypoint branches to alternatives based on condition. Fork in the journey."
      from_eidos: waypoint
      to_eidos: waypoint
      cardinality: one-to-many
      symmetric: false

  # displays-render-spec — waypoint displays this render-spec
  - eidos: desmos
    id: desmos/displays-render-spec
    data:
      name: displays-render-spec
      description: "Waypoint displays this render-spec for rendering."
      from_eidos: waypoint
      to_eidos: render-spec
      cardinality: one-to-one
      symmetric: false

  # uses-form — mode uses form definition for input
  - eidos: desmos
    id: desmos/uses-form
    data:
      name: uses-form
      description: "Mode uses this typos for form rendering."
      from_eidos: mode
      to_eidos: typos
      cardinality: one-to-one
      symmetric: false

  # ─────────────────────────────────────────────────────────────
  # VOICE COMPOSITION DESMOI — Audio/transcription bonds
  # ─────────────────────────────────────────────────────────────

  # fed-by-audio — accumulation receives audio from this source
  - eidos: desmos
    id: desmos/fed-by-audio
    data:
      name: fed-by-audio
      description: "Accumulation receives audio input from this audio-source entity."
      from_eidos: accumulation
      to_eidos: audio-source
      cardinality: one-to-one
      symmetric: false

  # fed-by-transcriber — accumulation receives transcription from this transcriber
  - eidos: desmos
    id: desmos/fed-by-transcriber
    data:
      name: fed-by-transcriber
      description: "Accumulation receives transcription from this transcriber entity."
      from_eidos: accumulation
      to_eidos: transcriber
      cardinality: one-to-one
      symmetric: false
