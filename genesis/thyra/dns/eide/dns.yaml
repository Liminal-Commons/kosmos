# DNS Eide
# Domain Name System — how the kosmos becomes addressable from outside
#
# Infrastructure actualization eide — DNS zones and records with dual existence

entities:
  # dns-zone — managed DNS zone (sovereignty boundary)
  - eidos: eidos
    id: eidos/dns-zone
    data:
      name: dns-zone
      description: "A DNS zone managed by an oikos. Zones are sovereignty boundaries."
      fields:
        name:
          type: string
          required: true
          description: "Zone name (e.g., liminalcommons.com)"
        status:
          type: string
          enum: [active, pending, suspended]
          required: true
          default: pending
          description: "Zone operational status"
        provider:
          type: string
          enum: [cloudflare, route53, manual]
          required: true
          description: "DNS provider for this zone"
        provider_zone_id:
          type: string
          required: false
          description: "Provider's zone identifier"
        record_count:
          type: number
          required: false
          default: 0
          description: "Cached count of records in zone"
        last_synced_at:
          type: timestamp
          required: false
          description: "Last full sync with provider"
        created_at:
          type: timestamp
          required: true

  # dns-record — DNS record with dual existence (intent + actuality)
  - eidos: eidos
    id: eidos/dns-record
    data:
      name: dns-record
      description: "A DNS record with dual existence. Entity represents intent, actuality represents provider state. Reconciler aligns them."
      fields:
        record_type:
          type: string
          enum: [A, AAAA, CNAME, TXT, MX, SRV, NS, CAA]
          required: true
          description: "DNS record type"
        name:
          type: string
          required: true
          description: "Record name (subdomain part). For root, use @."
        content:
          type: string
          required: true
          description: "Record value (IP, hostname, text, etc.)"
        ttl:
          type: number
          required: false
          default: 1
          description: "Time-to-live in seconds (1 = auto for Cloudflare)"
        priority:
          type: number
          required: false
          description: "Priority for MX/SRV records"
        proxied:
          type: boolean
          required: false
          default: true
          description: "Cloudflare proxy (orange cloud). Ignored for other providers."
        desired_state:
          type: string
          enum: [present, absent]
          required: true
          default: present
          description: "What we want the record to be"
        actual_state:
          type: string
          enum: [present, absent, unknown, diverged]
          required: false
          default: unknown
          description: "What the record actually is at provider"
        provider_record_id:
          type: string
          required: false
          description: "Provider's record identifier (for updates/deletes)"
        last_sensed_at:
          type: timestamp
          required: false
          description: "When we last checked actual state"
        last_reconciled_at:
          type: timestamp
          required: false
          description: "When we last aligned intent with actuality"
        divergence:
          type: object
          required: false
          description: "When diverged, describes the difference"
        created_at:
          type: timestamp
          required: true
      actuality:
        mode: dns

  # dns-provider-binding — connection to provider with credentials
  - eidos: eidos
    id: eidos/dns-provider-binding
    data:
      name: dns-provider-binding
      description: "Binds a zone to its provider with credentials. Credentials are referenced, not stored."
      fields:
        provider:
          type: string
          enum: [cloudflare, route53]
          required: true
          description: "DNS provider type"
        zone_id:
          type: string
          required: true
          description: "Provider's zone identifier"
        account_id:
          type: string
          required: false
          description: "Provider account (Cloudflare account ID, AWS account)"
        credential_ref:
          type: string
          required: true
          description: "Reference to credential store (secret://... or env://...)"
        endpoint:
          type: string
          required: false
          description: "Custom API endpoint (for testing/mocking)"
        status:
          type: string
          enum: [active, invalid, suspended]
          required: true
          default: active
        created_at:
          type: timestamp
          required: true

  # ============================================================================
  # ATTAINMENTS
  # ============================================================================

  # dns-read — read-only DNS capability
  - eidos: attainment
    id: attainment/dns-read
    data:
      name: dns-read
      topos: thyra
      scope: oikos
      description: |
        Read-only DNS capability — can list zones/records and sense state.
        Observing DNS state is safe for any oikos member.
    bonds:
      - { desmos: grants-praxis, to: praxis/thyra/list-zones }
      - { desmos: grants-praxis, to: praxis/thyra/list-dns-records }
      - { desmos: grants-praxis, to: praxis/thyra/sense-dns-record }

  # dns-write — record management capability
  - eidos: attainment
    id: attainment/dns-write
    data:
      name: dns-write
      topos: thyra
      scope: oikos
      description: |
        Record management — can create and delete DNS records.
        Modifying records requires trust within the oikos.
    bonds:
      - { desmos: grants-praxis, to: praxis/thyra/create-dns-record }
      - { desmos: grants-praxis, to: praxis/thyra/delete-dns-record }

  # dns-admin — zone and infrastructure management
  - eidos: attainment
    id: attainment/dns-admin
    data:
      name: dns-admin
      topos: thyra
      scope: oikos
      description: |
        Zone and infrastructure management — create zones, bind providers, reconcile.
        Administrative authority required for infrastructure operations.
    bonds:
      - { desmos: grants-praxis, to: praxis/thyra/create-zone }
      - { desmos: grants-praxis, to: praxis/thyra/bind-zone-provider }
      - { desmos: grants-praxis, to: praxis/thyra/reconcile-dns-record }
      - { desmos: grants-praxis, to: praxis/thyra/reconcile-zone }
