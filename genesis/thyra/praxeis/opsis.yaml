    params:
      - name: theme_id
        type: string
        required: true
        description: The theme to activate
    steps:
      - step: assert
        condition: "$_circle"
        message: "Cannot activate theme without dwelling in a circle"

      # Find the theme
      - step: find
        id: "$theme_id"
        bind_to: theme

      - step: assert
        condition: "$theme"
        message: "Theme not found: $theme_id"

      # Remove existing active-theme bond
      - step: trace
        from_id: "$_circle.id"
        desmos: "active-theme"
        resolve: "bond"
        bind_to: existing_bonds

      - step: foreach
        items: "$existing_bonds"
