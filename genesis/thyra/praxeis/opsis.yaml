# opsis.yaml
# Visual rendering praxeis — ekthesis to display substrate
#
# Opsis (sight/vision) handles the visual emission pathway:
# kosmos state → render intent → reconciler → substrate actuality

entities:

# =============================================================================
# RENDER INTENT — Declaring what should be visible
# =============================================================================

- eidos: praxis
  id: praxis/thyra/gather-render-intent
  data:
    oikos: thyra
    name: gather-render-intent
    visible: true
    tier: 2
    description: |
      Gather entities visible from dwelling position for a region.

      Queries the kosmos to determine what should be rendered:
      - Walks visibility from dwelling circle
      - Gathers entities relevant to the region type
      - Returns structured intent for the reconciler

      This is the "sense what should be" phase of rendering.
    params:
      - name: region_id
        type: string
        required: true
        description: The HUD region to gather intent for
      - name: layout_id
        type: string
        required: false
        description: Layout context (defaults to active layout)
    steps:
      # Assert dwelling context
      - step: assert
        condition: "$_circle"
        message: "Cannot gather render intent without dwelling in a circle"

      # Get active layout if not provided
      - step: set
        bindings:
          active_layout: "$layout_id"

      - step: switch
        cases:
          - when: "$active_layout"
            then: []
        default:
          # Find active layout for circle
          - step: trace
            from_id: "$_circle.id"
            desmos: "active-layout"
            resolve: "to"
            bind_to: layout_bonds
          - step: switch
            cases:
              - when: "$layout_bonds | length > 0"
                then:
                  - step: set
                    bindings:
                      active_layout: "$layout_bonds[0].id"

      # Get panels that render in this region
      - step: trace
        to_id: "$region_id"
        desmos: "renders-in"
        resolve: "from"
        bind_to: panels

      # Sort panels by priority
      - step: sort
        items: "$panels"
        by: "data.priority"
        order: "desc"
        bind_to: panels

      # Gather entities for each panel based on render_type
      - step: set
        bindings:
          visible_entities: []
          panel_intents: []

      - step: foreach
        items: "$panels"
        as: panel
        do:
          # Determine entities based on render_type
          - step: switch
            cases:
              # Expression thread — gather expressions in circle
              - when: '$panel.data.render_type == "expression-thread"'
                then:
                  - step: trace
                    to_id: "$_circle.id"
                    desmos: "expressed-in"
                    resolve: "from"
                    bind_to: panel_entities
                  - step: sort
                    items: "$panel_entities"
                    by: "data.expressed_at"
                    order: "desc"
                    bind_to: panel_entities
                  - step: limit
                    items: "$panel_entities"
                    count: 100
                    bind_to: panel_entities

              # Presence list — gather animi in circle
              - when: '$panel.data.render_type == "presence-list"'
                then:
                  - step: trace
                    to_id: "$_circle.id"
                    desmos: "dwells-in"
                    resolve: "from"
                    bind_to: panel_entities

              # Accumulation buffer — get active accumulation
              - when: '$panel.data.render_type == "accumulation-buffer"'
                then:
                  - step: gather
                    eidos: accumulation
                    bind_to: all_accumulations
                  - step: filter
                    in: "$all_accumulations"
                    as: a
                    where: '$a.data.status == "active"'
                    bind_to: panel_entities

              # Journey view — gather active journeys
              - when: '$panel.data.render_type == "journey-view"'
                then:
                  - step: call
                    praxis: "nous/list-journeys"
                    params:
                      status: "active"
                    bind_to: journey_result
                  - step: set
                    bindings:
                      panel_entities: "$journey_result.journeys"

              # Workspace view — get workspace artifacts
              - when: '$panel.data.render_type == "workspace-view"'
                then:
                  - step: trace
                    from_id: "$_animus.id"
                    desmos: "workspace-of"
                    resolve: "to"
                    bind_to: workspaces
                  - step: switch
                    cases:
                      - when: "$workspaces | length > 0"
                        then:
                          - step: set
                            bindings:
                              workspace: "$workspaces[0]"
                          - step: trace
                            from_id: "$workspace.id"
                            desmos: "has-open"
                            resolve: "to"
                            bind_to: panel_entities
                    default:
                      - step: set
                        bindings:
                          panel_entities: []

              # Artifact preview — get focused artifact
              - when: '$panel.data.render_type == "artifact-preview"'
                then:
                  - step: trace
                    from_id: "$_animus.id"
                    desmos: "workspace-of"
                    resolve: "to"
                    bind_to: workspaces
                  - step: switch
                    cases:
                      - when: "$workspaces | length > 0"
                        then:
                          - step: set
                            bindings:
                              workspace: "$workspaces[0]"
                          - step: trace
                            from_id: "$workspace.id"
                            desmos: "focused-on"
                            resolve: "to"
                            bind_to: panel_entities
                    default:
                      - step: set
                        bindings:
                          panel_entities: []

              # Affordance bar — gather available affordances
              - when: '$panel.data.render_type == "affordance-bar"'
                then:
                  - step: call
                    praxis: "politeia/gather-affordances"
                    params: {}
                    bind_to: affordance_result
                  - step: set
                    bindings:
                      panel_entities: "$affordance_result.affordances"

            default:
              # Generic entity list — use source_query if provided
              - step: set
                bindings:
                  panel_entities: []

          # Add panel intent
          - step: set
            bindings:
              panel_intent:
                panel_id: "$panel.id"
                render_type: "$panel.data.render_type"
                entities: "$panel_entities"
                visible: "$panel.data.visible"
                priority: "$panel.data.priority"

          - step: append
            to: "$panel_intents"
            value: "$panel_intent"
            bind_to: panel_intents

          # Collect visible entities
          - step: concat
            items:
              - "$visible_entities"
              - "$panel_entities"
            bind_to: visible_entities

      - step: return
        value:
          region_id: "$region_id"
          layout_id: "$active_layout"
          circle_id: "$_circle.id"
          panels: "$panel_intents"
          visible_entities: "$visible_entities"
          entity_count: "$visible_entities | length"

# =============================================================================
# RECONCILIATION — Aligning intent with actuality
# =============================================================================

- eidos: praxis
  id: praxis/thyra/reconcile-region
  data:
    oikos: thyra
    name: reconcile-region
    visible: true
    tier: 3
    description: |
      Align region actuality with intent.

      The core rendering reconciler:
      1. Gather current render intent
      2. Sense current rendered state (via substrate)
      3. Compute diff
      4. Emit changes to substrate

      Returns the action taken and diff applied.
    params:
      - name: region_id
        type: string
        required: true
        description: The region to reconcile
    steps:
      # Gather what should be rendered
      - step: call
        praxis: "thyra/gather-render-intent"
        params:
          region_id: "$region_id"
        bind_to: intent

      # Create or update render-intent entity
      - step: set
        bindings:
          render_intent_id: "render-intent/$region_id"

      - step: find
        id: "$render_intent_id"
        bind_to: existing_intent

      - step: switch
        cases:
          - when: "$existing_intent"
            then:
              # Update existing intent
              - step: update
                id: "$render_intent_id"
                data:
                  visible_entities: "$intent.visible_entities"
                  panel_states: "$intent.panels"
                  layout_id: "$intent.layout_id"
                  intent_status: "reconciling"
        default:
          # Create new intent (CE4: compose instead of arise)
          - step: compose
            typos_id: "typos-def-render-intent"
            inputs:
              id: "$render_intent_id"
              target_region_id: "$region_id"
              visible_entities: "$intent.visible_entities"
              panel_states: "$intent.panels"
              layout_id: "$intent.layout_id"
              intent_status: "reconciling"
              created_at: "{{ now() }}"
            bind_to: new_intent

      # Emit render commands to substrate
      - step: call
        praxis: "thyra/emit-render"
        params:
          region_id: "$region_id"
          intent: "$intent"
        bind_to: emit_result

      # Update intent status
      - step: update
        id: "$render_intent_id"
        data:
          intent_status: "rendered"
          reconciled_at: "{{ now() }}"

      - step: return
        value:
          region_id: "$region_id"
          action: "$emit_result.action"
          panels_rendered: "$intent.panels | length"
          entities_rendered: "$intent.entity_count"

- eidos: praxis
  id: praxis/thyra/emit-render
  data:
    oikos: thyra
    name: emit-render
    visible: true
    tier: 3
    description: |
      Emit render commands to substrate.

      Translates kosmos render intent into substrate-specific commands.
      For Tauri: emits via IPC to WebView.
      For Web: would emit via WebSocket.

      The substrate dynamis handles actual rendering.
    params:
      - name: region_id
        type: string
        required: true
        description: The region to render
      - name: intent
        type: object
        required: true
        description: The render intent from gather-render-intent
    steps:
      # Build render payload
      - step: set
        bindings:
          render_payload:
            region_id: "$region_id"
            panels: "$intent.panels"
            layout_id: "$intent.layout_id"
            circle_id: "$intent.circle_id"
            timestamp: "{{ now() }}"

      # Emit to substrate via dynamis
      - step: emit_display
        payload: "$render_payload"
        bind_to: emit_result

      - step: return
        value:
          emitted: true
          region_id: "$region_id"
          action: "rendered"
          payload_size: "$render_payload | tojson | length"

# =============================================================================
# LAYOUT OPERATIONS
# =============================================================================

- eidos: praxis
  id: praxis/thyra/activate-layout
  data:
    oikos: thyra
    name: activate-layout
    visible: true
    tier: 2
    description: |
      Activate a layout for the current circle.

      Sets the active-layout bond from circle to layout.
      Deactivates any previously active layout.
    params:
      - name: layout_id
        type: string
        required: true
        description: The layout to activate
    steps:
      - step: assert
        condition: "$_circle"
        message: "Cannot activate layout without dwelling in a circle"

      # Find the layout
      - step: find
        id: "$layout_id"
        bind_to: layout

      - step: assert
        condition: "$layout"
        message: "Layout not found: $layout_id"

      # Remove existing active-layout bond
      - step: trace
        from_id: "$_circle.id"
        desmos: "active-layout"
        resolve: "bond"
        bind_to: existing_bonds

      - step: foreach
        items: "$existing_bonds"
        as: bond
        do:
          - step: unbind
            bond_id: "$bond.id"

      # Create new active-layout bond
      - step: bind
        from_id: "$_circle.id"
        to_id: "$layout_id"
        desmos: "active-layout"

      # Mark layout as active
      - step: update
        id: "$layout_id"
        data:
          active: true

      # Reconcile all regions in the layout
      - step: set
        bindings:
          regions_reconciled: 0

      - step: foreach
        items: "$layout.data.regions"
        as: region
        do:
          - step: call
            praxis: "thyra/reconcile-region"
            params:
              region_id: "region/$region.name"
          - step: set
            bindings:
              regions_reconciled: "$regions_reconciled + 1"

      - step: return
        value:
          layout_id: "$layout_id"
          circle_id: "$_circle.id"
          activated: true
          regions_reconciled: "$regions_reconciled"

- eidos: praxis
  id: praxis/thyra/get-active-layout
  data:
    oikos: thyra
    name: get-active-layout
    visible: true
    tier: 1
    description: |
      Get the active layout for the current circle.
    params: []
    steps:
      - step: assert
        condition: "$_circle"
        message: "Cannot get active layout without dwelling in a circle"

      - step: trace
        from_id: "$_circle.id"
        desmos: "active-layout"
        resolve: "to"
        bind_to: layouts

      - step: switch
        cases:
          - when: "$layouts | length > 0"
            then:
              - step: return
                value:
                  layout: "$layouts[0]"
                  layout_id: "$layouts[0].id"
                  circle_id: "$_circle.id"
        default:
          - step: return
            value:
              layout: null
              layout_id: null
              circle_id: "$_circle.id"

# =============================================================================
# THEME OPERATIONS
# =============================================================================

