# =============================================================================
# WORKSPACE OPERATIONS
# =============================================================================

- eidos: praxis
  id: praxis/thyra/open-artifact
  data:
    oikos: thyra
    name: open-artifact
    visible: true
    tier: 2
    description: |
      Open an artifact in the workspace (add to tabs).

      Creates has-open bond from workspace to artifact.
      Optionally focuses the artifact.
    params:
      - name: artifact_id
        type: string
        required: true
        description: The artifact to open
      - name: focus
        type: boolean
        required: false
        description: Whether to focus the artifact (default true)
    steps:
      - step: assert
        condition: "$_animus"
        message: "Cannot open artifact without an animus"

      # Find the artifact
      - step: find
        id: "$artifact_id"
        bind_to: artifact

      - step: assert
        condition: "$artifact"
        message: "Artifact not found: $artifact_id"

      # Get or create workspace
      - step: trace
        from_id: "$_animus.id"
        desmos: "workspace-of"
        resolve: "to"
        bind_to: workspaces

      - step: switch
        cases:
          - when: "$workspaces | length > 0"
            then:
              - step: set
                bindings:
                  workspace: "$workspaces[0]"
        default:
          # Create workspace for animus (CE4: compose instead of arise)
          - step: compose
            typos_id: "typos-def-workspace"
            inputs:
              id: "workspace/$_animus.id"
              name: "default"
              open_artifact_ids: []
              animus_id: "$_animus.id"
              created_at: "{{ now() }}"
            bind_to: workspace
          - step: bind
            from_id: "$workspace.id"
            to_id: "$_animus.id"
            desmos: "workspace-of"

      # Check if already open
      - step: trace
        from_id: "$workspace.id"
        desmos: "has-open"
        resolve: "to"
        bind_to: open_artifacts

      - step: set
        bindings:
          already_open: false

      - step: foreach
        items: "$open_artifacts"
        as: open_artifact
        do:
          - step: switch
            cases:
              - when: "$open_artifact.id == $artifact_id"
                then:
                  - step: set
                    bindings:
                      already_open: true

      # Add to open artifacts if not already open
      - step: switch
        cases:
          - when: "not $already_open"
            then:
              - step: bind
                from_id: "$workspace.id"
                to_id: "$artifact_id"
                desmos: "has-open"

      # Focus if requested (default true)
      - step: set
        bindings:
          should_focus: "$focus"

      - step: switch
        cases:
          - when: "$should_focus == null"
            then:
              - step: set
                bindings:
                  should_focus: true

      - step: switch
        cases:
          - when: "$should_focus"
            then:
              - step: call
                praxis: "thyra/focus-artifact"
                params:
                  artifact_id: "$artifact_id"

      - step: return
        value:
          artifact_id: "$artifact_id"
          workspace_id: "$workspace.id"
          opened: "not $already_open"
          focused: "$should_focus"

- eidos: praxis
  id: praxis/thyra/close-artifact
  data:
    oikos: thyra
    name: close-artifact
    visible: true
    tier: 2
    description: |
      Close an artifact in the workspace (remove from tabs).

      Removes has-open bond from workspace to artifact.
      If focused, focuses next available artifact.
    params:
      - name: artifact_id
        type: string
        required: true
        description: The artifact to close
    steps:
      - step: assert
        condition: "$_animus"
        message: "Cannot close artifact without an animus"

      # Get workspace
      - step: trace
        from_id: "$_animus.id"
        desmos: "workspace-of"
        resolve: "to"
        bind_to: workspaces

      - step: assert
        condition: "$workspaces | length > 0"
        message: "No workspace found"

      - step: set
        bindings:
          workspace: "$workspaces[0]"

      # Find the has-open bond
      - step: trace
        from_id: "$workspace.id"
        to_id: "$artifact_id"
        desmos: "has-open"
        resolve: "bond"
        bind_to: open_bonds

      - step: switch
        cases:
          - when: "$open_bonds | length > 0"
            then:
              - step: unbind
                bond_id: "$open_bonds[0].id"

      # Check if was focused
      - step: trace
        from_id: "$workspace.id"
        desmos: "focused-on"
        resolve: "to"
        bind_to: focused_artifacts

      - step: set
        bindings:
          was_focused: false
          next_focus: null

      - step: switch
        cases:
          - when: "$focused_artifacts | length > 0 and $focused_artifacts[0].id == $artifact_id"
            then:
              - step: set
                bindings:
                  was_focused: true
              # Remove focus bond
              - step: trace
                from_id: "$workspace.id"
                to_id: "$artifact_id"
                desmos: "focused-on"
                resolve: "bond"
                bind_to: focus_bonds
              - step: switch
                cases:
                  - when: "$focus_bonds | length > 0"
                    then:
                      - step: unbind
                        bond_id: "$focus_bonds[0].id"

              # Focus next available
              - step: trace
                from_id: "$workspace.id"
                desmos: "has-open"
                resolve: "to"
                bind_to: remaining_artifacts
              - step: switch
                cases:
                  - when: "$remaining_artifacts | length > 0"
                    then:
                      - step: call
                        praxis: "thyra/focus-artifact"
                        params:
                          artifact_id: "$remaining_artifacts[0].id"
                      - step: set
                        bindings:
                          next_focus: "$remaining_artifacts[0].id"

      - step: return
        value:
          artifact_id: "$artifact_id"
          workspace_id: "$workspace.id"
          closed: true
          was_focused: "$was_focused"
          next_focus: "$next_focus"

- eidos: praxis
  id: praxis/thyra/focus-artifact
  data:
    oikos: thyra
    name: focus-artifact
    visible: true
    tier: 2
    description: |
      Focus an artifact in the workspace (switch tabs).

      Sets focused-on bond from workspace to artifact.
    params:
      - name: artifact_id
        type: string
        required: true
        description: The artifact to focus
    steps:
      - step: assert
        condition: "$_animus"
        message: "Cannot focus artifact without an animus"

      # Get workspace
      - step: trace
        from_id: "$_animus.id"
        desmos: "workspace-of"
        resolve: "to"
        bind_to: workspaces

      - step: assert
        condition: "$workspaces | length > 0"
        message: "No workspace found"

      - step: set
        bindings:
          workspace: "$workspaces[0]"

      # Remove existing focused-on bond
      - step: trace
        from_id: "$workspace.id"
        desmos: "focused-on"
        resolve: "bond"
        bind_to: existing_focus

      - step: foreach
        items: "$existing_focus"
        as: bond
        do:
          - step: unbind
            bond_id: "$bond.id"

      # Create new focused-on bond
      - step: bind
        from_id: "$workspace.id"
        to_id: "$artifact_id"
        desmos: "focused-on"

      # Update workspace entity
      - step: update
        id: "$workspace.id"
        data:
          focused_artifact_id: "$artifact_id"
          updated_at: "{{ now() }}"

      # Emit focus change to trigger re-render
      - step: emit_display
        payload:
          type: "focus-change"
          artifact_id: "$artifact_id"
          workspace_id: "$workspace.id"
          timestamp: "{{ now() }}"
        bind_to: emit_result

      - step: return
        value:
          artifact_id: "$artifact_id"
          workspace_id: "$workspace.id"
          focused: true

- eidos: praxis
  id: praxis/thyra/get-workspace
  data:
    oikos: thyra
    name: get-workspace
    visible: true
    tier: 1
    description: |
      Get the current workspace state.

      Returns open artifacts and focused artifact.
    params: []
    steps:
      - step: assert
        condition: "$_animus"
        message: "Cannot get workspace without an animus"

      # Get workspace
      - step: trace
        from_id: "$_animus.id"
        desmos: "workspace-of"
        resolve: "to"
        bind_to: workspaces

      - step: switch
        cases:
          - when: "$workspaces | length > 0"
            then:
              - step: set
                bindings:
                  workspace: "$workspaces[0]"

              # Get open artifacts
              - step: trace
                from_id: "$workspace.id"
                desmos: "has-open"
                resolve: "to"
                bind_to: open_artifacts

              # Get focused artifact
              - step: trace
                from_id: "$workspace.id"
                desmos: "focused-on"
                resolve: "to"
                bind_to: focused_artifacts

              - step: set
                bindings:
                  focused: null

              - step: switch
                cases:
                  - when: "$focused_artifacts | length > 0"
                    then:
                      - step: set
                        bindings:
                          focused: "$focused_artifacts[0]"

              - step: return
                value:
                  workspace: "$workspace"
                  workspace_id: "$workspace.id"
                  open_artifacts: "$open_artifacts"
                  open_count: "$open_artifacts | length"
                  focused_artifact: "$focused"
                  focused_artifact_id: "$workspace.data.focused_artifact_id"
        default:
          - step: return
            value:
              workspace: null
              workspace_id: null
              open_artifacts: []
              open_count: 0
              focused_artifact: null
              focused_artifact_id: null

# =============================================================================
# PANEL OPERATIONS
# =============================================================================

- eidos: praxis
  id: praxis/thyra/create-panel
  data:
    oikos: thyra
    name: create-panel
    visible: true
    tier: 2
    description: |
      Create a panel for rendering content in a region.
    params:
      - name: name
        type: string
        required: true
        description: Panel identifier
      - name: render_type
        type: string
        required: true
        description: "How this panel renders (expression-thread, presence-list, etc.)"
      - name: region_id
        type: string
        required: true
        description: The region this panel renders in
      - name: priority
        type: number
        required: false
        description: "Rendering priority (default 0)"
      - name: config
        type: object
        required: false
        description: Panel-specific configuration
    steps:
      - step: set
        bindings:
          panel_id: "panel/$name"
          panel_priority: "$priority"

      - step: switch
        cases:
          - when: "$panel_priority"
            then: []
        default:
          - step: set
            bindings:
              panel_priority: 0

      # CE4: compose instead of arise
      - step: compose
        typos_id: "typos-def-panel"
        inputs:
          id: "$panel_id"
          name: "$name"
          render_type: "$render_type"
          region_id: "$region_id"
          priority: "$panel_priority"
          visible: true
          config: "$config"
          created_at: "{{ now() }}"
        bind_to: panel

      # Bond panel to region
      - step: bind
        from_id: "$panel_id"
        to_id: "$region_id"
        desmos: "renders-in"

      - step: return
        value:
          panel_id: "$panel_id"
          panel: "$panel"
          render_type: "$render_type"
          region_id: "$region_id"

- eidos: praxis
  id: praxis/thyra/list-panels
  data:
    oikos: thyra
    name: list-panels
    visible: true
    tier: 1
    description: |
      List panels, optionally filtered by region or render type.
    params:
      - name: region_id
        type: string
        required: false
        description: Filter by region
      - name: render_type
        type: string
        required: false
        description: Filter by render type
      - name: limit
        type: number
        required: false
        description: "Maximum results (default: 50)"
    steps:
      - step: set
        bindings:
          max_results: "$limit"

      - step: switch
        cases:
          - when: "$max_results"
            then: []
        default:
          - step: set
            bindings:
              max_results: 50

      - step: gather
        eidos: panel
        bind_to: panels

      # Filter by region if specified
      - step: switch
        cases:
          - when: "$region_id"
            then:
              - step: filter
                in: "$panels"
                as: p
                where: "$p.data.region_id == '$region_id'"
                bind_to: panels

      # Filter by render_type if specified
      - step: switch
        cases:
          - when: "$render_type"
            then:
              - step: filter
                in: "$panels"
                as: p
                where: "$p.data.render_type == '$render_type'"
                bind_to: panels

      # Sort by priority
      - step: sort
        items: "$panels"
        by: "data.priority"
        order: "desc"
        bind_to: panels

      - step: limit
        items: "$panels"
        count: "$max_results"
        bind_to: panels

      - step: return
        value:
          panels: "$panels"
          count: "$panels | length"

# =============================================================================
# FULL RENDER CYCLE
# =============================================================================

- eidos: praxis
  id: praxis/thyra/render-all
  data:
    oikos: thyra
    name: render-all
    visible: true
    tier: 3
    description: |
      Reconcile all regions in the active layout.

      Full render cycle — use sparingly. Prefer incremental updates
      via content subscriptions for most changes.
    params: []
    steps:
      - step: assert
        condition: "$_circle"
        message: "Cannot render without dwelling in a circle"

      # Get active layout
      - step: call
        praxis: "thyra/get-active-layout"
        params: {}
        bind_to: layout_result

      - step: assert
        condition: "$layout_result.layout"
        message: "No active layout found"

      - step: set
        bindings:
          layout: "$layout_result.layout"
          regions_rendered: []

      # Reconcile each region
      - step: foreach
        items: "$layout.data.regions"
        as: region
        do:
          - step: set
            bindings:
              region_id: "region/$region.name"
          - step: call
            praxis: "thyra/reconcile-region"
            params:
              region_id: "$region_id"
            bind_to: reconcile_result
          - step: append
            to: "$regions_rendered"
            value:
              region_id: "$region_id"
              region_kind: "$region.kind"
              action: "$reconcile_result.action"
            bind_to: regions_rendered

      - step: return
        value:
          layout_id: "$layout.id"
          regions: "$regions_rendered"
          regions_count: "$regions_rendered | length"
          rendered_at: "{{ now() }}"
