# thyra.yaml
# Thyra praxeis exposed as MCP tools
#
# Thyra is the boundary membrane — emission, accumulation, mode switching.
#
# NOTE: Phasis praxeis moved to logos topos (THYRA-OIKOS Phase 3)
# See genesis/logos/praxeis/logos.yaml

entities:

# =============================================================================
# EKTHESIS - EMISSION TO CHORA
# =============================================================================

- eidos: praxis
  id: praxis/thyra/emit
  bonds:
    - desmos: requires-attainment
      to: attainment/actuate
  data:
    topos: thyra
    name: emit
    visible: true
    tier: 3
    description: |
      Emit content or entity to the filesystem (ekthesis).

      Brings existence into actuality — kosmos → chora.

      If entity_id is provided, the entity is serialized based on format.
      If content is provided directly, it's written as-is.

      Supported formats:
      - yaml: Full entity as YAML
      - json: Full entity as pretty JSON
      - markdown: Human-readable markdown
      - text: Data field only (or serialized if not string)
    params:
      - name: path
        type: string
        required: true
        description: File path to write to
      - name: entity_id
        type: string
        required: false
        description: Entity ID to emit (serialized based on format)
      - name: content
        type: string
        required: false
        description: Direct content to write (if entity_id not provided)
      - name: format
        type: string
        required: false
        description: Output format (yaml, json, markdown, text). Default yaml.
    steps:
      - step: emit
        path: "$path"
        entity_id: "$entity_id"
        content: "$content"
        format: "$format"
        bind_to: result
      - step: return
        value: "$result"

# =============================================================================
# NOTE: PHASIS OPERATIONS moved to logos topos (THYRA-OIKOS Phase 3)
# See genesis/logos/praxeis/logos.yaml for:
#   - logos/emit-phasis (was thyra/express)
#   - logos/list-phaseis
#   - logos/reply-to
#   - logos/get-thread
# =============================================================================

# =============================================================================
# ACCUMULATION OPERATIONS (Buffer Management)
# =============================================================================

- eidos: praxis
  id: praxis/thyra/begin-accumulation
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: begin-accumulation
    visible: true
    tier: 2
    description: |
      Begin accumulating content.

      Creates an accumulation entity that acts as a composition buffer
      for content awaiting commitment. Modality-agnostic.
    params:
      - name: initial_content
        type: string
        required: false
        description: Optional initial content
    steps:
      # Generate accumulation ID
      - step: set
        bindings:
          accumulation_id: "accumulation/{{ now() }}"
          started_at: "now_iso()"
          content: "$initial_content"

      - step: switch
        cases:
          - when: "$content"
            then: []
        default:
          - step: set
            bindings:
              content: ""

      # Create the accumulation (CE4: compose instead of arise)
      - step: compose
        typos_id: "typos-def-accumulation"
        inputs:
          id: "$accumulation_id"
          content: "$content"
          status: "active"
          started_at: "$started_at"
        bind_to: accumulation

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          status: "active"

- eidos: praxis
  id: praxis/thyra/commit-phasis
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: commit-phasis
    visible: true
    tier: 3
    description: |
      Commit a phasis — cross the commitment boundary.

      Takes the accumulated content and commits it as a phasis entity.
      The accumulation resets after commit (singleton pattern).
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to commit
      - name: content
        type: string
        required: false
        description: "Content to commit (from UI overlay). If provided, syncs to entity before committing."
      - name: stance
        type: string
        required: false
        description: "Phasis stance — blank until clarification or user selection"
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: assert
        condition: '$accumulation.data.status == "active"'
        message: "Accumulation is not active: $accumulation_id"

      # If content was passed from the UI, sync it to the entity first
      - step: switch
        cases:
          - when: "$content"
            then:
              - step: update
                id: "$accumulation_id"
                data:
                  content: "$content"
              - step: find
                id: "$accumulation_id"
                bind_to: accumulation

      - step: assert
        condition: '$accumulation.data.content != ""'
        message: "Cannot commit empty phasis — accumulation is empty"

      # Determine source_kind
      - step: set
        bindings:
          commit_source_kind: "direct"

      # Create phasis via logos/emit-phasis
      - step: call
        praxis: "logos/emit-phasis"
        params:
          content: "$accumulation.data.content"
          stance: "$stance"
          source_kind: "$commit_source_kind"
        bind_to: express_result

      # Reset accumulation for reuse (singleton pattern)
      # Re-compose with empty content (clears both content and _composition_inputs.inputs.content)
      - step: compose
        entity_id: "$accumulation_id"
        inputs:
          content: ""

      - step: update
        id: "$accumulation_id"
        data:
          status: "active"

      # Clear transcriber transcript (reset for next utterance cycle)
      - step: trace
        from_id: "$accumulation_id"
        desmos: fed-by-transcriber
        resolve: to
        bind_to: transcriber_entities

      - step: switch
        cases:
          - when: "$transcriber_entities.0"
            then:
              - step: update
                id: "$transcriber_entities.0.id"
                data:
                  transcript: ""

      - step: return
        value:
          phasis_id: "$express_result.phasis_id"
          accumulation_id: "$accumulation_id"

- eidos: praxis
  id: praxis/thyra/abandon-accumulation
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: abandon-accumulation
    visible: true
    tier: 2
    description: |
      Abandon an accumulation — discard without committing.

      Used when the human decides not to send.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to abandon
      - name: reason
        type: string
        required: false
        description: Optional reason for abandoning
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: update
        id: "$accumulation_id"
        data:
          status: "abandoned"
          abandon_reason: "$reason"
          abandoned_at: "{{ now() }}"

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          abandoned: true
          content_discarded: "$accumulation.data.content"

- eidos: praxis
  id: praxis/thyra/clear-accumulation
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: clear-accumulation
    visible: true
    tier: 2
    description: |
      Clear an accumulation — reset content without closing.

      Used to start fresh while keeping the accumulation active.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to clear
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: assert
        condition: '$accumulation.data.status == "active"'
        message: "Accumulation is not active: $accumulation_id"

      - step: set
        bindings:
          old_content: "$accumulation.data.content"

      - step: update
        id: "$accumulation_id"
        data:
          content: ""

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          cleared: true
          content_discarded: "$old_content"

- eidos: praxis
  id: praxis/thyra/get-accumulation
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: get-accumulation
    visible: true
    tier: 1
    description: |
      Get the current state of an accumulation.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to get
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: return
        value:
          accumulation: "$accumulation"
          content: "$accumulation.data.content"
          status: "$accumulation.data.status"

- eidos: praxis
  id: praxis/thyra/list-accumulations
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: list-accumulations
    visible: true
    tier: 1
    description: |
      List accumulations, optionally filtered by status.
    params:
      - name: status
        type: string
        required: false
        description: "Filter by status (active, committed, abandoned, cleared)"
      - name: limit
        type: number
        required: false
        description: "Maximum results (default: 50)"
    steps:
      - step: set
        bindings:
          max_results: "$limit"

      - step: switch
        cases:
          - when: "$max_results"
            then: []
        default:
          - step: set
            bindings:
              max_results: 50

      - step: gather
        eidos: accumulation
        bind_to: accumulations

      # Filter by status if specified
      - step: switch
        cases:
          - when: "$status"
            then:
              - step: filter
                items: "$accumulations"
                condition: "$item.data.status == $status"
                bind_to: accumulations

      - step: limit
        items: "$accumulations"
        count: "$max_results"
        bind_to: accumulations

      - step: return
        value:
          accumulations: "$accumulations"
          count: "$accumulations | length"

- eidos: praxis
  id: praxis/thyra/update-accumulation-content
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: update-accumulation-content
    visible: true
    tier: 2
    description: |
      Update accumulation content manually.

      Called when user edits the content textarea directly.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to update
      - name: content
        type: string
        required: true
        description: The new content value
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: assert
        condition: '$accumulation.data.status == "active"'
        message: "Accumulation is not active: $accumulation_id"

      - step: update
        id: "$accumulation_id"
        data:
          content: "$content"
          last_modified_at: "{{ now() }}"

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          content: "$content"
          updated: true

- eidos: praxis
  id: praxis/thyra/update-accumulation-stance
  data:
    topos: thyra
    name: update-accumulation-stance
    visible: true
    tier: 2
    description: |
      Update accumulation phasis stance.

      Called when user changes the stance selector.
      Sets the stance field on the accumulation entity (entity-as-source-of-truth).
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to update
      - name: stance
        type: enum
        values: [declaration, inquiry, suggestion, request, proposal]
        required: true
        description: The phasis stance
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      - step: assert
        condition: '$accumulation.data.status == "active"'
        message: "Accumulation is not active: $accumulation_id"

      - step: update
        id: "$accumulation_id"
        data:
          stance: "$stance"

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          stance: "$stance"
          updated: true

# =============================================================================
# MODE SWITCHING
# =============================================================================

- eidos: praxis
  id: praxis/thyra/switch-mode
  data:
    topos: thyra
    name: switch-mode
    visible: true
    tier: 2
    description: |
      Replace one mode with another in a thyra-config's active_modes.

      The layout engine reactively re-renders when the thyra-config entity updates.
    params:
      - name: config_id
        type: string
        required: true
        description: The thyra-config entity to update
      - name: from_mode_id
        type: string
        required: true
        description: The mode to remove
      - name: to_mode_id
        type: string
        required: true
        description: The mode to add in its place
    steps:
      - step: find
        id: "$config_id"
        bind_to: config

      - step: assert
        condition: "$config"
        message: "Thyra config not found: $config_id"

      # Verify to_mode exists
      - step: find
        id: "$to_mode_id"
        bind_to: to_mode

      - step: assert
        condition: "$to_mode"
        message: "Target mode not found: $to_mode_id"

      # Get current active_modes, remove the old mode, add the new one
      - step: filter
        items: "$config.data.active_modes"
        condition: "$item != $from_mode_id"
        bind_to: filtered_modes

      # Build new modes via array concatenation (append step lacks bind_to)
      - step: set
        bindings:
          new_modes: "$filtered_modes + [$to_mode_id]"

      # Update with filtered list + new mode appended
      - step: update
        id: "$config_id"
        data:
          active_modes: "$new_modes"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Switched mode from $from_mode_id to $to_mode_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: thyra-config
            source_id: "$config_id"

      - step: return
        value:
          config_id: "$config_id"
          from_mode_id: "$from_mode_id"
          to_mode_id: "$to_mode_id"
          active_modes: "$new_modes"

- eidos: praxis
  id: praxis/thyra/switch-config
  data:
    topos: thyra
    name: switch-config
    visible: true
    tier: 2
    description: |
      Switch the active thyra-config, changing which modes are rendered.

      The layout engine watches the active config entity reactively.
      Updating the preference triggers re-render with the new config's modes.
    params:
      - name: config_id
        type: string
        required: true
        description: "ID of the thyra-config to activate (e.g., thyra-config/workspace, thyra-config/hud)"
    steps:
      - step: find
        id: "$config_id"
        bind_to: target_config

      - step: assert
        condition: "$target_config"
        message: "Thyra config not found: $config_id"

      # Update the well-known preference entity that the layout engine watches
      - step: find
        id: "preference/thyra-active-config"
        bind_to: pref

      - step: switch
        cases:
          - when: "$pref"
            then:
              - step: update
                id: "preference/thyra-active-config"
                data:
                  value: "$config_id"
        default:
          - step: compose
            typos_id: typos-def-preference
            id: "preference/thyra-active-config"
            inputs:
              name: thyra-active-config
              value: "$config_id"

      # Emit phasis for discourse
      - step: call
        praxis: logos/emit-phasis
        params:
          content: "Switched to thyra config $config_id"
          stance: declaration
          source_kind: topos
          metadata:
            source_eidos: thyra-config
            source_id: "$config_id"

      - step: return
        value:
          config_id: "$config_id"
          active_modes: "$target_config.data.active_modes"

# =============================================================================
# COMPOSITION FROM PHASIS
# =============================================================================

- eidos: praxis
  id: praxis/thyra/compose-artifact
  data:
    topos: thyra
    name: compose-artifact
    visible: true
    tier: 3
    description: |
      Compose an artifact from a user-provided prompt.

      The user's typed text becomes the input to governed inference
      via a typos definition. The composed content is emitted as
      a phasis. The accumulation resets after composing.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation entity (for reset after composing)
      - name: prompt
        type: string
        required: true
        description: The user's text — becomes the generation prompt
    steps:
      - step: assert
        condition: "$prompt"
        message: "Prompt is required"

      # Compose via typos — LLM generates content from the prompt
      - step: compose
        typos_id: "typos/compose-from-prompt"
        inputs:
          prompt: "$prompt"
        bind_to: composed

      # Extract the generated content
      - step: set
        bindings:
          composed_content: "$composed.generation.content"

      - step: assert
        condition: "$composed_content"
        message: "Composition produced no content"

      # Emit as phasis — appears in the feed
      - step: call
        praxis: "logos/emit-phasis"
        params:
          content: "$composed_content"
          stance: "declaration"
          source_kind: "composed"
        bind_to: express_result

      # Reset accumulation for reuse
      - step: update
        id: "$accumulation_id"
        data:
          content: ""

      - step: return
        value:
          phasis_id: "$express_result.phasis_id"
          accumulation_id: "$accumulation_id"
          composed_content: "$composed_content"

# =============================================================================
# LITERAL FILL — Three Sources, One Pattern
# =============================================================================

- eidos: praxis
  id: praxis/thyra/flush-transcript
  data:
    topos: thyra
    name: flush-transcript
    visible: false
    tier: 2
    description: |
      Flush transcriber transcript to accumulation literal input.

      Reads the transcriber's transcript buffer, appends it to the
      accumulation's _composition_inputs.inputs.content, re-composes,
      and clears the buffer. Called by the flush-transcript reflex.
    steps:
      # 1. Find the accumulation entity
      - step: find
        id: "accumulation/default"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "accumulation/default not found"

      # 2. Trace fed-by-transcriber bond to get transcriber
      - step: trace
        from_id: "accumulation/default"
        desmos: fed-by-transcriber
        resolve: to
        bind_to: transcriber_entities

      - step: assert
        condition: "$transcriber_entities.0"
        message: "No transcriber bonded via fed-by-transcriber"

      - step: set
        bindings:
          transcriber: "$transcriber_entities.0"

      # 3. Read transcript
      - step: set
        bindings:
          transcript: "$transcriber.data.transcript"

      # 4. Only flush if transcript is non-empty
      - step: switch
        cases:
          - when: '$transcript != ""'
            then:
              # 5. Get existing content from composition inputs
              - step: set
                bindings:
                  existing_content: "$accumulation.data._composition_inputs.inputs.content"

              # 6. Build new content (append with space if existing is non-empty)
              - step: set
                bindings:
                  new_content: "$transcript"

              - step: switch
                cases:
                  - when: '$existing_content != ""'
                    then:
                      - step: set
                        bindings:
                          new_content: '$existing_content + " " + $transcript'

              # 7. Re-compose with merged inputs
              - step: compose
                entity_id: "accumulation/default"
                inputs:
                  content: "$new_content"

              # 8. Clear transcriber transcript
              - step: update
                id: "$transcriber.id"
                data:
                  transcript: ""

      - step: return
        value:
          flushed: true

- eidos: praxis
  id: praxis/thyra/sync-compose-content
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: sync-compose-content
    visible: false
    tier: 2
    description: |
      Sync textarea content to accumulation literal composition input.

      Called before mode switches and other operations that need
      the DOM content reflected in the entity state.
    params:
      - name: content
        type: string
        required: true
        description: "Current textarea content (from $form.content)"
    steps:
      - step: compose
        entity_id: "accumulation/default"
        inputs:
          content: "$content"

      - step: return
        value:
          synced: true

- eidos: praxis
  id: praxis/thyra/toggle-transcription
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: toggle-transcription
    visible: true
    tier: 2
    description: |
      Toggle transcription with content sync. Syncs current textarea
      content to accumulation before toggling, ensuring no content loss
      on mode switch.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation entity to sync and toggle
      - name: content
        type: string
        required: false
        description: "Current textarea content from $form.content"
    steps:
      # Sync DOM content to accumulation (if non-empty)
      - step: switch
        cases:
          - when: "$content"
            then:
              - step: compose
                entity_id: "$accumulation_id"
                inputs:
                  content: "$content"

      # Delegate to soma toggle
      - step: call
        praxis: soma/toggle-transcriber-intent
        params:
          accumulation_id: "$accumulation_id"
        bind_to: toggle_result

      - step: return
        value:
          entity_id: "$toggle_result.entity_id"
          desired_state: "$toggle_result.desired_state"

- eidos: praxis
  id: praxis/thyra/switch-compose-mode
  data:
    topos: thyra
    name: switch-compose-mode
    visible: false
    tier: 2
    description: |
      Switch compose bar mode based on transcriber desired state.

      When transcriber.desired_state transitions to "active", switch from
      compose-full to compose-transcribing. When it transitions to "closed",
      switch back. Finds active thyra-config(s) and updates each.
    params:
      - name: transcriber_desired_state
        type: string
        required: true
        description: "The transcriber's new desired_state (active or closed)"
    steps:
      # Determine from/to modes based on desired_state
      - step: switch
        cases:
          - when: '$transcriber_desired_state == "active"'
            then:
              - step: set
                bindings:
                  from_mode: "mode/compose-full"
                  to_mode: "mode/compose-transcribing"
          - when: '$transcriber_desired_state == "closed"'
            then:
              - step: set
                bindings:
                  from_mode: "mode/compose-transcribing"
                  to_mode: "mode/compose-full"
        default:
          - step: return
            value:
              switched: false
              reason: "Unknown desired_state"

      # Find all thyra-config entities and update each
      - step: gather
        eidos: thyra-config
        bind_to: configs

      - step: for_each
        items: "$configs"
        as: config
        do:
          # Check if this config has the from_mode
          - step: filter
            items: "$config.data.active_modes"
            condition: "$item == $from_mode"
            bind_to: matching_modes

          - step: switch
            cases:
              - when: "$matching_modes.0"
                then:
                  # from_mode is present — filter it out and add to_mode
                  - step: filter
                    items: "$config.data.active_modes"
                    condition: "$item != $from_mode"
                    bind_to: filtered_modes

                  # Build new modes via array concatenation
                  - step: set
                    bindings:
                      new_modes: "$filtered_modes + [$to_mode]"

                  - step: update
                    id: "$config.id"
                    data:
                      active_modes: "$new_modes"

      - step: return
        value:
          switched: true
          from_mode: "$from_mode"
          to_mode: "$to_mode"

# =============================================================================
# CLARIFICATION
# =============================================================================

- eidos: praxis
  id: praxis/thyra/clarify-accumulation
  bonds:
    - desmos: requires-attainment
      to: attainment/perceive
  data:
    topos: thyra
    name: clarify-accumulation
    visible: true
    tier: 3
    description: |
      Clarify accumulation content via governed inference.

      Reads from _composition_inputs.inputs.content (literal input),
      passes to manteia, writes clarified version back via re-compose.
      Creates a clarified-by bond for audit trail.
    params:
      - name: accumulation_id
        type: string
        required: true
        description: The accumulation to clarify
      - name: content
        type: string
        required: false
        description: "Current textarea content (from $form.content). Synced to entity before reading."
    steps:
      - step: find
        id: "$accumulation_id"
        bind_to: accumulation

      - step: assert
        condition: "$accumulation"
        message: "Accumulation not found: $accumulation_id"

      # If content was passed from the UI, sync it to the entity first
      - step: switch
        cases:
          - when: "$content"
            then:
              - step: compose
                entity_id: "$accumulation_id"
                inputs:
                  content: "$content"
              - step: find
                id: "$accumulation_id"
                bind_to: accumulation

      # Read content from literal input
      - step: set
        bindings:
          current_content: "$accumulation.data._composition_inputs.inputs.content"

      - step: assert
        condition: "$current_content"
        message: "Content is empty — nothing to clarify"

      # Compose via typos — schema-enforced clarification (T9)
      - step: compose
        typos_id: "typos/clarify-phasis"
        inputs:
          raw_content: "$current_content"
        bind_to: composed

      - step: set
        bindings:
          clarified_content: "$composed.clarification.content"
          detected_stance: "$composed.clarification.stance"

      - step: assert
        condition: "$clarified_content"
        message: "Clarification produced no content"

      # Write clarified content back via re-compose (updates literal input + content)
      - step: compose
        entity_id: "$accumulation_id"
        inputs:
          content: "$clarified_content"

      # Update stance separately (not part of composition)
      - step: update
        id: "$accumulation_id"
        data:
          stance: "$detected_stance"

      # Create clarified-by bond for audit trail
      - step: switch
        cases:
          - when: "$composed.id"
            then:
              - step: bind
                from_id: "$accumulation_id"
                to_id: "$composed.id"
                desmos: "clarified-by"

      - step: return
        value:
          accumulation_id: "$accumulation_id"
          original_content: "$current_content"
          clarified_content: "$clarified_content"
          detected_stance: "$detected_stance"


