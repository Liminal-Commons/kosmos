# onboarding.yaml
# Homoiconic entities for the onboarding flow
#
# These entities represent the app's own structure as kosmos entities.
# The TSX components become renderers of this structure, not the source of truth.
#
# Three Pillars Application:
#   Schema-driven: Form validation from slot schemas
#   Graph-driven: Navigation as bonds between panels
#   Cache-driven: Panel rendering cached by composition

entities:

# =============================================================================
# ONBOARDING JOURNEY — The teleological container
# =============================================================================

- eidos: journey
  id: journey/onboarding
  data:
    desire: "Establish identity and dwelling in the kosmos"
    description: |
      The onboarding journey guides a new user from first launch
      to sovereign dwelling in their own oikos.

      This journey branches: users either create a new identity
      or restore an existing one from mnemonic.
    status: potential
    current_waypoint: 0
  bonds:
    - desmos: contains-waypoint
      to: waypoint/onboarding-welcome
    - desmos: contains-waypoint
      to: waypoint/onboarding-create
    - desmos: contains-waypoint
      to: waypoint/onboarding-restore
    - desmos: contains-waypoint
      to: waypoint/onboarding-confirm
    - desmos: contains-waypoint
      to: waypoint/onboarding-name
    - desmos: contains-waypoint
      to: waypoint/onboarding-complete

# =============================================================================
# WAYPOINTS — Steps in the onboarding journey
# =============================================================================

# Waypoint 0: Welcome
- eidos: waypoint
  id: waypoint/onboarding-welcome
  data:
    ordinal: 0
    description: "Welcome to Thyra — choose create or restore"
    status: pending
    branches:
      - condition: "action == 'create'"
        target: waypoint/onboarding-create
      - condition: "action == 'restore'"
        target: waypoint/onboarding-restore

# Waypoint 1a: Create new identity
- eidos: waypoint
  id: waypoint/onboarding-create
  data:
    ordinal: 1
    description: "Generate mnemonic for new identity"
    status: pending
    next: waypoint/onboarding-confirm

# Waypoint 1b: Restore from mnemonic (branch)
- eidos: waypoint
  id: waypoint/onboarding-restore
  data:
    ordinal: 1
    description: "Enter mnemonic to restore identity"
    status: pending
    form_typos_id: typos/mnemonic-entry-form
    next: waypoint/onboarding-name

# Waypoint 2: Confirm mnemonic
- eidos: waypoint
  id: waypoint/onboarding-confirm
  data:
    ordinal: 2
    description: "Verify understanding of mnemonic importance"
    status: pending
    form_typos_id: typos/mnemonic-confirm-form
    next: waypoint/onboarding-name

# Waypoint 3: Name prosopon
- eidos: waypoint
  id: waypoint/onboarding-name
  data:
    ordinal: 3
    description: "Name your prosopon for this oikos"
    status: pending
    form_typos_id: typos/prosopon-name-form
    next: waypoint/onboarding-complete

# Waypoint 4: Journey complete
- eidos: waypoint
  id: waypoint/onboarding-complete
  data:
    ordinal: 4
    description: "Identity established, dwelling begun"
    status: pending
    yields:
      - prosopon
      - oikos
