# Thyra Render Specifications
#
# Rendering definitions for thyra eide: expression, stream, accumulation
# Oikos-centric: thyra owns presentation for portal/interface entities
#
# Discovery convention: render-spec/{eidos}-card, render-spec/{eidos}

entities:

# =============================================================================
# EXPRESSION RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/expression-card
  data:
    name: expression-card
    description: "Card view for expression — conversation contributions"
    target_eidos: expression
    fields_to_display:
      - field: content
      - field: expressed_by
      - field: expressed_at
      - field: mode
    layout_template: |
      <article class="render-card expression-card expression-{mode}">
        <header class="card-header">
          <span class="expressed-by">{expressed_by}</span>
          <span class="expressed-at">{expressed_at}</span>
        </header>
        <div class="card-body">
          <p class="content">{content}</p>
        </div>
        <footer class="card-footer">
          <span class="mode-badge">{mode}</span>
        </footer>
      </article>
    style_bindings:
      expression-declaration: "border-left: 3px solid var(--mode-declaration, #3b82f6)"
      expression-inquiry: "border-left: 3px solid var(--mode-inquiry, #8b5cf6)"
      expression-suggestion: "border-left: 3px solid var(--mode-suggestion, #10b981)"
      expression-invitation: "border-left: 3px solid var(--mode-invitation, #f59e0b)"
      expression-request: "border-left: 3px solid var(--mode-request, #ef4444)"
      expression-proposal: "border-left: 3px solid var(--mode-proposal, #6366f1)"
    created_at: "2025-01-29T00:00:00Z"

- eidos: render-spec
  id: render-spec/expression
  data:
    name: expression-detail
    description: "Detail view for expression — full content with context"
    target_eidos: expression
    fields_to_display:
      - field: content
      - field: expressed_by
      - field: circle_id
      - field: expressed_at
      - field: mode
      - field: in_reply_to
    layout_template: |
      <article class="render-detail expression-detail expression-{mode}">
        <header class="detail-header">
          <div class="author-row">
            <span class="expressed-by">{expressed_by}</span>
            <span class="mode-badge mode-{mode}">{mode}</span>
          </div>
          <div class="meta-row">
            <span class="expressed-at">{expressed_at}</span>
            <span class="circle-id">in {circle_id}</span>
          </div>
        </header>
        <section class="detail-body">
          <div class="content-block">
            <p class="content">{content}</p>
          </div>
          <div class="reply-context">
            <span class="in-reply-to">Reply to: {in_reply_to}</span>
          </div>
        </section>
        <footer class="detail-footer">
          <code class="entity-id">{id}</code>
        </footer>
      </article>
    style_bindings:
      mode-declaration: "background: var(--bg-declaration, #dbeafe)"
      mode-inquiry: "background: var(--bg-inquiry, #ede9fe)"
      mode-suggestion: "background: var(--bg-suggestion, #d1fae5)"
      mode-invitation: "background: var(--bg-invitation, #fef3c7)"
    created_at: "2025-01-29T00:00:00Z"

# =============================================================================
# STREAM RENDER SPECS
# =============================================================================

- eidos: render-spec
  id: render-spec/stream-card
  data:
    name: stream-card
    description: "Card view for stream — media flow status"
    target_eidos: stream
    fields_to_display:
      - field: kind
      - field: direction
      - field: status
    layout_template: |
      <article class="render-card stream-card stream-{status}">
        <header class="card-header">
          <span class="stream-kind kind-{kind}">{kind}</span>
          <span class="stream-direction direction-{direction}">{direction}</span>
        </header>
        <div class="card-body">
          <span class="status-indicator status-{status}">{status}</span>
        </div>
        <footer class="card-footer">
          <span class="entity-id">{id}</span>
        </footer>
      </article>
    style_bindings:
      stream-active: "border-left: 3px solid var(--status-success, #10b981)"
      stream-pending: "border-left: 3px solid var(--status-warning, #f59e0b)"
      stream-paused: "border-left: 3px solid var(--status-muted, #6b7280)"
      stream-closed: "border-left: 3px solid var(--status-muted, #9ca3af)"
      stream-failed: "border-left: 3px solid var(--status-error, #ef4444)"
      kind-voice: "background: var(--bg-voice, #fef3c7)"
      kind-video: "background: var(--bg-video, #dbeafe)"
      kind-text: "background: var(--bg-text, #f3f4f6)"
    created_at: "2025-01-29T00:00:00Z"
