- id: praxis/dns/reconcile-record
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Align DNS record intent with actuality (phylax pattern).


      - desired=present, actual=absent -> MANIFEST (create at provider)

      - desired=absent, actual=present -> UNMANIFEST (delete at provider)

      - desired=present, actual=diverged -> UPDATE at provider

      '
    name: reconcile-record
    oikos: thyra
    params:
    - description: The record to reconcile
      name: record_id
      required: true
      type: string
    steps:
    - bind_to: record
      id: $record_id
      step: find
    - condition: $record
      message: 'Record not found: $record_id'
      step: assert
    - bind_to: actual
      entity_id: $record_id
      step: sense_actuality
    - bindings:
        action_taken: none
        actual_status: $actual.status
        desired: $record.data.desired_state
      step: set
    - cases:
      - then:
        - bind_to: manifest_result
          entity_id: $record_id
          step: manifest
        - data:
            actual_state: present
            last_reconciled_at: '{{ now() }}'
            provider_record_id: $manifest_result.provider_record_id
          id: $record_id
          step: update
        - bindings:
            action_taken: manifested
          step: set
        when: $desired == "present" and $actual_status == "absent"
      - then:
        - bind_to: unmanifest_result
          entity_id: $record_id
          step: unmanifest
        - data:
            actual_state: absent
            last_reconciled_at: '{{ now() }}'
            provider_record_id: null
          id: $record_id
          step: update
        - bindings:
            action_taken: unmanifested
          step: set
        when: $desired == "absent" and $actual_status == "present"
      - then:
        - bind_to: update_result
          entity_id: $record_id
          step: manifest
        - data:
            actual_state: present
            divergence: null
            last_reconciled_at: '{{ now() }}'
          id: $record_id
          step: update
        - bindings:
            action_taken: updated
          step: set
        when: $desired == "present" and $actual_status == "diverged"
      default:
      - data:
          actual_state: $actual_status
          last_reconciled_at: '{{ now() }}'
        id: $record_id
        step: update
      - bindings:
          action_taken: aligned
        step: set
      step: switch
    - step: return
      value:
        action_taken: $action_taken
        actual_state: $actual_status
        desired_state: $desired
        record_id: $record_id
    tier: 3
    visible: true
- id: praxis/dns/reconcile-zone
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Reconcile all records in a zone. Bulk phylax operation.

      '
    name: reconcile-zone
    oikos: thyra
    params:
    - description: Zone to reconcile
      name: zone_id
      required: true
      type: string
    steps:
    - bind_to: listing
      params:
        zone_id: $zone_id
      praxis: dns/list-records
      step: call
    - bindings:
        aligned: 0
        manifested: 0
        results: '[]'
        unmanifested: 0
        updated: 0
      step: set
    - item_var: record
      items: $listing.records
      step: for_each
      steps:
      - bind_to: result
        params:
          record_id: $record.id
        praxis: dns/reconcile-record
        step: call
      - cases:
        - then:
          - bindings:
              manifested: $manifested + 1
            step: set
          when: $result.action_taken == "manifested"
        - then:
          - bindings:
              unmanifested: $unmanifested + 1
            step: set
          when: $result.action_taken == "unmanifested"
        - then:
          - bindings:
              updated: $updated + 1
            step: set
          when: $result.action_taken == "updated"
        - then:
          - bindings:
              aligned: $aligned + 1
            step: set
          when: $result.action_taken == "aligned"
        step: switch
      - bindings:
          results: $results + [$result]
        step: set
    - data:
        last_synced_at: '{{ now() }}'
        record_count: $listing.count
      id: $zone_id
      step: update
    - step: return
      value:
        reconciled: $listing.count
        results: $results
        summary:
          aligned: $aligned
          manifested: $manifested
          unmanifested: $unmanifested
          updated: $updated
        zone_id: $zone_id
    tier: 3
    visible: true
- id: praxis/dns/sense-record
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Sense the actual state of a DNS record at the provider.

      Does NOT modify the entity - just returns current state.

      '
    name: sense-record
    oikos: thyra
    params:
    - description: The record to sense
      name: record_id
      required: true
      type: string
    steps:
    - bind_to: record
      id: $record_id
      step: find
    - condition: $record
      message: 'Record not found: $record_id'
      step: assert
    - bind_to: actual
      entity_id: $record_id
      step: sense_actuality
    - step: return
      value:
        actual_content: $actual.content
        actual_state: $actual.status
        desired_state: $record.data.desired_state
        divergence: $actual.divergence
        provider_record_id: $actual.provider_record_id
        record_id: $record_id
    tier: 3
    visible: true
- id: praxis/dns/sense-zone
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Sense all records in a zone without reconciling.

      Useful for detecting drift.

      '
    name: sense-zone
    oikos: thyra
    params:
    - description: Zone to sense
      name: zone_id
      required: true
      type: string
    steps:
    - bind_to: listing
      params:
        zone_id: $zone_id
      praxis: dns/list-records
      step: call
    - bindings:
        absent_count: 0
        diverged_count: 0
        present_count: 0
        sensed_records: '[]'
        unknown_count: 0
      step: set
    - item_var: record
      items: $listing.records
      step: for_each
      steps:
      - bind_to: actual
        entity_id: $record.id
        step: sense_actuality
      - cases:
        - then:
          - bindings:
              present_count: $present_count + 1
            step: set
          when: $actual.status == "present"
        - then:
          - bindings:
              absent_count: $absent_count + 1
            step: set
          when: $actual.status == "absent"
        - then:
          - bindings:
              diverged_count: $diverged_count + 1
            step: set
          when: $actual.status == "diverged"
        step: switch
      - bindings:
          sensed_records: '$sensed_records + [{ record_id: $record.id, desired: $record.data.desired_state,
            actual: $actual.status }]'
        step: set
    - step: return
      value:
        records: $sensed_records
        summary:
          absent: $absent_count
          diverged: $diverged_count
          present: $present_count
          unknown: $unknown_count
        total_records: $listing.count
        zone_id: $zone_id
    tier: 3
    visible: true
- id: praxis/dokimasia/_walk-chain
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: 'Internal: recursively walk the authorization chain'
    name: _walk-chain
    oikos: dokimasia
    params:
    - name: current_id
      required: true
      type: string
    - name: chain
      required: true
      type: array
    - name: depth
      required: true
      type: number
    - name: max_depth
      required: true
      type: number
    - name: visited
      required: true
      type: array
    steps:
    - cases:
      - then:
        - step: return
          value:
            chain: $chain
            terminus: expression/genesis-root
            valid: true
        when: $current_id == "expression/genesis-root"
      step: switch
    - cases:
      - then:
        - step: return
          value:
            chain: $chain
            error:
              code: MAX_DEPTH_EXCEEDED
              context:
                at_entity: $current_id
                max_depth: $max_depth
              layer: provenance
              message: Provenance chain exceeded max depth
            terminus: $current_id
            valid: false
        when: $depth >= $max_depth
      step: switch
    - bindings:
        is_cycle: false
      step: set
    - item_var: visited_id
      items: $visited
      step: for_each
      steps:
      - cases:
        - then:
          - bindings:
              is_cycle: true
            step: set
          when: $visited_id == $current_id
        step: switch
    - cases:
      - then:
        - step: return
          value:
            chain: $chain
            error:
              code: CYCLE_DETECTED
              context:
                cycle_at: $current_id
              layer: provenance
              message: Provenance chain contains cycle
            terminus: $current_id
            valid: false
        when: $is_cycle
      step: switch
    - bind_to: current
      id: $current_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            chain: $chain
            error:
              code: ENTITY_NOT_FOUND
              context:
                missing_id: $current_id
              layer: provenance
              message: Entity in chain not found
            terminus: $current_id
            valid: false
        when: not $current
      step: switch
    - bindings:
        next_id: $current.data.authorized_by
      step: set
    - cases:
      - then:
        - step: return
          value:
            chain: $chain
            error:
              code: CHAIN_BROKEN
              context:
                entity_id: $current_id
              layer: provenance
              message: Entity has no authorized_by
            terminus: $current_id
            valid: false
        when: not $next_id
      step: switch
    - bindings:
        new_chain: $chain + [$current_id]
        new_depth: $depth + 1
        new_visited: $visited + [$current_id]
      step: set
    - bind_to: result
      params:
        chain: $new_chain
        current_id: $next_id
        depth: $new_depth
        max_depth: $max_depth
        visited: $new_visited
      praxis: praxis/dokimasia/_walk-chain
      step: call
    - step: return
      value: $result
    tier: 2
    visible: false
- id: praxis/dokimasia/compose-validation-report
  eidos: praxis
  version: 145
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: 'Compose a validation report that aggregates validation status

      across a dependency subgraph.


      Uses the traverse stoicheion to walk depends-on, authorized-by,

      and composed-from bonds from the root entity. For each entity

      in the subgraph, gathers validation results.


      Returns an artifact containing:

      - root: the starting entity

      - traversed: count of entities examined

      - summary: { passed, failed, pending }

      - failures: array of validation errors with context

      - provenance_chain: authorization chain to genesis

      '
    name: compose-validation-report
    oikos: dokimasia
    params:
    - description: Entity to start validation traversal from
      name: root_id
      required: true
      type: string
    - description: Maximum traversal depth (default 10)
      name: depth
      required: false
      type: number
    - description: Include passed validations in results
      name: include_passed
      required: false
      type: boolean
    steps:
    - bindings:
        max_depth: 10
        show_passed: false
      step: set
    - cases:
      - then:
        - bindings:
            max_depth: $depth
          step: set
        when: $depth
      step: switch
    - cases:
      - then:
        - bindings:
            show_passed: $include_passed
          step: set
        when: $include_passed
      step: switch
    - bind_to: root_entity
      id: $root_id
      step: find
    - condition: $root_entity
      message: 'Root entity not found: $root_id'
      step: assert
    - bind_to: traversed_entities
      depth: $max_depth
      desmoi:
      - depends-on
      - authorized-by
      - composed-from
      direction: outward
      root_id: $root_id
      step: traverse
    - bindings:
        all_results: []
        failed_count: 0
        failures: []
        passed_count: 0
        pending_count: 0
        traversed_count: 0
      step: set
    - item_var: entity
      items: $traversed_entities
      step: for_each
      steps:
      - bindings:
          traversed_count: $traversed_count + 1
        step: set
      - bind_to: validations
        desmos: validated-by
        from_id: $entity.id
        resolve: to
        step: trace
      - item_var: validation
        items: $validations
        step: for_each
        steps:
        - cases:
          - then:
            - bindings:
                passed_count: $passed_count + 1
              step: set
            - cases:
              - then:
                - bindings:
                    all_results: '$all_results + [{entity_id: $entity.id, validation_id:
                      $validation.id, passed: true}]'
                  step: set
                when: $show_passed
              step: switch
            when: $validation.data.passed
          - then:
            - bindings:
                failed_count: $failed_count + 1
                failures: '$failures + [{entity_id: $entity.id, validation_id: $validation.id,
                  errors: $validation.data.errors}]'
              step: set
            when: not $validation.data.passed
          step: switch
    - bind_to: provenance_result
      params:
        entity_id: $root_id
      praxis: praxis/dokimasia/validate-provenance
      step: call
    - bindings:
        report_content:
          failures: $failures
          provenance_chain: $provenance_result.chain
          provenance_valid: $provenance_result.valid
          root: $root_id
          summary:
            failed: $failed_count
            passed: $passed_count
            pending: $pending_count
          traversed: $traversed_count
        report_id: validation-report/$root_id
      step: set
    - bind_to: report_artifact
      definition_id: artifact-def-validation-report
      id: $report_id
      inputs:
        depth: $max_depth
        include_passed: $show_passed
        root_id: $root_id
      step: compose
    - bind_to: updated_artifact
      data:
        composed_at: '{{ now() }}'
        content: $report_content
      id: $report_id
      step: update
    - item_var: dep
      items: $traversed_entities
      step: for_each
      steps:
      - desmos: depends-on
        from_id: $report_id
        step: bind
        to_id: $dep.id
    - step: return
      value: $updated_artifact
    tier: 2
    visible: true
- id: praxis/dokimasia/validate-generation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: 'Validate a generation through all layers.


      Runs:

      1. Provenance validation (authorization chain to genesis)

      2. Schema validation (content matches target eidos)

      3. Semantic validation (references resolve)


      Creates a validation-result entity recording the outcome.

      Bonds the generation to its validation-result.


      Returns the validation-result.

      '
    name: validate-generation
    oikos: dokimasia
    params:
    - description: Generation to validate
      name: generation_id
      required: true
      type: string
    - description: Include behavioral validation (default false)
      name: include_behavioral
      required: false
      type: boolean
    steps:
    - bind_to: generation
      id: $generation_id
      step: find
    - condition: $generation
      message: 'Generation not found: $generation_id'
      step: assert
    - bindings:
        all_errors: []
        provenance_chain: []
        provenance_valid: false
        schema_valid: false
        semantic_valid: false
      step: set
    - bind_to: prov_result
      params:
        entity_id: $generation.data.authorized_by
      praxis: praxis/dokimasia/validate-provenance
      step: call
    - bindings:
        provenance_chain: $prov_result.chain
        provenance_valid: $prov_result.valid
      step: set
    - cases:
      - then:
        - bindings:
            all_errors: $all_errors + [$prov_result.error]
          step: set
        when: not $prov_result.valid
      step: switch
    - cases:
      - then:
        - bindings:
            content_to_validate: $generation.data.final_content
          step: set
        - cases:
          - then:
            - bindings:
                content_to_validate: $generation.data.response
              step: set
            when: not $content_to_validate
          step: switch
        - bind_to: schema_result
          params:
            content: $content_to_validate
            eidos_id: eidos/$generation.data.target_eidos
          praxis: praxis/dokimasia/validate-schema
          step: call
        - bindings:
            schema_valid: $schema_result.valid
          step: set
        - cases:
          - then:
            - bindings:
                all_errors: $all_errors + $schema_result.errors
              step: set
            when: not $schema_result.valid
          step: switch
        when: $generation.data.target_eidos
      default:
      - bindings:
          schema_valid: true
        step: set
      step: switch
    - bindings:
        semantic_content: $generation.data.final_content
      step: set
    - cases:
      - then:
        - bindings:
            semantic_content: $generation.data.response
          step: set
        when: not $semantic_content
      step: switch
    - bind_to: sem_result
      params:
        content: $semantic_content
      praxis: praxis/dokimasia/validate-semantic
      step: call
    - bindings:
        semantic_valid: $sem_result.valid
      step: set
    - cases:
      - then:
        - bindings:
            all_errors: $all_errors + $sem_result.errors
          step: set
        when: not $sem_result.valid
      step: switch
    - bindings:
        passed: $provenance_valid and $schema_valid and $semantic_valid
        validation_id: validation/$generation_id
      step: set
    - bind_to: validation
      data:
        errors: $all_errors
        generation_id: $generation_id
        passed: $passed
        provenance_chain: $provenance_chain
        provenance_valid: $provenance_valid
        schema_valid: $schema_valid
        semantic_valid: $semantic_valid
        validated_at: '{{ now() }}'
      eidos: validation-result
      id: $validation_id
      step: arise
    - desmos: validated-by
      from_id: $generation_id
      step: bind
      to_id: $validation_id
    - step: return
      value: $validation
    tier: 2
    visible: true
- id: praxis/dokimasia/validate-provenance
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: "Verify that an entity's authorization traces to genesis.\n\nWalks\
      \ the authorized_by chain until:\n- It reaches expression/genesis-root (valid)\n\
      - It reaches an entity without authorized_by (invalid)\n- It detects a cycle\
      \ (invalid)\n- Max depth exceeded (invalid, possible attack)\n\nReturns:\n \
      \ valid: boolean\n  chain: array of entity IDs traced\n  terminus: where the\
      \ chain ended\n  error: validation-error if failed\n"
    name: validate-provenance
    oikos: dokimasia
    params:
    - description: Entity to validate provenance for
      name: entity_id
      required: true
      type: string
    - description: Maximum chain length (default 100)
      name: max_depth
      required: false
      type: number
    steps:
    - bind_to: start_entity
      id: $entity_id
      step: find
    - condition: $start_entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bindings:
        chain: []
        current_id: $entity_id
        depth: 0
        error: null
        max: 100
        terminus: null
        valid: false
      step: set
    - cases:
      - then:
        - bindings:
            max: $max_depth
          step: set
        when: $max_depth
      step: switch
    - bind_to: result
      params:
        chain: $chain
        current_id: $current_id
        depth: 0
        max_depth: $max
        visited: []
      praxis: praxis/dokimasia/_walk-chain
      step: call
    - step: return
      value: $result
    tier: 2
    visible: true
- id: praxis/dokimasia/validate-schema
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: "Verify content matches target eidos schema.\n\nChecks:\n- All required\
      \ fields are present\n- Field types match (string, number, boolean, array, object)\n\
      - Enum values are valid\n\nReturns:\n  valid: boolean\n  errors: array of validation-error\n"
    name: validate-schema
    oikos: dokimasia
    params:
    - description: Target eidos ID
      name: eidos_id
      required: true
      type: string
    - description: Content to validate
      name: content
      required: true
      type: object
    steps:
    - bind_to: eidos_def
      id: $eidos_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            errors:
            - code: EIDOS_NOT_FOUND
              context:
                eidos_id: $eidos_id
              layer: schema
              message: Target eidos not found
            valid: false
        when: not $eidos_def
      step: switch
    - bindings:
        errors: []
        fields: $eidos_def.data.fields
        valid: true
      step: set
    - cases:
      - then:
        - step: return
          value:
            errors: []
            valid: true
        when: not $fields
      step: switch
    - item_var: field_name
      items: $fields | keys
      step: for_each
      steps:
      - bindings:
          field_def: $fields[$field_name]
          field_exists: $content[$field_name] != null
          field_value: $content[$field_name]
        step: set
      - cases:
        - then:
          - bindings:
              errors: '$errors + [{layer: ''schema'', code: ''MISSING_FIELD'', message:
                ''Required field missing'', path: ''$.'' + $field_name}]'
              valid: false
            step: set
          when: $field_def.required and not $field_exists
        step: switch
    - step: return
      value:
        errors: $errors
        valid: $valid
    tier: 1
    visible: true
- id: praxis/dokimasia/validate-semantic
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/dokimasia/praxeis/dokimasia.yaml
    description: "Verify all entity/eidos/desmos references resolve.\n\nScans content\
      \ for fields ending in _id or containing entity IDs\nand verifies each referenced\
      \ entity exists.\n\nReturns:\n  valid: boolean\n  errors: array of validation-error\n"
    name: validate-semantic
    oikos: dokimasia
    params:
    - description: Content with references to validate
      name: content
      required: true
      type: object
    steps:
    - bindings:
        errors: []
        valid: true
      step: set
    - cases:
      - then:
        - bind_to: eidos_ref
          id: $content.eidos_id
          step: find
        - cases:
          - then:
            - bindings:
                errors: '$errors + [{layer: ''semantic'', code: ''UNRESOLVED_EIDOS'',
                  message: ''Referenced eidos not found'', path: ''$.eidos_id'', context:
                  {ref: $content.eidos_id}}]'
                valid: false
              step: set
            when: not $eidos_ref
          step: switch
        when: $content.eidos_id
      step: switch
    - cases:
      - then:
        - bind_to: target_ref
          id: eidos/$content.target_eidos
          step: find
        - cases:
          - then:
            - bind_to: target_ref2
              id: $content.target_eidos
              step: find
            - cases:
              - then:
                - bindings:
                    errors: '$errors + [{layer: ''semantic'', code: ''UNRESOLVED_EIDOS'',
                      message: ''Target eidos not found'', path: ''$.target_eidos'',
                      context: {ref: $content.target_eidos}}]'
                    valid: false
                  step: set
                when: not $target_ref2
              step: switch
            when: not $target_ref
          step: switch
        when: $content.target_eidos
      step: switch
    - cases:
      - then:
        - bind_to: praxis_ref
          id: $content.praxis_id
          step: find
        - cases:
          - then:
            - bindings:
                errors: '$errors + [{layer: ''semantic'', code: ''UNRESOLVED_PRAXIS'',
                  message: ''Referenced praxis not found'', path: ''$.praxis_id'',
                  context: {ref: $content.praxis_id}}]'
                valid: false
              step: set
            when: not $praxis_ref
          step: switch
        when: $content.praxis_id
      step: switch
    - cases:
      - then:
        - bind_to: circle_ref
          id: $content.circle_id
          step: find
        - cases:
          - then:
            - bindings:
                errors: '$errors + [{layer: ''semantic'', code: ''UNRESOLVED_ENTITY'',
                  message: ''Referenced circle not found'', path: ''$.circle_id'',
                  context: {ref: $content.circle_id}}]'
                valid: false
              step: set
            when: not $circle_ref
          step: switch
        when: $content.circle_id
      step: switch
    - cases:
      - then:
        - bind_to: persona_ref
          id: $content.persona_id
          step: find
        - cases:
          - then:
            - bindings:
                errors: '$errors + [{layer: ''semantic'', code: ''UNRESOLVED_ENTITY'',
                  message: ''Referenced persona not found'', path: ''$.persona_id'',
                  context: {ref: $content.persona_id}}]'
                valid: false
              step: set
            when: not $persona_ref
          step: switch
        when: $content.persona_id
      step: switch
    - step: return
      value:
        errors: $errors
        valid: $valid
    tier: 1
    visible: true
- id: praxis/ergon/check-task
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Check a task''s status.


      Senses whether the task process is still running and updates

      the entity if it has completed.

      '
    name: check-task
    oikos: ergon
    params:
    - description: The task to check
      name: task_id
      required: true
      type: string
    steps:
    - bind_to: task
      id: $task_id
      step: find
    - condition: $task
      message: 'Task not found: $task_id'
      step: assert
    - cases:
      - then:
        - bind_to: actual
          entity_id: $task_id
          step: sense_actuality
        - cases:
          - then:
            - bindings:
                final_status: completed
              step: set
            - cases:
              - then:
                - bindings:
                    final_status: failed
                  step: set
                when: $actual.exit_code and $actual.exit_code != 0
              step: switch
            - data:
                completed_at: '{{ now() }}'
                exit_code: $actual.exit_code
                status: $final_status
              id: $task_id
              step: update
            when: not $actual.running
          step: switch
        when: $task.data.status == "running"
      step: switch
    - bind_to: updated_task
      id: $task_id
      step: find
    - step: return
      value: $updated_task
    tier: 1
    visible: true
- id: praxis/ergon/create-daemon
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Create a daemon entity.


      A daemon represents a long-running process. It has both existence (entity)

      and potential actuality (process). Created in stopped state by default.

      '
    name: create-daemon
    oikos: ergon
    params:
    - description: Daemon entity ID
      name: id
      required: true
      type: string
    - description: Shell command to execute
      name: command
      required: true
      type: string
    - description: Working directory
      name: working_dir
      required: false
      type: string
    - description: Environment variables
      name: env
      required: false
      type: object
    - description: Initial desired state (default stopped)
      name: desired_state
      required: false
      type: string
    steps:
    - bindings:
        initial_state: $desired_state
      step: set
    - cases:
      - then: []
        when: $initial_state
      default:
      - bindings:
          initial_state: stopped
        step: set
      step: switch
    - bind_to: daemon
      data:
        actual_state: stopped
        command: $command
        desired_state: $initial_state
        env: $env
        working_dir: $working_dir
      eidos: daemon
      id: $id
      step: arise
    - step: return
      value: $daemon
    tier: 2
    visible: true
- id: praxis/ergon/create-task
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Create a task entity.


      A task represents a short-lived process that produces a result.

      Created in pending state, must be explicitly run.

      '
    name: create-task
    oikos: ergon
    params:
    - description: Task entity ID
      name: id
      required: true
      type: string
    - description: Shell command to execute
      name: command
      required: true
      type: string
    - description: Working directory
      name: working_dir
      required: false
      type: string
    - description: Environment variables
      name: env
      required: false
      type: object
    steps:
    - bind_to: task
      data:
        command: $command
        env: $env
        status: pending
        working_dir: $working_dir
      eidos: task
      id: $id
      step: arise
    - step: return
      value: $task
    tier: 2
    visible: true
- id: praxis/ergon/list-daemons
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'List all daemons, optionally filtered by state.

      '
    name: list-daemons
    oikos: ergon
    params:
    - description: Filter by desired_state (running, stopped)
      name: desired_state
      required: false
      type: string
    - description: Maximum results
      name: limit
      required: false
      type: number
    steps:
    - bind_to: daemons
      eidos: daemon
      limit: $limit
      step: gather
    - cases:
      - then:
        - as: d
          bind_to: daemons
          in: $daemons
          step: filter
          where: $d.data.desired_state == '$desired_state'
        when: $desired_state
      step: switch
    - step: return
      value:
        count: $daemons | length
        daemons: $daemons
    tier: 1
    visible: true
- id: praxis/ergon/list-tasks
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'List all tasks, optionally filtered by status.

      '
    name: list-tasks
    oikos: ergon
    params:
    - description: Filter by status (pending, running, completed, failed)
      name: status
      required: false
      type: string
    - description: Maximum results
      name: limit
      required: false
      type: number
    steps:
    - bind_to: tasks
      eidos: task
      limit: $limit
      step: gather
    - cases:
      - then:
        - as: t
          bind_to: tasks
          in: $tasks
          step: filter
          where: $t.data.status == '$status'
        when: $status
      step: switch
    - step: return
      value:
        count: $tasks | length
        tasks: $tasks
    tier: 1
    visible: true
- id: praxis/ergon/reconcile-daemon
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Reconcile a daemon''s desired state with actual state.


      This is the core of the phylax (supervisor) pattern:

      1. Sense actual state

      2. Compare with desired state

      3. Take action to align them


      Actions:

      - desired=running, actual=stopped → manifest

      - desired=stopped, actual=running → unmanifest

      '
    name: reconcile-daemon
    oikos: ergon
    params:
    - description: The daemon to reconcile
      name: daemon_id
      required: true
      type: string
    steps:
    - bind_to: daemon
      id: $daemon_id
      step: find
    - condition: $daemon
      message: 'Daemon not found: $daemon_id'
      step: assert
    - bind_to: actual
      entity_id: $daemon_id
      step: sense_actuality
    - bindings:
        action_taken: none
        actual_running: $actual.running
        desired: $daemon.data.desired_state
      step: set
    - cases:
      - then:
        - bind_to: manifest_result
          entity_id: $daemon_id
          step: manifest
        - data:
            actual_state: running
            last_reconciled: '{{ now() }}'
            pid: $manifest_result.pid
          id: $daemon_id
          step: update
        - bindings:
            action_taken: manifested
          step: set
        when: $desired == "running" and not $actual_running
      - then:
        - bind_to: unmanifest_result
          entity_id: $daemon_id
          step: unmanifest
        - data:
            actual_state: stopped
            last_reconciled: '{{ now() }}'
            pid: null
          id: $daemon_id
          step: update
        - bindings:
            action_taken: unmanifested
          step: set
        when: $desired == "stopped" and $actual_running
      default:
      - bindings:
          current_state: $actual_running
        step: set
      - cases:
        - then:
          - data:
              actual_state: running
              last_reconciled: '{{ now() }}'
            id: $daemon_id
            step: update
          when: $current_state
        default:
        - data:
            actual_state: stopped
            last_reconciled: '{{ now() }}'
          id: $daemon_id
          step: update
        step: switch
      - bindings:
          action_taken: aligned
        step: set
      step: switch
    - step: return
      value:
        action_taken: $action_taken
        actual_running: $actual_running
        daemon_id: $daemon_id
        desired_state: $desired
    tier: 3
    visible: true
- id: praxis/ergon/run-task
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Run a pending task.


      Manifests the task process, waits for completion (or timeout),

      and captures the result.

      '
    name: run-task
    oikos: ergon
    params:
    - description: The task to run
      name: task_id
      required: true
      type: string
    steps:
    - bind_to: task
      id: $task_id
      step: find
    - condition: $task
      message: 'Task not found: $task_id'
      step: assert
    - condition: $task.data.status == "pending"
      message: 'Task is not pending: $task_id'
      step: assert
    - data:
        started_at: '{{ now() }}'
        status: running
      id: $task_id
      step: update
    - bind_to: manifest_result
      entity_id: $task_id
      step: manifest
    - bindings:
        final_status: completed
      step: set
    - cases:
      - then:
        - bindings:
            final_status: failed
          step: set
        when: $manifest_result.success == false
      step: switch
    - data:
        completed_at: '{{ now() }}'
        exit_code: $manifest_result.exit_code
        status: $final_status
        stderr: $manifest_result.stderr
        stdout: $manifest_result.stdout
      id: $task_id
      step: update
    - step: return
      value:
        exit_code: $manifest_result.exit_code
        status: $final_status
        stderr: $manifest_result.stderr
        stdout: $manifest_result.stdout
        success: $manifest_result.success
        task_id: $task_id
    tier: 3
    visible: true
- id: praxis/ergon/sense-daemon
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Sense a daemon''s actual state.


      Queries the substrate to determine if the process is running.

      Does NOT update the entity — just returns current state.

      '
    name: sense-daemon
    oikos: ergon
    params:
    - description: The daemon to sense
      name: daemon_id
      required: true
      type: string
    steps:
    - bind_to: daemon
      id: $daemon_id
      step: find
    - condition: $daemon
      message: 'Daemon not found: $daemon_id'
      step: assert
    - bind_to: actual
      entity_id: $daemon_id
      step: sense_actuality
    - step: return
      value:
        actual_state: $actual.status
        daemon_id: $daemon_id
        desired_state: $daemon.data.desired_state
        pid: $daemon.data.pid
        running: $actual.running
    tier: 1
    visible: true
- id: praxis/ergon/start-daemon
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Start a daemon — set desired_state to running and manifest.


      This is the high-level interface. It:

      1. Updates desired_state to running

      2. Calls manifest to spawn the process

      3. Updates actual_state based on result

      '
    name: start-daemon
    oikos: ergon
    params:
    - description: The daemon to start
      name: daemon_id
      required: true
      type: string
    steps:
    - bind_to: daemon
      id: $daemon_id
      step: find
    - condition: $daemon
      message: 'Daemon not found: $daemon_id'
      step: assert
    - data:
        desired_state: running
      id: $daemon_id
      step: update
    - bind_to: manifest_result
      entity_id: $daemon_id
      step: manifest
    - data:
        actual_state: running
        last_reconciled: '{{ now() }}'
        pid: $manifest_result.pid
      id: $daemon_id
      step: update
    - step: return
      value:
        daemon_id: $daemon_id
        pid: $manifest_result.pid
        started: true
    tier: 3
    visible: true
- id: praxis/ergon/stop-daemon
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/energeia/praxeis/ergon.yaml
    description: 'Stop a daemon — set desired_state to stopped and unmanifest.


      This is the high-level interface. It:

      1. Updates desired_state to stopped

      2. Calls unmanifest to kill the process

      3. Updates actual_state based on result

      '
    name: stop-daemon
    oikos: ergon
    params:
    - description: The daemon to stop
      name: daemon_id
      required: true
      type: string
    - description: Signal to send (default 15 = SIGTERM)
      name: signal
      required: false
      type: number
    steps:
    - bind_to: daemon
      id: $daemon_id
      step: find
    - condition: $daemon
      message: 'Daemon not found: $daemon_id'
      step: assert
    - data:
        desired_state: stopped
      id: $daemon_id
      step: update
    - bindings:
        kill_signal: $signal
      step: set
    - cases:
      - then: []
        when: $kill_signal
      default:
      - bindings:
          kill_signal: 15
        step: set
      step: switch
    - bind_to: unmanifest_result
      entity_id: $daemon_id
      signal: $kill_signal
      step: unmanifest
    - data:
        actual_state: stopped
        last_reconciled: '{{ now() }}'
        pid: null
      id: $daemon_id
      step: update
    - step: return
      value:
        daemon_id: $daemon_id
        signal_sent: $kill_signal
        stopped: true
    tier: 3
    visible: true
- id: praxis/git-sync/commit
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: 'Create a git commit.

      '
    name: commit
    oikos: git-sync
    params:
    - description: git-sync-config ID
      name: config_id
      required: true
      type: string
    - description: Commit message
      name: message
      required: true
      type: string
    steps:
    - bind_to: config
      id: git-sync-config/$config_id
      step: find
    - condition: $config
      message: 'Config not found: $config_id'
      step: assert
    - bind_to: task
      params:
        command: git commit -m '$message'
        id: task/git-commit-{{ uuid() }}
        working_dir: $config.data.local_path
      praxis: ergon/create-task
      step: call
    - bind_to: result
      params:
        task_id: $task.id
      praxis: ergon/run-task
      step: call
    - step: return
      value:
        committed: $result.success
        exit_code: $result.exit_code
        message: $message
        stderr: $result.stderr
        stdout: $result.stdout
    visible: true
- id: praxis/git-sync/configure
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: 'Configure git-sync for a target repository.


      Creates a git-sync-config entity storing:

      - Local path (where to emit)

      - Remote URL (where to push)

      - Branch (default main)

      - What to sync (oikoi, theoria, docs)

      '
    name: configure
    oikos: git-sync
    params:
    - description: ID for this sync configuration
      name: config_id
      required: true
      type: string
    - description: Local filesystem path for emission (e.g., /path/to/kosmos-repo)
      name: local_path
      required: true
      type: string
    - description: Git remote URL (e.g., git@github.com:liminalcommons/kosmos.git)
      name: remote_url
      required: true
      type: string
    - description: Git branch (default main)
      name: branch
      required: false
      type: string
    - description: Whether to sync oikos packages (default true)
      name: sync_oikoi
      required: false
      type: boolean
    - description: Whether to sync theoria (default true)
      name: sync_theoria
      required: false
      type: boolean
    - description: Whether to sync documentation (default true)
      name: sync_docs
      required: false
      type: boolean
    steps:
    - bindings:
        branch_val: $branch
        sync_docs_val: $sync_docs
        sync_oikoi_val: $sync_oikoi
        sync_theoria_val: $sync_theoria
      step: set
    - cases:
      - then: []
        when: $branch_val
      default:
      - bindings:
          branch_val: main
        step: set
      step: switch
    - cases:
      - then: []
        when: $sync_oikoi_val != null
      default:
      - bindings:
          sync_oikoi_val: true
        step: set
      step: switch
    - cases:
      - then: []
        when: $sync_theoria_val != null
      default:
      - bindings:
          sync_theoria_val: true
        step: set
      step: switch
    - cases:
      - then: []
        when: $sync_docs_val != null
      default:
      - bindings:
          sync_docs_val: true
        step: set
      step: switch
    - bind_to: config
      data:
        branch: $branch_val
        created_at: '{{ now() }}'
        last_sync_at: null
        local_path: $local_path
        remote_url: $remote_url
        sync_docs: $sync_docs_val
        sync_oikoi: $sync_oikoi_val
        sync_theoria: $sync_theoria_val
      eidos: git-sync-config
      id: git-sync-config/$config_id
      step: arise
    - desmos: belongs-to
      from_id: $config.id
      step: bind
      to_id: $_circle
    - step: return
      value:
        config: $config
        config_id: $config.id
    visible: true
- id: praxis/git-sync/emit-all-oikoi
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: 'Emit all oikos packages to filesystem.

      '
    name: emit-all-oikoi
    oikos: git-sync
    params:
    - description: git-sync-config ID
      name: config_id
      required: true
      type: string
    steps:
    - bind_to: config
      id: git-sync-config/$config_id
      step: find
    - condition: $config
      message: 'Config not found: $config_id'
      step: assert
    - bind_to: all_oikoi
      eidos: oikos-manifest
      step: gather
    - bindings:
        emitted: []
      step: set
    - as: oikos_item
      do:
      - bind_to: emit_result
        params:
          config_id: $config_id
          oikos_name: $oikos_item.data.oikos_id
        praxis: git-sync/emit-oikos
        step: call
      in: $all_oikoi
      step: for_each
    - step: return
      value:
        config_id: $config_id
        oikoi_count: '{{ length($all_oikoi) }}'
    visible: true
- id: praxis/git-sync/emit-oikos
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: "Emit a single oikos package to filesystem.\n\nCreates directory\
      \ structure:\n  {local_path}/oikoi/{oikos_name}/\n  ├── manifest.yaml\n  ├──\
      \ eide/*.yaml\n  ├── desmoi/*.yaml\n  └── praxeis/*.yaml\n"
    name: emit-oikos
    oikos: git-sync
    params:
    - description: git-sync-config ID
      name: config_id
      required: true
      type: string
    - description: Name of oikos to emit (e.g., nous, demiurge)
      name: oikos_name
      required: true
      type: string
    steps:
    - bind_to: config
      id: git-sync-config/$config_id
      step: find
    - condition: $config
      message: 'Config not found: $config_id'
      step: assert
    - bind_to: oikos_manifest
      id: oikos-manifest/$oikos_name
      step: find
    - condition: $oikos_manifest
      message: 'Oikos manifest not found: $oikos_name'
      step: assert
    - bindings:
        oikos_dir: $config.data.local_path/oikoi/$oikos_name
      step: set
    - bind_to: all_eide
      eidos: eidos
      step: gather
    - bind_to: oikos_eide
      condition: $item.data.oikos == $oikos_name
      items: $all_eide
      step: filter
    - bind_to: all_praxeis
      eidos: praxis
      step: gather
    - bind_to: oikos_praxeis
      condition: $item.data.oikos == $oikos_name
      items: $all_praxeis
      step: filter
    - bind_to: all_desmoi
      eidos: desmos
      step: gather
    - bind_to: oikos_desmoi
      condition: $item.data.oikos == $oikos_name
      items: $all_desmoi
      step: filter
    - entity_id: $oikos_manifest.id
      format: yaml
      path: $oikos_dir/manifest.yaml
      step: emit
    - as: eidos_item
      do:
      - entity_id: $eidos_item.id
        format: yaml
        path: $oikos_dir/eide/$eidos_item.data.name.yaml
        step: emit
      in: $oikos_eide
      step: for_each
    - as: praxis_item
      do:
      - entity_id: $praxis_item.id
        format: yaml
        path: $oikos_dir/praxeis/$praxis_item.data.name.yaml
        step: emit
      in: $oikos_praxeis
      step: for_each
    - as: desmos_item
      do:
      - entity_id: $desmos_item.id
        format: yaml
        path: $oikos_dir/desmoi/$desmos_item.data.name.yaml
        step: emit
      in: $oikos_desmoi
      step: for_each
    - step: return
      value:
        desmoi_count: '{{ length($oikos_desmoi) }}'
        eide_count: '{{ length($oikos_eide) }}'
        oikos: $oikos_name
        path: $oikos_dir
        praxeis_count: '{{ length($oikos_praxeis) }}'
    visible: true
- id: praxis/git-sync/emit-theoria
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: 'Emit theoria collection as markdown.

      '
    name: emit-theoria
    oikos: git-sync
    params:
    - description: git-sync-config ID
      name: config_id
      required: true
      type: string
    - description: Filter by domain (optional)
      name: domain
      required: false
      type: string
    steps:
    - bind_to: config
      id: git-sync-config/$config_id
      step: find
    - condition: $config
      message: 'Config not found: $config_id'
      step: assert
    - bind_to: all_theoria
      eidos: theoria
      step: gather
    - cases:
      - then:
        - bind_to: filtered_theoria
          condition: $item.data.domain == $domain
