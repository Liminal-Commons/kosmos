        target_circle: $circle_id
      step: set
    - cases:
      - then: []
        when: $target_circle
      default:
      - bindings:
          target_circle: $_circle.id
        step: set
      step: switch
    - cases:
      - then: []
        when: $max_results
      default:
      - bindings:
          max_results: 50
        step: set
      step: switch
    - bind_to: expressions
      desmos: expressed-in
      resolve: from
      step: trace
      to_id: $target_circle
    - cases:
