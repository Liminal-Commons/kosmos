  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/pege/praxeis/pege.yaml
    description: 'Emit an index of all eide.

      '
    name: emit-eidos-index
    oikos: pege
    params:
    - description: Output path (default docs/reference/eide/index.md)
      name: output_path
      required: false
      type: string
    steps:
    - bind_to: all_eide
      eidos: eidos
      step: gather
    - bindings:
        count: 0
        out_path: $output_path
        timestamp: '{{ now() }}'
      step: set
    - cases:
      - then: []
        when: $out_path
      default:
      - bindings:
          out_path: docs/reference/eide/index.md
        step: set
      step: switch
    - bind_to: table_rows
      items: $all_eide
      step: map
      to: '| [$item.id]($item.id.md) | $item.data.description |'
    - bind_to: count
      initial: 0
      items: $all_eide
      step: reduce
      to: $acc + 1
    - bindings:
        content: '# Eide Reference


          This document lists all entity types (eide) in the kosmos.


          *$count eide*


          | Eidos | Description |

          |-------|-------------|

          $table_rows


          ---

          *Emitted from kosmos — $timestamp*

          '
      step: set
    - bind_to: emit_result
      params:
        content: $content
        path: $out_path
      praxis: thyra/emit
      step: call
    - step: return
      value:
        count: $count
        path: $out_path
    visible: true
- id: praxis/pege/emit-eidos-reference
  eidos: praxis
  version: 109
  data:
    _genesis:
