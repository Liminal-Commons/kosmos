- id: praxis/thyra/open-artifact
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Open an artifact in the workspace (add to tabs).


      Creates has-open bond from workspace to artifact.

      Optionally focuses the artifact.

      '
    name: open-artifact
    oikos: thyra
    params:
    - description: The artifact to open
      name: artifact_id
      required: true
      type: string
    - description: Whether to focus the artifact (default true)
      name: focus
      required: false
      type: boolean
    steps:
    - condition: $_animus
      message: Cannot open artifact without an animus
      step: assert
    - bind_to: artifact
      id: $artifact_id
      step: find
    - condition: $artifact
      message: 'Artifact not found: $artifact_id'
      step: assert
    - bind_to: workspaces
      desmos: workspace-of
      from_id: $_animus.id
      resolve: to
      step: trace
    - cases:
      - then:
        - bindings:
            workspace: $workspaces[0]
          step: set
        when: $workspaces | length > 0
      default:
      - bind_to: workspace
        data:
          animus_id: $_animus.id
          created_at: '{{ now() }}'
          name: default
          open_artifact_ids: []
        eidos: workspace
        id: workspace/$_animus.id
        step: arise
      - desmos: workspace-of
        from_id: $workspace.id
        step: bind
        to_id: $_animus.id
      step: switch
    - bind_to: open_artifacts
      desmos: has-open
      from_id: $workspace.id
      resolve: to
      step: trace
    - bindings:
        already_open: false
      step: set
    - as: open_artifact
      do:
      - cases:
        - then:
          - bindings:
              already_open: true
            step: set
          when: $open_artifact.id == $artifact_id
        step: switch
      items: $open_artifacts
      step: foreach
    - cases:
      - then:
        - desmos: has-open
          from_id: $workspace.id
          step: bind
          to_id: $artifact_id
        when: not $already_open
      step: switch
    - bindings:
        should_focus: $focus
      step: set
    - cases:
      - then:
        - bindings:
            should_focus: true
          step: set
        when: $should_focus == null
      step: switch
    - cases:
      - then:
        - params:
            artifact_id: $artifact_id
          praxis: thyra/focus-artifact
          step: call
        when: $should_focus
      step: switch
    - step: return
      value:
        artifact_id: $artifact_id
        focused: $should_focus
        opened: not $already_open
        workspace_id: $workspace.id
    tier: 2
    visible: true
- id: praxis/thyra/open-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Open an inward or outward stream.


      Creates a stream entity with intent=active and reconciles

      to manifest it in the substrate. Returns immediately with

      stream entity. Use sense-stream to check actual state.

      '
    name: open-stream
    oikos: thyra
    params:
    - description: 'Stream kind: voice, video, text, document'
      name: kind
      required: true
      type: string
    - description: 'Flow direction: inward (perception), outward (emission)'
      name: direction
      required: true
      type: string
    - description: Source identifier (device ID, file path)
      name: source
      required: false
      type: string
    - description: Sink identifier for outward streams
      name: sink
      required: false
      type: string
    - description: Stream-specific configuration
      name: config
      required: false
      type: object
    steps:
    - bindings:
        created_at: now()
        stream_id: stream/{{ kind }}-{{ direction }}-{{ now() }}
      step: set
    - bind_to: stream
      data:
        config: $config
        created_at: $created_at
        direction: $direction
        intent: active
        kind: $kind
        sink: $sink
        source: $source
        status: pending
      eidos: stream
      id: $stream_id
      step: arise
    - cases:
      - then:
        - desmos: belongs-to
          from_id: $stream_id
          step: bind
          to_id: $_circle.id
        when: $_circle
      step: switch
    - bind_to: reconcile_result
      params:
        stream_id: $stream_id
      praxis: thyra/reconcile-stream
      step: call
    - step: return
      value:
        action: $reconcile_result.action
        direction: $direction
        kind: $kind
        stream_id: $stream_id
    tier: 3
    visible: true
- id: praxis/thyra/pause-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Pause a stream — set intent to paused.


      Note: Full pause support requires media actuality mode.

      For now, this just marks the intent.

      '
    name: pause-stream
    oikos: thyra
    params:
    - description: The stream to pause
      name: stream_id
      required: true
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - data:
        intent: paused
        status: paused
      id: $stream_id
      step: update
    - step: return
      value:
        paused: true
        stream_id: $stream_id
    tier: 2
    visible: true
- id: praxis/thyra/reconcile-region
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Align region actuality with intent.


      The core rendering reconciler:

      1. Gather current render intent

      2. Sense current rendered state (via substrate)

      3. Compute diff

      4. Emit changes to substrate


      Returns the action taken and diff applied.

      '
    name: reconcile-region
    oikos: thyra
    params:
    - description: The region to reconcile
      name: region_id
      required: true
      type: string
    steps:
    - bind_to: intent
      params:
        region_id: $region_id
      praxis: thyra/gather-render-intent
      step: call
    - bindings:
        render_intent_id: render-intent/$region_id
      step: set
    - bind_to: existing_intent
      id: $render_intent_id
      step: find
    - cases:
      - then:
        - data:
            intent_status: reconciling
            layout_id: $intent.layout_id
            panel_states: $intent.panels
            visible_entities: $intent.visible_entities
          id: $render_intent_id
          step: update
        when: $existing_intent
      default:
      - bind_to: new_intent
        data:
          created_at: '{{ now() }}'
          intent_status: reconciling
          layout_id: $intent.layout_id
          panel_states: $intent.panels
          target_region_id: $region_id
          visible_entities: $intent.visible_entities
        eidos: render-intent
        id: $render_intent_id
        step: arise
      step: switch
    - bind_to: emit_result
      params:
        intent: $intent
        region_id: $region_id
      praxis: thyra/emit-render
      step: call
    - data:
        intent_status: rendered
        reconciled_at: '{{ now() }}'
      id: $render_intent_id
      step: update
    - step: return
      value:
        action: $emit_result.action
        entities_rendered: $intent.entity_count
        panels_rendered: $intent.panels | length
        region_id: $region_id
    tier: 3
    visible: true
- id: praxis/thyra/reconcile-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Reconcile stream intent with actuality.


      The core reconciler praxis:

      - If intent=active and not manifested → manifest (spawn capture)

      - If intent=closed and manifested → unmanifest (kill process)

      - Otherwise → no action needed

      '
    name: reconcile-stream
    oikos: thyra
    params:
    - description: The stream to reconcile
      name: stream_id
      required: true
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - bind_to: actual
      entity_id: $stream_id
      step: sense_actuality
    - bindings:
        action_taken: none
        intent: $stream.data.intent
        is_running: $actual.running
      step: set
    - cases:
      - then:
        - bind_to: manifest_result
          entity_id: $stream_id
          step: manifest
        - data:
            manifest_handle: $manifest_result.pid
            manifested_at: '{{ now() }}'
            status: active
          id: $stream_id
          step: update
        - bindings:
            action_taken: manifested
          step: set
        when: $intent == "active" and not $is_running
      - then:
        - bind_to: unmanifest_result
          entity_id: $stream_id
          step: unmanifest
        - data:
            closed_at: '{{ now() }}'
            manifest_handle: null
            status: closed
          id: $stream_id
          step: update
        - bindings:
            action_taken: unmanifested
          step: set
        when: $intent == "closed" and $is_running
      - then:
        - data:
            status: paused
          id: $stream_id
          step: update
        - bindings:
            action_taken: paused
          step: set
        when: $intent == "paused"
      default:
      - bindings:
          action_taken: aligned
        step: set
      step: switch
    - step: return
      value:
        action: $action_taken
        actual_running: $is_running
        aligned: $action_taken == "aligned" or $action_taken == "none"
        intent: $intent
        stream_id: $stream_id
    tier: 3
    visible: true
- id: praxis/thyra/render-all
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Reconcile all regions in the active layout.


      Full render cycle — use sparingly. Prefer incremental updates

      via content subscriptions for most changes.

      '
    name: render-all
    oikos: thyra
    params: []
    steps:
    - condition: $_circle
      message: Cannot render without dwelling in a circle
      step: assert
    - bind_to: layout_result
      params: {}
      praxis: thyra/get-active-layout
      step: call
    - condition: $layout_result.layout
      message: No active layout found
      step: assert
    - bindings:
        layout: $layout_result.layout
        regions_rendered: []
      step: set
    - as: region
      do:
      - bindings:
          region_id: region/$region.name
        step: set
      - bind_to: reconcile_result
        params:
          region_id: $region_id
        praxis: thyra/reconcile-region
        step: call
      - bind_to: regions_rendered
        step: append
        to: $regions_rendered
        value:
          action: $reconcile_result.action
          region_id: $region_id
          region_kind: $region.kind
      items: $layout.data.regions
      step: foreach
    - step: return
      value:
        layout_id: $layout.id
        regions: $regions_rendered
        regions_count: $regions_rendered | length
        rendered_at: '{{ now() }}'
    tier: 3
    visible: true
- id: praxis/thyra/reply-to
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Reply to an expression.


      Convenience wrapper around express that sets in_reply_to

      and validates the target exists.

      '
    name: reply-to
    oikos: thyra
    params:
    - description: The expression to reply to
      name: expression_id
      required: true
      type: string
    - description: The reply content
      name: content
      required: true
      type: string
    - description: 'Expression mode (default: declaration)'
      name: mode
      required: false
      type: string
    steps:
    - bind_to: target
      id: $expression_id
      step: find
    - condition: $target
      message: 'Expression not found: $expression_id'
      step: assert
    - bind_to: reply_result
      params:
        content: $content
        in_reply_to: $expression_id
        mode: $mode
        source_kind: direct
      praxis: thyra/express
      step: call
    - step: return
      value:
        expressed_by: $reply_result.expressed_by
        expression_id: $reply_result.expression_id
        in_reply_to: $expression_id
        mode: $reply_result.mode
    visible: true
- id: praxis/thyra/resume-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Resume a paused stream — set intent back to active and reconcile.

      '
    name: resume-stream
    oikos: thyra
    params:
    - description: The stream to resume
      name: stream_id
      required: true
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - data:
        intent: active
      id: $stream_id
      step: update
    - bind_to: reconcile_result
      params:
        stream_id: $stream_id
      praxis: thyra/reconcile-stream
      step: call
    - step: return
      value:
        action: $reconcile_result.action
        resumed: true
        stream_id: $stream_id
    tier: 3
    visible: true
- id: praxis/thyra/sense-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Sense the actual state of a stream.


      Queries the substrate to determine what''s actually happening

      with the manifested stream. Does NOT update the entity.

      '
    name: sense-stream
    oikos: thyra
    params:
    - description: The stream to sense
      name: stream_id
      required: true
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - bind_to: actual
      entity_id: $stream_id
      step: sense_actuality
    - step: return
      value:
        actual_running: $actual.running
        direction: $stream.data.direction
        intent: $stream.data.intent
        kind: $stream.data.kind
        manifest_handle: $stream.data.manifest_handle
        status: $stream.data.status
        stream_id: $stream_id
    tier: 1
    visible: true
