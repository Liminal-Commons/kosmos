    description: 'Bind multiple dependencies to an artifact.


      Creates depends-on bonds from artifact to each dependency.

      Used after composition to declare what the artifact depends on.

      '
    name: bind-dependencies
    oikos: demiurge
    params:
    - description: The artifact that has dependencies
      name: artifact_id
      required: true
      type: string
    - description: Entity IDs the artifact depends on
      name: dependency_ids
      required: true
      type: array
    steps:
    - bind_to: artifact
      id: $artifact_id
      step: find
    - condition: $artifact
      message: 'Artifact not found: $artifact_id'
      step: assert
    - as: dep_id
      do:
      - desmos: depends-on
        from_id: $artifact_id
        step: bind
        to_id: $dep_id
      in: $dependency_ids
      step: for_each
    - step: return
      value:
        artifact_id: $artifact_id
        dependencies_bound: $dependency_ids | length
    tier: 2
    visible: true
- id: praxis/demiurge/check-cache
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Check if an artifact exists in cache for given definition + inputs.


      Returns cache status without composing.

      '
    name: check-cache
    oikos: demiurge
    params:
    - description: The artifact definition
      name: definition_id
      required: true
      type: string
    - description: The inputs to check
      name: inputs
      required: false
      type: object
    steps:
    - bindings:
        inputs_json: $inputs | to_json
      step: set
    - bind_to: cache_key
      input: $definition_id-$inputs_json
      step: digest
    - bindings:
        artifact_id: artifact/$cache_key
      step: set
    - bind_to: cached
      id: $artifact_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            artifact_id: $artifact_id
            cache_key: $cache_key
            cached: true
            stale: $cached.data.stale
        when: $cached
      step: switch
    - step: return
      value:
        cache_key: $cache_key
        cached: false
    tier: 1
    visible: true
- id: praxis/demiurge/compose
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Compose from a definition — the single interface.


      One tool. The compositor is simple. Complexity lives in the definition.


      Routes based on definition shape:

      - Has target_eidos → entity composition

      - Has slots, no target_eidos → graph composition (text or object)

      - Has template, no target_eidos, no slots → template rendering


      Returns the composed thing — entity, content, or object.

      '
    name: compose
    oikos: demiurge
    params:
    - description: The artifact definition to compose from
      name: definition_id
      required: true
      type: string
    - description: Values to fill (overrides defaults)
      name: inputs
      required: false
      type: object
    - description: Entity ID (only for entity composition, generated if not provided)
      name: id
      required: false
      type: string
    - description: Expression ID that authorizes this composition (provenance root)
      name: authorized_by
      required: false
      type: string
    steps:
    - bind_to: result
      definition_id: $definition_id
      id: $id
      inputs: $inputs
      step: compose
    - step: return
      value: $result
    visible: true
- id: praxis/demiurge/compose-cached
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Compose with content-addressed caching.


      Hashes definition_id + inputs to create a cache key.

      Returns cached artifact if exists and not stale.

      Otherwise composes and stores with cache key.

      '
    name: compose-cached
    oikos: demiurge
    params:
    - description: The artifact definition to compose from
      name: definition_id
      required: true
      type: string
    - description: Values to fill (overrides defaults)
      name: inputs
      required: false
      type: object
    - description: Expression ID that authorizes this composition
      name: authorized_by
      required: false
      type: string
    - description: Force re-composition even if cached
      name: force_refresh
      required: false
      type: boolean
    steps:
    - bindings:
        inputs_json: $inputs | to_json
      step: set
    - bind_to: cache_key
      input: $definition_id-$inputs_json
      step: digest
    - bindings:
        artifact_id: artifact/$cache_key
      step: set
    - bind_to: cached
      id: $artifact_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            artifact: $cached
            cache_key: $cache_key
            from_cache: true
        when: $cached and not $cached.data.stale and not $force_refresh
      step: switch
    - bind_to: composed
      definition_id: $definition_id
      id: $artifact_id
      inputs: $inputs
      step: compose
    - data:
        cache_key: $cache_key
        stale: false
      id: $artifact_id
      step: update
    - step: return
      value:
        artifact: $composed
        cache_key: $cache_key
        from_cache: false
    tier: 2
    visible: true
- id: praxis/demiurge/fork-oikos
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Fork an oikos-dev to create a derived version.


      Only works on oikos-dev with distribution: generative-commons.

      Creates a new oikos-dev with:

      - Copied content and generation specs

      - New oikos_id (based on fork_name)

      - derives-from bond to original

      - Status: draft


      The forked version can then be modified to fit local ontology,

      adapted with different generation specs, or localized.


      Requires oikos-fork attainment.

      '
    name: fork-oikos
    oikos: demiurge
    params:
    - description: The generative-commons oikos-dev to fork
      name: source_oikos_dev_id
      required: true
      type: string
    - description: Name for the forked oikos (becomes new oikos_id)
      name: fork_name
      required: true
      type: string
    - description: Version for the fork (defaults to "0.1.0")
      name: fork_version
      required: false
      type: string
    steps:
    - bind_to: source_oikos
      id: $source_oikos_dev_id
      step: find
    - condition: $source_oikos
      message: 'Source oikos-dev not found: $source_oikos_dev_id'
      step: assert
    - condition: $source_oikos.eidos == 'oikos-dev'
      message: 'Source is not an oikos-dev: $source_oikos_dev_id'
      step: assert
    - condition: $source_oikos.data.distribution == 'generative-commons'
      message: 'Cannot fork: source oikos-dev is not generative-commons (distribution:
        $source_oikos.data.distribution)'
      step: assert
    - bindings:
        effective_version: '$fork_version ? $fork_version : ''0.1.0'''
        fork_id: oikos-dev/$fork_name-$effective_version
      step: set
    - bind_to: forked_oikos
      data:
        author_persona: $dwelling.animus_id
        content: $source_oikos.data.content
        created_at: '{{ now() }}'
        description: Forked from $source_oikos.data.oikos_id ($source_oikos.data.version)
        distribution: binary-only
        generation_specs: $source_oikos.data.generation_specs
        manifest: $source_oikos.data.manifest
        oikos_id: $fork_name
        status: draft
        version: $effective_version
      eidos: oikos-dev
      id: $fork_id
      step: arise
    - desmos: derives-from
      from_id: $fork_id
      step: bind
      to_id: $source_oikos_dev_id
    - step: return
      value:
        fork_id: $fork_id
        fork_name: $fork_name
        fork_version: $effective_version
        forked: true
        source_id: $source_oikos_dev_id
    tier: 3
    visible: true
- id: praxis/demiurge/invalidate-artifact
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Mark a specific artifact as stale.


