      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Create a bond directly (administrative utility).


      This bypasses normal governance checks. Use for bootstrap

      and repair operations when normal praxeis cannot establish

      the required bonds due to missing dwelling context.


      WARNING: Use with care — this does not verify permissions.

      '
    name: admin-bind
