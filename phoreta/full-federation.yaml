    params:
    - description: Source entity ID
      name: from_id
      required: true
      type: string
    - description: Target entity ID
      name: to_id
      required: true
      type: string
    - description: Bond type (desmos name)
      name: desmos
      required: true
      type: string
    steps:
    - bind_to: from_entity
      id: $from_id
      step: find
    - condition: $from_entity
      message: 'From entity not found: $from_id'
      step: assert
    - bind_to: to_entity
      id: $to_id
      step: find
    - condition: $to_entity
      message: 'To entity not found: $to_id'
      step: assert
    - bind_to: bond
      desmos: $desmos
      from_id: $from_id
      step: bind
      to_id: $to_id
    - step: return
      value:
        bond: $bond
        created: true
        desmos: $desmos
        from_id: $from_id
        to_id: $to_id
