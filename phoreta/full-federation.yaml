      | Eidos | Description |

      |-------|-------------|

      {{ table_rows }}


      {{ footer }}

      '
- id: artifact-def-eidos-reference
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/pege.yaml
    description: "A complete reference document for an eidos.\nPattern: composed (from\
      \ Level 0-2 artifacts)\n\nSlots:\n  - title: literal\n  - description: queried\
      \ from entity\n  - fields: composed (field-table)\n  - actuality: conditional\
      \ (if entity has actuality)\n  - bonds: composed (bond-section)\n  - examples:\
      \ generated (from related praxeis)\n  - footer: literal\n"
    name: eidos-reference
    slots:
    - name: title
      pattern: literal
      template: '# {{ entity.id }}'
    - name: description
      pattern: queried
      source: entity.data.description
    - definition: artifact-def-field-table
      inputs:
        fields: entity.data.fields
      name: fields_section
      pattern: composed
      when: entity.data.fields
    - name: actuality_section
      pattern: literal
      template: '## Actuality


        This eidos has actuality mode `{{ entity.data.actuality.mode }}`.


        | Operation | Description |

        |-----------|-------------|

        | manifest | {{ entity.data.actuality.manifest }} |

        | sense | {{ entity.data.actuality.sense }} |

        | unmanifest | {{ entity.data.actuality.unmanifest }} |

        '
      when: entity.data.actuality
    - definition: artifact-def-bond-section
      inputs:
        entity_id: entity.id
      name: bonds_section
      pattern: composed
    - authorized_by: caller
      auto_approve: true
      name: usage_section
      pattern: generated
      prompt: 'Given this eidos definition, write 2-3 sentences describing when and
        how to use it:


        ID: {{ entity.id }}

        Description: {{ entity.data.description }}

        Fields: {{ entity.data.fields | yaml }}


        Be concise. Write for developers familiar with the kosmos.

        '
    - name: footer
      pattern: literal
      template: '---

        *Emitted from kosmos — {{ timestamp }}*

        '
    template: '{{ title }}


      {{ description }}


      {{ fields_section }}


      {{ actuality_section }}


      {{ bonds_section }}


      {{ usage_section }}


      {{ footer }}

      '
- id: artifact-def-example-block
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
