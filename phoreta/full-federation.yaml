- id: praxis/syndesmos/receive-phoreta
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Process an inbound entity from federation.


      Creates a phoreta tracking provenance. Handles conflicts

      based on the link''s sync policy.

      '
    name: receive-phoreta
    oikos: syndesmos
    params:
    - description: The entity ID (original from remote)
      name: entity_id
      required: true
      type: string
    - description: The entity's eidos
      name: entity_eidos
      required: true
      type: string
    - description: Version at origin
      name: entity_version
      required: true
      type: number
    - description: Entity data
      name: entity_data
      required: true
      type: object
    - description: Link this came through
      name: link_id
      required: true
      type: string
    - description: Originating chora
      name: origin_chora
      required: true
      type: string
    steps:
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - bindings:
        local_entity_id: phoreta-local/$entity_id
        phoreta_id: phoreta/$entity_id-$link_id
        timestamp: now()
      step: set
    - bind_to: existing
      id: $local_entity_id
      step: find
    - cases:
      - then:
        - bind_to: local_entity
          data: $entity_data
          eidos: $entity_eidos
          id: $local_entity_id
          step: arise
        - bind_to: phoreta
          data:
            entity_id: $local_entity_id
            first_received_at: $timestamp
            last_synced_at: $timestamp
            link_id: $link_id
            local_version: 1
            origin_chora: $origin_chora
            original_id: $entity_id
            remote_version: $entity_version
            status: synced
          eidos: phoreta
          id: $phoreta_id
          step: arise
        - desmos: carried-through
          from_id: $phoreta_id
          step: bind
          to_id: $link_id
        - desmos: mirrors
          from_id: $phoreta_id
          step: bind
          to_id: $local_entity_id
        - step: return
          value:
            applied: true
            conflict: null
            entity_id: $local_entity_id
            phoreta_id: $phoreta_id
        when: $existing == null
      - then:
        - cases:
          - then:
            - bind_to: policy
              id: $link.data.sync_policy_id
              step: find
            when: $link.data.sync_policy_id
          default:
          - bindings:
              policy: null
            step: set
          step: switch
        - bindings:
            strategy: $policy.data.conflict_strategy
          step: set
        - cases:
          - then: []
            when: $strategy
          default:
          - bindings:
              strategy: manual
            step: set
          step: switch
        - cases:
          - then:
            - data: $entity_data
              id: $local_entity_id
              step: update
            - data:
                last_synced_at: $timestamp
                remote_version: $entity_version
                status: synced
              id: $phoreta_id
              step: update
            - step: return
              value:
                applied: true
                conflict: null
                entity_id: $local_entity_id
                phoreta_id: $phoreta_id
            when: $strategy == "remote_wins"
          - then:
            - data:
                last_synced_at: $timestamp
                remote_version: $entity_version
                status: synced
              id: $phoreta_id
              step: update
            - step: return
              value:
                applied: false
                conflict: null
                entity_id: $local_entity_id
                phoreta_id: $phoreta_id
            when: $strategy == "local_wins"
          - then:
            - bindings:
                conflict_id: sync-conflict/$phoreta_id
              step: set
            - bind_to: conflict
              data:
                detected_at: $timestamp
                entity_id: $local_entity_id
                local_data: $existing.data
                local_version: $existing.version
                phoreta_id: $phoreta_id
                remote_data: $entity_data
                remote_version: $entity_version
                status: open
              eidos: sync-conflict
              id: $conflict_id
              step: arise
            - desmos: conflicts-on
              from_id: $conflict_id
              step: bind
              to_id: $phoreta_id
            - data:
                status: conflicted
              id: $phoreta_id
              step: update
            - step: return
              value:
                applied: false
                conflict: $conflict
                entity_id: $local_entity_id
                phoreta_id: $phoreta_id
            when: $strategy == "manual"
          step: switch
        when: $existing != null
      step: switch
    tier: 3
    visible: true
- id: praxis/syndesmos/reconcile-link
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Align link actuality with intent.


      The reconciler pattern for federation links:

      - If intent is ''active'' and not connected, reconcile channel

      - If intent is ''suspended'' and connected, close channel

      - Otherwise, aligned

      '
    name: reconcile-link
    oikos: syndesmos
    params:
    - description: The link to reconcile
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: sensed
      params:
        link_id: $link_id
      praxis: syndesmos/sense-link
      step: call
    - bindings:
        actual: $sensed.actual
        intent: $sensed.intent
      step: set
    - bind_to: link
      id: $link_id
      step: find
    - cases:
      - then:
        - cases:
          - then:
            - bind_to: channel_result
              params:
                channel_id: $link.data.channel_id
              praxis: aither/reconcile-channel
              step: call
            - step: return
              value:
                action: reconcile_channel
                message: Channel reconciliation triggered
                success: $channel_result.success
            when: $link.data.channel_id
          default:
          - step: return
            value:
              action: needs_activation
              message: Link has no channel — call activate-link first
              success: false
          step: switch
        when: $intent == "active" and $actual != "connected"
      - then:
        - params:
            channel_id: $link.data.channel_id
          praxis: aither/close-channel
          step: call
        - step: return
          value:
            action: disconnect
            message: Channel closed
            success: true
        when: $intent == "suspended" and $actual == "connected"
      - then:
        - step: return
          value:
            action: none
            message: Already aligned
            success: true
        when: $intent == "active" and $actual == "connected"
      default:
      - step: return
        value:
          action: none
          message: No reconciliation needed
          success: true
      step: switch
    tier: 3
    visible: true
- id: praxis/syndesmos/resolve-conflict
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Resolve a sync conflict.

      '
    name: resolve-conflict
    oikos: syndesmos
    params:
    - description: The conflict to resolve
      name: conflict_id
      required: true
      type: string
    - description: 'Resolution: local_kept, remote_applied, merged'
      name: resolution
      required: true
      type: string
    - description: Merged data (required if resolution is merged)
      name: merged_data
      required: false
      type: object
    - description: Persona who resolved the conflict
      name: resolved_by
      required: false
      type: string
    steps:
    - bind_to: conflict
      id: $conflict_id
      step: find
    - condition: $conflict
      message: 'Conflict not found: $conflict_id'
      step: assert
    - condition: $conflict.data.status == "open"
      message: Conflict already resolved
      step: assert
    - bindings:
        timestamp: now()
      step: set
    - cases:
      - then:
        - data: $conflict.data.remote_data
          id: $conflict.data.entity_id
          step: update
        when: $resolution == "remote_applied"
      - then:
        - condition: $merged_data
          message: Merged data required for merged resolution
          step: assert
        - data: $merged_data
          id: $conflict.data.entity_id
          step: update
        when: $resolution == "merged"
      step: switch
    - data:
        resolution: $resolution
        resolved_at: $timestamp
        resolved_by: $resolved_by
        status: resolved
      id: $conflict_id
      step: update
    - data:
        last_synced_at: $timestamp
        status: synced
      id: $conflict.data.phoreta_id
      step: update
    - step: return
      value:
        conflict_id: $conflict_id
        resolution: $resolution
        resolved: true
    tier: 3
    visible: true
- id: praxis/syndesmos/sense-link
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Query link status from the underlying channel.


      Returns both the link entity and its actual connection state.

      '
    name: sense-link
    oikos: syndesmos
    params:
    - description: The link to sense
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - cases:
      - then:
        - bind_to: channel_state
          params:
            channel_id: $link.data.channel_id
          praxis: aither/sense-channel
          step: call
        - bindings:
            actual: $channel_state.actual_state
          step: set
        when: $link.data.channel_id
      default:
      - bindings:
          actual: disconnected
        step: set
      step: switch
    - cases:
      - then:
        - data:
            actual: $actual
            connected_at: '{{ now() if actual == ''connected'' else link.data.connected_at
              }}'
          id: $link_id
          step: update
        when: $actual != $link.data.actual
      step: switch
    - step: return
      value:
        actual: $actual
        connected: $actual == "connected"
        intent: $link.data.intent
        link_id: $link_id
    tier: 1
    visible: true
- id: praxis/syndesmos/suspend-link
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Suspend a federation link — stop syncing but preserve state.


      Sets intent to ''suspended''. The channel will be closed.

      The link can be reactivated later.

      '
    name: suspend-link
    oikos: syndesmos
    params:
    - description: The link to suspend
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - bindings:
        timestamp: now()
      step: set
    - cases:
      - then:
        - params:
            channel_id: $link.data.channel_id
          praxis: aither/close-channel
          step: call
        when: $link.data.channel_id
      step: switch
    - data:
        disconnected_at: $timestamp
        intent: suspended
      id: $link_id
      step: update
    - step: return
      value:
        link_id: $link_id
        message: Link suspended
    tier: 3
    visible: true
- id: praxis/thyra/abandon-accumulation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Abandon an accumulation — discard without committing.


      Used when the human decides not to send.

      '
    name: abandon-accumulation
