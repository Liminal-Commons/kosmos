    description: 'Traverse the graph from a root entity, following specified bond
      types.


      Performs breadth-first search up to a specified depth.

      Returns all entities reachable through the specified desmoi.


      Use this for:

      - Dependency trees for validation reports

      - Provenance chains (composed-from, authorized-by)

      - Circle membership graphs

      - Knowledge network navigation

      '
