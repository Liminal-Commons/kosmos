- id: praxis/politeia/invite-to-circle
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Invite someone to join a circle.


      Creates an invitation entity. Can target a specific persona or be an open invite.

      Caller must be sovereign to the circle.

      '
    name: invite-to-circle
    oikos: politeia
    params:
    - description: ID for the invitation
      name: invitation_id
      required: true
      type: string
    - description: Circle to invite to
      name: circle_id
      required: true
      type: string
    - description: Specific persona ID to invite (omit for open invite)
      name: invitee_id
      required: false
      type: string
    - description: Message to include with invitation
      name: message
      required: false
      type: string
    - description: Days until expiration (default 7)
      name: expires_in_days
      required: false
      type: number
    - description: Max uses for open invites
      name: max_uses
      required: false
      type: number
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: circle
      id: $circle_id
      step: find
    - condition: $circle
      message: 'Circle not found: $circle_id'
      step: assert
    - bind_to: sovereigns
      desmos: sovereign-to
      direction: outbound
      from_id: $circle_id
      step: trace
    - bind_to: is_sovereign
      condition: $item.id == $_animus
      items: $sovereigns
      step: filter
    - condition: $is_sovereign | length > 0
      message: Not sovereign to this circle
      step: assert
    - bindings:
        expires_days: $expires_in_days
        invite_token: '{{ uuid() }}'
      step: set
    - cases:
      - then: []
        when: $expires_days
      default:
      - bindings:
          expires_days: 7
        step: set
      step: switch
    - bind_to: invitation_entity
      data:
        circle_id: $circle_id
        created_at: '{{ now() }}'
        invitee_id: $invitee_id
        inviter_id: $_persona
        max_uses: $max_uses
        message: $message
        status: pending
        token: $invite_token
        uses: 0
      eidos: invitation
      id: $invitation_id
      step: arise
    - desmos: child-of
      from_id: $invitation_id
      step: bind
      to_id: $circle_id
    - cases:
      - then:
        - desmos: invited-to
          from_id: $invitation_id
          step: bind
          to_id: $invitee_id
        when: $invitee_id
      step: switch
    - step: return
      value:
        circle_id: $circle_id
        invitation: $invitation_entity
        invitation_id: $invitation_id
        token: $invite_token
    tier: 2
    visible: true
- id: praxis/politeia/invoke-affordance
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Invoke an affordance (execute its action praxis).


      Verifies caller has required attainment before invoking.

      '
    name: invoke-affordance
    oikos: politeia
    params:
    - description: Affordance to invoke
      name: affordance_id
      required: true
      type: string
    - description: Parameters for the action praxis
      name: params
      required: false
      type: object
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: affordance
      id: $affordance_id
      step: find
    - condition: $affordance
      message: Affordance not found
      step: assert
    - bind_to: enabling_attainments
      desmos: enabled-by
      direction: outbound
      from_id: $affordance_id
      step: trace
    - condition: $enabling_attainments | length > 0
      message: Affordance has no enabling attainment
      step: assert
    - bind_to: my_attainments
      desmos: has-attainment
      direction: outbound
      from_id: $_animus
      step: trace
    - bindings:
        required_attainment_id: $enabling_attainments[0].id
      step: set
    - bind_to: has_required
      condition: $item.id == $required_attainment_id
      items: $my_attainments
      step: filter
    - condition: $has_required | length > 0
      message: Missing required attainment
      step: assert
    - bindings:
        action_praxis: $affordance.data.praxis_id
      step: set
    - bind_to: result
      params: $params
      praxis: $action_praxis
      step: call
    - step: return
      value:
        affordance_id: $affordance_id
        praxis_invoked: $action_praxis
        result: $result
    tier: 3
    visible: true
- id: praxis/politeia/leave-circle
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Leave a circle (remove membership).


      Removes member-of bond and any has-attainment bonds for attainments

      granted by this circle.

      '
    name: leave-circle
    oikos: politeia
    params:
    - description: Circle to leave
      name: circle_id
      required: true
      type: string
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: memberships
      desmos: member-of
      direction: outbound
      from_id: $_animus
      step: trace
    - bind_to: is_member
      condition: $item.id == $circle_id
      items: $memberships
      step: filter
    - condition: $is_member | length > 0
      message: Not a member of this circle
      step: assert
    - desmos: member-of
      from_id: $_animus
      step: loose
      to_id: $circle_id
    - bind_to: dwelling
      desmos: dwells-in
      direction: outbound
      from_id: $_animus
      step: trace
    - cases:
      - then:
        - cases:
          - then:
            - desmos: dwells-in
              from_id: $_animus
              step: loose
              to_id: $circle_id
            when: $dwelling[0].id == $circle_id
          step: switch
        when: $dwelling | length > 0
      step: switch
    - bind_to: circle_attainments
      desmos: grants-attainment
      direction: outbound
      from_id: $circle_id
      step: trace
    - item_var: attainment
      items: $circle_attainments
      step: for_each
      steps:
      - desmos: has-attainment
        from_id: $_animus
        step: loose
        to_id: $attainment.id
    - step: return
      value:
        attainments_removed: $circle_attainments | length
        circle_id: $circle_id
        left: true
    tier: 2
    visible: true
