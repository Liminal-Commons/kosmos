- id: praxis/nous/gather-context
  eidos: praxis
  version: 179
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/nous-activation/praxeis/activation.yaml
    description: 'Gather context for an invocation according to a pattern specification.


      Reads the pattern''s context configuration and assembles:

      - Theoria from specified domains

      - Recent session context (if include_recent)

      - Entities via bond traversals (if specified)

      '
    name: gather-context
    oikos: nous-activation
    params:
    - description: The invocation-pattern to gather context for
      name: pattern_id
      required: true
      type: string
    steps:
    - bind_to: pattern
      id: $pattern_id
      step: find
    - condition: $pattern
      message: 'Invocation pattern not found: $pattern_id'
      step: assert
    - bindings:
        context:
          recent: []
          theoria: []
          traversed: []
      step: set
    - cases:
      - then:
        - bind_to: all_theoria
          eidos: theoria
          step: gather
        - bind_to: filtered_theoria
          condition: $pattern.data.context.theoria_domains contains $item.data.domain
          items: $all_theoria
          step: filter
        - bindings:
            context:
              recent: $context.recent
              theoria: $filtered_theoria
              traversed: $context.traversed
          step: set
        when: $pattern.data.context.theoria_domains
      step: switch
    - cases:
      - then:
        - bind_to: recent_notes
          eidos: note
          limit: 10
          step: gather
        - bindings:
            context:
              recent: $recent_notes
              theoria: $context.theoria
              traversed: $context.traversed
          step: set
        when: $pattern.data.context.include_recent
      step: switch
    - step: return
      value: $context
    visible: false
