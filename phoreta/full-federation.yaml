- id: praxis/pege/emit-desmos-reference
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/pege/praxeis/pege.yaml
    description: 'Emit a reference document for a desmos (bond type).

      '
    name: emit-desmos-reference
    oikos: pege
    params:
    - description: The desmos ID (e.g., "is-a", "dwells-in")
      name: desmos_id
      required: true
      type: string
    - description: Output directory (default docs/reference/desmoi)
      name: output_dir
      required: false
      type: string
    steps:
    - bind_to: entity
      id: desmos/$desmos_id
      step: find
    - condition: $entity
      message: 'Desmos not found: $desmos_id'
      step: assert
    - bindings:
        out_dir: $output_dir
        timestamp: '{{ now() }}'
      step: set
    - cases:
      - then: []
        when: $out_dir
      default:
      - bindings:
          out_dir: docs/reference/desmoi
        step: set
      step: switch
    - bindings:
        content: '# $desmos_id


          $entity.data.description


          ## Signature


          | From | To |

          |------|----|

          | $entity.data.from | $entity.data.to |


          ---

          *Emitted from kosmos — $timestamp*

          '
      step: set
    - bind_to: emit_result
      params:
        content: $content
        path: $out_dir/$desmos_id.md
      praxis: thyra/emit
      step: call
    - step: return
