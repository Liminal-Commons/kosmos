- id: praxis/self-federation/export-for-sync
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/self-federation/praxeis/self-federation.yaml
    description: 'Export current state as phoreta for self-federation.


      Called by Device A after verification succeeds.

      The phoreta is sent to Device B via the established P2P channel.

      '
    name: export-for-sync
    oikos: self-federation
    params:
    - description: The aither data channel to Device B
      name: channel_id
      required: true
      type: string
    - description: If true, export all state. If false, delta only.
      name: full_sync
      required: false
      type: boolean
    steps:
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $body.animus_id
      message: No animus in dwelling context
      step: assert
    - cases:
        'false':
        - bind_to: snapshot
          params: {}
          praxis: hypostasis/sync-delta
          step: call
        'true':
        - bind_to: snapshot
          params:
            circle_id: $body.circle_id
          praxis: hypostasis/create-snapshot
          step: call
      'on': $full_sync
      step: switch
    - bindings:
        sync_message:
          phoreta: $snapshot
          timestamp: '{{ now() }}'
          type: self-federation-sync
      step: set
    - params:
        channel_id: $channel_id
        message: '{{ json_encode($sync_message) }}'
      praxis: aither/send-message
      step: call
    - step: return
      value:
        bond_count: '{{ length($snapshot.bonds || []) }}'
        entity_count: '{{ length($snapshot.entities || []) }}'
        exported: true
    tier: 2
    visible: true
- id: praxis/self-federation/import-sync
