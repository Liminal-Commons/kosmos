      source: genesis/self-federation/praxeis/self-federation.yaml
    description: 'Import state received via self-federation.


      Called by Device B after receiving phoreta from Device A.

      Verifies composition chains and merges state.

      '
    name: import-sync
    oikos: self-federation
    params:
    - description: The phoreta bundle received from Device A
      name: phoreta
      required: true
      type: object
    - description: 'Conflict resolution: newer_wins, local_wins, manual'
      name: merge_strategy
      required: false
      type: string
    steps:
    - bind_to: import_result
      params:
        merge_strategy: $merge_strategy || 'newer_wins'
        phoreta: $phoreta
        verify_signatures: true
      praxis: hypostasis/import-phoreta
      step: call
    - step: return
      value:
        bond_count: $import_result.bond_count
        conflicts: $import_result.conflicts
        entity_count: $import_result.entity_count
        imported: $import_result.imported
    tier: 2
    visible: true
- id: praxis/self-federation/initiate
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/self-federation/praxeis/self-federation.yaml
    description: 'Initiate self-federation from Device A.


      Creates a self-link that can be used to sync to another device.

      The link should be stored securely (password manager).


      Returns the link and instructions for Device B.

      '
    name: initiate
    oikos: self-federation
    params:
    - description: Circle to federate (typically home circle)
      name: circle_id
      required: true
      type: string
    - description: Label for this sync (e.g., "laptop-backup", "phone")
      name: label
      required: false
      type: string
    steps:
    - bind_to: link_result
      params:
        circle_id: $circle_id
        expires_in_days: 30
        max_uses: 1
        message: self-sync:$label
        require_approval: false
      praxis: propylon/create-link
      step: call
    - params:
        about: $link_result.link_id
        content: Self-federation link created for $circle_id
        kind: observation
        reason: Self-sync marker - verify via pubkey match
      praxis: oikos/take-note
      step: call
    - step: return
      value:
        encoded_link: $link_result.encoded_link
        expires_at: $link_result.expires_at
        instructions: "Self-federation link created.\n\nOn Device B:\n1. Install Thyra\
          \ or run kosmos-mcp-v8\n2. Enter your 24-word mnemonic (same as Device A)\n\
          3. Use this link to connect:\n   $shareable_url\n\nStore this link securely\
          \ (e.g., 1Password).\nThe link expires in 30 days but can be regenerated.\n\
          \nIMPORTANT: Same mnemonic = same identity = automatic verification.\nNo\
          \ human approval needed for self-sync.\n"
        invitation_id: $link_result.invitation_id
        is_self_sync: true
        link_id: $link_result.link_id
        shareable_url: $link_result.shareable_url
    tier: 2
    visible: true
- id: praxis/self-federation/verify-self
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/self-federation/praxeis/self-federation.yaml
    description: 'Verify that the connecting device is the same persona.


      Unlike peer entry (human verification), self-federation uses

      pubkey verification: same mnemonic = same derived keys.


      Called by Device A when Device B connects.

      '
    name: verify-self
    oikos: self-federation
    params:
    - description: The propylon session from challenge-entry
      name: session_id
      required: true
      type: string
    - description: Public key claimed by Device B
      name: claimed_pubkey
      required: true
      type: string
    steps:
    - bind_to: session
      id: $session_id
      step: find
    - condition: $session
      message: Session not found
      step: assert
    - bind_to: invitation
      id: $session.data.invitation_id
      step: find
    - condition: $invitation
      message: Invitation not found
      step: assert
    - bindings:
        is_self_sync: '{{ starts_with($invitation.data.message || '''', ''self-sync:'')
          }}'
      step: set
    - condition: $is_self_sync
      message: Not a self-sync invitation. Use peer verification for regular invitations.
      step: assert
    - bind_to: links
      desmoi:
      - grants-entry-to
      direction: inward
      from: $invitation.id
      step: trace
    - condition: '{{ length($links) > 0 }}'
      message: No link found for invitation
      step: assert
    - bindings:
        link: '{{ first($links) }}'
      step: set
    - bindings:
        pubkey_matches: '{{ $link.data.inviter_pubkey == $claimed_pubkey }}'
      step: set
    - cases:
        'false':
        - step: return
          value:
            error: Public key does not match. Are you using the same mnemonic?
            verified: false
        'true':
        - step: return
          value:
            link_id: $link.id
            message: Same persona confirmed via pubkey verification
            persona_id: $invitation.data.inviter_id
            verified: true
      'on': $pubkey_matches
      step: switch
    tier: 2
    visible: true
- id: praxis/soma/arise-animus
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Bring an animus into being. The animus instantiates a persona.


      Creates:

      - animus entity (status: dwelling)

      - body-schema entity (default capabilities)

      - instantiates bond to persona

      - schema-of bond to animus


      Returns the animus_id. Use this ID for channel operations.

      '
    name: arise-animus
    oikos: soma
    params:
    - description: The persona this animus instantiates
      name: persona_id
      required: true
      type: string
    - description: ID for the new animus (e.g., animus/uuid)
      name: animus_id
      required: true
      type: string
    steps:
    - bind_to: persona
      id: $persona_id
      step: find
    - condition: $persona
      message: 'Persona not found: $persona_id'
      step: assert
    - bind_to: animus_entity
      data:
        persona_id: $persona_id
        status: dwelling
      eidos: animus
      id: $animus_id
      step: arise
    - desmos: instantiates
      from_id: $animus_id
      step: bind
      to_id: $persona_id
    - bindings:
        schema_id: body-schema/$animus_id
      step: set
    - bind_to: schema_entity
      data:
        capabilities:
        - perceive
        - emit
        - dwell
        channels: []
      eidos: body-schema
      id: $schema_id
      step: arise
    - desmos: schema-of
      from_id: $schema_id
      step: bind
      to_id: $animus_id
    - step: return
      value:
        animus_id: $animus_id
        body_schema_id: $schema_id
        status: dwelling
    visible: true
- id: praxis/soma/close-channel
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Close a channel.

      '
    name: close-channel
    oikos: soma
    params:
    - description: The channel to close
      name: channel_id
      required: true
      type: string
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Channel not found: $channel_id'
      step: assert
    - data:
        status: closed
      id: $channel_id
      step: update
    - step: return
      value:
        channel_id: $channel_id
        closed: true
    visible: true
- id: praxis/soma/depart-animus
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Have an animus depart (end dwelling).


      Marks the animus as departed and closes all open channels.

      '
    name: depart-animus
    oikos: soma
    params:
    - description: The animus to depart
      name: animus_id
      required: true
      type: string
    steps:
    - bind_to: animus
      id: $animus_id
      step: find
    - condition: $animus
      message: 'Animus not found: $animus_id'
      step: assert
    - data:
        status: departed
      id: $animus_id
      step: update
    - bind_to: channels
      desmos: channel-of
      resolve: from
      step: trace
      to_id: $animus_id
    - item_var: channel
      items: $channels
      step: for_each
      steps:
      - cases:
        - then:
          - data:
              status: closed
            id: $channel.id
            step: update
          when: $channel.data.status == 'open'
        step: switch
    - step: return
      value:
        animus_id: $animus_id
        departed: true
    visible: true
- id: praxis/soma/emit
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Emit a signal through a channel.


      Creates a signal entity bonded to the channel.

      '
    name: emit
    oikos: soma
    params:
    - description: The channel to emit through
      name: channel_id
      required: true
      type: string
    - description: ID for the new signal (e.g., signal/uuid)
      name: signal_id
      required: true
      type: string
    - description: The content to emit
      name: content
      required: true
      type: any
    - description: Optional metadata about the signal
      name: metadata
      required: false
      type: object
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Channel not found: $channel_id'
      step: assert
    - condition: $channel.data.status == 'open'
      message: Channel is not open
      step: assert
    - condition: $channel.data.kind != 'perception'
      message: Cannot emit through perception-only channel
      step: assert
    - bind_to: signal_entity
      data:
        content: $content
        metadata: $metadata
        modality: $channel.data.modality
      eidos: signal
      id: $signal_id
      step: arise
    - desmos: emitted-through
      from_id: $signal_id
      step: bind
      to_id: $channel_id
    - step: return
      value:
        modality: $channel.data.modality
        signal_id: $signal_id
    visible: true
- id: praxis/soma/open-channel
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Open a channel for an animus.


      Channels are interfaces for perception or action:

      - perception: receives input (text, voice, vision)

      - action: emits output (text, file, signal)

      - bidirectional: both

      '
    name: open-channel
    oikos: soma
    params:
    - description: The animus to open a channel for
      name: animus_id
      required: true
      type: string
    - description: ID for the new channel (e.g., channel/uuid)
      name: channel_id
      required: true
      type: string
    - description: Channel name
      name: name
      required: true
      type: string
    - description: What type of data (text, voice, vision, file, etc.)
      name: modality
      required: true
      type: string
    - description: Channel kind (perception, action, bidirectional)
      name: kind
      required: false
      type: string
    steps:
    - bind_to: animus
      id: $animus_id
      step: find
    - condition: $animus
      message: 'Animus not found: $animus_id'
      step: assert
    - bindings:
        channel_kind: $kind
      step: set
    - cases:
      - then: []
        when: $channel_kind
      default:
      - bindings:
          channel_kind: bidirectional
        step: set
      step: switch
    - bind_to: channel_entity
      data:
        kind: $channel_kind
        modality: $modality
        name: $name
        status: open
      eidos: channel
      id: $channel_id
      step: arise
    - desmos: channel-of
      from_id: $channel_id
      step: bind
      to_id: $animus_id
    - step: return
      value:
        channel_id: $channel_id
        kind: $channel_kind
        modality: $modality
        name: $name
        status: open
    visible: true
- id: praxis/soma/perceive
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Record a perception through a channel.


      Creates a percept entity bonded to the channel.

      '
    name: perceive
    oikos: soma
    params:
    - description: The channel to perceive through
      name: channel_id
      required: true
      type: string
    - description: ID for the new percept (e.g., percept/uuid)
      name: percept_id
      required: true
      type: string
    - description: The perceived content
      name: content
      required: true
      type: any
    - description: Optional metadata about the perception
      name: metadata
      required: false
      type: object
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Channel not found: $channel_id'
      step: assert
    - condition: $channel.data.status == 'open'
      message: Channel is not open
      step: assert
    - condition: $channel.data.kind != 'action'
      message: Cannot perceive through action-only channel
      step: assert
    - bind_to: percept_entity
      data:
        content: $content
        metadata: $metadata
        modality: $channel.data.modality
      eidos: percept
      id: $percept_id
      step: arise
    - desmos: received-through
      from_id: $percept_id
      step: bind
      to_id: $channel_id
    - step: return
      value:
        modality: $channel.data.modality
        percept_id: $percept_id
    visible: true
- id: praxis/soma/sense-body
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/soma/praxeis/soma.yaml
    description: 'Sense the current body schema (idioaisthesis).


      Returns the animus''s sense of its own shape and capacity:

      - Available channels

      - Capabilities

      - Limits

      '
    name: sense-body
    oikos: soma
    params:
    - description: The animus to sense
      name: animus_id
      required: true
      type: string
    steps:
    - bind_to: schemas
      desmos: schema-of
      resolve: from
      step: trace
      to_id: $animus_id
    - cases:
      - then:
        - bindings:
            schema: $schemas[0]
          step: set
        when: $schemas
      default:
      - step: return
        value:
          animus_id: $animus_id
          found: false
      step: switch
    - bind_to: channels
      desmos: channel-of
      resolve: from
      step: trace
      to_id: $animus_id
    - step: return
      value:
        animus_id: $animus_id
        capabilities: $schema.data.capabilities
        channels: $channels
        found: true
        limits: $schema.data.limits
        schema: $schema
    visible: true
- id: praxis/syndesmos/activate-link
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Activate a federation link — begin connection.


      Sets intent to ''active'' and creates an aither-channel for transport.

      The actual connection is established via the aither reconciler.

      '
    name: activate-link
    oikos: syndesmos
    params:
    - description: The link to activate
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - bindings:
        room_id: federation/{{ [link.data.local_pubkey, link.data.remote_pubkey] |
          sort | join('-') }}
        timestamp: now()
      step: set
    - bind_to: signaling_result
      params:
        relay_url: $link.data.signaling_endpoint
        role: offerer
        room_id: $room_id
      praxis: aither/connect-signaling
      step: call
    - bind_to: channel_result
      params:
        channel_id: data-channel/$link_id
        signaling_session_id: $signaling_result.session_id
      praxis: aither/create-channel
      step: call
    - data:
        channel_id: $channel_result.channel_id
        intent: active
      id: $link_id
      step: update
    - desmos: uses-channel
      from_id: $link_id
      step: bind
      to_id: $channel_result.channel_id
    - step: return
      value:
        channel_id: $channel_result.channel_id
        link_id: $link_id
        message: Link activated, channel created
    tier: 3
    visible: true
- id: praxis/syndesmos/capture-for-sync
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Prepare an entity for outbound sync.


      Creates a phoreta tracking this entity for synchronization.

      '
    name: capture-for-sync
    oikos: syndesmos
    params:
    - description: The entity to capture
      name: entity_id
      required: true
      type: string
    - description: The link to sync through
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: entity
      id: $entity_id
      step: find
    - condition: $entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - bindings:
        phoreta_id: phoreta/$entity_id-$link_id
        timestamp: now()
        version: $entity.version
      step: set
    - bind_to: phoreta
      data:
        entity_id: $entity_id
        first_received_at: $timestamp
        last_synced_at: $timestamp
        link_id: $link_id
        local_version: $version
        origin_chora: $link.data.local_circle_id
        original_id: $entity_id
        remote_version: $version
        status: pending_push
      eidos: phoreta
      id: $phoreta_id
      step: arise
    - desmos: carried-through
      from_id: $phoreta_id
      step: bind
      to_id: $link_id
    - desmos: mirrors
      from_id: $phoreta_id
      step: bind
      to_id: $entity_id
    - step: return
      value:
        phoreta: $phoreta
        phoreta_id: $phoreta_id
    tier: 2
    visible: true
- id: praxis/syndesmos/create-link
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Create a federation link to another circle.


      Creates the link entity with identities established.

      The link starts in ''pending'' state — call activate-link to connect.

      '
    name: create-link
    oikos: syndesmos
    params:
    - description: Human-readable link name
      name: name
      required: true
      type: string
    - description: This circle (governance unit)
      name: local_circle_id
      required: true
      type: string
    - description: Ed25519 public key for authentication
      name: local_pubkey
      required: true
      type: string
    - description: Remote circle (governance unit)
      name: remote_circle_id
      required: true
      type: string
    - description: Remote Ed25519 public key for authentication
      name: remote_pubkey
      required: true
      type: string
    - description: URL for SDP exchange (defaults to propylon-relay)
      name: signaling_endpoint
      required: false
      type: string
    - description: Sync policy to use
      name: sync_policy_id
      required: false
      type: string
    steps:
    - bindings:
        endpoint: $signaling_endpoint
        link_id: syndesmos-link/{{ local_circle_id }}-{{ remote_circle_id }}
        timestamp: now()
      step: set
    - cases:
      - then: []
        when: $endpoint
      default:
      - bindings:
          endpoint: https://propylon-relay.chora.workers.dev
        step: set
      step: switch
    - bind_to: link
      data:
        actual: disconnected
        created_at: $timestamp
        intent: pending
        local_circle_id: $local_circle_id
        local_pubkey: $local_pubkey
        name: $name
        remote_circle_id: $remote_circle_id
        remote_pubkey: $remote_pubkey
        signaling_endpoint: $endpoint
        sync_policy_id: $sync_policy_id
      eidos: syndesmos-link
      id: $link_id
      step: arise
    - cases:
      - then:
        - desmos: governed-by
          from_id: $link_id
          step: bind
          to_id: $sync_policy_id
        when: $sync_policy_id
      step: switch
    - step: return
      value:
        link: $link
        link_id: $link_id
        message: Link created in pending state
    tier: 3
    visible: true
- id: praxis/syndesmos/create-sync-policy
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'Create a sync policy governing what flows through links.

      '
    name: create-sync-policy
    oikos: syndesmos
    params:
    - description: Policy identifier
      name: name
      required: true
      type: string
    - description: Eide patterns to sync (e.g., ['theoria', 'principle/*'])
      name: eide_patterns
      required: false
      type: array
    - description: Eide to explicitly exclude
      name: eide_exclude
      required: false
      type: array
    - description: 'Direction: push, pull, or bidirectional (default)'
      name: direction
      required: false
      type: string
    - description: 'Conflict strategy: local_wins, remote_wins, newer_wins, manual
        (default)'
      name: conflict_strategy
      required: false
      type: string
    - description: Human-readable description
      name: description
      required: false
      type: string
    steps:
    - bindings:
        dir: $direction
        policy_id: sync-policy/$name
        strategy: $conflict_strategy
        timestamp: now()
      step: set
    - cases:
      - then: []
        when: $dir
      default:
      - bindings:
          dir: bidirectional
        step: set
      step: switch
    - cases:
      - then: []
        when: $strategy
      default:
      - bindings:
          strategy: manual
        step: set
      step: switch
    - bind_to: policy
      data:
        conflict_strategy: $strategy
        created_at: $timestamp
        description: $description
        direction: $dir
        eide_exclude: $eide_exclude
        eide_patterns: $eide_patterns
        name: $name
      eidos: sync-policy
      id: $policy_id
      step: arise
    - step: return
      value:
        policy: $policy
        policy_id: $policy_id
    tier: 2
    visible: true
- id: praxis/syndesmos/list-conflicts
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'List sync conflicts.

      '
    name: list-conflicts
    oikos: syndesmos
    params:
    - description: Filter by status (open, resolved)
      name: status
      required: false
      type: string
    - description: 'Maximum to return (default: 50)'
      name: limit
      required: false
      type: number
    steps:
    - bindings:
        max_results: $limit
      step: set
    - cases:
      - then: []
        when: $max_results
      default:
      - bindings:
          max_results: 50
        step: set
      step: switch
    - bind_to: all_conflicts
      eidos: sync-conflict
      step: gather
    - cases:
      - then:
        - as: c
          bind_to: all_conflicts
          in: $all_conflicts
          step: filter
          where: $c.data.status == '$status'
        when: $status
      step: switch
    - bind_to: conflicts
      count: $max_results
      items: $all_conflicts
      step: limit
    - step: return
      value:
        conflicts: $conflicts
        count: $conflicts | length
    tier: 1
    visible: true
- id: praxis/syndesmos/list-links
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/syndesmos/praxeis/syndesmos.yaml
    description: 'List all federation links.

      '
    name: list-links
    oikos: syndesmos
    params:
    - description: Filter by intent (pending, active, suspended)
      name: status
      required: false
      type: string
    - description: 'Maximum links to return (default: 100)'
      name: limit
      required: false
      type: number
    steps:
    - bindings:
        max_results: $limit
      step: set
    - cases:
      - then: []
        when: $max_results
      default:
      - bindings:
          max_results: 100
        step: set
      step: switch
    - bind_to: all_links
      eidos: syndesmos-link
      step: gather
    - cases:
      - then:
        - as: link
          bind_to: links
          in: $all_links
          step: filter
          where: $link.data.intent == '$status'
        when: $status
      default:
      - bindings:
          links: $all_links
        step: set
      step: switch
    - bind_to: links
      count: $max_results
      items: $links
      step: limit
    - step: return
      value:
        count: $links | length
        links: $links
    tier: 1
    visible: true
