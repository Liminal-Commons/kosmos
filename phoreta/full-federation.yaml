- id: praxis/propylon/approve-entry
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Approve a pending entry request.


      Called by the inviter to approve someone waiting.

      Creates the animus and returns connection info.

      '
    name: approve-entry
    oikos: propylon
    params:
    - description: The pending session to approve
      name: session_id
      required: true
      type: string
    steps:
    - bind_to: session
      id: $session_id
      step: find
    - condition: $session
      message: Session not found
      step: assert
    - condition: $session.data.status == 'pending_approval'
      message: Session not pending approval
      step: assert
    - bind_to: invitation
      id: $session.data.invitation_id
      step: find
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $invitation.data.inviter_id == $body.persona_id
      message: Only the inviter can approve
      step: assert
    - bindings:
        animus_id: animus/{{ uuid() }}
        persona_id: persona/{{ uuid() }}
      step: set
    - data:
        created_at: '{{ now() }}'
        name: $session.data.persona_name || 'Anonymous'
        pubkey: $session.data.entrant_pubkey
      eidos: persona
      id: $persona_id
      step: arise
    - bind_to: animus_result
      params:
        animus_id: $animus_id
        persona_id: $persona_id
      praxis: soma/arise-animus
      step: call
    - desmos: member-of
      from: $animus_id
      step: bond
      to: $session.data.circle_id
    - desmos: authenticated-via
      from: $animus_id
      step: bond
      to: $session_id
    - data:
        animus_id: $animus_id
        approved_at: '{{ now() }}'
        approved_by: $body.persona_id
        status: authenticated
      id: $session_id
      step: update
    - step: return
      value:
        animus_id: $animus_id
        persona_id: $persona_id
        success: true
    tier: 2
    visible: true
- id: praxis/propylon/challenge-entry
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Issue an authentication challenge for entry.


      Creates a propylon-session with a nonce to sign.

      The entrant must sign the nonce with their keypair.


      For first-time entry: generates new keypair

      For returning entry: uses existing keypair

      '
    name: challenge-entry
    oikos: propylon
    params:
    - description: The encoded invitation link
      name: encoded
      required: true
      type: string
    - description: Existing public key (for returning entry)
      name: entrant_pubkey
      required: false
      type: string
    steps:
    - bind_to: validation
      params:
        encoded: $encoded
      praxis: propylon/validate-link
      step: call
    - condition: $validation.valid
      message: $validation.error
      step: assert
    - bindings:
        challenge_expires: '{{ timestamp_add_minutes(now(), 5) }}'
        nonce: '{{ random_hex(32) }}'
        session_id: propylon-session/{{ uuid() }}
      step: set
    - bind_to: session
      data:
        challenge_expires: $challenge_expires
        circle_id: $validation.circle_id
        created_at: '{{ now() }}'
        entrant_pubkey: $entrant_pubkey
        invitation_id: $validation.invitation_id
        nonce: $nonce
        require_approval: $validation.require_approval
        status: challenged
      eidos: propylon-session
      id: $session_id
      step: arise
    - bind_to: link
      eidos: propylon-link
      step: find
      where:
        invitation_id: $validation.invitation_id
    - cases:
        '!null':
        - desmos: used-link
          from: $session_id
          step: bond
          to: $link.id
      'on': $link
      step: switch
    - step: return
      value:
        challenge_expires: $challenge_expires
        circle_id: $validation.circle_id
        first_time: '{{ !$entrant_pubkey }}'
        nonce: $nonce
        require_approval: $validation.require_approval
        session_id: $session_id
    tier: 2
    visible: true
- id: praxis/propylon/create-link
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Create a shareable invitation link for a circle.


      The link encodes:

      - invitation_id (UUID)

      - circle_id (target circle)

      - inviter_pubkey (for verification)

      - signature (Ed25519 over invitation_id)

      - display metadata (names, message)

      - constraints (expiry, max_uses, require_approval)


      Returns a URL-safe encoded link.

      '
    name: create-link
    oikos: propylon
    params:
    - description: Circle to invite to
      name: circle_id
      required: true
      type: string
    - description: Optional message to include
      name: message
      required: false
      type: string
    - description: Days until expiration (default 7)
      name: expires_in_days
      required: false
      type: number
    - description: Maximum uses (omit for unlimited)
      name: max_uses
      required: false
      type: number
    - description: Whether inviter must approve (default false)
      name: require_approval
      required: false
      type: boolean
    steps:
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $body.animus_id
      message: No animus in dwelling context
      step: assert
    - bind_to: circle
      id: $circle_id
      step: find
    - condition: $circle
      message: 'Circle not found: $circle_id'
      step: assert
    - bindings:
        expires_at: '{{ timestamp_add_days(now(), $expires_in_days || 7) }}'
        invitation_id: invitation/{{ uuid() }}
      step: set
    - bind_to: keypair
      params:
        circle_id: $circle_id
        purpose: invitation
      praxis: hypostasis/derive-circle-key
      step: call
    - bind_to: signature_result
      params:
        content: $invitation_id
        private_key: $keypair.private_key
      praxis: hypostasis/sign-content
      step: call
    - bind_to: persona
      id: $body.persona_id
      step: find
    - data:
        circle_id: $circle_id
        created_at: '{{ now() }}'
        expires_at: $expires_at
        inviter_id: $body.persona_id
        max_uses: $max_uses
        message: $message
        require_approval: $require_approval || false
        status: active
        use_count: 0
      eidos: invitation
      id: $invitation_id
      step: arise
    - bind_to: link_entity
      data:
        bootstrap: wss://propylon.liminalcommons.com
        circle_id: $circle_id
        created_at: '{{ now() }}'
        display:
          circle_name: $circle.data.name
          inviter_name: $persona.data.name
          message: $message
        expires_at: $expires_at
        invitation_id: $invitation_id
        inviter_id: $body.persona_id
        inviter_pubkey: $keypair.public_key
        max_uses: $max_uses
        require_approval: $require_approval || false
        signature: $signature_result.signature
        status: active
      eidos: propylon-link
      id: propylon-link/{{ uuid() }}
      step: arise
    - desmos: grants-entry-to
      from: $link_entity.id
      step: bond
      to: $circle_id
    - bind_to: encoded
      params:
        link_id: $link_entity.id
      praxis: propylon/encode-link
      step: call
    - step: return
      value:
        encoded_link: $encoded.url
        expires_at: $expires_at
        invitation_id: $invitation_id
        link_id: $link_entity.id
        shareable_url: https://chora.link/p/$encoded.url
    tier: 2
    visible: true
- id: praxis/propylon/create-self-link
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Create a self-invite link for device synchronization.


      This link allows the same persona to connect from another device.

      Unlike peer invitations, self-links:

      - Don''t require human verification (pubkey verification instead)

      - Have longer expiry (30 days default)

      - Can be stored in password managers for future use


      The flow on Device B:

      1. Install Thyra

      2. Enter mnemonic (restores identity/keypair)

      3. Enter self-link (provides location/relay)

      4. Pubkey verification (no video call needed)

      5. P2P sync begins

      '
    name: create-self-link
    oikos: propylon
    params:
    - description: Circle to sync (typically home circle)
      name: circle_id
      required: true
      type: string
    - description: Days until expiration (default 30)
      name: expires_in_days
      required: false
      type: number
    - description: Optional label for this link (e.g., "laptop", "phone backup")
      name: label
      required: false
      type: string
    steps:
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $body.animus_id
      message: No animus in dwelling context
      step: assert
    - bind_to: circle
      id: $circle_id
      step: find
    - condition: $circle
      message: 'Circle not found: $circle_id'
      step: assert
    - bindings:
        expires_at: '{{ timestamp_add_days(now(), $expires_in_days || 30) }}'
        invitation_id: invitation/self-{{ uuid() }}
      step: set
    - bind_to: keypair
      params:
        circle_id: $circle_id
        purpose: self-sync
      praxis: hypostasis/derive-circle-key
      step: call
    - bind_to: signature_result
      params:
        content: $invitation_id
        private_key: $keypair.private_key
      praxis: hypostasis/sign-content
      step: call
    - bind_to: persona
      id: $body.persona_id
      step: find
    - data:
        circle_id: $circle_id
        created_at: '{{ now() }}'
        expires_at: $expires_at
        inviter_id: $body.persona_id
        kind: self-sync
        label: $label
        max_uses: null
        require_approval: false
        status: active
        use_count: 0
      eidos: invitation
      id: $invitation_id
      step: arise
    - bind_to: link_entity
      data:
        bootstrap: wss://propylon.liminalcommons.com
        circle_id: $circle_id
        created_at: '{{ now() }}'
        display:
          circle_name: $circle.data.name
          inviter_name: $persona.data.name
          label: $label
          message: Self-sync link for device federation
        expires_at: $expires_at
        invitation_id: $invitation_id
        inviter_id: $body.persona_id
        inviter_pubkey: $keypair.public_key
        kind: self-sync
        max_uses: null
        require_approval: false
        signature: $signature_result.signature
        status: active
      eidos: propylon-link
      id: propylon-link/self-{{ uuid() }}
      step: arise
    - desmos: grants-entry-to
      from: $link_entity.id
      step: bond
      to: $circle_id
    - bind_to: encoded
      params:
        link_id: $link_entity.id
      praxis: propylon/encode-link
      step: call
    - step: return
      value:
        encoded_link: $encoded.url
        expires_at: $expires_at
        instructions: 'To sync a new device:

          1. Install Thyra

          2. Enter your 24-word mnemonic

          3. Paste this link when prompted

          4. Your devices will sync automatically

          '
        invitation_id: $invitation_id
        kind: self-sync
        link_id: $link_entity.id
        shareable_url: https://thyra.link/p/$encoded.url
    tier: 2
    visible: true
- id: praxis/propylon/decode-link
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Decode a URL-safe propylon link string to its components.


      Process: Base64url → Decompress → JSON

      '
    name: decode-link
    oikos: propylon
    params:
    - description: The encoded link string
      name: encoded
      required: true
      type: string
    steps:
    - bindings:
        json_str: '{{ base64url_decode($encoded) }}'
        link_data: '{{ json_decode($json_str) }}'
      step: set
    - step: return
      value:
        bootstrap: $link_data.bootstrap
        circle_id: $link_data.circle_id
        display: $link_data.display
        expires_at: $link_data.expires_at
        invitation_id: $link_data.invitation_id
        inviter_id: $link_data.inviter_id
        inviter_pubkey: $link_data.inviter_pubkey
        signature: $link_data.signature
    tier: 1
    visible: true
- id: praxis/propylon/encode-link
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Encode a propylon-link entity to URL-safe string.


      Process: JSON → Compress → Base64url

      '
    name: encode-link
    oikos: propylon
    params:
    - description: The propylon-link entity ID
      name: link_id
      required: true
      type: string
    steps:
    - bind_to: link
      id: $link_id
      step: find
    - condition: $link
      message: 'Link not found: $link_id'
      step: assert
    - bindings:
        link_data:
          bootstrap: $link.data.bootstrap
          circle_id: $link.data.circle_id
          display: $link.data.display
          expires_at: $link.data.expires_at
          invitation_id: $link.data.invitation_id
          inviter_id: $link.data.inviter_id
          inviter_pubkey: $link.data.inviter_pubkey
          signature: $link.data.signature
      step: set
    - bindings:
        json_str: '{{ json_encode($link_data) }}'
        url: '{{ base64url_encode($json_str) }}'
      step: set
    - step: return
      value:
        url: $url
    tier: 1
    visible: false
- id: praxis/propylon/list-entry-audit
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Query entry history for a circle.


      Returns propylon-sessions for the caller''s circles.

      Useful for intrusion detection and audit.

      '
    name: list-entry-audit
    oikos: propylon
    params:
    - description: Circle to query
      name: circle_id
      required: true
      type: string
    - description: Filter by status (challenged, authenticated, failed, pending_approval)
      name: status
      required: false
      type: string
    - description: Maximum results (default 50)
      name: limit
      required: false
      type: number
    steps:
    - bind_to: sessions
      eidos: propylon-session
      limit: $limit || 50
      step: gather
      where:
        circle_id: $circle_id
    - cases:
        '!null':
        - bind_to: sessions
          condition: $item.data.status == $status
          items: $sessions
          step: filter
      'on': $status
      step: switch
    - bind_to: sessions
      by: data.created_at
      input: $sessions
      order: desc
      step: sort
    - step: return
      value:
        circle_id: $circle_id
        count: '{{ length($sessions) }}'
        sessions: $sessions
    tier: 1
    visible: true
- id: praxis/propylon/reject-entry
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Reject a pending entry request.

      '
    name: reject-entry
    oikos: propylon
    params:
    - description: The pending session to reject
      name: session_id
      required: true
      type: string
    - description: Reason for rejection
      name: reason
      required: false
      type: string
    steps:
    - bind_to: session
      id: $session_id
      step: find
    - condition: $session
      message: Session not found
      step: assert
    - condition: $session.data.status == 'pending_approval'
      message: Session not pending approval
      step: assert
    - bind_to: invitation
      id: $session.data.invitation_id
      step: find
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $invitation.data.inviter_id == $body.persona_id
      message: Only the inviter can reject
      step: assert
    - data:
        rejected_at: '{{ now() }}'
        rejected_by: $body.persona_id
        rejection_reason: $reason
        status: rejected
      id: $session_id
      step: update
    - step: return
      value:
        rejected: true
        session_id: $session_id
    tier: 2
    visible: true
- id: praxis/propylon/revoke-link
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Revoke an invitation link.


      Marks both the propylon-link and invitation as revoked.

      Any pending sessions using this link will fail validation.

      '
    name: revoke-link
    oikos: propylon
    params:
    - description: The invitation to revoke
      name: invitation_id
      required: true
      type: string
    steps:
    - bind_to: invitation
      id: $invitation_id
      step: find
    - condition: $invitation
      message: Invitation not found
      step: assert
    - bind_to: body
      params: {}
      praxis: soma/sense-body
      step: call
    - condition: $invitation.data.inviter_id == $body.persona_id
      message: Only the inviter can revoke
      step: assert
    - data:
        revoked_at: '{{ now() }}'
        status: revoked
      id: $invitation_id
      step: update
    - bind_to: link
      eidos: propylon-link
      step: find
      where:
        invitation_id: $invitation_id
    - cases:
        '!null':
        - data:
            revoked_at: '{{ now() }}'
            status: revoked
          id: $link.id
          step: update
      'on': $link
      step: switch
    - step: return
      value:
        invitation_id: $invitation_id
        revoked: true
    tier: 2
    visible: true
- id: praxis/propylon/validate-link
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Validate an invitation link.


      Checks:

      - Expiry (not expired)

      - Status (not revoked)

      - Use count (not exceeded max_uses)

      - Signature (Ed25519 verification)


      Returns validation result.

      '
    name: validate-link
    oikos: propylon
    params:
    - description: The encoded link string
      name: encoded
      required: true
      type: string
    steps:
    - bind_to: link_data
      params:
        encoded: $encoded
      praxis: propylon/decode-link
      step: call
    - bindings:
        expired: '{{ $link_data.expires_at && timestamp_before($link_data.expires_at,
          $now) }}'
        now: '{{ now() }}'
      step: set
    - cases:
        'true':
        - step: return
          value:
            error: Link has expired
            valid: false
      'on': $expired
      step: switch
    - bind_to: sig_result
      params:
        message: $link_data.invitation_id
        public_key: $link_data.inviter_pubkey
        signature: $link_data.signature
      praxis: hypostasis/verify-signature
      step: call
    - cases:
        'false':
        - step: return
          value:
            error: Invalid signature
            valid: false
      'on': $sig_result.valid
      step: switch
    - bind_to: invitation
      id: $link_data.invitation_id
      step: find
    - cases:
        'null':
        - step: return
          value:
            error: Invitation not found
            valid: false
      'on': $invitation
      step: switch
    - cases:
        revoked:
        - step: return
          value:
            error: Invitation has been revoked
            valid: false
        used:
        - step: return
          value:
            error: Invitation has already been used
            valid: false
      'on': $invitation.data.status
      step: switch
    - cases:
        'true':
        - step: return
          value:
            error: Invitation has reached maximum uses
            valid: false
      'on': $invitation.data.max_uses && $invitation.data.use_count >= $invitation.data.max_uses
      step: switch
    - step: return
      value:
        circle_id: $link_data.circle_id
        invitation_id: $link_data.invitation_id
        inviter_id: $link_data.inviter_id
        require_approval: $invitation.data.require_approval
        valid: true
    tier: 2
    visible: true
- id: praxis/propylon/verify-entry
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/propylon/praxeis/propylon.yaml
    description: 'Verify entry response and complete authentication.


      For first-time entry: verify signature with new pubkey

      For returning entry: verify signature with known pubkey


      On success:

      - Creates animus

      - Updates invitation use count

      - Returns connection info for P2P


      The gateway forgets after handoff.

      '
    name: verify-entry
    oikos: propylon
    params:
    - description: The propylon-session ID
      name: session_id
      required: true
      type: string
    - description: Signature of the nonce
      name: signed_nonce
      required: true
      type: string
    - description: Public key that signed the nonce
      name: entrant_pubkey
      required: true
      type: string
    - description: Display name for new persona (first-time entry)
      name: persona_name
      required: false
      type: string
    steps:
    - bind_to: session
      id: $session_id
      step: find
    - condition: $session
      message: Session not found
      step: assert
    - condition: $session.data.status == 'challenged'
      message: Session not in challenged state
      step: assert
    - bindings:
        expired: '{{ timestamp_before($session.data.challenge_expires, now()) }}'
      step: set
    - condition: '!$expired'
      message: Challenge has expired
      step: assert
    - bind_to: sig_result
      params:
        message: $session.data.nonce
        public_key: $entrant_pubkey
        signature: $signed_nonce
      praxis: hypostasis/verify-signature
      step: call
    - condition: $sig_result.valid
      message: Invalid signature
      step: assert
    - cases:
        'true':
        - step: return
          value:
            error: Public key does not match
            success: false
      'on': $session.data.entrant_pubkey && $session.data.entrant_pubkey != $entrant_pubkey
      step: switch
    - bind_to: invitation
      id: $session.data.invitation_id
      step: find
    - data:
        use_count: '{{ $invitation.data.use_count + 1 }}'
      id: $invitation.id
      step: update
    - cases:
        'true':
        - data:
            entrant_pubkey: $entrant_pubkey
            persona_name: $persona_name
            status: pending_approval
          id: $session_id
          step: update
        - step: return
          value:
            message: Entry request submitted. Awaiting inviter approval.
            status: pending_approval
            success: true
      'on': $session.data.require_approval
      step: switch
    - bindings:
        animus_id: animus/{{ uuid() }}
        persona_id: persona/{{ uuid() }}
      step: set
    - bind_to: persona
      data:
        created_at: '{{ now() }}'
        name: $persona_name || 'Anonymous'
        pubkey: $entrant_pubkey
      eidos: persona
      id: $persona_id
      step: arise
    - bind_to: animus_result
      params:
        animus_id: $animus_id
        persona_id: $persona_id
      praxis: soma/arise-animus
      step: call
    - desmos: member-of
      from: $animus_id
      step: bond
      to: $session.data.circle_id
    - desmos: authenticated-via
      from: $animus_id
      step: bond
      to: $session_id
    - data:
        animus_id: $animus_id
        authenticated_at: '{{ now() }}'
        entrant_pubkey: $entrant_pubkey
        status: authenticated
      id: $session_id
      step: update
    - bindings:
        connection_info:
          relay:
            room_id: $session.data.circle_id
            url: wss://propylon.liminalcommons.com
          session:
            expires_at: '{{ timestamp_add_hours(now(), 1) }}'
            id: $session_id
          webrtc:
            ice_servers:
            - urls:
              - stun:stun.l.google.com:19302
      step: set
    - step: return
      value:
        animus_id: $animus_id
        circle_id: $session.data.circle_id
        connection_info: $connection_info
        persona_id: $persona_id
        status: authenticated
        success: true
    tier: 2
    visible: true
- id: praxis/psyche/abandon-intention
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/psyche/praxeis/psyche.yaml
    description: 'Mark an intention as abandoned.

      '
    name: abandon-intention
    oikos: psyche
    params:
    - description: The intention to abandon
      name: intention_id
      required: true
      type: string
