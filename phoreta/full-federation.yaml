      required: true
      type: string
    steps:
    - condition: $_circle
      message: Cannot activate theme without dwelling in a circle
      step: assert
    - bind_to: theme
      id: $theme_id
      step: find
    - condition: $theme
      message: 'Theme not found: $theme_id'
      step: assert
    - bind_to: existing_bonds
      desmos: active-theme
      from_id: $_circle.id
      resolve: bond
      step: trace
    - as: bond
      do:
      - bond_id: $bond.id
        step: unbind
      items: $existing_bonds
      step: foreach
    - desmos: active-theme
      from_id: $_circle.id
      step: bind
      to_id: $theme_id
    - data:
        active: true
      id: $theme_id
      step: update
    - bind_to: emit_result
      payload:
        theme: $theme.data
