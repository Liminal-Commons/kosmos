      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/core.yaml
    bonds:
    - desmos: belongs-to
      from_self: true
      to_literal: oikos/dokimasia
    description: 'Compose an aggregated validation report across a dependency subgraph.


      Traverses from a root entity following depends-on, authorized-by,

      and composed-from bonds, gathering all validation results.

      This enables "bubbling up" validation status through the graph.


      The report includes:

      - Summary counts (passed, failed, pending)

      - List of failures with context

      - The provenance chain from root to genesis

      - All entities that were traversed

      '
    name: validation-report
    slots:
      depth:
        default: 10
        description: Maximum traversal depth
        required: false
        type: number
      include_passed:
        default: false
        description: Include passed validations in results
        required: false
        type: boolean
      root_id:
