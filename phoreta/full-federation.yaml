- id: artifact-def-desmos-reference
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/pege.yaml
    description: 'A complete reference document for a desmos (bond type).

      '
    name: desmos-reference
    slots:
    - name: title
      pattern: literal
      template: '# {{ entity.id }}'
    - name: description
      pattern: queried
      source: entity.data.description
    - name: signature
      pattern: literal
      template: '## Signature


        **From**: {{ entity.data.from }}

        **To**: {{ entity.data.to }}

        '
    - authorized_by: caller
      auto_approve: true
      name: usage_section
      pattern: generated
      prompt: 'Describe when this bond type is used:


        ID: {{ entity.id }}

        Description: {{ entity.data.description }}

        From: {{ entity.data.from }}

        To: {{ entity.data.to }}


        Be concise, 2-3 sentences.

        '
    - name: footer
      pattern: literal
      template: '---

        *Emitted from kosmos — {{ timestamp }}*

        '
    template: '{{ title }}


      {{ description }}


      {{ signature }}


      {{ usage_section }}


      {{ footer }}

      '
- id: artifact-def-dns-provider-binding
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/core.yaml
    bonds:
    - desmos: provided-by
      from_slot: zone_id
      required: true
      to_self: true
    defaults:
      status: active
    description: 'Bind a zone to its DNS provider with credentials.


      Credentials are referenced via secret:// or env:// URIs,

      never stored directly in the entity.

      '
    name: dns-provider-binding
    target_eidos: dns-provider-binding
- id: artifact-def-dns-record
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/core.yaml
    bonds:
    - desmos: in-zone
      from_self: true
      required: true
      to_slot: zone_id
    defaults:
      actual_state: unknown
      desired_state: present
      proxied: true
      ttl: 1
    description: 'Create a DNS record with dual existence.


      The entity represents intent (what we want).

      Actuality represents provider state (what exists).

      The reconciler aligns them.

      '
    name: dns-record
    target_eidos: dns-record
- id: artifact-def-dns-zone
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/core.yaml
    bonds:
    - desmos: manages-zone
      from_context: _circle
      optional: true
      to_self: true
    defaults:
      record_count: 0
      status: pending
    description: 'Create a managed DNS zone.


      Zones are sovereignty boundaries. A circle that manages a zone

      has authority over all records within it.

      '
    name: dns-zone
    target_eidos: dns-zone
- id: artifact-def-eidos-index
