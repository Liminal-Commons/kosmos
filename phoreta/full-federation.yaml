- id: praxis/aither/reconcile-channel
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/aither/praxeis/aither.yaml
    description: 'Reconcile a data channel — align intent with actuality.


      If intent is connected but actual is disconnected, attempt to reconnect.

      Uses ICE restart or re-signaling as needed.

      '
    name: reconcile-channel
    oikos: aither
    params:
    - description: The channel to reconcile
      name: channel_id
      required: true
      type: string
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Data channel not found: $channel_id'
      step: assert
    - bind_to: actual
      entity_id: $channel_id
      step: sense_actuality
    - bindings:
        actual_state: $actual.state
        intent: $channel.data.intent
      step: set
    - cases:
      - then:
        - bind_to: restart_result
          channel_id: $channel_id
          operation: restart_ice
          step: signal
        - data:
            last_reconnect_at: '{{ now() }}'
            status: reconnecting
          id: $channel_id
          step: update
        - step: return
          value:
            action: reconnect
            channel_id: $channel_id
            message: ICE restart initiated
            success: $restart_result.success
        when: $intent == "connected" and $actual_state != "connected"
      - then:
        - channel_id: $channel_id
          operation: close
          step: signal
        - data:
            disconnected_at: '{{ now() }}'
            status: disconnected
          id: $channel_id
          step: update
        - step: return
          value:
            action: disconnect
            channel_id: $channel_id
            message: Channel closed
            success: true
        when: $intent == "disconnected" and $actual_state == "connected"
      default:
      - step: return
        value:
          action: none
          channel_id: $channel_id
          message: Already aligned
          success: true
      step: switch
    tier: 3
    visible: true
