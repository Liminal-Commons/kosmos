- id: praxis/nous/navigate
  eidos: praxis
  version: 179
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/nous-activation/praxeis/activation.yaml
    description: 'Multi-step reasoning via iterative invocation.


      The kosmos holds the loop, not the LLM. Each iteration:

      1. Gather current context

      2. Invoke with goal and iteration info

      3. Check if done (yield.done = true)

      4. Continue or return


      This enables navigation toward a goal with kosmos-level orchestration.

      '
    name: navigate
    oikos: nous-activation
    params:
    - description: What we're navigating toward
      name: goal
      required: true
      type: string
    - description: The invocation-pattern to use for each step
      name: pattern_id
      required: true
      type: string
    - description: Maximum iterations before stopping (default 5)
      name: max_iterations
      required: false
      type: number
    steps:
    - bindings:
        done: false
        iteration: 0
        max_iter: $max_iterations
        results: []
      step: set
    - cases:
      - then: []
        when: $max_iter
      default:
      - bindings:
          max_iter: 5
        step: set
      step: switch
    - condition: not $done and $iteration < $max_iter
      do:
      - bind_to: step_result
        params:
          additional_context:
            goal: $goal
            iteration: $iteration
            previous_results: $results
          pattern_id: $pattern_id
          utterance: $goal
        praxis: nous/invoke
        step: call
      - bindings:
          results: $results + [$step_result]
        step: set
      - cases:
        - then:
          - bindings:
              done: true
            step: set
          when: $step_result.yield.done
        default:
        - bindings:
            iteration: $iteration + 1
          step: set
        step: switch
      step: while
    - step: return
      value:
        all_results: $results
        done: $done
        final_yield: $step_result.yield
        goal: $goal
        iterations: $iteration
    visible: true
