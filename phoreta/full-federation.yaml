- id: praxis/aither/accept-answer
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/aither/praxeis/aither.yaml
    description: 'Accept an SDP answer from remote peer (offerer side).


      After creating a channel and sending the offer through signaling,

      call this with the received answer to complete the connection.

      '
    name: accept-answer
    oikos: aither
    params:
    - description: The data channel
      name: channel_id
      required: true
      type: string
    - description: SDP answer from remote peer
      name: sdp_answer
      required: true
      type: string
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Data channel not found: $channel_id'
      step: assert
    - channel_id: $channel_id
      operation: accept_answer
      sdp: $sdp_answer
      step: signal
    - data:
        connected_at: '{{ now() }}'
        sdp_answer: $sdp_answer
        status: connected
      id: $channel_id
      step: update
    - step: return
      value:
        channel_id: $channel_id
        connected: true
    tier: 3
    visible: true
- id: praxis/aither/answer-channel
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/aither/praxeis/aither.yaml
    description: 'Answer an incoming WebRTC offer (as answerer).


      When receiving an SDP offer through signaling, call this to

      create the local peer connection and generate an answer.

      '
    name: answer-channel
    oikos: aither
    params:
    - description: SDP offer from remote peer
      name: sdp_offer
      required: true
      type: string
    - description: Optional channel ID (generated if not provided)
      name: channel_id
      required: false
      type: string
    - description: Signaling session the offer came from
      name: signaling_session_id
      required: false
      type: string
    steps:
    - bindings:
        cid: $channel_id
        created_at: now()
      step: set
    - cases:
      - then: []
        when: $cid
      default:
      - bindings:
          cid: data-channel/{{ now() }}
        step: set
      step: switch
    - bind_to: channel
      data:
        channel_id: $cid
        created_at: $created_at
        intent: connected
        sdp_offer: $sdp_offer
        signaling_session_id: $signaling_session_id
        status: connecting
      eidos: data-channel
      id: $cid
      step: arise
    - bind_to: answer_result
      channel_id: $cid
      operation: create_answer
      sdp: $sdp_offer
      step: signal
    - data:
        connected_at: '{{ now() }}'
        sdp_answer: $answer_result.sdp_answer
        status: connected
      id: $cid
      step: update
    - cases:
      - then:
        - desmos: bootstrapped-by
          from_id: $cid
          step: bind
          to_id: $signaling_session_id
        when: $signaling_session_id
      step: switch
    - step: return
      value:
        channel_id: $cid
        sdp_answer: $answer_result.sdp_answer
        status: connected
    tier: 3
    visible: true
- id: praxis/aither/close-channel
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/aither/praxeis/aither.yaml
    description: 'Close a data channel.

      '
    name: close-channel
    oikos: aither
    params:
    - description: The channel to close
      name: channel_id
      required: true
      type: string
    steps:
    - bind_to: channel
      id: $channel_id
      step: find
    - condition: $channel
      message: 'Data channel not found: $channel_id'
      step: assert
    - data:
        intent: disconnected
      id: $channel_id
      step: update
    - bind_to: result
