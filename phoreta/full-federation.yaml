      source: genesis/pege/praxeis/pege.yaml
    description: 'Emit a reference document for an eidos.


      Composes the document using caller patterns:

      - title: literal

      - description: queried from entity

      - fields: queried + transformed to table

      - actuality: conditional (if present)

      - footer: literal with timestamp


      Emits to docs/reference/eide/{id}.md

      '
    name: emit-eidos-reference
    oikos: pege
    params:
    - description: The eidos ID to document (e.g., "persona", "theoria")
      name: eidos_id
      required: true
      type: string
    - description: Output directory (default docs/reference/eide)
      name: output_dir
      required: false
      type: string
    steps:
    - bind_to: entity
      id: eidos/$eidos_id
      step: find
    - condition: $entity
      message: 'Eidos not found: $eidos_id'
      step: assert
    - bindings:
        out_dir: $output_dir
        timestamp: '{{ now() }}'
      step: set
    - cases:
      - then: []
        when: $out_dir
      default:
      - bindings:
          out_dir: docs/reference/eide
        step: set
      step: switch
    - bindings:
        title_section: '# $entity.id'
      step: set
    - bindings:
        description_section: $entity.data.description
      step: set
    - bindings:
        fields_section: ''
      step: set
    - cases:
      - then:
        - bindings:
            fields_section: '## Fields


              | Field | Type | Required | Description |

              |-------|------|----------|-------------|

              '
          step: set
        - bind_to: field_rows
          items: '{{ entries($entity.data.fields) }}'
          step: map
          to: '| $item.key | $item.value.type | $item.value.required | $item.value.description
            |'
        - bindings:
            fields_section: $fields_section{{ join($field_rows) }}
          step: set
        when: $entity.data.fields
      step: switch
    - bindings:
        actuality_section: ''
      step: set
    - cases:
      - then:
        - bindings:
            actuality_section: '## Actuality


              This eidos has actuality mode `$entity.data.actuality.mode`.


              Operations are provided by the corresponding dynamis module.

              '
          step: set
        when: $entity.data.actuality
      step: switch
    - bindings:
        footer_section: '---

          *Emitted from kosmos — $timestamp*

          '
      step: set
    - bindings:
        content: '$title_section


          $description_section


          $fields_section


          $actuality_section


          $footer_section

          '
      step: set
    - bind_to: emit_result
      params:
        content: $content
        path: $out_dir/$eidos_id.md
      praxis: thyra/emit
      step: call
    - step: return
      value:
        eidos_id: $eidos_id
        path: $out_dir/$eidos_id.md
        timestamp: $timestamp
    visible: true
- id: praxis/pege/emit-stoicheion-reference
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/pege/praxeis/pege.yaml
    description: 'Emit a reference document for a stoicheion.


      Includes:

      - Name and tier badge

      - Description

      - Parameters table

      - Effects list

      '
    name: emit-stoicheion-reference
    oikos: pege
    params:
    - description: The stoicheion ID (e.g., "find", "arise", "bind")
      name: stoicheion_id
      required: true
      type: string
    - description: Output directory (default docs/reference/stoicheia)
      name: output_dir
      required: false
      type: string
    steps:
    - bind_to: entity
      id: stoicheion/$stoicheion_id
      step: find
    - condition: $entity
      message: 'Stoicheion not found: $stoicheion_id'
      step: assert
    - bindings:
        out_dir: $output_dir
        timestamp: '{{ now() }}'
      step: set
    - cases:
      - then: []
        when: $out_dir
      default:
      - bindings:
          out_dir: docs/reference/stoicheia
        step: set
      step: switch
    - bindings:
        tier_desc: Unknown
      step: set
    - cases:
      - then:
        - bindings:
            tier_desc: Elemental — pure data flow, no side effects
          step: set
        when: $entity.data.tier == 0
      - then:
        - bindings:
            tier_desc: Aggregate — collection operations
          step: set
        when: $entity.data.tier == 1
      - then:
        - bindings:
            tier_desc: Compositional — creation, control flow
          step: set
        when: $entity.data.tier == 2
      - then:
        - bindings:
            tier_desc: Generative — external systems, inference
          step: set
        when: $entity.data.tier == 3
      step: switch
    - bindings:
        params_section: '*No parameters.*'
      step: set
    - cases:
      - then:
        - bindings:
            params_section: '| Parameter | Type | Required | Description |

              |-----------|------|----------|-------------|

              '
          step: set
        - bind_to: param_rows
          items: $entity.data.params
          step: map
          to: '| $item.name | $item.type | $item.required | $item.description |'
        - bindings:
            params_section: $params_section$param_rows
          step: set
        when: $entity.data.params
      step: switch
    - bindings:
        effects_section: '*No side effects.*'
      step: set
    - cases:
      - then:
        - bind_to: effect_list
          items: $entity.data.effects
          step: map
          to: '- `$item`'
        - bindings:
            effects_section: $effect_list
          step: set
        when: $entity.data.effects
      step: switch
    - bindings:
        content: '# $stoicheion_id


          **Tier $entity.data.tier** — $tier_desc


          $entity.data.description


          ## Parameters


          $params_section


          ## Effects


          $effects_section


          ---

          *Emitted from kosmos — $timestamp*

          '
      step: set
    - bind_to: emit_result
      params:
        content: $content
        path: $out_dir/$stoicheion_id.md
      praxis: thyra/emit
      step: call
    - step: return
      value:
        path: $out_dir/$stoicheion_id.md
        stoicheion_id: $stoicheion_id
    visible: true
- id: praxis/politeia/accept-invitation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Accept an invitation to join a circle.


      Creates member-of bond and derives attainments from the circle.

      '
    name: accept-invitation
    oikos: politeia
    params:
    - description: Invitation to accept
      name: invitation_id
      required: true
      type: string
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: invitation
      id: $invitation_id
      step: find
    - condition: $invitation
      message: 'Invitation not found: $invitation_id'
      step: assert
    - condition: $invitation.data.status == "pending"
      message: Invitation is not pending
      step: assert
    - cases:
      - then:
        - condition: $invitation.data.invitee_id == $_persona
          message: Invitation not for you
          step: assert
        when: $invitation.data.invitee_id
      step: switch
    - cases:
      - then:
        - condition: $invitation.data.uses < $invitation.data.max_uses
          message: Invitation has reached max uses
          step: assert
        when: $invitation.data.max_uses
      step: switch
    - bindings:
        target_circle: $invitation.data.circle_id
      step: set
    - bind_to: membership_bond
      desmos: member-of
      from_id: $_animus
      step: bind
      to_id: $target_circle
    - data:
        accepted_at: '{{ now() }}'
        status: accepted
        uses: $invitation.data.uses + 1
      id: $invitation_id
      step: update
    - bind_to: derived
      params:
        animus_id: $_animus
        circle_id: $target_circle
      praxis: politeia/derive-attainments
      step: call
    - step: return
      value:
        accepted: true
        attainments_derived: $derived.attainments
        circle_id: $target_circle
    tier: 2
    visible: true
- id: praxis/politeia/admin-bind
