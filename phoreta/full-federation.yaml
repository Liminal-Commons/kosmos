- id: praxis/demiurge/list-generative-commons
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'List all oikos-dev packages marked as generative-commons.


      These are source packages that can be:

      - Baked locally by other circles

      - Forked and adapted

      - Used as base for locale-specific versions

      '
    name: list-generative-commons
    oikos: demiurge
    params:
    - description: Maximum results (default 50)
      name: limit
      required: false
      type: integer
    steps:
    - bind_to: all_dev_oikoi
      eidos: oikos-dev
      step: gather
    - as: oikos
      bind_to: commons_oikoi
      condition: $oikos.data.distribution == 'generative-commons'
      in: $all_dev_oikoi
      step: filter
    - bindings:
        effective_limit: '$limit ? $limit : 50'
        result_count: $commons_oikoi | length
      step: set
    - step: return
      value:
        count: $result_count
        oikoi: $commons_oikoi | take($effective_limit)
    tier: 2
    visible: true
- id: praxis/demiurge/list-oikos-derivations
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'List all oikos-dev packages derived from a given source.


      Follows derives-from bonds to find forks and adaptations.

      '
    name: list-oikos-derivations
    oikos: demiurge
    params:
    - description: The source oikos-dev to find derivations of
      name: source_oikos_dev_id
      required: true
      type: string
    steps:
    - bind_to: source_oikos
      id: $source_oikos_dev_id
      step: find
    - condition: $source_oikos
      message: 'Source oikos-dev not found: $source_oikos_dev_id'
      step: assert
    - bind_to: derivations
      desmos: derives-from
      step: trace
      to: $source_oikos_dev_id
    - step: return
      value:
        derivation_count: $derivations | length
        derivations: $derivations
        source_id: $source_oikos_dev_id
        source_name: $source_oikos.data.oikos_id
    tier: 2
    visible: true
- id: praxis/demiurge/list-stale-artifacts
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'List all artifacts marked as stale.


      Useful for finding what needs to be recomposed.

      '
    name: list-stale-artifacts
    oikos: demiurge
    params:
    - description: Maximum results (default 50)
      name: limit
      required: false
      type: number
    steps:
    - bind_to: stale_artifacts
      eidos: artifact
      limit: $limit
      step: gather
      where: json_extract(data, '$.stale') = true
    - step: return
      value:
        artifacts: $stale_artifacts
        count: $stale_artifacts | length
    tier: 1
    visible: true
- id: praxis/demiurge/mark-dependents-stale
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Mark all artifacts that depend on an entity as stale.


      When an entity changes, this propagates staleness to

      all artifacts that have depends-on bonds to it.

      '
    name: mark-dependents-stale
    oikos: demiurge
    params:
    - description: The entity that changed
      name: entity_id
      required: true
      type: string
    steps:
    - bind_to: dependents
      desmos: depends-on
      resolve: from
      step: trace
      to_id: $entity_id
    - bindings:
        marked_count: 0
      step: set
    - as: dependent
      do:
      - data:
          stale: true
        id: $dependent.id
        step: update
      - bindings:
          marked_count: $marked_count + 1
        step: set
      in: $dependents
      step: for_each
    - step: return
      value:
        dependents_marked_stale: $marked_count
        entity_id: $entity_id
    tier: 2
    visible: true
- id: praxis/demiurge/publish-oikos
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Publish an oikos-dev as oikos-prod.


      Complete publish flow:

      1. Bake the oikos-dev (resolve all generation specs)

      2. Sign the content hash with circle-scoped key

      3. Create oikos-prod entity with signature

      4. Create publish-attestation for audit trail

      5. Bond oikos-prod to dev and publisher


      Requires oikos-publish attainment.

      '
    name: publish-oikos
    oikos: demiurge
    params:
    - description: The oikos-dev to publish
      name: oikos_dev_id
      required: true
      type: string
    - description: BIP-39 mnemonic for signing
      name: mnemonic
      required: true
      type: string
    - description: Circle context for key derivation
      name: circle_id
      required: true
      type: string
    - description: Expression that authorizes this publication
      name: authorized_by
      required: true
      type: string
    - description: Optional attestation message from publisher
      name: attestation
      required: false
      type: string
    - description: 'BCP 47 locale code for bake-time i18n (e.g., "en-US", "zh-CN").

        If provided, produces a locale-specific oikos-prod.

        Omit for locale-agnostic publishing.

        '
      name: target_locale
      required: false
      type: string
    steps:
    - bind_to: dev_oikos
      id: $oikos_dev_id
      step: find
    - condition: $dev_oikos
      message: 'oikos-dev not found: $oikos_dev_id'
      step: assert
    - condition: $dev_oikos.data.status == 'ready_to_publish'
      message: oikos-dev is not ready to publish (status must be 'ready_to_publish')
      step: assert
    - bind_to: bake_result
      params:
        authorized_by: $authorized_by
        oikos_dev_id: $oikos_dev_id
        target_locale: $target_locale
      praxis: demiurge/bake-oikos
      step: invoke
    - bind_to: key_result
      params:
        circle_id: $circle_id
        mnemonic: $mnemonic
      praxis: hypostasis/derive-circle-key
      step: invoke
    - bind_to: sign_result
      params:
        circle_id: $circle_id
        content: $bake_result.content_hash
        mnemonic: $mnemonic
      praxis: hypostasis/sign-content
      step: invoke
    - bindings:
        locale_suffix: '$bake_result.locale != ''und'' ? ''-'' + $bake_result.locale
          : '''''
        prod_id: oikos-prod/$dev_oikos.data.oikos_id-$dev_oikos.data.version$locale_suffix
      step: set
    - bind_to: prod_oikos
      data:
        baked_from: $oikos_dev_id
        content: $bake_result.baked_content.content
        content_hash: $bake_result.content_hash
        locale: $bake_result.locale
        manifest: $bake_result.baked_content.manifest
        oikos_id: $dev_oikos.data.oikos_id
        published_at: '{{ now() }}'
        publisher_pubkey: $key_result.public_key
        signature: $sign_result.signature
        version: $dev_oikos.data.version
      eidos: oikos-prod
      id: $prod_id
      step: arise
    - bindings:
        attestation_id: publish-attestation/$dev_oikos.data.oikos_id-$dev_oikos.data.version$locale_suffix
      step: set
    - bind_to: attestation_entity
      data:
        attestation: $attestation
        dev_oikos_id: $oikos_dev_id
        dev_version: $dev_oikos.data.version
        generation_hashes: $bake_result.generation_hashes
        locale: $bake_result.locale
        prod_oikos_id: $prod_id
        published_at: '{{ now() }}'
        publisher_persona: $dwelling.animus_id
        publisher_pubkey: $key_result.public_key
      eidos: publish-attestation
      id: $attestation_id
      step: arise
    - desmos: baked-from
      from_id: $prod_id
      step: bind
      to_id: $oikos_dev_id
    - desmos: published-by
      from_id: $prod_id
      step: bind
      to_id: $dwelling.animus_id
    - desmos: attests-to
      from_id: $attestation_id
      step: bind
      to_id: $prod_id
    - step: return
      value:
        attestation_id: $attestation_id
        content_hash: $bake_result.content_hash
        locale: $bake_result.locale
        prod_oikos_id: $prod_id
        published: true
        publisher_pubkey: $key_result.public_key
        signature: $sign_result.signature
    tier: 3
    visible: true
- id: praxis/demiurge/publish-oikos-multilocale
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: "Publish an oikos-dev to multiple locales in one operation.\n\nFor\
      \ each locale in the target_locales array:\n1. Bake the oikos-dev with that\
      \ locale context\n2. Sign the baked content\n3. Create locale-specific oikos-prod\n\
      \nExample:\n  oikos-dev/mypackage-1.0.0  (one source)\n    ├── publish(locale:\
      \ \"en-US\") → oikos-prod/mypackage-1.0.0-en-US\n    ├── publish(locale: \"\
      zh-CN\") → oikos-prod/mypackage-1.0.0-zh-CN\n    └── publish(locale: \"ar-SA\"\
      ) → oikos-prod/mypackage-1.0.0-ar-SA\n\nThis enables a circle to provide localized\
      \ versions of oikoi\nfrom a single source package with generation specs.\n"
    name: publish-oikos-multilocale
    oikos: demiurge
    params:
    - description: The oikos-dev to publish
      name: oikos_dev_id
      required: true
      type: string
    - description: 'Array of BCP 47 locale codes to publish (e.g., ["en-US", "zh-CN",
        "ar-SA"]).

        Each locale produces a separate oikos-prod.

        '
      name: target_locales
      required: true
      type: array
    - description: BIP-39 mnemonic for signing
      name: mnemonic
      required: true
      type: string
    - description: Circle context for key derivation
      name: circle_id
      required: true
      type: string
    - description: Expression that authorizes this publication
      name: authorized_by
      required: true
      type: string
    - description: Optional attestation message from publisher
      name: attestation
      required: false
      type: string
    steps:
    - bind_to: dev_oikos
      id: $oikos_dev_id
      step: find
    - condition: $dev_oikos
      message: 'oikos-dev not found: $oikos_dev_id'
      step: assert
    - condition: $dev_oikos.data.status == 'ready_to_publish'
      message: oikos-dev is not ready to publish (status must be 'ready_to_publish')
      step: assert
    - condition: $target_locales | length > 0
      message: target_locales must contain at least one locale
      step: assert
    - bindings:
        published_versions: []
      step: set
    - as: locale
      do:
      - bind_to: publish_result
        params:
          attestation: $attestation
          authorized_by: $authorized_by
          circle_id: $circle_id
          mnemonic: $mnemonic
          oikos_dev_id: $oikos_dev_id
          target_locale: $locale
        praxis: demiurge/publish-oikos
        step: invoke
      - bindings:
          published_versions: '$published_versions + [{ locale: $locale, prod_oikos_id:
            $publish_result.prod_oikos_id, content_hash: $publish_result.content_hash
            }]'
        step: set
      in: $target_locales
      step: for_each
    - step: return
      value:
        locales_count: $target_locales | length
        oikos_dev_id: $oikos_dev_id
        published: true
        published_versions: $published_versions
    tier: 3
    visible: true
- id: praxis/demiurge/refresh-stale
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Recompose a stale artifact using its stored definition and inputs.


      Reads the original definition_id and inputs from the artifact,

      then recomposes to refresh the content.

      '
    name: refresh-stale
    oikos: demiurge
    params:
    - description: The stale artifact to refresh
      name: artifact_id
      required: true
      type: string
    steps:
    - bind_to: artifact
      id: $artifact_id
      step: find
    - condition: $artifact
      message: 'Artifact not found: $artifact_id'
      step: assert
    - condition: $artifact.data.stale
      message: 'Artifact is not stale: $artifact_id'
      step: assert
    - bind_to: refreshed
      definition_id: $artifact.data.definition_id
      id: $artifact_id
      inputs: $artifact.data.inputs
      step: compose
    - data:
        composed_at: '{{ now() }}'
        stale: false
      id: $artifact_id
      step: update
    - step: return
      value:
        artifact_id: $artifact_id
        refreshed: true
    tier: 2
    visible: true
- id: praxis/demiurge/set-distribution-mode
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Set the distribution mode of an oikos-dev.


      Distribution modes:

      - generative-commons: Share source (generation specs). Others can bake locally.

      - binary-only: Share only baked oikos-prod. Generation specs stay private.

      - private: Not shared at all. Internal use only.


      Changing to generative-commons allows other circles to:

      1. Receive the oikos-dev via federation

      2. Bake locally with their own locale/context

      3. Fork and adapt the generation specs


      Requires oikos-develop attainment and ownership of the oikos-dev.

      '
    name: set-distribution-mode
    oikos: demiurge
    params:
    - description: The oikos-dev to update
      name: oikos_dev_id
      required: true
      type: string
    - description: 'Distribution mode: generative-commons, binary-only, or private'
      name: distribution
      required: true
      type: string
    steps:
    - bind_to: dev_oikos
      id: $oikos_dev_id
      step: find
    - condition: $dev_oikos
      message: 'oikos-dev not found: $oikos_dev_id'
      step: assert
    - condition: $dev_oikos.eidos == 'oikos-dev'
      message: 'Entity is not an oikos-dev: $oikos_dev_id'
      step: assert
    - condition: $distribution == 'generative-commons' or $distribution == 'binary-only'
        or $distribution == 'private'
      message: 'Invalid distribution mode. Must be: generative-commons, binary-only,
        or private'
      step: assert
    - data:
        distribution: $distribution
      id: $oikos_dev_id
      step: update
    - step: return
      value:
        distribution: $distribution
        oikos_dev_id: $oikos_dev_id
        updated: true
    tier: 2
    visible: true
- id: praxis/demiurge/verify-oikos
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: 'Verify an oikos-prod package.


      Checks:

      1. Content hash matches declared hash

      2. Signature is valid for the content hash

      3. Publisher pubkey matches signature


      Does NOT verify full provenance chain (use dokimasia for that).

      '
    name: verify-oikos
    oikos: demiurge
    params:
    - description: The oikos-prod to verify
      name: oikos_prod_id
      required: true
      type: string
    steps:
    - bind_to: prod_oikos
      id: $oikos_prod_id
      step: find
    - condition: $prod_oikos
      message: 'oikos-prod not found: $oikos_prod_id'
      step: assert
    - condition: $prod_oikos.eidos == 'oikos-prod'
      message: 'Entity is not an oikos-prod: $oikos_prod_id'
      step: assert
    - bindings:
        content_json: $content_to_hash | to_json
        content_to_hash:
          content: $prod_oikos.data.content
          manifest: $prod_oikos.data.manifest
      step: set
    - bind_to: computed_hash
      input: $content_json
      step: digest
    - bindings:
        hash_valid: $computed_hash == $prod_oikos.data.content_hash
      step: set
    - cases:
      - then:
        - step: return
          value:
            computed_hash: $computed_hash
            declared_hash: $prod_oikos.data.content_hash
            error: Content hash mismatch
            valid: false
        when: not $hash_valid
      step: switch
    - bind_to: sig_result
      params:
        content: $prod_oikos.data.content_hash
        public_key: $prod_oikos.data.publisher_pubkey
        signature: $prod_oikos.data.signature
      praxis: hypostasis/verify-signature
      step: invoke
    - cases:
      - then:
        - step: return
          value:
            content_hash: $prod_oikos.data.content_hash
            error: Invalid signature
            valid: false
        when: not $sig_result.valid
      step: switch
    - step: return
      value:
        content_hash: $prod_oikos.data.content_hash
        oikos_prod_id: $oikos_prod_id
        publisher_pubkey: $prod_oikos.data.publisher_pubkey
        valid: true
    tier: 2
    visible: true
- id: praxis/dns/bind-zone-provider
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Bind a zone to its DNS provider with credentials.


      Credentials are referenced via secret:// or env:// URIs,

      never stored directly in the entity.

      '
    name: bind-zone-provider
    oikos: thyra
    params:
    - description: Zone entity ID
      name: zone_id
      required: true
      type: string
    - description: Provider's zone ID (from their dashboard)
      name: provider_zone_id
      required: true
      type: string
    - description: Reference to API token (secret://... or env://...)
      name: credential_ref
      required: true
      type: string
    - description: Provider account ID (for cloudflare)
      name: account_id
      required: false
      type: string
    steps:
    - bind_to: zone
      id: $zone_id
      step: find
    - condition: $zone
      message: 'Zone not found: $zone_id'
      step: assert
    - bind_to: binding
      data:
        account_id: $account_id
        created_at: '{{ now() }}'
        credential_ref: $credential_ref
        provider: $zone.data.provider
        status: active
        zone_id: $provider_zone_id
      eidos: dns-provider-binding
      id: dns-provider-binding/{{ $zone.data.name | replace('.', '-') }}
      step: arise
    - desmos: provided-by
      from_id: $zone.id
      step: bind
      to_id: $binding.id
    - data:
        provider_zone_id: $provider_zone_id
        status: active
      id: $zone.id
      step: update
    - step: return
      value:
        binding: $binding
        zone: $zone
    tier: 2
    visible: true
- id: praxis/dns/create-record
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Create a DNS record entity (intent). Does NOT create at provider
      yet.

      Use reconcile-record to actualize.

      '
    name: create-record
    oikos: thyra
    params:
    - description: Zone this record belongs to
      name: zone_id
      required: true
      type: string
    - description: Record type (A, AAAA, CNAME, TXT, MX, etc.)
      name: record_type
      required: true
      type: string
    - description: Record name (subdomain part, use @ for root)
      name: name
      required: true
      type: string
    - description: Record value (IP, hostname, text, etc.)
      name: content
      required: true
      type: string
    - description: Time-to-live in seconds (1 = auto for Cloudflare)
      name: ttl
      required: false
      type: number
    - description: Priority for MX/SRV records
      name: priority
      required: false
      type: number
    - description: Cloudflare proxy (orange cloud)
      name: proxied
      required: false
      type: boolean
    - description: Entity ID this record addresses (optional)
      name: addresses
      required: false
      type: string
    steps:
    - bind_to: zone
      id: $zone_id
      step: find
    - condition: $zone
      message: 'Zone not found: $zone_id'
      step: assert
    - bindings:
        record_proxied: $proxied
        record_ttl: $ttl
      step: set
    - cases:
      - then:
        - bindings:
            record_ttl: 1
          step: set
        when: not $record_ttl
      step: switch
    - cases:
      - then:
        - bindings:
            record_proxied: true
          step: set
        when: $record_proxied == null
      step: switch
    - bind_to: record
      data:
        actual_state: unknown
        content: $content
        created_at: '{{ now() }}'
        desired_state: present
        name: $name
        priority: $priority
        proxied: $record_proxied
        record_type: $record_type
        ttl: $record_ttl
      eidos: dns-record
      id: dns-record/{{ $zone.data.name | replace('.', '-') }}-{{ $name | replace('.',
        '-') }}-{{ $record_type | lower }}
      step: arise
    - desmos: in-zone
      from_id: $record.id
      step: bind
      to_id: $zone.id
    - cases:
      - then:
        - desmos: addresses
          from_id: $record.id
          step: bind
          to_id: $addresses
        when: $addresses
      step: switch
    - step: return
      value:
        note: Record created as intent. Call reconcile-record to actualize.
        record: $record
        record_id: $record.id
    tier: 2
    visible: true
- id: praxis/dns/create-zone
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Create a DNS zone managed by the dwelling circle.


      Zones are sovereignty boundaries. A circle that manages a zone

      has authority over all records within it.

      '
    name: create-zone
    oikos: thyra
    params:
    - description: Zone name (e.g., liminalcommons.com)
      name: name
      required: true
      type: string
    - description: DNS provider (cloudflare, route53, manual)
      name: provider
      required: true
      type: string
    steps:
    - bind_to: zone
      data:
        created_at: '{{ now() }}'
        name: $name
        provider: $provider
        record_count: 0
        status: pending
      eidos: dns-zone
      id: dns-zone/{{ $name | replace('.', '-') }}
      step: arise
    - cases:
      - then:
        - desmos: manages-zone
          from_id: $_circle
          step: bind
          to_id: $zone.id
        when: $_circle
      step: switch
    - step: return
      value:
        zone: $zone
        zone_id: $zone.id
    tier: 2
    visible: true
- id: praxis/dns/delete-record
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'Mark a DNS record for deletion. Sets desired_state=absent.

      Calls reconcile to actually delete at provider.

      '
    name: delete-record
    oikos: thyra
    params:
    - description: The record to delete
      name: record_id
      required: true
      type: string
    steps:
    - bind_to: record
      id: $record_id
      step: find
    - condition: $record
      message: 'Record not found: $record_id'
      step: assert
    - data:
        desired_state: absent
      id: $record_id
      step: update
    - bind_to: reconcile_result
      params:
        record_id: $record_id
      praxis: dns/reconcile-record
      step: call
    - step: return
      value:
        deleted_at_provider: $reconcile_result.action_taken == "unmanifested"
        record_id: $record_id
    tier: 2
    visible: true
- id: praxis/dns/list-records
  eidos: praxis
  version: 109
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/dns.yaml
    description: 'List DNS records in a zone.

      '
    name: list-records
    oikos: thyra
    params:
    - description: Zone to list records from
      name: zone_id
      required: true
      type: string
    - description: Filter by record type
      name: record_type
      required: false
      type: string
    - description: Maximum results
      name: limit
      required: false
      type: number
    steps:
    - bind_to: zone
      id: $zone_id
      step: find
    - condition: $zone
      message: 'Zone not found: $zone_id'
      step: assert
    - bind_to: records
      desmos: in-zone
      direction: inward
      step: trace
      to_id: $zone_id
    - cases:
      - then:
        - as: r
          bind_to: records
          in: $records
          step: filter
          where: $r.data.record_type == '$record_type'
        when: $record_type
      step: switch
    - cases:
      - then:
        - bind_to: records
          count: $limit
          in: $records
          step: limit
        when: $limit
      step: switch
    - step: return
      value:
        count: $records | length
        records: $records
        zone_id: $zone_id
    tier: 1
    visible: true
