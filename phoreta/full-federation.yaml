- id: praxis/i18n/get-localized-text
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/i18n/praxeis/i18n.yaml
    description: 'Get localized text for an entity field in the dwelling locale.


      Looks for a localized-text entity for the field in the dwelling locale.

      Falls back to the original field value if no localization exists.

      Also falls back through locale hierarchy (e.g., en-US -> en).

      '
    name: get-localized-text
    oikos: i18n
    params:
    - description: The entity to get localized text for
      name: entity_id
      required: true
      type: string
    - description: Which field to get (e.g., 'description', 'name')
      name: field
      required: true
      type: string
    - description: Override locale (defaults to dwelling locale)
      name: locale_code
      required: false
      type: string
    steps:
    - bind_to: source_entity
      id: $entity_id
      step: find
    - condition: $source_entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bindings:
        effective_locale: $locale_code
      step: set
    - cases:
      - then:
        - bindings:
            effective_locale: $_locale.data.code
          step: set
        when: '!$effective_locale'
      step: switch
    - bindings:
        localized_text_id: localized-text/$entity_id/$field/$effective_locale
      step: set
    - bind_to: localized_text
      id: $localized_text_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            content: $localized_text.data.content
            locale: $effective_locale
            machine_translated: $localized_text.data.machine_translated
            source: localized
        when: $localized_text
      - then:
        - bindings:
            base_locale: '{{ $effective_locale | split(''-'') | first }}'
            fallback_id: localized-text/$entity_id/$field/$base_locale
          step: set
        - bind_to: fallback_text
          id: $fallback_id
          step: find
        - cases:
          - then:
            - step: return
              value:
                content: $fallback_text.data.content
                locale: $base_locale
                machine_translated: $fallback_text.data.machine_translated
                source: fallback
            when: $fallback_text
          step: switch
        when: '!$localized_text'
      step: switch
    - step: return
      value:
        content: $source_entity.data[$field]
        locale: original
        machine_translated: false
        source: original
    visible: true
- id: praxis/i18n/list-locales
