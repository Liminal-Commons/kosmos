    - description: Optional reason for abandoning
      name: reason
      required: false
      type: string
    steps:
    - bind_to: accumulation
      id: $accumulation_id
      step: find
    - condition: $accumulation
      message: 'Accumulation not found: $accumulation_id'
      step: assert
    - data:
        abandon_reason: $reason
        abandoned_at: '{{ now() }}'
        status: abandoned
      id: $accumulation_id
      step: update
    - step: return
      value:
        abandoned: true
        accumulation_id: $accumulation_id
        content_discarded: $accumulation.data.content
    tier: 2
    visible: true
- id: praxis/thyra/activate-layout
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Activate a layout for the current circle.


      Sets the active-layout bond from circle to layout.

      Deactivates any previously active layout.

      '
    name: activate-layout
    oikos: thyra
    params:
    - description: The layout to activate
      name: layout_id
      required: true
      type: string
    steps:
    - condition: $_circle
      message: Cannot activate layout without dwelling in a circle
      step: assert
    - bind_to: layout
      id: $layout_id
      step: find
    - condition: $layout
      message: 'Layout not found: $layout_id'
      step: assert
    - bind_to: existing_bonds
      desmos: active-layout
      from_id: $_circle.id
      resolve: bond
      step: trace
    - as: bond
      do:
      - bond_id: $bond.id
        step: unbind
      items: $existing_bonds
      step: foreach
    - desmos: active-layout
      from_id: $_circle.id
      step: bind
      to_id: $layout_id
    - data:
        active: true
      id: $layout_id
      step: update
    - bindings:
        regions_reconciled: 0
      step: set
    - as: region
      do:
      - params:
          region_id: region/$region.name
        praxis: thyra/reconcile-region
        step: call
      - bindings:
          regions_reconciled: $regions_reconciled + 1
        step: set
      items: $layout.data.regions
      step: foreach
    - step: return
      value:
        activated: true
        circle_id: $_circle.id
        layout_id: $layout_id
        regions_reconciled: $regions_reconciled
    tier: 2
    visible: true
- id: praxis/thyra/activate-theme
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Activate a style theme for the current circle.


      Sets the active-theme bond from circle to theme.

      '
    name: activate-theme
