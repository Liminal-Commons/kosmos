    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: sovereigns
      desmos: sovereign-to
      direction: outbound
      from_id: $circle_id
      step: trace
    - bind_to: is_sovereign
      condition: $item.id == $_animus
      items: $sovereigns
      step: filter
    - condition: $is_sovereign | length > 0
      message: Not sovereign to this circle
      step: assert
    - bind_to: attainment
      id: $attainment_id
      step: find
    - condition: $attainment
