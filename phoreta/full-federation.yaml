- id: praxis/politeia/derive-attainments
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Derive attainments for an animus based on circle memberships.


      Traverses: animus -> member-of -> circle -> grants-attainment -> attainment

      Creates has-attainment bonds for each derived attainment.

      '
    name: derive-attainments
    oikos: politeia
    params:
    - description: Animus to derive for (defaults to caller)
      name: animus_id
      required: false
      type: string
    - description: Specific circle to derive from (optional)
      name: circle_id
      required: false
      type: string
    steps:
    - bindings:
        target_animus: $animus_id
      step: set
    - cases:
      - then: []
        when: $target_animus
      default:
      - bindings:
          target_animus: $_animus
        step: set
      step: switch
    - condition: $target_animus
      message: No animus specified
      step: assert
    - bind_to: memberships
      desmos: member-of
      direction: outbound
      from_id: $target_animus
      step: trace
    - cases:
      - then:
        - bind_to: memberships
          condition: $item.id == $circle_id
          items: $memberships
          step: filter
        when: $circle_id
      step: switch
    - bindings:
        all_attainments: []
        bonds_created: 0
      step: set
    - item_var: circle
      items: $memberships
      step: for_each
      steps:
      - bind_to: circle_attainments
        desmos: grants-attainment
        direction: outbound
        from_id: $circle.id
        step: trace
      - item_var: attainment
        items: $circle_attainments
        step: for_each
        steps:
        - desmos: has-attainment
          from_id: $target_animus
          step: bind
          to_id: $attainment.id
    - bind_to: final_attainments
      desmos: has-attainment
      direction: outbound
      from_id: $target_animus
      step: trace
    - step: return
      value:
        animus_id: $target_animus
        attainments: $final_attainments
        count: $final_attainments | length
    tier: 2
    visible: true
- id: praxis/politeia/distribute-oikos
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Distribute an oikos-prod through an existing circle.


      Adds distribution bond and grants oikos-use attainment.

      Use this when adding an oikos to an existing circle.

      Use create-distribution-circle for dedicated distribution circles.

      '
    name: distribute-oikos
    oikos: politeia
    params:
    - description: The oikos-prod to distribute
      name: oikos_prod_id
      required: true
      type: string
    - description: The circle to distribute through
      name: circle_id
      required: true
      type: string
    steps:
    - bind_to: oikos_prod
      id: $oikos_prod_id
      step: find
    - condition: $oikos_prod
      message: 'oikos-prod not found: $oikos_prod_id'
      step: assert
    - condition: $oikos_prod.eidos == 'oikos-prod'
      message: 'Entity is not an oikos-prod: $oikos_prod_id'
      step: assert
    - bind_to: circle
      id: $circle_id
      step: find
    - condition: $circle
      message: 'Circle not found: $circle_id'
      step: assert
    - bindings:
        attainment_id: attainment/use-$oikos_prod.data.oikos_id
      step: set
    - bind_to: existing_attainment
      id: $attainment_id
      step: find
    - cases:
      - then:
        - data:
            created_at: '{{ now() }}'
            description: Ability to use $oikos_prod.data.oikos_id oikos capabilities
            name: use-$oikos_prod.data.oikos_id
            scope: circle
          eidos: attainment
          id: $attainment_id
          step: arise
        when: not $existing_attainment
      step: switch
    - desmos: grants-attainment
      from_id: $circle_id
      step: bind
      to_id: $attainment_id
    - desmos: distributes
      from_id: $circle_id
      step: bind
      to_id: $oikos_prod_id
    - step: return
      value:
        attainment_id: $attainment_id
        circle_id: $circle_id
        distributed: true
        oikos_prod_id: $oikos_prod_id
    tier: 2
    visible: true
- id: praxis/politeia/dwell-in-circle
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Move dwelling position to a circle.


      Animus can only dwell in one circle at a time (exclusive).

      Removes previous dwells-in bond, creates new one.

      '
    name: dwell-in-circle
    oikos: politeia
    params:
    - description: Circle to dwell in
      name: circle_id
      required: true
      type: string
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bind_to: circle
      id: $circle_id
      step: find
    - condition: $circle
      message: 'Circle not found: $circle_id'
      step: assert
    - bind_to: memberships
      desmos: member-of
      direction: outbound
      from_id: $_animus
      step: trace
    - bind_to: is_member
      condition: $item.id == $circle_id
      items: $memberships
      step: filter
    - condition: $is_member | length > 0
      message: Not a member of this circle
      step: assert
    - bind_to: current_dwelling
      desmos: dwells-in
      direction: outbound
      from_id: $_animus
      step: trace
    - cases:
      - then:
        - bindings:
            previous_circle: $current_dwelling[0].id
          step: set
        - desmos: dwells-in
          from_id: $_animus
          step: loose
          to_id: $current_dwelling[0].id
        when: $current_dwelling | length > 0
      step: switch
    - desmos: dwells-in
      from_id: $_animus
      step: bind
      to_id: $circle_id
    - data:
        circle_id: $circle_id
        last_active_at: '{{ now() }}'
      id: $_animus
      step: update
    - step: return
      value:
        dwelling_in: $circle_id
        previous_circle: $previous_circle
    tier: 2
    visible: true
- id: praxis/politeia/gather-affordances
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/politeia/praxeis/politeia.yaml
    description: 'Gather all affordances available to the caller.


      Traverses: animus -> has-attainment -> attainment -> surfaces-as -> affordance

      '
    name: gather-affordances
    oikos: politeia
    params:
    - description: Filter affordances relevant to this entity
      name: context_entity_id
      required: false
      type: string
    - description: Maximum results
      name: max_results
      required: false
      type: number
    steps:
    - condition: $_animus
      message: No dwelling context
      step: assert
    - bindings:
        limit: $max_results
      step: set
    - cases:
      - then: []
        when: $limit
      default:
      - bindings:
          limit: 100
        step: set
      step: switch
    - bind_to: attainments
      desmos: has-attainment
      direction: outbound
      from_id: $_animus
      step: trace
    - bindings:
        all_affordances: []
      step: set
    - item_var: attainment
      items: $attainments
      step: for_each
      steps:
      - bind_to: affordances
        desmos: surfaces-as
        direction: outbound
        from_id: $attainment.id
        step: trace
    - bind_to: all_affordances
      eidos: affordance
      step: gather
    - bind_to: all_affordances
      count: $limit
      items: $all_affordances
      step: limit
    - step: return
      value:
        affordances: $all_affordances
        count: $all_affordances | length
    tier: 1
    visible: true
- id: praxis/politeia/grant-attainment
