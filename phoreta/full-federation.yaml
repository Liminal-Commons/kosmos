        type: theme-change
      step: emit_display
    - step: return
      value:
        activated: true
        circle_id: $_circle.id
        theme_id: $theme_id
    tier: 2
    visible: true
- id: praxis/thyra/append-fragment
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Append a fragment to an active accumulation.


      Fragments are individual pieces (transcription segments, etc.)

      that build up the accumulation content.

      '
    name: append-fragment
    oikos: thyra
    params:
    - description: The accumulation to append to
      name: accumulation_id
      required: true
      type: string
    - description: The fragment content to append
      name: fragment
      required: true
      type: string
    - description: 'Separator between fragments (default: space)'
      name: separator
      required: false
      type: string
    steps:
    - bind_to: accumulation
      id: $accumulation_id
      step: find
    - condition: $accumulation
      message: 'Accumulation not found: $accumulation_id'
      step: assert
    - condition: $accumulation.data.status == "active"
      message: 'Accumulation is not active: $accumulation_id'
      step: assert
    - bindings:
        sep: $separator
      step: set
    - cases:
      - then: []
        when: $sep
      default:
      - bindings:
          sep: ' '
        step: set
      step: switch
    - bindings:
        current_content: $accumulation.data.content
        fragment_at: now()
        new_content: $current_content$sep$fragment
      step: set
    - cases:
      - then:
        - bindings:
            new_content: $fragment
          step: set
        when: $current_content == ""
      step: switch
    - data:
        content: $new_content
        last_fragment_at: $fragment_at
      id: $accumulation_id
      step: update
    - step: return
      value:
        accumulation_id: $accumulation_id
        content: $new_content
        fragment_added: $fragment
    tier: 2
    visible: true
- id: praxis/thyra/begin-accumulation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Begin accumulating content from a stream.


      Creates an accumulation entity that acts as a buffer for

      content awaiting commitment. The clarifier writes to this.

      '
    name: begin-accumulation
    oikos: thyra
    params:
    - description: The terminal stream this accumulation belongs to
      name: stream_id
      required: true
      type: string
    - description: Optional initial content
      name: initial_content
      required: false
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - bindings:
        accumulation_id: accumulation/{{ now() }}
        content: $initial_content
        started_at: now()
      step: set
    - cases:
      - then: []
        when: $content
      default:
      - bindings:
          content: ''
        step: set
      step: switch
    - bind_to: accumulation
      data:
        content: $content
        fragments: []
        started_at: $started_at
        status: active
        stream_id: $stream_id
      eidos: accumulation
      id: $accumulation_id
      step: arise
    - step: return
      value:
        accumulation_id: $accumulation_id
        status: active
        stream_id: $stream_id
    tier: 2
    visible: true
- id: praxis/thyra/clear-accumulation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Clear an accumulation — reset content without closing.


      Used to start fresh while keeping the accumulation active.

      '
    name: clear-accumulation
    oikos: thyra
    params:
    - description: The accumulation to clear
      name: accumulation_id
      required: true
      type: string
    steps:
    - bind_to: accumulation
      id: $accumulation_id
      step: find
    - condition: $accumulation
      message: 'Accumulation not found: $accumulation_id'
      step: assert
    - condition: $accumulation.data.status == "active"
      message: 'Accumulation is not active: $accumulation_id'
      step: assert
    - bindings:
        old_content: $accumulation.data.content
      step: set
    - data:
        content: ''
        fragments: []
        last_fragment_at: null
      id: $accumulation_id
      step: update
    - step: return
      value:
        accumulation_id: $accumulation_id
        cleared: true
        content_discarded: $old_content
    tier: 2
    visible: true
- id: praxis/thyra/close-artifact
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Close an artifact in the workspace (remove from tabs).


      Removes has-open bond from workspace to artifact.

      If focused, focuses next available artifact.

      '
    name: close-artifact
    oikos: thyra
    params:
    - description: The artifact to close
      name: artifact_id
      required: true
      type: string
    steps:
    - condition: $_animus
      message: Cannot close artifact without an animus
      step: assert
    - bind_to: workspaces
      desmos: workspace-of
      from_id: $_animus.id
      resolve: to
      step: trace
    - condition: $workspaces | length > 0
      message: No workspace found
      step: assert
    - bindings:
        workspace: $workspaces[0]
      step: set
    - bind_to: open_bonds
      desmos: has-open
      from_id: $workspace.id
      resolve: bond
      step: trace
      to_id: $artifact_id
    - cases:
      - then:
        - bond_id: $open_bonds[0].id
          step: unbind
        when: $open_bonds | length > 0
      step: switch
    - bind_to: focused_artifacts
      desmos: focused-on
      from_id: $workspace.id
      resolve: to
      step: trace
    - bindings:
        next_focus: null
        was_focused: false
      step: set
    - cases:
      - then:
        - bindings:
            was_focused: true
          step: set
        - bind_to: focus_bonds
          desmos: focused-on
          from_id: $workspace.id
          resolve: bond
          step: trace
          to_id: $artifact_id
        - cases:
          - then:
            - bond_id: $focus_bonds[0].id
              step: unbind
            when: $focus_bonds | length > 0
          step: switch
        - bind_to: remaining_artifacts
          desmos: has-open
          from_id: $workspace.id
          resolve: to
          step: trace
        - cases:
          - then:
            - params:
                artifact_id: $remaining_artifacts[0].id
              praxis: thyra/focus-artifact
              step: call
            - bindings:
                next_focus: $remaining_artifacts[0].id
              step: set
            when: $remaining_artifacts | length > 0
          step: switch
        when: $focused_artifacts | length > 0 and $focused_artifacts[0].id == $artifact_id
      step: switch
    - step: return
      value:
        artifact_id: $artifact_id
        closed: true
        next_focus: $next_focus
        was_focused: $was_focused
        workspace_id: $workspace.id
    tier: 2
    visible: true
- id: praxis/thyra/close-stream
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Close a stream — set intent to closed and reconcile.


      The clean way to stop a stream. Sets intent, then reconciles

      to actually stop the substrate process.

      '
    name: close-stream
    oikos: thyra
    params:
    - description: The stream to close
      name: stream_id
      required: true
      type: string
    steps:
    - bind_to: stream
      id: $stream_id
      step: find
    - condition: $stream
      message: 'Stream not found: $stream_id'
      step: assert
    - data:
        intent: closed
      id: $stream_id
      step: update
    - bind_to: reconcile_result
      params:
        stream_id: $stream_id
      praxis: thyra/reconcile-stream
      step: call
    - step: return
      value:
        action: $reconcile_result.action
        closed: true
        stream_id: $stream_id
    tier: 3
    visible: true
- id: praxis/thyra/commit-accumulation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Commit an accumulation — create expression from buffer.


      This is the commitment boundary. The accumulated content

      becomes a durable expression entity.

      '
    name: commit-accumulation
    oikos: thyra
    params:
    - description: The accumulation to commit
      name: accumulation_id
      required: true
      type: string
    - description: 'Expression mode (default: declaration)'
      name: mode
      required: false
      type: string
    steps:
    - bind_to: accumulation
      id: $accumulation_id
      step: find
    - condition: $accumulation
      message: 'Accumulation not found: $accumulation_id'
      step: assert
    - condition: $accumulation.data.status == "active"
      message: 'Accumulation is not active: $accumulation_id'
      step: assert
    - condition: $accumulation.data.content != ""
      message: Cannot commit empty accumulation
      step: assert
    - bind_to: express_result
      params:
        content: $accumulation.data.content
        mode: $mode
        source_kind: stream
      praxis: thyra/express
      step: call
    - data:
        committed_at: '{{ now() }}'
        expression_id: $express_result.expression_id
        status: committed
      id: $accumulation_id
      step: update
    - desmos: derives-from
      from_id: $express_result.expression_id
      step: bind
      to_id: $accumulation.data.stream_id
    - step: return
      value:
        accumulation_id: $accumulation_id
        content: $accumulation.data.content
        expression_id: $express_result.expression_id
        mode: $express_result.mode
    tier: 3
    visible: true
- id: praxis/thyra/create-panel
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Create a panel for rendering content in a region.

      '
    name: create-panel
    oikos: thyra
    params:
    - description: Panel identifier
      name: name
      required: true
      type: string
    - description: How this panel renders (expression-thread, presence-list, etc.)
      name: render_type
      required: true
      type: string
    - description: The region this panel renders in
      name: region_id
      required: true
      type: string
    - description: Rendering priority (default 0)
      name: priority
      required: false
      type: number
    - description: Panel-specific configuration
      name: config
      required: false
      type: object
    steps:
    - bindings:
        panel_id: panel/$name
        panel_priority: $priority
      step: set
    - cases:
      - then: []
        when: $panel_priority
      default:
      - bindings:
          panel_priority: 0
        step: set
      step: switch
    - bind_to: panel
      data:
        config: $config
        created_at: '{{ now() }}'
        name: $name
        priority: $panel_priority
        region_id: $region_id
        render_type: $render_type
        visible: true
      eidos: panel
      id: $panel_id
      step: arise
    - desmos: renders-in
      from_id: $panel_id
      step: bind
      to_id: $region_id
    - step: return
      value:
        panel: $panel
        panel_id: $panel_id
        region_id: $region_id
        render_type: $render_type
    tier: 2
    visible: true
- id: praxis/thyra/emit
  eidos: praxis
  version: 143
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Emit content or entity to the filesystem (ekthesis).


      Brings existence into actuality — kosmos → chora.


      If entity_id is provided, the entity is serialized based on format.

      If content is provided directly, it''s written as-is.


      Supported formats:

      - yaml: Full entity as YAML

      - json: Full entity as pretty JSON

      - markdown: Human-readable markdown

      - text: Data field only (or serialized if not string)

      '
    name: emit
    oikos: thyra
    params:
    - description: File path to write to
      name: path
      required: true
      type: string
    - description: Entity ID to emit (serialized based on format)
      name: entity_id
      required: false
      type: string
    - description: Direct content to write (if entity_id not provided)
      name: content
      required: false
      type: string
    - description: Output format (yaml, json, markdown, text). Default yaml.
      name: format
      required: false
      type: string
    steps:
    - bind_to: result
      content: $content
      entity_id: $entity_id
      format: $format
      path: $path
      step: emit
    - step: return
      value: $result
    tier: 3
    visible: true
- id: praxis/thyra/emit-render
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Emit render commands to substrate.


      Translates kosmos render intent into substrate-specific commands.

      For Tauri: emits via IPC to WebView.

      For Web: would emit via WebSocket.


      The substrate dynamis handles actual rendering.

      '
    name: emit-render
    oikos: thyra
    params:
    - description: The region to render
      name: region_id
      required: true
      type: string
    - description: The render intent from gather-render-intent
      name: intent
      required: true
      type: object
    steps:
    - bindings:
        render_payload:
          circle_id: $intent.circle_id
          layout_id: $intent.layout_id
          panels: $intent.panels
          region_id: $region_id
          timestamp: '{{ now() }}'
      step: set
    - bind_to: emit_result
      payload: $render_payload
      step: emit_display
    - step: return
      value:
        action: rendered
        emitted: true
        payload_size: $render_payload | tojson | length
        region_id: $region_id
    tier: 3
    visible: true
- id: praxis/thyra/express
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Create an expression — the commitment boundary.


      This is the moment when ephemeral becomes durable.

      All contributions to the circle become expressions.

      '
    name: express
    oikos: thyra
    params:
    - description: The content being expressed
      name: content
      required: true
      type: string
    - description: 'Expression mode: declaration, inquiry, suggestion, request, proposal
        (default: declaration)'
      name: mode
      required: false
      type: string
    - description: Expression ID this replies to
      name: in_reply_to
      required: false
      type: string
    - description: 'How this originated: stream, compose, direct (default: direct)'
      name: source_kind
      required: false
      type: string
    - description: 'MIME type (default: text/plain)'
      name: content_type
      required: false
      type: string
    steps:
    - condition: $_persona
      message: Cannot express without a persona
      step: assert
    - condition: $_circle
      message: Cannot express without dwelling in a circle
      step: assert
    - bindings:
        expr_content_type: $content_type
        expr_mode: $mode
        expr_source: $source_kind
      step: set
    - cases:
      - then: []
        when: $expr_mode
      default:
      - bindings:
          expr_mode: declaration
        step: set
      step: switch
    - cases:
      - then: []
        when: $expr_source
      default:
      - bindings:
          expr_source: direct
        step: set
      step: switch
    - cases:
      - then: []
        when: $expr_content_type
      default:
      - bindings:
          expr_content_type: text/plain
        step: set
      step: switch
    - bindings:
        expressed_at: now()
        expression_id: expression/{{ now() }}
      step: set
    - bind_to: expression_entity
      data:
        circle_id: $_circle.id
        content: $content
        content_type: $expr_content_type
        expressed_at: $expressed_at
        expressed_by: $_persona.id
        in_reply_to: $in_reply_to
        mode: $expr_mode
        source_kind: $expr_source
      eidos: expression
      id: $expression_id
      step: arise
    - desmos: expressed-in
      from_id: $expression_id
      step: bind
      to_id: $_circle.id
    - cases:
      - then:
        - desmos: in-reply-to
          from_id: $expression_id
          step: bind
          to_id: $in_reply_to
        when: $in_reply_to
      step: switch
    - step: return
      value:
        circle_id: $_circle.id
        expressed_by: $_persona.id
        expression_id: $expression_id
        mode: $expr_mode
    visible: true
- id: praxis/thyra/focus-artifact
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Focus an artifact in the workspace (switch tabs).


      Sets focused-on bond from workspace to artifact.

      '
    name: focus-artifact
    oikos: thyra
    params:
    - description: The artifact to focus
      name: artifact_id
      required: true
      type: string
    steps:
    - condition: $_animus
      message: Cannot focus artifact without an animus
      step: assert
    - bind_to: workspaces
      desmos: workspace-of
      from_id: $_animus.id
      resolve: to
      step: trace
    - condition: $workspaces | length > 0
      message: No workspace found
      step: assert
    - bindings:
        workspace: $workspaces[0]
      step: set
    - bind_to: existing_focus
      desmos: focused-on
      from_id: $workspace.id
      resolve: bond
      step: trace
    - as: bond
      do:
      - bond_id: $bond.id
        step: unbind
      items: $existing_focus
      step: foreach
    - desmos: focused-on
      from_id: $workspace.id
      step: bind
      to_id: $artifact_id
    - data:
        focused_artifact_id: $artifact_id
        updated_at: '{{ now() }}'
      id: $workspace.id
      step: update
    - bind_to: emit_result
      payload:
        artifact_id: $artifact_id
        timestamp: '{{ now() }}'
        type: focus-change
        workspace_id: $workspace.id
      step: emit_display
    - step: return
      value:
        artifact_id: $artifact_id
        focused: true
        workspace_id: $workspace.id
    tier: 2
    visible: true
- id: praxis/thyra/gather-render-intent
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Gather entities visible from dwelling position for a region.


      Queries the kosmos to determine what should be rendered:

      - Walks visibility from dwelling circle

      - Gathers entities relevant to the region type

      - Returns structured intent for the reconciler


      This is the "sense what should be" phase of rendering.

      '
    name: gather-render-intent
    oikos: thyra
    params:
    - description: The HUD region to gather intent for
      name: region_id
      required: true
      type: string
    - description: Layout context (defaults to active layout)
      name: layout_id
      required: false
      type: string
    steps:
    - condition: $_circle
      message: Cannot gather render intent without dwelling in a circle
      step: assert
    - bindings:
        active_layout: $layout_id
      step: set
    - cases:
      - then: []
        when: $active_layout
      default:
      - bind_to: layout_bonds
        desmos: active-layout
        from_id: $_circle.id
        resolve: to
        step: trace
      - cases:
        - then:
          - bindings:
              active_layout: $layout_bonds[0].id
            step: set
          when: $layout_bonds | length > 0
        step: switch
      step: switch
    - bind_to: panels
      desmos: renders-in
      resolve: from
      step: trace
      to_id: $region_id
    - bind_to: panels
      by: data.priority
      items: $panels
      order: desc
      step: sort
    - bindings:
        panel_intents: []
        visible_entities: []
      step: set
    - as: panel
      do:
      - cases:
        - then:
          - bind_to: panel_entities
            desmos: expressed-in
            resolve: from
            step: trace
            to_id: $_circle.id
          - bind_to: panel_entities
            by: data.expressed_at
            items: $panel_entities
            order: desc
            step: sort
          - bind_to: panel_entities
            count: 100
            items: $panel_entities
            step: limit
          when: $panel.data.render_type == "expression-thread"
        - then:
          - bind_to: panel_entities
            desmos: dwells-in
            resolve: from
            step: trace
            to_id: $_circle.id
          when: $panel.data.render_type == "presence-list"
        - then:
          - bind_to: all_accumulations
            eidos: accumulation
            step: gather
          - as: a
            bind_to: panel_entities
            in: $all_accumulations
            step: filter
            where: $a.data.status == "active"
          when: $panel.data.render_type == "accumulation-buffer"
        - then:
          - bind_to: journey_result
            params:
              status: active
            praxis: nous/list-journeys
            step: call
          - bindings:
              panel_entities: $journey_result.journeys
            step: set
          when: $panel.data.render_type == "journey-view"
        - then:
          - bind_to: workspaces
            desmos: workspace-of
            from_id: $_animus.id
            resolve: to
            step: trace
          - cases:
            - then:
              - bindings:
                  workspace: $workspaces[0]
                step: set
              - bind_to: panel_entities
                desmos: has-open
                from_id: $workspace.id
                resolve: to
                step: trace
              when: $workspaces | length > 0
            default:
            - bindings:
                panel_entities: []
              step: set
            step: switch
          when: $panel.data.render_type == "workspace-view"
        - then:
          - bind_to: workspaces
            desmos: workspace-of
            from_id: $_animus.id
            resolve: to
            step: trace
          - cases:
            - then:
              - bindings:
                  workspace: $workspaces[0]
                step: set
              - bind_to: panel_entities
                desmos: focused-on
                from_id: $workspace.id
                resolve: to
                step: trace
              when: $workspaces | length > 0
            default:
            - bindings:
                panel_entities: []
              step: set
            step: switch
          when: $panel.data.render_type == "artifact-preview"
        - then:
          - bind_to: affordance_result
            params: {}
            praxis: politeia/gather-affordances
            step: call
          - bindings:
              panel_entities: $affordance_result.affordances
            step: set
          when: $panel.data.render_type == "affordance-bar"
        default:
        - bindings:
            panel_entities: []
          step: set
        step: switch
      - bindings:
          panel_intent:
            entities: $panel_entities
            panel_id: $panel.id
            priority: $panel.data.priority
            render_type: $panel.data.render_type
            visible: $panel.data.visible
        step: set
      - bind_to: panel_intents
        step: append
        to: $panel_intents
        value: $panel_intent
      - bind_to: visible_entities
        items:
        - $visible_entities
        - $panel_entities
        step: concat
      items: $panels
      step: foreach
    - step: return
      value:
        circle_id: $_circle.id
        entity_count: $visible_entities | length
        layout_id: $active_layout
        panels: $panel_intents
        region_id: $region_id
        visible_entities: $visible_entities
    tier: 2
    visible: true
- id: praxis/thyra/get-accumulation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Get the current state of an accumulation.

      '
    name: get-accumulation
    oikos: thyra
    params:
    - description: The accumulation to get
      name: accumulation_id
      required: true
      type: string
    steps:
    - bind_to: accumulation
      id: $accumulation_id
      step: find
    - condition: $accumulation
      message: 'Accumulation not found: $accumulation_id'
      step: assert
    - step: return
      value:
        accumulation: $accumulation
        content: $accumulation.data.content
        status: $accumulation.data.status
        stream_id: $accumulation.data.stream_id
    tier: 1
    visible: true
- id: praxis/thyra/get-active-layout
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Get the active layout for the current circle.

      '
    name: get-active-layout
    oikos: thyra
    params: []
    steps:
    - condition: $_circle
      message: Cannot get active layout without dwelling in a circle
      step: assert
    - bind_to: layouts
      desmos: active-layout
      from_id: $_circle.id
      resolve: to
      step: trace
    - cases:
      - then:
        - step: return
          value:
            circle_id: $_circle.id
            layout: $layouts[0]
            layout_id: $layouts[0].id
        when: $layouts | length > 0
      default:
      - step: return
        value:
          circle_id: $_circle.id
          layout: null
          layout_id: null
      step: switch
    tier: 1
    visible: true
- id: praxis/thyra/get-active-theme
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Get the active theme for the current circle.

      '
    name: get-active-theme
    oikos: thyra
    params: []
    steps:
    - condition: $_circle
      message: Cannot get active theme without dwelling in a circle
      step: assert
    - bind_to: themes
      desmos: active-theme
      from_id: $_circle.id
      resolve: to
      step: trace
    - cases:
      - then:
        - step: return
          value:
            circle_id: $_circle.id
            theme: $themes[0]
            theme_id: $themes[0].id
        when: $themes | length > 0
      default:
      - step: return
        value:
          circle_id: $_circle.id
          theme: null
          theme_id: null
      step: switch
    tier: 1
    visible: true
- id: praxis/thyra/get-thread
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/thyra.yaml
    description: 'Get a conversation thread from an expression.


      Follows in-reply-to bonds to build the thread.

      '
    name: get-thread
    oikos: thyra
    params:
    - description: The expression to get thread for
      name: expression_id
      required: true
      type: string
    - description: 'Direction: ancestors (default), descendants, or both'
      name: direction
      required: false
      type: string
    steps:
    - bind_to: root_expression
      id: $expression_id
      step: find
    - condition: $root_expression
      message: 'Expression not found: $expression_id'
      step: assert
    - bindings:
        thread_direction: $direction
      step: set
    - cases:
      - then: []
        when: $thread_direction
      default:
      - bindings:
          thread_direction: ancestors
        step: set
      step: switch
    - bindings:
        ancestors: []
        descendants: []
      step: set
    - cases:
      - then:
        - bind_to: ancestors
          desmos: in-reply-to
          from_id: $expression_id
          recursive: true
          resolve: to
          step: trace
        when: $thread_direction == 'ancestors' || $thread_direction == 'both'
      step: switch
    - cases:
      - then:
        - bind_to: descendants
          desmos: in-reply-to
          recursive: true
          resolve: from
          step: trace
          to_id: $expression_id
        when: $thread_direction == 'descendants' || $thread_direction == 'both'
      step: switch
    - step: return
      value:
        ancestors: $ancestors
        descendants: $descendants
        direction: $thread_direction
        expression: $root_expression
        expression_id: $expression_id
    visible: true
- id: praxis/thyra/get-workspace
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/thyra/praxeis/opsis.yaml
    description: 'Get the current workspace state.


      Returns open artifacts and focused artifact.

      '
    name: get-workspace
    oikos: thyra
    params: []
    steps:
    - condition: $_animus
      message: Cannot get workspace without an animus
      step: assert
    - bind_to: workspaces
      desmos: workspace-of
      from_id: $_animus.id
      resolve: to
      step: trace
    - cases:
      - then:
        - bindings:
            workspace: $workspaces[0]
          step: set
        - bind_to: open_artifacts
          desmos: has-open
          from_id: $workspace.id
          resolve: to
          step: trace
        - bind_to: focused_artifacts
          desmos: focused-on
          from_id: $workspace.id
          resolve: to
          step: trace
        - bindings:
            focused: null
          step: set
        - cases:
          - then:
            - bindings:
                focused: $focused_artifacts[0]
              step: set
            when: $focused_artifacts | length > 0
          step: switch
        - step: return
          value:
            focused_artifact: $focused
            focused_artifact_id: $workspace.data.focused_artifact_id
            open_artifacts: $open_artifacts
            open_count: $open_artifacts | length
            workspace: $workspace
            workspace_id: $workspace.id
        when: $workspaces | length > 0
      default:
      - step: return
        value:
          focused_artifact: null
          focused_artifact_id: null
          open_artifacts: []
          open_count: 0
          workspace: null
          workspace_id: null
      step: switch
    tier: 1
    visible: true
