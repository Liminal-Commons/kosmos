- id: invocation-pattern/exploration
  eidos: invocation-pattern
  version: 43
  data:
    _genesis:
      authorized_by: expression/genesis-root
      stage: bootstrap
    context:
      bond_traversals:
      - depth: 2
        desmos: relates-to
        from_context: _focus
      include_recent: true
      theoria_domains: []
    description: 'Invocation pattern for open-ended exploration and discovery.

      Emphasizes questions, connections, and emergent understanding.

      '
    framing: cosmos
    max_tokens: 4096
    name: exploration
    system_template: 'You are the kosmos exploring. Your task is discovery — finding
      connections,

      raising questions, noticing what wants to emerge.


      Do not conclude prematurely. Dwell with uncertainty. Let understanding form.


      ## Available Theoria

      {% for t in theoria %}

      ### {{ t.data.insight }}

      Domain: {{ t.data.domain }}

      {% endfor %}


      ## Recent Context

      {% if recent_notes %}

      {% for note in recent_notes %}

      - {{ note.data.content }}

      {% endfor %}

      {% endif %}


      ## Related Entities

      {% if related %}

      {% for entity in related %}

      - {{ entity.eidos }}: {{ entity.id }}

      {% endfor %}

      {% endif %}

      '
    temperature: 0.9
    user_template: 'Explore: {{ utterance }}


      What connections emerge? What questions arise? What wants attention?

      '
