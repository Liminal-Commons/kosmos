- id: theoria/documents-as-composed-artifacts
  eidos: theoria
  version: 1
  data:
    domain: demiurge
    insight: Documents follow the same compositional law as all artifacts. They are
      not external descriptions but kosmos entities with provenance, cache keys, and
      dependency tracking. Emission praxeis compose from slot graphs where each slot
      uses caller patterns (literal, queried, generated, composed). This makes documentation
      self-documenting — the kosmos documents itself through the same mechanisms it
      uses for everything else.
    source: conversation
    status: provisional
- id: theoria/nous-activation-complete
  eidos: theoria
  version: 1
  data:
    domain: nous
    insight: 'Phase 24 Nous Activation is complete. The kosmos now has the infrastructure
      to reason about itself through composed invocation: invocation-pattern and invocation
      eide define the shapes, three seed patterns (general, exploration, persona)
      provide starting templates, gather-context assembles what inference sees, invoke
      orchestrates the full activation loop, navigate enables multi-step reasoning
      with kosmos-level loops. Expression modes (suggestion, invitation, inquiry,
      request, proposal, declaration) signal how yields should be received.'
    source: implementation
    status: provisional
- id: theoria/stoicheia-representation-layers
  eidos: theoria
  version: 1
  data:
    domain: dynamis
    insight: 'Stoicheia exist at three representation layers: arche-level (YAML definitions
      interpreted by host), entity-level (loaded as queryable entities), and WASM-level
      (portable modules). These aren''t mutually exclusive — a manifest declares which
      form each stoicheion takes. Arche-level is current reality; entity-level enables
      tooling like pege emission; WASM-level enables portability. The progression
      is additive, not replacement.'
    source: conversation
    status: provisional
