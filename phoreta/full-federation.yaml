- id: praxis/demiurge/bake-oikos
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/demiurge/praxeis/demiurge.yaml
    description: "Bake an oikos-dev into frozen content ready for signing.\n\nTransforms\
      \ generation specs into literals:\n1. Find oikos-dev entity\n2. Walk content\
      \ looking for generation specs (caller: generated)\n3. For each spec, invoke\
      \ manteia/governed-inference with locale context\n4. Replace spec with literal\
      \ (caller: literal, value: generated_content)\n5. Compute content hash (BLAKE3)\n\
      6. Return baked content with locale tag\n\nDoes NOT create oikos-prod — use\
      \ publish-oikos for that.\nThis allows review of baked content before signing.\n\
      \n**Bake-time Internationalization:**\nThe same oikos-dev can be baked multiple\
      \ times with different target_locale\nvalues, producing locale-specific oikos-prod\
      \ versions:\n\n  oikos-dev/mypackage-1.0.0\n    ├── bake(locale: \"en-US\")\
      \ → oikos-prod/mypackage-1.0.0-en-US\n    ├── bake(locale: \"zh-CN\") → oikos-prod/mypackage-1.0.0-zh-CN\n\
      \    └── bake(locale: \"ar-SA\") → oikos-prod/mypackage-1.0.0-ar-SA\n\nThe locale\
      \ is passed to manteia as context, influencing how generation\nspecs are resolved.\
      \ The baked output includes the locale tag.\n"
    name: bake-oikos
    oikos: demiurge
    params:
    - description: The oikos-dev entity to bake
      name: oikos_dev_id
      required: true
      type: string
    - description: Expression ID that authorizes this bake (for manteia calls)
      name: authorized_by
      required: true
      type: string
    - description: 'BCP 47 locale code (e.g., "en-US", "zh-CN", "ar-SA").

        If provided, generation specs receive locale context for i18n.

        Omit for locale-agnostic baking (default behavior).

        '
      name: target_locale
      required: false
      type: string
    steps:
    - bind_to: dev_oikos
      id: $oikos_dev_id
      step: find
    - condition: $dev_oikos
      message: 'oikos-dev not found: $oikos_dev_id'
      step: assert
    - condition: $dev_oikos.eidos == 'oikos-dev'
      message: 'Entity is not an oikos-dev: $oikos_dev_id'
      step: assert
    - bindings:
        baked_generations: []
        content: $dev_oikos.data.content
        generation_hashes: []
        generation_specs: $dev_oikos.data.generation_specs
        manifest: $dev_oikos.data.manifest
      step: set
    - bindings:
        effective_locale: '$target_locale ? $target_locale : ''und'''
        locale_context: "$target_locale ?\n  \"TARGET LOCALE: \" + $target_locale\
          \ + \"\\n\\nGenerate all content in this locale. Use appropriate language,\
          \ cultural conventions, and formatting for this region.\"\n  : \"\"\n"
      step: set
    - as: spec
      do:
      - bindings:
          effective_system_prompt: "$locale_context ?\n  ($spec.system_prompt ? $spec.system_prompt\
            \ + \"\\n\\n\" + $locale_context : $locale_context)\n  : $spec.system_prompt\n"
        step: set
      - bind_to: generation_result
        params:
          authorized_by: $authorized_by
          auto_approve: false
          prompt: $spec.prompt
          system_prompt: $effective_system_prompt
        praxis: manteia/governed-inference
        step: invoke
      - bindings:
          baked_generations: '$baked_generations + [{ spec_id: $spec.id, generation_id:
            $generation_result.generation_id, content: $generation_result.response
            }]'
        step: set
      - bind_to: gen_hash
        input: $generation_result.response
        step: digest
      - bindings:
          generation_hashes: $generation_hashes + [$gen_hash]
        step: set
      in: $generation_specs
      step: for_each
    - bindings:
        baked_content:
          baked_specs: $baked_generations
          content: $content
          manifest: $manifest
      step: set
    - bindings:
        content_json: $baked_content | to_json
      step: set
    - bind_to: content_hash
      input: $content_json
      step: digest
    - step: return
      value:
        baked_content: $baked_content
        content_hash: $content_hash
        generation_hashes: $generation_hashes
        generations_count: $baked_generations | length
        locale: $effective_locale
        oikos_dev_id: $oikos_dev_id
        ready_for_signing: true
    tier: 3
    visible: true
- id: praxis/demiurge/bind-dependencies
  eidos: praxis
  version: 151
  data:
