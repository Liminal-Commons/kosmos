- id: praxis/manteia/realize-generation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/manteia/praxeis/manteia.yaml
    description: 'Realize an approved generation as an entity.


      VALIDATION GATE (Phase 20 - Dokimasia):

      Before creating the entity, validates:

      1. Provenance — authorized_by chain traces to genesis

      2. Schema — content matches target eidos definition

      3. Semantic — all references resolve


      Entity arises ONLY if all validation passes.

      '
    name: realize-generation
    oikos: manteia
    params:
    - description: The generation to realize
      name: generation_id
      required: true
      type: string
    - description: ID for the new entity
      name: entity_id
      required: true
      type: string
    - description: Skip dokimasia validation (default false, use with caution)
      name: skip_validation
      required: false
      type: boolean
    steps:
    - bind_to: generation
      id: $generation_id
      step: find
    - condition: $generation
      message: 'Generation not found: $generation_id'
      step: assert
    - condition: $generation.data.status == "approved" or $generation.data.status
        == "modified"
      message: Generation must be approved before realization
      step: assert
    - condition: $generation.data.target_eidos
      message: Generation has no target_eidos — cannot realize
      step: assert
    - bindings:
        should_validate: true
      step: set
    - cases:
      - then:
        - bindings:
            should_validate: false
          step: set
        when: $skip_validation
      step: switch
    - cases:
      - then:
        - bind_to: validation
          params:
            generation_id: $generation_id
          praxis: praxis/dokimasia/validate-generation
          step: call
        - cases:
          - then:
            - step: return
              value:
                errors: $validation.data.errors
                provenance_chain: $validation.data.provenance_chain
                provenance_valid: $validation.data.provenance_valid
                realized: false
                reason: validation_failed
                schema_valid: $validation.data.schema_valid
                semantic_valid: $validation.data.semantic_valid
                validation_id: $validation.id
            when: not $validation.data.passed
          step: switch
        when: $should_validate
      step: switch
    - bindings:
        use_content: $generation.data.final_content
      step: set
    - cases:
      - then: []
        when: $use_content
      default:
      - bindings:
          use_content: $generation.data.response
        step: set
      step: switch
    - bind_to: entity
      data: $use_content
      eidos: $generation.data.target_eidos
      id: $entity_id
      step: arise
    - desmos: yields-generation
      from_id: $generation_id
      step: bind
      to_id: $entity_id
    - step: return
      value:
        entity_id: $entity_id
        generation_id: $generation_id
        realized: true
        validation_id: $validation.id
    tier: 2
    visible: true
- id: praxis/manteia/reject-generation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/manteia/praxeis/manteia.yaml
    description: 'Reject a generation.


      Marks the generation as rejected with a reason.

      '
    name: reject-generation
    oikos: manteia
    params:
    - description: The generation to reject
      name: generation_id
      required: true
      type: string
    - description: Why rejecting
      name: reason
      required: false
      type: string
    - description: Who reviewed (persona ID)
      name: reviewed_by
      required: false
      type: string
    steps:
    - bind_to: generation
