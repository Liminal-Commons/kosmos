- id: praxis/aither/disconnect-signaling
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/aither/praxeis/aither.yaml
    description: 'Disconnect from signaling relay.

      '
    name: disconnect-signaling
    oikos: aither
    params:
    - description: The signaling session to disconnect
