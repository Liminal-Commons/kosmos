- id: praxis/manteia/approve-generation
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/manteia/praxeis/manteia.yaml
    description: 'Approve a generation.


      Marks the generation as approved. Optionally modify the content

      before approval (status becomes "modified" if content changed).

      '
    name: approve-generation
    oikos: manteia
    params:
    - description: The generation to approve
      name: generation_id
      required: true
      type: string
    - description: Modified content (if different from original response)
      name: final_content
      required: false
      type: string
    - description: Who reviewed (persona ID)
      name: reviewed_by
      required: false
      type: string
    steps:
    - bind_to: generation
      id: $generation_id
      step: find
    - condition: $generation
      message: 'Generation not found: $generation_id'
      step: assert
    - condition: $generation.data.status == "pending"
      message: Generation is not pending review
      step: assert
    - bindings:
        new_status: approved
      step: set
    - cases:
      - then:
        - bindings:
            new_status: modified
          step: set
        when: $final_content
      step: switch
    - data:
        final_content: $final_content
        reviewed_by: $reviewed_by
        status: $new_status
      id: $generation_id
      step: update
    - step: return
      value:
        approved: true
        generation_id: $generation_id
        status: $new_status
    tier: 2
    visible: true
- id: praxis/manteia/check-memo
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/manteia/praxeis/manteia.yaml
    description: 'Check if a prompt has been memoized.


      Returns the cached response if available, null otherwise.

      '
    name: check-memo
    oikos: manteia
    params:
    - description: The prompt to check
      name: prompt
      required: true
      type: string
    steps:
    - bind_to: prompt_hash
      input: $prompt
      step: digest
    - bind_to: cached
      eidos: inference-memo
      limit: 1
      step: gather
      where: json_extract(data, '$.prompt_hash') = '$prompt_hash'
    - cases:
      - then:
        - step: return
          value:
            cached: true
            model: $cached[0].data.model
            prompt_hash: $prompt_hash
            response: $cached[0].data.response
        when: $cached
      step: switch
    - step: return
      value:
        cached: false
        prompt_hash: $prompt_hash
    tier: 1
    visible: true
- id: praxis/manteia/clear-memo
  eidos: praxis
  version: 151
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/manteia/praxeis/manteia.yaml
    description: 'Clear a memoized response.


      Removes the memo so the next call will regenerate.

      '
    name: clear-memo
    oikos: manteia
    params:
    - description: The prompt whose memo to clear
      name: prompt
      required: true
      type: string
    steps:
    - bind_to: prompt_hash
      input: $prompt
      step: digest
    - bindings:
        memo_id: memo/$prompt_hash
      step: set
    - bind_to: memo
      id: $memo_id
      step: find
    - cases:
      - then:
        - id: $memo_id
          step: dissolve
        - step: return
          value:
            cleared: true
            prompt_hash: $prompt_hash
        when: $memo
      step: switch
    - step: return
      value:
        cleared: false
        prompt_hash: $prompt_hash
        reason: Memo not found
    tier: 2
    visible: true
- id: praxis/manteia/get-generation
  eidos: praxis
