      '
    name: example-block
    template: '### {{ title }}


      {{ description }}


      ```{{ language }}

      {{ code }}

      ```

      '
- id: artifact-def-field-table
  eidos: artifact-definition
  version: 41
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/pege.yaml
    defaults:
      fields: {}
      title: '## Fields'
    description: 'Renders an eidos''s fields as a markdown table.

      Pattern: queried


      Input: { fields: { name: { type: string, required: true }, ... } }

      Output: | Field | Type | Required | Description |

      '
    name: field-table
    slots:
    - default: '## Fields'
      name: title
      pattern: literal
    - name: table
      pattern: queried
    template: '{{ title }}


      | Field | Type | Required | Description |

      |-------|------|----------|-------------|

      {{ field_rows }}

      '
- id: artifact-def-genesis-record
  eidos: artifact-definition
  version: 43
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/spora/definitions/core.yaml
    bonds:
