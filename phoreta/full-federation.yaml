    - item_var: d
      items: $all_desmoi
      lift:
      - count
      step: for_each
      steps:
      - bind_to: result
        params:
          desmos_id: '{{ suffix($d.id) }}'
          output_dir: $out_dir
        praxis: pege/emit-desmos-reference
        step: call
      - bindings:
          count: $count + 1
        step: set
    - step: return
      value:
        count: $count
        output_dir: $out_dir
