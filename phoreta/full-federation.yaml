- id: praxis/git-sync/sync
  eidos: praxis
  version: 31
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/git-sync/praxeis/git-sync.yaml
    description: 'Full synchronization cycle: emit → stage → commit → push.

      '
    name: sync
    oikos: git-sync
    params:
    - description: git-sync-config ID
      name: config_id
      required: true
      type: string
    - description: Commit message (default auto-generated)
      name: message
      required: false
      type: string
    steps:
    - bind_to: config
      id: git-sync-config/$config_id
      step: find
    - condition: $config
      message: 'Config not found: $config_id'
      step: assert
    - bindings:
        commit_message: $message
        timestamp: '{{ now() }}'
      step: set
    - cases:
      - then: []
        when: $commit_message
      default:
      - bindings:
          commit_message: kosmos sync at $timestamp
        step: set
      step: switch
    - cases:
      - then:
        - bind_to: oikoi_result
          params:
            config_id: $config_id
          praxis: git-sync/emit-all-oikoi
          step: call
        when: $config.data.sync_oikoi
      step: switch
    - cases:
      - then:
        - bind_to: theoria_result
          params:
            config_id: $config_id
          praxis: git-sync/emit-theoria
          step: call
        when: $config.data.sync_theoria
      step: switch
    - params:
        config_id: $config_id
      praxis: git-sync/stage-changes
      step: call
    - bind_to: commit_result
      params:
        config_id: $config_id
        message: $commit_message
      praxis: git-sync/commit
      step: call
    - bind_to: push_result
      params:
        config_id: $config_id
      praxis: git-sync/push
      step: call
    - data:
        last_sync_at: $timestamp
      id: $config.id
      step: update
    - step: return
      value:
        message: $commit_message
        synced: true
        timestamp: $timestamp
    visible: true
- id: praxis/hypostasis/add-genesis-signature
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Add a signature to a genesis record.


      Each signer:

      1. Derives their key from their mnemonic

      2. Signs the genesis content hash

      3. Provides an attestation (e.g., "I, Alice, attest to this genesis")


      The signature is added to the genesis record''s signature list.

      Duplicate public keys are rejected.

      '
    name: add-genesis-signature
    oikos: hypostasis
    params:
    - description: Genesis record to sign
      name: genesis_id
      required: true
      type: string
    - description: Signer's mnemonic
      name: mnemonic
      required: true
      type: string
    - description: Circle context for key derivation
      name: circle_id
      required: true
      type: string
    - description: Signer's attestation statement
      name: attestation
      required: true
      type: string
    steps:
    - bind_to: genesis
      id: $genesis_id
      step: find
    - condition: $genesis
      message: 'Genesis record not found: $genesis_id'
      step: assert
    - condition: not $genesis.data.verified
      message: Genesis already finalized — cannot add more signatures
      step: assert
    - bind_to: signer_key
      circle_id: $circle_id
      mnemonic: $mnemonic
      operation: derive_key
      step: keyring
    - bindings:
        duplicate_found: false
      step: set
    - item_var: existing_sig
      items: $genesis.data.signatures
      lift:
      - duplicate_found
      step: for_each
      steps:
      - cases:
        - then:
          - bindings:
              duplicate_found: true
            step: set
          when: $existing_sig.public_key == $signer_key.public_key
        step: switch
    - condition: not $duplicate_found
      message: This key has already signed this genesis
      step: assert
    - bind_to: signature
      circle_id: $circle_id
      data: $genesis.data.content_hash
      mnemonic: $mnemonic
      operation: sign
      step: keyring
    - bindings:
        new_signature:
          attestation: $attestation
          public_key: $signature.public_key
          signature: $signature.signature
          signed_at: '{{ now() }}'
      step: set
    - bindings:
        updated_signatures: $genesis.data.signatures + [$new_signature]
      step: set
    - bind_to: updated_genesis
      data:
        signatures: $updated_signatures
      id: $genesis_id
      step: update
    - step: return
      value:
        genesis_id: $genesis_id
        remaining: $genesis.data.threshold - $updated_signatures.length
        signatures_collected: $updated_signatures.length
        signer_public_key: $signature.public_key
        status: signature_added
        threshold: $genesis.data.threshold
    tier: 3
    visible: true
- id: praxis/hypostasis/begin-genesis-ceremony
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Begin a new genesis signing ceremony.


      Creates a genesis-record entity with:

      - The constitutional content

      - Content hash (BLAKE3)

      - Threshold requirement (default 3)

      - Empty signature list


      This is the beginning of the constitutional signing process.

      Multiple signers must call add-genesis-signature to reach

      the threshold before finalization.

      '
    name: begin-genesis-ceremony
    oikos: hypostasis
    params:
    - description: ID for the genesis record
      name: genesis_id
      required: true
      type: string
    - description: The constitutional content to sign
      name: content
      required: true
      type: string
    - description: Number of signatures required (default 3)
      name: threshold
      required: false
      type: number
    steps:
    - bindings:
        threshold_val: 3
      step: set
    - cases:
      - then:
        - bindings:
            threshold_val: $threshold
          step: set
        when: $threshold
      step: switch
    - bind_to: content_hash
      input: $content
      step: digest
    - bind_to: genesis
      data:
        content: $content
        content_hash: $content_hash
        created_at: '{{ now() }}'
        signatures: []
        threshold: $threshold_val
        verified: false
      eidos: genesis-record
      id: $genesis_id
      step: arise
    - step: return
      value:
        content_hash: $content_hash
        genesis_id: $genesis_id
        signatures_collected: 0
        status: awaiting_signatures
        threshold: $threshold_val
    tier: 3
    visible: true
- id: praxis/hypostasis/compute-hash
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: "Compute BLAKE3 hash of entity content.\n\nThe hash covers:\n- eidos\n\
      - data (serialized JSON)\n- composed_from reference (if present)\n- timestamp\n\
      \nReturns content-addressed ID format:\n  {eidos}/{slug}@blake3:{hash}\n\nNote:\
      \ Requires BLAKE3 stoicheion in Rust layer.\n"
    name: compute-hash
    oikos: hypostasis
    params:
    - description: Entity to compute hash for
      name: entity_id
      required: true
      type: string
    steps:
    - bind_to: entity
      id: $entity_id
      step: find
    - condition: $entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bind_to: hash
      input:
        composed_from: $entity.data._genesis.composed_from
        data: $entity.data
        eidos: $entity.eidos
      step: digest
    - bindings:
        content_addressed_id: $entity.eidos/$entity.id@blake3:$hash
      step: set
    - step: return
      value:
        content_addressed_id: $content_addressed_id
        entity_id: $entity_id
        hash: $hash
    tier: 1
    visible: true
- id: praxis/hypostasis/create-snapshot
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Create a full state snapshot of a circle.


      This is a convenience wrapper around export-phoreta that:

      1. Gathers all entities visible in the circle

      2. Includes all bonds

      3. Packages as a timestamped snapshot

      '
    name: create-snapshot
    oikos: hypostasis
    params:
    - description: Circle to snapshot (defaults to current dwelling circle)
      name: circle_id
      required: false
      type: string
    - description: Include embedding vectors (default false, they're large)
      name: include_embeddings
      required: false
      type: boolean
    steps:
    - bind_to: all_entities
      eidos: '*'
      limit: 10000
      step: gather
    - bind_to: entity_ids
      items: $all_entities
      step: map
      to: $item.id
    - bind_to: phoreta
      params:
        entity_ids: $entity_ids
        include_bonds: true
        include_dependencies: true
      praxis: hypostasis/export-phoreta
      step: call
    - bindings:
        snapshot:
          bond_count: $phoreta.bond_count
          circle_id: $circle_id
          created_at: '{{ now() }}'
          entity_count: $phoreta.entity_count
          phoreta: $phoreta
          type: full-snapshot
      step: set
    - step: return
      value: $snapshot
    tier: 3
    visible: true
- id: praxis/hypostasis/derive-circle-key
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Derive a circle-scoped Ed25519 keypair.


      Uses HKDF-SHA256 to derive deterministic keys from the

      mnemonic seed + circle_id. Each circle gets a unique

      keypair, so compromise of one circle''s key doesn''t

      affect other circles.


      Returns the public key (safe to share) but NOT the

      private key material.

      '
    name: derive-circle-key
    oikos: hypostasis
    params:
    - description: BIP-39 mnemonic phrase (24 words)
      name: mnemonic
      required: true
      type: string
    - description: Circle to derive key for
      name: circle_id
      required: true
      type: string
    steps:
    - bind_to: result
      circle_id: $circle_id
      mnemonic: $mnemonic
      operation: derive_key
      step: keyring
    - step: return
      value:
        algorithm: $result.algorithm
        circle_id: $result.circle_id
        derivation: $result.derivation
        public_key: $result.public_key
    tier: 2
    visible: true
- id: praxis/hypostasis/export-persona
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Export a persona for federation to another device.


      Creates a signed phoreta bundle containing:

      - Persona entity

      - All circles the persona is member of

      - All theoria, principles, patterns

      - Session history (optional)


      The bundle is signed with the persona''s key so the

      receiving device can verify authenticity.


      IMPORTANT: The mnemonic is NOT included in the export.

      It must be entered on the receiving device separately.

      '
    name: export-persona
    oikos: hypostasis
    params:
    - description: Persona to export
      name: persona_id
      required: true
      type: string
    - description: Mnemonic to sign the export
      name: mnemonic
      required: true
      type: string
    - description: Circle context for signing key
      name: circle_id
      required: true
      type: string
    - description: Include session/conversation history (default false)
      name: include_sessions
      required: false
      type: boolean
    steps:
    - bind_to: persona
      id: $persona_id
      step: find
    - condition: $persona
      message: 'Persona not found: $persona_id'
      step: assert
    - bind_to: circles
      depth: 1
      desmoi:
      - member-of
      root_id: $persona_id
      step: traverse
    - bind_to: all_theoria
      eidos: theoria
      limit: 1000
      step: gather
    - bind_to: persona_theoria
      condition: 'true'
      items: $all_theoria
      step: filter
    - bind_to: principles
      eidos: principle
      limit: 500
      step: gather
    - bind_to: patterns
      eidos: pattern
      limit: 500
      step: gather
    - bindings:
        entity_ids:
        - $persona_id
      step: set
    - item_var: circle
      items: $circles
      lift:
      - entity_ids
      step: for_each
      steps:
      - bindings:
          entity_ids: $entity_ids + [$circle.id]
        step: set
    - item_var: t
      items: $persona_theoria
      lift:
      - entity_ids
      step: for_each
      steps:
      - bindings:
          entity_ids: $entity_ids + [$t.id]
        step: set
    - bind_to: phoreta
      params:
        entity_ids: $entity_ids
        include_bonds: true
        include_dependencies: true
      praxis: hypostasis/export-phoreta
      step: call
    - bind_to: phoreta_hash
      input: $phoreta
      step: digest
    - bind_to: signature_result
      circle_id: $circle_id
      data: $phoreta_hash
      mnemonic: $mnemonic
      operation: sign
      step: keyring
    - step: return
      value:
        bond_count: $phoreta.bond_count
        content_hash: $phoreta_hash
        entity_count: $phoreta.entity_count
        exported_at: '{{ now() }}'
        persona_id: $persona_id
        phoreta: $phoreta
        public_key: $signature_result.public_key
        signature: $signature_result.signature
        type: persona-export
    tier: 3
    visible: true
- id: praxis/hypostasis/export-phoreta
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Create a signed phoreta bundle for export.


      Phoreta are the universal transport format:

      - Backup (export to file)

      - Recovery (import from file)

      - Federation (sync between circles)

      - Archive (cold storage)


      The bundle includes:

      - Selected entities

      - Associated bonds

      - Composition chains

      - Signature by creating persona

      '
    name: export-phoreta
    oikos: hypostasis
    params:
    - description: Entities to include in the bundle
      name: entity_ids
      required: true
      type: array
    - description: Include composed-from chains (default true)
      name: include_dependencies
      required: false
      type: boolean
    - description: Include bonds involving these entities (default true)
      name: include_bonds
      required: false
      type: boolean
    steps:
    - bindings:
        bundle:
          bonds: []
          chain_entities: []
          entities: []
        include_bnds: true
        include_deps: true
      step: set
    - cases:
      - then:
        - bindings:
            include_deps: false
          step: set
        when: $include_dependencies == false
      step: switch
    - cases:
      - then:
        - bindings:
            include_bnds: false
          step: set
        when: $include_bonds == false
      step: switch
    - item_var: eid
      items: $entity_ids
      lift:
      - bundle
      step: for_each
      steps:
      - bind_to: entity
        id: $eid
        step: find
      - cases:
        - then:
          - bindings:
              bundle:
                bonds: $bundle.bonds
                chain_entities: $bundle.chain_entities
                entities: $bundle.entities + [$entity]
            step: set
          when: $entity
        step: switch
    - cases:
      - then:
        - item_var: ent
          items: $bundle.entities
          lift:
          - bundle
          step: for_each
          steps:
          - bind_to: outbound_bonds
            from_id: $ent.id
            step: trace
          - bindings:
              bundle:
                bonds: $bundle.bonds + $outbound_bonds
                chain_entities: $bundle.chain_entities
                entities: $bundle.entities
            step: set
        when: $include_bnds
      step: switch
    - bindings:
        phoreta:
          bond_count: $bundle.bonds.length
          bonds: $bundle.bonds
          entities: $bundle.entities
          entity_count: $bundle.entities.length
          exported_at: '{{ now() }}'
          note: Signature pending Rust crypto implementation
      step: set
    - step: return
      value: $phoreta
    tier: 3
    visible: true
- id: praxis/hypostasis/finalize-genesis
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Finalize a genesis record once threshold is reached.


      Verifies:

      1. At least threshold signatures collected

      2. All signatures are valid

      3. No duplicate signers


      If all checks pass, marks genesis as verified.

      This is the moment of constitutional establishment.

      '
    name: finalize-genesis
    oikos: hypostasis
    params:
    - description: Genesis record to finalize
      name: genesis_id
      required: true
      type: string
    steps:
    - bind_to: genesis
      id: $genesis_id
      step: find
    - condition: $genesis
      message: 'Genesis record not found: $genesis_id'
      step: assert
    - condition: not $genesis.data.verified
      message: Genesis already finalized
      step: assert
    - bindings:
        sig_count: $genesis.data.signatures.length
      step: set
    - condition: $sig_count >= $genesis.data.threshold
      message: 'Insufficient signatures: $sig_count of $genesis.data.threshold required'
      step: assert
    - bindings:
        all_valid: true
        verified_keys: []
      step: set
    - item_var: sig
      items: $genesis.data.signatures
      lift:
      - all_valid
      - verified_keys
      step: for_each
      steps:
      - bind_to: verify_result
        data: $genesis.data.content_hash
        operation: verify
        public_key: $sig.public_key
        signature: $sig.signature
        step: keyring
      - cases:
        - then:
          - bindings:
              all_valid: false
            step: set
          when: not $verify_result.valid
        step: switch
      - bindings:
          verified_keys: $verified_keys + [$sig.public_key]
        step: set
    - condition: $all_valid
      message: One or more signatures failed verification
      step: assert
    - bind_to: finalized_genesis
      data:
        verified: true
        verified_at: '{{ now() }}'
      id: $genesis_id
      step: update
    - step: return
      value:
        content_hash: $genesis.data.content_hash
        genesis_id: $genesis_id
        signatures_valid: $sig_count
        signers: $verified_keys
        status: finalized
        threshold: $genesis.data.threshold
        verified: true
        verified_at: '{{ now() }}'
    tier: 3
    visible: true
- id: praxis/hypostasis/generate-mnemonic
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Generate a new BIP-39 mnemonic phrase.


      Returns a 24-word mnemonic that can be used to derive

      circle-scoped cryptographic keys. This mnemonic should

      be stored securely — it is the root of all derived keys.


      IMPORTANT: The mnemonic is the master secret. If lost,

      all derived keys are unrecoverable. If compromised,

      all derived keys are compromised.

      '
    name: generate-mnemonic
    oikos: hypostasis
    params: []
    steps:
    - bind_to: result
      operation: generate_mnemonic
      step: keyring
    - step: return
      value:
        mnemonic: $result.mnemonic
        warning: Store this mnemonic securely. It cannot be recovered if lost.
        word_count: $result.word_count
    tier: 2
    visible: true
- id: praxis/hypostasis/get-genesis-status
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Get the current status of a genesis signing ceremony.


      Returns:

      - How many signatures collected

      - Threshold requirement

      - Whether finalized

      - List of signer public keys

      '
    name: get-genesis-status
    oikos: hypostasis
    params:
    - description: Genesis record to check
      name: genesis_id
      required: true
      type: string
    steps:
    - bind_to: genesis
      id: $genesis_id
      step: find
    - cases:
      - then:
        - step: return
          value:
            error: 'Genesis record not found: $genesis_id'
            found: false
        when: not $genesis
      step: switch
    - bind_to: signer_keys
      items: $genesis.data.signatures
      step: map
      to: $item.public_key
    - step: return
      value:
        content_hash: $genesis.data.content_hash
        found: true
        genesis_id: $genesis_id
        remaining: $genesis.data.threshold - $genesis.data.signatures.length
        signatures_collected: $genesis.data.signatures.length
        signers: $signer_keys
        status: '$genesis.data.verified ? ''finalized'' : ''awaiting_signatures'''
        threshold: $genesis.data.threshold
        verified: $genesis.data.verified
    tier: 1
    visible: true
- id: praxis/hypostasis/import-persona
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Import a persona from another device.


      Verifies the export signature using the provided mnemonic

      (which should derive the same public key), then imports

      all entities and bonds.


      Steps:

      1. Derive key from mnemonic + circle_id

      2. Verify public key matches export

      3. Verify signature on phoreta

      4. Import entities using merge strategy

      '
    name: import-persona
    oikos: hypostasis
    params:
    - description: The persona export bundle
      name: export_bundle
      required: true
      type: object
    - description: Mnemonic (should match original)
      name: mnemonic
      required: true
      type: string
    - description: Circle context for key verification
      name: circle_id
      required: true
      type: string
    - description: How to handle conflicts (default newer_wins)
      name: merge_strategy
      required: false
      type: string
    steps:
    - bind_to: derived_key
      circle_id: $circle_id
      mnemonic: $mnemonic
      operation: derive_key
      step: keyring
    - cases:
      - then:
        - step: return
          value:
            derived_key: $derived_key.public_key
            error: Public key mismatch - mnemonic does not match export origin
            expected_key: $export_bundle.public_key
            success: false
        when: $derived_key.public_key != $export_bundle.public_key
      step: switch
    - bind_to: verify_result
      data: $export_bundle.content_hash
      operation: verify
      public_key: $export_bundle.public_key
      signature: $export_bundle.signature
      step: keyring
    - cases:
      - then:
        - step: return
          value:
            error: Signature verification failed - export may be tampered
            success: false
        when: not $verify_result.valid
      step: switch
    - bind_to: import_result
      params:
        merge_strategy: $merge_strategy
        phoreta: $export_bundle.phoreta
      praxis: hypostasis/import-phoreta
      step: call
    - step: return
      value:
        import_result: $import_result
        persona_id: $export_bundle.persona_id
        success: true
        verified_with_key: $derived_key.public_key
    tier: 3
    visible: true
- id: praxis/hypostasis/import-phoreta
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Verify and import a phoreta bundle.


      Steps:

      1. Verify phoreta signature

      2. Verify composition chains (all trace to genesis)

      3. Detect conflicts with local entities

      4. Apply merge strategy

      5. Import entities and bonds

      6. Return import report

      '
    name: import-phoreta
    oikos: hypostasis
    params:
    - description: The phoreta bundle to import
      name: phoreta
      required: true
      type: object
    - description: Verify origin signatures (default true)
      name: verify_signatures
      required: false
      type: boolean
    - description: newer_wins, local_wins, or fail_on_conflict (default newer_wins)
      name: merge_strategy
      required: false
      type: string
    steps:
    - bindings:
        conflicts: []
        imported: []
        skipped: []
        strategy: newer_wins
        verify_sigs: true
      step: set
    - cases:
      - then:
        - bindings:
            strategy: $merge_strategy
          step: set
        when: $merge_strategy
      step: switch
    - cases:
      - then:
        - bindings:
            verify_sigs: false
          step: set
        when: $verify_signatures == false
      step: switch
    - item_var: incoming
      items: $phoreta.entities
      lift:
      - imported
      - skipped
      - conflicts
      step: for_each
      steps:
      - bind_to: local_entity
        id: $incoming.id
        step: find
      - cases:
        - then:
          - bind_to: new_entity
            data: $incoming.data
            eidos: $incoming.eidos
            id: $incoming.id
            step: arise
          - bindings:
              imported: $imported + [$incoming.id]
            step: set
          when: not $local_entity
        - then:
          - bindings:
              skipped: $skipped + [$incoming.id]
            step: set
          when: $local_entity and $strategy == 'local_wins'
        - then:
          - bindings:
              conflicts: '$conflicts + [{id: $incoming.id, local_version: $local_entity.version,
                incoming_version: $incoming.version}]'
            step: set
          when: $local_entity and $strategy == 'fail_on_conflict'
        - then:
          - cases:
            - then:
              - bind_to: updated
                data: $incoming.data
                id: $incoming.id
                step: update
              - bindings:
                  imported: $imported + [$incoming.id]
                step: set
              when: $incoming.version > $local_entity.version
            default:
            - bindings:
                skipped: $skipped + [$incoming.id]
              step: set
            step: switch
          when: $local_entity and $strategy == 'newer_wins'
        step: switch
    - step: return
      value:
        conflict_count: $conflicts.length
        conflicts: $conflicts
        imported: $imported
        imported_count: $imported.length
        skipped: $skipped
        skipped_count: $skipped.length
    tier: 3
    visible: true
- id: praxis/hypostasis/restore-snapshot
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Restore state from a snapshot.


      This is a convenience wrapper around import-phoreta.

      Use with caution - this will overwrite local state.

      '
    name: restore-snapshot
    oikos: hypostasis
    params:
    - description: The snapshot to restore
      name: snapshot
      required: true
      type: object
    - description: How to handle conflicts (default newer_wins)
      name: merge_strategy
      required: false
      type: string
    steps:
    - condition: $snapshot.phoreta
      message: 'Invalid snapshot: missing phoreta data'
      step: assert
    - bind_to: result
      params:
        merge_strategy: $merge_strategy
        phoreta: $snapshot.phoreta
      praxis: hypostasis/import-phoreta
      step: call
    - step: return
      value:
        import_result: $result
        snapshot_created_at: $snapshot.created_at
        snapshot_type: $snapshot.type
    tier: 3
    visible: true
- id: praxis/hypostasis/sign-content
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Sign content with circle-scoped key.


      The signature can be verified by anyone with the public key.

      This establishes cryptographic attribution — proof that the

      holder of the mnemonic created or approved this content.


      Used for:

      - Genesis signing

      - Phoreta signing (backup/federation)

      - Entity attestation

      '
    name: sign-content
    oikos: hypostasis
    params:
    - description: BIP-39 mnemonic phrase
      name: mnemonic
      required: true
      type: string
    - description: Circle whose key to use for signing
      name: circle_id
      required: true
      type: string
    - description: Content to sign
      name: content
      required: true
      type: string
    steps:
    - bind_to: result
      circle_id: $circle_id
      data: $content
      mnemonic: $mnemonic
      operation: sign
      step: keyring
    - step: return
      value:
        algorithm: $result.algorithm
        content_hash: $result.data_hash
        public_key: $result.public_key
        signature: $result.signature
    tier: 2
    visible: true
- id: praxis/hypostasis/sync-delta
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Export changes since a given version/timestamp.


      Used for incremental sync between devices.

      Returns only entities modified after the given point.

      '
    name: sync-delta
    oikos: hypostasis
    params:
    - description: Export entities with version > this
      name: since_version
      required: false
      type: number
    - description: Export entities updated after this timestamp
      name: since_timestamp
      required: false
      type: string
    steps:
    - bind_to: all_entities
      eidos: '*'
      limit: 10000
      step: gather
    - cases:
      - then:
        - bind_to: filtered_entities
          condition: $item.version > $since_version
          items: $all_entities
          step: filter
        when: $since_version
      default:
      - bindings:
          filtered_entities: $all_entities
        step: set
      step: switch
    - bind_to: entity_ids
      items: $filtered_entities
      step: map
      to: $item.id
    - bind_to: delta
      params:
        entity_ids: $entity_ids
        include_bonds: true
        include_dependencies: false
      praxis: hypostasis/export-phoreta
      step: call
    - step: return
      value:
        entity_count: $delta.entity_count
        phoreta: $delta
        since_version: $since_version
        type: delta
    tier: 2
    visible: true
- id: praxis/hypostasis/sync-devices
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Sync state between two devices with same persona.


      This is bidirectional sync using version vectors:

      1. Export delta from local since last sync

      2. Import delta from remote

      3. Resolve conflicts using strategy

      4. Update sync version markers


      Requires both devices to have the same mnemonic.

      '
    name: sync-devices
    oikos: hypostasis
    params:
    - description: Shared mnemonic for signing/verification
      name: mnemonic
      required: true
      type: string
    - description: Circle context
      name: circle_id
      required: true
      type: string
    - description: Local sync version (last sync point)
      name: local_version
      required: true
      type: number
    - description: Delta from remote device (if receiving)
      name: remote_delta
      required: false
      type: object
    steps:
    - bind_to: local_delta
      params:
        since_version: $local_version
      praxis: hypostasis/sync-delta
      step: call
    - bind_to: delta_hash
      input: $local_delta
      step: digest
    - bind_to: signature
      circle_id: $circle_id
      data: $delta_hash
      mnemonic: $mnemonic
      operation: sign
      step: keyring
    - cases:
      - then:
        - bind_to: remote_verify
          data: $remote_delta.content_hash
          operation: verify
          public_key: $remote_delta.public_key
          signature: $remote_delta.signature
          step: keyring
        - cases:
          - then:
            - bind_to: import_result
              params:
                merge_strategy: newer_wins
                phoreta: $remote_delta.phoreta
              praxis: hypostasis/import-phoreta
              step: call
            when: $remote_verify.valid
          step: switch
        when: $remote_delta
      step: switch
    - step: return
      value:
        import_result: $import_result
        local_delta:
          content_hash: $delta_hash
          entity_count: $local_delta.entity_count
          phoreta: $local_delta.phoreta
          public_key: $signature.public_key
          signature: $signature.signature
    tier: 3
    visible: true
- id: praxis/hypostasis/verify-chain
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: "Verify composition chain to genesis.\n\nEvery entity should trace\
      \ back to signed genesis via composed-from bonds:\n  entity → composed-from\
      \ → definition → ... → genesis\n\nReturns:\n  valid: boolean\n  chain: array\
      \ of entity IDs\n  terminus: where chain ends (should be expression/genesis-root)\n\
      \  error: if invalid, what went wrong\n"
    name: verify-chain
    oikos: hypostasis
    params:
    - description: Entity to verify chain for
      name: entity_id
      required: true
      type: string
    - description: Maximum chain depth (default 100)
      name: max_depth
      required: false
      type: number
    steps:
    - bind_to: entity
      id: $entity_id
      step: find
    - condition: $entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bind_to: provenance_result
      params:
        entity_id: $entity_id
        max_depth: $max_depth
      praxis: dokimasia/validate-provenance
      step: call
    - step: return
      value:
        chain: $provenance_result.chain
        error: $provenance_result.error
        terminus: $provenance_result.terminus
        valid: $provenance_result.valid
    tier: 2
    visible: true
- id: praxis/hypostasis/verify-genesis
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: "Verify genesis record signatures.\n\nChecks that:\n- Content hash\
      \ matches signatures\n- At least threshold (default 3) signatures are valid\n\
      - All signers are known/trusted\n\nReturns:\n  valid: boolean\n  signatures_valid:\
      \ number\n  signatures_required: number\n  signers: array of public keys that\
      \ signed\n  error: if invalid, what went wrong\n"
    name: verify-genesis
    oikos: hypostasis
    params:
    - description: Genesis record to verify (defaults to expression/genesis-root)
      name: genesis_id
      required: false
      type: string
    steps:
    - bindings:
        target_id: $genesis_id
      step: set
    - cases:
      - then: []
        when: $target_id
      default:
      - bindings:
          target_id: expression/genesis-root
        step: set
      step: switch
    - bind_to: genesis
      id: $target_id
      step: find
    - condition: $genesis
      message: 'Genesis not found: $target_id'
      step: assert
    - cases:
      - then:
        - bindings:
            result:
              note: Single-signature genesis verified. Threshold signing pending Rust
                implementation.
              signatures_required: 1
              signatures_valid: 1
              signers:
              - $genesis.data.public_key
              valid: true
          step: set
        when: $genesis.data.signature
      default:
      - bindings:
          result:
            error: No signature found on genesis
            signatures_required: 3
            signatures_valid: 0
            signers: []
            valid: false
        step: set
      step: switch
    - step: return
      value: $result
    tier: 2
    visible: true
- id: praxis/hypostasis/verify-signature
  eidos: praxis
  version: 111
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/hypostasis/praxeis/hypostasis.yaml
    description: 'Verify a signature against content and public key.


      This is a pure verification — it doesn''t require the

      mnemonic, only the public key. Anyone can verify.


      Returns whether the signature is valid.

      '
    name: verify-signature
    oikos: hypostasis
    params:
    - description: Content that was signed
      name: content
      required: true
      type: string
    - description: Base64-encoded signature
      name: signature
      required: true
      type: string
    - description: Base64-encoded public key
      name: public_key
      required: true
      type: string
    steps:
    - bind_to: result
      data: $content
      operation: verify
      public_key: $public_key
      signature: $signature
      step: keyring
    - step: return
      value:
        content_hash: $result.data_hash
        valid: $result.valid
    tier: 1
    visible: true
- id: praxis/i18n/create-locale
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/i18n/praxeis/i18n.yaml
    description: 'Create a new locale entity.


      Use this to add support for additional locales beyond the defaults.

      '
    name: create-locale
    oikos: i18n
    params:
    - description: BCP 47 locale code (e.g., 'pt-PT', 'nl-NL')
      name: code
      required: true
      type: string
    - description: Human-readable locale name
      name: name
      required: true
      type: string
    - description: ISO 639-1 language code (e.g., 'pt', 'nl')
      name: language
      required: true
      type: string
    - description: ISO 3166-1 region code (e.g., 'PT', 'NL')
      name: region
      required: false
      type: string
    - description: ISO 15924 script code (e.g., 'Latn')
      name: script
      required: false
      type: string
    - description: Text direction (ltr or rtl, default ltr)
      name: direction
      required: false
      type: string
    - description: Fallback locale code
      name: fallback
      required: false
      type: string
    steps:
    - bindings:
        effective_direction: $direction
        locale_id: locale/$code
      step: set
    - cases:
      - then:
        - bindings:
            effective_direction: ltr
          step: set
        when: '!$effective_direction'
      step: switch
    - bind_to: existing
      id: $locale_id
      step: find
    - condition: '!$existing'
      message: 'Locale already exists: $code'
      step: assert
    - bind_to: locale
      data:
        code: $code
        direction: $effective_direction
        fallback: $fallback
        language: $language
        name: $name
        region: $region
        script: $script
      eidos: locale
      id: $locale_id
      step: arise
    - step: return
      value:
        code: $code
        locale_id: $locale_id
        name: $name
    visible: true
- id: praxis/i18n/create-localized-text
  eidos: praxis
  version: 68
  data:
    _genesis:
      authorized_by: expression/genesis-root
      source: genesis/i18n/praxeis/i18n.yaml
    description: 'Create a localized text variant for an entity field.


      Creates a localized-text entity bound to the source entity via ''localizes''

      and to the target locale via ''for-locale''.

      '
    name: create-localized-text
    oikos: i18n
    params:
    - description: The entity to localize
      name: entity_id
      required: true
      type: string
    - description: Which field to localize (e.g., 'description', 'name')
      name: field
      required: true
      type: string
    - description: BCP 47 locale code (e.g., 'zh-CN', 'es-ES')
      name: locale_code
      required: true
      type: string
    - description: The localized text content
      name: content
      required: true
      type: string
    - description: Whether this was machine-translated
      name: machine_translated
      required: false
      type: boolean
    - description: Optional note from human translator
      name: translator_note
      required: false
      type: string
    steps:
    - bind_to: source_entity
      id: $entity_id
      step: find
    - condition: $source_entity
      message: 'Entity not found: $entity_id'
      step: assert
    - bindings:
        locale_id: locale/$locale_code
      step: set
    - bind_to: locale_entity
      id: $locale_id
      step: find
    - condition: $locale_entity
      message: 'Locale not found: $locale_code. Use a supported BCP 47 locale code.'
      step: assert
    - bindings:
        created_at: now()
        localized_text_id: localized-text/$entity_id/$field/$locale_code
      step: set
    - bind_to: localized_text
      data:
        content: $content
        created_at: $created_at
        field: $field
        machine_translated: $machine_translated
        translator_note: $translator_note
      eidos: localized-text
      id: $localized_text_id
      step: arise
    - desmos: localizes
      from_id: $localized_text_id
      step: bind
      to_id: $entity_id
    - desmos: for-locale
      from_id: $localized_text_id
      step: bind
      to_id: $locale_id
    - step: return
      value:
        entity_id: $entity_id
        field: $field
        locale_code: $locale_code
        localized_text_id: $localized_text_id
    visible: true
- id: praxis/i18n/delete-localized-text
