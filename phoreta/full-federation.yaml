    steps:
    - bind_to: generations
      eidos: generation
      limit: $limit
      step: gather
    - cases:
      - then:
        - bind_to: generations
          condition: $item.data.status == '$status'
          items: $generations
          step: filter
        when: $status
      step: switch
    - cases:
      - then:
        - bind_to: generations
          condition: $item.data.authorized_by == '$authorized_by'
          items: $generations
          step: filter
        when: $authorized_by
      step: switch
    - step: return
      value:
        count: $generations | length
        generations: $generations
    tier: 1
    visible: true
- id: praxis/manteia/list-pending-generations
  eidos: praxis
