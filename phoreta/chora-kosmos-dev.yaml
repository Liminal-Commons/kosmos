# Phoreta Bundle: circle/kosmos-dev
# Exported from chora for federation to kosmos repository
# Created: 2026-01-22

metadata:
  origin_chora: "chora/local"
  exported_at: "2026-01-22"
  description: "Development circle with git-sync attainment for kosmos-layer work"

entities:
  - id: "circle/kosmos-dev"
    eidos: "circle"
    version: 2
    data:
      name: "Kosmos Development"
      kind: "intimate"
      description: "Development circle for kosmos-layer work — YAML definitions, praxeis, oikoi. Grants git-sync attainment."

  - id: "attainment/git-sync"
    eidos: "attainment"
    version: 2
    data:
      name: "git-sync"
      scope: "circle"
      description: "Ability to synchronize kosmos state to git repositories. Enables emit-oikos, emit-theoria, stage-changes, commit, push, and pull operations."
      constraints: null

  - id: "git-sync-config/chora-to-kosmos"
    eidos: "git-sync-config"
    version: 3
    data:
      local_path: "/Users/victorpiper/code/kosmos"
      remote_url: "git@github.com:liminalcommons/kosmos.git"
      branch: "main"
      sync_oikoi: true
      sync_theoria: true
      sync_docs: true

bonds:
  - desmos: "grants-attainment"
    from_id: "circle/kosmos-dev"
    to_id: "attainment/git-sync"

provenance:
  traces_to: "expression/genesis-root"
  export_method: "manual"
  note: "Exported manually due to for_each interpreter issue in hypostasis/export-phoreta"
