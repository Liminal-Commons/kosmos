data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/soma/praxeis/soma.yaml
  description: |
    Close a channel.
  name: close-channel
  oikos: soma
  params:
  - description: The channel to close
    name: channel_id
    required: true
    type: string
  steps:
  - bind_to: channel
    id: $channel_id
    step: find
  - condition: $channel
    message: 'Channel not found: $channel_id'
    step: assert
  - data:
      status: closed
    id: $channel_id
    step: update
  - step: return
    value:
      channel_id: $channel_id
      closed: true
  visible: true
eidos: praxis
id: praxis/soma/close-channel
version: 151
