data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    List streams, optionally filtered by kind, direction, or status.
  name: list-streams
  oikos: thyra
  params:
  - description: Filter by stream kind (voice, video, text, document)
    name: kind
    required: false
    type: string
  - description: Filter by direction (inward, outward)
    name: direction
    required: false
    type: string
  - description: Filter by status
    name: status
    required: false
    type: string
  - description: 'Maximum results (default: 50)'
    name: limit
    required: false
    type: number
  steps:
  - bindings:
      max_results: $limit
    step: set
  - cases:
    - then: []
      when: $max_results
    default:
    - bindings:
        max_results: 50
      step: set
    step: switch
  - bind_to: streams
    eidos: stream
    step: gather
  - cases:
    - then:
      - as: s
        bind_to: streams
        in: $streams
        step: filter
        where: $s.data.kind == '$kind'
      when: $kind
    step: switch
  - cases:
    - then:
      - as: s
        bind_to: streams
        in: $streams
        step: filter
        where: $s.data.direction == '$direction'
      when: $direction
    step: switch
  - cases:
    - then:
      - as: s
        bind_to: streams
        in: $streams
        step: filter
        where: $s.data.status == '$status'
      when: $status
    step: switch
  - bind_to: streams
    count: $max_results
    items: $streams
    step: limit
  - step: return
    value:
      count: $streams | length
      streams: $streams
  tier: 1
  visible: true
eidos: praxis
id: praxis/thyra/list-streams
version: 142
