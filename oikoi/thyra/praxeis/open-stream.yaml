data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Open an inward or outward stream.

    Creates a stream entity with intent=active and reconciles
    to manifest it in the substrate. Returns immediately with
    stream entity. Use sense-stream to check actual state.
  name: open-stream
  oikos: thyra
  params:
  - description: 'Stream kind: voice, video, text, document'
    name: kind
    required: true
    type: string
  - description: 'Flow direction: inward (perception), outward (emission)'
    name: direction
    required: true
    type: string
  - description: Source identifier (device ID, file path)
    name: source
    required: false
    type: string
  - description: Sink identifier for outward streams
    name: sink
    required: false
    type: string
  - description: Stream-specific configuration
    name: config
    required: false
    type: object
  steps:
  - bindings:
      created_at: now()
      stream_id: stream/{{ kind }}-{{ direction }}-{{ now() }}
    step: set
  - bind_to: stream
    data:
      config: $config
      created_at: $created_at
      direction: $direction
      intent: active
      kind: $kind
      sink: $sink
      source: $source
      status: pending
    eidos: stream
    id: $stream_id
    step: arise
  - cases:
    - then:
      - desmos: belongs-to
        from_id: $stream_id
        step: bind
        to_id: $_circle.id
      when: $_circle
    step: switch
  - bind_to: reconcile_result
    params:
      stream_id: $stream_id
    praxis: thyra/reconcile-stream
    step: call
  - step: return
    value:
      action: $reconcile_result.action
      direction: $direction
      kind: $kind
      stream_id: $stream_id
  tier: 3
  visible: true
eidos: praxis
id: praxis/thyra/open-stream
version: 136
