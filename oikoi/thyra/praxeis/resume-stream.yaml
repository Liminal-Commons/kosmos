data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Resume a paused stream — set intent back to active and reconcile.
  name: resume-stream
  oikos: thyra
  params:
  - description: The stream to resume
    name: stream_id
    required: true
    type: string
  steps:
  - bind_to: stream
    id: $stream_id
    step: find
  - condition: $stream
    message: 'Stream not found: $stream_id'
    step: assert
  - data:
      intent: active
    id: $stream_id
    step: update
  - bind_to: reconcile_result
    params:
      stream_id: $stream_id
    praxis: thyra/reconcile-stream
    step: call
  - step: return
    value:
      action: $reconcile_result.action
      resumed: true
      stream_id: $stream_id
  tier: 3
  visible: true
eidos: praxis
id: praxis/thyra/resume-stream
version: 136
