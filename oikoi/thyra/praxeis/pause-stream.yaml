data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Pause a stream — set intent to paused.

    Note: Full pause support requires media actuality mode.
    For now, this just marks the intent.
  name: pause-stream
  oikos: thyra
  params:
  - description: The stream to pause
    name: stream_id
    required: true
    type: string
  steps:
  - bind_to: stream
    id: $stream_id
    step: find
  - condition: $stream
    message: 'Stream not found: $stream_id'
    step: assert
  - data:
      intent: paused
      status: paused
    id: $stream_id
    step: update
  - step: return
    value:
      paused: true
      stream_id: $stream_id
  tier: 2
  visible: true
eidos: praxis
id: praxis/thyra/pause-stream
version: 136
