data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Get a conversation thread from an expression.

    Follows in-reply-to bonds to build the thread.
  name: get-thread
  oikos: thyra
  params:
  - description: The expression to get thread for
    name: expression_id
    required: true
    type: string
  - description: 'Direction: ancestors (default), descendants, or both'
    name: direction
    required: false
    type: string
  steps:
  - bind_to: root_expression
    id: $expression_id
    step: find
  - condition: $root_expression
    message: 'Expression not found: $expression_id'
    step: assert
  - bindings:
      thread_direction: $direction
    step: set
  - cases:
    - then: []
      when: $thread_direction
    default:
    - bindings:
        thread_direction: ancestors
      step: set
    step: switch
  - bindings:
      ancestors: []
      descendants: []
    step: set
  - cases:
    - then:
      - bind_to: ancestors
        desmos: in-reply-to
        from_id: $expression_id
        recursive: true
        resolve: to
        step: trace
      when: $thread_direction == 'ancestors' || $thread_direction == 'both'
    step: switch
  - cases:
    - then:
      - bind_to: descendants
        desmos: in-reply-to
        recursive: true
        resolve: from
        step: trace
        to_id: $expression_id
      when: $thread_direction == 'descendants' || $thread_direction == 'both'
    step: switch
  - step: return
    value:
      ancestors: $ancestors
      descendants: $descendants
      direction: $thread_direction
      expression: $root_expression
      expression_id: $expression_id
  visible: true
eidos: praxis
id: praxis/thyra/get-thread
version: 136
