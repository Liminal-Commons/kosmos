data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Sense the actual state of a stream.

    Queries the substrate to determine what's actually happening
    with the manifested stream. Does NOT update the entity.
  name: sense-stream
  oikos: thyra
  params:
  - description: The stream to sense
    name: stream_id
    required: true
    type: string
  steps:
  - bind_to: stream
    id: $stream_id
    step: find
  - condition: $stream
    message: 'Stream not found: $stream_id'
    step: assert
  - bind_to: actual
    entity_id: $stream_id
    step: sense_actuality
  - step: return
    value:
      actual_running: $actual.running
      direction: $stream.data.direction
      intent: $stream.data.intent
      kind: $stream.data.kind
      manifest_handle: $stream.data.manifest_handle
      status: $stream.data.status
      stream_id: $stream_id
  tier: 1
  visible: true
eidos: praxis
id: praxis/thyra/sense-stream
version: 151
