data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    List accumulations, optionally filtered by status.
  name: list-accumulations
  oikos: thyra
  params:
  - description: Filter by status (active, committed, abandoned, cleared)
    name: status
    required: false
    type: string
  - description: Filter by source stream
    name: stream_id
    required: false
    type: string
  - description: 'Maximum results (default: 50)'
    name: limit
    required: false
    type: number
  steps:
  - bindings:
      max_results: $limit
    step: set
  - cases:
    - then: []
      when: $max_results
    default:
    - bindings:
        max_results: 50
      step: set
    step: switch
  - bind_to: accumulations
    eidos: accumulation
    step: gather
  - cases:
    - then:
      - as: a
        bind_to: accumulations
        in: $accumulations
        step: filter
        where: $a.data.status == '$status'
      when: $status
    step: switch
  - cases:
    - then:
      - as: a
        bind_to: accumulations
        in: $accumulations
        step: filter
        where: $a.data.stream_id == '$stream_id'
      when: $stream_id
    step: switch
  - bind_to: accumulations
    count: $max_results
    items: $accumulations
    step: limit
  - step: return
    value:
      accumulations: $accumulations
      count: $accumulations | length
  tier: 1
  visible: true
eidos: praxis
id: praxis/thyra/list-accumulations
version: 136
