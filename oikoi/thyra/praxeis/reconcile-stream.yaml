data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Reconcile stream intent with actuality.

    The core reconciler praxis:
    - If intent=active and not manifested → manifest (spawn capture)
    - If intent=closed and manifested → unmanifest (kill process)
    - Otherwise → no action needed
  name: reconcile-stream
  oikos: thyra
  params:
  - description: The stream to reconcile
    name: stream_id
    required: true
    type: string
  steps:
  - bind_to: stream
    id: $stream_id
    step: find
  - condition: $stream
    message: 'Stream not found: $stream_id'
    step: assert
  - bind_to: actual
    entity_id: $stream_id
    step: sense_actuality
  - bindings:
      action_taken: none
      intent: $stream.data.intent
      is_running: $actual.running
    step: set
  - cases:
    - then:
      - bind_to: manifest_result
        entity_id: $stream_id
        step: manifest
      - data:
          manifest_handle: $manifest_result.pid
          manifested_at: '{{ now() }}'
          status: active
        id: $stream_id
        step: update
      - bindings:
          action_taken: manifested
        step: set
      when: $intent == "active" and not $is_running
    - then:
      - bind_to: unmanifest_result
        entity_id: $stream_id
        step: unmanifest
      - data:
          closed_at: '{{ now() }}'
          manifest_handle: null
          status: closed
        id: $stream_id
        step: update
      - bindings:
          action_taken: unmanifested
        step: set
      when: $intent == "closed" and $is_running
    - then:
      - data:
          status: paused
        id: $stream_id
        step: update
      - bindings:
          action_taken: paused
        step: set
      when: $intent == "paused"
    default:
    - bindings:
        action_taken: aligned
      step: set
    step: switch
  - step: return
    value:
      action: $action_taken
      actual_running: $is_running
      aligned: $action_taken == "aligned" or $action_taken == "none"
      intent: $intent
      stream_id: $stream_id
  tier: 3
  visible: true
eidos: praxis
id: praxis/thyra/reconcile-stream
version: 136
