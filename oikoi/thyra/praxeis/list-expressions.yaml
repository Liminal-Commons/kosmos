data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    List expressions in a circle.

    Can filter by expressed_by persona or mode.
  name: list-expressions
  oikos: thyra
  params:
  - description: Circle to list from (defaults to current circle)
    name: circle_id
    required: false
    type: string
  - description: Filter by persona ID
    name: expressed_by
    required: false
    type: string
  - description: Filter by expression mode
    name: mode
    required: false
    type: string
  - description: 'Maximum expressions to return (default: 50)'
    name: limit
    required: false
    type: number
  steps:
  - bindings:
      max_results: $limit
      target_circle: $circle_id
    step: set
  - cases:
    - then: []
      when: $target_circle
    default:
    - bindings:
        target_circle: $_circle.id
      step: set
    step: switch
  - cases:
    - then: []
      when: $max_results
    default:
    - bindings:
        max_results: 50
      step: set
    step: switch
  - bind_to: expressions
    desmos: expressed-in
    resolve: from
    step: trace
    to_id: $target_circle
  - cases:
    - then:
      - bind_to: expressions
        condition: $item.data.expressed_by == '$expressed_by'
        items: $expressions
        step: filter
      when: $expressed_by
    step: switch
  - cases:
    - then:
      - bind_to: expressions
        condition: $item.data.mode == '$mode'
        items: $expressions
        step: filter
      when: $mode
    step: switch
  - bind_to: expressions
    by: data.expressed_at
    items: $expressions
    order: desc
    step: sort
  - bind_to: expressions
    count: $max_results
    items: $expressions
    step: limit
  - step: return
    value:
      circle_id: $target_circle
      count: ${{ len(expressions) }}
      expressions: $expressions
  visible: true
eidos: praxis
id: praxis/thyra/list-expressions
version: 136
