data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/thyra/praxeis/thyra.yaml
  description: |
    Create an expression — the commitment boundary.

    This is the moment when ephemeral becomes durable.
    All contributions to the circle become expressions.
  name: express
  oikos: thyra
  params:
  - description: The content being expressed
    name: content
    required: true
    type: string
  - description: 'Expression mode: declaration, inquiry, suggestion, request, proposal (default: declaration)'
    name: mode
    required: false
    type: string
  - description: Expression ID this replies to
    name: in_reply_to
    required: false
    type: string
  - description: 'How this originated: stream, compose, direct (default: direct)'
    name: source_kind
    required: false
    type: string
  - description: 'MIME type (default: text/plain)'
    name: content_type
    required: false
    type: string
  steps:
  - condition: $_persona
    message: Cannot express without a persona
    step: assert
  - condition: $_circle
    message: Cannot express without dwelling in a circle
    step: assert
  - bindings:
      expr_content_type: $content_type
      expr_mode: $mode
      expr_source: $source_kind
    step: set
  - cases:
    - then: []
      when: $expr_mode
    default:
    - bindings:
        expr_mode: declaration
      step: set
    step: switch
  - cases:
    - then: []
      when: $expr_source
    default:
    - bindings:
        expr_source: direct
      step: set
    step: switch
  - cases:
    - then: []
      when: $expr_content_type
    default:
    - bindings:
        expr_content_type: text/plain
      step: set
    step: switch
  - bindings:
      expressed_at: now()
      expression_id: expression/{{ now() }}
    step: set
  - bind_to: expression_entity
    data:
      circle_id: $_circle.id
      content: $content
      content_type: $expr_content_type
      expressed_at: $expressed_at
      expressed_by: $_persona.id
      in_reply_to: $in_reply_to
      mode: $expr_mode
      source_kind: $expr_source
    eidos: expression
    id: $expression_id
    step: arise
  - desmos: expressed-in
    from_id: $expression_id
    step: bind
    to_id: $_circle.id
  - cases:
    - then:
      - desmos: in-reply-to
        from_id: $expression_id
        step: bind
        to_id: $in_reply_to
      when: $in_reply_to
    step: switch
  - step: return
    value:
      circle_id: $_circle.id
      expressed_by: $_persona.id
      expression_id: $expression_id
      mode: $expr_mode
  visible: true
eidos: praxis
id: praxis/thyra/express
version: 151
