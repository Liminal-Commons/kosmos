data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/manteia/praxeis/manteia.yaml
  description: |
    List generations for audit trail.

    Returns generations optionally filtered by status or authorization.
  name: list-generations
  oikos: manteia
  params:
  - description: Filter by status (pending, approved, rejected, modified)
    name: status
    required: false
    type: string
  - description: Filter by authorizing entity
    name: authorized_by
    required: false
    type: string
  - description: Maximum results (default 50)
    name: limit
    required: false
    type: number
  steps:
  - bind_to: generations
    eidos: generation
    limit: $limit
    step: gather
  - cases:
    - then:
      - bind_to: generations
        condition: $item.data.status == '$status'
        items: $generations
        step: filter
      when: $status
    step: switch
  - cases:
    - then:
      - bind_to: generations
        condition: $item.data.authorized_by == '$authorized_by'
        items: $generations
        step: filter
      when: $authorized_by
    step: switch
  - step: return
    value:
      count: $generations | length
      generations: $generations
  tier: 1
  visible: true
eidos: praxis
id: praxis/manteia/list-generations
version: 136
