data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/manteia/praxeis/manteia.yaml
  description: |
    Check if a prompt has been memoized.

    Returns the cached response if available, null otherwise.
  name: check-memo
  oikos: manteia
  params:
  - description: The prompt to check
    name: prompt
    required: true
    type: string
  steps:
  - bind_to: prompt_hash
    input: $prompt
    step: digest
  - bind_to: cached
    eidos: inference-memo
    limit: 1
    step: gather
    where: json_extract(data, '$.prompt_hash') = '$prompt_hash'
  - cases:
    - then:
      - step: return
        value:
          cached: true
          model: $cached[0].data.model
          prompt_hash: $prompt_hash
          response: $cached[0].data.response
      when: $cached
    step: switch
  - step: return
    value:
      cached: false
      prompt_hash: $prompt_hash
  tier: 1
  visible: true
eidos: praxis
id: praxis/manteia/check-memo
version: 136
