data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/manteia/praxeis/manteia.yaml
  description: |
    List generations awaiting review.

    Returns all generation entities with status "pending".
  name: list-pending-generations
  oikos: manteia
  params:
  - description: Maximum results (default 20)
    name: limit
    required: false
    type: number
  steps:
  - bind_to: pending
    eidos: generation
    limit: $limit
    step: gather
    where: json_extract(data, '$.status') = 'pending'
  - step: return
    value:
      count: $pending | length
      pending: $pending
  tier: 1
  visible: true
eidos: praxis
id: praxis/manteia/list-pending-generations
version: 142
