data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/manteia/praxeis/manteia.yaml
  description: |
    Approve a generation.

    Marks the generation as approved. Optionally modify the content
    before approval (status becomes "modified" if content changed).
  name: approve-generation
  oikos: manteia
  params:
  - description: The generation to approve
    name: generation_id
    required: true
    type: string
  - description: Modified content (if different from original response)
    name: final_content
    required: false
    type: string
  - description: Who reviewed (persona ID)
    name: reviewed_by
    required: false
    type: string
  steps:
  - bind_to: generation
    id: $generation_id
    step: find
  - condition: $generation
    message: 'Generation not found: $generation_id'
    step: assert
  - condition: $generation.data.status == "pending"
    message: Generation is not pending review
    step: assert
  - bindings:
      new_status: approved
    step: set
  - cases:
    - then:
      - bindings:
          new_status: modified
        step: set
      when: $final_content
    step: switch
  - data:
      final_content: $final_content
      reviewed_by: $reviewed_by
      status: $new_status
    id: $generation_id
    step: update
  - step: return
    value:
      approved: true
      generation_id: $generation_id
      status: $new_status
  tier: 2
  visible: true
eidos: praxis
id: praxis/manteia/approve-generation
version: 142
