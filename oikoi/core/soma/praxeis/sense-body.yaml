data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/soma/praxeis/soma.yaml
  description: |
    Sense the current body schema (idioaisthesis).

    Returns the animus's sense of its own shape and capacity:
    - Available channels
    - Capabilities
    - Limits
  name: sense-body
  oikos: soma
  params:
  - description: The animus to sense
    name: animus_id
    required: true
    type: string
  steps:
  - bind_to: schemas
    desmos: schema-of
    resolve: from
    step: trace
    to_id: $animus_id
  - cases:
    - then:
      - bindings:
          schema: $schemas.0
        step: set
      when: $schemas
    default:
    - step: return
      value:
        animus_id: $animus_id
        found: false
    step: switch
  - bind_to: channels
    desmos: channel-of
    resolve: from
    step: trace
    to_id: $animus_id
  - step: return
    value:
      animus_id: $animus_id
      capabilities: $schema.data.capabilities
      channels: $channels
      found: true
      limits: $schema.data.limits
      schema: $schema
  visible: true
eidos: praxis
id: praxis/soma/sense-body
version: 151
