data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    List thyrai of the animus.
  name: list-thyrai
  oikos: psyche
  params:
  - description: The animus to query
    name: animus_id
    required: true
    type: string
  steps:
  - bind_to: thyrai
    desmos: portal-of
    resolve: from
    step: trace
    to_id: $animus_id
  - step: return
    value:
      animus_id: $animus_id
      thyrai: $thyrai
  visible: true
eidos: praxis
id: praxis/psyche/list-thyrai
version: 136
