data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Disclose the current mood.

    Mood is not emotion but attunement — how the world shows up.
  name: disclose-mood
  oikos: psyche
  params:
  - description: The animus disclosing mood
    name: animus_id
    required: true
    type: string
  - description: ID for the new mood entity
    name: mood_id
    required: true
    type: string
  - description: The mood quality (focused, scattered, anxious, calm, etc.)
    name: quality
    required: true
    type: string
  - description: 0.0 to 1.0
    name: intensity
    required: false
    type: number
  - name: notes
    required: false
    type: string
  steps:
  - bind_to: animus
    id: $animus_id
    step: find
  - condition: $animus
    message: 'Animus not found: $animus_id'
    step: assert
  - bind_to: mood_entity
    data:
      intensity: $intensity
      notes: $notes
      quality: $quality
    eidos: mood
    id: $mood_id
    step: arise
  - desmos: mood-of
    from_id: $mood_id
    step: bind
    to_id: $animus_id
  - step: return
    value:
      mood_id: $mood_id
      quality: $quality
  visible: true
eidos: praxis
id: praxis/psyche/disclose-mood
version: 136
