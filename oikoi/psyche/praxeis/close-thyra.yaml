data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Close a thyra.
  name: close-thyra
  oikos: psyche
  params:
  - description: The thyra to close
    name: thyra_id
    required: true
    type: string
  steps:
  - bind_to: thyra
    id: $thyra_id
    step: find
  - condition: $thyra
    message: 'Thyra not found: $thyra_id'
    step: assert
  - data:
      status: closed
    id: $thyra_id
    step: update
  - step: return
    value:
      closed: true
      thyra_id: $thyra_id
  visible: true
eidos: praxis
id: praxis/psyche/close-thyra
version: 151
