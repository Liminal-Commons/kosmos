data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Release attention from something.
  name: release-attention
  oikos: psyche
  params:
  - description: The animus releasing attention
    name: animus_id
    required: true
    type: string
  - description: What to release attention from
    name: target_id
    required: true
    type: string
  steps:
  - desmos: attends
    from_id: $animus_id
    step: loose
    to_id: $target_id
  - step: return
    value:
      released: true
      target_id: $target_id
  visible: true
eidos: praxis
id: praxis/psyche/release-attention
version: 136
