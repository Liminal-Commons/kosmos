data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Sense moods of the animus.

    Returns all disclosed moods (most recent is likely current).
  name: sense-mood
  oikos: psyche
  params:
  - description: The animus to sense
    name: animus_id
    required: true
    type: string
  steps:
  - bind_to: moods
    desmos: mood-of
    resolve: from
    step: trace
    to_id: $animus_id
  - step: return
    value:
      animus_id: $animus_id
      moods: $moods
  visible: true
eidos: praxis
id: praxis/psyche/sense-mood
version: 151
