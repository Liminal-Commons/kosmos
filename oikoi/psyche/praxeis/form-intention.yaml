data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Form a new intention.

    Intentions are the directedness of will — what is being pursued.
  name: form-intention
  oikos: psyche
  params:
  - description: The animus forming the intention
    name: animus_id
    required: true
    type: string
  - description: ID for the new intention
    name: intention_id
    required: true
    type: string
  - description: What the intention is
    name: description
    required: true
    type: string
  - description: Higher = more priority
    name: priority
    required: false
    type: number
  steps:
  - bind_to: animus
    id: $animus_id
    step: find
  - condition: $animus
    message: 'Animus not found: $animus_id'
    step: assert
  - bind_to: intention_entity
    data:
      description: $description
      priority: $priority
      status: forming
    eidos: intention
    id: $intention_id
    step: arise
  - desmos: intends
    from_id: $animus_id
    step: bind
    to_id: $intention_id
  - step: return
    value:
      description: $description
      intention_id: $intention_id
      status: forming
  visible: true
eidos: praxis
id: praxis/psyche/form-intention
version: 151
