data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Mark an intention as fulfilled.
  name: fulfill-intention
  oikos: psyche
  params:
  - description: The intention that was fulfilled
    name: intention_id
    required: true
    type: string
  steps:
  - bind_to: intention
    id: $intention_id
    step: find
  - condition: $intention
    message: 'Intention not found: $intention_id'
    step: assert
  - data:
      status: fulfilled
    id: $intention_id
    step: update
  - step: return
    value:
      fulfilled: true
      intention_id: $intention_id
  visible: true
eidos: praxis
id: praxis/psyche/fulfill-intention
version: 151
