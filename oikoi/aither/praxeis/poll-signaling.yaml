data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/aither/praxeis/aither.yaml
  description: |
    Poll for pending messages from the signaling relay.

    Returns offers, answers, ICE candidates, and peer events.
  name: poll-signaling
  oikos: aither
  params:
  - description: The signaling session to poll
    name: session_id
    required: true
    type: string
  steps:
  - bind_to: session
    id: $session_id
    step: find
  - condition: $session
    message: 'Signaling session not found: $session_id'
    step: assert
  - bind_to: messages
    operation: poll
    session_id: $session.data.session_handle
    step: signal
  - step: return
    value:
      answers: $messages.answers
      ice_candidates: $messages.ice_candidates
      offers: $messages.offers
      peers_joined: $messages.peers_joined
      peers_left: $messages.peers_left
      session_id: $session_id
  tier: 2
  visible: true
eidos: praxis
id: praxis/aither/poll-signaling
version: 136
