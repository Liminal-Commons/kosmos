data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/aither/praxeis/aither.yaml
  description: |
    Sense the actual state of a signaling session.
  name: sense-signaling
  oikos: aither
  params:
  - description: The signaling session to sense
    name: session_id
    required: true
    type: string
  steps:
  - bind_to: session
    id: $session_id
    step: find
  - condition: $session
    message: 'Signaling session not found: $session_id'
    step: assert
  - bind_to: actual
    entity_id: $session_id
    step: sense_actuality
  - step: return
    value:
      connected: $actual.connected
      intent: $session.data.intent
      role: $session.data.role
      room_id: $session.data.room_id
      session_id: $session_id
      status: $session.data.status
  tier: 1
  visible: true
eidos: praxis
id: praxis/aither/sense-signaling
version: 136
