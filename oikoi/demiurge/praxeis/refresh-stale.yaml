data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/demiurge/praxeis/demiurge.yaml
  description: |
    Recompose a stale artifact using its stored definition and inputs.

    Reads the original definition_id and inputs from the artifact,
    then recomposes to refresh the content.
  name: refresh-stale
  oikos: demiurge
  params:
  - description: The stale artifact to refresh
    name: artifact_id
    required: true
    type: string
  steps:
  - bind_to: artifact
    id: $artifact_id
    step: find
  - condition: $artifact
    message: 'Artifact not found: $artifact_id'
    step: assert
  - condition: $artifact.data.stale
    message: 'Artifact is not stale: $artifact_id'
    step: assert
  - bind_to: refreshed
    definition_id: $artifact.data.definition_id
    id: $artifact_id
    inputs: $artifact.data.inputs
    step: compose
  - data:
      composed_at: '{{ now() }}'
      stale: false
    id: $artifact_id
    step: update
  - step: return
    value:
      artifact_id: $artifact_id
      refreshed: true
  tier: 2
  visible: true
eidos: praxis
id: praxis/demiurge/refresh-stale
version: 142
