data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/demiurge/praxeis/demiurge.yaml
  description: |
    Mark all artifacts that depend on an entity as stale.

    When an entity changes, this propagates staleness to
    all artifacts that have depends-on bonds to it.
  name: mark-dependents-stale
  oikos: demiurge
  params:
  - description: The entity that changed
    name: entity_id
    required: true
    type: string
  steps:
  - bind_to: dependents
    desmos: depends-on
    resolve: from
    step: trace
    to_id: $entity_id
  - bindings:
      marked_count: 0
    step: set
  - as: dependent
    do:
    - data:
        stale: true
      id: $dependent.id
      step: update
    - bindings:
        marked_count: $marked_count + 1
      step: set
    in: $dependents
    step: for_each
  - step: return
    value:
      dependents_marked_stale: $marked_count
      entity_id: $entity_id
  tier: 2
  visible: true
eidos: praxis
id: praxis/demiurge/mark-dependents-stale
version: 142
