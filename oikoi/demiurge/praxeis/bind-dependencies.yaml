data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/demiurge/praxeis/demiurge.yaml
  description: |
    Bind multiple dependencies to an artifact.

    Creates depends-on bonds from artifact to each dependency.
    Used after composition to declare what the artifact depends on.
  name: bind-dependencies
  oikos: demiurge
  params:
  - description: The artifact that has dependencies
    name: artifact_id
    required: true
    type: string
  - description: Entity IDs the artifact depends on
    name: dependency_ids
    required: true
    type: array
  steps:
  - bind_to: artifact
    id: $artifact_id
    step: find
  - condition: $artifact
    message: 'Artifact not found: $artifact_id'
    step: assert
  - as: dep_id
    do:
    - desmos: depends-on
      from_id: $artifact_id
      step: bind
      to_id: $dep_id
    in: $dependency_ids
    step: for_each
  - step: return
    value:
      artifact_id: $artifact_id
      dependencies_bound: $dependency_ids | length
  tier: 2
  visible: true
eidos: praxis
id: praxis/demiurge/bind-dependencies
version: 142
