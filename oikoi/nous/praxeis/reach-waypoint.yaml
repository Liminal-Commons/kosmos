data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Mark a waypoint as reached.
  name: reach-waypoint
  oikos: nous
  params:
  - description: The waypoint that was reached
    name: waypoint_id
    required: true
    type: string
  - description: Optional artifact this waypoint yields
    name: artifact_id
    required: false
    type: string
  steps:
  - bind_to: waypoint
    id: $waypoint_id
    step: find
  - condition: $waypoint
    message: 'Waypoint not found: $waypoint_id'
    step: assert
  - data:
      artifact_id: $artifact_id
      status: reached
    id: $waypoint_id
    step: update
  - cases:
    - then:
      - desmos: waypoint-yields
        from_id: $waypoint_id
        step: bind
        to_id: $artifact_id
      when: $artifact_id
    step: switch
  - bind_to: journey
    id: $waypoint.data.journey_id
    step: find
  - cases:
    - then:
      - bindings:
          next_ordinal: $waypoint.data.ordinal
        step: set
      - data:
          current_waypoint: $next_ordinal
        id: $waypoint.data.journey_id
        step: update
      when: $journey
    step: switch
  - step: return
    value:
      artifact_id: $artifact_id
      reached: true
      waypoint_id: $waypoint_id
  visible: true
eidos: praxis
id: praxis/nous/reach-waypoint
version: 151
