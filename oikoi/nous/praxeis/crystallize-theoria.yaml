data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Crystallize an understanding into theoria.

    Creates a theoria entity with the insight, domain, and status.
    Bonds theoria to dwelling circle via crystallized-in.
  name: crystallize-theoria
  oikos: nous
  params:
  - description: ID for the new theoria (e.g., theoria/uuid)
    name: theoria_id
    required: true
    type: string
  - description: The understanding being crystallized
    name: insight
    required: true
    type: string
  - description: Domain this understanding belongs to
    name: domain
    required: true
    type: string
  - description: Where this understanding came from (default conversation)
    name: source
    required: false
    type: string
  - description: Entity IDs that evidence this theoria
    name: evidence
    required: false
    type: array
  steps:
  - bindings:
      theoria_source: $source
    step: set
  - cases:
    - then: []
      when: $theoria_source
    default:
    - bindings:
        theoria_source: conversation
      step: set
    step: switch
  - bind_to: theoria_entity
    data:
      domain: $domain
      insight: $insight
      source: $theoria_source
      status: provisional
    eidos: theoria
    id: $theoria_id
    step: arise
  - cases:
    - then:
      - desmos: crystallized-in
        from_id: $theoria_id
        step: bind
        to_id: $_circle
      when: $_circle
    step: switch
  - cases:
    - then:
      - item_var: evidence_id
        items: $evidence
        step: for_each
        steps:
        - desmos: evidences
          from_id: $evidence_id
          step: bind
          to_id: $theoria_id
      when: $evidence
    step: switch
  - step: return
    value:
      domain: $domain
      insight: $insight
      status: provisional
      theoria_id: $theoria_id
  visible: true
eidos: praxis
id: praxis/nous/crystallize-theoria
version: 136
