data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Add a waypoint to a journey.
  name: add-waypoint
  oikos: nous
  params:
  - description: The journey to add waypoint to
    name: journey_id
    required: true
    type: string
  - description: ID for the new waypoint
    name: waypoint_id
    required: true
    type: string
  - description: Position in journey (0-indexed)
    name: ordinal
    required: true
    type: number
  - description: What this waypoint represents
    name: description
    required: true
    type: string
  steps:
  - bind_to: journey
    id: $journey_id
    step: find
  - condition: $journey
    message: 'Journey not found: $journey_id'
    step: assert
  - bind_to: waypoint_entity
    data:
      description: $description
      journey_id: $journey_id
      ordinal: $ordinal
      status: pending
    eidos: waypoint
    id: $waypoint_id
    step: arise
  - desmos: contains-waypoint
    from_id: $journey_id
    step: bind
    to_id: $waypoint_id
  - step: return
    value:
      journey_id: $journey_id
      ordinal: $ordinal
      status: pending
      waypoint_id: $waypoint_id
  visible: true
eidos: praxis
id: praxis/nous/add-waypoint
version: 136
