data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Begin a new journey toward a desire.

    Creates a journey entity with status potential.
  name: begin-journey
  oikos: nous
  params:
  - description: ID for the new journey
    name: journey_id
    required: true
    type: string
  - description: What we're moving toward (the telos)
    name: desire
    required: true
    type: string
  steps:
  - bind_to: journey_entity
    data:
      current_waypoint: 0
      desire: $desire
      status: potential
    eidos: journey
    id: $journey_id
    step: arise
  - step: return
    value:
      desire: $desire
      journey_id: $journey_id
      status: potential
  visible: true
eidos: praxis
id: praxis/nous/begin-journey
version: 136
