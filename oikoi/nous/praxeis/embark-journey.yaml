data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Embark on a journey (transition from potential to active).
  name: embark-journey
  oikos: nous
  params:
  - description: The journey to embark on
    name: journey_id
    required: true
    type: string
  steps:
  - bind_to: journey
    id: $journey_id
    step: find
  - condition: $journey
    message: 'Journey not found: $journey_id'
    step: assert
  - data:
      status: active
    id: $journey_id
    step: update
  - step: return
    value:
      embarked: true
      journey_id: $journey_id
  visible: true
eidos: praxis
id: praxis/nous/embark-journey
version: 136
