data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Complete a journey (arrive at telos).
  name: complete-journey
  oikos: nous
  params:
  - description: The journey to complete
    name: journey_id
    required: true
    type: string
  steps:
  - bind_to: journey
    id: $journey_id
    step: find
  - condition: $journey
    message: 'Journey not found: $journey_id'
    step: assert
  - data:
      status: arrived
    id: $journey_id
    step: update
  - step: return
    value:
      completed: true
      journey_id: $journey_id
  visible: true
eidos: praxis
id: praxis/nous/complete-journey
version: 136
