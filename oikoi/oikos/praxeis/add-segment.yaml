data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/oikos/praxeis/oikos.yaml
  description: |
    Add a segment to a conversation.
  name: add-segment
  oikos: oikos
  params:
  - description: The conversation to add segment to
    name: conversation_id
    required: true
    type: string
  - description: The segment content
    name: content
    required: true
    type: string
  - description: 'Segment kind: message, action, observation, reflection (default: message)'
    name: kind
    required: false
    type: string
  - description: 'Author kind: human, ai, system (default: human)'
    name: author_kind
    required: false
    type: string
  steps:
  - bind_to: conversation
    id: $conversation_id
    step: find
  - condition: $conversation
    message: 'Conversation not found: $conversation_id'
    step: assert
  - bindings:
      segment_author: $author_kind
      segment_kind: $kind
    step: set
  - cases:
    - then: []
      when: $segment_kind
    default:
    - bindings:
        segment_kind: message
      step: set
    step: switch
  - cases:
    - then: []
      when: $segment_author
    default:
    - bindings:
        segment_author: human
      step: set
    step: switch
  - bindings:
      created_at: now()
      segment_id: segment/{{ now() }}
    step: set
  - bind_to: segment_entity
    data:
      author_kind: $segment_author
      content: $content
      created_at: $created_at
      kind: $segment_kind
    eidos: segment
    id: $segment_id
    step: arise
  - desmos: within
    from_id: $segment_id
    step: bind
    to_id: $conversation_id
  - cases:
    - then:
      - desmos: authored-by
        from_id: $segment_id
        step: bind
        to_id: $_persona.id
      when: $_persona
    step: switch
  - step: return
    value:
      conversation_id: $conversation_id
      kind: $segment_kind
      segment_id: $segment_id
  visible: true
eidos: praxis
id: praxis/oikos/add-segment
version: 136
