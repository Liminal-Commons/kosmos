data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/oikos/praxeis/oikos.yaml
  description: |
    Open a new conversation within a session.
  name: open-conversation
  oikos: oikos
  params:
  - description: The session to open conversation in
    name: session_id
    required: true
    type: string
  - description: Optional title for the conversation
    name: title
    required: false
    type: string
  steps:
  - bind_to: session
    id: $session_id
    step: find
  - condition: $session
    message: 'Session not found: $session_id'
    step: assert
  - bindings:
      conversation_id: conversation/{{ now() }}
      opened_at: now()
    step: set
  - bind_to: conversation_entity
    data:
      opened_at: $opened_at
      status: active
      title: $title
    eidos: conversation
    id: $conversation_id
    step: arise
  - desmos: within
    from_id: $conversation_id
    step: bind
    to_id: $session_id
  - step: return
    value:
      conversation_id: $conversation_id
      session_id: $session_id
      status: active
  visible: true
eidos: praxis
id: praxis/oikos/open-conversation
version: 151
