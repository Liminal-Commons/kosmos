data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/demiurge/praxeis/demiurge.yaml
  description: |
    Check if an artifact exists in cache for given definition + inputs.

    Returns cache status without composing.
  name: check-cache
  oikos: demiurge
  params:
  - description: The artifact definition
    name: definition_id
    required: true
    type: string
  - description: The inputs to check
    name: inputs
    required: false
    type: object
  steps:
  - bindings:
      inputs_json: $inputs | to_json
    step: set
  - bind_to: cache_key
    input: $definition_id-$inputs_json
    step: digest
  - bindings:
      artifact_id: artifact/$cache_key
    step: set
  - bind_to: cached
    id: $artifact_id
    step: find
  - cases:
    - then:
      - step: return
        value:
          artifact_id: $artifact_id
          cache_key: $cache_key
          cached: true
          stale: $cached.data.stale
      when: $cached
    step: switch
  - step: return
    value:
      cache_key: $cache_key
      cached: false
  tier: 1
  visible: true
eidos: praxis
id: praxis/demiurge/check-cache
version: 151
