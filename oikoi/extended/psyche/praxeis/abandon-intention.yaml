data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    Mark an intention as abandoned.
  name: abandon-intention
  oikos: psyche
  params:
  - description: The intention to abandon
    name: intention_id
    required: true
    type: string
  steps:
  - bind_to: intention
    id: $intention_id
    step: find
  - condition: $intention
    message: 'Intention not found: $intention_id'
    step: assert
  - data:
      status: abandoned
    id: $intention_id
    step: update
  - step: return
    value:
      abandoned: true
      intention_id: $intention_id
  visible: true
eidos: praxis
id: praxis/psyche/abandon-intention
version: 151
