data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/psyche/praxeis/psyche.yaml
  description: |
    List what the animus is attending to.
  name: list-attending
  oikos: psyche
  params:
  - description: The animus to query
    name: animus_id
    required: true
    type: string
  steps:
  - bind_to: targets
    desmos: attends
    from_id: $animus_id
    resolve: to
    step: trace
  - step: return
    value:
      animus_id: $animus_id
      attending_to: $targets
  visible: true
eidos: praxis
id: praxis/psyche/list-attending
version: 151
