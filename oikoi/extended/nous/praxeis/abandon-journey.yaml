data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Abandon a journey.
  name: abandon-journey
  oikos: nous
  params:
  - description: The journey to abandon
    name: journey_id
    required: true
    type: string
  - description: Why abandoning
    name: reason
    required: false
    type: string
  steps:
  - bind_to: journey
    id: $journey_id
    step: find
  - condition: $journey
    message: 'Journey not found: $journey_id'
    step: assert
  - data:
      abandon_reason: $reason
      status: abandoned
    id: $journey_id
    step: update
  - step: return
    value:
      abandoned: true
      journey_id: $journey_id
      reason: $reason
  visible: true
eidos: praxis
id: praxis/nous/abandon-journey
version: 151
