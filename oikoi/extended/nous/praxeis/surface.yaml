data:
  _genesis:
    authorized_by: expression/genesis-root
    source: genesis/nous/praxeis/nous.yaml
  description: |
    Surface entities by semantic proximity to a query.

    Uses embeddings to find entities whose meaning is close to the query.
  name: surface
  oikos: nous
  params:
  - description: The semantic query
    name: query
    required: true
    type: string
  - description: Optional filter by eidos type
    name: eidos
    required: false
    type: string
  - description: Maximum results (default 10)
    name: limit
    required: false
    type: number
  - description: Minimum similarity threshold (default 0.7)
    name: threshold
    required: false
    type: number
  steps:
  - bind_to: results
    eidos_filter: $eidos
    limit: $limit
    query: $query
    step: surface
    threshold: $threshold
  - step: return
    value: $results
  visible: true
eidos: praxis
id: praxis/nous/surface
version: 151
